body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈十無盡藏品第二十二初來意者總有五義一為答第二會初十藏問故二前明正位今依位起行故同梵品三前約位別行今辨始終通行故四前明成位行今辨淨治彼行故同十地中信等十行五前自分究竟今辨勝進趣後同上明法準問應在十回向後今此辨者略有二義一云藏有二義約蘊攝義在十行後約出生義在十地前義通二處問答互顯一云回向無別自體但以能回前行為其自體今十藏既為十行勝進亦為回向勝進故回向後無別勝進此即前後互舉顯義方備二釋名者藏是出生蘊積之義謂一藏內體含法界故攝德出用二無盡寄圓顯十即帶數釋也三宗趣者十藏為宗攝前生後得果為趣爾時功德林菩薩復告諸菩薩言佛子菩薩摩訶薩有十種藏過去未來現在諸佛已説當説今説釋文中初唱數顯同言三世同説顯勝令遵何等為十所謂信藏戒藏慚藏愧藏聞藏施藏慧藏念藏持藏辨藏是為十二何等下徵名列異心淨名信制止名戒崇重賢善為慚輕拒暴惡為愧餐教廣博為聞輟己惠人為施決擇諸法名慧令心明記為念任持所記為持巧宣所説為辨各有業用然念慧及戒慚愧等五皆當體為性餘五行用立名前九自利後一利他信為行本故首明之依信離過慚愧莊嚴戒行光潔上三離過之行餘皆進善進善之首必籍多聞如聞而行唯福與慧念使增明慧令經久辨以利他故前七即七聖財慧為正導故終辨之次二守護後一積而能散佛子何等為菩薩摩訶薩信藏第三依名廣釋十藏即為十段段各有四謂徵名釋相結名辨益辨益一種唯初七十有餘皆無今初徵名此菩薩信一切法空信一切法無相信一切法無願信一切法無作信一切法無分別信一切法無所依信一切法不可量信一切法無有上信一切法難超越信一切法無生若菩薩能如是隨順一切法生淨信已聞諸佛法不可思議心不怯弱聞一切佛不可思議心不怯弱聞衆生界不可思議心不怯弱聞法界不可思議心不怯弱聞虗空界不可思議心不怯弱聞涅槃界不可思議心不怯弱聞過去世不可思議心不怯弱聞未來世不可思議心不怯弱聞現在世不可思議心不怯弱聞入一切劫不可思議心不怯弱何以故此菩薩於諸佛所一向堅信知佛智慧無邊無盡十方無量諸世界中一一各有無量諸佛於阿耨多羅三藐三菩提已得今得當得已出世今出世當出世已入涅槃今入涅槃當入涅槃彼諸佛智慧不增不減不生不滅不進不退不近不遠無知無捨此菩薩入佛智慧成就無邊無盡信得此信已心不退轉心不雜亂不可破壞無所染著常有根本隨順聖人住如來家護持一切諸佛種性增長一切菩薩信解隨順一切如來善根出生一切諸佛方便是名菩薩摩訶薩信藏菩薩住此信藏則能聞持一切佛法為衆生説皆令開悟釋中分三初明信相次若菩薩下明信力三此菩薩入佛下總結今初文有十句初三句信三空謂空無相無願次三句信依他無生以緣起故無作以不實故無能所分別以無體故無所依三三句信圓成無性一廣無邊故無量二最勝故無上三深故不可越後一總信三性無性入一無生觀次觀信力若菩薩能如是下正顯業用文有十句遍從前十前十並從此十若逆配前十謂由信法無生故於佛法不怯等次何以故下徵釋不怯之所以謂於深廣皆堅信故由所信者唯佛智慧故次十方下二行半經別釋上信佛智慧謂十方無量世界無量諸佛各已證菩提乃至入涅槃故智慧無邊無量一佛尚不可盡況橫遍十方竪窮三際菩薩於此堅信不移寧有怯耶次彼諸佛智慧下釋聞深不怯謂增減等皆戲論法以寂照之體如如超戲論故菩薩既堅信於此寧聞深而怯耶此二段釋文具前十句難思之法如文詳之次得此信已下顯成信之益文有十一句初心不退轉至生如來家七句明行體堅牢次護持下四句攝德無盡是名下結名菩薩住此下辨益佛子何等為菩薩摩訶薩戒藏此菩薩成就普饒益戒不受戒不住戒無悔恨戒無違諍戒不損惱戒無雜穢戒無貪求戒無過失戒無毀犯戒云何為普饒益戒此菩薩受持淨戒本為利益一切衆生云何為不受戒此菩薩不受行外道諸所有戒但性自精進奉持三世諸佛如來平等淨戒云何為不住戒此菩薩受持戒時心不住欲界不住色界不住無色界何以故不求生彼而持戒故云何為無悔恨戒此菩薩恆得安住無悔恨心何以故不作重罪不行諂詐不破淨戒故云何為無違諍戒此菩薩不非先制不更造立心常隨順向涅槃戒具足受持無所毀犯不以持戒惱他衆生令其生苦但願一切心常歡喜而持於戒云何為不惱害戒此菩薩不因於戒學諸呪術造作方藥惱害衆生但為救護一切衆生而持於戒云何為不雜戒此菩薩不著邊見不持雜戒但觀緣起持出離戒云何為無貪求戒此菩薩不現異相彰己有德但為滿足出離法故而持於戒云何為無過失戒此菩薩不自貢高言我持戒見破戒人亦不輕毀令他愧恥但一其心而持於戒云何為無毀犯戒此菩薩永斷殺盜邪淫妄語兩舌惡口及無義語貪瞋邪見具足受持十種善業菩薩持此無犯戒時作是念言一切衆生毀犯淨戒皆由顛倒唯佛世尊能知衆生以何因緣而生顛倒毀犯淨戒我當成就無上菩提廣為衆生説真實法令離顛倒是名菩薩摩訶薩第二戒藏第二戒藏釋相中二初列十名後隨牒釋初列十戒皆通三聚取其相顯初但饒益有情後一律儀中八通三為遮罪過皆是律儀但為救護即是饒益攝善可知次下牒釋十戒相即為十段初云何為普饒益戒以饒益有情是菩薩本意故首明之二云何為不受戒謂不受邪戒謂雞狗等三聚宿成故動不踰矩三云何為不住戒謂不樂住三界唯為求菩提及度衆生故非如難陀之類四云何為無悔恨戒涅槃云何故持戒為不悔故何故不悔為歡喜故乃至未得大涅槃故五云何為無違諍戒此中有四義非者違也一不違制立不同調達二不違涅槃不取相故三不違律儀具足持故四不違利物不惱他故六云何為不惱害戒中有二義一非為欲惱衆生先須持戒如聞羅漢持戒能降龍遂即持之二非為欲成淨戒逼惱衆生如外道殺馬祀天求生梵世七云何為不雜戒邪見持戒名雜定有定無為斷常雜觀緣性離無煩惱雜真出離矣八云何為無貪求戒謂不現有德彰己有德五邪之一已見淨行九云何為無過失戒言不輕毀者無行經云見破戒人不説其過惡應念彼人久久亦當得道十云何為無毀犯戒此菩薩永斷殺盜邪淫等釋有二義初明律儀十善衆戒之本故偏明之菩薩持此下雙明二聚攝菩提善為衆生故是名下結名佛子何等為菩薩摩訶薩慚藏此菩薩憶念過去所作諸惡而生於慚謂彼菩薩心自念言我無始世來與諸衆生皆悉互作父母兄弟姊妹男女具貪瞋癡憍慢諂誑及餘一切諸煩惱故更相惱害遞相陵奪姦淫傷殺無惡不造一切衆生悉亦如是以諸煩惱備造衆惡是故各各不相恭敬不相尊重不相承順不相謙下不相啓導不相護惜更相殺害互為怨讎自惟我身及諸衆生去來現在行無慚法三世諸佛無不知見今若不斷此無慚行三世諸佛亦當見我我當云何猶行不止甚為不可是故我應專心斷除證阿耨多羅三藐三菩提廣為衆生説真實法是名菩薩摩訶薩第三慚藏第三徵釋慚藏然慚愧相別諸説不同涅槃云慚者內自羞恥愧者發露向人瑜伽亦云內生羞恥為慚外生羞恥為愧大同涅槃唯識云依自法力崇重賢善為慚依世間力輕拒暴惡為愧釋中初釋過去作惡即無慚行經云謂彼菩薩心自念言下四行經初自念無慚次一切衆生下兩行半經明悲他亦爾次釋前非而生後慚經云自惟我身下二行半經正顯慚相初自念昔非恥佛知見現修慚相自惟即是內自羞恥次是故我應下決志斷證文言去來現在行無慚者言總意別菩薩自念昔過愍物三世常行故專心斷除防已伏之再起為衆生説則物我之兼亡是名下結名佛子何等為菩薩摩訶薩愧藏此菩薩自愧昔來於五欲中種種貪求無有厭足因此增長貪恚癡等一切煩惱我今不應復行是事又作是念衆生無智起諸煩惱具行惡法不相恭敬不相尊重乃至展轉互為怨讎如是等惡無不備造造已歡喜追求稱歎盲惡慧眼無所知見於母人腹中入胎受生成垢穢身畢竟至於髮白面皺有智慧者觀此但是從淫欲生不淨之法三世諸佛皆悉知見若我於今猶行是事則為欺誑三世諸佛是故我當修行於愧速成阿耨多羅三藐三菩提廣為衆生説真實法是名菩薩摩訶薩第四愧藏第四徵釋愧藏釋相中文有三段初此菩薩自愧昔來下自念無愧而修愧行故云我今不應復行是事即愧行也次又作是念衆生無智下傷物無愧不覺苦集故云無知見次於母腹中下依顧世間而修愧行誓益自他於中初於母腹中下即所愧境次有智慧下顧他生愧即外羞也是故已下決志斷證言不淨之法者從淫欲生即種子不淨住母腹中即住處不淨成垢穢身即自相自性究竟不淨髮白意含究竟不淨是名下結名佛子何等為菩薩摩訶薩聞藏此菩薩知是事有故是事有是事無故是事無是事起故是事起是事滅故是事滅是世間法是出世間法是有為法是無為法是有記法是無記法何等為是事有故是事有謂無明有故行有何等為是事無故是事無謂識無故名色無何等為是事起故是事起謂愛起故苦起何等為是事滅故是事滅謂有滅故生滅何等為世間法所謂色受想行識何等為出世間法所謂戒定慧解脫解脫知見何等為有為法所謂欲界色界無色界衆生界何等為無為法所謂虗空涅槃數緣滅非數緣滅緣起法性住何等為有記法謂四聖諦四沙門果四辨四無所畏四念處四正勤四神足五根五力七覺分八聖道分何等為無記法謂世間有邊世間無邊世間亦有邊亦無邊世間非有邊非無邊世間有常世間無常世間亦有常亦無常世間非有常非無常如來滅後有如來滅後無如來滅後亦有亦無如來滅後非有非無我及衆生有我及衆生無我及衆生亦有亦無我及衆生非有非無過去有幾如來般涅槃幾聲聞辟支佛般涅槃未來有幾如來幾聲聞辟支佛幾衆生現在有幾佛住幾聲聞辟支佛住幾衆生住何等如來最先出何等聲聞辟支佛最先出何等衆生最先出何等如來最後出何等聲聞辟支佛最後出何等衆生最後出何法最在初何法最在後世間從何處來去至何所有幾世界成有幾世界壞世界從何處來去至何所何者為生死最初際何者為生死最後際是名無記法菩薩摩訶薩作如是念一切衆生於生死中無有多聞不能了知此一切法我當發意持多聞藏證阿耨多羅三藐三菩提為諸衆生説真實法是名菩薩摩訶薩第五多聞藏第五徵釋聞藏釋相中有二初明所知之法後菩薩摩訶薩作如是念下顯多聞之意初釋所知之法標稱聞藏釋云知者聞為本故實則多知耳所知之法初標十法釋分七段初牒釋有無二法云何為世事有下謂十二因緣緣生之法今經正顯緣生無性二云何為世間法下明有漏五蘊為世間法三何等為出世間法謂無漏五蘊即五分法身四何等為有為法謂三界五何等為無為法謂六無為等於大小乘多少不同論有廣釋云何等為有記法謂四聖諦等言有記者謂能招愛非愛果故云有記此是通説餘處辨記即是善惡今唯是善七云何為無記法言無記者有二義一非善非惡不能招愛非愛果名為無記此但可釋餘文今此文中單指外道正謂虗妄推度非理問難不可記録故名無記非對善惡今此無記亦名置記記即答也不應答故此無記法中略開五種初謂世間有邊下五行經就我明無記此中乃外道妄計四句其過不出斷常二見次第二過去有幾如來下明三乘聖數多少者以橫無邊故不可記也次第三何等如來最先下竪無際故不可記也次第四世間從何處來下徵三世間所從文有六句初二句問衆生及蘊世間次四句約器世間以外道計衆生有最初生故謂外道或謂衆生從冥中來還至冥故或謂世界皆微塵成聚則為身器散則為微塵此皆邪見之源故不應答次第五何者為生死最初際下二句約生死初後際此外道計生死有始終以彼定執故是邪見中論云大聖之所説本際不可得生死無有始亦復無有終若無有始終中當云何有是故於此中先後共亦無以妄計始終故不應答故結云是名為無記法次作是念下顯多聞之意謂悲物無聞長淪生死故誓持聞藏自證利他是名下結名佛子何等為菩薩摩訶薩施藏此菩薩行十種施所謂分減施竭盡施內施外施內外施一切施過去施未來施現在施究竟施佛子云何為菩薩分減施此菩薩稟性仁慈好行惠施若得美味不專自受要與衆生然後方食凡所受物悉亦如是若自食時作是念言我身中有八萬戶蟲依於我住我身充樂彼亦充樂我身飢苦彼亦飢苦我今受此所有飲食願令衆生普得充飽為施彼故而自食之不貪其味復作是念我於長夜愛著其身欲令充飽而受飲食今以此食惠施衆生願我於身永斷貪著是名分減施云何為菩薩竭盡施佛子此菩薩得種種上味飲食香華衣服資生之具若自以受用則安樂延年若輟己施人則窮苦夭命時或有人來作是言汝今所有悉當與我菩薩自念我無始已來以飢餓故喪身無數未曾得有如毫末許饒益衆生而獲善利今我亦當同於往昔而捨其命是故應為饒益衆生隨其所有一切皆捨乃至盡命亦無所吝是名竭盡施云何為菩薩內施佛子此菩薩年方少盛端正美好香華衣服以嚴其身始受灌頂轉輪王位七寶具足王四天下時或有人來白王言大王當知我今衰老身嬰重疾煢獨羸頓死將不久若得王身手足血肉頭目骨髓我之身命必冀存活唯願大王莫更籌量有所顧惜但見慈念以施於我爾時菩薩作是念言今我此身後必當死無一利益宜時疾捨以濟衆生念已施之心無所悔是名內施云何為菩薩外施佛子此菩薩年盛色美衆相具足名華上服而以嚴身始受灌頂轉輪王位七寶具足王四天下時或有人來白王言我今貧窶衆苦逼迫惟願仁慈特垂矜念捨此王位以贍於我我當統領受王福樂爾時菩薩作是念言一切榮盛必當衰歇於衰歇時不能復更饒益衆生我今宜應隨彼所求充滿其意作是念已即便施之而無所悔是名外施云何為菩薩內外施佛子此菩薩如上所説處輪王位七寶具足王四天下時或有人而來白言此轉輪位王處已久我未曾得唯願大王捨之與我并及王身為我臣僕爾時菩薩作是念言我身財寶及以王位悉是無常敗壞之法我今盛壯富有天下乞者現前當以不堅而求堅法作是念已即便施之乃至以身恭勤作役心無所悔是名內外施云何為菩薩一切施佛子此菩薩亦如上説處輪王位七寶具足王四天下時有無量貧窮之人來詣其前而作是言大王名稱周聞十方我等欽風故來至此吾曹今者各有所求願普垂慈令得滿足時諸貧人從彼大王或乞國土或乞妻子或乞手足血肉心肺頭自髓腦菩薩是時心作是念一切恩愛會當別離而於衆生無所饒益我今為欲永捨貪愛以此一切必離散物滿衆生願作是念已悉皆施與心無悔恨亦不於衆生而生厭賤是名一切施云何為菩薩過去施此菩薩聞過去諸佛菩薩所有功德聞已不著了達非有不起分別不貪不味亦不求取無取依倚見法如夢無有堅固於諸善根不起有想亦無所倚但為教化取著衆生成熟佛法而為演説又復觀察過去諸法十方推求都不可得作是念已於過去法畢竟皆捨是名過去施云何為菩薩未來施此菩薩聞未來諸佛之所修行了達非有不取於相不別樂往生諸佛國土不味不著亦不生厭不以善根回向於彼亦不於彼而退善根常勤修行未曾廢捨但欲因彼境界攝取衆生為説真實令成熟佛法然此法者非有處所非無處所非內非外非近非遠復作是念若法非有不可不捨是名未來施云何為菩薩現在施此菩薩聞四天王衆天三十三天夜摩天兜率陀天化樂天他化自在天梵天梵身天梵輔天梵衆天大梵天光天少光天無量光天光音天淨天少淨天無量淨天遍淨天廣天少廣天無量廣天廣果天無煩天無熱天善見天善現天色究竟天乃至聞聲聞緣覺具足功德聞已其心不迷不沒不聚不散但觀諸行如夢不實無有貪著為令衆生捨離惡趣心無分別修菩薩道成就佛法而為開演是名現在施云何為菩薩究竟施佛子此菩薩假使有無量衆生或有無眼或有無耳或無鼻舌及以手足來至其所告菩薩言我身薄祜諸根殘缺惟願仁慈以善方便捨己所有令我具足菩薩聞之即便施與假使由此經阿僧祇劫諸根不具亦不心生一念悔惜但自觀身從初入胎不淨微形胞段諸根生老病死又觀此身無有真實無有慚愧非賢聖物臭穢不潔骨節相持血肉所塗九孔常流人所惡賤作是觀已不生一念愛著之心復作是念此身危脆無有堅固我今云何而生戀著應以施彼充滿其願如我所作以此開導一切衆生令於身心不生貪愛悉得成就清淨智身是名究竟施是為菩薩摩訶薩第六施藏釋第六施藏初此菩薩行十種施下先標列十名下釋相中依章別釋中即為十段一一各三謂標釋結然此十施前六事捨謂身命財次三心捨謂不取著後一俱捨名為究竟今佛子云何下一句標分減施次釋中此菩薩稟性仁慈下初明分減之相次若自食時下明施善巧次復作是念下對治施障是名下結名二云何下標竭盡施言竭盡者不顧活命傾竭所有也次釋相中此菩薩得種種下明難捨之物次或時有人來下乞境現前三菩薩自念下正修施行是名下結名三云何為菩薩內施內施謂身也次此菩薩下乞境現前煢者單也無兄曰煢次爾時菩薩下正修施行是名下結名四云何為菩薩外施即王位也時或人來下乞境爾時下施行五云何為菩薩內外施王位為外兼身為內六云何為菩薩一切施謂凡一切所有也明難捨之物以是事捨之終故總該收舉難攝易略舉數條廣則無邊次時有無量貧窮之人下明乞境現前心作是念下正修施行七云何為菩薩過去施然三世之施通相皆明不著別則過去不生追戀未來預止貪求現在心無染著今云此菩薩聞過去下明於佛法無所著次云又復觀察下於一切法無所著是名過去施八云何為菩薩未來施謂不著未來果報故初聞未來諸佛下正顯不著修行之因不願淨土之果不味其好不厭其事不回向者釋上不味不退已下釋上不厭修彼行故次但欲因彼境界下釋疑疑云既於淨不味修行何為釋有二意一者約悲但為攝物故次然此法者下約智智了非有故生即非生故不著不礙事故非生之生故修行非有處所者與理冥故非無處者事相形故非內者相分境故非外者心所淨故是名未來施九云何為菩薩現在施釋相有三初明所捨之境次結捨心三通外難初所捨境聞四天王下列欲界諸天次梵天下色界諸天次乃至聲聞下列二乘上皆所捨之境次聞已其心不迷下五句明能捨心次為令衆生下釋疑疑云既言不聚善因何以説五乘因果釋云拯三途之劇苦示人天以蘇息止劣見之妄情説二乘以引攝為物然耳非自不捨也是名現在施十云何為菩薩究竟施然究竟之名略有五義一前六捨財命次三捨著心今則兼上二門故二又發大願令物無著故三令物得究竟果故四不生一念愛著則微細無著故五究竟能令物實益故次釋相中初云假使有無量衆生下明施境現前次菩薩聞之即便施與下正施無恪次但觀自身下顯成捨之由由觀此身過患多故固當捨也次如我所作下回向衆生是名究竟施佛子何等為菩薩摩訶薩慧藏此菩薩於色如實知色集如實知色滅如實知色滅道如實知於受想行識如實知受想行識集如實知受想行識滅如實知受想行識滅道如實知於無明如實知無明集如實知無明滅如實知無明滅道如實知於愛如實知愛集如實知愛滅如實知愛滅道如實知於聲聞如實知聲聞法如實知聲聞集如實知聲聞涅槃如實知於獨覺如實知獨覺法如實知獨覺集如實知獨覺涅槃如實知於菩薩如實知菩薩法如實知菩薩集如實知菩薩涅槃如實知云何知知從業報諸行因緣之所造作一切虗假空無有實非我非堅固無有少法可得成立欲令衆生知其實性廣為宣説為説何等説諸法不可壞何等法不可壞色不可壞受想行識不可壞無明不可壞聲聞法獨覺法菩薩法不可壞何以故一切法無作無作者無言説無處所不生不起不與不取無動轉無作用菩薩成就如是等無量慧藏以少方便了一切法自然明達不由他悟此慧無盡藏有十種不可盡故説為無盡何等為十所謂多聞善巧不可盡故親近善知識不可盡故善分別句義不可盡故入深法界不可盡故以一味智莊嚴不可盡故集一切福德心無疲倦不可盡故入一切陀羅尼門不可盡故能分別一切衆生語言音聲不可盡故能斷一切衆生疑惑不可盡故為一切衆生現一切佛神力教化調伏令修行不斷不可盡故是為十是為菩薩摩訶薩第七慧藏住此藏者得無盡智慧普能開悟一切衆生第七釋慧藏釋相中二初明慧藏後釋無盡前中三初此菩薩於色如實知下八行半經明如實知境次下釋如實知義顯所知之相徵云云何知也下知從業報下釋也釋意云知相知性無有障礙是菩薩所知無知之知是菩薩所知故云如實知也初知從業報乃約自利明知苦集次約利他彰知滅道次欲令衆生知其實性廣為宣説標其説意正是利他能知實性是道諦相法不可壞及所知性即滅諦相廣為宣説唯菩薩相次為説何等下展轉徵釋總有三重初徵意云説何令知實性釋云説不可壞次徵云何等法不可壞為性為相此尋説處釋云相即性故故説五類等法皆不可壞次何以故下徵云現見諸法猶如聚沫泡𦦨芭蕉幻夢不實那言不壞下釋略有三義一色等性空無可壞故若壞方空非本空故二由空即真同法性故若壞方真事在理外故三由即空不待壞故壞則斷滅文有十句次菩薩成就下三總結多門以彰善巧者更有多門皆以無所得等為少方便則色空見盡壞與不壞兩亡不隨境轉名不由他悟次此慧無盡藏下二釋無盡文有十句是為下結名住此藏者下歎益佛子何等為菩薩摩訶薩念藏此菩薩捨離癡惑得具足念憶念過去一生二生乃至十生百生千生百千生無量百千生成劫壞劫成壞劫非一成劫非一壞劫非一成壞劫百劫千劫百千億那由他乃至無量無數無邊無等不可數不可稱不可思不可量不可説不可説不可説劫念一佛名號乃至不可説不可説佛名號念一佛出世説授記乃至不可説不可説佛出世説授記念一佛出世説修多羅乃至不可説不可説佛出世説修多羅如修多羅祇夜授記伽陀尼陀那優陀那本事本生方廣未曾有譬喻論議亦如是念一衆會乃至不可説不可説衆會念演一法乃至演不可説不可説法念一根種種性乃至不可説不可説根種種性念一根無量種種性乃至不可説不可説根無量種種性念一煩惱種種性乃至不可説不可説煩惱種種性念一三昧種種性乃至不可説不可説三昧種種性此念有十種所謂寂靜念清淨念不濁念明徹念離塵念離種種塵念離垢念光耀念可愛樂念無障礙念菩薩住是念時一切世間無能嬈亂一切異論無能變動往世善根悉得清淨於諸世法無所染著衆魔外道所不能壞轉身受生無所忘失過現未來説法無盡於一切世界中與衆生同住曾無過咎入一切諸佛衆會道場無所障礙一切佛所悉得親近是名菩薩摩訶薩第八念藏八釋念藏釋相中有四初捨離癡惑標念體次憶念過去下十三行半經明所念差別次此念有十種下三明能念勝相於中十句次菩薩住是念時下五行經明念益相是名下結名佛子何等為菩薩摩訶薩持藏此菩薩持諸佛所説修多羅文句義理無有忘失一生持乃至不可説不可説生持持一佛名號乃至不可説不可説佛名號持一劫數乃至不可説不可説劫數持一佛授記乃至不可説不可説佛授記持一修多羅乃至不可説不可説修多羅持一衆會乃至不可説不可説衆會持演一法乃至演不可説不可説法持一根無量種種性乃至不可説不可説根無量種種性持一煩惱種種性乃至不可説不可説煩惱種種性持一三昧種種性乃至不可説不可説三昧種種性佛子此持藏無邊難滿難至其底難得親近無能制伏無量無盡具大威力是佛境界唯佛能了是名菩薩摩訶薩第九持藏九釋持藏釋相中三初此菩薩持諸佛下別舉文義次持一佛名號下遍舉諸法三佛子此持藏下明持德量文有十句次是名下結名佛子何等為菩薩摩訶薩辨藏此菩薩有深智慧了知實相廣為衆生演説諸法不違一切諸佛經典説一品法乃至不可説不可説品法説一佛名號乃至不可説不可説佛名號如是説一世界説一佛授記説一修多羅説一衆會説演一法説一根無量種種性説一煩惱無量種種性説一三昧無量種種性乃至説不可説不可説三昧無量種種性或一日説或半月一月説或百年千年百千年説或一劫百劫千劫百千劫説或百千億那由他劫説或無數無量乃至不可説不可説劫説劫數可盡一文一句義理難盡何以故此菩薩成就十種無盡藏故成就此藏得攝一切法陀羅尼門現在前百萬阿僧祇陀羅尼以為眷屬得此陀羅尼已以法光明廣為衆生演説於法其説法時以廣長舌出妙音聲充滿十方一切世界隨其根性悉令滿足心得歡喜滅除一切煩惱纏垢善入一切音聲言語文字辨才令一切衆生佛種不斷淨心相續亦以法光明而演説法無有窮盡不生疲倦何以故此菩薩成就盡虗空遍法界無邊身故是為菩薩摩訶薩第十辨藏此藏無窮盡無分段無間無斷無變異無隔礙無退轉甚深無底難可得入普入一切佛法之門第十釋辨藏釋相中分四初此菩薩有深智慧下總舉體用雙照事理二種實相名深智慧次説一品法下四行半經顯能廣演次或一日説下三行餘經明長時演次何以故下徵釋意云所以能長時演者成就十種無盡藏故以是十藏之終故説具前十藏次其説法時下五行經彰辨之德是為下結名次此藏無窮下歎益中文有十句義該七辨一無窮盡是豐義味辨一一句中出多事理故二即捷辨欲言即言無分段故三無疏謬辨不以邪錯間深理故四無斷辨相續連環故五應辨應時應機無變異故六迅辨迅若懸河無隔礙故已下四句即一切世間最上妙辨此辨有五德一甚深如雷即第八句二清徹遠聞故不退轉即第七句三其聲哀雅如迦陵頻伽故能普入一切佛法即第十句四能令衆生入心愛敬五其有聞者歡喜無厭故難可得入上二即第九句上來依章別釋竟佛子此十種無盡藏有十種無盡法令諸菩薩究竟成就無上菩提何等為十饒益一切衆生故以本願善回向故一切劫無斷絶故盡虗空界悉開悟心無限故回向有為而不著故一念境界一切法無盡故大願心無變異故善攝取諸陀羅尼故一切諸佛所護念故了一切法皆如幻故是為十種無盡法能令一切世間所作悉得究竟無盡大藏第四佛子下總歎十藏勝能分三初標歎次何等為十下徵釋釋有十句攝為五對一下化上求二竪窮橫遍三捨相契實四無變善攝五外護內明故以為勝次是為十種下結歎此後應有偈等或是略無多是經來未盡第四會竟
