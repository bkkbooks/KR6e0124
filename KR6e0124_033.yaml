body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈十迴向品第二十五之十一佛子菩薩摩訶薩復以法施所修善根如是迴向願一切佛剎皆悉清淨以不可說不可說莊嚴具而莊嚴之一一佛剎其量廣大同於法界純善無礙清淨光明諸佛於中現成正覺一佛剎中清淨境界悉能顯現一切佛剎如一佛剎一切佛剎亦復如是第三一門願成依果文分為二先總明後其一一下別顯今初十句先一句牒前起後次云願一切佛剎下正顯願相一願清淨二願莊嚴三分量普周四純善五無障礙六具淨光七有佛現八融攝九舉一例餘一剎之展量同法界一剎之卷顯現無餘展卷無礙是一佛剎如一佛剎剎剎皆然準後人嚴塵塵尚然況復剎剎其一一剎悉以等法界無量無邊清淨妙寶莊嚴之具而為嚴飾所謂阿僧祇清淨寶座敷眾寶衣阿僧祇寶帳寶網垂布阿僧祇寶蓋一切妙寶互相暎徹阿僧祇寶雲普雨眾寶阿僧祇寶華周徧清淨阿僧祇眾寶所成欄楯軒檻清淨莊嚴阿僧祇寶鈴常演諸佛微妙音聲周流法界阿僧祇寶蓮華種種寶色開敷榮曜阿僧祇寶樹周帀行列無量妙寶以為華果阿僧祇寶宮殿無量菩薩止住其中阿僧祇寶樓閣廣博崇麗延袤遠近阿僧祇寶却敵大寶所成莊嚴妙好阿僧祇寶門闥妙寶瓔珞周帀垂布阿僧祇寶牕牖不思議寶清淨莊嚴阿僧祇寶多羅形如半月眾寶集成如是一切悉以眾寶而為嚴飾離垢清淨不可思議無非如來善根所起具足無數寶藏莊嚴第二別顯中先顯寶嚴後如寶莊嚴下類餘嚴今初分三初其一一下總標次所謂下別顯三是為菩薩下總結今別顯中分二先通顯寶嚴後佛子於彼一切下別明人寶嚴前中以阿僧數但有九十四數以晉經皆云無量阿僧祇初有數事但云無量則阿僧祇言非是數中之一但是無數之言若定是數則為限局今就九十四內寶樹之中有無量妙寶以為華果為一宮殿中有無量菩薩為二初段顯因之後有無數寶藏為三一一瓔珞中有千菩薩上妙莊嚴為四下寶枝中有不思議鳥為五寶華中有無量菩薩為六足滿百數文中分二初十八事略明顯勝先列事略明次如是一切下舉因顯勝復有阿僧祇寶河流出一切清淨善法阿僧祇寶海法水盈滿阿僧祇寶芬陀利華常出妙法芬陀利聲阿僧祇寶須彌山智慧山王秀出清淨阿僧祇八楞妙寶寶線貫穿嚴淨無比阿僧祇淨光寶常放無礙大智光明普照法界阿僧祇寶鈴鐸更相扣擊出妙音聲阿僧祇清淨寶諸菩薩寶具足充滿阿僧祇寶繒綵處處垂下色相光潔阿僧祇妙寶幢以寶半月而為嚴飾阿僧祇寶旛悉能普雨無量寶旛阿僧祇寶帶垂布空中莊嚴殊妙阿僧祇寶敷具能生種種微細樂觸阿僧祇妙寶旋示現菩薩一切智眼阿僧祇寶瓔珞一一瓔珞百千菩薩上妙莊嚴阿僧祇寶宮殿超過一切妙絕無比阿僧祇寶莊嚴具金剛摩尼以為嚴飾阿僧祇種種妙寶莊嚴具常現一切清淨妙色阿僧祇清淨寶殊形異彩光鑒暎徹阿僧祇寶山以為垣牆周帀圍繞清淨無礙阿僧祇寶香其香普熏一切世界阿僧祇寶化事一一化事周徧法界阿僧祇寶光明一一光明現一切光次復有下八十二事廣顯於中分五第一二十四事唯以外寶為嚴其間三兩亦標以事名釋以法門且從多判復有阿僧祇寶光明清淨智光照了諸法復有阿僧祇無礙寶光明一一光明周徧法界有阿僧祇寶處一切諸寶皆悉具足阿僧祇寶藏開示一切正法藏寶阿僧祇寶幢如來幢相迥然高出阿僧祇寶賢大智賢像具足清淨阿僧祇寶園生諸菩薩三昧快樂阿僧祇寶音如來妙音普示世間阿僧祇寶形其一一形皆放無量妙法光明阿僧祇寶相其一一相悉超眾相阿僧祇寶威儀見者皆生菩薩喜樂阿僧祇寶聚見者皆生智慧寶聚阿僧祇寶安住見者皆生善住寶心阿僧祇寶衣服其有著者生諸菩薩無比三昧阿僧祇寶袈裟其有著者纔始發心則得善見陀羅尼門二復有阿僧祇寶光明下有十五事標以事名釋以法門欲顯即事成法門故阿僧祇寶修習其有見者如一切寶皆是業果決定清淨阿僧祇寶無礙知見其有見者得了一切清淨法眼阿僧祇寶光藏其有見者則得成就大智慧藏三寶修習下三事唯約法門顯即法可貴非要託事阿僧祇寶座佛坐其上大師子吼阿僧祇寶燈常放清淨智慧光明阿僧祇寶多羅樹次第行列繚以寶繩莊嚴清淨其樹復有阿僧祇寶幹從身聳擢端直圓潔阿僧祇寶枝種種眾寶莊嚴稠密不思議鳥翔集其中常吐妙音宣揚正法阿僧祇寶葉放大智光徧一切處阿僧祇寶華一一華上無量菩薩結跏趺坐徧遊法界阿僧祇寶果見者當得一切智智不退轉果阿僧祇寶聚落見者捨離世聚落法阿僧祇寶都邑無礙眾生於中盈滿阿僧祇寶宮殿王處其中具足菩薩那羅延身勇猛堅固被法甲冑心無退轉阿僧祇寶舍入者能除戀舍宅心阿僧祇寶衣著者能令解了無著阿僧祇寶宮殿出家菩薩充滿其中阿僧祇寶珍玩見者咸生無量歡喜阿僧祇寶輪放不思議智慧光明轉不退輪阿僧祇寶䟦陀樹因陀羅網莊嚴清淨阿僧祇寶地不思議寶間錯莊嚴阿僧祇寶吹其音清亮充滿法界阿僧祇寶鼓妙音克諧窮劫不絕四寶座下二十七事約於事寶能成法門或顯依中有正明雜莊嚴阿僧祇寶眾生盡能攝持無上法寶阿僧祇寶身具足無量功德妙寶阿僧祇寶口常演一切妙法寶音阿僧祇寶心具清淨意大智願寶阿僧祇寶念斷諸愚惑究竟堅固一切智寶阿僧祇寶明誦持一切諸佛法寶阿僧祇寶慧決了一切諸佛法藏阿僧祇寶智得大圓滿一切智寶阿僧祇寶眼鑒十方寶無所障礙阿僧祇寶耳聽聞無量盡法界聲清淨無礙阿僧祇寶鼻常齅隨順清淨寶香阿僧祇寶舌能說無量諸語言法阿僧祇寶身徧遊十方而無罣礙阿僧祇寶意常勤修習普賢行願阿僧祇寶音淨妙音聲徧十方界阿僧祇寶身業一切所作以智為首阿僧祇寶語業常說修行無礙智寶阿僧祇寶意業得無障礙廣大智寶究竟圓滿五寶眾生下十八事顯於內身六根三業皆名為寶並圓明可貴故此上諸事或純或雜或依正無礙皆以事事無礙因所感故若將一因各對一事如以寂忍為因所感寶衣等恐繁不顯復將一因成一切果四句融通義如常說佛子菩薩摩訶薩於彼一切諸佛剎中於一佛剎一方一處一毛端量有無量無邊不可說數諸大菩薩皆悉成就清淨智慧充滿而住如一佛剎一方一處一毛端量如是盡虗空徧法界一一佛剎一一方一一處一一毛端量悉亦如是第二人寶者法華云彼國何故名曰大寶莊嚴彼國中以菩薩為大寶故所以楚魏之朝亦不以金玉為珍而以賢臣為寶徧法界微塵之處有多菩薩可謂大心嚴剎也是為菩薩摩訶薩以諸善根而為迴向普願一切諸佛國土悉具種種妙寶莊嚴三結成寶嚴如寶莊嚴如是廣說如是香莊嚴華莊嚴鬘莊嚴塗香莊嚴燒香莊嚴末香莊嚴衣莊嚴蓋莊嚴幢莊嚴旛莊嚴摩尼寶莊嚴次第乃至過此百倍皆如寶莊嚴如是廣說第二類顯餘嚴有十一事一一皆有上之百事并前一百則一千二言次第乃至過此百倍者若言嚴事過百則不應言皆如寶嚴若準晉經云衣蓋幢旛乃至百事莊嚴則以香等為百然過此倍之三字譯者不妙若別理通者以前寶嚴但列百事非止為百應過百倍則百百為萬表圓融萬行則應迴文云摩尼寶嚴皆如寶莊嚴如是廣說次第乃至過此百倍理則無違上迴向菩提中一門依報果圓佛子菩薩摩訶薩以法施等所集善根為長養一切善根故迴向為嚴淨一切佛剎故迴向為成就一切眾生故迴向為令一切眾生皆心淨不動故迴向為令一切眾生皆入甚深佛法故迴向為令一切眾生皆得無能過清淨功德故迴向為令一切眾生皆得不可壞清淨福力故迴向為令一切眾生皆得無盡智力度諸眾生令入佛法故迴向為令一切眾生皆得平等無量清淨言音故迴向為令一切眾生皆得平等無礙眼成就盡虗空徧法界等智慧故迴向為令一切眾生皆得清淨念知前際劫一切世界故迴向為令一切眾生皆得無礙大智慧悉能決了一切法藏故迴向為令一切眾生皆得無限量大菩提周徧法界無所障礙故迴向為令一切眾生皆得平等無分別同體善根故迴向為令一切眾生皆得一切功德具足莊嚴清淨身語意業故迴向為令一切眾生皆得同於普賢行故迴向為令一切眾生皆得入一切同體清淨佛剎故迴向為令一切眾生悉觀察一切智皆趣入圓滿故迴向為令一切眾生皆得遠離不平等善根故迴向為令一切眾生皆得平等無異相深心次第圓滿一切智故迴向為令一切眾生皆得安住一切白法故迴向為令一切眾生皆於一念中證一切智得究竟故迴向為令一切眾生皆得成滿清淨一切智道故迴向大文第三二門迴向所為中初一門應為眾生後一門應為菩提今初有二十三句初之二句文雖在初義通二處第三成就眾生是為總句下皆是別始自信心終成種智其文並顯佛子菩薩摩訶薩以諸善根普為一切眾生如是迴向已復以此善根欲普圓滿演說一切清淨行法力故迴向欲成就清淨行威力得不可說不可說法海故迴向欲於一一法海具足無量等法界清淨智光明故迴向欲開示演說一切法差別句義故迴向欲成就無邊廣大一切法光明三昧故迴向欲隨順三世諸佛辯才故迴向欲成就去來現在一切佛自在身故迴向為尊重一切佛可愛樂無障礙法故迴向為滿足大悲心救護一切眾生常無退轉故迴向欲成就不思議差別法無障礙智心無垢染諸根清淨普入一切眾會道場故迴向欲於一切若覆若仰若麤若細若廣若狹小大染淨如是等諸佛國土常轉平等不退法輪故迴向欲於念念中得無所畏無有窮盡種種辯才妙法光明開示演說故迴向為樂求眾善發心修習諸根轉勝獲一切法大神通智盡能了知一切諸法故迴向欲於一切眾會道場親近供養為一切眾生演一切法咸令歡喜故迴向二應向菩提中明因果滿大用無盡亦顯可知佛子菩薩摩訶薩又以此善根如是迴向所謂以住法界無量住迴向以住法界無量身業迴向以住法界無量語業迴向以住法界無量意業迴向以住法界無量色平等迴向以住法界無量受想行識平等迴向以住法界無量蘊平等迴向以住法界無量界平等迴向以住法界無量處平等迴向以住法界無量內平等迴向以住法界無量外平等迴向以住法界無量發起平等迴向以住法界無量深心平等迴向以住法界無量方便平等迴向以住法界無量信解平等迴向以住法界無量諸根平等迴向以住法界無量初中後際平等迴向以住法界無量業報平等迴向以住法界無量染淨平等迴向以住法界無量眾生平等迴向以住法界無量佛剎平等迴向以住法界無量法平等迴向以住法界無量世間光明平等迴向以住法界無量諸佛菩薩平等迴向以住法界無量菩薩行願平等迴向以住法界無量菩薩出離平等迴向以住法界無量菩薩教化調伏平等迴向以住法界無量法界無二平等迴向以住法界無量如來眾會道場平等迴向第四迴向實際有二十九句皆言法界者理事無礙法界也皆云住者智契即事之理無所住故住即入義以安住故法界無二即是等義初云無量住者一切善根皆是所住今以無住之住便同法界無量他皆倣此上八門竟佛子菩薩摩訶薩如是迴向時安住法界無量平等清淨身安住法界無量平等清淨語安住法界無量平等清淨心安住法界無量平等諸菩薩清淨行願安住法界無量平等清淨眾會道場安住法界無量平等為一切菩薩廣說諸法清淨智安住法界無量平等能入盡法界一切世界身安住法界無量平等一切法光明清淨無畏能以一音盡斷一切眾生疑網隨其根欲皆令歡喜住於無上一切種智力無所畏自在神通廣大功德出離法中大文第三迴向成益文有十句皆言安住者由上智契故能得安也身等即差別事法今即平等清淨平等清淨即是法界無盡法界清淨即是所得智能安住全同法界由八安住成後二用一一音普斷物疑二上住佛德佛德雖多略舉其四謂十力四無畏十自在六神通名廣大德對上種智為佛二嚴是出離法佛子是為菩薩摩訶薩第十住等法界無量迴向三依釋結名上位行竟菩薩摩訶薩以法施等一切善根如是迴向時成滿普賢無量無邊菩薩行願悉能嚴淨盡虗空等法界一切佛剎令一切眾生亦得如是具足成就無邊智慧了一切法於念念中見一切佛出興於世於念念中見一切佛無量無邊自在力所謂廣大自在力無著自在力無礙自在力不思議自在力淨一切眾生自在力立一切世界自在力現不可說語言自在力隨時應現自在力住不退轉神通智自在力演說一切無邊法界俾無有餘自在力出生普賢菩薩無邊際眼自在力以無礙耳識聞持無量諸佛正法自在力一身結跏趺坐周徧十方無量法界於諸眾生無所迫隘自在力以圓滿智普入三世無量法自在力又得無量清淨所謂一切眾生清淨一切佛剎清淨一切法清淨一切處徧知智清淨徧虗空界無邊智清淨得一切差別言音智以種種言音普應眾生清淨放無量圓滿光普照一切無邊世界清淨出生一切三世菩薩行智清淨一念中普入三世一切諸佛眾會道場智清淨入無邊一切世間令一切眾生皆作所應作清淨如是等皆得具足皆得成就皆已修治皆得平等皆悉現前皆悉知見皆悉悟入皆已觀察皆得清淨到於彼岸大文第二位果分三初標得因次云成滿普賢下別列所得三種果滿一因果利益滿次於念念下見佛自在滿先標所謂廣大下別顯有七行經皆以體用理量俱無障礙是佛自在三又得無量清淨下有六行經清淨果滿由淨惑障見性淨故亦先標所謂下列次云如是等下二行經結能得之相平等者離能所知故上文通前正說分竟下六證成前五科在十迴向初爾時佛神力故十方各百萬佛剎微塵數世界六種震動所謂動徧動等徧動起徧起等徧起踊徧踊等徧踊震徧震等徧震吼徧吼等徧吼擊徧擊等徧擊佛神力故法如是故雨眾天華天鬘天末香天諸雜香天衣服天珍寶天莊嚴具天摩尼寶天沉水香天栴檀香天上妙蓋天種種幢天雜色旛阿僧祇諸天身無量百千億不可說天妙法音不可思議天讚佛音阿僧祇天歡喜音咸稱善哉無量阿僧祇百千那由他諸天恭敬禮拜無數天子常念諸佛希求如來無量功德心不捨離無數天子作眾妓樂歌詠讚歡供養如來百千阿僧祇諸天放大光明普照盡虗空徧法界一切佛剎現無量阿僧祇諸佛境界如來化身出過諸天大文第六從爾時佛神力下瑞應分於中二先動地生信次云佛神力故法如是故下興供表行於中三初二句興供因二雨眾天華下外事供次云阿僧祇諸天身下六行經內事三業如於此世界兜率陀天宮說如是法周徧十方一切世界兜率天宮悉亦如是大文第七如於此世界下結通十方以是通方之說準上諸會或結瑞應今此結說故別開章爾時復以佛神力故十方各過百萬佛剎微塵數世界外各有百萬佛剎微塵數諸菩薩而來集會周徧十方咸作是言善哉善哉佛子乃能說此諸大迴向佛子我等皆同一號名金剛幢悉從金剛光世界金剛幢佛所來詣此土彼諸世界悉以佛神力故而說是法眾會眷屬文辭句義皆亦如是不增不減我等皆承佛神力從彼土來為汝作證如我來此眾會為汝作證十方所有一切世界兜率天宮寶莊嚴殿諸菩薩眾來為作證亦復如是大文第八爾時復以佛神力下證成分云百萬者位過前故上長行竟爾時金剛幢菩薩承佛神力觀察十方一切眾會暨于法界已善知文義增廣大心大悲普覆一切眾生繫心安住三世佛種善入一切佛功德法成就諸佛自在之身觀諸眾生心之所樂及其所種一切善根悉分別知隨順法身為現清淨妙色之身即於是時而說頌言大文第九爾時金剛下偈讚勸修分於中二先敘意菩薩成就法智慧悟解無邊正法門為法光明調御師了知無礙真實法菩薩為法大導師開示甚深難得法引導十方無量眾悉令安住正法中菩薩已飲佛法海法雲普雨十方界法日出現於世間闡揚妙法利羣生常為難遇法施主了知入法巧方便法光清淨照其心於世說法恒無畏善修於法自在心悉能悟入諸法門成就甚深妙法海普為眾生擊法鼓宣說甚深希有法以法長養諸功德具足清淨法喜心示現世間佛法藏諸佛法王所灌頂成就法性智藏身悉能解了法實相安住一切眾善法菩薩修行第一施一切如來所讚喜所作皆蒙佛忍可以此成就人中尊菩薩成就妙法身親從諸佛法化生為利眾生作法燈演說無量最勝法隨所修行妙法施則亦觀察彼善根所作眾善為眾生悉以智慧而迴向所有成佛功德法悉以迴施諸羣生願令一切皆清淨到佛莊嚴之彼岸十方佛剎無有量悉具無量大莊嚴如是莊嚴不可思盡以莊嚴一國土如來所有清淨智願令眾生皆具足猶如普賢真佛子一切功德自莊嚴成就廣大神通力往詣世界悉周徧一切眾生無有餘皆使修行菩薩道諸佛如來所開悟十方無量諸眾生一切皆令如普賢具足修行最上行諸佛菩薩所成就種種差別諸功德如是功德無有邊願使眾生悉圓滿菩薩具足自在力所應學處皆往學示現一切大神通普詣十方無量土菩薩能於一念頃覲等眾生無數佛又復於一毛端中盡攝諸法皆明見世間眾生無有量菩薩悉能分別知諸佛無量等眾生大心供養咸令盡種種名香上妙華眾寶衣裳及旛蓋分布法界咸充滿發心普供十方佛一毛孔中悉明見不思議數無量佛一切毛孔皆如是普禮一切世間燈舉身次第恭敬禮如是無邊諸最勝亦以言辭普稱讚窮盡未來一切劫一如來所供養具其數無量等眾生如是供養一如來一切如來亦復然供養讚歎諸如來盡彼世間一切劫世間劫數可終盡菩薩供養無休懈一切世間種種劫於爾所劫修諸行恭敬供養一如來盡一切劫無厭足如無量劫供一佛供一切佛皆如是亦不分別是劫數於所供養生疲厭法界廣大無邊際菩薩觀察悉明了以大蓮華徧布中施等眾生無量佛寶華香色皆圓滿清淨莊嚴甚微妙一切世間無可喻持以供養人中尊眾生數等無量剎諸妙寶蓋滿其中悉以供養一如來供一切佛皆如是塗香無比最殊勝一切世間未曾有以此供養天人師窮盡眾生數等劫末香燒香上妙華眾寶衣服莊嚴具如是供養諸最勝歡喜奉事無厭足等眾生數照世燈念念成就大菩提亦以無邊偈稱述供養人中調御者如眾生數佛世尊皆修無上妙供養如眾生數無量劫如是讚歎無窮盡如是供養諸佛時以佛神力皆周徧悉見十方無量佛安住普賢菩薩行過去未來及現在所有一切諸善根令我常修普賢行速得安住普賢地一切如來所知見世間無量諸眾生悉願具足如普賢為聰慧者所稱讚此是十方諸大士共所修治迴向行諸佛如來為我說此迴向行最無上十方世界無有餘其中一切諸眾生莫不咸令得開覺悉使常如普賢行如其迴向行布施亦復堅持於禁戒精進長時無退怯忍辱柔和心不動禪定持心常一緣智慧了境同三昧去來現在皆通達世間無有得其邊菩薩身心及語業如是所作皆清淨一切修行無有餘悉與普賢菩薩等譬如法界無分別戲論染著皆永盡亦如涅槃無障礙心常如是離諸取智者所有迴向法諸佛如來已開示種種善根悉迴向是故能成菩薩道佛子善學此迴向無量行願悉成就攝取法界盡無餘是故能成善逝力若欲成就佛所說菩薩廣大殊勝行宜應善住此迴向是諸佛子號普賢正說偈中亦二先明第十迴向後歎勝勸修次七偈頌迴向行分三初隨所修行下二偈總頌前九段迴向二十方佛剎下一偈頌迴向嚴剎三如來所有下四偈頌迴向所為三菩薩具足下有二十偈頌位果分三初一偈頌見佛自在由己自在方見佛自在二菩薩能於一念下十七偈頌得清淨中一念中普入三世一切諸佛眾會道場智清淨上云入者必在供養故此廣顯此是力能不可頌前願成所為三過去未來下二偈總結第十迴向然上且依麤相而分菩薩縱任辨才體勢包攝大旨無異故不委論上別頌竟下第二結歎勸修通於十向於中九偈分二初此是十方下六偈舉人就行以歎勝謂是菩薩所行如來所說六度隨相等行法界離相等行故是超勝後智者所有下三偈結歎勸修一切眾生猶可數三世心量亦可知如是普賢諸佛子功德邊際無能測一毛度空可得邊眾剎為塵可知數如是大仙諸佛子所住行願無能量大文第十末後二偈較量功德德既無限宜可修行然此顯德深勝高遠者一圓融教故二約殊勝願力故登地已上寄位階差故每結云若以殊勝願力復過於此不可數知勿謂此深便言地劣上第五會竟
