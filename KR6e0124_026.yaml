body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈十回向品第二十五之四佛子菩薩摩訶薩以種種車衆寶嚴飾奉施諸佛及諸菩薩師長善友聲聞緣覺如是無量種種福田乃至貧窮孤露之者此諸人衆或從遠來或從近來或承菩薩名聞故來或是菩薩因緣故來或聞菩薩往昔所發施願故來或是菩薩心願請來菩薩是時或施寶車或施金車悉妙莊嚴鈴網覆上寶帶垂下或施上妙琉璃之車無量珍奇以為嚴飾或復施與白銀之車覆以金網駕以駿馬或復施與無量雜寶所莊嚴車覆以寶網駕以香象或復施與栴檀之車妙寶為輪雜寶為蓋寶師子座敷置嚴好百千綵女列坐其上十萬丈夫牽御而行或復施與玻璃寶車衆雜妙寶以為嚴飾端正女人充滿其中寶帳覆上幢幡侍側或復施與碼瑙藏車飾以衆寶熏諸雜香種種妙華散布莊嚴百千綵女持寶瓔珞駕馭均調涉險能安或復施與堅固香車衆寶為輪莊嚴巨麗寶帳覆上寶網垂下種種寶衣敷布其中清淨好香流芬外徹其香美妙稱悅人心無量諸天翼從而行載以衆寶隨時給施或復施與光明寶車種種諸寶妙色映徹衆妙寶網羅覆其上雜寶瓔珞周匝垂下散以末香內外芬潔所愛男女悉載其上佛子菩薩摩訶薩以如是等衆妙寶車奉施佛時以此善根如是回向所謂願一切衆生悉解供養最上福田深信施佛得無量報願一切衆生一心向佛常遇無量清淨福田願一切衆生於諸如來無所吝惜具足成就大捨之心願一切衆生於諸佛所修行施行離二乘願逮得如來無礙解脫一切智智願一切衆生於諸佛所行無盡施入佛無量功德智慧願一切衆生入佛勝智得成清淨無上智王願一切衆生得佛遍至無礙神通隨所欲往靡不自在願一切衆生深入大乘獲無量智安住不動願一切衆生皆能出生一切智法為諸天大最上福田願一切衆生於諸佛所無嫌恨心勤種善根樂求佛智願一切衆生任運能往一切佛剎一剎那中普周法界而無懈倦願一切衆生逮得菩薩自在神通分身遍滿等虗空界一切佛所親近供養願一切衆生得無比身遍往十方而無厭倦願一切衆生得廣大身飛行迅疾隨意所往終無懈退願一切衆生得佛究竟自在威力一剎那中盡虗空界悉現諸佛神通變化願一切衆生修安樂行隨順一切諸菩薩道願一切衆生得速疾行究竟十力智慧神通願一切衆生普入法界十方國土悉盡邊際等無差別願一切衆生行普賢行無有退轉到於彼岸成一切智願一切衆生升於無比智慧之乘隨順法性見如實理是為菩薩摩訶薩以衆寶車奉施現在一切諸佛及佛滅後所有塔廟善根回向為令衆生得於如來究竟出離無礙乘故佛子菩薩摩訶薩以衆寶車施菩薩等善知識時以諸善根如是回向所謂願一切衆生心常憶持善知識教專勤守護令不忘失願一切衆生與善知識同一義利普攝一切與共善根願一切衆生近善知識尊重供養悉捨所有順可其心願一切衆生得善志欲隨逐善友未嘗捨離願一切衆生常得值遇諸善知識專意承奉不違其教願一切衆生樂善知識常不捨離無間無雜亦無誤失願一切衆生能以其身施善知識隨其教命靡有違逆願一切衆生為善知識之所攝受修習六慈遠離諸惡願一切衆生隨善知識聽聞諸佛所説正法願一切衆生與善知識同一善根清淨業果與諸菩薩同一行願究竟十力願一切衆生悉能受持善知識法逮得一切三昧境界智慧神通願一切衆生悉能受持一切正法修習諸行到於彼岸願一切衆生乘於大乘無所障礙究竟成就一切智道願一切衆生悉得上於一切智乘至安隱處無有退轉願一切衆生知如實行隨其所聞一切佛法皆得究竟永無忘失願一切衆生普為諸佛之所攝受得無礙智究竟諸法願一切衆生得無退失自在神通所欲往詣一念皆到願一切衆生往來自在廣行化導令住大乘願一切衆生所行不空載以智乘到究竟位願一切衆生得無礙乘以無礙智至一切處是為菩薩摩訶薩施善知識種種車時善根回向為令衆生功德具足與佛菩薩等無異故佛子菩薩摩訶薩以衆寶車布施僧時起學一切施心智善了心淨功德心隨順捨心僧寶難遇心深信僧寶心攝持正教心住勝智樂得未曾有為大施會出生無量廣大功德深信佛教不可沮壞以諸善根如是回向所謂願一切衆生普入佛法憶持不忘願一切衆生離凡愚法入賢聖處願一切衆生速入聖位能以佛法次第開誘願一切衆生舉世宗重言必信用願一切衆生善入一切諸法平等了知法界自性無二願一切衆生從於如來智境而生諸調順人所共圍繞願一切衆生住離染法滅除一切煩惱塵垢願一切衆生皆得成就無上僧寶離凡夫地入賢聖衆願一切衆生勤修善法得無礙智具聖功德願一切衆生得智慧心不著三世於諸衆中自在如王願一切衆生乘智慧乘轉正法輪願一切衆生具足神通一念能往不可説不可説世界願一切衆生乘虗空身於諸世間智慧無礙願一切衆生普入一切虗空法界諸佛衆會成就第一波羅蜜行願一切衆生得輕舉身殊勝智慧悉能遍入一切佛剎願一切衆生獲無邊際善巧神足於一切剎普現其身願一切衆生得於一切無所依身以神通力如影普現願一切衆生得不思議自在神力隨應可化即現其前教化調伏願一切衆生得入法界無礙方便一念遍遊十方國土是為菩薩摩訶薩施僧寶車善根回向為令衆生普乘清淨無上智乘於一切世間轉無礙法智慧輪故佛子菩薩摩訶薩以衆寶車布施聲聞獨覺之時起如是心所謂福田心尊敬心功德海心能出生功德智慧心從如來功德勢力所生心百千億那由他劫修習心能於不可説劫修菩薩行心解脫一切魔繫縛心摧滅一切魔軍衆心慧光照了無上法心以此施車所有善根如是回向所謂願一切衆生為世所信第一福田具足無上檀波羅蜜願一切衆生離無益語常樂獨處心無二念願一切衆生成最第一清淨福田攝諸衆生令修福業願一切衆生成智慧淵能與衆生無量無數善根果報願一切衆生住無礙行滿足清淨第一福田願一切衆生住無諍法了一切法皆無所作無性為性願一切衆生常得親近最上福田具足修成無量福德願一切衆生能現無量自在神通以淨福田攝諸含識願一切衆生具足無盡功德福田能與衆生如來十力第一乘果願一切衆生為能辨果真實福田成一切智無盡福聚願一切衆生得滅罪法悉能受持所未曾聞佛法句義願一切衆生常勤聽受一切佛法聞悉解悟無空過者願一切衆生聽聞佛法通達究竟如其所聞隨順演説願一切衆生於如來教信解修行捨離一切九十六種外道邪見願一切衆生常見賢聖增長一切最勝善根願一切衆生心常信樂智行之士與諸聖哲同止共歡願一切衆生聽聞佛名悉不唐捐隨其所聞咸得目見願一切衆生善分別知諸佛正教悉能守護持佛法者願一切衆生常樂聽聞一切佛法受持讀誦開示照了願一切衆生信解佛教如實功德悉捨所有恭敬供養是為菩薩摩訶薩施聲聞獨覺種種車時善根回向為令衆生皆得成就清淨第一智慧神通精進修行無有懈怠獲一切智力無畏故佛子菩薩摩訶薩以衆寶車施諸福田乃至貧窮孤獨者時隨其所求一切悉捨心生歡喜無有厭倦仍向彼人自悔責言我應往就供養供給不應勞汝遠來疲頓言已拜跪問訊起居凡有所須一切施與或時施彼摩尼寶車以閻浮提第一女寶充滿其上或復施與金莊嚴車人間女寶充滿其上或復施與妙琉璃車內宮妓女充滿其上或施種種奇妙寶車童女充滿如天婇女或施無數寶莊嚴車寶女滿中柔明辨慧或施所乘妙栴檀車或復施與玻璃寶車悉載寶女充滿其上顏容端正色相無比袨服莊嚴見者欣悅或復施與碼瑙寶車灌頂王子身載其上或時施與堅固香車所有男女悉載其中或施一切寶莊嚴車載以難捨親善眷屬佛子菩薩摩訶薩以如是等無量寶車隨其所求恭敬施與皆令遂願歡喜滿足以此善根如是回向所謂願一切衆生乘不退轉無障礙輪廣大之乘詣不可思議菩提樹下願一切衆生乘清淨因大法智乘盡未來劫修菩薩行永不退轉願一切衆生乘一切法無所有乘永離一切分別執著而常修習一切智道願一切衆生乘無諂誑正直之乘往諸佛剎自在無礙願一切衆生隨順安住一切智乘以諸佛法共相娛樂願一切衆生皆乘菩薩清淨行乘具足菩薩十出離道及三昧樂願一切衆生乘四輪乘所謂住好國土依止善人集勝福德發大誓願以此成滿一切菩薩清淨梵行願一切衆生得普照十方法光明乘修學一切如來智力願一切衆生乘佛法乘到一切法究竟彼岸願一切衆生載衆福善難思法乘普示十方安隱正道願一切衆生乘大施乘捨慳吝垢願一切衆生乘淨戒乘持等法界無邊淨戒願一切衆生乘忍辱乘常於衆生離瞋濁心願一切衆生乘大精進不退轉乘堅修勝行趣菩提道願一切衆生乘禪定乘速至道場證菩提智願一切衆生乘於智慧巧方便乘化身充滿一切法界諸佛境界願一切衆生乘法王乘成就無畏恆普惠施一切智法願一切衆生乘無所著智慧之乘悉能遍入一切十方於真法性而無所動願一切衆生乘於一切諸佛法乘示現受生遍十方剎而不失壞大乘之道願一切衆生乘一切智最上寶乘滿足普賢菩薩行願而無厭倦是為菩薩摩訶薩以衆寶車施諸福田乃至貧窮孤露之人善根回向為令衆生具無量智歡喜踊躍究竟皆得一切智乘故第十六施車因緣故來者往昔有緣應受施故瑜伽云若有衆生來求種種能引戲樂能引無義所施之物不應施與今言施以端正女人美色豈不相違今云種種福田豈皆施與此中有二十願初十約所施福田立願後十約所施車立願可知結文中言及佛滅後所有塔廟塔安舍利廟置佛像塔者正云窣堵波此云高顯亦云歸宗之所此施車一行辨隨田別顯有五上第一施佛二施菩薩三施僧四施二乘五施諸福田五中皆有二十願前三中一約田有十願次約車有十願三施二乘中緣覺有十願聲聞有十願後諸福田中亦有二十願以諸田中有悲境故言拜跪等以劣田故亦有二十願者施田非一故但就車發相似願佛子菩薩摩訶薩布施象寶其性調順七支具足年齒盛壯六牙清淨口色紅赤猶如蓮華形體鮮白譬如雪山金幢為飾寶網羅覆種種妙寶莊嚴其鼻見者欣玩無有厭足超步萬里曾不疲倦或復施與調良馬寶諸相具足猶如天馬妙寶月輪以為光飾真金鈴網羅覆其上行步平正乘者安隱隨意所往迅疾如風遊歷四洲自在無礙菩薩以此象寶馬寶或奉養父母及善知識或給施貧乏苦惱衆生其心曠然不生悔吝但倍增欣慶益加悲愍修菩薩德淨菩薩心以此善根如是回向所謂願一切衆生住調順乘增長一切菩薩功德願一切衆生得善巧乘能隨出生一切佛法願一切衆生得信解乘普照如來無礙智力願一切衆生得發趣乘能普發興一切大願願一切衆生具足平等波羅蜜乘成滿一切平等善根願一切衆生成就寶乘生諸佛法無上智寶願一切衆生成就菩薩行莊嚴乘開敷菩薩諸三昧華願一切衆生得無邊速疾乘於無數劫淨菩薩心精勤思惟了達諸法願一切衆生成就最勝調順大乘以善方便具菩薩地願一切衆生成最高廣堅固大乘普能運載一切衆生皆得至於一切智位是為菩薩摩訶薩施象馬時善根回向為令衆生皆得乘於無礙智乘圓滿究竟至佛乘故第十七施象馬二事相合有十願一如性調順二如隨意所往三似彼盛壯四如超步萬里五猶行步平正六如彼象寶七似彼如華八即迅疾如風九具菩薩地名最勝調象馬各有調義故分二義佛子菩薩摩訶薩布施座時或施所處師子之座其座高廣殊特妙好琉璃為足金縷所成柔軟衣服以敷其上建以寶幢熏諸妙香無量雜寶莊嚴之具以為莊校金網覆上寶鐸風搖出妙音聲奇珍萬計周匝填飾一切臣民所共瞻仰灌頂大王獨居其上宣布法化萬遵奉其王復以妙寶嚴身所謂普光明寶帝青寶大帝青寶勝藏摩尼寶明淨如日清涼猶月周匝繁布譬如衆星上妙莊嚴第一無比海殊妙寶海堅固幢寶奇文異表種種莊嚴於大衆中最尊最勝閻浮檀金離垢寶繒以冠其首享灌頂位王閻浮提具足無量大威德力以慈為主伏諸怨敵教令所行靡不承順時轉輪王以如是等百千萬億無量無數寶莊嚴座施於如來第一福田及諸菩薩真善知識賢聖僧寶説法之師父母宗親聲聞獨覺及以發趣菩薩乘者或如來塔乃至一切貧窮孤露隨其所須悉皆施與以此善根如是回向所謂願一切衆生坐菩提座悉能覺悟諸佛正法願一切衆生處自在座得法自在諸金剛山所不能壞悉能摧伏一切魔軍願一切衆生得佛自在師子之座一切衆生之所瞻仰願一切衆生得不可説不可説種種殊妙寶莊嚴座於法自在化導衆生願一切衆生得三種世間最殊勝座廣大善根之所嚴飾願一切衆生得周遍不可説不可説世界座阿僧祇劫歎之無盡願一切衆生得大深密福德之座其身充滿一切法界願一切衆生得不思議種種寶座隨其本願所念衆生廣開法施願一切衆生得善妙座現不可説諸佛神通願一切衆生得一切寶座一切香座一切華座一切衣座一切鬘座一切摩尼座一切琉璃等不思議種種寶座無量不可説世界座一切世間莊嚴清淨座一切金剛座示現如來威德自在成最正覺是為菩薩摩訶薩施寶座時善根回向為令衆生獲離世間大菩提座自然覺悟一切佛法故第十八施座三種世間義如常釋又辨法師云地前為願樂世間初地至七地名功用世間八至等覺名無功用世間有云西域傳衆生界中有三世間一地下世間龍修羅等二人中世間三天上世間若依智論三世間者即衆生五蘊及器為三佛子菩薩摩訶薩施諸寶蓋此蓋殊特尊貴所用種種大寶而為莊嚴百千億那由他上妙蓋中最為第一衆寶為竿妙網覆上寶繩金鈴周匝垂下摩尼瓔珞次第懸布微風吹動妙音克諧珠玉寶藏種種充滿無量奇珍悉以嚴飾栴檀沉水妙香普熏閻浮檀金光明清淨如是無量百千億那由他阿僧祇衆妙寶物具足莊嚴以清淨心奉施於佛及佛滅後所有塔廟或為法故施諸菩薩及善知識名聞法師或施父母或施僧寶或復奉施一切佛法或施種種衆生福田或施師僧及諸尊宿或施初發菩提之心乃至一切貧窮孤露隨有求者悉皆施與以此善根如是回向所謂願一切衆生勤修善根以覆其身常為諸佛之所庇廕願一切衆生功德智慧以為其蓋永離世間一切煩惱願一切衆生覆以善法除滅世界塵垢熱惱願一切衆生得智慧藏令衆樂見心無厭足願一切衆生以寂靜白法而自覆蔭皆得究竟不壞佛法願一切衆生善覆其身究竟如來清淨法身願一切衆生作周遍蓋十力智慧遍覆世間願一切衆生得妙智慧出過三世無所染著願一切衆生得應供蓋成勝福田受一切供願一切衆生得最上蓋獲無上智自然覺悟是為菩薩摩訶薩布施蓋時善根回向為令一切衆生得自在蓋能持一切諸善法故為令一切衆生能以一蓋普覆一切虗空法界一切剎土示現諸佛自在神通無退轉故為令一切衆生能以一蓋莊嚴十方一切世界供養佛故為令一切衆生以妙幢幡及諸寶蓋供養一切諸如來故為令一切衆生得普莊嚴蓋遍覆一切諸佛國土盡無餘故為令一切衆生得廣大蓋普蓋衆生皆令於佛生信解故為令一切衆生以不可説衆妙寶蓋供養一佛於不可説一一佛所皆如是故為令一切衆生得佛菩提高廣之蓋普覆一切諸如來故為令一切衆生得一切摩尼寶莊嚴蓋一切寶瓔珞莊嚴蓋一切堅固香莊嚴蓋種種寶清淨莊嚴蓋無量寶清淨莊嚴蓋廣大寶清淨莊嚴蓋寶網彌覆寶鈴垂下隨風搖動出微妙音普覆法界虗空界一切世界諸佛身故為令一切衆生得無障無礙智莊嚴蓋普覆一切諸如來故又欲令一切衆生得第一智慧故又欲令一切衆生得佛功德莊嚴故又欲令一切衆生於佛功德生清淨欲願心故又欲令一切衆生得無量無邊自在心寶故又欲令一切衆生滿足諸法自在智故又欲令一切衆生以諸善根普覆一切故又欲令一切衆生成就最勝智慧蓋故又欲令一切衆生成就十力普遍蓋故又欲令一切衆生能以一蓋彌覆法界諸佛剎故又欲令一切衆生於法自在為法王故又欲令一切衆生得大威德自在心故又欲令一切衆生得廣大智恆無絶故又欲令一切衆生得無量功德普覆一切皆究竟故又欲令一切衆生以諸功德蓋其心故又欲令一切衆生以平等心覆衆生故又欲令一切衆生得大智慧平等蓋故又欲令一切衆生具大回向巧方便故又欲令一切衆生獲勝欲樂清淨心故又欲令一切衆生得善欲樂清淨意故又欲令一切衆生得大回向普覆一切諸衆生故第十九施蓋編草為蓋七寶蓋隨況衆寶嚴功報何極佛子菩薩摩訶薩或施種種上妙幢幡衆寶為竿寶繒為幡種種雜綵以為其幢寶網垂覆光色遍滿寶鐸微搖音節相和奇特妙寶形如半月閻浮檀金光踰曒日悉置幢上隨諸世界業果所現種種妙物以為嚴飾如是無數千萬億那由他諸妙幢幡接影連輝遞相間發光明嚴潔周遍大地充滿十方虗空法界一切佛剎菩薩摩訶薩淨心信解以如是等無量幢幡或施現在一切諸佛及佛滅後所有塔廟或施法寶或施僧寶或施菩薩諸善知識或施聲聞及辟支佛或施大衆或施別人諸來求者普皆施與以此善根如是回向所謂願一切衆生皆能建立一切善根福德幢幡不可毀壞願一切衆生建一切法自在幢幡尊重愛樂勤加守護願一切衆生常以寶繒書寫正法護持諸佛菩薩法藏願一切衆生建高顯幢然智慧燈普照世間願一切衆生立堅固幢悉能摧殄一切魔業願一切衆生建智力幢一切諸魔所不能壞願一切衆生得大智慧那羅延幢摧滅一切世間慢幢願一切衆生得智慧日大光明幢以智日光普照法界願一切衆生具足無量寶莊嚴幢充滿十方一切世界供養諸佛願一切衆生得如來幢摧滅一切九十六種外道邪見是為菩薩摩訶薩施幢幡時善根回向為令一切衆生得甚深高廣菩薩行幢及諸菩薩神通行幢清淨道故第二十施幢幡二事合一願佛子菩薩摩訶薩開衆寶藏以百千億那由他諸妙珍寶給施無數一切衆生隨意與之心無吝惜以諸善根如是回向所謂願一切衆生常見佛寶捨離愚癡修行正念願一切衆生皆得具足法寶光明護持一切諸佛法藏願一切衆生能悉攝受一切僧寶周給供養恆無厭足願一切衆生得一切智無上心寶淨菩提心無有退轉願一切衆生得智慧寶普入諸法心無疑惑願一切衆生具足菩薩諸功德寶開示演説無量智慧願一切衆生得於無量妙功德寶修成正覺十力智慧願一切衆生得妙三昧十六智寶究竟成滿廣大智慧願一切衆生成就第一福田之寶悟入如來無上智慧願一切衆生得成第一無上寶王以無盡辨開演諸法是為菩薩摩訶薩施衆寶時善根回向為令一切衆生皆得成滿第一智寶如來無礙淨眼寶故第二十一開藏寶言十六智寶者有云佛地四智智各有四故為十六以果位自在正融通故今依賢首即是八忍八智佛子菩薩摩訶薩或以種種妙莊嚴具而為布施所謂一切身莊嚴具令身淨妙靡不稱可菩薩摩訶薩等觀一切世間衆生猶如一子欲令皆得身淨莊嚴成就世間最上安樂佛智慧樂安住佛法利益衆生以如是等百千億那由他種種殊妙寶莊嚴具勤行布施行布施時以諸善根如是回向所謂願一切衆生成就無上妙莊嚴具以諸清淨功德智慧莊嚴人天願一切衆生得清淨莊嚴相以淨福德莊嚴其身願一切衆生得上妙莊嚴相以百福相莊嚴其身願一切衆生得不雜亂莊嚴相以一切相莊嚴其身願一切衆生得善淨語言莊嚴相具足種種無盡辨才願一切衆生得一切功德聲莊嚴相其音清淨聞者喜悅願一切衆生得可愛樂諸佛語言莊嚴相令諸衆生聞法歡喜修清淨行願一切衆生得心莊嚴相入深禪定普見諸佛願一切衆生得總持莊嚴相照明一切諸佛正法願一切衆生得智慧莊嚴相以佛智慧莊嚴其心是為菩薩摩訶薩惠施一切莊嚴具時善根回向為令衆生具足一切無量佛法功德智慧圓滿莊嚴永離一切憍慢放逸故第二十二施莊嚴具十願中初一利他後九自利佛子菩薩摩訶薩以受灌頂自在王位摩尼寶冠及髻中珠普施衆生心無吝惜常勤修習為大施主修學施慧增長捨根智慧善巧其心廣大給施一切以彼善根如是回向所謂願一切衆生得諸佛法之所灌頂成一切智願一切衆生具足頂髻得第一智到於彼岸願一切衆生以妙智寶普攝衆生皆令究竟功德之頂願一切衆生皆得成就智慧寶頂堪受世間之所禮敬願一切衆生以智慧冠莊嚴其首為一切法自在之王願一切衆生智慧明珠繫其頂上一切世間無能見者願一切衆生皆悉堪受世間頂禮成就慧頂照明佛法願一切衆生首冠十力莊嚴之冠智慧寶海清淨具足願一切衆生至大地頂得一切智究竟十力破欲界頂諸魔眷屬願諸衆生得成第一無上頂王獲一切智光明之頂無能映奪是為菩薩摩訶薩施寶冠時善根回向為令衆生得第一智最清淨處智慧摩尼妙寶冠故第二十三施寶冠及髻珠二事合一言智慧明珠等者體圓德備鑒徹惑亡為智明珠極果所宗故名頂上是祕是妙無能見者亦以權隱實名在髻中開權顯實故名解髻文無解義因便故來佛子菩薩摩訶薩見有衆生處在牢獄黑暗之處杻械枷鎖檢繫其身起坐不安衆苦競集無有親識無歸無救裸露飢羸酸劇難忍菩薩見已捨其所有一切財寶妻子眷屬及以自身於牢獄中救彼衆生如大悲菩薩妙眼王菩薩既救度已隨其所須普皆給施除其苦患令得安隱然後施以無上法寶令捨放逸安住善根於佛教中心無退轉佛子菩薩摩訶薩於牢獄中救衆生時以諸善根如是回向所謂願一切衆生究竟解脫貪愛纏縛願一切衆生斷生死流升智慧岸願一切衆生除滅癡愚生長智慧解脫一切煩惱纏縛一願切衆生滅三界縛得一切智究竟出離願一切衆生永斷一切煩惱結縛到無煩惱無障礙地智慧彼岸願一切衆生離諸動念思惟分別入於平等不動智地願一切衆生脫諸欲縛永離世間一切貪欲於三界中無所染著願一切衆生得勝志樂常蒙諸佛為説法門願一切衆生得無著無縛解脫心廣大如法界究竟如虗空願一切衆生得菩薩神通一切世界調伏衆生令離世間住於大乘是為菩薩摩訶薩救度牢獄苦衆生時善根回向為令衆生普入如來智慧地故第二十四施妻子救獄囚上來皆明外施此下二段明無畏施初一兼於內外之財內財為難故佛子菩薩摩訶薩見有獄囚五處被縛受諸苦毒防衛驅逼將之死地欲斷其命捨閻浮提一切樂具親戚朋友悉將永訣置高砧上以刀屠割或用木槍竪貫其體衣纏油沃以火焚燒如是等苦種種逼迫菩薩見已自捨其身而代受之如阿逸多菩薩殊勝行王菩薩及餘無量諸大菩薩為衆生故自捨身命受諸苦毒菩薩爾時語主者言我願捨身以代彼命如此等苦可以與我如治彼人隨意皆作設過彼苦阿僧祇倍我亦當受令其解脫我若見彼將被殺害不捨身命救贖其苦則不名為住菩薩心何以故我為救護一切衆生發一切智菩提心故佛子菩薩摩訶薩自捨身命救衆生時以諸善根如是回向所謂願一切衆生得無斷盡究竟身命永離一切災橫逼惱願一切衆生依諸佛住受一切智具足十力菩提記莂願一切衆生普救含識令無怖畏永出惡道願一切衆生得一切命入於不死智慧境界願一切衆生永離怨敵無諸厄難常為諸佛善友所攝願一切衆生捨離一切刀劒兵仗諸惡苦具修行種種清淨善業願一切衆生離諸怖畏菩提樹下摧伏魔軍願一切衆生離大衆怖於無上法心淨無畏能為最上大師子吼願一切衆生得無障礙師子智慧於諸世間修行正業願一切衆生到無畏處常念救護諸苦衆生是為菩薩摩訶薩自捨身命救彼臨刑諸獄囚時善根回向為令衆生離生死苦得於如來上妙樂故第二十五捨身代死此一向內財
