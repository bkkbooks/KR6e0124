body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈初標部類品會此經按西域記說有三部上部有十三千大千世界微塵數偈一四天下微塵數品中部有四十九萬八千八百偈一千二百品下本有十萬偈四十八品龍樹菩薩入龍宮見上中二部非凡夫心力能持遂記下本流通人間今傳來此方者八十卷三十九品以經來未盡故所行者為略本耳然此經乃我盧舍那佛初成正覺於菩提場稱性所演一時頓說周遍法界故部類之多寡第隨見聞有異今說此經之處有七其會有九其品有三十九所詮之義統四法界攝五周六位因果清涼疏以信解行證四分科釋全經七處九會三十九品者初會菩提場普賢菩薩說毗盧遮那如來依正因果法門自第一卷至十一卷共六品經六品者世主妙嚴品如來現相品普賢三昧品世界成就品華藏世界品毗盧遮那品二會普光明殿文殊師利菩薩說十信等法門自十二卷至十五卷共六品經六品者如來名號品四聖諦品光明覺品菩薩問明品淨行品賢首品三會忉利天宮法慧菩薩說十住等法門自十六卷至十八卷共六品經六品者升須彌山頂品須彌山頂偈讚品十住品梵行品初發心功德品明法品四會夜摩天宮功德林菩薩說十行等法門自十九卷至二十一卷共四品經四品者升夜摩天宮品夜摩天宮偈讚品十行品十無盡藏品五會兜率天宮金剛幢菩薩說十回向等法門自二十二卷至三十三卷共三品經三品者升兜率天宮品兜率天宮偈讚品十回向品六會他化自在天宮金剛藏菩薩說十地法門自三十四卷至三十九卷共一品經一品者即十地品七重會普光明殿毗盧遮那如來說阿僧祇數量法門及如來隨好光明功德及普賢等諸菩薩說十大三昧等等覺法門從四十卷至五十二卷共十一品經十一品者普賢說十定品十通品十忍品佛說阿僧祇品心王菩薩說如來壽量品諸菩薩住處品上明差別因青蓮華藏菩薩說佛不思議法品普賢說十身相海品佛說如來隨好光明功德品上明差別果普賢菩薩說普賢行品明平等因說如來出現品明平等果上自二會來至此一遍明六位因果八三會普光明殿普賢菩薩說離世間法門自五十三卷至五十九卷共一品經一品者即離世間品此二遍明六位因果九會逝多林有本末二會初毗盧遮那如來放光現相答諸菩薩念請為本會次文殊師利菩薩從善住樓閣出往人間開悟六千比丘及指善財參五十三善知識為末會通為入法界品自六十卷至八十卷共一品經一品者即入法界品此三遍明六位因果八十卷經通分五周四分者一所信因果周者即舉果勸樂生信分謂第一會菩提場說毗盧遮那依正果報法門自世主妙嚴品至毗盧遮那品六品經蓋舉揚如來依正二報難思之果勸勵大心衆生令生樂欲以起淨信前五品顯舍那依正果德後一品明佛本因故名所信因果周亦名舉果勸樂生信分二差別因果周者亦名修因契果生解分自第二會普光明殿起說十信十住十行十回向十地及重會普光明殿說十定至諸菩薩住處品共二十六品經明差別因圓後佛不思議法品如來十身相海品如來隨好光明功德品共三品經明差別果滿其十定以下六品明等覺後三品明妙覺三平等因果周者即於前會說普賢行品如來出現品二品經明平等因果前普賢行明因該果海次如來出現明果徹因源因果不二故名平等連上差別二周通名修因契果生解分四成行因果周者亦名託法進修成行分謂八會三會普光明殿說離世間法即成行因果周以普慧雲興二百問普賢瓶瀉二千酬通明六位因果自五十三卷至五十九卷共一品經初通明五位之因後明八相之果五位因者即住行向地等覺八相果者即降兜率托胎降生出家降魔成道說法入涅槃此託圓融法界進修成行位位交羅一位具足一切位故沒其位名但明圓融之行故名託法進修五證入因果周者亦名依人證入成德分謂第九會逝多林說入法界法門以諸菩薩念請有三十問具問如來果海中事以果海離言故如來但現相以答復放光攝受光中具見所問之事令其現證是為本會次文殊師利從善住樓閣出漸往人間大塔廟前令六千比丘頓證次指善財童子南詢參五十三知識通名末會及善財末後見普賢菩薩入普賢一毛孔中頓圓曠劫之果故前三十八品但該羅六位因果令生信發解依之起行造修至此方為證入故云依人證入成德分若無實證則前解行俱為虗設故以證終然上一部八十卷經分為三十九品以此多品攝入五周四分此但分章以斷釋經文其文所詮之義有四法界古德釋經以六相十重玄門以收全部之義四法界者一理法界二事法界三理事無礙法界四事事無礙法界六相者謂總別同異成壞由此六相同時方成十重玄門以顯事事無礙十玄門者一同時具足相應門如海一滴具百川味二廣狹自在無礙門一尺之鏡現千重影三一多相容不同門一室千燈光光涉入四諸法相即自在門如金與色二不相離五祕密隱顯俱成門片月澄空晦明相映六微細相容安立門如琉璃瓶盛多芥子七因陀羅網境界門十鏡互照影現重重八託事顯法生解門立像豎臂觸目皆道九十世隔法異成門一夕之夢翱翔百年十主伴圓融具德門北辰所居衆星皆拱由此六相十玄同時具足故成事事無礙法界故經中凡舉一事一行一法必該此六相十玄之義以彰圓融法界然此廣大無邊理趣統以法界觀門收之攝歸一心念念具足方順此宗逈超諸教故此圓融妙行日劫相倍具如法界觀門右上所列乃全經大旨凡誦此經者必先了其章段精熟理觀則臨文念念證入無邊法界由經文浩瀚攝義無邊故釋經者以五周四分科斷使義有所歸觀者臨文自然契會此科文之大綱也若其理趣就于各品自有指歸次釋題目題稱大方廣佛華嚴經者乃依人法喻因果以立名也大方廣三字是法乃舉法界全體具體相用三大義故佛乃能證之人法界三大乃所證之法華喻稱法界性所修之因嚴乃莊嚴法身以成報身之果言三大者大謂體大舉法界當體豎窮三際橫遍十方廣博包含大而無外以極法界量強名曰大故曰曠兼無際也方者相也猶法也以法界之體本來無相今全體變成十法界事相一切衆生有此法性軌持而能生解故曰以正法自持謂十法界有相之法無一不具故相亦大也廣者用大謂法界之體有大力用以能變起十法界用故曰稱體而周若諸衆生有能悟此體者即有轉凡成聖之用故用亦大也以此三大總一法界真源覺此本源故名為佛故曰覺斯玄妙佛者覺也以法界體亦名清淨法身必假萬行莊嚴乃成報身故稱法界性以此修因故華喻萬行功德言華必有果嚴謂莊嚴以萬行之因華莊嚴法身之果體是為報佛故嚴謂飾法成人今說此經者即報佛也第一會菩提場普賢菩薩為會主說舉果法有六品經四分科經即舉果勸樂生信分世主妙嚴品第一之一此明舉果勸樂有六品經者科分十分一教起因緣即初一品二大衆同請分三面光集衆分四毫光示法分五眉間出衆分已上在第二品六普賢三昧分七諸佛同加分八法主起定分九大衆重請分已上在第三品十正陳法海分在後三品內言世主妙嚴者世謂三世間智正覺世間器世間衆生世間主者佛為智正覺世間主菩薩欲色諸天為器世間主諸神雜類為衆生世間主嚴者毗盧遮那初成正覺正報果體有佛剎微塵數相好乃嚴自今處菩提場海會衆中則為二種世間嚴而菩薩海會諸天神王以為眷屬以嚴主佛為眷屬嚴其地金剛寶樹等為依報處嚴三種世間依正二報更互相嚴故為妙嚴如是我聞一時佛在摩竭提國阿蘭若法菩提場中始成正覺其地堅固金剛所成上妙寶輪及衆寶華清淨摩尼以為嚴飾諸色相海無邊顯現摩尼為幢常放光明恆出妙音衆寶羅網妙香華纓周匝垂布摩尼寶王變現自在雨無盡寶及衆妙華分散於地寶樹行列枝葉光茂佛神力故令此道場一切莊嚴於中影現其菩提樹高顯殊特金剛為身琉璃為幹衆雜妙寶以為枝條寶葉扶疏垂蔭如雲寶華雜色分枝布影復以摩尼而為其果含暉發𦦨與華間列其樹周圓咸放光明於光明中雨摩尼寶摩尼寶內有諸菩薩其衆如雲俱時出現又以如來威神力故其菩提樹恆出妙音說種種法無有盡極如來所處宮殿樓閣廣博嚴麗充遍十方衆色摩尼之所集成種種寶華以為莊校諸莊嚴具流光如雲從宮殿間萃影成幢無邊菩薩道場衆會咸集其所以能出現諸佛光明不思議音摩尼寶王而為其網如來自在神通之力所有境界皆從中出一切衆生居處屋宅皆於此中現其影像又以諸佛神力所加一念之間悉包法界其師子座高廣妙好摩尼為臺蓮華為網清淨妙寶以為其輪衆色雜華而作瓔珞堂榭樓閣階砌戶牖凡諸物像備體莊嚴寶樹枝果周回間列摩尼光雲互相照耀十方諸佛化現珠王一切菩薩髻中妙寶悉放光明而來瑩燭復以諸佛威神所持演說如來廣大境界妙音遐暢無處不及爾時世尊處于此座於一切法成最正覺智入三世悉皆平等其身充滿一切世間其音普順十方國土譬如虗空具含衆像於諸境界無所分別又如虗空普遍一切於諸國土平等隨入身恆遍坐一切道場菩薩衆中威光赫奕如日輪出照明世界三世所行衆福大海悉已清淨而恆示生諸佛國土無邊色相圓滿光明遍周法界等無差別演一切法如布大雲一一毛端悉能容受一切世界而無障礙各現無量神通之力教化調伏一切衆生身遍十方而無來往智入諸相了法空寂三世諸佛所有神變於光明中靡不咸覩一切佛土不思議劫所有莊嚴悉令顯現有十佛世界微塵數菩薩摩訶薩所共圍繞其名曰普賢菩薩摩訶薩普德最勝燈光照菩薩摩訶薩普光師子幢菩薩摩訶薩普寶𦦨妙光菩薩摩訶薩普音功德海幢菩薩摩訶薩普智光照如來境菩薩摩訶薩普寶髻華幢菩薩摩訶薩普覺悅意聲菩薩摩訶薩普清淨無盡福光菩薩摩訶薩普光明相菩薩摩訶薩海月光大明菩薩摩訶薩雲音海光無垢藏菩薩摩訶薩功德寶髻智生菩薩摩訶薩功德自在王大光菩薩摩訶薩善勇猛蓮華髻菩薩摩訶薩普智雲日幢菩薩摩訶薩大精進金剛齊菩薩摩訶薩香𦦨光幢菩薩摩訶薩大明德深美音菩薩摩訶薩大福光智生菩薩摩訶薩如是等而為上首有十佛世界微塵數此諸菩薩往昔皆與毗盧遮那如來共集善根修菩薩行皆從如來善根海生諸波羅蜜悉已圓滿慧眼明徹等觀三世於諸三昧具足清淨辨才如海廣大無盡具佛功德尊嚴可敬知衆生根如應化伏入法界藏智無差別證佛解脫甚深廣大能隨方便入於一地而以一切願海所持恆與智俱盡未來際了達諸佛希有廣大祕密之境善知一切佛平等法已踐如來普光明地入於無量三昧海門於一切處皆隨現身世法所行悉同其事總持廣大集衆法海辨才善巧轉不退輪一切如來功德大海咸入其身一切諸佛所在國土皆隨願往已曾供養一切諸佛無邊際劫歡喜無倦一切如來得菩提處常在其中親近不捨恆以所得普賢願海令一切衆生智身具足成就如是無量功德復有佛世界微塵數執金剛神所謂妙色那羅延執金剛神日輪速疾幢執金剛神須彌華光執金剛神清淨雲音執金剛神諸根美妙執金剛神可愛樂光明執金剛神大樹雷音執金剛神師子王光明執金剛神密𦦨勝目執金剛神蓮華光摩尼髻執金剛神如是等而為上首有佛世界微塵數皆於往昔無量劫中恆發大願願常