body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈世主妙嚴品第一之二衆海歎德為別序上衆海雲集此下別序發起此經之由致故諸天神王各各歎具佛一解脫前則十人共具一德為總此下各各別具一解脫者以明別義總別圓融共成一毗盧果體亦顯妙嚴果德故通一品其列衆始菩薩終妙𦦨海天王及今歎德乃從末後妙𦦨海起終至菩薩以表總別始終共圓成一果體故其諸天神王各説偈讚亦隨所證法門經義自明從妙𦦨海起至月天子爾時如來道場衆海悉已雲集無邊品類周匝遍滿形色部從各各差別隨所來方親近世尊一心瞻仰此諸衆會已離一切煩惱心垢及其餘習摧重障山見佛無礙如是皆以毗盧遮那如來往昔之時於劫海中修菩薩行以四攝事而曾攝受一一佛所種善根時皆已善攝種種方便教化成熟令其安立一切智道種無量善獲衆大福悉已入於方便願海所行之行具足清淨於出離道已能善出常見於佛分明照了以勝解力入於如來功德大海得於諸佛解脫之門遊戲神通所謂妙𦦨海大自在天王得法界虗空界寂靜方便力解脫門自在名稱光天王得普觀一切法悉自在解脫門清淨功德眼天王得知一切法不生不滅不來不去無功用行解脫門可愛樂大慧天王得現見一切法真實相智慧海解脫門不動光自在天王得與衆生無邊安樂大方便定解脫門妙莊嚴眼天王得令觀寂靜法滅諸癡暗怖解脫門善思惟光明天王得善入無邊境界不起一切諸有思惟業解脫門可愛樂大智天王得普往十方説法而不動無所依解脫門普音莊嚴幢天王得入佛寂靜境界普現光明解脫門名稱光善精進天王得住自所悟處而以無邊廣大境界為所緣解脫門爾時妙𦦨海天王承佛威力普觀一切自在天衆而説頌言佛身普遍諸大會充滿法界無窮盡寂滅無性不可取為救世間而出現如來法王出世間能然照世妙法燈境界無邊亦無盡此自在名之所證佛不思議離分別了相十方無所有為世廣開清淨道如是淨眼能觀見如來智慧無邊際一切世間莫能測永滅衆生癡暗心大慧入此深安住如來功德不思議衆生見者煩惱滅普使世間獲安樂不動自在天能見衆生癡暗常迷覆如來為説寂靜法是則照世智慧燈妙眼能知此方便如來清淨妙色身普現十方無有比此身無性無依處善思惟天所觀察如來音聲無限礙堪受化者靡不聞而佛寂然恆不動此樂智天之解脫寂靜解脫天人主十方無處不現前光明照耀滿世間此無礙法嚴幢見佛於無邊大劫海為衆生故求菩提種種神通化一切名稱光天悟斯法復次可愛樂法光明幢天王得普觀一切衆生根為説法斷疑解脫門淨莊嚴海天王得隨憶念令見佛解脫門最勝慧光明天王得法性平等無所依莊嚴身解脫門自在智慧幢天王得了知一切世間法一念中安立不思議莊嚴海解脫門樂寂天王得於一毛孔現不思議佛剎無障礙解脫門普智眼天王得入普門觀察法界解脫門樂旋慧天王得為一切衆生種種出現無邊劫常現前解脫門善種慧光明天王得觀一切世間境界入不思議法解脫門無垢寂靜光天王得示一切衆生出要法解脫門廣大清淨光天王得觀察一切應化衆生令入佛法解脫門爾時可愛樂法光明幢天王承佛威力普觀一切少廣天無量廣天廣果天衆而説頌言諸佛境界不思議一切衆生莫能測普令其心生信解廣大意樂無窮盡若有衆生堪受法佛威神力開導彼令其恆覩佛現前嚴海天王如是見一切法性無所依佛現世間亦如是普於諸有無依處此義勝智能觀察隨諸衆生心所欲佛神通力皆能現各各差別不思議此智幢王解脫海過去所有諸國土一毛孔中皆示現此是諸佛大神通愛樂寂靜能宣説一切法門無盡海同會一法道場中如是法性佛所説智眼能明此方便十方所有諸國土悉在其中而説法佛身無去亦無來愛樂慧旋之境界佛觀世法如光影入彼甚深幽奧處説諸法性常寂然善種思惟能見此佛善了知諸境界隨衆生根雨法雨為啓難思出要門此寂靜天能悟入世尊恆以大慈悲利益衆生而出現等雨法雨充其器清淨光天能演説復次清淨慧名稱天王得了達一切衆生解脫道方便解脫門最勝見天王得隨一切諸天衆所樂如光影普示現解脫門寂靜德天王得普嚴淨一切佛境界大方便解脫門須彌音天王得隨諸衆生永流轉生死海解脫門淨念眼天王得憶念如來調伏衆生行解脫門可愛樂普照天王得普門陀羅尼海所流出解脫門世間自在主天王得能令衆生值佛生信藏解脫門光焰自在天王得能令一切衆生聞法信喜而出離解脫門樂思惟法變化天王得入一切菩薩調伏行如虗空無邊無盡解脫門變化幢天王得觀衆生無量煩惱普悲智解脫門星宿音妙莊嚴天王得放光現佛三輪攝化解脫門爾時清淨慧名稱天王承佛威力普觀一切少淨天無量淨天遍淨天衆而説頌言了知法性無礙者普現十方無量剎説佛境界不思議令衆同歸解脫海如來處世無所依譬如光影現衆國法性究竟無生起此勝見王所入門無量劫海修方便普淨十方諸國土法界如如常不動寂靜德天之所悟衆生愚癡所覆障盲暗恆居生死中如來示以清淨道此須彌音之解脫諸佛所行無上道一切衆生莫能測示以種種方便門淨眼諦觀能悉了如來恆以總持門譬如剎海微塵數示教衆生遍一切普照天王此能入如來出世甚難值無量劫海時一遇能令衆生生信解此自在天之所得佛説法性皆無性甚深廣大不思議普使衆生生淨信光焰天王能善了三世如來功德滿化衆生界不思議於彼思惟生慶悅如是樂法能開演衆生沒在煩惱海愚癡見濁甚可怖大師哀愍令永離此化幢王所觀境如來恆放大光明一一光中無量佛各各現化衆生事此妙音之所入門復次可愛樂光明天王得恆受寂靜樂而能降現鎖滅世間苦解脫門清淨妙光天王得大悲心相應海一切衆生喜樂藏解脫門自在音天王得一念中普現無邊劫一切衆生福德力解脫門最勝念智天王得普使成住壞一切世間皆悉如虗空清淨解脫門可愛樂淨妙音天王得愛樂信受一切聖人法解脫門善思惟音天王得能經劫住演説一切地義及方便解脫門演莊嚴音天王得一切菩薩從兜率天宮沒下生時大供養方便解脫門甚深光音天王得觀察無盡神通智慧海解脫門廣大名稱天王得一切佛功德海滿足出現世間方便力解脫門最勝淨光天王得如來往昔誓願力發生深信愛樂藏解脫門爾時可愛樂光明天王承佛威力普觀一切少光天無量光天極光天衆而説頌言我念如來昔所行承事供養無邊佛如本信心清淨業以佛威神今悉見佛身無相離衆垢恆住慈悲哀愍地世間憂患悉使除此是妙光之解脫佛法廣大無涯際一切剎海於中現如其成壞各不同自在音天解脫力佛神通力無與等普現十方廣大剎悉令嚴淨常現前勝念解脫之方便如諸剎海微塵數所有如來咸敬奉聞法離染不唐捐此妙音天法門用佛於無量大劫海説地方便無倫匹所説無邊無有窮善思音天知此義如來神變無量門一念現於一切處降神成道大方便此莊嚴音之解脫威力所持能演説及現諸佛神通事隨其根欲悉令淨此光音天解脫門如來智慧無邊際世中無等無所著慈心應物普現前廣大名天悟斯道佛昔修習菩提行供養十方一切佛一一佛所發誓心最勝光聞大歡喜復次尸棄梵王得普住十方道場中説法而所行清淨無染著解脫門慧光梵王得使一切衆生入禪三昧住解脫門善思慧光明梵王得普入一切不思議法解脫門普雲音梵王得入諸佛一切音聲海解脫門觀世言音自在梵王得能憶念菩薩教化一切衆生方便解脫門寂靜光明眼梵王得現一切世間業報相各差別解脫門普光明梵王得隨一切衆生品類差別皆現前調伏解脫門變化音梵王得住一切法清淨相寂滅行境界解脫門光耀眼梵王得於一切有無所著無邊際無依止常勤出現解脫門悅意海音梵王得常思惟觀察無盡法解脫門爾時尸棄大梵王承佛威力普觀一切梵身天梵輔天梵衆天大梵天衆而説頌言佛身清淨常寂滅光明照耀遍世間無相無行無影像譬如空雲如是見佛身如是定境界一切衆生莫能測示彼難思方便門此慧光王之所悟佛剎微塵法門海一言演説盡無餘如是劫海演不窮善思慧光之解脫諸佛圓音等世間衆生隨類各得解而於音聲不分別普音梵天如是悟三世所有諸如來趣入菩提方便行一切皆於佛身現自在昔天之解脫一切衆生業差別隨其因感種種殊世間如是佛皆現寂靜光天能悟入無量法門皆自在調伏衆生遍十方亦不於中起分別此是普光之境界佛身如空不可盡無相無礙遍十方所有應現皆如化變化音王悟斯道如來身相無有邊智慧音聲亦如是處世現形無所著光耀天王入此門法王安處妙法宮法身光明無不照法身無比無諸相此海音王之解脫復次自在天王得現前成熟無量衆生自在藏解脫門善目主天王得觀察一切衆生樂令入聖境界樂解脫門妙寶幢冠天王得隨諸衆生種種欲解令起行解脫門勇猛慧天王得普攝為一切衆生所説義解脫門妙音句天王得憶念如來廣大慈增進自所行解脫門妙光幢天王得示現大悲門摧滅一切憍慢幢解脫門寂靜境天王得調伏一切世間瞋害心解脫門妙輪莊嚴幢天王得十方無邊佛隨憶念悉來赴解脫門華光慧天王得隨衆生心念普現成正覺解脫門因陀羅妙光天王得普入一切世間大威力自在法解脫門爾時自在天王承佛威力普觀一切自在天衆而説頌言佛身周遍等法界普應衆生悉現前種種教門常化誘於法自在能開悟世間所有種種樂聖寂滅樂為最勝住於廣大法性中妙眼天王觀見此如來出現遍十方普應羣心而説法一切疑念皆除斷此妙幢冠解脫門諸佛遍世演妙音無量劫中所説法能以一言咸説盡勇猛慧天之解脫世間所有廣大慈不及如來一毫分佛慈如空不可盡此妙音天之所得一切衆生慢高山十力摧殄悉無餘此是如來大悲用妙光幢王所行道慧光清淨滿世間若有見者除癡暗令其遠離諸惡道寂靜天王悟斯法毛孔光明能演説等衆生數諸佛名隨其所樂悉得聞此妙輪幢之解脫如來自在不可量法界虗空悉充滿一切衆會皆明覩此解脫門華慧入無量無邊大劫海普現十方而説法未曾見神有去來此妙光天之所悟復次善化天王得開示一切業變化力解脫門寂靜音光明天王得捨離一切攀緣解脫門變化力光明天王得普滅一切衆生癡暗心令智慧圓滿解脫門莊嚴主天王得示現無邊悅意聲解脫門念光天王得了知一切佛無盡福德相解脫門最上雲音天王得普知過去一切劫成壞次第解脫門勝光天王得開悟一切衆生智解脫門妙髻天王得舒光疾滿十方虗空界解脫門喜慧天王得一切所作無能壞精進力解脫門華光髻天王得知一切衆生業所受報解脫門普見十方天王得示現不思議衆生形類差別解脫門爾時善化天王承佛威力普觀一切善化天衆而説頌言世間業性不思議佛為羣迷悉開示巧説因緣真實理一切衆生差別業種種觀佛無所有十方求覓不可得法身示現無真實此法寂音之所見佛於劫海修諸行為滅世間癡暗惑是故清淨最照明此是力光心所悟世間所有妙音聲無有能比如來音佛以一音遍十方入此解脫莊嚴主世間所有衆福力不與如來一相等如來福德同虗空此念光天所觀見三世所有無量劫如其成敗種種相佛一毛孔皆能現最上雲音所了知十方虗空可知量佛毛孔量不可得如是無礙不思議妙髻天王已能悟佛於曩世無量劫具修廣大波羅蜜勤行精進無厭怠喜慧能知此法門業性因緣不可思佛為世間皆演説法性本淨無諸垢此是華光之入處汝應觀佛一毛孔一切衆生悉在中彼亦不來亦不去此普見王之所了復次知足天王得一切佛出興世圓滿教輪解脫門喜樂海髻天王得盡虗空界清淨光明身解脫門最勝功德幢天王得消滅世間苦淨願海解脫門寂靜光天王得普現身説法解脫門善目天王得普淨一切衆生界解脫門寶峰月天王得普化世間常現前無盡藏解脫門勇健力天王得開示一切佛正覺境界解脫門金剛妙光天王得堅固一切衆生菩提心令不可壞解脫門星宿幢天王得一切佛出興咸親近觀察調伏衆生方便解脫門妙莊嚴天王得一念悉知衆生心隨機應現解脫門爾時知足天王承佛威力普觀一切知足天衆而説頌言如來廣大遍法界於諸衆生悉平等普應羣情闡妙門令入難思清淨法佛身普現於十方無著無礙不可取種種色像世咸見此喜髻天之所入如來往昔修諸行清淨大願深如海一切佛法皆令滿勝德能知此方便如來法身不思議如影分形等法界處處闡明一切法寂靜光天解脫門衆生業惑所纏覆憍慢放逸心馳蕩如來為説寂靜法善目照知心喜慶一切世間真導師為救為歸而出現普示衆生安樂處峰月於此能深入諸佛境界不思議一切法界皆周遍入於諸法到彼岸勇慧見此生歡喜若有衆生堪受化聞佛功德趣菩提令住福海常清淨妙光於此能觀察十方剎海微塵數一切佛所皆往集恭敬供養聽聞法此莊嚴幢之所見衆生心海不思議無住無動無依處佛於一念皆明現妙莊嚴天斯善了復次時分天王得發起一切衆生善根令永離憂惱解脫門妙光天王得普入一切境界解脫門無盡慧功德幢天王得滅除一切患大悲輪解脫門善化端嚴天王得了知三世一切衆生心解脫門總持大光明天王得陀羅尼門光明憶持一切法無忘失解脫門不思議慧天王得善入一切業自性不思議方便解脫門輪天王得轉法輪成熟衆生方便解脫門光𦦨天王得廣大眼普觀衆生而往調伏解脫門光照天王得超出一切業障不隨魔所作解脫門普觀察大名稱天王得善誘誨一切諸天衆令受行心清淨解脫門爾時時分天王承佛威力普觀一切時分天衆而説頌言佛於無量久遠劫已竭世間憂惱海廣闢離塵清淨道永耀衆生智慧燈如來法身甚廣大十方邊際不可得一切方便無限量妙光明天智能入生老病死憂悲苦逼迫世間無暫歇大師哀愍誓悉除無盡慧光能覺了佛如幻智無所礙於三世法悉明達普入衆生心行中此善化天之境界總持邊際不可得辨才大海亦無盡能轉清淨妙法輪此是大光之解脫業性廣大無窮盡智慧覺了善開示一切方便不思議如是慧天之所入轉不思議妙法輪顯示修習菩提道永滅一切衆生苦此是輪方便地如來真身本無二應物隨形滿世間衆生各現在其前此是𦦨天之境界若有衆生一見佛必使淨除諸業障離諸魔業永無餘光照天王所行道一切衆會廣大海佛在其中最威耀普雨法雨潤衆生此解脫門名稱入復次釋迦因陀羅天王得憶念三世佛出興乃至剎成壞皆明見大歡喜解脫門普稱滿音天王得能令佛色身最清淨廣大世無能比解脫門慈目寶髻天王得慈雲普覆解脫門寶光幢名稱天王得恆見佛於一切世主前現種種形相威德身解脫門發生喜樂髻天王得知一切衆生城邑宮殿從何福業生解脫門端正念天王得開示諸佛成熟衆生事解脫門高勝音天王得知一切世間成壞劫轉變相解脫門成就念天王得憶念當來菩薩調伏衆生行解脫門淨華光天王得了知一切諸天快樂因解脫門智日眼天王得開示一切諸天子受生善根俾無癡惑解脫門自在光明天王得開悟一切諸天衆令永斷種種疑解脫門爾時釋迦因陀羅天王承佛威力普觀一切三十三天衆而説頌言我念三世一切佛所有境界悉平等如其國土壞與成以佛威神皆得見佛身廣大遍十方妙色無比利羣生光明照耀靡不及此道普稱能觀見如來方便大慈海往劫修行極清淨化導衆生無有邊寶髻天王斯悟了我念法王功德海世中最上無與等發生廣大歡喜心此寶光天之解脫佛知衆生善業海種種勝因生大福皆令顯現無有餘此喜髻天之所見諸佛出現於十方普遍一切世間中觀衆生心示調伏正念天王悟斯道如來智身廣大眼世界微塵無不見如是普遍於十方此雲音天之解脫一切佛子菩提行如來悉現毛孔中如其無量皆具足此念天王所明見世間所有安樂事一切皆由佛出生如來功德勝無等此解脫處華王入若念如來少功德乃至一念心專仰諸惡道怖悉永除智眼於此能深悟寂滅法中大神通普應羣心靡不周所有疑惑皆令斷此光明王之所得復次日天子得淨光普照十方衆生盡未來劫常為利益解脫門光𦦨眼天子得以一切隨類身開悟衆生令入智慧海解脫門須彌光歡喜幢天子得為一切衆生主令勤修無邊淨功德解脫門淨寶月天子得修一切苦行深心歡喜解脫門勇猛不退轉天子得無礙光普照令一切衆生益其精爽解脫門妙華纓光明天子得淨光普照衆生身令生歡喜信解海解脫門最勝幢光明天子得光明普照一切世間令成辦種種妙功德解脫門寶髻普光明天子得大悲海現無邊境界種種色相寶解脫門光明眼天子得淨治一切衆生眼令見法界藏解脫門持德天子得發生清淨相續心令不失壞解脫門普運行光明天子得普運日宮殿照十方一切衆生令成就所作業解脫門爾時日天子承佛威力普觀一切日天子衆而説頌言如來廣大智慧光普照十方諸國土一切衆生咸見佛種種調伏多方便如來色相無有邊隨其所樂悉現身普為世間開智海𦦨眼如是觀於佛佛身無等無有比光明照耀遍十方超過一切最無上如是法門歡喜得為利世間修苦行往來諸有無量劫光明遍淨如虗空寶月能知此方便佛演妙音無障礙普遍十方諸國土以法滋味益羣生勇猛能知此方便放光明網不思議普淨一切諸含識悉使發生深信解此華纓天所入門世間所有諸光明不及佛一毛孔光佛光如是不思議此勝幢光之解脫一切諸佛法如是悉坐菩提樹王下令非道者住於道寶髻光明如是見衆生盲暗愚癡苦佛欲令其生淨眼是故為然智慧燈善目於此深觀察解脫方便自在尊若有曾見一供養悉使修行至於果此是德天方便力一法門中無量門無量千劫如是説所演法門廣大義普運光天之所了復次月天子得淨光普照法界攝化衆生解脫門華王髻光明天子得觀察一切衆生界令普入無邊法解脫門衆妙淨光天子得了知一切衆生心海種種攀緣轉解脫門安樂世間心天子得與一切衆生不可思議樂令踊躍大歡喜解脫門樹王眼光明天子得如田家作業種芽莖等隨時守護令成就解脫門出現淨光天子得慈悲救護一切衆生令現見受苦受樂事解脫門普遊不動光天子得能持清淨月普觀十方解脫門星宿王自在天子得開示一切法如幻如虗空無相無自性解脫門淨覺月天子得普為一切衆生起大業用解脫門大威德光明天子得普斷一切疑惑解脫門爾時月天子承佛威力普觀一切月宮殿中諸天衆會而説頌言佛放光明遍世間照耀十方諸國土演不思議廣大法永破衆生癡惑暗境界無邊無有盡於無量劫常開導種種自在化羣生華髻如是觀於佛衆生心海念念殊佛智寬廣悉了知普為説法令歡喜此妙光明之解脫衆生無有聖安樂沉迷惡道受諸苦如來示彼法性門安樂思惟如是見如來希有大慈悲為利衆生入諸有説法勸善令成就此目光天所了知世尊開闡法光明分別世間諸業性善惡所行無失壞淨光見此生歡喜佛為一切福所依譬如大地持宮室巧示離憂安隱道不動能知此方便智火大明周法界現形無數等衆生普為一切開真實星宿王天悟斯道佛如虗空無自性為利衆生現世間相好莊嚴如影像淨覺天王如是見佛身毛孔普演音法雲覆世悉無餘聽聞莫不生歡喜如是解脫光天悟
