body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈華藏世界品第五之一此品來意者前品通明諸佛剎海今此別明本師所嚴依果答世界海問故次來也梵本具云華藏莊嚴嚴具世界海遍清淨功德海光明品譯人嫌繁乃今太略應云蓮華藏莊嚴世界海品謂蓮華含子之處目之曰藏今剎種及剎為大蓮華之所含藏故云華藏其中一一境界皆有剎海塵數清淨功德故曰莊嚴世界深廣目之為海然此世界海略舉二因一約衆生如來藏識即是香海故楞伽云藏識海亦法性海依無住本是為風輪亦妄想風於此海中有因果相恆沙性德即是正因之華世出世間未來果法皆悉含攝故名為藏若以法性為海心即是華含藏亦爾然此藏識相分之中半為外器不執受故半為內身執為自性生覺受故二約諸佛謂以大願風持大悲海生無邊行華含藏二利染淨果法重疊無礙故所感剎相狀如之是以出現中多將世界以喻佛德爾時普賢菩薩復告大衆言諸佛子此華藏莊嚴世界海是毗盧遮那如來往昔於世界海微塵數劫修菩薩行時一一劫中親近世界海微塵數佛一一佛所淨修世界海微塵數大願之所嚴淨諸佛子此華藏莊嚴世界海有須彌山微塵數風輪所持其最下風輪名平等住能持其上一切寶𦦨熾然莊嚴次上風輪名出生種種寶莊嚴能持其上淨光照耀摩尼王幢次上風輪名寶威德能持其上一切寶鈴次上風輪名平等𦦨能持其上日光明相摩尼王輪次上風輪名種種普莊嚴能持其上光明輪華次上風輪名普清淨能持其上一切華𦦨師子座次上風輪名聲遍十方能持其上一切珠王幢次上風輪名一切寶光明能持其上一切摩尼王樹華次上風輪名速疾普持能持其上一切香摩尼須彌雲次上風輪名種種宮殿遊行能持其上一切寶色香臺雲諸佛子彼須彌山微塵數風輪最在上者名殊勝威光藏能持普光摩尼莊嚴香水海此香水海有大蓮華名種種光明蕊香幢華藏莊嚴世界海住在其中四方均平清淨堅固金剛輪山周匝圍繞地海衆樹各有區別是時普賢菩薩欲重宣其義承佛神力觀察十方而說頌言世尊往昔於諸有微塵佛所修淨業故獲種種寶光明華藏莊嚴世界海廣大悲雲遍一切捨身無量等剎塵以昔劫海修行力今此世界無諸垢放大光明遍住空風力所持無動搖佛藏摩尼普嚴飾如來願力令清淨普散摩尼妙藏華以昔願力空中住種種堅固莊嚴海光雲垂布滿十方諸摩尼中菩薩雲普詣十方光熾然光𦦨成輪妙華飾法界周流靡不遍一切寶中放淨光其光普照衆生海十方國土皆周遍咸令出苦向菩提寶中佛數等衆生從其毛孔出化形梵主帝釋輪王等一切衆生及諸佛化現光明等法界光中演說諸佛名種種方便示調伏普應羣心無不盡華藏世界所有塵一一塵中見法界寶光現佛如雲集此是如來剎自在廣大願雲周法界於一切劫化羣生普賢智地行悉成所有莊嚴從此出此下釋文一品分三初明華藏因果自體二明藏海安住莊嚴三明所持剎網差別有長行偈頌今初指此華嚴剎海是我本師修因所淨即顯因深廣一剎海塵劫修則時長遇剎海塵數佛則不唯一佛三淨剎海塵數願則不唯一無生行故云深廣此顯因深屬於果人次下彰果體相辨其寬容後先辨持世之風輪文云此華藏世界有微塵數風輪所持此明風輪為能持華藏剎為所持其風輪有多名其最上者名殊勝威光藏是則積多風輪以為能持則所積者厚故有力能持其所持者最下一大海名普光摩尼莊嚴香水海此為華藏之總海即是世界海次云此香水海有蓮華名種種光明蕊香幢此總舉香水海中一朵蓮華此中含有佛剎微塵數香水海各有蓮華持多佛剎是為剎海故次云此世界海大地中有不可說佛剎微塵數香水海此海在蕊香所持金剛地上是為剎種此蕊香幢所含多多剎種如蓮華之蕊一蕊是一剎種亦各有二十重今且總辨主剎總名為世界海向後剎網安布乃明伴剎故先云華藏莊嚴世界海安住其中已上明風輪持香水海海中出蓮華華中含多剎種成世界海以彰果體寬容初長行次偈頌頌長行之義末後二偈明剎自在爾時普賢菩薩復告大衆言諸佛子此華藏莊嚴世界海大輪圍山住日珠王蓮華之上旃檀摩尼以為其身威德寶王以為其峰妙香摩尼而作其輪𦦨藏金剛所共成立一切香水流注其間衆寶為林妙華開敷香草布地明珠間飾種種香華處處盈滿摩尼為網周而垂覆如是等有世界海微塵數衆妙莊嚴爾時普賢菩薩欲重宣其義承佛神力觀察十方而說頌言世界大海無有邊寶輪清淨種種色所有莊嚴盡奇妙此由如來神力起摩尼寶輪妙香輪及以真珠燈𦦨輪種種妙寶為嚴飾清淨輪圍所安住堅固摩尼以為藏閻浮檀金作嚴飾舒光作𦦨遍十方內外映徹皆清淨金剛摩尼所集成復雨摩尼諸妙寶其寶精奇非一種放淨光明普嚴麗香水分流無量色散諸華寶及旃檀衆蓮競發如衣布珍草羅生悉芬馥無量寶樹普莊嚴開華發蕊色熾然種種名衣在其內光雲四照常圓滿無量無邊大菩薩執蓋焚香充法界悉發一切妙音聲普轉如來正法輪諸摩尼樹寶末成一一寶末現光明毗盧遮那清淨身悉入其中普令見諸莊嚴中現佛身無邊色相無央數悉往十方無不遍所化衆生亦無限一切莊嚴出妙音演說如來本願輪十方所有淨剎海佛自在力咸令遍爾時普賢菩薩復告大衆言諸佛子此世界海大輪圍山內所有大地一切皆以金剛所成堅固莊嚴不可沮壞清淨平坦無有高下摩尼為輪衆寶為藏一切衆生種種形狀諸摩尼寶以為間錯散衆寶末布以蓮華香藏摩尼分置其間諸莊嚴具充滿如雲三世一切諸佛國土所有莊嚴而為校飾摩尼妙寶以為其網普現如來所有境界如天帝網於中布列諸佛子此世界海地有如是等世界海微塵數莊嚴爾時普賢菩薩欲重宣其義承佛神力觀察十方而說頌言其地平坦極清淨安住堅固無能壞摩尼處處以為嚴衆寶故中相間錯金剛為地甚可悅寶輪寶網具莊嚴蓮華布上皆圓滿妙衣彌覆悉周遍菩薩天冠寶瓔珞悉布其地為嚴好旃檀摩尼普散中咸舒離垢妙光明寶華發𦦨出妙光光𦦨如雲照一切散此妙華及衆寶普覆於地為嚴飾密雲興布滿十方廣大光明無有盡普至十方一切土演說如來甘露法一切佛願摩尼內普現無邊廣大劫最勝智者昔所行於此寶中無不見其地所有摩尼寶一切佛剎咸來入彼諸佛剎一一塵一切國土亦入中妙寶莊嚴華藏界菩薩遊行遍十方演說大士諸弘願此是道場自在力摩尼妙寶莊嚴地放淨光明備衆飾充滿法界等虗空佛力自然如是現諸有修治普賢願入佛境界大智人能知於此剎海中如是一切諸神變爾時普賢菩薩復告大衆言諸佛子此世界海大地中有十不可說佛剎微塵數香水海一切妙寶莊嚴其底妙香摩尼莊嚴其岸毗盧遮那摩尼寶王以為其網香水映徹具衆寶色充滿其中種種寶華旋布其上旃檀細末澄垽其下演佛言音放寶光明無邊菩薩持種種蓋現神通力一切世界所有莊嚴悉於中現十寶階陛行列分布十寶欄楯周匝圍繞四天下微塵數一切寶莊嚴芬陀利華敷榮水中不可說百千億那由他數十寶尸羅幢恆河沙數一切寶衣鈴網幢恆河沙數無邊色相寶華樓閣百千億那由他數十寶蓮華城四天下微塵數衆寶樹林寶𦦨摩尼以為其網恆河沙數旃檀香諸佛言音光𦦨摩尼不可說百千億那由他數衆寶垣墻悉共圍繞周遍嚴飾爾時普賢菩薩欲重宣其義承佛神力觀察十方而說頌言此世界中大地上有香水海摩尼嚴清淨妙寶布其底安住金剛不可壞香藏摩尼積成岸日𦦨珠輪布若雲蓮華妙寶為瓔珞處處莊嚴淨無垢香水澄渟具衆色寶華旋布放光明普震音聲聞遠近以佛威神演妙法階陛莊嚴具衆寶復以摩尼為間飾周回欄楯悉寶成蓮華珠網如雲布摩尼寶樹列成行華蕊敷榮光赦奕種種樂音恆競奏佛神通力令如是種種妙寶芬陀利敷布莊嚴香水海香𦦨光明無暫停廣大圓滿皆充遍明珠寶幢恆熾盛妙衣垂布為嚴飾摩尼鈴網演法音令其聞者趣佛智妙寶蓮華作城郭衆彩摩尼所嚴瑩真珠雲影布四隅如是莊嚴香水海垣墻繚繞皆周匝樓閣相望布其上無量光明恆熾然種種莊嚴清淨海毗盧遮那於往昔種種剎海皆嚴淨如是廣大無有邊悉是如來自在力爾時普賢菩薩復告大衆言諸佛子一一香水海各有四天下微塵數香水河右旋圍繞一切皆以金剛為岸淨光摩尼以為嚴飾常現諸佛寶色光雲及諸衆生所有言音其河所有漩澓之處一切諸佛所修因行種種形相皆從中出摩尼為網衆寶鈴鐸諸世界海所有莊嚴悉於中現摩尼寶雲以覆其上其雲普現華藏世界毗盧遮那十方化佛及一切佛神通之事復出妙音稱揚三世佛菩薩名其香水中常出一切寶𦦨光雲相續不絶若廣說者一一河各有世界海微塵數莊嚴爾時普賢菩薩欲重宣其義承佛神力觀察十方而說頌言清淨香流滿大河金剛妙寶為其岸寶末為輪布其地種種嚴飾皆珍好寶階行列妙莊嚴欄楯周回悉殊麗真珠為藏衆華飾種種纓鬘共垂下香水寶光清淨色恆吐摩尼競疾流衆華隨浪皆搖動悉奏樂音宣妙法細末旃檀作泥垽一切妙寶同洄澓香藏氛氳布在中發𦦨流芬普周遍河中出生諸妙寶悉放光明色熾然其光布影成臺座華蓋珠瓔皆具足摩尼王中現佛身光明普照十方剎以此為輪嚴飾地香水映徹常盈滿摩尼為網金為鐸遍覆香河演佛音克宣一切菩提道及以普賢之妙行寶岸摩尼極清淨恆出如來本願音一切諸佛曩所行其音普演皆令見其河所有漩流處菩薩如雲常踊出悉往廣大剎土中乃至法界咸充滿清淨珠王布若雲一切香河悉彌覆其珠等佛眉間相炳然顯現諸佛影爾時普賢菩薩復告大衆言諸佛子此諸香水河兩間之地悉以妙寶種種莊嚴一一各有四天下微塵數衆寶莊嚴芬陀利華周匝遍滿各有四天下微塵數衆寶樹林次第行列一一樹中恆出一切諸莊嚴雲摩尼寶王照耀其間種種華香處處盈滿其樹復出微妙音聲說諸如來一切劫中所修大願復散種種摩尼寶王充遍其地所謂蓮華輪摩尼寶王香𦦨光雲摩尼寶王種種嚴飾摩尼寶王現不可思議莊嚴色摩尼寶王日光明衣藏摩尼寶王周遍十方普垂布光網雲摩尼寶王現一切諸佛神變摩尼寶王現一切衆生業報海摩尼寶王如是等有世界海微塵數其香水河兩間之地一一悉具如是莊嚴爾時普賢菩薩欲重宣其義承佛神力觀察十方而說頌言其地平坦極清淨真金摩尼共嚴飾諸樹行列蔭其中聳𠏉垂條萃若雲枝條妙寶所莊嚴華𦦨成輪光四照摩尼為果如雲布普使十方常現覩摩尼布地皆充滿衆華寶末共莊嚴復以摩尼作宮殿悉現衆生諸影像諸佛影像摩尼王普散其地靡不周如是赫奕遍十方一一塵中咸見佛妙寶莊嚴善分布真珠燈網相間錯處處悉有摩尼輪一一皆現佛神通衆寶莊嚴放大光光中普現諸化佛一一周行靡不遍悉以十力廣開演摩尼妙寶芬陀利一切水中咸遍滿其華種種各不同悉現光明無盡歇三世所有諸莊嚴摩尼果中皆顯現體性無生不可取此是如來自在力此地一切莊嚴中悉現如來廣大身彼亦不來亦不去佛昔願力皆令見此地一一微塵中一切佛子修行道各見所記當來剎隨其意樂悉清淨爾時普賢菩薩復告大衆言諸佛子諸佛世尊世界海莊嚴不可思議何以故諸佛子此華藏莊嚴世界海一切境界一一皆以世界海微塵數清淨功德之所莊嚴爾時普賢菩薩欲重宣其義承佛神力觀察十方而說頌言此剎海中一切處悉以衆寶為嚴飾發𦦨騰空布若雲光明洞徹常彌覆摩尼吐雲無有盡十方佛影於中現神通變化靡暫停一切菩薩咸來集一切摩尼演佛音其音美妙不思議毗盧遮那昔所行於此寶內恆聞見清淨光明遍照尊莊嚴具中皆現影變化分身衆圍繞一切剎海咸周遍所有化佛皆如幻求其來處不可得以佛境界威神力一切剎中如是現如來自在神通事悉遍十方諸國土以此剎海淨莊嚴一切皆於寶中見十方所有諸變化一切皆如鏡中像但由如來昔所行神通願力而出生若有能修普賢行入於菩薩勝智海能於一切微塵中普現其身淨衆剎不可思議億大劫親近一切諸如來如其一切之所行一剎那中悉能現諸佛國土如虗空無等無生無有相為利衆生普嚴淨本願力故住其中此下第二別明安布莊嚴文分六段一四周輪山二寶地三香海四香河五樹林六總結各別今初云日珠王者所依處地故舊經云依蓮華日寶王地住亦有言大蓮之上別有此華為山所依義似不順所以地受此名者以前華名種種光明蕊偈中云光𦦨成輪又云一切寶中放淨光明是知此華以寶為體是則如日輪之珠王即蕊香蓮華也斯即總華之稱此總標所依地次云旃檀摩尼以為其身別顯體相後如是等一句結顯無盡後重說偈頌初明山體相莊嚴頌前別顯初一偈頌圍山二一偈頌山輪三一偈頌山體四一偈頌山之緣五有二偈頌前水等六有四偈明山妙用自在次爾時普賢菩薩復告大衆下有長行偈頌明寶地次爾時普賢菩薩復告大衆下有長行偈頌明香海次爾時普賢菩薩復告大衆下有長行偈頌明香河次爾時普賢菩薩復告大衆下有長行偈頌明林樹次爾時普賢菩薩復告大衆下有長行偈頌總結前莊嚴難測徵釋所由此上通明藏海安布莊嚴竟下明所持剎網爾時普賢菩薩復告大衆言諸佛子此中有何等世界住我今當說諸佛子此十不可說佛剎微塵數香水海中有十不可說佛剎微塵數世界種安住一一世界種復有不可說佛剎微塵數世界諸佛子彼諸世界種於世界海中各各依住各各形狀各各體性各各方所各各趣入各各莊嚴各各分齊各各行列各各無差別各各力加持諸佛子此世界種或有依大蓮華海住或有依無邊色寶華海住或有依一切真珠藏寶瓔珞海住或有依香水海住或有依一切華海住或有依摩尼寶網海住或有依旋流光海住或有依菩薩寶莊嚴冠海住或有依種種衆生身海住或有依一切佛音聲摩尼王海住如是等若廣說者有世界海微塵數諸佛子彼一切世界種或有作須彌山形或作江河形或作回轉形或作旋流形或作輪輞形或作壇墠形或作樹林形或作樓閣形或作山幢形或作普方形或作胎藏形或作蓮華形或作佉勒迦形或作衆生身形或作雲形或作諸佛相好形或作圓滿光明形或作種種珠網形或作一切門闥形或作諸莊嚴具形如是等若廣說者有世界海微塵數諸佛子彼一切世界種或有以十方摩尼雲為體或有以衆色𦦨為體或有以諸光明為體或有以寶香𦦨為體或有以一切寶莊嚴多羅華為體或有以菩薩影像為體或有以諸佛光明為體或有以佛色相為體或有以一寶光為體或有以衆寶光為體或有以一切衆生福德海音聲為體或有以一切衆生諸業海音聲為體或有以一切佛境界清淨音聲為體或有以一切菩薩大願海音聲為體或有以一切佛方便音聲為體或有以一切剎莊嚴具成壞音聲為體或有以無邊佛音聲為體或有以一切佛變化音聲為體或有以一切衆生善音聲為體或有以一切佛功德海清淨音聲為體如是等若廣說者有世界海微塵數爾時普賢菩薩欲重宣其義承佛神力觀察十方而說頌言剎種堅固妙莊嚴廣大清淨光明藏依止蓮華寶海住或有住於香海等須彌城樹壇墠形一切剎種遍十方種種莊嚴形相別各各布列而安住或有體是淨光明或是華藏及寶雲或有剎種𦦨所成安住摩尼不壞藏燈雲𦦨彩光明等種種無邊清淨色或有言音以為體是佛所演不思議或是願力所出音神變音聲為體性一切衆生大福業佛功德音亦如是剎種一一差別門不可思議無有盡如是十方皆遍滿廣大莊嚴現神力十方所有廣大剎悉來入此世界種雖見十方普入中而實無來無所入以一剎種入一切一切入一亦無餘體相如本無差別無等無量悉周遍一切國土微塵中普見如來在其所願海言音若雷震一切衆生悉調伏佛身周遍一切剎無數菩薩亦充滿如來自在無等倫普化一切諸含識此下第三釋所持剎網釋品目世界之言又前明本剎今明末剎故兼染淨初告大衆許說次諸佛子下標章中列二謂世界種及世界然剎種依剎海世果依剎種從寬至狹欲明世界無邊方便顯多故立此名謂積多世界共在一處攝諸流類故名為種如是種類復有衆多深廣無邊故名為海如是衆多世界如天帝網懸布於華藏海中故云所持剎網各各世界所依住形狀一一不同故云差別故次經云諸佛子彼諸世界種於世界海各各依住等明差別有十門不同經中有不可說佛剎疏云脫去十字應云十不可說長行中有諸佛子但次第釋依住形狀性三事而已頌中初一偈頌依住次一偈頌形狀三有三偈頌體性四有三偈頌三事謂所入莊嚴分齊五一偈頌無差別六一偈頌力持此上明所持剎網差別謂剎海中有十不可說佛剎塵數之剎種各各依住於剎海之中如帝網重重無盡且明剎種不同爾時普賢菩薩復告大衆言諸佛子此十不可說佛剎微塵數香水海在華藏莊嚴世界海中如天帝網分布而住諸佛子此最中央香水海名無邊妙華光以現一切菩薩形摩尼王幢為底出大蓮華名一切香摩尼王莊嚴有世界種而住其上名普然十方熾然寶光明以一切莊嚴具為體有十不可說佛剎微塵數世界於中布列其最下方有世界名最勝光遍照以一切金剛莊嚴光耀輪為際依衆寶摩尼華而住其狀猶如摩尼寶形一切寶華莊嚴雲彌覆其上佛剎微塵數世界周匝圍繞種種安住種種莊嚴佛號淨眼離垢燈此上過佛剎微塵數世界有世界名種種香蓮華妙莊嚴以一切莊嚴具為際依寶蓮華網而住其狀猶如師子之座一切寶色珠帳雲彌覆其上二佛剎微塵數世界周匝圍繞佛號師子光勝照此上過佛剎微塵數世界有世界名一切寶莊嚴普照光以香風輪為際依種種寶華瓔珞住其形八隅妙光摩尼日輪雲而覆其上三佛剎微塵數世界周匝圍繞佛號淨光智勝幢此上過佛剎微塵數世界有世界名種種光明華莊嚴以一切寶王為際依衆色金剛尸羅幢海住其狀猶如摩尼蓮華以金剛摩尼寶光雲而覆其上四佛剎微塵數世界周匝圍繞純一清淨佛號金剛光明無量精進力善出現此上過佛剎微塵數世界有世界名普放妙華光以一切寶鈴莊嚴網為際依一切樹林莊嚴寶輪網海住其形普方而多有隅角梵音摩尼王雲以覆其上五佛剎微塵數世界周匝圍繞佛號香光喜力海此上過佛剎微塵數世界有世界名淨妙光明以寶王莊嚴幢為際依金剛宮殿海住其形四方摩尼輪髻帳雲而覆其上六佛剎微塵數世界周匝圍繞佛號普光自在幢此上過佛剎微塵數世界有世界名衆華𦦨莊嚴以種種華莊嚴為際依一切寶色𦦨海住其狀猶如樓閣之形一切寶色衣真珠欄楯雲而覆其上七佛剎微塵數世界周匝圍繞純一清淨佛號歡喜海功德名稱自在光此上過佛剎微塵數世界有世界名出生威力地以出一切聲摩尼王莊嚴為際依種種寶色蓮華座虗空海住其狀猶如因陀羅網以無邊色華網雲而覆其上八佛剎微塵數世界周匝圍繞佛號廣大名稱智海幢此上過佛剎微塵數世界有世界名出妙音聲以心王摩尼莊嚴輪為際依恆出一切妙音聲莊嚴雲摩尼王海住其狀猶如梵天身形無量寶莊嚴師子座雲而覆其上九佛剎微塵數世界周匝圍繞佛號清淨月光明相無能摧伏此上過佛剎微塵數世界有世界名金剛幢以無邊莊嚴真珠藏寶瓔珞為際依一切莊嚴寶師子座摩尼海住其狀周圓十須彌山微塵數一切香摩尼華須彌雲彌覆其上十佛剎微塵數世界周匝圍繞純一清淨佛號一切法海最勝王此上過佛剎微塵數世界有世界名恆出現帝青寶光明以極堅牢不可壞金剛莊嚴為際依種種殊異華海住其狀猶如半月之形諸天寶帳雲而覆其上十一佛剎微塵數世界周匝圍繞佛號無量功德法此上過佛剎微塵數世界有世界名光明照耀以普光莊嚴為際依華旋香水海住狀如華旋種種衣雲而覆其上十二佛剎微塵數世界周匝圍繞佛號超釋梵此上過佛剎微塵數世界至此世界名娑婆以金剛莊嚴為際依種種色風輪所持蓮華網住狀如虗空以普圓滿天宮殿莊嚴虗空雲而覆其上十三佛剎微塵數世界周匝圍繞其佛即是毗盧遮那如來世尊此上過佛剎微塵數世界有世界名寂靜離塵光以一切寶莊嚴為際依種種寶衣海住其狀猶如執金剛形無邊色金剛雲而覆其上十四佛剎微塵數世界周匝圍繞佛號遍法界勝音此上過佛剎微塵數世界有世界名衆妙光明燈以一切莊嚴帳為際依淨華網海住其狀猶如卍字之形摩尼樹香水海雲而覆其上十五佛剎微塵數世界周匝圍繞純一清淨佛號不可摧伏力普照幢此上過佛剎微塵數世界有世界名清淨光遍照以無盡寶雲摩尼王為際依種種香𦦨蓮華海住其狀猶如龜甲之形圓光摩尼輪旃檀雲而覆其上十六佛剎微塵數世界周匝圍繞佛號清淨日功德眼此上過佛剎微塵數世界有世界名寶莊嚴藏以一切衆生形摩尼王為際依光明藏摩尼王海住其形八隅以一切輪圍山寶莊嚴華樹網彌覆其上十七佛剎微塵數世界周匝圍繞佛號無礙智光明遍照十方此上過佛剎微塵數世界有世界名離塵以一切殊妙相莊嚴為際依衆妙華師子座海住狀如珠瓔以一切寶香摩尼王圓光雲而覆其上十八佛剎微塵數世界周匝圍繞純一清淨佛號無量方便最勝幢此上過佛剎微塵數世界有世界名清淨光普照以出無盡寶雲摩尼王為際依無量色香𦦨須彌山海住其狀猶如寶華旋布以無邊色光明摩尼王帝青雲而覆其上十九佛剎微塵數世界周匝圍繞佛號普照法界虗空光此上過佛剎微塵數世界有世界名妙寶𦦨以普光明日月寶為際依一切諸天形摩尼王海住其狀猶如寶莊嚴具以一切寶衣幢雲及摩尼燈藏網而覆其上二十佛剎微塵數世界周匝圍繞純一清淨佛號福德相光明諸佛子此遍照十方熾然寶光明世界種有如是等不可說佛剎微塵數廣大世界各各所依住各各形狀各各體性各各方面各各趣入各各莊嚴各各分齊各各行列各各無差別各各力加持周匝圍繞所謂十佛剎微塵數回轉形世界十佛剎微塵數江河形世界十佛剎微塵數旋流形世界十佛剎微塵數輪輞形世界十佛剎微塵數壇墠形世界十佛剎微塵數樹林形世界十佛剎微塵數樓觀形世界十佛剎微塵數尸羅幢形世界十佛剎微塵數普方形世界十佛剎微塵數胎藏形世界十佛剎微塵數蓮華形世界十佛剎微塵數佉勒迦形世界十佛剎微塵數種種衆生形世界十佛剎微塵數佛相形世界十佛剎微塵數圓光形世界十佛剎微塵數雲形世界十佛剎微塵數網形世界十佛剎微塵數門闥形世界如是等有不可說佛剎微塵數此一一世界各有十佛剎微塵數廣大世界周匝圍繞此諸世界一一復有如上所說微塵數世界而為眷屬如是所說一切世界皆在此無邊妙華光香水海及圍繞此海香水河中此下第二別明種剎香海雙釋二章者謂香海依剎海剎種依香海諸剎依剎種亦有長行偈頌初總舉諸海所依二次第別顯海種及剎三總略結釋今初也上來雖復但標剎種及剎二章而釋依住中皆云依海故列海數此多香海並在剎海地面故云所依如天帝網者大都分布則似車輪其有別者謂帝釋殿網貫天珠成以一大珠當心次以其次大珠貫穿匝繞如是展轉遞繞經百千匝若上下四面四角望之皆行伍相當今此香海雖在地面分布相似又有涉入重重之義故云如也此但舉諸海所依次舉最中央香水海乃別舉海種及剎先辨最中間一海為主即最當中二十重華藏世界以一剎種為主其十方各有一不可說佛剎微塵數剎種圍繞故有十不可說佛剎微塵數香海剎為伴剎同在剎海之中今單約中間一剎種次無邊妙華光此中央香海之總名次一切香摩尼王莊嚴此中央華之總名即前蕊香幢中隨義而名異耳其普照十方熾然寶光明即最中央剎種之總名故經云有世界種而住其中次有不可說佛剎塵數世界此就最中種中所含之世界次最下方有世界名最勝光遍照此乃最中世界種之最下方此蓋單約一箇二十重華藏世界而辨寬廣也其最下一層但有一佛剎塵數世界圍繞以為眷屬次上層層增一至第二十層則有二十佛剎塵數世界以為眷屬此但就中央一箇剎種以明故華藏世界如倒懸浮屠下小上大故其狀如此然此但就世界海中十不可說佛剎微塵數世界種之一箇種耳不連彼十佛剎微塵之數也結云一一各有十佛剎次卷明右繞之剎乃明所管以辨漸漸寬廣耳長行具明中間一剎竟後卷則右旋十海
