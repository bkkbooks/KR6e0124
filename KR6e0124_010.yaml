body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈華藏世界品第五之三此下總明上卷所列十海之外亦各有所管十海其中一海又各管不可說佛剎微塵數現文但各說十即為百海亦各有剎種及所持之剎其布列從內至外故末後但結指最近輪圍山一海中有剎種亦二十重是則舉外該內是知內列十海亦各各為剎種今以一該餘者譯人省文耳如下所列十海皆依前內離垢𦦨藏等十海鱗次列去但記內海之名其文居然易了爾時普賢菩薩復告大眾言諸佛子彼離垢𦦨藏香水海東次有香水海名變化微妙身此海中有世界種名善布差別方次有香水海名金剛眼幢世界種名莊嚴法界橋次有香水海名種種蓮華妙莊嚴世界種名恒出十方變化次有香水海名無間寶王輪世界種名寶蓮華莖密雲次有香水海名妙香𦦨普莊嚴世界種名毗盧遮那變化行次有香水海名寶末閻浮幢世界種名諸佛護念境界次有香水海名一切色熾然光世界種名最勝光徧照次有香水海名一切莊嚴具境界世界種名寶𦦨燈如是等不可說佛剎微塵數香水海其最近輪圍山香水海名頗黎地世界種名常放光明以世界海清淨劫音聲為體此中最下方有世界名可愛樂淨光幢佛剎微塵數世界圍繞純一清淨佛號最勝三昧精進慧此上過十佛剎微塵數世界與金剛幢世界齊等有世界名香莊嚴幢十佛剎微塵數世界圍繞純一清淨佛號無障礙法界燈此上過三佛剎微塵數世界與娑婆世界齊等有世界名放光藏佛號徧法界無障礙慧明此上過七佛剎微塵數世界至此世界種最上方有世界名最勝身香二十佛剎微塵數世界圍繞純一清淨佛號覺分華諸佛子彼無盡光明輪香水海外次有香水海名具足妙光世界種名徧無垢次有香水海名光耀蓋世界種名無邊普莊嚴次有香水海名妙寶莊嚴世界種名香摩尼軌度形次有香水海名出佛音聲世界種名善建立莊嚴次有香水海名香幢須彌藏世界種名光明徧滿次有香水海名旃檀妙光明世界種名華𦦨輪次有香水海名風力持世界種名寶𦦨雲幢次有香水海名帝釋身莊嚴世界種名真珠藏次有香水海名平坦嚴淨世界種名毗瑠璃末種種莊嚴如是等不可說佛剎微塵數香水海其最近輪圍山香水海名妙樹華世界種名出生諸方廣大剎以一切佛摧伏魔音為體此中最下方有世界名𦦨炬幢佛號世間功德海此上過十佛剎微塵數世界與金剛幢世界齊等有世界名出生寶佛號師子力寶雲此上與娑婆世界齊等有世界名衣服幢佛號一切智海王於此世界種最上方有世界名寶瓔珞師子光明佛號善變化蓮華幢諸佛子彼金剛𦦨光明香水海外次有香水海名一切莊嚴具瑩飾幢世界種名清淨行莊嚴次有香水海名一切寶華光耀海世界種名功德相莊嚴次有香水海名蓮華開敷世界種名菩薩摩尼冠莊嚴次有香水海名妙寶衣服世界種名淨珠輪次有香水海名可愛華徧照世界種名百華雲照耀次有香水海名徧虗空大光明世界種名寶光普照次有香水海名妙華莊嚴幢世界種名金月眼瓔珞次有香水海名真珠香海藏世界種名佛光明次有香水海名寶輪光明世界種名善化現佛境界光明如是等不可說佛剎微塵數香水海其最近輪圍山香水海名無邊輪莊嚴底世界種名無量方差別以一切國土種種言說音為體此中最下方有世界名金剛華蓋佛號無盡相光明普門音此上過十佛剎微塵數世界有世界與金剛幢世界齊等名出生寶衣幢佛號福德雲大威勢此上與娑婆世界齊等有世界名眾寶具妙莊嚴佛號勝慧海於此世界種最上方有世界名日光明衣服幢佛號智日蓮華雲諸佛子彼帝青寶莊嚴香水海外次有香水海名阿修羅宮殿世界種名香水光所持次有香水海名寶師子莊嚴世界種名徧示十方一切寶次有香水海名宮殿色光明雲世界種名寶輪妙莊嚴次有香水海名出大蓮華世界種名妙莊嚴徧照法界次有香水海名燈𦦨妙眼世界種名徧觀察十方變化次有香水海名不思議莊嚴輪世界種名十方光明普名稱次有香水海名寶積莊嚴世界種名燈光照耀次有香水海名清淨寶光明世界種名須彌無能為礙風次有香水海名寶衣欄楯世界種名如來身光明如是等不可說佛剎微塵數香水海其最近輪圍山香水海名樹莊嚴幢世界種名安住帝網以一切菩薩智地音聲為體此中最下方有世界名妙金色佛號香𦦨勝威光此上過十佛剎微塵數世界與金剛幢世界齊等有世界名摩尼樹華佛號無礙普現此上與娑婆世界齊等有世界名毗瑠璃妙莊嚴佛號法自在堅固慧於此世界種最上方有世界名梵音妙莊嚴佛號蓮華開敷光明王諸佛子彼金剛輪莊嚴底香水海外次有香水海名化現蓮華處世界種名國土平正次有香水海名摩尼光世界種名徧法界無迷惑次有香水海名眾妙香日摩尼世界種名普現十方次有香水海名恒納寶流世界種名普行佛言音次有香水海名無邊深妙音世界種名無邊方差別次有香水海名堅實積聚世界種名無量處差別次有香水海名清淨梵音世界種名普清淨莊嚴次有香水海名旃檀欄楯音聲藏世界種名逈出幢次有香水海名妙香寶王光莊嚴世界種名普現光明力諸佛子彼蓮華因陀羅網香水海外次有香水海名銀蓮華妙莊嚴世界種名普徧行次有香水海名毗瑠璃竹密𦦨雲世界種名普出十方音次有香水海名十方光𦦨聚世界種名恒出變化分布十方次有香水海名出現真金摩尼幢世界種名金剛幢相次有香水海名平等大莊嚴世界種名法界勇猛旋次有香水海名寶華叢無盡光世界種名無邊淨光明次有香水海名妙金幢世界種名演說微密處次有香水海名光影徧照世界種名普莊嚴次有香水海名寂音世界種名現前垂布如是等不可說佛剎微塵數香水海其最近輪圍山香水海名密燄雲幢世界種名一切光莊嚴以一切如來道場眾會音為體於此最下方有世界名淨眼莊嚴佛號金剛月徧照十方此上過十佛剎微塵數世界與金剛幢世界齊等有世界名蓮華德佛號大精進善覺慧此上與娑婆世界齊等有世界名金剛密莊嚴佛號娑羅王幢此上過七佛剎微塵數世界有世界名淨海莊嚴佛號威德絕倫無能制伏諸佛子彼積集寶香藏香水海外次有香水海名一切寶光明徧照世界種名無垢稱莊嚴次有香水海名眾寶華開敷世界種名虗空相次有香水海名吉祥幄徧照世界種名無礙光普莊嚴次有香水海名旃檀樹華世界種名普現十方旋次有香水海名出生妙色寶世界種名勝幢周徧行次有香水海名普生金剛華世界種名現不思議莊嚴次有香水海名心王摩尼輪嚴飾世界種名示現無礙佛光明次有香水海名積集寶瓔珞世界種名淨除疑次有香水海名真珠輪普莊嚴世界種名諸佛願所流如是等不可說佛剎微塵數香水海其最近輪圍山香水海名閻浮檀寶藏輪世界種名普音幢以入一切智門音聲為體此中最下方有世界名華蘂𦦨佛號精進施此上過十佛剎微塵數世界與金剛幢世界齊等有世界名蓮華光明幢佛號一切功德最勝心王此上過三佛剎微塵數世界與娑婆世界齊等有世界名十力莊嚴佛號善出現無量功德王於此世界種最上方有世界名摩尼香山幢佛號廣大善眼淨除疑諸佛子彼寶莊嚴香水海外次有香水海名持須彌光明藏世界種名出生廣大雲次有香水海名種種莊嚴大威力境界世界種名無礙淨莊嚴次有香水海名密布寶蓮華世界種名最勝燈莊嚴次有香水海名依止一切寶莊嚴世界種名日光明網藏次有香水海名眾多嚴淨世界種名寶華依處次有香水海名極聰慧行世界種名最勝形莊嚴次有香水海名持妙摩尼峰世界種名普淨虗空藏次有香水海名大光徧照世界種名帝青炬光明次有香水海名可愛摩尼珠充滿徧照世界種名普吼聲如是等不可說佛剎微塵數香水海其最近輪圍山香水海名出帝青寶世界種名周徧無差別以一切菩薩震吼聲為體此中最下方有世界名妙勝藏佛號最勝功德慧此上過十佛剎微塵數世界與金剛幢世界齊等有世界名莊嚴相佛號超勝大光明此上與娑婆世界齊等有世界名瑠璃輪普莊嚴佛號須彌燈於此世界種最上方有世界名華幢海佛號無盡變化妙慧雲諸佛子彼金剛寶聚香水海外次有香水海名崇飾寶埤堄世界種名秀出寶幢次有香水海名寶幢莊嚴世界種名現一切光明次有香水海名妙寶雲世界種名一切寶莊嚴光明徧照次有香水海名寶樹華莊嚴世界種名妙華間飾次有香水海名妙寶衣莊嚴世界種名光明海次有香水海名寶樹峰世界種名寶𦦨雲次有香水海名示現光明世界種名入金剛無所礙次有香水海名蓮華普莊嚴世界種名無邊岸海淵次有香水海名妙寶莊嚴世界種名普示現國土藏如是等不可說佛剎微塵數香水海其最近輪圍山香水海名不可壞海世界種名妙輪間錯蓮華場以一切佛力所出音為體此中最下方有世界名最妙香佛號變化無量塵數光此上過十佛剎微塵數世界與金剛幢世界齊等有世界名不思議差別莊嚴門佛號無量智此上與娑婆世界齊等有世界名十方光明妙華藏佛號師子眼光𦦨雲於此最上方有世界名海音聲佛號水天光𦦨門諸佛子彼天城寶堞香水海外次有香水海名𦦨輪赫奕光世界種名不可說種種莊嚴次有香水海名寶塵路世界種名普入無量旋次有香水海名具一切莊嚴世界種名寶光徧照次有香水海名布眾寶網世界種名安布深密次有香水海名妙寶莊嚴幢世界種名世界海明了音次有香水海名月宮清淨影世界種名徧入因陀羅網次有香水海名一切鼓樂美妙音世界種名圓滿平正次有香水海名種種妙莊嚴世界種名淨密光𦦨雲次有香水海名周徧寶𦦨燈世界種名隨佛本願種種形如是等不可說佛剎微塵數香水海其最近輪圍山香水海名積集瓔珞衣世界種名化現妙衣以三世一切佛音聲為體此中最下方有香水海名因陀羅華藏世界名發生歡喜佛剎微塵數世界圍繞純一清淨佛號堅固智此上過十佛剎微塵數世界與金剛幢世界齊等有世界名寶網莊嚴十佛剎微塵數世界圍繞純一清淨佛號無量歡喜光此上過三佛剎微塵數世界與娑婆世界齊等有世界名寶蓮華師子座十三佛剎微塵數世界圍繞佛號最清淨不空聞此上過七佛剎微塵數世界至此世界種最上方有世界名寶色龍光明二十佛剎微塵數世界圍繞純一清淨佛號徧法界普照明此下列在外第一層旋繞十方各有十海之外鱗次而列從中至邊故十海盡頭最近輪圍山一海言有世界種是知在內九海皆有種剎但未列耳此舉東方一面如是其餘九方亦然經文甚明故後都結文云諸佛子如是十不可說佛剎微塵數香水海中有十不可說佛剎微塵數世界種皆依現一切菩薩形摩尼王幢莊嚴蓮華住各各莊嚴際無有間斷各各放寶色光明各各光明雲而覆其上各各莊嚴具各各劫差別各各佛出現各各演法海各各眾生徧充滿各各十方普趣入各各一切佛神力所加持此一一世界種中一切世界依種種莊嚴住遞相接連成世界網於蓮華藏莊嚴世界海種種差別周徧建立此都結之文云依現一切菩薩形摩尼王幢莊嚴蓮華而住者此摩尼幢王華即前初舉最中央香水海名無邊妙華光者此言摩尼王幢乃海底也然今結云皆依此海者正顯此諸剎海皆在蘂香之中金剛地面以經文遠隔故揭於此令觀者知所本耳爾時普賢菩薩欲重宣其義承佛威力而說頌言華藏世界海法界等無別莊嚴極清淨安住於虗空此世界海中剎種難思議一一皆自在各各無雜亂華藏世界海剎種善安布殊形異莊嚴種種相不同諸佛變化音種種為其體隨其業力見剎種妙嚴飾須彌山城網水旋輪圓形廣大蓮華開彼彼互圍繞山幢樓閣形旋轉金剛形如是不思議廣大諸剎種大海真珠𦦨光網不思議如是諸剎種悉在蓮華住一一諸剎種光網不可說光中說眾剎普徧十方海一切諸剎種所有莊嚴具國土悉入中普見無有盡剎種不思議世界無邊際種種妙嚴好皆由大仙力一切剎種中世界不思議或成或有壞或有已壞滅譬如林中葉有生亦有落如是剎種中世界有成壞譬如依樹林種種果差別如是依剎種種種眾生住譬如種子別生果各殊異業力差別故眾生剎不同譬如心王寶隨心見眾色眾生心淨故得見清淨剎譬如大龍王興雲徧虗空如是佛願力出生諸國土如幻師呪術能現種種事眾生業力故國土不思議譬如眾繢像畫師之所作如是一切剎心畫師所成眾生身各異隨心分別起如是剎種種莫不皆由業譬如見導師種種色差別隨眾生心行見諸剎亦然一切諸剎際周布蓮華網種種相不同莊嚴悉清淨彼諸蓮華網剎網所安住種種莊嚴事種種眾生居或有剎土中險惡不平坦由眾生煩惱於彼如是見雜染及清淨無量諸剎種隨眾生心起菩薩力所持或有剎土中雜染及清淨斯由業力起菩薩之所化有剎放光明離垢寶所成種種妙嚴飾諸佛令清淨一一剎種中劫燒不思議所現雖敗惡其處常堅固由眾生業力出生多剎土依止於風輪及以水輪住世界法如是種種見不同而實無有生亦復無滅壞一一心念中出生無量剎以佛威神力悉見淨無垢有剎泥土成其體甚堅硬黑闇無光照惡業者所居有剎金剛成雜染大憂怖苦多而樂少薄福之所處或有用鐵成或以赤銅作石山險可畏罪惡者充滿剎中有地獄眾生苦無救常在黑闇中𦦨海所燒然或復有畜生種種醜陋形由其自惡業常受諸苦惱或見閻羅界饑渴所煎逼登上大火山受諸極重苦或有諸剎土七寶所合成種種諸宮殿斯由淨業得汝應觀世間其中人與天淨業果成就隨時受快樂一一毛孔中億剎不思議種種相莊嚴未曾有迫隘眾生各各業世界無量種於中取著生受苦樂不同有剎眾寶成常放無邊光金剛妙蓮華莊嚴淨無垢有剎光為體依止光輪住金色旃檀香𦦨雲普照明有剎月輪成香衣悉周布於一蓮華內菩薩皆充滿有剎眾寶成色相無諸垢譬如天帝網光明恒照耀有剎香為體或是金剛華摩尼光影形觀察甚清淨或有難思剎華旋所成就化佛皆充滿菩薩普光明或有清淨剎悉是眾華樹妙枝布道場蔭以摩尼雲有剎淨光照金剛華所成有是佛化音無邊列成網有剎如菩薩摩尼妙寶冠或有如座形從化光明出或是旃檀末或是眉間光或佛光中音而成斯妙剎有見清淨剎以一光莊嚴或見多莊嚴種種皆奇妙或用十國土妙物作嚴飾或以千土中一切為莊校或以億剎物莊嚴於一土種種相不同皆如影像現不可說土物莊嚴於一剎各各放光明如來願力起或有諸國土願力所淨治一切莊嚴中普見眾剎海諸修普賢願所得清淨土三世剎莊嚴一切於中現佛子汝應觀剎種威神力未來諸國土如夢悉令見十方諸世界過去國土海咸於一剎中現像猶如化三世一切佛及以其國土於一剎種中一切悉觀見一切佛神力塵中現眾土種種悉明見如影無真實或有眾多剎其形如大海或如須彌山世界不思議有剎善安住其形如帝網或如樹林形諸佛滿其中或作寶輪形或有蓮華狀八隅備眾飾種種悉清淨或有如座形或復有三隅或如佉勒迦城郭梵王身或如天主髻或有如半月或如摩尼山或如日輪形或有世界形譬如香海旋或作光明輪佛昔所嚴淨或有輪輞形或有壇墠形或如佛毫相肉髻廣長眼或有如佛手或如金剛杵或如𦦨山形菩薩悉周徧或如師子形或如海蚌形無量諸色相體性各差別於一剎種中剎形無有盡皆由佛願力護念得安住有剎住一劫或住於十劫乃至過百千國土微塵數或於一劫中見剎有成壞或無量無數乃至不思議或有剎有佛或有剎無佛或有唯一佛或有無量佛國土若無佛他方世界中有佛變化來為現諸佛事歿天與降神處胎及出生降魔成正覺轉無上法輪隨眾生心樂示現種種相為轉妙法輪悉應其根欲一一佛剎中一佛出興世經於億千歲演說無上法眾生非法器不能見諸佛若有心樂者一切處皆見一一剎土中各有佛興世一切剎中佛億數不思議此中一一佛現無量神變悉徧於法界調伏眾生海有剎無光明黑闇多恐懼苦觸如刀劒見者自酸毒或有諸天光或有宮殿光或日月光明剎網難思議有剎自光明或樹放淨光未曾有苦惱眾生福力故或有山光明或有摩尼光或以燈光照悉眾生業力或有佛光明菩薩滿其中有是蓮華光𦦨色甚嚴好有剎華光照有以香水照塗香燒香照皆由淨願力有以雲光照摩尼蚌光照佛神力光照能宣悅意聲或以寶光照或金剛𦦨照淨音能遠震所至無眾苦或有摩尼光或是嚴具光或道場光明照耀眾會中佛放大光明化佛滿其中其光普照觸法界悉周徧有剎甚可畏嘷叫大苦聲其聲極酸楚聞者生厭怖地獄畜生道及以閻羅處是濁惡世界恒出憂苦聲或有國土中常出可樂音悅意順其教斯由淨業得或有國土中恒聞帝釋音或聞梵天音一切世主音或有諸剎土雲中出妙聲寶海摩尼樹及樂音徧滿諸佛圓光內化聲無有盡及菩薩妙音周聞十方剎不可思議國普轉法輪聲願海所出聲修行妙音聲三世一切佛出生諸世界名號皆具足音聲無有盡或有剎中聞一切佛力音地度及無量如是法皆演普賢誓願力億剎演妙音其音若雷震住劫亦無盡佛於清淨國示現自在音十方法界中一切無不聞此下重頌有一百一偈初一偈明華藏自體次一百偈頌所持剎網疏有科釋皆長行義茲不備錄補義曰然上三品所列無邊剎海皆從二種因緣而成一以諸佛如來行願力所成二以眾生業力所感故剎有淨穢之不同總彰法界以緣起為宗也如上所列無邊世界以成剎網安住虗空此顯事事無盡重重之境而六相十玄之所明者唯此而已初菩薩念請三十句果問即此二品業已答盡疏雖云經來未盡其所攝因果盡在此矣所言海者乃如來性海亦云智海然華藏海乃性海智海隨緣所變者以從諸佛大願力風眾生妄想風以此二種緣成此華藏正顯法界為如來藏亦名識藏總之華藏海即如來藏海其一一剎種即諸眾生各各八識含藏種子所感其餘一一世界皆心所善惡業行所感故淨穢不同所謂三界唯心萬法唯識應觀法界性一切唯心造以法界不可思議諸佛神通妙用不可思議眾生業力不可思議然餘諸教所明者但云三界唯心大約指一娑婆世界中之三界且此娑婆乃是最中央一箇剎種所持之第十三層中之一世界耳尚未盡一層所列之世界如阿閦極樂乃同在此一層東西之邊亦未盡此層量但指極樂云去娑婆十萬億佛土耳而眾生狹陋之習即以為遠況二十重之華藏乎然此一華藏在法性空中如一塵耳況盡剎海之量乎且廣大無邊剎海中所有十法界聖凡依正種種微細不同唯佛智盡知盡見而二乘人但就娑婆之中一箇三界而厭離之心如此安能測佛智慧知佛境界乎故無怪乎在座如盲聾也如此廣大果報乃我本師毗盧遮那曠劫修因之所感得今先舉之以勸大心眾生生信樂心修而取證故後三賢十聖等覺所修行門皆稱法界性修欲證此也其後入法界品依人證入其所證者亦證此無盡法界方為極證然善財參五十三知識但各證一解脫門直入普賢身一毛孔中徹證此無邊之法界所謂因圓不踰於毛孔如此廣大微妙難思法門又豈可與淺智而言之哉
