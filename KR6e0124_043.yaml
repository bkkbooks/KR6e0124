body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈十定品第二十七之四佛子云何為菩薩摩訶薩無礙輪三昧第十無礙輪三昧初總標亦初徵次釋後結佛子菩薩摩訶薩入此三昧時住無礙身業無礙語業無礙意業住無礙佛國土得無礙成就衆生智獲無礙調伏衆生智放無礙光明現無礙光明網示無礙廣大變化轉無礙清淨法輪得菩薩無礙自在二釋中三初明入時方便二佛子菩薩摩訶薩住此三昧已下明入己智用三佛子菩薩摩訶薩入普賢所住下定滿成益今初有二十二句兼顯定名初十一句因用無礙是無礙義後普入下有十一句住果圓滿即是輪義今此段中即此無礙無所不摧亦即輪義初三句三業無礙次句器世間無礙次二句衆生世間無礙餘句智正覺無礙普入諸佛力普住諸佛智作佛所作淨佛所淨現佛神通令佛歡喜行如來行住如來道常得親近無量諸佛作諸佛事紹諸佛種後住果中二智通權實故云普住三作利樂事四淨二障種七智契佛境餘七可知佛子菩薩摩訶薩住此三昧已觀一切智總觀一切智別觀一切智隨順一切智顯示一切智攀緣一切智見一切智總見一切智別見一切智第二入己智用中四一攝佛功德二證入諸法三普德無盡四結示勸修初中即攝如來二十一種殊勝功德以此位等佛故其間或全同佛相或有約因似而次第無差於中三初總明妙悟皆滿次別顯二十一德後顯德勝能今初十句初句標滿時餘九顯滿相然一切智若對種智即是根本若直語佛智則通權實今此顯通於中初三句始觀言觀一切智者標也云何觀觀有二種一總觀謂權實齊觀故二別觀此是實此是權權中有多差別皆審照了故次三句中順亦初句標次云何隨順由前總觀故頓能顯示由前別觀故各各攀緣後三句終契釋同前觀但前觀察今證見分明耳於普賢菩薩廣大願廣大心廣大行廣大所趣廣大所入廣大光明廣大出現廣大護念廣大變化廣大道二別明二十一種功德分二十段後二合故今初第一明二行永絶即於所知一向無障轉功德然有二義一謂非如二乘有無智故二不同凡大現行生死起諸雜染不同二乘現行涅槃棄利樂事世尊無彼今菩薩亦無文中廣顯利樂即不同二乘皆與智俱即不同凡夫就文分二先總明大用常恆二佛子此菩薩有一蓮華下別顯一用前中二先法説後喻明今初法説中二先正明後徵釋今初先明行體不斷不退無休無替無倦無捨無散無亂常增進恆相續次辨常恆何以故此菩薩摩訶薩於諸法中成就大願發行大乘入於佛法大方便海以勝願力於諸菩薩所行之行智慧明照皆得善巧具足菩薩神通變化善能護念一切衆生如去來今一切諸佛之所護念於諸衆生恆起大悲成就如來不變異法二徵釋中徵意云何以得此智滿行常釋意云願行善成智慧善巧故佛子譬如有人以摩尼寶置色衣中其摩尼寶雖同衣色不捨自性第二喻顯中四初喻二合三徵四釋今初摩尼寶置色衣中即總喻菩薩心智置佛智中雖同衣色喻前智滿十句故合云觀一切智等不捨自性喻前行常二十句菩薩摩訶薩亦復如是成就智慧以為心寶觀一切智普皆明現然不捨於菩薩諸行二合如喻辨何以故三徵意云何得已能滿智而不斷行耶菩薩摩訶薩發大誓願利益一切衆生度脫一切衆生承事一切諸佛嚴淨一切世界安慰衆生深入法海為淨衆生界現大自在給施衆生普照世間入於無邊幻化法門不退不轉無疲無厭四釋意云菩薩無障礙願法應爾故窮盡生界益無疲厭文中二先法説佛子譬如虗空持衆世界若成若住無厭無倦無羸無朽無散無壞無變無異無有差別不捨自性何以故虗空自性法應爾故菩薩摩訶薩亦復如是立無量大願度一切衆生心無厭倦後轉以喻況於中三喻皆喻利生無厭各有法合一虗空持剎喻喻大願法爾故無厭佛子譬如涅槃去來現在無量衆生於中滅度終無厭倦何以故一切諸法本性清淨是謂涅槃云何於中而有疲厭菩薩摩訶薩亦復如是為欲度脫一切衆生皆令出離而現於世云何而起疲厭之心二涅槃普滅喻喻為淨衆生故無厭上二喻悲佛子如薩婆若能令過去未來現在一切菩薩於諸佛家已現當生乃至令成無上菩提終不疲厭何以故一切智與法界無二故於一切法無所著故菩薩摩訶薩亦復如是其心平等住一切智云何而有疲厭之心三佛智普成喻喻能所不二故無厭此一喻智既非愛見之悲何有厭乎佛子此菩薩摩訶薩有一蓮華其華廣大盡十方際以不可説葉不可説寶不可説香而為莊嚴其不可説寶復各示現種種衆寶清淨妙好極善安住其華常放衆色光明普照十方一切世界無所障礙真金為網彌覆其上寶鐸徐搖出微妙音其音演暢一切智法第二別顯一用中二初明依果殊勝後菩薩摩訶薩於此華下正報自在前中二先明相嚴過前十地故窮十方際此大蓮華具足如來清淨莊嚴一切善根之所生起吉祥為表神力所現有十千阿僧祇清淨功德菩薩妙道之所成就一切智心之所流出十方佛影於中顯現世間瞻仰猶如佛塔衆生見者無不禮敬從能了幻正法所生一切世間不可為喻後辨德嚴自內而觀量周法界自外而觀許衆生見乃即小之大也菩薩摩訶薩於此華上結加趺坐其身大小與華相稱二正報中二明身大小一切諸佛神力所加令菩薩身一一毛孔各出百萬億那由他不可説佛剎微塵數光明一一光明現百萬億那由他不可説佛剎微塵數摩尼寶其寶皆名普光明藏種種色相以為莊嚴無量功德之所成就衆寶及華以為羅網彌覆其上散百千億那由他殊勝妙香無量色相種種莊嚴復現不思議寶莊嚴蓋以覆其上一一摩尼寶悉現百萬億那由他不可説佛剎微塵數樓閣一一樓閣現百萬億那由他不可説佛剎微塵數蓮華藏師子之座一一師子座現百萬億那由他不可説佛剎微塵數光明一一光明現百萬億那由他不可説佛剎微塵數色相一一色相現百萬億那由他不可説佛剎微塵數光明輪一一光明輪現百萬億那由他不可説佛剎微塵數毗盧遮那摩尼寶華一一華現百萬億那由他不可説佛剎微塵數臺一一臺現百萬億那由他不可説佛剎微塵數佛一一佛現百萬億那由他不可説佛剎微塵數神變一一神變淨百萬億那由他不可説佛剎微塵數衆生衆一一衆生衆中現百萬億那由他不可説佛剎微塵數諸佛自在一一自在雨百萬億那由他不可説佛剎微塵數佛法一一佛法有百萬億那由他不可説佛剎微塵數修多羅一一修多羅説百萬億那由他不可説佛剎微塵數法門一一法門有百萬億那由他不可説佛剎微塵數金剛智所入法輪差別言辭各別演説一一法輪成熟百萬億那由他不可説佛剎微塵數衆生界一一衆生界有百萬億那由他不可説佛剎微塵數衆生於佛法中而得調伏後明佛加放光有二十重後後重中皆倍前前百萬億那由他不可説佛剎微塵數倍則數難量矣佛子菩薩摩訶薩住此三昧示現如是神通境界無量變化悉知如幻而不染著第二明達無相法即同諸如來於最清淨真如能入功德初結前生後達無相故不染安住無邊不可説法自性清淨法界實相如來種性無礙際中無去無來非先非後甚深無底現量所得以智自入不由他悟心不迷亂亦無分別後正顯安住即是入義謂此真如非有非無故云無邊定有定無即是邊故不可説法即離言真如其法界實相及無礙際皆真如異名而云如來種性諸佛以無性真如而為性故出現品云皆同一性所謂無性法華云知法常無性佛種從緣起無去來等重顯真如即是中道故深無底現量已下別明能入之義為去來今一切諸佛之所稱讚從諸佛力之所流出入於一切諸佛境界體性如實淨眼現證慧眼普見成就佛眼為世明燈行於智眼所知境界廣能開示微妙法門第三明住於佛住德謂佛無功用常住聖天梵住故文中先三世佛讚文通前後二段從諸佛力下正顯其義謂入一切佛境即聖天等所住境也淨眼現證下明能住相十眼圓明而安住故成菩提心趣勝丈夫於諸境界無有障礙入智種性出生諸智離世生法而現受生神通變化方便調伏如是一切無非善巧第四明得佛平等德謂佛佛相望有平等故文即為三初明所依平等謂諸佛皆依清淨故文中始發菩提心終成種智出生智用皆所依也次離世生法下明意樂平等同以調生為意樂故後神通變化下作平等業同作受用變化業故功德解欲悉皆清淨最極微妙具足圓滿智慧廣大猶如虗空善能觀察衆聖境界信行願力堅固不動功德無盡世所稱歎於一切佛所觀之藏大菩提處一切智海集衆妙寶為大智者猶如蓮華自性清淨衆生見者皆生歡喜咸得利益智光普照見無量佛淨一切法第五明到無障處德以修一切障對治故福智皆淨離於二障文中初二句功德次二句智慧各上句障淨下句德滿次二句重顯功德餘四句重顯智慧所行寂靜於諸佛法究竟無礙恆以方便住佛菩提功德行中而得出生具菩薩智為菩薩首一切諸佛共所護念得佛威神成佛法身念力難思於境一緣而無所緣其行廣大無相無礙等于法界無量無邊所證菩提猶如虗空無有邊際無所縛著第六明不可轉法謂教證二法他不能轉文中初二句略標教證謂寂靜證也諸佛法教也恆以下別顯教念力下重顯證既如空無著等他安能轉耶於諸世間普作饒益一切智海善根所流悉能通達無量境界已善成就清淨施法住菩薩心淨菩薩種能隨順生諸佛菩提於諸佛法皆得善巧具微妙行成堅固力第七明所行無礙德謂雖於世間作利樂事世間八法不能礙也文中住菩薩心成堅固力即不礙之因也一切諸佛自在威神衆生難聞菩薩悉知入不二門住無相法雖復永捨一切諸相而能廣説種種諸法隨諸衆生心樂欲解悉使調伏咸令歡喜第八明立不思議德謂安立正法凡愚不能思也文中初總顯一切教法皆是如來威力之所建立菩薩能知返顯凡夫不思入不二下別顯安立難思之相謂依無相而廣説故隨欲解之多端故並難思也法界為身無有分別智慧境界不可窮盡志常勇猛心恆平等見一切佛功德邊際了一切劫差別次第第九明普見三世以身心等於法界故於三世記別無差開示一切法安住一切剎嚴淨一切諸佛國土顯現一切正法光明演去來今一切佛法示諸菩薩所住之處為世明燈生諸善根永離世間常生佛所第十明身恆充滿一切國土謂為開法故示現受用變化之身遍諸世界而為利樂得佛智慧明了第一一切諸佛皆共攝受已入未來諸佛之數從諸善友而得出生所有志求皆無不果第十一明智恆明達一切諸法謂於境善決能斷他疑故具大威德住增上意隨所聽聞咸能善説第十二明了一切行謂具增上意樂能了有情意樂性行如其所應而為現身即有威德亦為開示聞法善根住實際輪於一切法心無障礙不捨諸行離諸分別第十三明除一切疑謂聲聞人言其全無少分善根今能開示令知當生如來妙智故心無障礙於一切法心無動念得智慧明滅諸癡暗悉能明照一切佛法不壞諸有而生其中了知一切諸有境界從本已來無有動作身語意業皆悉無邊第十四明無能測身然有二義一謂其身非虗妄分別所起無煩惱業生離染故不可測初一行經顯之二其身雖無分別如摩尼珠然由佛增上及衆生勝解力見金色等而佛無有分別即不壞諸有下經文顯之雖隨世俗演説種種無量文字而恆不壞離文字法深入佛海知一切法但有假名於諸境界無繫無著第十五明一切菩薩等所求智謂菩薩以無量文字調伏有情要依佛所聞法為先獲得妙智故諸菩薩等皆求也了一切法空無所有所修諸行從法界生第十六明到佛無二究竟彼岸謂了一切法空法界等即佛無二法身依此法身修波羅蜜多等行而得圓滿為從法界生猶如虗空無相無形深入法界隨順演説於一境門生一切智第十七明具足如來平等解脫謂一一如來所現身土皆遍法界猶如虗空無相無形不相障礙而不相雜隨其化緣現各別故故文云隨順演説於一境門生一切智慧各順一一境故觀十力地以智修學智為橋梁至薩婆若以智慧眼見法無礙善入諸地第十八即證無中邊佛平等地謂三種佛身平等遍滿無有中邊之異故至薩婆若即自受用智為橋梁即通變化見法無礙即是法身善入諸地即佛十地也知種種義一一法門悉得明了第十九明盡於法界謂此法界最清淨故能起等流契經等法極此法界於當來世作諸有情隨應利樂所有大願靡不成就第二十即等虗空界窮未來際無有盡故方云成就前第二入己智用中一攝佛功德竟佛子菩薩摩訶薩以此開示一切如來無差別性此是無礙方便之門此能出生菩薩衆會此法唯是三昧境界此能勇進入薩婆若此能開顯諸三昧門此能無礙普入諸剎此能調伏一切衆生此能住於無衆生際此能開示一切佛法於此境界皆無所得第三顯德勝能中二初總明後雖一切下別顯今初先標謂用此會事之德開示佛平等性者同有二十一種功德故此是下總歎前德雖一切時演説開示而恆遠離妄想分別雖知諸法皆無所作而能示現一切作業雖知諸佛無有二相而能顯示一切諸佛雖知無色而演説諸色雖知無受而演説諸受雖知無想而演説諸想雖知無行而演説諸行雖知無識而演説諸識恆以法輪開示一切雖知法無生而常轉法輪雖知法無差別而説諸差別門雖知諸法無有生滅而説一切生滅之相雖知諸法無粗無細而説諸法粗細之相雖知諸法無上中下而能宣説最上之法雖知諸法不可言説而能演説清淨言辭雖知諸法無內無外而説一切內外諸法雖知諸法不可了知而説種種智慧觀察雖知諸法無有真實而説出離真實之道雖知諸法畢竟無盡而能演説盡諸有漏雖知諸法無違無諍然亦不無自他差別雖知諸法畢竟無師而常尊敬一切師長雖知諸法不由他悟而常尊敬諸善知識雖知法無轉而轉法輪雖知法無起而示諸因緣雖知諸法無有前際而廣説過去雖知諸法無有後際而廣説未來雖知諸法無有中際而廣説現在雖知諸法無有作者而説諸作業雖知諸法無有因緣而説諸集因雖知諸法無有等比而説平等不平等道雖知諸法無有言説而決定説三世之法雖知諸法無有所依而説依善法而得出離雖知法無身而廣説法身雖知三世諸佛無邊而能演説唯有一佛雖知法無色而現種種色雖知法無見而廣説諸見雖知法無相而説種種相雖知諸法無有境界而廣宣説智慧境界雖知諸法無有差別而説行果種種差別雖知諸法無有出離而説清淨諸出離行雖知諸法本來常住而説一切諸流轉法雖知諸法無有照明而恆廣説照明之法二別顯中且廣初無礙之義自有四十一句初句有不礙無以有是無之有故後四十句明無不礙有以無是有之無故又前是二而不二後是不二而二及寂用相即等佛子菩薩摩訶薩入如是大威德三昧智輪則能證得一切佛法則能趣入一切佛法則能成就則能圓滿則能積集則能清淨則能安住則能了達與一切法自性相應大文第二證入諸法用中四初明證入二離證相三徵四釋今初十句初句明能證之定三昧智輪應云智輪三昧因定最勝名大威德則能下顯所證法謂證佛果法初句總無為果曰證有為果曰得餘句別趣入釋證成就釋得圓滿通二積集約因圓清淨謂障盡定能安住慧能了達定慧兩亡則自性相應為證入也而此菩薩摩訶薩不作是念有若干諸菩薩若干菩薩法若干菩薩究竟若干幻究竟若干化究竟若干神通成就若干智成就若干思惟若干證入若干趣向若干境界二明離證相以無念方證故尚不得念無礙慧境況所證法有若干耶何以故三徵意有三一何以證而無念耶二何以一定多果耶三何以因定得果法耶菩薩三昧如是體性如是無邊如是殊勝故四釋中二初略別釋後此三昧下廣以通釋今初別釋三徵一體性離念故二定體雖一用無邊故三以殊勝故因得果法此三昧種種境界種種威力種種深入後廣通釋者謂文廣義通通明上三句於中二先總標境是定之所緣深入是定證契威力是定之用三皆定體皆言種種故上云無邊具三又多故云殊勝所謂入不可説智門入離分別諸莊嚴入無邊殊勝波羅蜜入無數禪定入百千億那由他不可説廣大智入見無邊佛勝妙藏入於境界不休息入清淨信解助道法入諸根猛利大神通入於境界心無礙入見一切佛平等眼入積集普賢勝智行入住那羅延妙智身入説如來智慧海入起無量種自在神變入生一切佛無盡智門入住一切佛現前境界入淨普賢菩薩自在智入開示無比普門智入普知法界一切微細境界入普現法界一切微細境界入一切殊勝智光明入一切自在邊際入一切辨才法門際入遍法界智慧身入成就一切處遍行道入善住一切差別三昧入知一切諸佛心後別顯有二十八句句皆有上三義如初句入即深入義不可説即無邊義智門即境界義知智在説説為智門二入功德智慧不二之莊嚴六入不空如來藏七悲智之境觀度無休餘可知上證入諸法竟佛子此菩薩摩訶薩住普賢行念念入百億不可説三昧然不見普賢菩薩三昧及佛境界莊嚴前際第三普德無盡於中四一正顯無盡謂非唯上列諸用又能念念入多三昧亦不能盡何以故二徵意云既能念念入多何以不盡知一切法究竟無盡故知一切佛剎無邊故知一切衆生界不思議故知前際無始故知未來無窮故知現在盡虗空遍法界無邊故知一切諸佛境界不可思議故知一切菩薩行無數故知一切諸佛辨才所説境界不可説無邊故知一切幻心所緣法無量故三釋意云此三昧緣境究竟無盡故文有十句初總餘別佛子如如意珠隨有所求一切皆得求者無盡意皆滿足而珠勢力終不匱止菩薩摩訶薩亦復如是入此三昧知心如幻出生一切諸法境界周遍無盡不匱不息何以故菩薩摩訶薩成就普賢無礙行智觀察無量廣大幻境猶如影像無增減故四喻況於中有三喻喻前無盡各有喻合前二合中復加徵釋一如意隨求喻喻定心隨應出法無盡徵意云何以出法無盡不匱息耶釋意云了多幻境皆同影像緣至則生何有盡耶體無增減何有匱息耶佛子譬如凡夫各別生心已生現生及以當生無有邊際無斷無盡其心流轉相續不絶不可思議菩薩摩訶薩亦復如是入此普幻門三昧無有邊際不可測量何以故了達普賢菩薩普幻無量法故二生心各別喻喻緣境無盡佛子譬如難陀跋難陀摩那斯龍王及餘大龍降雨之時滴如車軸無有邊際雖如是雨雲終不盡此是諸龍無作境界三龍王降雨喻喻入法無盡於中初喻後合菩薩摩訶薩亦復如是住此三昧入普賢菩薩諸三昧門智門法門見諸佛門往諸方門心自在門加持門神變門神通門幻化門諸法如幻門不可説不可説諸菩薩充滿門親近不可説不可説佛剎微塵數如來正覺門入不可説不可説廣大幻網門知不可説不可説差別廣大佛剎門知不可説不可説有體性無體性世界門知不可説不可説衆生想門知不可説不可説時差別門知不可説不可説世界成壞門知不可説不可説覆住仰住諸佛剎門合中分三初正明入法合滴如車軸謂入廣大法故初句總智門下別皆云門者自他遊入故幻網者一切皆幻互為緣起相交映故世界性空故無體隨緣染淨故有體又法性土故有體事土從緣故無體又淨剎順理故有體染剎妄成故無體於一念中皆如實知二入法時分合前降雨之時如是入時無有邊際無有窮盡不疲不厭不斷不息無退無失於諸法中不住非處恆正思惟不沉不舉三明入時相用合前無邊無盡無作境界於中三初十句明其相狀次求一切智下明其業用三徵釋所由今初初二句合雲無邊雨無盡不疲下合無作境無作即無功用故身不疲心不厭不永斷不暫息未入常入故不退已入永常故不失無法非所入門故不住非處無心不契故恆正思惟不沉不舉正是入相求一切智常無退捨為一切佛剎照世明燈轉不可説不可説法輪以妙辨才咨問如來無窮盡時示成佛道無有邊際調伏衆生恆無廢捨常勤修習普賢行願未曾休息示現無量不可説不可説色相身無有斷絶二業用者隨入一一門皆有斯業門門即不可盡何以故三徵釋中徵意有二一云菩薩豈無行滿成佛何以業用無際限耶二云説橫顯無盡可爾何以一一門中用即無盡後釋意亦二一云菩薩本為衆生生無盡故用亦無盡二釋後意云生及世界既如虗空故隨一門即用無盡如芥子中空由此不但一門成多一念亦能成多事矣譬如然火隨所有緣於爾所時火起不息釋文中三初喻明火隨薪緣薪多火在喻菩薩生界緣廣用無有涯菩薩摩訶薩亦復如是觀察衆生界法界世界猶如虗空無有邊際乃至能於一念之頃往不可説不可説佛剎微塵數佛所一一佛所入不可説不可説一切智種種差別法令不可説不可説衆生界出家為道勤修善根究竟清淨令不可説不可説菩薩於普賢行願未決定者而得決定安住普賢智慧之門以無量方便入不可説不可説三世成住壞廣大差別劫於不可説不可説成住壞世間差別境界起於爾所大悲大願調伏無量一切衆生悉使無餘次合可知何以故此菩薩摩訶薩為欲度脫一切衆生修普賢行生普賢智滿足普賢所有行願後轉徵釋徵意云菩薩何以起多業用釋意云為普度生滿普願故上普德無盡竟是故諸菩薩應於如是種類如是境界如是威德如是廣大如是無量如是不思議如是普照明如是一切諸佛現前住如是一切如來所護念如是成就往昔善根如是其心無礙不動三昧之中大文第四結示勸修中二初結勸勤修二佛子至如是修行下總結顯示今初謂菩薩心窮生界定用無涯故應修習文中二初舉所修之法後勤加下示勤修相今初是故諸菩薩五字該下二段其所修法有十一句末後一句舉定名體前之十句別明無礙輪之業用於中例牒前來諸文初種類者業用非一故如合龍喻中入法衆多是種類義二境界者即定所緣如前妄念緣境喻三威德者即通顯定用如前珠能出生喻四此上三種皆悉廣大一一無涯如前不見三昧前際故五數不可極如前入不可説智門等即無邊故六並絶心言如前不作是念有若干菩薩等故七皆與智俱如前雖知諸法無作而能示現一切作業是權實明照故八體用齊於佛境則諸佛現前如前觀十力地至薩婆若故九如來護念如前諸佛攝受已入未來諸佛數故十非但現用自在亦成昔善如前功德解欲悉清淨故勤加修習離諸熱惱無有疲厭心不退轉立深志樂勇猛無怯順三昧境界入難思智地不依文字不著世間不取諸法不起分別不染著世事不分別境界二示修相中二初略示離過進德不依文字下別示離過進德於中先離過於諸法智但應安住不應稱量所謂親近一切智悟解佛菩提成就法光明施與一切衆生善根於魔界中拔出衆生令其得入佛法境界令不捨大願勤觀出道增廣淨境成就諸度於一切佛深生信解常應觀察一切法性無時暫捨應知自身與諸法性普皆平等應當明解世間所作示其如法智慧方便應常精進無有休息應觀自身善根鮮少應勤增長他諸善根應自修行一切智道應勤增長菩薩境界應樂親近諸善知識應與同行而共止住應不分別佛應不捨離念應常安住平等法界應知一切心識如幻應知世間諸行如夢應知諸佛願力出現猶如影像應知一切諸廣大業猶如變化應知言語悉皆如響應觀諸法一切如幻應知一切生滅之法皆如音聲應知所往一切佛剎皆無體性應為請問如來佛法不生疲厭應為開悟一切世間勤加教誨而不捨離應為調伏一切衆生知時説法而不休息後進德文並可知佛子菩薩摩訶薩如是修行普賢之行如是圓滿菩薩境界如是通達出離之道如是受持三世佛法如是觀察一切智門如是思惟不變異法如是明潔增上志樂如是信解一切如來如是了知佛廣大力如是決定無所礙心如是攝受一切衆生二總結顯示者遠亦通結前來諸段近則逆結上來進德之文上大文第二明入己智用竟下三定滿成益佛子菩薩摩訶薩入普賢菩薩所住如是大智慧三昧時大文第三定滿成益文屬此定意兼前九於中四一外感佛加益二內德圓滿益三上攝佛果益四正同佛果益初中五一辨所加依謂在定時故十方各有不可説不可説國土一一國土各有不可説不可説佛剎微塵數如來名號一一名號各有不可説不可説佛剎微塵數諸佛而現其前二顯能加者與如來念力令不忘失如來境界與一切法究竟慧令入一切智與知一切法種種義決定慧令受持一切佛法趣入無礙與無上佛菩提令入一切智開悟法界與菩薩究竟慧令得一切法光明無諸黑暗與菩薩不退智令知時非時善巧方便調伏衆生與無障礙菩薩辨才令悟解無邊法演説無盡與神通變化力令現不可説不可説差別身無邊色相種種不同開悟衆生與圓滿言音令現不可説不可説差別音聲種種言辭開悟衆生與不唐捐力令一切衆生若得見形若得聞法皆悉成就無空過者三正顯加相佛子菩薩摩訶薩如是滿足普賢行故得如來力淨出離道滿一切智以無礙辨才神通變化究竟調伏一切衆生具佛威德淨普賢行住普賢道盡未來際為欲調伏一切衆生轉一切佛微妙法輪四加以成用何以故佛子此菩薩摩訶薩成就如是殊勝大願諸菩薩行則為一切世間法師則為一切世間法日則為一切世間智月則為一切世間須彌山王嶷然高出堅固不動則為一切世間無涯智海則為一切世間正法明燈普照無邊相續不斷為一切衆生開示無邊清淨功德皆令安住功德善根順一切智大願平等修習普賢廣大之行常能勸發無量衆生住不可説不可説廣大行三昧現大自在五徵釋所由徵意云普行既滿何須盡未來際行調生行耶釋意云無障礙願法應爾故已成大願真能調故佛子此菩薩摩訶薩獲如是智證如是法於如是法審住明見得如是神力住如是境界現如是神變起如是神通常安住大悲常利益衆生開示衆生安隱正道建立福智大光明幢證不思議解脫住一切智解脫到諸佛解脫彼岸學不思議解脫方便門已得成就入法界差別門無有錯亂於普賢不可説不可説三昧遊戲自在住師子奮迅智心意無礙第二內德圓滿益中四初牒前住定之因圓通牒上文其心恆住十大法藏何者為十所謂住憶念一切諸佛住憶念一切佛法住調伏一切衆生大悲住示現不思議清淨國土智住深入諸佛境界決定解住去來現在一切佛平等相菩提住無礙無著際住一切法無相性住去來現在一切佛平等善根住去來現在一切如來法界無差別身語意業先導智住觀察三世一切諸佛受生出家詣道場成正覺轉法輪般涅槃悉入剎那際佛子此十大法藏廣大無量不可數不可稱不可思不可説無窮盡難忍受一切世智無能稱述二別示所滿十表無盡佛子此菩薩摩訶薩已到普賢諸行彼岸證清淨法志力廣大開示衆生無量善根增長菩薩一切勢力於念念頃滿足菩薩一切功德成就菩薩一切諸行得一切佛陀羅尼法受持一切諸佛所説雖常安住真如實際而隨一切世俗言説示現調伏一切衆生三總結究竟何以故菩薩摩訶薩住此三昧法如是故四徵釋所由徵意云菩薩何以能滿爾所德耶釋意可知佛子菩薩摩訶薩以此三昧得一切佛廣大智得巧説一切廣大法自在辨才得一切世中最為殊勝清淨無畏法得入一切三昧智得一切菩薩善巧方便得一切法光明門到安慰一切世間法彼岸知一切衆生時非時照十方世界一切處令一切衆生得勝智作一切世間無上師安住一切諸功德開示一切衆生清淨三昧令入最上智第三上攝佛果益中三初正明何以故菩薩摩訶薩如是修行則利益衆生則增長大悲則親近善知識則見一切佛則了一切法則詣一切剎則入一切方則入一切世則悟一切法平等性則知一切佛平等性則住一切智平等性次徵徵意云上是佛德何能攝耶後菩薩摩訶薩下釋意云住此三昧能所作無餘同如來故於中三初正顯無餘之業故皆云一切於此法中作如是業不作餘業住未足心住不散亂心住專一心住勤修心住決定心住不變異心如是思惟如是作業如是究竟二明作業行相初句總顯依前而作更不作餘不足之業住未足等顯其作義如是已下總結前作佛子菩薩摩訶薩無異語異作有如語如作三逐難重釋謂廣前作如是業不作餘業文中三初略標舉其中如作通身及意何以故譬如金剛以不可壞而得其名終無有時離於不壞菩薩摩訶薩亦復如是以諸行法而得其名終無有時離諸行法次徵徵意云何以不作餘耶後廣釋釋意云若作異前非菩薩故文有十喻即為十段各自有合一金剛不壞喻喻行體堅牢譬如真金以有妙色而得其名終無有時離於妙色菩薩摩訶薩亦復如是以諸善業而得其名終無有時離諸善業二真金妙色喻喻善業外飾譬如日天子以光明輪而得其名終無有時離光明輪菩薩摩訶薩亦復如是以智慧光而得其名終無有時離智慧光三日輪光明喻喻智慧圓明譬如須彌山王以四寶峰處於大海逈然高出而得其名終無有時捨離四峰菩薩摩訶薩亦復如是以諸善根處在於世逈然高出而得其名終無有時捨離善根四須彌四峰喻喻善根超出譬如大地以持一切而得其名終無有時捨離能持菩薩摩訶薩亦復如是以度一切而得其名終無有時捨離大悲五大地能持喻喻大悲荷負譬如大海以含衆水而得其名終無有時捨離於水菩薩摩訶薩亦復如是以諸大願而得其名終不暫捨度衆生願六大海含水喻喻大願普育譬如軍將以能慣習戰鬬之法而得其名終無有時捨離此能菩薩摩訶薩亦復如是以能慣習如是三昧而得其名乃至成就一切智智終無有時捨離此行七軍將明戰喻喻習定防冤如轉輪王馭四天下常勤守護一切衆生令無橫死恆受快樂菩薩摩訶薩亦復如是入如是等諸大三昧常勤化度一切衆生乃至令其究竟清淨八輪王護世喻喻定清物感譬如種子植之於地乃至能令莖葉增長菩薩摩訶薩亦復如是修普賢行乃至能令一切衆生善法增長九植種增長喻喻行增物善譬如大雲於夏暑月降霔大雨乃至增長一切種子十時雨生種喻喻法雨普成先喻後合菩薩摩訶薩亦復如是入如是等諸大三昧修菩薩行雨大法雨乃至能令一切衆生究竟清淨究竟涅槃究竟安隱究竟彼岸究竟歡喜究竟斷疑為諸衆生究竟福田令其施業皆得清淨令其皆住不退轉道令其同得一切智智令其皆得出離三界令其皆得究竟之智令其皆得諸佛如來究竟之法置諸衆生一切智處合中二先正合後徵釋前中云乃至者越初生種直合終成故由應時而降故獲斯十四種益一得智果淨二障故二得斷果達無相法故三得恩果住大悲故四得所依清淨究竟彼岸果上四自利餘皆利他五了有情行令他歡喜自離十怖則自歡喜六得斷疑七成應供次下諸句皆由此而成何以故菩薩摩訶薩成就此法智慧明了入法界門能淨菩薩不可思議無量諸行後徵釋中徵意云菩薩依何行力説法成斯大益釋意云由成大智證法界故尚能淨無量行豈止成衆生耶文中二初標後所謂下釋所謂能淨諸智求一切智故能淨衆生使調伏故能淨剎土常回向故能淨諸法普了知故能淨無畏無怯弱故能淨無礙辨巧演説故能淨陀羅尼於一切法得自在故能淨親近行常見一切佛興世故二釋中三初列所淨功德佛子菩薩摩訶薩住此三昧得如是等百千億那由他不可説不可説清淨功德三結其廣多以別説難盡故於如是等三昧境界得自在故一切諸佛所加被故自善根力之所流故入智慧地大威力故諸善知識引導力故摧伏一切諸魔力故同分善根淳淨力故廣大誓願欲樂力故所種善根成就力故超諸世間無盡之福無對力故三顯能淨因同分善根者一一善根回向法界成主伴故超諸世間等者法性相應所修之福故超於世法性不並真故無有對定滿成益科中三上攝佛果益竟佛子菩薩摩訶薩住此三昧得十種法同去來今一切諸佛何者為十所謂得諸相好種種莊嚴同於諸佛能放清淨大光明網同於諸佛神通變化調伏衆生同於諸佛無邊色身清淨圓音同於諸佛隨衆生業現淨佛國同於諸佛一切衆生所有語言皆能攝持不忘不失同於諸佛無盡辨才隨衆生心而轉法輪令生智慧同於諸佛大師子吼無所怯畏以無量法開悟羣生同於諸佛於一念頃以大神通普入三世同於諸佛普能顯示一切衆生諸佛莊嚴諸佛威力諸佛境界同於諸佛大文第四正同佛果益於中二初正顯同佛有標徵及列等覺之名由此而立爾時普眼菩薩白普賢菩薩言佛子此菩薩摩訶薩得如是法同諸如來二問答料揀於中先問後答問中先牒前同佛何故不名佛何故不名十力何故不名一切智何故不名一切法中得菩提者何故不得名為普眼何故不名一切境中無礙見者何故不名覺一切法何故不名與三世佛無二住者何故不名住實際者何故修行普賢行願猶未休息何故不能究竟法界捨菩薩道後陳己所疑初疑不名為果後問不捨於因爾時普賢菩薩告普眼菩薩言善哉佛子如汝所言若此菩薩摩訶薩同一切佛以何義故不名為佛乃至不能捨菩薩道後答中二初讚問牒疑佛子此菩薩摩訶薩已能修習去來今世一切菩薩種種行願入智境界則名為佛於如來所修菩薩行無有休息説名菩薩如來諸力皆悉已入則名十力雖成十力行普賢行而無休息説名菩薩知一切法而能演説名一切智雖能演説一切諸法於一一法善巧思惟未嘗止息説名菩薩知一切法無有二相是則説名悟一切法於二不二一切諸法差別之道善巧觀察展轉增勝無有休息説名菩薩已能明見普眼境界説名普眼雖能證得普眼境界念念增長未曾休息説名菩薩於一切法悉能朗照離諸暗障名無礙見常勤憶念無礙見者説名菩薩已得諸佛智慧之眼是則説名覺一切法觀諸如來正覺智眼而不放逸説名菩薩住佛所住與佛無二説名與佛無二住者為佛攝受修諸智慧説名菩薩常觀一切世間實際是則説名住實際者雖常觀察諸法實際而不證入亦不捨離説名菩薩不來不去無同無異此等分別悉皆永息是則説名休息願者廣大修習圓滿不退則名未息普賢願者了知法界無有邊際一切諸法一相無相是則説名究竟法界捨菩薩道雖知法界無有邊際而知一切種種異相起大悲心度諸衆生盡未來際無有疲厭是則説名普賢菩薩後正答所問於中三一法説二喻況三法合今初十一段次第答前十一問在文易了意猶難見謂何得已入十力而普行無息耶今總以喻顯如人習誦雖已得通而數溫習不如久精下香象喻顯雖相似而體不同故瓔珞云等覺照寂妙覺寂照亦似功用滿位此無功用也亦顯得果不捨因盡未來際皆位後普賢故佛子譬如伊羅鉢那象王住金脅王七寶窟中其窟周圍悉以七寶而為欄楯寶多羅樹次第行列真金羅網彌覆其上象身潔白猶如珂雪上立金幢金為瓔珞寶網覆鼻寶鈴垂下七支成就六牙具足端正充滿見者欣樂調良善順心無所逆喻中三一舉象王依正勝嚴伊羅鉢那此云香葉常居第一金山之脅若天帝釋將欲遊行爾時象王即知其意便於寶窟而沒其形至忉利天釋主之前以神通力種種變現令其身有三十三頭於一一頭化作六牙於一一牙化作七池一一池中有七蓮華一一華中有七婇女一時俱奏百千天樂是時帝釋乘茲寶象從難勝殿往詣華園芬陀利華遍滿其中是時帝釋至華園已從象而下入於一切寶莊嚴殿無量婇女以為侍從歌詠妓樂受諸快樂爾時象王復以神通隱其象形現作天身與三十三天及諸婇女於芬陀利華園之內歡娛戲樂所現身相光明衣服往來進止語笑觀瞻皆如彼天等無有異無能分別此象此天象之與天更互相似二明象王神變自在言七牙者準賢首品但有六牙或是譯人類後三七便言七耳無能分別此象此天者正意取此以喻菩薩等佛之義佛子彼伊羅鉢那象王於金脅山七寶窟中無所變化至於三十三天之上為欲供養釋提桓因化作種種諸可樂物受天快樂與天無異三明不壞本而能現佛子菩薩摩訶薩亦復如是修習普賢菩薩行願及諸三昧以為衆寶莊嚴之具七菩提分為菩薩身所放光明以之為網建大法幢鳴大法鐘大悲為窟堅固大願以為其牙智慧無畏猶如師子法繒繫頂開示祕密到諸菩薩行願彼岸三法合中分四一具衆行嚴合前依正二為欲安處下明因果無得合前神變自在三佛子菩薩摩訶薩本身下結成不壞因而現果合前不壞本而能現四何以故下徵釋重合初中可知為欲安處菩提之座成一切智得最正覺增長普賢廣大行願不退不息不斷不捨大悲精進盡未來際度脫一切苦惱衆生二中二一明修無礙行所為於中先為果後增長下為因不捨普賢道現成最正覺二正顯無礙行相於中先總明以法界因果無障礙故現不可説不可説成正覺門現不可説不可説轉法輪門現不可説不可説住深心門於不可説不可説廣大國土現涅槃變化門後別顯於中三初顯因門果行文有四果一智果二説法果三般若相應果四斷果於不可説不可説差別世界而現受生修普賢行現不可説不可説如來於不可説不可説廣大國土菩提樹下成最正覺不可説不可説菩薩衆親近圍繞或於一念頃修普賢行而成正覺或須臾頃或於一時或於一日或於半月或於一月或於一年或無數年或於一劫如是乃至不可説不可説劫修普賢行而成正覺次顯果從因行及説得時不同隨物現故復於一切諸佛剎中而為上首親近於佛頂禮供養請問觀察如幻境界淨修菩薩無量諸行無量諸智種種神變種種威德種種智慧種種境界種種神通種種自在種種解脫種種法明種種教化調伏之法後顯果門因行佛子菩薩摩訶薩本身不滅以行願力於一切處如是變現三明不壞因而現果中本身不滅即因不壞合在窟無變一切處變現即能現果合在天神變何以故欲以普賢自在神力調伏一切諸衆生故令不可説不可説衆生得清淨故令其永斷生死輪故嚴淨廣大諸世界故常見一切諸如來故深入一切佛法流故憶念三世諸佛種故憶念十方一切佛法及法身故普修一切菩薩諸行使圓滿故入普賢流自在能證一切智故四徵釋重合中先徵意云因果相違云何因門現果果復為因釋意云調伏衆生應如是故文中二初釋果作因意佛子汝應觀此菩薩摩訶薩不捨普賢行不斷菩薩道見一切佛證一切智自在受用一切智法後釋因現果意於中四一法説謂不捨因而現果如伊羅鉢那象王不捨象身往三十三天為天所乘受天快樂作天遊戲承事天主與天婇女而作歡娛同於諸天無有差別二舉前喻顯佛子菩薩摩訶薩亦復如是不捨普賢大乘諸行不退諸願得佛自在具一切智證佛解脫無障無礙成就清淨於諸國土無所染著於佛法中無所分別雖知諸法普皆平等無有二相而恆明見一切佛土雖已等同三世諸佛而修菩薩行相續不斷三重以法合於中初不捨因而現果後雖知諸法普皆平等下不壞果而現因佛子菩薩摩訶薩安住如是普賢行願廣大之法當知是人心得清淨四欲勝上來釋相竟佛子此是菩薩摩訶薩第十無礙輪大三昧殊勝心廣大智三結名可知上來別釋十定竟佛子此是菩薩摩訶薩所住普賢行十大三昧輪後即大文第三總結十數
