body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈十地品第二十六之四第六現前地所以來者已說諸諦相應慧次說緣起流轉止息相應慧寄緣覺地故次來也又四地出世未能隨世五地能隨不能破染淨之見此地觀察無染淨法界破彼見故前地雖能於生死涅槃棄捨一向背趣作意而未能於生死流轉如實觀察又由於彼多生厭故未能多住無相作意為令此分得圓滿故精勤修習令得圓滿故次來也名現前者莊嚴論云不住生死涅槃觀慧現前故此約初住地以前五地雙觀故令得現前十住論二降魔事已菩薩道法皆現在前亦約初說瑜伽引深密經現前觀察諸行流轉又於無相多修作意方得現前者多修無相此約地初觀十平等故觀察流轉此約地中已入地竟方觀緣起故攝論云由緣起智能令般若波羅多現在前故此釋正順今經約地中說無性釋云謂此地中住緣起智由此智力令無分別智而得現前悟一切法無染無淨故所斷障亦斷染淨唯識名為麤相現行障謂所知障中俱生一分執有染淨麤相現行彼障六地無染淨道入六地時便能永斷以觀十平等故由斯六地說斷二愚及彼麤重一現觀察行流轉愚即是此中執有染者諸行流轉染分攝故二相多現行愚即是此中執有淨者取淨相故相觀多行未能多時住無相觀初愚即執苦集後愚即執滅道本分名微細煩惱執者執細染淨即是煩惱形於前地故說為微唯識形後名為麤相由斷此愚便證無染淨真如謂此真如本性無染亦不可說後方淨故攝論名為無染淨法界後成般若行亦得自他相續無染淨果其揆一也菩薩既聞諸勝行其心歡喜雨妙華放淨光明散寶珠供養如來稱善說正釋文中亦有三分初讚請分九頌分二前八頌半讚後半頌請讚中分二初一菩薩讚餘諸天供讚於中三百千天眾皆欣慶共在空中散眾寶華鬘瓔珞及幢幡寶蓋塗香咸供佛初一天眾自在天王并眷屬心生歡喜住空中散寶成雲持供養讚言佛子快宣說次一天王無量天女空中住共以樂音歌讚佛音中悉作如是言後五頌半天女於中初三句集經序述標讚供果佛語能除煩惱病法性本寂無諸相猶如虗空不分別超諸取著絕言道真實平等常清淨善能通達諸法性於有於無心不動為欲救世勤修行此佛口生真佛子不取眾相而行施本絕諸惡堅持戒解法無害常堪忍知法性離具精進已盡煩惱入諸禪善達性空分別法具足智力能博濟滅除眾惡稱大士佛語下正讚此句讚教次一偈讚理次三偈讚行於中初一偈讚悲智無礙行後二偈十度圓修行本絕諸惡者見惡可除非真持戒善達性空即般若度分別法即方便度智力即二度博濟兼願如是妙音千萬種讚已默然瞻仰佛後半結默解脫月語金剛藏以何行相入後地後半結請第二正說亦分為二初地行後地果前中同於前地亦有三分一勝慢對治二佛子至如是觀已下明不住道行勝三佛子至以如是十種下明彼果勝亦初分即入住心住中前即攝正心住後即攝善現行及隨順善根迴向至文當知今且依論然三分雖同而漸超勝勝相云何謂前四地說眾生我慢解法慢治第五地說心淨慢治今第六地說取染淨相慢治所以漸細故曰勝也所治既細後二亦過染淨慢者前觀四諦苦集名染滅道為淨又十平等隨順如道但約淨說染相未忘對染有淨亦名取淨今以十種染淨平等法而為能治下觀緣起雖有染淨悟空深故不名取慢爾時金剛藏菩薩告解脫月菩薩言佛子菩薩摩訶薩已具足第五地欲入第六現前地當觀察十平等法今初勝慢治中分四一牒前標後二何等下徵列十心三菩薩如是下結其行能四得明利下辨行分齊何等為十所謂一切法無相故平等無體故平等無生故平等無滅故平等本來清淨故平等無戲論故平等無取捨故平等寂靜故平等如幻如夢如影如響如水中月如鏡中像如𦦨如化故平等有無不二故平等列中十句初總餘別總云一切法者論云是十二入以三科中蘊不攝無為處界攝盡而處次於蘊又名生門順無生義故偏舉之言無相者論云自性無相故謂十二入緣成之相有來即無非推之使無故云自性無也故瑜伽云由有勝義自性無相平等性故亦同淨名不念內外行於平等等別中九句明九種相皆自性無故論云相分別對治有九種謂離生等九是其所治無之一字是自性無以為能治論以初自性無貫下九句故但顯所治相之差別一無體故平等者論經云無想論云十二入自性想謂內六根取外六塵之相總名為想即十二入之體故今經云體謂想取相以為體故亦自性無故經云無體故平等下皆準此上遣分別心二生者念展轉行相謂諸入苦果虗妄分別為本故三滅者生展轉行相謂生即苦果從果起因故云展轉上二遣染分依他但舉緣滅已顯無滅無生義矣四即淨相謂本來自淨非滅惑方淨故云平等五戲論者遣分別相謂道能分別揀擇滅惑若有分別則有戲論今本無戲論故無分別上二遣淨分依他六遣出沒謂真如之性在妄為沒離垢為出今妄體即真故無可捨真體即空故無可取七遣染相即由上義染本寂靜即是真如無別真矣上二遣圓成即十二入之真性八遣我非有相此有二意一類前釋謂有執言但我非有不無於事故云如幻等事有亦不實二者此句遣無由上以無遣有恐便執無故遣云如幻夢等但無其實非是全無故不應執我非有相諸喻雖異大旨無殊九遣成壞相成即是有壞即是無緣起為成無性為壞緣成即無性故有無不二上之九句初七以無遣有次一以喻遣無後一不二俱遣則雙非入中矣又此不二則不壞有無謂說空遣於有執說有為遣空迷有是不異空之有空是不異有之空無別空有以為二也斯乃四句百非諸見皆絕方為般若現前之因菩薩如是觀一切法自性清淨隨順無違得入第六現前地第三結得入地文有五句一牒前所觀十平等法二自性清淨者遠離前地染淨慢垢三隨順真如十平等法四以無分別心無違所觀五由前四能得入第六地得明利隨順忍未得無生法忍第四辨行分齊中二句得明利忍對前顯勝未得無生對後彰劣仁王經中說有五忍謂伏信順無生寂滅前四各有下中上品地前但得伏忍三品九地如次配次三忍十地及佛得寂滅忍今四五六地皆得順忍此當上品治於細慢故云明利言隨順者順後無生忍故若約實位初地得無生今約寄位當七八九上治慢竟佛子此菩薩摩訶薩如是觀已復以大悲為首大悲增上大悲滿足觀世間生滅第二不住道行勝中分三初總顯心境二作是念下別明觀相三佛子菩薩至如是十種下結成觀名今初有二先如是觀已結前所以結者由前觀察隨順得至不住道故次復以下正顯文有四句前三辨能觀心後一所觀境前三皆悲後一是智由此相導故名不住故論結云不住生死涅槃故今初三中為物觀緣總稱大悲隨觀不同故分三別初大悲為首者初義先起大悲而觀緣故故論云不捨過去現在未來大悲攝勝故以雖同一切智觀觀三世流轉厭離有為而以大悲為先故勝二乘以一切智乃二乘觀故故云雖同二大悲增上者論云一切法中智清淨故謂以道相智觀不唯但觀三世而徧了諸法故云一切法中以此導前令悲增上故下經云大悲轉增言道相即菩薩自智也三大悲滿足者論云一切種微細因緣集觀故謂以一切種智委照無遺故名微細三悲為次後後轉深智轉勝故既三俱稱悲則下三觀則皆雙護凡小俱通二利皆雙不住也後觀世間生滅一句標所觀境前滅後生染淨生滅故上總明心境下別明觀相先敘意大文第二別名觀相者即緣起觀然緣起深義佛教所宗乘智階差淺深多種然外由內變本末相收即總法界一大緣起染淨交徹義門非一下當略示今經文內略顯十門窮究性相以顯無盡非為寄位同於二乘言十重者一有支相續門二攝歸一心門三自業助成門四不相捨離門五三道不斷門六三際輪迴門七三苦集成門八因緣生滅門九生滅繫縛門十隨順無所有盡門各有逆順故下經云如是逆順觀察逆即緣滅順即緣生又約生死涅槃以為逆順具含多義補義云上之十門明所觀之相然前經明能觀之觀云大悲為首即一切智觀次云大悲增上即道相智觀次云大悲滿足即一切種智觀此三觀顯能觀心後世間生滅為所觀境則世間生滅一句統收十門皆是所觀之相然論立能觀三觀者一相諦差別觀謂但觀二諦有為無有我故即經大悲為首一切智觀也二大悲隨順觀謂悲隨物增即經大悲增上道相智觀也三一切智相觀謂委悉窮究因緣性相諸門觀故即經大悲滿足一切種智觀也論立此三觀通觀十門則門門皆具三觀觀觀融攝十門成一圓融無礙緣起自在法門所謂星羅十門月滿三觀者義在此也故疏云初一切智下同二乘次道相智自顯菩薩後一切種智即上同諸佛故涅槃云十二因緣下智觀者得聲聞菩提中智觀者得緣覺菩提上智觀者得菩薩菩提上上智觀故得佛菩提前經約為物故皆稱大悲論約觀心故三皆名觀各有悲智相導為不住道融此三觀唯在一心甚深般若於是而現上以疏義難明故略為會之疏云然論三觀雖徧釋經而與十門開合不同初一切智觀束十門為三謂成答相成攝初一門答攝第二半門相攝餘八門半第二大悲隨順觀攝十為四一觀眾生愚癡顛倒攝初一門二餘處求解脫攝第二門三異道求解脫攝次四門四求異解脫攝餘四門三一切相智觀攝十為九一染淨分別觀攝初半門二依止觀攝初門後半及第二門三方便觀攝第三門四因緣觀攝第四門五入諦觀攝第五門六力無力信入依觀攝第六門七慢上慢非慢上慢觀攝第七門八無始觀攝八九二門九種種觀攝第十門補義曰疏義開合收攝者正顯該羅之意而義甚難明向下臨文但隨便略出要義使觀者易明以二觀為主故今以初觀束三疏義甚明故詳出之上已知大意下正釋文今初有支相續門中先依相諦差別觀三段之文攝當成答相三字初從作是念至則無生處四句辨定無我即論明成謂雙舉解惑釋成無我故則知緣集但是妄我二復作是念下至觀察緣起之相十一行經明倒惑起緣即論明答謂對釋通無我義故三佛子下至俱不可得有九行半經明迷真起妄緣相次第即論明相今初成者將觀緣起先釋成無我辨定所宗一以貫諸則顯十門皆成無我此是正破我執習氣作是念世間受生皆由著我若離此著則無生處正釋文中初辨定無我即論名成初言世間生滅皆由著我者則反舉惑情明我非理但是苦集故若離此著則無生處即順舉解心明理非我是滅道故此直順經文已無我義成矣論經言受身處生者以我執習氣但令自他差別故論云五道中生死差別若五道差別自由業招耳上辨定無我即論明成竟下文明答第二倒惑起緣即論明答答外伏難故兩難二答一執情徵理難情乖正理答二常求有無下執相徵實難相不依我答今初難云若實無我云何著我如空中無人定計有人即著於我不著無我明知有我答云由無智故於無我處執著於我非由有我如翳見空華第二難云若實無我何以貪著於我世間受生為緣次第明知有我方謂為緣次第生起答云正由無我計我癡愛為本倒惑造業乃至老死何要我耶答意正爾上敘意就文有十二行經分三初明倒惑順起染緣二此因緣下正智逆觀結酬無我三菩薩如是下就人結觀今初然十二支即為十二別亦無間然而諸論中多攝為四一能引支謂過去二支因即無明行能引識等五果種故二所引支謂現在五支果即識等五是前二支所引發故三能生支謂現在三支因即愛取有近生當來生老死故四所生支謂生老死即是愛取近所生故上乃諸論意此中約二世一重因果明生引別若依三世兩重因果則生引互通今經並具復作是念凡夫無智執著於我常求有無初倒惑順起染緣中且依十二支分為五初至常求有無辨無明支無智是癡常求有無是有愛然依三世諸惑謝往總名無明略取發潤有支本故若約二世雖諸煩惱皆能發潤而發業位無明力增故名無明唯取能發正感後世善惡業者以為其體希常為有於有樂事欲常住故求斷無為於有苦事願斷滅故不正思惟起於妄行行於邪道罪行福行不動行積集增長二明行支文有七句初三句行過次三句行體後一句結成初一句不正思惟者是行俱無明涅槃說此為無明因亦無明攝躡前後故因果互舉次句就人彰過謂起妄行者必是凡夫無明為因求有造業故故初地云凡所作業皆顛倒相應下句就法彰過論云示於解脫處不正行故若行涅槃路方為正道次三句辨行體以三業相應思造三行故謂由迷異熟愚違正信解起惑三塗惡業及人天別報苦業皆名罪行由迷真實義愚不知三界皆苦妄謂為樂起欲界善業名福行八禪淨業名不動行後句結成行支謂作已無悔積集增長有遷流故於諸行中植心種子有漏有取次明識支謂既發行已由行熏心令此本識能招當來生老死故名之為種若無行熏終不成種故云於諸行中植心種子即是所引識等五種於一剎那為行所集無有前後論云此中起心種子者示生老死體性者謂未來二果以此釋種為親因故言有漏有取成上種義謂行及識等名言種子皆通無漏今與三漏相應故名有支如初地中以欲等四流起心種故有漏是愛有取是取愛取潤故能招後有復起後有生老及死所謂業為田識為種無明闇覆愛水為潤我慢溉灌見網增長生名色芽次辨名色支初之二句文含二意一者成上種義由起生死心得種名二者總標後義現行名等皆生老死故即同初地於三界田中後生苦芽所謂下別亦有二意一通約十二自至生名色芽是識生名色芽二為顯前來已具十因則辨有支生於老死故名色居初次第辨耳謂由前一心等五種有漏有取愛取潤故復起後有是標有支生於二果今別顯有支之相補義云此名色支乃標生及老死二果為首此義疏多引論釋最難領會以常說十二因緣乃通指最初無明緣行為三世生死因緣之本此中十二支乃約二世以現世造業眾生以取未來生死故此無明不同最初生起無明以鈔中引遠公意云無明有四一迷理無明義通始終二發業無明在於行前三覆業無明此在行後識前四受生無明與識同時或在識後望過去種子心識在於識後望能生識與識同時今是第四受生無明也今前辨無明支中則云凡夫無智執著於我此明無明為造業之本義當發業覆業二種無明也故次云不正思惟為行支義當行前次云於諸行中植心種子以為識支義當行後以此識種子乃親招未來生死之因故次名色支乃標云復起後有生及老死意指生死乃前識種親招但從名色為初生之始故疏指云今是第四受生無明也故前識支云有漏有取疏云有漏是愛有取是取愛取潤故能招後有然後有即屬有支故前疏云識支之中已具十因則辨有支生於老死故未來以名色居初次第辨耳十因單約現在說以迷無我為無明不正思惟作善作惡為行以行納種為識作生死因故有名色則攝六入觸受愛取有現在念念具此十因疏引多論正義不出於此若言二世因果當在後從真起妄門中疏云且約有支文有六緣一業為田即是行種望所生但為增上緣故二識為種即是識等五種為後生死作親因緣論總釋云隨順攝取罪福等行業為地故此正明隨順於愛攝前行識之種而成有支也三無明闇覆論取前經無明故云前說無智闇障無明覆蔽故此則取於等能發起遠為助故亦是舉於前世例今世故準唯識意非前發業無明即是覆業無明亦是愛攝即迷外增上果愚四愛水為潤論指前常求有無之愛即是舉例亦即是前標中有漏以前有愛無明攝故以前無明中愛乃發業愛耳今是潤業之愛故不同也五我慢灌溉者即是取支要數灌溉方生有芽我語等取為我慢故若悟無我容不生故六見網增長亦是取支見取攝故三見為本諸見生故令無漏法不能壞故名之為網論總釋云如是住如是生心者總顯生名色芽由無明愛令上識種安住業地名色心生故今以前識種隱於餘四今辨現行略其總報所依欲顯識與名色次第相生義故復欲顯其通種現故故有隱顯然名色等必有所依本識故初地云於三界田中復生苦芽所謂名色共生論云共阿賴耶生故此即後文與識共生名色增長生五根諸根相對生觸觸對生受受後希求生愛愛增長生取取增長生有有生已於諸趣中起五蘊身名生生已衰變為老終歿為死於老死時生諸熱惱因熱惱故憂愁悲歎眾苦皆集次辨六入等八支當起如後段明然此一段意欲答於受生所以故具出諸惑隱顯等殊不在顯相顯在後文此因緣故集無有集者任運而滅亦無滅者二正智逆觀結酬無我初二句約生明無我但曰無明等集非由我集又上句揀無因下句揀邪因後二句約滅明無我剎那性滅無使之然菩薩如是隨順觀察緣起之相三就人結觀如是觀者即隨順緣起之理上明答下明相大文迷真起妄緣相次第者即論明相差別也論云若因緣無我以何相住因緣集行謂當相名住生後為行故經云迷諸諦理起相集耳然成答相通是有支相續而兩重緣相差別云何略有五異一前約妄我起緣即迷我執此約迷諦起緣即迷真實義二前約緣起此約緣次故前通取十因一處共起名色此中一向單說次第三前通三世二世以許十因通一世故義取亦通五世此唯三世以名色等唯約現故義取亦通一世四前文欲明三世並備於無明中說有愛取故於現在中說無明故此中三世互有隱顯不許相通五前為答難此為辨相如論意故有斯五異兩處辨緣共明相續總破癡倒故但束為十佛子此菩薩摩訶薩復作是念於第一義諦不了故名無明三明迷真起妄緣相次第明相文中亦二初順後逆順中初無明支言於第一義不了者然十二支皆依真起無有自性故下偈云觀諸因緣實義空也而無明最初親迷諦理而起於行既橫從空起不可復原故令無明特受迷稱論經云諸諦第一義者即四諦也故對治云真實義愚者謂四聖諦所迷即是實義能迷即愚別有暗法名為無明非但遮詮明無而已所作業果是行二行支也業即罪等三業是彼無明所起果故故偈云所作思業愚癡果論云是中無明所作業果者所謂名色者此出果體體謂行體即名色故遠公釋論云行有三義意業為名身口為色故婆沙云名色有二一方便名色二報名色若云名色緣識即方便名色若云識緣名色即報名色今以行為方便名色行依止初心是識二識支論云於中識者彼依止故彼即是行此中語倒應云依彼故論經云依行有初心識謂由行熏心有當果體乃至現行與識共生四取蘊為名色四名色支初一識字即是現行識支識為種邊唯是賴耶在現行位通於六識今揀現非種故云共生四蘊識蘊已屬所依識故名色增長為六處五六處支謂四七日後諸根滿位六處明盛名增成意處色增成餘五俱舍云從生眼等根三和前六處根境識三事和合是觸六觸支謂觸對雖有三和於三受因尚未了知但能觸對觸共生有受七受支分別三受領納於觸名觸共生此前四生唯餘現行於受染著是愛八愛支以三受中樂受纏綿希求故云染著即是中下品貪此雖通緣內外二果諸論多取緣外境外增上果生愛增長是取九取支雖屬餘惑而愛潤勝故說是愛增然上二支通現及種謂以愛種子增成於取取即愛種之現行故故同一貪初心為愛轉盛名取即此愛種便是取種是故二支皆通現種取所起有漏業為有十有支由內取心內所起諸業故名有漏此業親能招當果故名之為有此約三世不同前愛取合潤業等名有此前三業已隔現行名色等故從業起蘊為生十一生支約增上緣云從業起始從中有未衰變位皆名為生蘊熟為老蘊壞為死十二老死支即諸衰變位名為蘊熟故上二支體通五蘊唯是現行上順觀竟死時離別愚迷貪戀心胷煩悶為愁涕泗咨嗟為歎在五根為苦在意地為憂憂苦轉多為惱如是但有苦樹增長後逆觀中有四一結成苦二結無我三結於空四結勝義今初謂無明行引識至愛為苦芽愛緣引受至有是守養生老死是苦樹從芽守養是增長義又初二為根次二為身次二為枝次三為華後二為果無我無我所無我無我所結成無我無作無受者無作無受者結成於空復作是念若有作者則有作事若無作者亦無作事第一義中俱不可得四以我況法結成勝故瑜伽說由十種相緣起甚深六義依無常一義依苦一義依空二義依無我今言六義者一從自種子生亦待他緣二從他亦待自三俱從無作用四此二因性非不是有此四義即前段中但因緣故集無有集者五雖無始其相成就而剎那滅六雖剎那滅而似停住此二即前任運而滅亦無滅者一義依苦者一味苦相而似三相故結云苦樹一義依空者謂離有情作者受者然似不離顯現即今無作無受二義依無我者一雖實無我自我相現即今無我我所二依勝義雖不可說而言諸法自性可說即今復作是念已下六句經文十義備矣由前緣相皆是似義故逆觀中直顯真實性相無礙故為甚深緣起之觀正在於此上明相諦差別觀竟二約大悲隨順觀者此第一門即當四觀中第一愚癡顛倒觀論總釋云隨所著處愚癡及顛倒是事觀故謂十二因緣之所著處癡迷性相倒執我所下別釋云意明癡隨所迷立二顛倒一初至則無生處明迷緣性之無我執我成倒以著我故則世間生明是顛倒若離此著則無生處反顯此著必是顛倒二復作下竟初一門明愚緣相生疑惑顛倒謂無智故常求有無滯斷常二塗故云疑惑致緣相之相續明是顛倒今菩薩順彼眾生愚倒之事起悲觀察名為事觀三約一切相智觀九觀之中此門攝第一觀全及第二之半謂初成答二文名染淨分別此有二義一著我為染離我為淨二著我故緣相生為染離我故緣相滅為淨後相經文即屬第二依止觀謂雖依第一義以不知故即起諸染是為染依見第一義諸緣則滅便為淨依相諦觀中不知故成緣相大悲觀中不知便為顛倒然上相續一門經文無二隨義分三初明倒惑起緣實無有我成一切智觀次順癡倒事成道相智觀後委究解惑染淨性相成種智觀又初順根本次順後得後即無礙雖無我所不壞相故而起大悲能所本空悲而無著雙窮性相不滯自他三觀一心成無礙智甚深般若寧不現前一門尚然況加餘九上初有支相續門竟下第二一心所攝門佛子此菩薩摩訶薩復作是念三界所有唯是一心第二一心所攝門中然此一門乃含多義且分二別一推末歸本門二如來於此下本末依持門今初依論三觀初約相諦即當第二第一義諦觀攝此門之半論生起云云何第一義差別如是證第一義則得解脫彼觀故此明修觀所以以第一義是緣生之性若見緣性則脫緣縛而論經雖云皆一心作意取能作一心故云第一義觀論云但是一心者一切三界唯心轉故此言則總轉者起作義亦轉變義然此一文諸教同引證成唯心云何一心而作三界略有三義一二乘之人謂有前境不了唯心縱聞一心但是真諦之一或謂由心轉變非皆是心二異熟賴耶名為一心揀無外境故說一心三如來藏清淨一心理無二體故說一心此初一心菩薩不為此觀後二一心經意正明通於三觀約清淨一心為第一觀通此二心為後二觀後二一心略如問明廣開有十文多不錄次二本末依持門此下終於十門皆是世諦差別緣相本寂但應觀真何以復觀世諦差別論云隨順觀世諦即入第一義故俗為真詮了俗無性方見真耳中論云若不知世諦不得第一義故此世諦差別觀有六攝下八門半一何者是染染依止觀即雙辨能依所依攝此半門二因觀觀染因故攝次二門三攝過觀唯苦集故四護過觀護凡邪見故五不厭厭觀防小慢故上三次第各攝一門六深觀顯因緣之理妙過情取故此攝後三門今此半門即染依止觀因緣有分為染而此染相依止一心故論云此是二諦差別以純真不生單妄不成一心之真雜染之俗此二和合有因緣集如來於此分別演說十二有支皆依一心如是而立次本末依持門中二初總標謂依一心分別十二則十二為一心所持而特言如來說者一心頓具非佛不知故謂顯如來過去覺緣性已等相續起展轉傳說故何以故隨事貪欲與心共生心是識事是行於行迷惑是無明與無明及心共生是名色名色增長是六處六處三分合為觸觸共生是受受無厭足是愛愛攝不捨是取彼諸有支生是有有所起名生生熟為老老壞為死次徵意云十二有支三世行列前後引生何以今說皆依一心謂說主巧示非唯三世不離一心今一念心頓具十二彌顯前後不離一心此則俱舍第九明剎那十二因緣也是以此門中含多緣起故今不必依次意顯一心頓具隨事貪欲與心共生者此則總指所行之事貪事非一隨取一事於一念中則具十二謂行此貪事必依心起復了別前境心即識支事是行者貪事即是意業之行若形身口亦是二行不知貪過能招於苦名於行迷惑即是無明與無明及心共生是名色者名色是總為二所依名與共生故晉經云識所依處為名色故俱舍云識俱三蘊總稱名色意明以受蘊自是受支故名色增長是六處者俱舍云住名色根說為六趣謂六根是別以別依總開成於六稱住名色貪必對境為觸受必領觸貪即是愛名受無厭愛攝不捨即是欲取愛取潤前六支成有故但前諸有支生即是有義有所起者即前諸法起便是生義生熟為老者物生即異故老壞為死者剎那滅故當相壞故故經云初生即有滅不為愚者說故此若不斷則名連縛十二支位五蘊皆名分位即此順後無始來有名為遠續大小理通或六八識異耳非聖教量孰信斯旨此文正辨同時異體十二有支若同時同體亦具十二謂迷第一義即是無明有漏有取便名為行體即是識亦即名色亦是意處對境名觸領境名受染境名愛著境名取招報為有體現名生即異滅為老死此十二支若依三世二世一世並如初門中辨同時異體同體即如此文上相諦差別觀二約大悲隨順觀中即當第二餘處求解脫謂是凡夫愚癡顛倒常應於阿賴耶識及阿陀那識中求解脫反於餘處我所中求解脫故經明唯是一心明心外無我法當於一心中求三約一切相智觀即當第二依止觀明此緣集依於二種一依第一義已如前說二依心識即是今文前唯約淨此通染淨依義如前又前即依真起妄此即顯妄依真上第二一心所攝門竟下自業助成門佛子此中無明有二種業一令眾生迷於所緣二與行作生起因行亦有二種業一能生未來報二與識作生起因識亦有二種業一令諸有相續二與名色作生起因名色亦有二種業一互相助成二與六處作生起因六處亦有二種業一各取自境界二與觸作生起因觸亦有二種業一能觸所緣二與受作生起因受亦有二種業一能領受愛憎等事二與愛作生起因愛亦有二種業一染著可愛事二與取作生起因取亦有二種業一令諸煩惱相續二與有作生起因有亦有二種業一能令於餘趣中生二與生作生起因生亦有二種業一能起諸蘊二與老作生起因老亦有二種業一令諸根變異二與死作生起因死亦有二種業一能壞諸行二不覺知故相續不絕此下第三自業助成門中亦三初約相諦觀者此下二門即當因觀因觀有二一他因觀二自因觀今言他因者全賴前支生後支故此揀自性故大悲中揀於冥性破於自性等因一切相智觀名為方便顯因緣相故唯從無明生於行故名為自因此揀餘因能生於行今此一門即他因經明各有二業則一是自業二是助成而並云他者特由無明迷於所緣方為行因若了所緣寧起妄行又初明自業顯是他義二明生後顯是因義餘十一支倣此思準然生起之因即增上緣以緣名因從通義說為緣既多義不同經約揀要從定有說謂但有增上其十二支各初自業不異前之二門論主唯解老死二業者以此難故舉一例諸然無明無因老死無果故前十二各與後支為生起因老死無果與誰為因經文意顯與無明為因則無明非無因老死非無果故云不覺知故相續不絕不覺知即無明也是以十二因緣猶如尋環如汲井輪無有斷絕反顯若能覺知則無復生死論主總以二業為後生因故云壞五蘊身能作後生因以不見知故能作後生因意明前陰但滅則後陰生故初為因後意不知即是無明無明為因則十二支相續不絕二約大悲隨順觀四觀之中此下四段明第三異道求解脫論云顛倒因有三種性因自在因苦行因及無因此有四因如次四門破之前三是邪因故併云顛倒後一是無因四因者初一性即冥性謂僧佉計此為所知因謂知此冥性即得解脫故前云異處求解脫顯其理非此中雖云所知意取行非二即迦羅鳩䭾計自在天為所因謂自在天瞋眾生受苦喜眾生受樂求其喜故三刪闍夜計苦行為所修因但修苦行以酬往業則得解脫四無因即阿耆多計眾生不由因得萬法自然若知此者便得解脫眾生於上邪因無因中求經欲以正折邪故舉四門令於中求此門即破冥性謂因緣有支各二種業而能生彼因緣事不由冥性故斷前支緣則後支不續一生之中便得解脫汝之冥性縱八萬劫亦無解脫三約一切相智觀即當第二方便觀謂因緣有支各有二業為起後方便若滅前前則不生後後是解脫方便下第四不相捨離門中三門同前初諦相即當自因觀自因之義以見上文又論云自因觀者無明等自生因觀緣事故謂離前支無後支故如不離無明有行等則無明唯是自行因也以是自故令行不斷以是因故但云助成若唯不離無明有行則成太即不應言無明緣行若全離無明有行則成太離無明則非行因故論云異則不成不即不離則名自因亦二義成矣故引中論偈云眾因緣生法是則不即因亦復不異因非斷亦非常初句泛舉次句以是所生非能生故亦復不異因者從於能生生所生故非斷亦非常者不即故不常不異故不斷佛子此中無明緣行乃至生緣老死者由無明乃至生為緣令行乃至老死不斷助成故第四不相捨離門中先順後逆順中而論云無明有二種一子時二果時是中子時者令行不斷有二種義故緣事示現者子是種子果是現行現行之果雖已前謝故不取之種子續故令行不斷能助成行故取子時亦可初起無明名之為子遷至行時名之為果由前等引之力令行不斷令行不斷助成行故偏取子時餘十一支皆有二時例此無明滅則行滅乃至生滅則老死滅者由無明乃至生不為緣令諸行乃至老死斷滅不助成故次逆觀論云先際後際滅中際亦無是故不說十二因緣不出三際過未既無中豈得有是故不說有不斷助成義又不說者滅則滅前諸義故不假說子果等殊二約大悲隨順觀破顛倒因中以自在天為眾生因今以無明等為行等因尚不從於餘支豈得從乎自在三約一切相智觀有支無作故者既由前前令後後不斷助成後後則後後無性何有前前能作後後即以無作為緣之相是種智境佛子此中無明愛取不斷是煩惱道行有不斷是業道餘分不斷是苦道第五三道不斷門一依論相諦中六觀之內名攝過觀此名在一心門第二本末依持中謂以三道攝十二支則顯有支但攝於苦因果過患業惑是因苦即是果亦有逆順初順觀中文含二義一約三世則過去無明現在愛取名為煩惱雖同煩惱過去迷於本際與無明名現在牽生後見由於愛取從其本末顯現互彰行有是業者宿業名行現業名有雖同是業過去已定當相受名未來未有業能有之功能受稱現在五果未來二果同皆是苦現報已定當相受名未來未起從過患立若約二世前十同世則煩惱有二能發能潤雖諸煩惱皆能發潤於發業位無明力增潤業受生愛取力增各偏受名以無熏發唯一無明數數灌溉故分愛取業亦有二未潤已潤未潤名行初造作故已潤名有近當生故若總取識等種為所潤則亦苦攝唯識云有支一分是業所攝三道皆言不斷者謂從三煩惱生於二業從彼二業復七苦七復生三故如轉輪前後際分別滅三道斷如是三道離我我所但有生滅猶如束蘆次逆觀分二初明對治斷謂斷前際無明行及後際愛取有則七苦不生後如是三道下明自性斷故淨意云一切世間法唯因果無人但從諸法空還生於空法是則生滅因果如二束蘆互相依立不能獨成則知無性二我俱空二約大悲觀中即當破異道求中苦行因計謂以業惑而為苦因欲求解脫當斷惑業及修苦行是起妄計苦行心即是煩惱如是煩惱寧是解脫樂因三一切智相觀中即第五入諦觀三道苦集諦故謂惑業苦皆集故瑜伽云生老死現法為苦識等五當來為苦者五約種說故唯識云十二皆苦諦攝此則業惑通於二諦約其逆觀即滅道諦滅分別心亦即道故又體三道即性淨三德涅槃佛性一實諦故復次無明緣行者是觀過去識乃至受是觀現在愛乃至有是觀未來於是以後展轉相續第六三際輪迴門初約相諦名護過觀謂說三際護三過故釋文有逆順順中先明一往三世於是下明流轉三世今初云無明緣行是觀過去者觀有二義一觀現在生是過去二因所作二則知識等是彼過去當來之果因果相屬反復相成如是方名見過去因義能防三過言識乃至受是觀現在者亦有二義一觀現在識等由過去業得二復知識等能得未來果報以不得對治依起愛等故現在目覩故分兩向明其二義言愛乃至有是觀未來者此未來因決得來果一往定故二流轉三世者謂不得對治復有後世於後世上轉生後世後後無窮已知三際云何護過謂外與內因緣之法立三種過一者一切身一時生過何以故無異因故此過從前自因而生謂既無自在等而為異因唯無明行為識等因行有多種何以不得六道齊生二者自業無受報過何以故無作者故此過從於無作緣生作者即我三者失業過何以故未受果報業已謝故此過從於無常緣生此上辨過云何護耶若見三際則能護之然過業有三種義故不得報一未作二作已未潤三得對治今無緣行則顯已作現識等五則顯已潤已受愛取有三則知未得對治於已作業既有潤未潤殊斯為異因已潤則受生報未潤則受後報潤未潤殊豈得六道一時齊受此為異因何用自在既自造異因自招二報非他身受何言自業無受報耶假者自造何用我耶若已作業不得對治潤則便生知業不失因雖先滅勢力續故現見得報不可言失三過度矣無明滅行滅者是觀待斷此逆觀也即得對治義此滅即彼滅是觀待斷又因觀能滅揀自性滅故云觀待然十二因緣三世並備但隨化迹隱顯分三令知過去因招今苦器令斷愛等當果不生即愚癡絕命於慧刃愛水焦枯於智火高羅四開於六趣無生超逸於八極矣二約大悲隨順觀治異道求中無因之見示三際因果既先際二是中際五因中際三是後際二因若無如是等事眾生亦無斯因有矣何得言無三約一切智相觀中當力無力信入依觀論云先中後際化勝故謂此三際為因義邊皆名有力為果義邊名為無力若約三世前際於當二無力中際愛等於當有力於現無力以斯三際化彼凡夫令信入依行化中之勝如是窮究為種智境第七三苦聚集門初約相諦觀即當一心門中六觀之第五不厭厭觀論云厭種種微苦分別所有受皆是苦故此約微細行苦又云及厭種種麤苦故此約壞及苦苦皆凡夫不厭菩薩厭故又初微苦二乘不厭菩薩亦厭二乘雖知捨受行苦不窮微細有無量相及變易苦故云不知復次十二有支名為三苦此中無明行乃至六處是行苦觸受是苦苦餘是壞苦七三苦聚集門文中亦有順逆順中從相增說以配三苦前五遷流相顯名為行苦觸受二支觸對生苦故云苦苦餘但壞樂故名壞苦老死壞生亦名壞苦無明滅行滅者是三苦斷逆觀可知二約大悲隨順觀此下四段當第四求異解脫謂不識真解脫求三界苦等為解脫故名之異求真解脫者有四種相一離一切苦相二無為相三遠離染相四出世間相此四即涅槃樂常淨我故涅槃云於世間法自在遠離名為我故故下四段經明其但有四妄而無四德今此明其有苦無樂故論云彼行苦事隨逐乃至無色有縛彼計無色為涅槃者豈非妄苦邪三約一切智相觀此當第七增上慢非增上慢信入觀不如實知微苦我慢即增上慢若知微苦非增上慢不知令知名為信入第八因緣生滅門亦名從緣無性初約一切智觀此下三門皆明一心門中六觀之深觀謂四句求緣皆無有生無生而生故曰深觀此門名不自生不他生第九門名不共生第十門明不無因生釋此四句略有二義一破邪二顯理理外妄計曰邪邪亡則理顯理顯則惑亡然自他等四是計是依不之一字是藥是理窮生之理不出自等自等若無生將安寄故以不不之則惑亡理顯然其所計各有三類一者外道謂冥性為自梵天為他微塵和合為共自然為無因謂此四計亦是僧佉衛世若提子勒沙婆也二小乘同類因為自異熟因為他此異熟非識乃指不善及有漏善相望而言也俱有因為共計無明託虗而起亦曰無因上計亦通大乘執相之者三約大乘果法為自眾緣為他合此為共離此為無因又賴耶即自種為自眾緣為他合此為共離此為無因又法從真起為自從妄起為他合此為共離此為無因所計雖眾但顯正理諸計自亡顯理復二一約無生以深觀二約生無生無礙以顯深觀先中略為二解一約展轉釋法從緣故不自生既無有自對誰說他又一切法總為自故又他望於他亦是自故既無有他故不他生自他不立合誰為共有因尚不生無因何得生二約因緣形奪釋故對法云自種有故不從他待眾緣故非自作無作用故不共生有功能故非無因若爾自種有故則是自生豈曰無生此乃假自破他非立於自也次句假他破自故中論云如諸法自性不在於緣中也下二句例然惟詳審之二約無礙者但因緣生果各有二義謂全有力全無力緣望於果若全有力則因全無力故云因不生緣生故云不自生二因望於果全有力亦然故云緣不生自因生故故不他生三二力不俱故不共生四二無力不俱故不無因此復二義一約用則力用交徹有相入義謂有力攝無力故故十忍品云菩薩善知緣起法於一法中解眾多眾多法中解一等二據體有空不空有相即義謂非但因力歸緣亦乃因體由緣而顯全攝因緣因如虗空故上文云一即是多多即一等力無力必俱故常相即入是為無盡復次無明緣行者無明因緣能生諸行八因緣生滅門中亦名大緣起甚深觀亦有順逆初順觀中經云無明緣行者牒也無明因緣能生諸行者釋也論云有分非他作自因生故此以不他生釋經因字謂如行支唯從無明故云自因即上自因觀也二者非自作緣生故此以不自生釋經緣字謂行支但假無明為緣非有行體在無明中從自而生即他因觀但取揀餘不親生故名因顯前非後疎故名緣非謂四緣之因緣也無明滅行滅者以無無明諸行亦無餘亦如是逆觀可知二大悲觀即異求中計非想等以為涅槃又計妙行為解脫者非是常德但是生滅故可悲之三約一切相智觀此及後門名無始觀此有二義一約俗說因緣為生滅之本生死無際故因緣無始二約真說見法緣集無有本性可依故名無始即淨名云從無住本立一切法故染淨真性皆無始終顯染可除故云無始故論云中際因緣生故後際生即舉此第八門隨順縛故即第九門謂但一念從緣生即是不生故無始也不言初際生者意顯無初故今不起妄即不生故又無明緣行者是生繫縛無明滅行滅者是滅繫縛餘亦如是第九生滅繫縛門者亦名似有若無初一切智觀中明不共生初順觀經中但無明為緣縛行令行繫屬無明斯則緣生而為不共者論云非二作但隨順生故無知者故作時不住故意謂但行順無明緣不得不生互無知者故非二作若爾但隨順生即是共生何要知者故末云既從緣生則念念不住誰為共耶此同對法無作用故又論云和合即無性云何和合生次無明滅下逆觀謂滅但滅於繫縛既無共生安有共滅言有生者但是繫縛二約大悲觀謂彼外道異求非想天等為解脫者菩薩觀之但是染縛非是涅槃真淨之德三約一切相智觀明無始觀中隨順縛故而生非有本也又無明緣行者是隨順無所有觀無明滅行滅者是隨順盡滅觀餘亦如是第一無所有盡觀門亦名泯同平等初一切智觀即深觀中顯非無因初順觀中由行從無明緣生緣生即無性故云隨順無所有次逆觀中滅亦緣滅緣滅無滅方順盡滅之理然論經順觀云是隨順有者顯無性緣生故不能不有二經雖殊同名緣生故非無因無因何失若無因生生因常生非不生也何以故無定因故此即縱破亦可常不生何以故無因生故此即奪其生義故無因生非佛法所樂以無因能生大邪見故二約大悲隨順觀即求異解脫中外道計悲想無所有處為涅槃以是有故非是出世故無我德而妄計解脫故可悲之三約一切相智觀當第九種種觀此即世諦觀由隨順有故有欲色無色愛等之殊故云種種即真順有未失順無上來別釋十門竟佛子菩薩摩訶薩如是十種逆順觀諸緣起所謂有支相續故一心所攝故自業差別故不相捨離故三道不斷故觀過去現在未來故三苦聚集故因緣生滅故生滅繫縛故無所有盡觀故自下第三總結十名既云逆順觀察則前一心所攝自業助成二門闕逆觀者乃文略耳然此逆順若對法第四名為染淨染淨中各有逆順論云雜染逆順故清淨逆順故染中順者無明緣行等故逆者謂誰老死集乃至無明故緣起經云由誰有故而有老死如是老死復何所緣初句推因後句審因清淨逆順者無明滅則行滅順也由誰滅無故老死滅無逆也今文略無但約染淨為逆順耳言諸緣起者十二非一曰諸前前為緣令後後起又由煩惱繫縛往諸趣中數數生起故名緣起亦名緣生生即起義亦約果說然各攝三觀體勢星羅今重以十門本意收攝初門明染淨因起二明緣起本源三因果有空四相成無作五陳其諦理六力用交參七窮苦慢除八形奪無始九有無無本十真俗無違復收十門不出五意初迷理成事次理事依持次六成事義門第九理事雙泯後一理事無礙故唯四門不出理事若從事理無礙交徹則涉入重重若依理事逆順雙融則真門寂寂故法性緣起甚深甚深即此因緣名因佛性觀緣之智即因因性因因至果成菩提性因性至果成涅槃性因果無礙是緣起性唯虗己思之補義云此經以法界緣起為宗所言緣起不出十法界理事因果然此因果亦唯依一心十二因緣逆順轉變是知全經旨趣皆緣起之法前三賢所修者皆隨緣之行而登地所證者乃緣起之理故初二三地所觀乃約順觀染緣而入法界四地所觀乃約逆觀淨緣而入法界故五地所觀染淨融通然但約歷別行布而觀故至此六地委明觀十二因緣會前諸觀攝歸一心以顯由理事無礙而入事事無礙法界故經文結束分明而疏亦收歸五意結成四門然四門即四法界也通途理事無礙觀門備示於此且疏依論明門門有三觀觀觀攝十門隱顯重重以示事事無礙法界斯則全經觀行理趣盡彰於十二因緣之十門所謂緣起甚深以示法界之宗也以經文浩瀚旨趣幽深故略示於此上結束十門竟下總結大文不住道行勝竟大文第三佛子菩薩摩訶薩以如是下至後隨順無違故明彼果勝亦前攝正心住故知緣生此下攝善現行故三空等現前依論云果者有五種相一得對治行勝及離障勝二得修行勝三得三昧勝四得不壞心勝五得自在力勝各有佛子以為揀別唯第二段有二佛子佛子菩薩摩訶薩以如是十種相觀諸緣起初中二先明對治勝後菩薩如是下明離障勝今初即三解門亦名三昧三昧即當體受名解脫乃依他受稱此三能通涅槃解脫故名為門文中二初牒前後正顯今初意同五果由前十觀得此三空等果故謂以此三空觀緣得第一第三果三悲悲觀緣得第二第四果三望於初初是能治三是所成四望於二二是能修四是堅固第五通從二觀而生亦可展轉而生由有治故離障離障故行勝有治故三昧勝三昧勝故心不壞故得自在也知無我無人無壽命自性空無作者無受者即得空解脫門現在前此下正顯三空各有別顯總結初空門中別顯有三初三句明眾生空次自性空明法空此上明二我體空三無作受顯二我作用空由體空故並不能作因受果結云現前者智與境冥故觀諸有支皆自性滅畢竟解脫無有少法相生即時得無相解脫門現在前二無相門中亦三一者滅障即觀諸支皆自性滅謂若入空門不得空亦不取空相則事已辦若見法先有後無說為空及取空相非真知空故名為障故修無相了自性滅則不取空障二所以不取者得對治故謂知空亦復空名畢竟解脫三既有能治治於所治則念想不行故云無有少法相生能所斯寂則無相現前如是入空無相已無有願求唯除大悲為首教化眾生即時得無願解脫門現在前三無願門亦有三種相一依止謂依前入空無相方得無願故二體即無有願求不求三界等故三勝即大悲化生勝二乘故又上三空通緣諸法實相觀於世間即涅槃相故亦不同二乘菩薩如是修三解脫門離彼我想離作者受者想離有無想第二明離障勝中先牒前修由修得離故初離空想是空門所離次離有無想是無想門所離亦無願門所離不見有可求故已知離障云何為勝經中三句次第勝五四地及此地方便故謂於五地中以十平等深靜心遠離四地身淨我慢此用深空滅彼二我故此勝也二四地中以道品治三地正受出沒等慢此用空觀以離作受故勝三此地方便但用十平等破顯有無今此地滿用深無相破遣有無一切蕩盡故此勝也佛子此菩薩摩訶薩大悲轉增精勤修習為未滿菩提分法令圓滿故第二修行勝中二先總明修心悲增心中修故為未滿菩提下兼於自利亦修所為言悲增者前觀十平等已起三悲今十門觀緣彌悲眾生纏於妄法作是念一切有為有和合則轉無和合則不轉緣集則轉緣不集則不轉我如是知有為法多諸過患當斷此和合因緣然為成就眾生故亦不畢竟滅於諸行次別顯中二先明修行後而恒下明修勝今初又二先發勇猛修行謂勵志始修故後佛子下明丈夫志修行決終成故又初即悲智勇修後則窮證性相今初先智後悲智中先智後厭初中上二句明緣有合離謂業惑相資有為方生如無明緣行等後二句明緣有具缺集即是具謂業惑隨闕必不轉生如雖有行無愛潤等後我如是下厭既知有為苦過必斷和合集因然修悲益物不盡有為佛子菩薩如是觀察有為多諸過惡無有自性不生不滅二大夫志修中初厭相見彼有為多過是對礙法故故厭之次無有自性下證性由了有為自性同相本無生滅便能滅於對礙而與理冥而恒起大悲不捨眾生即得般若波羅蜜現前名無障礙智光明成就如是智光明已雖修習菩提分因緣而不住有為中雖觀有為法自性寂滅亦不住寂滅中以菩提分法未圓滿故第二修行勝者謂不住勝相現前故有三種勝一初二句明般若因勝以是不住所以躡前大智而起悲故二即得下般若體現勝般若是通名無障礙智是別稱無礙佛智雖未成就今般若能照此智此智前相名曰光明光明即門也三成就如是下即般若用勝亦是不住之相謂上二句涉事不失理故不住有為後二句見理不壞事故不住無為即有為涅槃平等證故以菩提下不住所為智慧助道未滿足故不住有為功德助道未滿足故不住無為又俱未滿故俱不住佛子菩薩住此現前地得入空三昧自性空三昧第一義空三昧第一空三昧大空三昧合空三昧起空三昧如實不分別空三昧不捨離空三昧離不離空三昧第三明三昧勝中二先明空定後如是十無相下例顯餘二前中復二先舉十上首從此菩薩下總結多門今初十中疏依論釋頗難會次依涅槃釋之云前八證實空後二起用空故言入空即彼內空外空內外十二入故自性即性空非今始無故名空第一義空名義全同第一空者彼名空空謂前空但空第一義今明若有若無本來自空故彼經云是有是無是名空空是是非是是是名空空謂是非亦當體空故如是空空乃是二乘所迷沒處十地菩薩通達少分故名第一空大空名同彼名般若波羅蜜合即內外空也合無合故起即有為空八即無為空如實即無為故不捨等二名義俱別若欲會者九即無始空無始不離生死而即空故十即無所有空謂離與不離皆無所有故此菩薩得如是十空三昧門為首百千空三昧皆悉現前如是十無相十無願三昧門為首百千無相無願三昧門皆悉現前次結餘可知佛子菩薩住此現前地復更修習滿足不可壞心決定心純善心甚深心不退轉心不休息心廣大心無邊心求智心方便慧相應心皆悉圓滿第四不壞心果此下二段亦即攝隨順堅固一切善根迴向此為進善後起大行今初不壞心者由障滅行成若智若悲皆不退壞文有十句初總餘別有九種不壞一信理決定名決定心二行堪調柔名純善心三不怖甚深名甚深心四自乘不退名不退轉心五勝進無息名不休息心六泯絕自他名廣大心七利生無邊名無邊心八上求地智名求智心九巧化眾生名方便慧心亦可對前十三昧心以明不壞九並堅固皆云不壞十皆具足名悉圓滿佛子菩薩以此心順佛菩提不懼異論入諸智地離二乘道趣於佛智諸煩惱魔無能沮壞住於菩薩智慧光明於空無相無願法中皆善修習方便智慧恒共相應菩提分法常行不捨第五自在力勝初顯其相後佛子下結其分齊前中十句初總不懼下別總云此心者此前十心順佛菩提者能深入趣向故論云得般若波羅蜜行力勝能深入故則知此前十心皆是般若現前心也別中九句依上十不壞心而得自在趣向一不懼異論即能伏他力二上入智地即斷疑力得法空故三自乘不動力以離小故四密處信力趣境智故五諸魔不壞力精進故六治惑堅固力住智明故七徧治力具三空故處有不染故八化生力即前第九方便相應九智障淨力即前上求智地前智居中導二悲故此智居後顯悲智相異故佛子菩薩住此現前地中得般若波羅蜜行增上得第三明利順忍以於諸法如實相隨順無違故第二結中由般若現前故順忍明利言第三者三品忍中為最上故上來彼之果勝竟大文中前已行竟下地果佛子菩薩住此現前地已以願力故得見多佛所謂見多百佛乃至見多百千億那由他佛大文第二位果中三同前就調柔中分四初調柔行二教智淨三別地行相四結說地名前中有法喻合法中三初鍊行緣悉以廣大心深心供養恭敬尊重讚歎衣服飲食臥具湯藥一切資生悉以奉施亦以供養一切眾僧以此善根迴向阿耨多羅三藐三菩提於諸佛所恭敬聽法聞已受持得如實三昧智慧光明隨順修行憶持不捨又得諸佛甚深法藏次能鍊行於中聞已受持下是得義持三昧慧光是所持義隨順修行此句示現得義持因因何事耶謂因依前三昧勝故得如是奢摩他等憶持不捨正顯能持又得已下亦是所持經於百劫經於千劫乃至無量百千億那由他劫所有善根轉更明淨三明所鍊淨轉更明淨者解脫彼障故又由前證得彼佛法藏故譬如真金以毗瑠璃寶數數磨瑩轉更明淨喻中真金喻證亦喻信等瑠璃喻方便智由方便智數磨令出世證智發教智光轉勝前也此地菩薩所有善根亦復如是以方便慧隨逐觀察轉更明淨轉更寂滅無能暎蔽合中方便慧即上不住道合前瑠璃隨逐觀察合數磨瑩轉更明淨者般若現前故轉復寂滅者證智脫彼障故譬如月光照眾生身令得清涼四種風輪所不能壞此地菩薩所有善根亦復如是能滅無量百千億那由他眾生煩惱熾火四種魔道所不能壞二明教智淨以月光寬大勝於前地但取月輪為喻也四種風輪者出現亦有能持等四種風輪非今四輪以彼不是散壞風故有散壞風復無四種未見經論不敢定斷且就義釋即四時之風春曰和風喻煩惱魔順愛心故夏曰炎風喻於蘊魔多熱惱故秋曰涼風亦曰金風喻於死魔果熟收殺故冬曰寒風喻於天魔敗藏人善故行四魔行即是魔道此菩薩十波羅蜜中般若波羅蜜偏多餘非不修但隨力隨分二別地行相佛子是名略說菩薩摩訶薩第六現前地四結地名菩薩住此地多作善化天王所作自在一切聲聞所有問難無能退屈能令眾生除滅我慢深入緣起布施愛語利行同事如是一切諸所作業皆不離念佛乃至不離念具足一切種一切智智復作是念我當於一切眾生中為首為勝乃至為一切智智依止者此菩薩若勤行精進於一念頃得百千億三昧乃至示現百千億菩薩以為眷屬攝報果中言聲聞難問無能屈者已知二乘地緣等故若以願力自在示現過於此數乃至百千億那由他劫不能數知三願智果爾時金剛藏菩薩欲重宣其義而說頌曰菩薩圓滿五地已觀法無相亦無性無生無滅本清淨無有戲論無取捨體相寂滅如幻等有無不二離分別隨順法性如是觀此智得成入六地明利順忍智具足第三重頌二十二頌分三前十七偈頌位行次四偈頌果位後一結說前中三初二偈一句頌勝慢對治二有十偈三句頌不住道行勝三有四偈頌彼果勝今初觀察世間生滅相二中有三初一句頌顯心境以癡闇力世間生若滅癡闇世無有觀諸因緣實義空不壞假名和合用無作無受無思念諸行如雲徧與起不知真諦名無明所作思業愚癡果識起共生是名色如是乃至眾苦聚次九偈一句頌別明觀相即為十段第一有二偈半頌有支行列了達三界依心有十二因緣亦復然生死皆由心所作心若滅者生死盡二一偈頌攝歸一心既云心滅則生死盡故知不可唯約真心以真妄和合是說依心即真之妄既滅即妄之真不無故起信云但心相滅非心體滅無明所作有二種緣中不了為行因如是乃至老𣧩歿從此苦生無有盡三一偈頌自業差別無明為緣不可斷彼緣若盡悉皆滅四半偈頌不相捨離愚癡愛取煩惱支行有是業餘皆苦五半偈頌三道不斷癡至六處是行苦觸受增長是苦苦所餘有支是壞苦若見無我三苦滅六一偈越頌第七三苦聚集無明與行為過去識至於受現在轉愛取有生未來苦觀待若斷邊際盡七一偈却頌三際輪迴無明為緣是生縛於緣得離縛乃盡八半偈越頌第九生滅繫縛從因生果離則斷觀察於此知性空九半偈却頌因緣生滅隨順無明起諸有若不隨順諸有斷此有彼有無亦然十有三句頌無所有盡觀十種思惟心離著有支相續一心攝自業不離及三道三際三苦因緣生繫縛起滅順無盡第三有五句頌結十名如是普觀緣起行無作無受無真實如幻如夢如光影亦如愚夫逐陽𦦨如是觀察入於空知緣性離得無相了其虗妄無所願唯除慈愍為眾生三頌彼果勝中初二偈對治勝大士修行解脫門轉益大悲求佛法知諸有為和合作志樂決定勤行道次一偈頌修行勝空三昧門具百千無相無願亦復然次半偈頌三昧勝般若順忍皆增上解脫智慧得成滿後二句通頌後二勝以義通故復以深心多供佛於佛教中修習道得佛法藏增善根如金瑠璃所磨瑩如月清涼被眾物四風來觸無能壞此地菩薩超魔道亦息羣生煩惱熱此地多作善化王化導眾生除我慢所作皆求一切智悉已超勝聲聞道此地菩薩勤精進獲諸三昧百千億亦見若干無量佛譬如盛夏空中日四偈頌位果等可知甚深微妙難見知聲聞獨覺無能了如是菩薩第六地我為佛子已宣說一偈頌結說第六現前地竟第七遠行地所以來者已說緣起相應慧住寄於緣覺次說有加行有功用無相住寄菩薩地所以來也瑜伽云前地雖能多住無相作意而未能令無相作意無間無缺多修習住為今滿故次有此來又前功用未滿今令滿故言遠行者成唯識云至無相住功用後邊出觀世間二乘道故解深密云能遠證入無闕無間無相作意與清淨地共相隣接故名遠行通有二義立遠行名一從遠來至功用邊二此功用後邊能遠去後位故十住論云去三界遠近法王位故名遠地然其能遠去行正是無相故所離障正是細相現行障謂六地執生滅細相現行故此生滅相即是二愚一細相現行愚謂執有緣生流轉細生相故二純作意求無相愚即執有細還滅相故以純作意於無相勤求未能空中起有勝行至此地中方能斷之以常在無相故不執生更不作意勤求無相故能證得法無差別真如以了種種教法同真如無相故以能空中起有勝行故成方便度二行雙行乃至亦得無相之果故知以純無相不礙起行是時天眾心歡喜散寶成雲在空住普發種種妙音聲告於最勝清淨者了達勝義智自在成就功德百千億人中蓮華無所著為利羣生演深行次正釋文亦有三分初讚請中有十二頌前十讚後二請前中分四初二偈天眾讚說主自在天王在空中放大光明照佛身亦散最上妙香雲普供除憂煩惱者次有一偈天主光雲供佛表智契法身故爾時天眾皆歡喜悉發美音同讚述我等聞斯地功德則為已獲大善利三有一偈天眾慶聞天女是時心慶悅競奏樂音千萬種悉以如來神力故音中共作如是言四有六偈頌天女音樂讚佛於中初一顯聲因緣威儀寂靜最無比能調難調世應供已超一切諸世間而行於世闡妙道雖現種種無量身知身一一無所有巧以言辭說諸法不取文字音聲相往詣百千諸國土以諸上供供養佛智慧自在無所著不生於我佛國想雖勤教化諸眾生而無彼已一切心雖已修成廣大善而於善法不生著餘五偈正顯讚辭於中初四偈讚寂用無礙以見一切諸世間貪恚癡火常熾然於諸想念悉皆離發起大悲精進力後一明起用所由即悲智無礙將說雙行故承力讚此一切諸天及天女種種供養稱讚已悉共同時默然住瞻仰人尊願聞法時解脫月復請言此諸大眾心清淨第七地中諸行相唯願佛子為宣說爾時金剛藏菩薩告解脫月菩薩言佛子菩薩摩訶薩具足第六地行已欲入第七遠行地當修十種方便慧起殊勝道第二正說分中二先行後果行中有五種相差別一樂無作行對治差別二彼障對治差別三雙行勝差別四前上地勝差別五彼果差別五中初一是趣地方便即當入心餘四為住出心在果又住中初即初住地次一正住地次一說雖在後義該始終後一地滿初言樂無作者樂著般若觀空故即細相現行障此地雖有不著為能對治二謂向雖能治前地樂空之心以其有量有功用即復是障故修無量無功用行以為對治三垢障既盡故止觀雙行四明此地功用過前六地勝後三地上即後也五由地滿故說雙行果今初分中文有四段初結標後二何等下徵顯其相三菩薩以如是下結行功能四入已下彰其分齊今初具足六地行已即是結前義所治無相行故以般若無相行滿於此生著非增上行故次欲入下明其標後十種方便即是能治謂前樂無作不明方便不能起增上行非殊勝道今以十種不捨眾生法無我智以為能治治前樂心名方便慧便能攝取增上行故名起殊勝道是則即有修空故不住空是空中方便慧即空涉有故不住有是有中殊勝道道即行也所行殊勝故名增上於何增上謂前所寄世出世中即空故勝於世間即能涉有故能勝出世間前六地中雖亦修悲不住於無而在寂不能出空方作故不得方便殊勝之名雖行空行有而多著空但名樂無作治何等為十所謂雖善修空無相無願三昧而慈悲不捨眾生雖得諸佛平等法而樂常供養佛雖入觀空智門而勤集福德雖遠離三界而莊嚴三界雖畢竟寂滅諸煩惱𦦨而能為一切眾生起滅貪瞋癡煩惱𦦨雖知諸法如幻如夢如影如響如𦦨如化如水中月如鏡中像自性無二而隨心作業無量差別雖知一切國土猶如虗空而能以清淨妙行莊嚴佛土雖知諸佛法身本性無身而以相好莊嚴其身雖知諸佛音聲性空寂滅不可言說而能隨一切眾生出種種差別清淨音聲雖隨諸佛了知三世唯是一念而隨眾生意解分別以種種相種種時種種劫數而修諸行二徵顯中所以勝行得增上無勝者由下十義故義各二句皆上句觀空下句涉有上句得下句即成空中方便慧下句得上句即成有中殊勝行不滯空有故致雖言論主攝十為四種功德謂前三各一後七為一故一初句即護惡行因事菩薩惡行有其二種一不樂利樂二起愛見今由上句故無愛見由下句故能利樂若二中互闕皆有惡行今由二句護之為無愛見之悲因事二即財及身勝因事由供佛故護財及身由得平等故二事皆勝勝財則隨物所須勝身隨意取其何類三護善根因事善根即勤集福德為菩提資糧今以即空智而集是得彼勝因增上今所集功德法皆成增上波羅蜜行名之為護雖有慈悲皆是增上意樂故三皆自利後七同是利他合為第四攝生因事即為七種初一隨物受生次二化令離障後四攝令住善初中願力受生為作眾生上首故須莊嚴三界但是願生非由業惑故云遠離二說對治故謂示起煩惱欲令治斷而知性寂方為第一義治今見常自寂故三為滅智障故障有四種如五地中隨世智中說令隨眾生心作書論等無量事業而為能治四於大法眾會集故為物起嚴土行此明依報下三明正報三輪益物五即身業無身現身者令生五福謂見聞親近供養修行故自身無身同佛法身故下二亦然六即口業轉法輪故七即意業於無長短中隨問善釋記三世事起三世行故菩薩以如是十種方便慧起殊勝行從第六地入第七地三總結勝能中論釋云此十種發起殊勝行共對治攝取者皆上下二句相對名為共對由此上下各能對治皆上句治凡下句治小隨治不同由二攝取名殊勝行對治前障入已此行常現在前名為住第七遠行地第四彰分齊者明無相無間故無相地名從此而立此亦即攝前不退住不同前六前六得住已捨入地心以修解入非以行入此以行入故常行不捨名不退住前初對治竟佛子菩薩摩訶薩住此第七地已入無量眾生界入無量諸佛教化眾生業此下第二彼障對治差別即攝前無著行有無量用皆不著故言對治者有二種相一修無量種治前有量障二此菩薩作是念下修行無功用行治前有功用行治前有功用障今初有二十句攝成十對一一對中皆上句明境界無量為所知所化下句明佛德業無量為能知能化菩薩入彼佛化以用化生要則攝為五即五無量界初一對眾生無量論云隨所化何等眾生此對為總十對皆為利眾生故言何等者類非一故釋經無量之言隨多類宜而以無量化眾生業而化故入無量世界網入無量諸佛清淨國土二有一對眾生住何等處謂住世界無量以淨行化故入無量種種差別法入無量諸佛現覺智入無量劫數入無量諸佛覺了三世智三有二對法界無量謂以何等智慧化初對橫窮諸法智後對竪窮三世智皆是種智二對約其所知皆是法界無量入無量眾生差別信解入無量諸佛示現種種名色身入無量眾生欲樂諸根差別入無量諸佛語言音聲令眾生歡喜入無量眾生種種心行入無量諸佛了知廣大智四有三對明調伏界無量初二對明以何等心於中初對隨眾生信樂種種天身菩薩以名色身化故謂心隨其樂同修天行得大身故口隨其信以名句身說彼行故第二對知昔根欲不同以隨類音稱根說故次一對以何等行謂知現在心行不同以徧趣行說對治故入無量聲聞乘信解入無量諸佛說智道令信解入無量辟支佛所成就入無量諸佛說甚深智慧門令趣入入無量諸菩薩方便行入無量諸佛所說大乘集成事令菩薩得入五有三對明調伏方便界論云置何等乘謂置三乘故初對為聲聞說智道令證滅故次對為緣覺說深智令知因緣故後對為菩薩說地度集成事稱彼方便涉有故上治有量障竟此菩薩作是念如是無量如來境界乃至於百千億那由他劫不能得知我悉應以無功用無分別心成就圓滿第二修無功用行中二先加行趣求次佛子此菩薩下正顯修行今初先牒前無量為所趣求我悉下要期以無功無相攝取彼境無分別者謂不取性相忘緣等照即無相觀也加以無功無相尤勝然任放天性不由勤策自然而行亡功合道名無功用八地方證今要心住彼故云應以由功用行此已滿故此則修行無功非如八地任運無功也佛子此菩薩以深智慧如是觀察常勤修習方便慧起殊勝道安住不動二正顯中初牒前觀智次常勤修下是修行相方便已下是所修法即前空中方便慧有中殊勝行既以無功無相智修能治功用有相之障後安住不動顯觀成相此即行成不動非如八地相用不動上治有功用障竟無有一念休息廢捨行住坐臥乃至睡夢未曾暫與蓋障相應第三無有一念下辨雙行勝差別文分四別一二行雙無間二常不捨下信勝三此菩薩於念念下能作大義四佛子此十下菩提分差別四中前三別顯後一總該三中前一自分後二勝進今初無有一念休息廢捨者正顯雙行無間之義謂不捨前不動之止觀察之觀為止觀二行雙行一念不休即無間義次行住下顯無間時謂四儀睡寤舉睡夢者以眛況審常不捨於如是想念二信勝者論云彼無量智中殊異義莊嚴相現前專念故者專念忍可即是信義常信前十無量二嚴佛境故名為勝此菩薩於念念中常能具足十波羅蜜何以故念念皆以大悲為首修行佛法向佛智故所有善根為求佛智施與眾生是名檀那波羅蜜能滅一切諸煩惱熱是名尸羅波羅蜜慈悲為首不損眾生是名羼提波羅蜜求勝善法無有厭足是名毗梨耶波羅蜜一切智道常現在前未甞散亂是名禪那波羅蜜能忍諸法無生無滅是名般若波羅蜜能出生無量智是名方便波羅蜜能求上上勝智是名願波羅蜜一切異論及諸魔眾無能沮壞是名力波羅蜜如實了知一切法是名智波羅蜜二作大義者一念頓具十度之行義利廣故念念修起故名為作文中二先總明次何以下徵釋徵云十度行異一念寧圓釋文分二先明能具所以由悲智雙運故後所有下顯所具之相檀通悲智忍唯約悲餘皆約智然此中十相意令一念十相不同故前六可知但釋後四方便涉事云無量智以是智故又能出生施等行願以攝眾生故名方便願中由此願智雖求八地已上上上大波羅蜜攝取彼勝行故次力中以是智故遠離布施等障故不為彼動智中以是智故布施等一切種差別如實了知為化眾生故此四相皆從用立名一念具中念念皆然初心欲修至此方得佛子此十波羅蜜菩薩於念念中皆得具足如是四攝四持三十七品三解脫門略說乃至一切菩提分法於念念中皆悉圓滿四菩提分差別中有四種相前二攝善後二離過一依大乘行謂十度自利此即大義二四攝者即依教化眾生三四持等即依煩惱障增上淨故謂依四持為所住處以三解脫為所依門修行三十七品則得煩惱障淨任持自分故名為持亦名四家所住處故四者一般若家此是能照二者諦家即是所照三捨煩惱家四苦清淨家由初二勝業離此惑苦四略說下依智障清淨以無所不具離塵沙無明上三雙行勝竟爾時解脫月菩薩問金剛藏菩薩言佛子菩薩但於此第七地中滿足一切菩提分法為諸地中亦能滿足第四前上地勝差別中二初明勝前六地後何以故菩薩從初下明勝後三地勝即增上義前中二先問問意云若先已具此何獨言若先未具何得成此金剛藏菩薩言佛子菩薩於十地中皆能滿足菩提分法然第七地最為殊勝何以故此第七地功用行滿得入智慧目在行故後答中三初標次徵後釋釋中二先別顯此地勝相功用行滿即自分滿足得入下勝進趣後由此二義勝前智慧即八地證智自在即五通大用十自在等佛子菩薩於初地中緣一切佛法願求故滿足菩提分法第二地離心垢故第三地願轉增長得法光明故第四地入道故第五地順世所作故第六地入甚深法門故第七地起一切佛法故皆亦滿足菩提分法二通示諸地滿相即遠釋十地皆滿足言近釋七地功用滿語故論徵云云何此地中方便行滿足方便即功用也具十方便故論自釋云彼餘世間出世間中更起殊勝行是故此七地中起一切佛法故者謂前三世間次三出世間此則更互各一殊勝行今一切中具起所以名滿初地願中具二地戒中具三地聞中具而云願增長者欲依如來智慧利眾生故餘可知七地云一切者瑜伽論中說佛功德七地皆得八地成就九地具足十地圓滿有少餘障未名清淨離即是清淨菩提何以故菩薩從初地乃至第七地成就智功用分以此力故從第八地乃至第十無功用行皆悉成就佛子譬如有二世界一處雜染一處純淨是二中間難可得過唯除菩薩有大方便神通願力佛子菩薩諸地亦復如是有雜染行有清淨行是二中間難可得過唯除菩薩有大願力方便智慧乃能得過二明勝後三地文中四一法二喻三合四因論生論今初先徵後釋徵意云何以前六各一至七方具一切釋云從初積集至此成故此酬前徵由此便能令後三地勝行成就斯乃勝後勝前乃約能入八地勝後令後地無功用行成乃至十地要由積功以至無功之功故合中有雜染行合雜染世界然有二義一即前六二通前七有清淨行合純淨世界即後三地中間難過亦有二義一若六地為雜則七地為中間若七地皆雜則從七至八即曰中間難過者猶娑婆之於極樂淨穢域絕前六後三難過亦爾要得此地大願方便能越淨由此到染由此過故此一地最為要勝補義云經言十地雜染清淨難過者識論云不動地前纔捨藏以阿賴識中含藏積劫雜染種子為俱生我執之根本以從初地至此地破俱生我執頓斷俱生種子轉藏為大圓鏡智名清淨識然約俱生一分種子難斷故云難過言是二中間者謂此耶識名和合識約染淨和合二者之間蓋約破此俱生和合之相最極為難故云中間難過所以此地勝後三者良由此地翻染令淨之功最大後三清淨仗此而成故云皆悉成就然約此義釋似易明了解脫月菩薩言佛子此七地菩薩為是染行為是淨行四因論生論中先問後答問意云前七可知但言中間為何所屬金剛藏菩薩言佛子從初地至七地所行諸行皆捨離煩惱業以迴向無上菩提故分得平等道故然未名為超煩惱行答意明非染非淨亦得名亦染亦淨故名中間於中二先通將七地對後彰劣攝此第七通染淨則成前七皆成染淨相雜非純染行故論云從初地來離一切煩惱示現如是此地名為染淨非染行故後佛子此第七下別將此地對前彰勝顯此第七雙非染淨故成前第七是中間義今初通中有法喻合法初標離惑業顯是淨故次以迴向下釋上淨義以二因故從然未下即由上二顯同前染非報行故補義云經約位明中間者然位以斷惑而立今正在難斷中間欲斷而未斷故云超煩惱者以求淨未得故佛子譬如轉輪聖王乘天象寶遊四天下知有貧窮困苦之人而不為彼眾患所染然未名為超過人位若捨王身生於梵世乘天宮殿見千世界遊千世界示現梵天光明威德爾乃名為超過人位次喻中輪王喻七地隨分捨功用道故梵王喻於八地報得初禪遊千界故然法中對問但名前七喻中舉勝顯劣故兼明上地佛子菩薩亦復如是始從初地至於七地乘波羅蜜乘遊行世間知諸世間煩惱過患以乘正道故不為煩惱過失所染然未名為超煩惱行若捨一切有功用行從第七地入第八地乘菩薩清淨乘遊行世間知煩惱過失不為所染爾乃名為超煩惱行以得一切盡超過故合文準此可知佛子此第七地菩薩盡超過多貪等諸煩惱眾住此地不名有煩惱者不名無煩惱者何以故一切煩惱不現行故不名有者求如來智心未滿故不名無者二別明此地雙非染淨初總明盡超過多貪等者盡超故勝前求佛之心為貪厭世為嗔取空著有為癡至此盡超又初地超貪檀度滿故二三超嗔尸滿忍故三亦超癡得聞持故四地超慢道品離我相故五地超疑了諸諦故六地超見入般若故此地總超隨惑等常在觀故故云盡超而云多者顯非報行故則細者未超次住此下正明形前望後以顯雙非後何以下釋雙非義常在觀故惑不現行即超過也有功用行名求未滿即劣後也功用即是煩惱以有起動故四前上地勝差別竟佛子菩薩住此第七地以深淨心成就身業成就語業成就意業所有一切不善業道如來所訶皆已捨離一切善業如來所讚常善修行第五佛子菩薩住此下彼果勝中論主此中名雙行果此果實通諸分以雙行是正住行親生此果故又以雙行該於諸分皆雙行故名雙行果文分四果一業清淨二得勝三昧三過地四得勝行又初一即自他二利雙行二即定慧雙行三即悲智等雙行四即寂用雙行就初果中復分四種一者戒清淨於中初約性戒明戒但三業淨後所有已下約制聽明戒則惡止善行就初果中復分為四者一戒清淨二世間智淨三得自身勝四得勝力又此四中初三自分後一勝進前中初一離過後二成善善中二前行用後行體世間所有經書技術如五地中說皆自然而行不假功用二世間智淨此辨行用此菩薩於三千大千世界中為大明師唯除如來及八地已上其於菩薩深心妙行無與等者三得自身勝此明行體論云心行二平等無與等者謂深心及妙行為二深心即證行猶是十方便妙行即教行亦是前起勝行此二齊起故云平等不同前地有無間生諸禪三昧三摩鉢底神通解脫皆得現前然是修成非如八地報得成就此地菩薩於念念中具足修集方便智力及一切菩提分法轉勝圓滿四明得勝力謂得禪等現前勝功德力故上三自分此一勝進文中二初明離定障禪等已見品初論云寂滅樂行故此釋三昧是現法樂住禪次云滅定三摩鉢提者以三摩鉢底有其五種一四無色二八勝處三十徧處四滅盡定五無想定前四菩薩多入為化眾生故後一不入非聖法故今於五中正意在滅定故論別明下解脫月亦因此言問何位中能入滅定也後此地下離障可知上果差別四中初業清淨竟佛子菩薩住此地入菩薩善觀擇三昧善擇義三昧最勝慧三昧分別義藏三昧如實分別義三昧第二佛子菩薩住此下明三昧勝分二初別舉十名後入如是下總結多類今初前五自利後五利他又前五起解後五成行又前五現法樂住後五利益眾生前中初二知理次二知教義後一知事一云善觀擇者依未觀義伏心令觀二依已觀義重更思審故論云善思義三昧三依一名句說無量義故云最勝四依一義說無量名故云分別義含於名故稱為藏五依通一切五明處如事實故善住堅固根三昧智慧神通門三昧法界業三昧如來勝利三昧種種義藏生死涅槃門三昧後五中初一依煩惱障淨真如觀堅固根故般若云不動法界真如觀為堅起信云真如三昧為諸定之本故此云根此一顯行深後四依智障淨以顯行廣為治四障故經即能治障在文外四中初一助道次二證道後一不住道初智通者治勝功德障智通即是勝德以智與通化利鈍二類令入一實故名為門二治無礙智障雙照事理二法界為業故三治於深上佛法怯弱障大悲勝利安住涅槃能建大事是佛深上法四治不住行障種種義藏者種種善根故此善能生不住故名為藏修為善根故不住涅槃修無為善根故不住生死種種善根即無住之門入如是等具足大智神通門百千三昧淨治此地後總結多類上果中第二三昧勝竟是菩薩得此三昧善治淨方便慧故大悲力故超過二乘地得觀察智慧地第三明過地於中三一修行善巧過二作業廣大過三修行勝入過今初過法有二一巧智二深悲過相亦二一下過二乘二上過智地智慧地即八地無功用智由此地中雙觀止觀便至彼處法流水中任運雙流趣佛智海佛子菩薩住此地善淨無量身業無相行善淨無量語業無相行善淨無量意業無相行故得無生法忍光明二作業廣大過中二先正顯過後解脫月下彰過分齊今初中先對下彰出過言無相者即前樂無作對治無量者即前無量對治入定離相二乘容有而非無量故此無量顯異二乘善淨之言顯過下地謂修方便行滿足故後得無生法忍光明對上彰入過是彼八地無生法忍明相現前故下地未得故解脫月菩薩言佛子菩薩從初地來所有無量身語意業豈不超過二乘耶二彰過分齊中二先難即執前同後難金剛藏菩薩言佛子彼悉超過然但以願求諸佛法故非是自智觀察之力今第七地自智力故一切二乘所不能及譬如王子生在王家王后所生具足王相生已即勝一切臣眾但以王力非是自力若身長大藝業悉成乃以自力超過一切菩薩摩訶薩亦復如是初發心時以志求大法故超過一切聲聞獨覺今住此地以自所行智慧力故出過一切二乘之上後答即揀後異前答有法喻合法中非自力者障現行故喻中王家即如來家王后即得真法喜修二利故名為王相合中大法即法中佛果法自所行者即殊勝行智慧力者即方便慧於此二中常不出觀故是自力能過此約寄位上作業廣大過佛子菩薩住此第七地得甚深遠離無行常行身語意業勤求上道而不捨離是故菩薩雖行實際而不作證第三佛子下明修行勝入過謂非但如前廣多無量而力用難測深無分量勝而過也文中言甚深者即遠入無底故遠離者彼前障滅故無行者無相之行無所行故彼前六地不能行故常行者此無間故得此三業即當體深入過勤求下即趣後勝入過二乘亦有離彼相業而得少為足不能上求菩提求故過也是故下結雙行過上彼果中第三得過地竟解脫月菩薩言佛子菩薩從何地來能入滅定第四解脫月下明得勝行於中二先得寂滅勝行在定不住故即方便智也二佛子此菩薩下得發趣勝即起殊勝行前中先問後答金剛藏菩薩言佛子菩薩從第六地來能入滅定今住此地能念念入亦念念起而不作證故此菩薩名為成就不可思議身語意業行於實際而不作證譬如有人乘船入海以善巧力不遭水難此地菩薩亦復如是乘波羅蜜船行實際海以願力故而不證滅答中先明得法分齊六地入深緣起之實際未念念入者有出觀故今住下辨過勝劣於中有法喻合法中先正明得而不證後此菩薩下出不證所以以得方便即寂起用故成不思議三業故能不起滅定而現諸威儀喻云善巧力者如行船法知水相故合云波羅蜜船即般若等也以願力者是方便不捨有因佛子此菩薩得如是三昧智力以大方便雖示現生死而恒住涅槃雖眷屬圍繞而常樂遠離雖以願力三界受生而不為世法所染雖常寂滅以方便力而還熾然雖然不燒雖隨順佛智而示入聲聞辟支佛地雖得佛境界藏而示住魔境界雖超魔道而現行魔法雖示同外道行而不捨佛法雖示隨順一切世間而常行一切出世間法所有一切莊嚴之事出過一切天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人及非人帝釋梵王四天王等之所有者而不捨離樂法之心二明發起勝行中亦是上來已攝無著行此下攝平等隨順一切眾迴向且依發起勝行文分為二初牒前標後由得滅定三昧不作證智故成後大方便也次雖示下正顯勝行經有十句論為八種共對治攝謂後三為一故能治所治二行共俱互相攝故如示生死為所治以恒住涅槃為能治能治攝於所治則不為生死所染亦得以涅槃為所治示現生死為能治能治攝於所治而不證於涅槃他皆倣此八中初一為總故云生死涅槃論云一起功德行謂入生死為福業事故淨名云生死畏中當依如來功德之力不入生死海不得無價寶珠何有功德二上首攝餘行謂既示生死必為上首攝眷屬故三願取有行非業所拘故處不染四家不斷行謂雖言不染而示有妻子名家不斷雖然不燒者示有常修梵行故唯此一句具空中方便慧有中殊勝行上下皆應倣此從略故無五者入行謂非獨化凡亦轉二乘入佛慧故六資生行謂雖知五欲即道含攝佛法而飲食資身睡夢資神皆順五欲十軍是魔境界七退行謂示老病死衰退即四魔等法不行其因名超魔道八者轉行謂初四化凡次一化小次二化魔今由自行不染故轉凡之惑令絕其因此有三種一見愛轉外道著諸見故如佛示學二仙謂本行云一阿羅漢仙二頭藍弗仙二障礙轉如佛示學書算等三所有下貪轉如佛處於王宮而不生染著上彼果差別竟通上大文位行竟佛子菩薩成就如是智慧住遠行地以願力故得見多佛所謂見多百佛乃至見多百千億那由他佛第二位果初調柔果文亦有四初調柔行體中亦有法喻合法亦三初緣於彼佛所以廣大心增勝心供養恭敬尊重讚歎衣服飲食臥具醫藥一切資生悉以奉施亦以供養一切眾僧以此善根迴向阿耨多羅三藐三菩提復於佛所恭敬聽法聞已受持獲如實三昧智慧光明隨順修行於諸佛所護持正法常為如來之所讚喜一切二乘所有問難無能退屈次於彼下能鍊行淨言護持正法者由方便行滿守護於他故得三界為大師所以能護利益眾生法忍清淨如是經無量百千億那由他劫所有善根轉更增勝三利益下明所鍊淨論云此地釋名應知者即以經文為釋名謂利益眾生是有中殊勝行法忍清淨即空中方便智此二是行善根轉更增勝者明功用究竟即是遠義譬如真金以眾妙寶間錯莊嚴轉更增勝倍益光明餘莊嚴具所不能及喻中金喻證智信等善根眾寶間錯者即一切菩提分法方便行功用滿足故令前善根轉勝菩薩住此第七地所有善根亦復如是以方便慧力轉更明淨非是二乘之所能及三合可知佛子譬如日光星月等光無能及者閻浮提地所有泥潦悉能乾竭此遠行地菩薩亦復如是一切二乘無有能及悉能乾竭一切眾生諸惑泥潦第二佛子譬如日光下明教智淨先喻後合喻中光喻如前地而此日光勝故勝彼月光以月清涼如般若故日光用廣如方便故此菩薩十波羅蜜中方便波羅蜜偏多餘非不修但隨力隨分三別地行相佛子是名略說菩薩摩訶薩第七遠行地四結說地名菩薩住此地多作自在天王善為眾生說證智法令其證入布施愛語利行同事如是一切諸所作業皆不離念佛乃至不離念具足一切種一切智智二攝報果二初上勝身復作是念我當於一切眾生中為首為勝乃至為一切智智依止者此菩薩若發勤精進於一念頃得百千億那由他三昧乃至示現百千億那由他菩薩以為眷屬二上勝果若以菩薩殊勝願力自在示現過於此數乃至百千億那由他劫不能數知三願智果爾時金剛藏菩薩欲重宣其義而說頌曰第一義智三昧道六地修行心滿足即時成就方便慧菩薩以此入七地雖明三脫起慈悲雖等如來勤供佛雖觀於空集福德菩薩以此升七地遠離三界而莊嚴滅除惑火而起𦦨知法無二勤作業了剎皆空樂嚴土解身不動具諸相達聲性離善開演入於一念事各別智者以此升七地第三重頌二十一偈分三初十七偈半頌位行次二偈半頌位果後一偈歎勝結說前中分五初四偈頌樂無作行對治觀察此法得明了廣為羣迷興利益入眾生界無有邊佛教化業亦無量國土諸法與劫數解欲心行悉能入說三乘法亦無限如是教化諸羣生次二偈頌彼障對治無量略不頌無功用行菩薩勤求最勝道動息不捨方便慧一一迴向佛菩提念念成就波羅蜜發心迴向是布施滅惑為戒不害忍求善無厭斯進策於道不動即修禪忍受無生名般若迴向方便希求願無能摧力善了智如是一切皆成滿三有三偈頌雙行無間初地攀緣功德滿二地離垢三諍息四地入道五順行第六無生智光照七住菩提功德滿種種大願皆具足以是能令八地中一切所作咸清淨此地難過智乃超譬如世界二中間亦如聖王無染著然未名為總超度若住第八智地中爾乃踰於心境界如梵觀世超人位如蓮處水無染著此地雖超諸惑眾不名有惑非無惑以無煩惱於中行而求佛智心未足四有五偈頌前上地勝分言三息諍者約忍度故又得法光明故無有諍世間所有眾技藝經書辭論普明了禪定三昧及神通如是修行悉成就菩薩修行七住道超過一切二乘行初地願成此由智譬如王子力具足成就甚深仍進道心心寂滅不取證譬如乘船入海中在水不為水所溺方便慧行功德具一切世間無能了五有三偈半頌雙行果供養多佛心益明如以妙寶莊嚴金此地菩薩智最明如日舒光竭愛水又作自在天中主化導羣生修正智又以勇猛精勤力獲多三昧見多佛百千億數那由他願力自在復過是次二偈半頌位果此是菩薩遠行地方便智慧清淨道一切世間天及人聲聞獨覺無能知三一偈頌說讚勝第七遠行地竟
