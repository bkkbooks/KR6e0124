行第十云無量者四等也解行發心在於十行發迴向心故四為令一切眾生成就清淨下十句令成十地位中修十度行五為令一切眾生身口意業下十句令成等覺位中修行故皆有普言六為令一切眾生具諸相好下十一句令成佛果位中行六十種音者疏說六十四音以聲有八轉謂體業具為從屬於呼是為八轉聲各具德所謂調和柔軟諦了易解無錯謬無雌小廣大深遠八八則有六十四種第二為令一切眾生悉能往詣下三十八句明圓融行因圓果滿文分為四初十句令眾生於種性位中因行圓滿二為令一切眾生了達正法下十句令解行位中因圓果滿二云大方田者謂於其中種少善根能壞大惑故三從悉能具足一切菩薩清淨心下八句令十地位中因行圓滿四從令得一切智成等正覺下十句令成佛果圓滿下文第三結其成益初佛子菩薩摩訶薩如是悲愍下結前生後次云咸令清淨下別顯益相文有十三句顯二種生攝一切德初之三句顯勝妙生二句為因一句為果清淨者戒受人天身離悋者施有大財位人天財位即勝妙生有大威德後之十句顯功德生功德生者即決定勝道有人天中具大財位無信解等非功德生上慈悲迴向竟下文又勸眾生令其修習下二勸物迴向中先令悲智雙行而成迴向次為令下明迴向意文有六句三又以諸善根如是迴向下究竟迴向已上大文初迴向眾生菩提竟下大文第二佛子如是迴向時下迴向實際先牒前隨相次不著下正顯離相文有十句五對不著一切法者了法空故不著無一切法者空亦空故大文第三佛子菩薩如是迴向時下總結三種迴向近仍前起謂上離相不礙隨相遠結上文普施世間即迴向眾生願生成佛即迴向菩提得清淨下即迴向實際成就三世佛種即總結三種迴向之能上總前文通明廣釋中初明迴向竟下大文第二辨成益即此迴向行所成廣大之德文分四段初佛子菩薩修行如是迴向之時下十四行經明成因位廣大之德二佛子菩薩如是修習下果位清淨德三佛子菩薩如是迴向下明會違自在德四佛子菩薩如是迴向時得業平等下明相盡平等德前二段即隨相益後二段即離相益今初文中先牒成益之時顯正修行時即成此益次超出下正顯文有十二句初二句總次十句別顯次佛子菩薩如是修習下明果位清淨德先牒現況當謂前因德尚爾無盡況當成果德豈可量耶次一切佛剎平等下十句懸解當相謂成果之狀略舉此十前六果相圓備後四舉因顯果謂此果滿由因圓故第三佛子菩薩如是迴向時下會違自在德初結前生後此結有二意一結果德果德無邊上言不盡故云一切功德清淨二通結因果以隨相益竟欲明得隨相益即有離相故總結云得一切功德乃至圓滿莊嚴由此故有不違等也次正顯會違有四初法法無違中文有三節初如是迴向時眾生不違一切剎等有十一對初六對顯事事無違次法性不違下二對顯事理無違三剎平等不違下三對理理無違上三法法相望無違次云過去不違未來下一行半經明世世無違三世平等下約世法無違四菩薩行不違下約因果無違四相盡平等德文有二節初佛子菩薩如是迴向時得業平等初得離相平等益次承事一切諸佛下明得不壞諸相益上廣釋已竟下依釋結名佛子是為菩薩摩訶薩第七等隨順一切眾生迴向前來通明位行已竟下明位果菩薩摩訶薩成就此迴向則能摧滅一切魔怨拔諸欲刺得出離樂住無二性具大威德救護眾生為功德王神足無礙往一切剎入寂滅處具一切身成菩薩行於諸行願心得自在分別了知一切諸法悉能徧生一切佛剎得無礙耳聞一切剎所有音聲得淨慧眼見一切佛未甞暫捨於一切境界成就善根心無高下於一切法得無所得菩薩摩訶薩以一切善根等隨順一切眾生如是迴向大文第二辨位果與益異者成益約於位中得果就其位滿有二十一句初一牒前後一總結中間十九句攝為九果一斷染果降魔冤謂止惡緣拔欲刺斷惡因也二證入果得出離樂正證住無二性證因三益生果具大威德即護生之因四內外超勝果謂內德外用五往一切下寂用無礙果六具一切下行願廣大果七分別下智通殊勝果八得無礙下見聞自在果九於一切境下修行具足果初成就後無得爾時金剛幢菩薩承佛神力普觀十方而說頌言菩薩所作諸功德微妙廣大甚深遠乃至一念而修行悉能迴向無邊際菩薩所有資生具種種豐盈無限億香象寶馬以駕車衣服珍財悉殊妙或以頭目并手足或持身肉及骨髓悉徧十方無量剎普施一切令充徧無量劫中所修習一切功德盡迴向為欲救度諸羣生其心必竟不退轉菩薩為度眾生故常修最勝迴向業普令三界得安樂悉使當成無上果菩薩普興平等願隨其所集清淨業悉以迴施諸羣生如是大誓終無捨菩薩願力無限礙一切世間咸攝受如是迴向諸羣生未曾暫捨分別心普願眾生智明了布施持戒悉清淨精進修行不懈廢如是大誓無休息菩薩迴向到彼岸普開清淨妙法門智慧同於兩足尊分別實義得究竟菩薩言詞已通達種種智慧亦如是說法如理無障礙而於其中心不著常於諸法不作二亦復不作於不二於二不二並皆離知其悉是語言道知諸世間悉平等莫非心語一切業眾生幻化無有實所有果報從茲起一切世間之所有種種果報各不同莫不皆由業力成若滅於業彼皆盡菩薩觀察諸世間身口意業悉平等亦令眾生住平等猶如無等大聖尊菩薩善業悉迴向普令眾生色清淨福德方便皆具足同於無上調御士菩薩利益諸羣生功德大海盡迴向願使威光特超世得成勇猛大力身凡所修習諸功德願使世間普清淨諸佛清淨無倫匹眾生清淨亦如是菩薩於義得善巧能知諸佛最勝法以眾善巧等迴向願令庶品同如來菩薩了知諸法空一切世間無所有無有造作及作者眾生業報亦不失諸法寂滅非寂滅遠離此二分別心知諸分別是世見入於正位分別盡如是真實諸佛子從於如來法化身彼能如是善迴向世間疑惑悉除滅第二重頌有二十一偈分三初十一偈頌迴向次九偈頌成益後一偈結讚初中分二初半偈頌所迴善根餘頌攝將迴向於中分三初三偈半頌迴己修善願成資具以施眾生次菩薩為度下五偈頌復迴此施願令眾生具足法財三菩薩言詞下二偈頌迴向實際二知諸世間下頌成益中三初二偈頌因德廣大次菩薩觀察下五頌果德清淨後菩薩了知下二偈頌相盡平等後如是下三偈頌結歎
