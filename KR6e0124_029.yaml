body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈十迴向品第二十五之七佛子云何為菩薩摩訶薩等隨順一切眾生迴向第七等隨一切眾生迴向長行亦二先位行後位果初中牒起釋名者謂以善根等心順益故等即平等通於能所所順眾生無相平等能隨順心智照平等此從迴向受名等即隨順故本業云以觀察善惡父母無二相一合相故名隨順觀察一切眾生迴向有云善惡即冤親此二平等俱生法身皆名父母善父母者方便般若也惡父母者無明貪愛也不滅痴愛起於明脫故無二相智契無二名一合相佛子此菩薩摩訶薩隨所積集一切善根所謂小善根大善根廣善根多善根無量善根種種善根微塵數善根阿僧祇善根無邊際善根不可思善根不可量善根佛境界善根法境界善根僧境界善根善知識境界善根一切眾生境界善根方便善巧境界善根修諸善心境界善根內境界善根外境界善根無邊助道法境界善根勤修一切捨善根立勝志究竟持淨戒善根一切捨無不受堪忍善根常精進心無退善根以大方便入無量三昧善根以智慧善觀察善根知一切眾生心行差別善根集無邊功德善根勤修習菩薩業行善根普覆育一切世間善根佛子菩薩摩訶薩於此善根修行安住趣入攝受積集辦具悟解心淨開示發起時得堪忍心閉惡趣門善攝諸根威儀具足遠離顛倒正行圓滿堪為一切諸佛法器能作眾生福德良田為佛所念長佛善根住諸佛願行諸佛業心得自在等三世佛趣佛道場入如來力具佛色相超諸世間不樂生天不貪富樂不著諸行一切善根悉以迴向為諸眾生功德之藏住究竟道普覆一切於虗妄道中拔出眾生令其安住一切善法徧諸境界無斷無盡開一切智菩提之門建立智幢嚴淨大道普能示現一切世間令除垢染心善調伏生如來家淨佛種性功德具足作大福田為世所依安立眾生咸令清淨常勤修習一切善根第二廣釋中大文分二先明迴向後佛子菩薩摩訶薩修行如是迴向之時下辨所成益初中亦二先辨所迴善根後佛子菩薩摩訶薩以淨志下攝將迴向前所迴中復二先正修善根後佛子菩薩摩訶薩於此善下因修成德亦可前是體後明行用前中有三十一句分為三段初隨所積集下十一句明善根分齊次佛境界善根下十句明善所依緣後勤修一切捨善根下十句明善根體性前十一一該後二十思之自顯次明因修成德初佛子菩薩摩訶薩於此善根下先牒已修文有十句次得堪忍下五行經正顯成德中先明自利德文有十對次為諸眾生功德之藏下五行餘經明利他德佛子菩薩摩訶薩心淨志願菩提心力修諸善根時作是念言此諸善根是菩提心之所積集是菩提心之所思惟是菩提心之所發起是菩提心之所志樂是菩提心之所增益皆為憐愍一切眾生皆為趣求一切種智皆為成就如來十力作是念時善根增進永不退轉佛子菩薩摩訶薩復作是念願我以此善根果報盡未來劫修菩薩行悉以專施一切眾生悉以迴向一切眾生普徧無餘願令阿僧祇世界珍寶充滿阿僧祇世界衣服充滿阿僧祗世界妙香充滿阿僧祇世界莊嚴具充滿阿僧祇世界無量摩尼寶充滿阿僧祇世界妙華充滿阿僧祇世界上味充滿阿僧祇世界財貨充滿阿僧祇世界牀座充滿蓋以寶帳敷以妙衣阿僧祇世界種種莊嚴寶冠充滿假使一人盡未來劫常來求索以此等物而惠施之未曾厭倦而有休息如於一人於一切眾生悉亦如是佛子菩薩摩訶薩如是施時無虗偽心無希望心無名譽心無中悔心無熱惱心但發專求一切智道心一切悉捨心哀愍眾生心教化成熟心皆令安住一切智智心佛子菩薩摩訶薩以諸善根如是迴向盡未來劫常行惠施住一切智智心佛子菩薩摩訶薩復作是念我為一眾生故欲令阿僧祇世界寶象充滿七支具足性極調順上立金幢金網彌覆種種妙寶而為莊嚴以用布施願令阿僧祇世界寶馬充滿如龍馬王種種眾寶莊嚴之具而嚴飾之持用布施願令阿僧祇世界妓女充滿悉能敷奏種種妙音持用布施願令阿僧祇世界男女充滿持用布施願令阿僧祇世界己身充滿發菩提心而用布施願令阿僧祇世界己頭充滿起不放逸心而用布施願令阿僧祇世界己眼充滿而用布施願令阿僧祇世界己身血肉及以骨髓充滿其中心無顧戀持用布施願令阿僧祇世界自在王位充滿其中持用布施願令阿僧祇世界奴僕作使充滿其中持用布施菩薩摩訶薩以如是等種種諸物盡未來劫安住廣大一切施心施一眾生如一眾生盡眾生界一切眾生皆如是施佛子菩薩摩訶薩於一世界盡未來劫修菩薩行以是等物施一眾生如是給施一切眾生皆令滿足如於一世界於盡虗空徧法界一切世界中悉亦如是大悲普覆終無間息普加哀愍隨其所須供給供養不令施行遇緣而息乃至不於一彈指頃生疲倦心佛子菩薩摩訶薩如是施時生於此心所謂無著心無縛心解脫心大力心甚深心善攝心無執心無壽者心善調伏心不散亂心不妄計心具種種寶性心不求果報心了達一切法心住大迴向心善決諸義心令一切眾生住無上智心生大法光明心入一切智智心第二攝將迴向中初五行經明念修善根本因法應迴向次將迴向中大文分三初向眾生及向菩提後佛子菩薩摩訶薩如是迴向時不著業下明向實際三佛子菩薩摩訶薩以此善根普施世間下總結三種迴向初中迴己善願成資具以施眾生經云佛子菩薩摩訶薩復作是念願我以此善根下兩行餘經先總顯要期次彰施行先願成外施文有四段初云願令阿僧祇世界珍寶下五行餘經顯廣大施各僧祇故次云假使一人盡未來劫下兩行經辯施無限長時多田隨求無厭故三佛子如是施時下三行經明施殊勝離過順理故四云佛子菩薩摩訶薩以諸善根下一行餘經結成二行謂由迴向行以成施行上成外施下文願成內施文有四段初佛子菩薩摩訶薩復作是念下有十二行經明對一田顯施廣大謂一切眾生即施多事各僧祇故二菩薩以如是等下以一例餘彰施無限三佛子菩薩於一世界下舉處例處總收其義有六無限一物二時三心四田五施六處大悲下結成所作該六無限四佛子菩薩如是施時下五行經顯施殊勝離過成德有二十心初一牒前起後次所為下正顯一十九心具七殊勝檀度行成謂初六心即巧便殊勝次五心即清淨殊勝次有三心即安住殊勝次有二心即迴向殊勝次有一心即意樂殊勝謂悲愍一切故後之二心即依止殊勝依菩提心故上迴己善願成資具已竟下文第二迴此令眾具足財法佛子菩薩摩訶薩以所集善根於念念中如是迴向所謂願一切眾生財寶豐足無所延少願一切眾生成就無盡大功德藏願一切眾生具足一切安隱快樂願一切眾生增長菩薩摩訶薩業願一切眾生成滿無量第一勝法願一切眾生得不退轉一切智乘願一切眾生普見十方一切諸佛願一切眾生永離世間諸惑塵垢願一切眾生皆得清淨平等之心願一切眾生離諸難處得一切智佛子菩薩摩訶薩如是迴向時發歡喜心為令一切眾生得利益安樂故為令一切眾生得平等心故為令一切眾生住能捨心故為令一切眾生住一切施心故為令一切眾生住歡喜施心故為令一切眾生住永離貧窮施心故為令一切眾生住一切財寶施心故為令一切眾生住無數財寶施心故為令一切眾生住普施無量施一切施心故為令一切眾生住盡未來劫無斷施心故為令一切眾生住一切悉捨無悔無惱施心故為令一切眾生住悉捨一切資生之物施心故為令一切眾生住隨順施心故為令一切眾生住攝取施心故為令一切眾生住廣大施心故為令一切眾生住捨無量莊嚴具供養施心故為令一切眾生住無著施心故為令一切眾生住平等施心故為令一切眾生住如金剛極大力施心故為令一切眾生住如日光明施心故為令一切眾生住攝如來智施心故為令一切眾生善根眷屬具足故為令一切眾生善根智慧常現在前故為令一切眾生得不可壞淨心圓滿故為令一切眾生成就最勝清淨善根故為令一切眾生於煩惱睡眠中得覺悟故為令一切眾生滅除一切諸疑惑故為令一切眾生得平等智慧淨功德故為令一切眾生功德圓滿無能壞者故為令一切眾生具足清淨不動三昧故為令一切眾生住不可壞一切智智故為令一切眾生成滿菩薩無量清淨神通行故為令一切眾生修集無著善根故為令一切眾生念去來今一切諸佛心清淨故為令一切眾生出生清淨勝善根故為令一切眾生滅除一切處所作業障道法故為令一切眾生具足無礙清淨平等功德法故為令一切眾生以廣大心常念諸佛無懈廢故為令一切眾生常近諸佛勤供養故為令一切眾生廣開一切諸善根門普能圓滿白淨法故為令一切眾生無量心廣大心最勝心悉清淨故為令一切眾生成就清淨等施心故為令一切眾生奉持諸佛尸波羅蜜等清淨故為令一切眾生得大堪忍波羅蜜故為令一切眾生住精進波羅蜜常無懈故為令一切眾生住無量定能起種種神通智故為令一切眾生得知一切法無體性般若波羅蜜故為令一切眾生圓滿無邊淨法界故為令一切眾生成滿一切神通清淨善根故為令一切眾生住平等行積集善法悉圓滿故為令一切眾生善入一切諸佛境界悉周徧故為令一切眾生身口意業普清淨故為令一切眾生善業果報普清淨故為令一切眾生了達諸法普清淨故為令一切眾生了達實義普清淨故為令一切眾生修諸勝行普清淨故為令一切眾生成就一切菩薩大願普清淨故為令一切眾生證得一切功德智慧普清淨故為令一切眾生成就一切同體善根迴向出生一切智乘普圓滿故為令一切眾生嚴淨一切諸佛國土普圓滿故為令一切眾生見一切佛而無所著普圓滿故為令一切眾生具諸相好功德莊嚴普圓滿故為令一切眾生得六十種音聲發言誠諦皆可信受百千種法而以莊嚴如來無礙功德妙音悉圓滿故為令一切眾生成就十力莊嚴無礙平等心故為令一切眾生得一切佛無盡法明一切辯才普圓滿故為令一切眾生得無上無畏人中之雄師子吼故為令一切眾生得一切智轉不退轉無盡法輪故為令一切眾生了一切法開示演說普圓滿故為令一切眾生以時修習清淨善法普圓滿故為令一切眾生成就導師無上法寶等清淨故為令一切眾生於一莊嚴無量莊嚴大莊嚴諸佛莊嚴普圓滿故為令一切眾生等入三世所有境界悉周徧故為令一切眾生悉能往詣一切佛剎聽受正法無不徧故為令一切眾生智慧利益為世所宗與佛等故為令一切眾生以一切智知一切法普圓滿故為令一切眾生行不動業得無礙果普圓滿故為令一切眾生所有諸根咸得神通能知一切眾生根故為令一切眾生得無差別平等智慧於一相法普清淨故為令一切眾生與理無違一切善根悉具足故為令一切眾生於一切菩薩自在神通悉明達故為令一切眾生得一切佛無盡功德若福若智悉平等故為令一切眾生發菩提心解一切法平等一相無遺缺故為令一切眾生了達正法為世最上德福田故為令一切眾生成就平等清淨大悲為諸施者大力田故為令一切眾生堅固第一無能沮壞故為令一切眾生見必蒙益無能摧伏故為令一切眾生成滿最勝平等心故為令一切眾生善能了達一切諸法得大無畏故為令一切眾生放一光明普照十方一切世界故為令一切眾生普修一切菩薩精進行無懈退故為令一切眾生以一行願普滿一切諸