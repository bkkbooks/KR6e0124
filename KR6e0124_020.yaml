body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈十行品第二十一之下佛子何等為菩薩摩訶薩無著行佛子此菩薩以無著心於念念中能入阿僧祇世界嚴淨阿僧祇世界於諸世界心無所著往詣阿僧祇諸如來所恭敬禮拜承事供養以阿僧祇華阿僧祇香阿僧祇鬘阿僧祇塗香末香衣服珍寶幢幡妙蓋諸莊嚴具各阿僧祇以用供養如是供養為究竟無作法故為住不思議法故於念念中見無數佛於諸佛所心無所著於諸佛剎亦無所著於佛相好亦無所著見佛光明聽佛說法亦無所著於十方世界及佛菩薩所有衆會亦無所著聽佛法已心生歡喜志力廣大能攝能行諸菩薩行然於佛法亦無所著此菩薩於不可說劫見不可說佛出興於世一一佛所承事供養皆悉盡於不可說劫心無厭足見佛聞法及見菩薩衆會莊嚴皆無所著見不淨世界亦無憎惡何以故此菩薩如諸佛法而觀察故諸佛法中無垢無淨無暗無明無異無一無實無妄無安隱無險難無正道無邪道菩薩如是深入法界教化衆生而於衆生不生執著受持諸法而於諸法不生執著發菩提心住於佛住而於佛住不生執著雖有言說而於言說心無所著入衆生趣於衆生趣心無所著了知三昧能入能住而於三昧心無所著往詣無量諸佛國土若入若見若於中住而於佛土心無所著捨去之時亦無顧戀菩薩摩訶薩以能如是無所著故於佛法中心無障礙了佛菩提證法毗尼住佛正教修菩薩行住菩薩心思惟菩薩解脫之法於菩薩住處心無所染於菩薩所行亦無所著淨菩薩道受菩薩記得受記已作如是念凡夫愚癡無知無見無信無解無聰敏行頑嚚貪著流轉生死不求見佛不隨明導不信調御迷誤失錯入於險道不敬十力王不知菩薩恩戀著住處聞諸法空心大驚怖遠離正法住於邪法捨夷坦道入險難道棄背佛意隨逐魔意於諸有中堅執不捨菩薩如是觀諸衆生增長大悲生諸善根而無所著菩薩爾時復作是念我當為一衆生於十方世界一一國土經不可說不可說劫教化成熟如為一衆生為一切衆生皆亦如是終不以此而生疲厭捨而餘去又以毛端遍量法界於一毛端處盡不可說不可說劫教化調伏一切衆生如一毛端處一一毛端處皆亦如是乃至不於一彈指頃執著於我起我我所想於一一毛端處盡未來劫修菩薩行不著身不著法不著念不著願不著三昧不著觀察不著寂定不著境界不著教化調伏衆生亦復不著入於法界何以故菩薩作是念我應觀一切法界如幻諸佛如影菩薩行如夢佛說法如響一切世間如化業報所持故差別身如幻行力所起故一切衆生如心種種雜染故一切法如實際不可變異故又作是念我當盡虗空遍法界於十方國土中行菩薩行念念明達一切佛法正念現前無所取著菩薩如是觀身無我見佛無礙為化衆生演說諸法令於佛法發生無量歡喜淨信救護一切心無疲厭無疲厭故於一切世界有衆生未成就未調伏處悉詣於彼方便化度其中衆生種種音聲種種諸業種種取著種種施設種種和合種種流轉種種所作種種境界種種生種種歿以大誓願安住其中而教化之不令其心有動有退亦不一念生染著想何以故得無所著無所依故自利利他清淨滿足是名菩薩摩訶薩第七無著行第七無著行體即方便言不住事理故名無著以由回向故不住生死由拔濟故不住涅槃俱無住故名為無著所謂觀空而不捨有涉有而不迷虗權實雙行二邊不住故名無著行也文中釋相有二初顯自分無著次顯勝進無著於自分中初明淨境不著次於染境不嫌初經云此菩薩以無著心下明不著淨境謂雖嚴剎而心不著淨土次往詣阿僧祇諸如來所下明雖供養三寶而不著功德所以不著者次云為究竟等次於念念中下四行餘經別示不著之相義兼三寶及自進修皆無所著次此菩薩下明長時無著次云見不淨世界亦無憎惡於染境不嫌次何以故下兩行餘經徵釋不嫌染境之所以謂順法而觀無垢淨相故次菩薩如是深入下六行經類顯萬行若自若他皆無所著上明自分行下明勝進行中有三段初明自行次明利他行後結成行滿今初牒前自分次於佛法中心無障礙下有十一句正顯勝進次明利他先增長大悲後要心拔濟初中云得受記已下二行半經明觀其所悲所可悲者以觀迷四諦故墮險道次不敬十力下兩行半經明觀迷勝義故墮險道次菩薩如是觀下一行經明增悲無著上明觀其所悲由其可悲故次要心拔濟於中初起悲行菩薩爾時下三行經明心無疲厭次又以毛端下兩行經明其心廣大此悲行也次乃至不於一彈指頃下四行經舉少況多廣顯無著次何以故下五行半經釋無著之所以由念深故利廣以正念現前故無所取著耳上明勝進行下結成行滿於中觀身無我二句乃自利行成次為化衆生下一行半經明教化無疲次無疲厭故下四行經明無厭之相次不令其心二句結成無著次何以故下二句徵釋雙結二利行滿佛子何等為菩薩摩訶薩難得行此菩薩成就難得善根難伏善根最勝善根不可壞善根無能過善根不思議善根無盡善根自在力善根大威德善根與一切佛同一性善根此菩薩修諸行時於佛法中得最勝解於佛菩提得廣大解於菩薩願未曾休息盡一切劫心無疲倦於一切苦不生厭離一切衆魔所不能動一切諸佛之所護念具行一切菩薩苦行修菩薩行精勤匪懈於大乘願恆不退轉是菩薩安住此難得行已於念念中能轉阿僧祇劫生死而不捨菩薩大願若有衆生承事供養乃至見聞皆於阿耨多羅三藐三菩提得不退轉此菩薩雖了衆生非有而不捨一切衆生界譬如船師不住此岸不住彼岸不住中流而能運度此岸衆生至於彼岸以往返無休息故菩薩摩訶薩亦復如是不住生死不住涅槃亦復不住生死中流而能運度此岸衆生置於彼岸安隱無畏無憂惱處亦不於衆生數而有所著不捨一衆生著多衆生不捨多衆生著一衆生不增衆生界不減衆生界不生衆生界不滅衆生界不盡衆生界不長衆生界不分別衆生界不二衆生界何以故菩薩深入衆生界如法界衆生界法界無有二無二法中無增無減無生無滅無有無無無取無依無著無二何以故菩薩了一切法法界無二故菩薩如是以善方便入深法界住於無相以清淨相莊嚴其身了法無性而能分別一切法相不取衆生而能了知衆生之數不著世界而現身佛剎不分別法而善入佛法深達義理而廣演言教了一切法離欲真際而不斷菩薩道不退菩薩行常勤修習無盡之行自在入於清淨法界譬如鑽木以出於火火事無量而火不滅菩薩如是化衆生事無有窮盡而在世間常住不滅非究竟非不究竟非取非不取非依非無依非世法非佛法非凡夫非得果菩薩成就如是難得心修菩薩行時不說二乘法不說佛法不說世間不說世間法不說衆生不說無衆生不說垢不說淨何以故菩薩知一切法無染無取不轉不退故菩薩於如是寂滅微妙甚深最勝法中修行時亦不生念我現修此行已修此行當修此行不著蘊界處內世間外世間內外世間所起大願諸波羅蜜及一切法皆無所著何以故法界中無有法名向聲聞乘向獨覺乘無有法名向菩薩乘向阿耨多羅三藐三菩提無有法名向凡夫界無有法名向染向淨向生死向涅槃何以故諸法無二無不二故譬如虗空於十方中若去來今求不可得然非無虗空菩薩如是觀一切法皆不可得然非無一切法如實無異不失所作普示修行菩薩諸行不捨大願調伏衆生轉正法輪不壞因果亦不違於平等妙法普與三世諸如來等不斷佛種不壞實相深入於法辨才無盡聞法不著至法淵底善能開演心無所畏不捨佛住不違世法普現世間而不著世間菩薩如是成就難得智慧心修習諸行於三惡趣拔出衆生教化調伏安置三世諸佛道中令不動搖復作是念世間衆生不知恩報更相讐對邪見執著迷惑顛倒愚癡無智無有信心隨逐惡友起諸惡慧貪愛無明種種煩惱皆悉充滿是我所修菩薩行處設有知恩聰明慧解及善知識充滿世間我不於中修菩薩行何以故我於衆生無所適莫無所冀望乃至不求一縷一毫及以一字讚美之言盡未來劫修菩薩行未曾一念自為於己但欲度脫一切衆生令其清淨永得出離何以故於衆生中為明導者法應如是不取不求但為衆生修菩薩道令其得至安隱彼岸成阿耨多羅三藐三菩提是名菩薩摩訶薩第八難得行第八難得行體依願度釋相中二初明自分後明勝進初中先明自利此菩薩成就難得下三行經明修成善根次修諸行時下四行餘經顯善根之相文有十句由得最勝故受難得之名次安住此難得行下三行經顯行成利益上自利行次辨利他此菩薩雖了衆生下八行半經有法喻合合中云不住生死中流者上以生死為此岸涅槃為彼岸今言生死中流者以發心之後成佛之前十地三賢尚居二死是以中流即是生死故云生死中流非生死涅槃之中間名生死中也次何以故下徵釋不住所以有兩番徵初深入衆生下兩行餘經正徵不著次了一切法二句重徵前義次菩薩如是下七行餘經雙結二行有法喻合次非究竟下雙非二行拂跡入玄謂上二利悲智雙行心雖無著然猶恐涉悲智之迹故此拂之上明二利行次菩薩成就如是下明勝進行初明慧行次明悲行初牒前自分次不說二乘法下正辨勝進行相即事入玄故不說等明離相無說次何以故下四行經徵釋以顯雙非意云所以不說者一無法可說故二明無心說謂不起念故次何以故下三行經轉釋無念所以無念者稱法界故次何以故下四行半經徵顯雙非有法喻合徵意云既無所著何以故修二利之行釋意云由雙非故能雙運由無二故無著由無不二故不妨起行故合中先明性相無礙次普與下功成立德上辨慧行下辨悲行初如是成就下二句牒智顯悲次於三惡趣下一行餘經正顯悲相次復作是念下三行經偏語化惡明惡正是所悲故次設有下明若善則非化境矣次何以故下三行餘經徵釋遍化之所由徵意云菩薩化生理宜平等偏惡棄善其故何耶釋意云菩薩於物無定親疏但就惑重障深者可悲故惡是化境耳若求名利則化知恩以本無求故偏化惡次何以故下次轉徵釋必要行悲無求之所以徵云菩薩衆生本不相預何為長劫悲救無求釋意云諸佛菩薩法爾同導不爾不名為明導故上勝進行竟是名下結名佛子何等為菩薩摩訶薩善法行此菩薩為一切世間天人魔梵沙門婆羅門乾闥婆等作清涼法池攝持正法不斷佛種得清淨光明陀羅尼故說法授記辨才無盡得具足義陀羅尼故義辨無盡得覺悟實法陀羅尼故法辨無盡得訓釋言辭陀羅尼故詞辨無盡得無邊文句無盡義無礙門陀羅尼故無礙辨無盡得佛灌頂陀羅尼灌其頂故歡喜辨無盡得不由他悟陀羅尼門故光明辨無盡得同辨陀羅尼門故同辨無盡得種種義身句身文身中訓釋陀羅尼門故訓釋辨無盡得無邊旋陀羅尼故無邊辨無盡此菩薩大悲堅固普攝衆生於三千大千世界變身金色施作佛事隨諸衆生根性欲樂以廣長舌於一音中現無量音應時說法皆令歡喜假使有不可說種種業報無數衆生共會一處其會廣大充滿不可說世界菩薩於彼衆會中坐是中衆生一一皆有不可說阿僧祇口一一口能出百千億那由他音同時發聲各別言詞各別所問菩薩於一念中悉能領受皆為酬對令除疑惑如一衆會中於不可說衆會中悉亦如是復次假使一毛端處念念出不可說不可說道場衆會一切毛端處皆亦如是盡未來劫彼劫可盡衆會無盡是諸衆會於念念中以各別言詞各別所問菩薩於一念中悉能領受無怖無怯無疑無謬而作是念設一切衆生以如是語業俱來問我我為說法無斷無盡皆令歡喜住於善道復令善解一切言詞能為衆生說種種法而於言語無所分別假使不可說不可說種種言詞而來問難一念悉領一音咸答普使開悟無有遺餘以得一切智灌頂故以得無礙藏故以得一切法圓滿光明故具足一切智智故佛子此菩薩摩訶薩安住善法行已能自清淨亦能以無所著方便而普饒益一切衆生不見有衆生得出離者如於此三千大千世界如是乃至於不可說三千大千世界變身金色妙音具足於一切法無所障礙而作佛事佛子此菩薩摩訶薩成就十種身所謂入無邊法界非趣身滅一切世間故入無邊法界諸趣身生一切世間故不生身住無生平等法故不滅身一切滅言說不可得故不實身得如實故不妄身隨應現故不遷身離死此生彼故不壞身法界性無壞故一相身三世語言道斷故無相身善能觀察法相故菩薩成就如是十種身為一切衆生舍長養一切善根故為一切衆生救令其得大安隱故為一切衆生歸與其作大依處故為一切衆生導令得無上出離故為一切衆生師令入真實法中故為一切衆生燈令其明見業報故為一切衆生光令照甚深妙法故為一切三世炬令其曉悟實法故為一切世間照令入光明地中故為一切諸趣明示現如來自在故佛子是名菩薩摩訶薩第九善法行菩薩安住此行為一切衆生作清涼法池能盡一切佛法源故第九善法行體即力度言善法者謂善巧說法故名善法言力者唯識有二一思擇力二修習力由此前力為機說法本業有三一報通力二修定通力三變化通力此地大同九地是法師位善說法故初徵標其名次釋相有二先自分後勝進自分中此菩薩為一切世間下二行經初總明次得清淨光明下七行半經別明廣攝持正法次此菩薩大悲堅固下有十八行經廣不斷佛種於中通分三段初兩行半經明三業利生即大悲河次假使有人下假設深勝於中初假使有不可說下明大會斷疑直明一會即波羅蜜河次假使一毛下明微細斷疑謂於一毛端處有不可說如前大會即三昧河三而作是念下周遍斷疑上言毛端多衆尚有量今明一切衆各具多言悉能答故即願智河次以得一切智灌頂下總釋所由謂所以而能廣說者一以他佛外加故二以自藏離礙故三所照法圓故四能照智具故故稱為善法故不斷佛種上明自分行次此菩薩安住善法行已明勝進行初牒自分次正顯勝進有十六行經分為四段初能自清淨一行半經初辨四河清淨之義次如於此三千下二行經明四河入海無能障義於多界中化無障故次成就十種身下辨此四河旋繞池義菩薩成就下辨四河纍劫入海無疲厭義三旋繞中謂成就隨順身語意業智為先導身語意業四方流注入智海故隨順即是旋繞之義次菩薩成就如是下正顯無疲厭謂四河入海纍劫無疲菩薩亦爾以普賢行願盡未來劫修菩薩行入如來海不生疲厭是以廣顯與生為救為歸等上明勝進行復是名下結名安住此行下歎勝佛子何等為菩薩摩訶薩真實行此菩薩成就第一誠諦之語如說能行如行能說此菩薩學三世諸佛真實語入三世諸佛種性與三世諸佛善根同等得三世諸佛無二語隨如來學智慧成就此菩薩成就知衆生是處非處智去來現在業報智諸根利鈍智種種界智種種解智一切至處道智諸禪解脫三昧垢淨起時非時智一切世界宿住隨念智天眼智漏盡智而不捨一切菩薩行何以故欲教化一切衆生悉令清淨故此菩薩復生如是增上心若我不令一切衆生住無上解脫道而我先成阿耨多羅三藐三菩提者則違我本願是所不應是故要當先令一切衆生得無上菩提無餘涅槃然後成佛何以故非衆生請我發心我自為衆生作不請之友欲先令一切衆生滿足善根成一切智是故我為最勝不著一切世間故我為最上住無上調御地故我為離翳解衆生無際故我為已辦本願成就故我為善變化菩薩功德莊嚴故我為善依怙三世諸佛攝受故此菩薩摩訶薩不捨本願故得入無上智慧莊嚴利益衆生悉令滿足隨本誓願皆得究竟於一切法中智慧自在令一切衆生普得清淨念念遍遊十方世界念念普詣不可說不可說諸佛國土念念悉見不可說不可說諸佛及佛莊嚴清淨國土示現如來自在神力普遍法界虗空界此菩薩現無量身普入世間而無所依於其身中現一切剎一切衆生一切諸法一切諸佛此菩薩知衆生種種想種種欲種種解種種業報種種善根隨其所應為現其身而調伏之觀諸菩薩如幻一切法如化佛出世如影一切世間如夢得義身文身無盡藏正念自在決定了知一切諸法智慧最勝入一切三昧真實相住一性無二地菩薩摩訶薩以諸衆生皆著於二安住大悲修行如是寂滅之法得佛十力入因陀羅網法界成就如來無礙解脫人中雄猛大師子吼得無所畏能轉無礙清淨法輪得智慧解脫了知一切世間境界絶生死回流入智慧大海為一切衆生護持三世諸佛正法到一切佛法海實相源底菩薩住此真實行已一切世間天人魔梵沙門婆羅門乾闥婆阿修羅等有親近者皆令開悟歡喜清淨是名菩薩摩訶薩第十真實行第十真實行體即智度謂約二智受用法樂成熟有情並如行能說如說能行即是真實初徵名次釋相初此菩薩成就第一下一行經總顯名體次別顯行相有二初此菩薩學三世諸佛下二行經總標章門次依別釋有五段初成就智慧二三世諸佛無二語三同佛善根四入佛種性五學佛真實語初中三此菩薩成就知衆生下初顯所成十力次而不捨一切菩薩行明得果不捨因三何以故下徵釋所以十力化生之智故須得之令物清淨故須不捨因行二三世諸佛無二語中有三初此菩薩復生如是下兩行餘經初反舉違誓自誡不應次是要當下一行餘經順釋要當先人後己三何以故下二行經徵釋所由徵意有二一云何以違誓是以不應二云何以要先人後己釋亦二別一非衆生請我發心由不請強許今之不與豈是所應次云我為最勝者以菩薩之導人必先人後己不爾豈得名最勝耶三同佛善根有二初不捨本願下標德成滿次別明同相初於一切法中二句意業智慧同次念念遍遊下三行經身業神通同四入佛種性中二初此菩薩現無量身下二行經明身入世無依次智入種性中二初知衆生種種想明入悲種性次觀諸菩薩如幻入智種性五學佛真實語中二初以諸衆生下標前起後次得佛十力下四行餘經成果起用顯語實相能師子吼轉法輪故結云知實相源方為實語文中大同十地窮佛所得圓融教中位位果滿故窮法實相謂如是性相體力等皆盡源故後菩薩住此下結行成益是名下結名爾時佛神力故十方各有佛剎微塵數世界六種震動所謂動遍動等遍動起遍起等遍起踊遍踊等遍踊震遍震等遍震吼遍吼等遍吼擊遍擊等遍擊雨天妙華天香天末香天鬘天衣天寶天莊嚴具奏天樂音放天光明演暢諸天微妙音聲如此世界夜摩天宮說十行法所現神變十方世界悉亦如是復以佛神力故十方各過十萬佛剎微塵數世界外有十萬佛剎微塵數菩薩俱來詣此土充滿十方語功德林菩薩言佛子善哉善哉善能演說諸菩薩行我等一切同名功德林所住世界皆名功德幢彼土如來同名普功德我等佛所亦說此法衆會眷屬言詞義理悉亦如是無有增減佛子我等皆承佛神力來入此會為汝作證十方世界悉亦如是此下第六證成分初地動瑞證次十方菩薩俱來人證佛子我等下結通爾時功德林菩薩承佛神力普觀十方一切衆會暨于法界欲令佛種性不斷故欲令菩薩種性清淨故欲令願種性不退轉故欲令行種往常相續故欲令三世種性悉平等故欲攝三世一切佛種性故欲開演所種諸善根故欲觀察一切諸根故欲解煩惱習氣心行所作故欲照了一切佛菩提故而說頌言一心敬禮十力尊離垢清淨無礙見境界深遠無倫匹住如虗空道中者過去人中諸最勝功德無量無所著勇猛第一無等倫彼離塵者行斯道現在十方諸國土善能開演第一義離諸過惡最清淨彼無依者行斯道未來所有人師子周遍遊行於法界已發諸佛大悲心彼饒益者行斯道三世所有無比尊自然除滅愚癡暗於一切法皆平等彼大力人行此道普見無量無邊界一切諸有及諸趣見已其心不分別彼無動者行斯道法界所有皆明了於第一義最清淨永破瞋慢及愚癡彼功德者行斯道於諸衆生善分別悉入法界真實性自然覺悟不由他彼等空者行斯道盡空所有諸國土悉往說法廣開喻所說清淨無能壞彼勝牟尼行此道具足堅固不退轉成就尊重最勝法願力無盡到彼岸彼善修者所行道無量無邊一切地廣大甚深妙境界悉能知見靡有遺彼論師子所行道一切句義皆明了所有異論悉摧伏於法決定無所疑彼大牟尼行此道遠離世間諸過患普與衆生安隱樂能為無等大導師彼勝德者行斯道恆以無畏施衆生普令一切皆欣慶其心清淨離染濁彼無等者行斯道意業清淨極調善離諸戲論無口過威光圓滿衆所欽彼最勝者行斯道入真實義到彼岸住功德處心永寂諸佛護念恆不忘彼滅有者行斯道遠離於我無惱害恆以大音宣正法十方國土靡不周彼絶譬者行斯道檀波羅蜜已成滿百福相好所莊嚴衆生見者皆欣悅彼最勝慧行斯道智地甚深難可入能以妙慧善安住其心究竟不動搖彼堅固行行斯道法界所有悉能入隨所入處咸究竟神通自在靡不該彼法光明行此道諸無等等大牟尼勤修三昧無二相心常在定樂寂靜彼普見者行斯道微細廣大諸國土更相涉入各差別如其境界悉了知彼智山王行此道意常明潔離諸垢於三界中無所著護持衆戒到彼岸此淨心者行斯道智慧無邊不可說普遍法界虗空界善能修學住其中彼金剛慧行斯道三世一切佛境界智慧善入悉周遍未嘗暫起疲厭心彼最勝者行斯道善能分別十力法了知一切至處道身業無礙得自在彼功德身行此道十方無量無邊界所有一切諸衆生我皆救護而不捨彼無畏者行斯道於諸佛法勤修習心常精進不懈倦淨治一切諸世間彼大龍王行此道了知衆生根不同欲解無量各差別種種諸界皆明達此普入者行斯道十方世界無量剎悉往受生無有數未曾一念生疲厭彼歡喜者行斯道普放無量光明網照耀一切諸世間其光所照入法性此善慧者行斯道震動十方諸國土無量億數那由他不令衆生有驚怖此利世者所行道善解一切語言法問難酬對悉究竟聰哲辨慧靡不知此無畏者所行道善解覆仰諸國土分別思惟得究竟悉使住於無盡地此勝慧者所行道功德無量那由他為求佛道皆修習於其一切到彼岸此無盡行所行道超出世間大論師辨才第一師子吼普使羣生到彼岸此淨心者所行道諸佛灌頂第一法已得此法灌其頂心恆安住正法門彼廣大心行此道一切衆生無量別了達其心悉周遍決定護持佛法藏彼如須彌行此道能於一一語言中普為示現無量音令彼衆生隨類解此無礙見行斯道一切文字語言法智皆善入不分別住於真實境界中此見性者所行道安住甚深大法海善能印定一切法了法無相真實門此見實者所行道一一佛土皆往詣盡於無量無邊劫觀察思惟靡暫停此匪懈者所行道無量無數諸如來種種名號各不同於一毛端悉明見此淨福者所行道一毛端處見諸佛其數無量不可說一切法界悉亦然彼諸佛子行斯道無量無邊無數劫於一念中悉明見知其修促無定相此解脫行所行道能令見者無空過皆於佛法種因緣而於所作心無著彼諸最勝所行道那由他劫常遇佛終不一念生疲厭其心歡喜轉更增此不空見所行道盡於無量無邊劫觀察一切衆生界未曾見有一衆生此堅固士所行道修習無邊福智藏普作清涼功德池利益一切諸羣生彼第一人行此道法界所有諸品類普遍虗空無數量了彼皆依言說住此師子吼所行道能於一一三昧中普入無數諸三昧悉至法門幽奧處此論月者行斯道忍力勤修到彼岸能忍最勝寂滅法其心平等不動搖此無邊智所行道於一世界一坐處其身不動恆寂然而於一切普現身彼無邊身行此道無量無邊諸國土悉令共入一塵中普得包容無障礙彼無邊思行此道了達是處及非處於諸力處普能入成就如來最上力彼第一力所行道過去未來現在世無量無邊諸業根恆以智慧悉了知此達解者所行道了達世間時非時如應調伏諸衆生悉順其宜而不失此善了者所行道善守身語及意業恆令依法而修行離諸取著降衆魔此智心者所行道於諸法中得善巧能入真如平等處辨才宣說無有窮此佛行者所行道陀羅尼門已圓滿善能安住無礙藏於諸法界悉通達此深入者所行道三世所有一切佛悉與等心同智慧一性一相無有殊此無礙種所行道已抉一切愚癡膜深入廣大智慧海普施衆生清淨眼此有目者所行道已具一切諸導師平等神通無二行獲於如來自在力此善修者所行道遍遊一切諸世間普雨無邊妙法雨悉令於義得決了此法雲者所行道能於佛智及解脫深生淨信永不退以信而生智慧根此善學者所行道能於一念悉了知一切衆生無有餘了彼衆生心自性達無性者所行道法界一切諸國土悉能化往無有數其身最妙絶等倫此無比行所行道佛剎無邊無有數無量諸佛在其中菩薩於彼悉現前親近供養生尊重菩薩能以獨一身入於三昧而寂定令見其身無有數一一皆從三昧起菩薩所住最深妙所行所作超戲論其心清淨常悅樂能令衆生悉歡喜諸根方便各差別能以智慧悉明見而了諸根無所依調難調者所行道能以方便巧分別於一切法得自在十方世界各不同悉在其中作佛事諸根微妙行亦然能為衆生廣說法誰其聞者不欣慶此等虗空所行道智眼清淨無與等於一切法悉明見如是智慧巧分別此無等者所行道所有無盡廣大福一切修行使究竟令諸衆生悉清淨此無比者所行道普勸修成助道法悉令得住方便地度脫衆生無有數未曾暫起衆生想一切機緣悉觀察先護彼意令無諍普示衆生安隱處此方便者所行道成就最上第一智具足無量無邊智於諸無量無所畏此方便智所行道一切世界及諸法悉能遍入得自在亦人一切衆會中度脫羣生無有數十方一切國土中擊大法鼓悟羣生為法施主最無上此不滅者所行道一身結跏而正坐充滿十方無量剎而令其身不迫隘此法身者所行道能於一義一文中演說無量無邊法而於邊際不可得此無邊智所行道於佛解脫善修學得佛智慧無障礙成就無畏為世雄此方便者所行道了知十方世界海亦知一切佛剎海智海法海悉了知衆生見者咸欣慶或現入胎及初生或現道場成正覺如是皆令世間見此無邊者所行道無量億數國土中示現其身入涅槃實不捨願歸寂滅此雄論者所行道堅固微密一妙身與佛平等無差別隨諸衆生各異見一實身者所行道法界平等無差別具足無量無邊義樂觀一相心不移三世智者所行道於諸衆生及佛法建立加持悉究竟所有持力同於佛最上持者行斯道神足無礙猶如佛天眼無礙最清淨耳根無礙善聽聞此無礙意所行道所有神通皆具足隨其智慧悉成就善知一切靡所儔此賢智者所行道其心正定不搖動其智廣大無邊際所有境界皆明達一切見者所行道已到一切功德岸能隨次第度衆生其心畢竟無厭足此常勤者所行道三世所有諸佛法於此一切咸知見從於如來種性生彼諸佛子行斯道隨順言詞已成就乖違談論善摧伏常能趣向佛菩提無邊慧者所行道一光照觸無涯限十方國土悉充遍普使世間得大明此破暗者所行道隨其應見悉供養為現如來清淨身教化衆生百千億莊嚴佛剎亦如是為令衆生出世間一切妙行皆修習此行廣大無邊際云何而有能知者假使分身不可說而與法界虗空等悉共稱揚彼功德百千萬劫無能盡菩薩功德無有邊一切修行皆具足假使無量無邊佛於無量劫說不盡何況世間及天人一切聲聞及緣覺能於無量無邊劫讚歎稱揚得究竟第七重頌分初先彰說儀次正說偈辭總有一百一頌大分為三初一偈總申歸教次九十六頌正頌前文三有四頌結歎深廣然十住頌文則舉其次第今沒其次第直云行斯道者略有四意一前則約位始終行布而說今將融會前說令無始終欲顯一位之中具行諸行一行之中具一切故二前約別行今約普行普別無礙二文互顯三前約同教今約別教同別無礙為一圓教故四前約不雜辨才此約任放辨才說不待次言辭不斷故又前多約因此多就果或體用更廣略綺互總別遞明互就影發顯菩薩行深廣難思下文雖依次第既沒其本名一同離世間品圓融行也
