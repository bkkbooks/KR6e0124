front:
  text: 刻憨大師華嚴綱要引憨大師之雨法海內片字落紙不脛而走四方著述殷盛自佛滅以來未數有也無愚慧皆知之聲不須具論聲得生值大師之世不幸溷於世俗學道既遲始有耳目不克聞見及其稍自悔覺能讀吾大師之書而緣盡時窮師已不復住人間矣今其上座以晦虗中兩上人來此也來此則吾友程仲延氏首與遊遊數日細問其大師平生行履一切筆舌間事乃得見師所親手點竄之華嚴綱要稿本及諸種雜著尚未獲登木行世者友人捧覽悽然心動念我輩未嘗蚤知大事圖一登大師之堂而見其面今無意中忽見所未刻之手澤如面師焉師往來南北海內之名山大川通都巨邑說法所不到者甚稀獨未一涉吾新安今以其未刻之大法而又其手澤焉而於焉至止豈非天哉聲知此大事才數年即未能盡讀大師之書顧見諸經之大者要者師亦大略疏盡獨華嚴耳刻不須論刻宜急急宜就新安中人成之師脫歲知世緣將盡早夜蹌蹌急成此書佛命師命衆生命端在此中兩上人英靈淵異真不愧法王孫子徒以大師未刻遺書不遑寧處而此特甚甫議剞劂則程子文氏力任繕寫諸佛弟子當以次第至或不聞知僭檄徵之海陽弟子金聲敬題大方廣佛華嚴經綱要序華嚴大經者乃毗盧遮那佛稱法界量顯現自性因果本妙莊嚴究竟圓頓總持法門也文豐義富事渺宗玄要而收之不出四法界而已蓋四法界者一理法界此界也以真性法中本無生佛名言豈有自他影像世出世法染淨因緣當體全空究竟清淨不可思議是謂理法界也二事法界斯界也即理法界至虗而靈淨極而妙不動本然循業發現頓變相見二分幻開迷悟兩途情與非情聖凡依正熾然同異究竟所有不可思議是謂事法界也三理事無礙法界是界也即理外無事事外無理理不拒事縛脫歷然事不拒理生滅寂爾波濤萬殊而全彰水體水性一味而遍示波瀾空有竝施性相不二不可思議是謂理事無礙法界也四事事無礙法界茲界也合上三界圓入一真理事既不相違彼此自是無礙以事入理理無盡而事事無盡以理收事理無殊而事事無殊舉一念而三世圓明吹一毛而十方炳現正中有依一毛孔中有無量無邊世界依中有正一微塵裏有無窮無盡如來一多互融延促自在不可思議是謂事事無礙法界也是則世出世間色心諸法不出此四種法界又此四界唯是一心離心之外無法可言此心亦是強名不可言議不可思議即一真大法界也如來證此法界性示此法界相廣此法界量放此法界光攝此法界機彰此法界會盡此法界理演此法界經是經一名而有三部品偈既廣卷數勝多人間難於祕藏龍宮久為密護像法住世龍樹大師博盡世間琅𪻱因搜海中寶藏逢斯妙典無上真乘慨大法不聞何以見自心現量圓宗未會豈能開法性光明注神淵記得下部之始終竭力宣揚廣上根之知見初流布於于闐次傳演於支那自經出興無論餘國但此方禪教師將緇素明賢發無礙辨才得無師智慧雄機大用豎論橫談生死涅槃自在無畏立在毗盧頂上超於威音劫前從古至今算數莫計豈非皆從此經法化而出耶或在諸餘經典及師友因緣一念相應得見自性亦須從此經印證方能弘自性圓通所以古人云無不出乎此法界無不還歸此法界斯之謂歟今古從此經得大受用得大自在不可不知此經之所出耶不可不知龍樹大師之所與也是經疏論代有當家唯清涼大師獨超越諸作體法界觀開合此經實文殊之應身乃毗盧之遍照以六相十玄發其幽旨以五周四分收其全文分章剔義若朗月之照晴空逐句揭宗猶海印之現乾象義無不備事無不周是疏鈔與經可謂君臣道合也疏鈔一出自唐至明代不虗講至於我朝神宗年次亦講未歇時奈何二十年來不聞有處論及疏義究此玄宗人與物俱為減消身與心竝之虗弱事推容易道懼艱難無論黑白皆為時氣所奪也即僧輩中為座主者或經或論多不肯深求或句或文唯從輕快以為簡易以為分明反以古人疏論為迂談率以時尚口語為切妙是以比來法席皆貴指點本文講解漸於虗浮疏鈔將同湮沒使如來一字法門書海墨而不盡破塵經卷包法界以無餘全若無聞況復得意法運至此良可惜哉蓋古人疏論皆依智宣流或總大意條陳或從細文曲別或正釋或旁通或合明或助顯或指證或懸分圓轉入微開合不一嗟乎今之學者多識心淺近因視古之疏論謂智境支離又則此時狹劣慢習日滋日深輕淺狂見時染時厚即於本經多望涯而返豈獨古疏厭繁不尋復有弄機緣作究竟宗乘鄙藏教為糟粕文字每掉頭弗顧掩耳不聞何乃逐末忘本認派迷源顛倒至斯何因啓悟邪風狂扇一期難回我憨山先師乘法界大願示生此際痛惜時蔽注意大經遊心古疏提綱挈要斷義分文不三年而全經大旨首尾昭然即一座而疏有未發復為補出收群詮于指掌窺法界于毫端一性圓明百無覆蓋俾學者或因綱要以博疏鈔又因疏以入經因經以見性使狹劣之習漸近而漸遠廣大之境愈入而愈深此綱要之所以而作也是清涼大師為本經之勳臣我憨山先師又為疏鈔之導師也正提挈閣筆之日適曹溪堅請之時義不能辭行為彼應因此經疏源流未敘綱要起止無題不時先師示寂曹溪此種公案遂成缺典幸得益公法屬竭力募刻新安剞劂氏梓工方完惜益公又卒勞纍斯亦未及請序大方丁丑春衡為先師掃塔因緣特之匡山法雲蘭若得此新刻如獲舊藏法法現前受用不盡由是罄此微言用以鳴後云爾時崇禎丁丑歲四月佛誕日嗣法門人觀衡焚香題于五乳峰法雲禪寺之方丈
