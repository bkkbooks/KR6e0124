body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈兜率宮中偈讚品第二十四初來意者前明化主赴感今明助化讚揚及顯位體所依故次來也釋文者謂十方菩薩於此宮中讚佛實德故受斯名三宗趣者集衆放光偈讚為宗為說回向為趣爾時佛神力故十方各有一大菩薩一一各與萬佛剎微塵數諸菩薩俱從萬佛剎微塵數國土外諸世界中來詣佛所其名曰金剛幢菩薩堅固幢菩薩勇猛幢菩薩光明幢菩薩智幢菩薩寶幢菩薩精進幢菩薩離垢幢菩薩星宿幢菩薩法幢菩薩大文分三初集衆二放光三偈讚初神力一句集因也次十方一句舉上首三一一下標眷屬四從萬佛剎下來處五其名曰下列十菩薩名標主也同名幢者略有五義一高出義表三賢位極二建立義大悲大智建立衆生及菩提故三歸向義謂大悲攝生智願攝善歸向菩提故四摧珍義如猛將幢降伏一切諸魔軍故五滅諸怖畏義如帝釋幢不怖惑業故金剛等異名即表十向行體所從來國謂妙寶世界妙樂世界妙銀世界妙金世界妙摩尼世界妙金剛世界妙波頭摩世界妙優鉢羅世界妙栴檀世界妙香世界五所從來國皆稱妙者回向之力微善彌於法界故其別名即表十向所修法門各於佛所淨修梵行所謂無盡幢佛風幢佛解脫幢佛威儀幢佛明相幢佛常幢佛最勝幢佛自在幢佛梵幢佛觀察幢佛其諸菩薩至佛所已頂禮佛足六本所事佛同名幢義不異菩薩別名即表修十向智亦表當位之果七其諸下到已修敬以佛神力即化作妙寶藏師子之座寶網彌覆周匝遍滿諸菩薩衆隨所方來各於其上結加趺坐八以佛神力下善住威儀座體云妙寶者十住以慧光遍照故以毗盧遮那藏為體十行以行淨離垢故以蓮華藏為體今十向大悲處於生死普該萬法不拘乎一故座體直云妙寶不限色類以教行遍周籠攝衆生加以寶網彌覆其上其身悉放百千億那由他阿僧祇清淨光明此無量光皆從菩薩清淨心寶離衆過惡大願所起顯示一切諸佛自在清淨之法以諸菩薩平等願力能普救護一切衆生一切世間之所樂見見者不虗悉得調伏九其身悉放下放光益物此位多游悲智益物故其菩薩衆悉已成就無量功德所謂遍游一切諸佛國土無所障礙見無依止清淨法身以智慧身現無量身遍往十方承事諸佛入於諸佛無量無邊不可思議自在之法住於無量一切智門以智光明善了諸法於諸法中得無所畏隨所演說窮未來際辨才無盡以大智慧開總持門慧眼清淨入深法界智慧境界無有邊際究竟清淨猶若虗空如此世界兜率天宮諸菩薩衆如是來集十方一切兜率天宮悉有如是名號菩薩而來集會所從來國諸佛名號亦皆同等無有差別十其菩薩下略讚勝德有十一句初總餘別別中十門次如此世界下結通十方爾時世尊從兩膝輪放百千億那由他光明普照十方盡法界虗空界一切世界彼諸菩薩皆見於此佛神變相此諸菩薩亦見於彼一切如來神變之相如是菩薩皆與毗盧遮那如來於往昔時同種善根修菩薩行悉已悟入諸佛自在甚深解脫得無差別法界之身入一切土而無所住見無量佛悉往承事於一念中周行法界自在無礙心意清淨如無價寶無量無數諸佛如來常加護念共與其力到於究竟第一彼岸恆以淨念住無上覺念念恆入一切智處以小入大以大入小皆得自在通達無礙已得佛身與佛同住獲一切智從一切智而生其身一切如來所行之處悉能隨入開闡無量智慧法門到金剛幢大智彼岸獲金剛定斷諸疑惑已得諸佛自在神通普於一切十方國土教化調伏百千萬億無數衆生於一切處雖無所著善能修學成就究竟方便安立一切諸法如是等百千億那由他不可說無盡清淨三世一切無量功德藏諸菩薩衆皆來集會在於佛所因光所見一切佛所悉亦如是第二爾時世尊下放光文分四節初從兩膝放光處言膝輪者位漸高故又表回因向果等有屈伸進趣之相故又悲智相導屈伸無住故二放百千下光數三普照下光照分齊四彼諸菩薩下光所作業謂令彼此互相見故此中分三節初正明彼此相見二如是下釋見所由由二種因故彼此相見一由宿因同行故二由現德圓滿故經文悉已悟入下有二十句明德圓滿之相後如是等下結德爾時金剛幢菩薩承佛神力普觀十方而說頌言如來不出世亦無有涅槃以本大願力示現自在法是法難思議非心所行處智慧到彼岸乃見諸佛境色身非是佛音聲亦復然亦不離色聲見佛神通力少智不能知諸佛實境界久修清淨業於此乃能了正覺無來處去亦無所從清淨妙色身神力故顯現無量世界中示現如來身廣說微妙法其心無所著智慧無邊際了達一切法普入於法界示現自在力衆生及諸法了達皆無礙普現衆色像遍於一切剎欲求一切智速成無上覺應以淨妙心修習菩提行若有見如來如是威神力當於最勝尊供養勿生疑第二偈讚中十菩薩即為十段亦十方如次皆先標說人及說儀式今初東方金剛幢者此是會主名含總別總顯回向不出悲智金剛者堅利也即悲之智二乘實際不能壞堅也斷難斷惑利也故云智慧到彼岸即智之悲愛見不能動堅也無所不救利也故文中遍剎利生七十八經云譬如金剛唯從金剛處及金處生非餘寶處生菩提心金剛亦復如是唯從大悲救護衆生金剛處一切智明殊勝境界金處而生非餘衆生善根處生是知金剛不獨喻智攻般若者不得此意但以標名獨將金剛喻於般若以文中悲濟九類而無所度悲智相導方為真實般若別名即救護衆生悲也離衆生相智也頌有十偈歎佛寂用無礙德爾時堅固幢菩薩承佛神力普觀十方而說頌言如來勝無比甚深不可說出過言語道清淨如虗空汝觀人師子自在神通力已離於分別而令分別見導師為開演甚深微妙法以是因緣故現此無比身此是大智慧諸佛所行處若欲了知者常應親近佛意業常清淨供養諸如來終無疲厭心能入於佛道具無盡功德堅住菩提心以是疑網除觀佛無厭足通達一切法是乃真佛子此人能了知諸佛自在力廣大智所說欲為諸法本應起勝希望志求無上覺若有尊敬佛念報於佛恩彼人終不離一切諸佛住何有智慧人於佛得見聞不修清淨願履佛所行道第二南方堅固者表不壞回向故菩提心堅故觀佛無厭故十頌多明如來為物所依德爾時勇猛幢菩薩承佛神力普觀十方而說頌言譬如明淨眼因日覩衆色淨心亦復然佛力見如來如以精進力能盡海源底智力亦如是得見無量佛譬如良沃田所種必滋長如是淨心地出生諸佛法如人獲寶藏永離貧窮苦菩薩得佛法離垢心清淨譬如伽陀藥能消一切毒佛法亦如是滅諸煩惱患真實善知識如來所稱讚以彼威神故得聞諸佛法設於無數劫財寶施於佛不知佛實相此亦不名施無量衆色相莊嚴於佛身非於色相中而能見於佛如來等正覺寂然恆不動而能普現身遍滿十方界譬如虗空界不生亦不滅諸佛法如是畢竟無生滅第三西方菩薩淨心智力見佛盡源等一切佛故名勇猛十頌總顯如來見聞弘益之德爾時光明幢菩薩承佛神力普觀十方而說頌言人間及天上一切諸世界普見於如來清淨妙色身譬如一心力能生種種心如是一佛身普現一切佛菩提無二法亦復無諸相而於二法中現相莊嚴身了法性空寂如幻而生起所行無有盡導師如是現三世一切佛法身悉清淨隨其所應化普現妙色身如來不念言我作如是身自然而示現未嘗起分別法界無差別亦無所依止而於世間中示現無量身佛身非變化亦復非非化於無化法中示有變化形正覺不可盡法界虗空等深廣無涯底言語道悉絶如來善通達一切處行道法界衆國土所往皆無礙第四北方菩薩以大悲力運智慧光朗彼重昏無所不至名光明幢十頌多顯如來即體化用周普之德爾時智幢菩薩承佛神力普觀十方而說頌言若人能信受一切智無礙修習菩提行其心不可量一切國土中普現無量身而身不在處亦不住於法一一諸如來神力示現身不可思議劫算數莫能盡三世諸衆生悉可知其數如來所示現其數不可得或時示一二乃至無量身普現十方剎其實無二種譬如淨滿月普現一切水影像雖無量本月未曾二如是無礙智成就等正覺普現一切剎佛體亦無二非一亦非二亦復非無量隨其所應化示現無量身佛身非過去亦復非未來一念現出生成道及涅槃如幻所作色無生亦無起佛身亦如是示現無有生第五東北方於佛寂用之境決斷無疑故又智導萬行出生無盡故名智幢十頌多歎如來應現出生無礙之德爾時寶幢菩薩承佛神力普觀十方而說頌言佛身無有量能示有量身隨其所應覩導師如是現佛身無處所充滿一切處如空無邊際如是難思議非心所行處心不於中起諸佛境界中畢竟無生滅如翳眼所覩非內亦非外世間見諸佛應知亦如是饒益衆生故如來出世間衆生見有出而實無興世不可以國土晝夜而見佛歲月一剎那當知悉如是衆生如是說某日佛成道如來得菩提實不繫於日如來離分別非世超諸數三世諸導師出現皆如是譬如淨日輪不與昏夜合而說某日夜諸佛法如是三世一切劫不與如來合而說三世佛導師法如是第六東南方菩薩以圓淨智照平等理不礙應現隨順一切如摩尼寶故名寶幢十頌多顯平等超世德爾時精進幢菩薩承佛神力普觀十方而說頌言一切諸導師身同義亦然普於十方剎隨應種種現汝觀牟尼尊所作甚奇特充滿於法界一切悉無餘佛身不在內亦復不在外佛力故顯現導師法如是隨諸衆生類先世所集業如是種種身示現各不同諸佛身如是無量不可數唯除大覺尊無有能思議如以我難思心業莫能取佛難思亦爾非心業所現如剎不可思而見淨莊嚴佛難思亦爾妙相無不現譬如一切法衆緣故生起見佛亦復然必假衆善業譬如隨意珠能滿衆生心諸佛法如是悉滿一切願無量國土中導師興於世隨其願力故普應於十方第七西南方菩薩勤觀如來真應皆同故能平等隨順一切衆生名精進幢十頌顯此同義爾時離垢幢菩薩承佛神力普觀十方而說頌言如來大智光普淨諸世間世間既淨已開示諸佛法設有人欲見衆生數等佛靡不應其心而實無來處以佛為境界專念而不息此人得見佛其數與心等成就白淨法具足諸功德彼於一切智專念心不捨導師為衆生如應演說法隨於可化處普現最勝身佛身及世間一切皆無我悟此成正覺復為衆生說一切人師子無量自在力示現念等身其身各不同世間如是身諸佛身亦然了知其自性是則說名佛如來普知見明了一切法佛法及菩提二俱不可得導師無來去亦復無所住遠離諸顛倒是名等正覺第八西北方菩薩真如體淨能成白法復淨世間故名離垢十頌多歎如來淨德前六淨他後四自淨爾時星宿幢菩薩承佛神力普觀十方而說頌言如來無所住普住一切剎一切土皆往一切處咸見佛隨衆生心普現一切身成道轉法輪及以般涅槃諸佛不思議誰能思議佛誰能見正覺誰能現最勝一切法皆如諸佛境亦然乃至無一法如中有生滅衆生妄分別是佛是世界了達法性者無佛無世界如來普現前令衆生信喜佛體不可得彼亦無所見若能於世間遠離一切著無礙心歡喜於法得開悟神力之所現即此說名佛三世一切時求悉無所有若能如是知心意及諸法一切悉知見疾得成如來言語中顯示一切佛自在正覺超語言假以語言說第九下方菩薩解佛遍應法界之身而不離法性若彼星宿燦然羅空不可縛著故以為名十頌顯佛此德爾時法幢菩薩承佛神力普觀十方而說頌言寧可恆具受一切世間苦終不遠如來不覩自在力若有諸衆生未發菩提心一得聞佛名決定成菩提若有智慧人一念發道心必成無上尊慎莫生疑惑如來自在力無量劫難遇若生一念信速登無上道設於念念中供養無量佛未知真實法不名為供養若聞如是法諸佛從此生雖經無量苦不捨菩提行一聞大智慧諸佛所入法普於法界中成三世導師雖盡未來際遍遊諸佛剎不求此妙法終不成菩提衆生無始來生死久流轉不了真實法諸佛故興世諸法不可壞亦無能壞者自在大光明普示於世間第十上方菩薩知真實之法普入法界則行修行皆無分量故名法幢知法名佛故先讚見佛之益十頌雙顯佛法難聞十回向品第二十五之一初來意者當會序分已彰正宗宜顯故又已總示所依佛智次別顯能依行位故次來也二釋名者回者轉也向者趣也轉自萬行趣向三處故回向不同有其十種十之別名本分當釋回向通稱今當重明隨境所向義有衆多以義通收不出三處謂衆生菩提及以實際上二隨相實際即離相開三為十一回自向他二回少向多三回自因行向他因行四回因向果五回劣向勝六回比向證七回事向理八回差別行向圓融行九回世向出世十回順理事行向理所成事十義中初三皆回向衆生次三皆回向菩提次二回向實際後二義通於果及實際三宗趣者以無邊行海順無邊大願為宗成就普賢德用為趣爾時金剛幢菩薩承佛神力入菩薩智光三昧釋文大分有十一三昧分二加分三起分四本分五說分六瑞應分七結通分八證成分九偈讚勸修分十校量功德分今初三昧分入是三昧已十方各過十萬佛剎微塵數世界外有十萬佛剎微塵數諸佛皆同一號號金剛幢而現其前咸稱讚言善哉善哉善男子乃能入此菩薩智光三昧善男子此是十方各十萬佛剎微塵數諸佛神力共加於汝亦是毗盧遮那如來往昔願力威神之力及由汝智慧清淨故諸菩薩善根增勝故令汝入是三昧而演說法第二入是三昧下加分有三一總顯加相於中初明佛現次明讚善為令諸菩薩得清淨無畏故具無礙辨才故入無礙智地故住一切智大心故成就無盡善根故滿足無礙白法故入於普門法界故現一切佛神力故前際念智不斷故得一切佛護持諸根故以無量門廣說衆法故聞悉解了受持不忘故攝諸菩薩一切善根故成辦出世助道故不斷一切智智故開發大願故解釋實義故了知法界故令諸菩薩皆悉歡喜故修一切佛平等善根故護持一切如來種性故所謂演說諸菩薩十回向第二為令下辦加所為有二十二句前二十句為令下十句標所成後以無量門下十一句明其所作後一句總結所屬佛子汝當承佛威神之力而演此法得佛護念故安住佛家故增益出世功德故得陀羅尼光明故入無障礙佛法故大光普照法界故集無過失淨法故住廣大智境界故得無障礙法光故爾時諸佛即與金剛幢菩薩無量智慧與無留礙辨與分別句義善方便與無礙法光明與如來平等身與無量差別淨音聲與菩薩不思議善觀察三昧與不可沮壞一切善根回向智與觀察一切法成就巧方便與一切處說一切法無斷辨何以故入此三昧善根力故爾時諸佛各以右手摩金剛幢菩薩頂金剛幢菩薩得摩頂已即從定起第三佛子下正顯加相於中初有十句口加語業以增辨次諸佛即與無量智下十句意業冥加以益智後何以故下摩頂身加以增威下即從定起分告諸菩薩言佛子菩薩摩訶薩有不可思議大願充滿法界普能救護一切衆生所謂修學去來現在一切佛回向第四告諸菩薩下本文中分二初三句總標願體難思希求名願即具普賢無盡願海深廣難思充滿下顯難思相謂體充法界故用普救護故稱為大三所謂下釋成難思以行同佛故佛子菩薩摩訶薩回向有幾種佛子菩薩摩訶薩回向有十種三世諸佛咸共演說第二別示名相文分為四初舉數徵名次佛子回向有十種下標數顯勝諸佛共說故何等為十一者救護一切衆生離衆生相回向二者不壞回向三者等一切諸佛回向四者至一切處回向五者無盡功德藏回向六者入一切平等善根回向七者等隨順一切衆生回向八者真如相回向九者無縛無著解脫回向十者入法界無量回向佛子是為菩薩摩訶薩十種回向過去未來現在諸佛已說當說現說此徵列十回向名其總名已見品初今略釋其相其回向二字皆是能回之願救護等名皆回向之行皆是依止受名救護等名皆回向之別相等大悲廣濟名為救護一切衆生大智無著故云離衆生相即是廣大不顛倒心二不壞者於三寶等得不壞信以此善根用將回向三學三世佛所作回向名等諸佛四菩薩令其善根至一切處五由回向故能成無盡功德之藏六順理修善事理無違入於平等七以善根等心順益衆生八善根合如以成回向九不為相縛不於見著作用自在故云解脫如不思議解脫等十稱性起用謂以法界善根回向法界故疏有廣釋難以備録上略釋別名佛子是為下結數佛子云何為菩薩摩訶薩救護一切衆生離衆生相回向第五佛子云何下說分說十回向即為十段中皆先長行後偈頌長行中各二初位行後位果有不具者至文當知今初牒名謂常以無相心中常行六道而入果報不受而受諸受回易轉化故名救護等上牒名佛子此菩薩摩訶薩行檀波羅蜜淨尸波羅蜜修羼提波羅蜜起精進波羅蜜入禪波羅蜜住般若波羅蜜大慈大悲大喜大捨修如是等無量善根二廣釋中分二先明所回善根後修善根時下正明回向今初古人以此名為行體修善根時作是念言願此善根普能饒益一切衆生皆使清淨至於究竟永離地獄餓鬼畜生閻羅王等無量苦惱後正明回向中大文分二先明隨相後我應如日下明離相回向前隨相文初二行經總明次從此起至後衆生斷疑故有一百零六行餘經別明救護分為四段初利樂救護二受惱救護三代苦救護四逈拔救護下如次標顯菩薩摩訶薩種善根時以己善根如是回向我當為一切衆生作舍令免一切諸苦事故為一切衆生作護悉令解脫諸煩惱故為一切衆生作歸皆令得離諸怖畏故為一切衆生作趣令得至於一切智故為一切衆生作安令得究竟安隱處故為一切衆生作明令得智光滅癡暗故為一切衆生作炬破彼一切無明暗故為一切衆生作燈令住究竟清淨處故為一切衆生作導師引其令入真實法故為一切衆生作大導師與其無礙大智慧故佛子菩薩摩訶薩以諸善根如是回向平等饒益一切衆生究竟皆令得一切智後別顯中初明利樂救護文有十行經初一行總標次我當下有十句別顯離苦得樂後佛子一行半經總結利樂佛子菩薩摩訶薩於非親友守護回向與其親友等無差別何以故菩薩摩訶薩入一切法平等性故不於衆生而起一念非親友想設有衆生於菩薩所起怨害心菩薩亦以慈眼視之終無恚怒普為衆生作善知識演說正法令其修習譬如大海一切衆毒不能變壞菩薩亦爾一切愚蒙無有智慧不知恩德瞋很頑毒憍慢自大其心盲瞽不識善法如是等類諸惡衆生種種逼惱無能動亂譬如日天子出現世間不以生盲不見故隱而不現又復不以乾闥婆城阿修羅手閻浮提樹崇巖邃谷塵霧煙雲如是等物之所覆障故隱而不現亦復不以時節變改故隱而不現菩薩摩訶薩亦復如是有大福德其心深廣正念觀察無有退屈為欲究竟功德智慧於上勝法心生志欲法光普照見一切義於諸法門智慧自在常為利益一切衆生而修善法曾不誤起捨衆生心不以衆生其性弊惡邪見瞋濁難可調伏便即棄捨不修回向但以菩薩大願甲胄而自莊嚴救護衆生恆無退轉不以衆生不知報恩退菩薩行捨菩提道不以凡愚共同一處捨離一切如實善根不以衆生數起過惡難可忍受而於彼所生疲厭心何以故譬如日天子不但為一事故出現世間菩薩摩訶薩亦復如是不但為一衆生故修諸善根回向阿耨多羅三藐三菩提普為救護一切衆生故而修善根回向阿耨多羅三藐三菩提如是不但為淨一佛剎故不但為信一佛故不但為見一佛故不但為了一法故起大智願回向阿耨多羅三藐三菩提為普淨一切佛剎故普信一切諸佛故普承事供養一切諸佛故普解一切佛法故發起大願修諸善根回向阿耨多羅三藐三菩提佛子菩薩摩訶薩以諸佛法而為所緣起廣大心不退轉心無量劫中修集希有難得心寶與一切諸佛悉皆平等菩薩如是觀諸善根信心清淨大悲堅固以甚深心歡喜心清淨心最勝心柔軟心慈悲心憐愍心攝護心利益心安樂心普為衆生真實回向非但口言佛子菩薩摩訶薩以諸善根回向之時作是念言以我善根願一切趣生一切衆生皆得清淨功德圓滿不可沮壞無有窮盡常得尊重正念不忘獲決定慧具無量智身口意業一切功德圓滿莊嚴又作是念以此善根令一切衆生承事供養一切諸佛無空過者於諸佛所淨信不壞聽聞正法斷諸疑惑憶持不忘如說修行於如來所起恭敬心身業清淨安住無量廣大善根永離貧窮七財滿足於諸佛所常隨修學成就無量勝妙善根平等悟解住一切智以無礙眼等視衆生衆相嚴身無有玷缺言音淨妙功德圓滿諸根調伏十力成就善心滿足無所依住令一切衆生普得佛樂得無量住住佛所住二明受惱救護有四十五行經於中先明受惱之相有二十七行餘經至菩提止於中有兩重法喻合次佛子云云以諸佛法下有十七行餘經明回向之相於中先明救物心次以諸善根下辨回向之願後又作是念下四行經明得法圓滿於諸佛下三行經勝進德圓後令一切下一行經明德果滿佛子菩薩摩訶薩見諸衆生造作惡業受諸重苦以是障故不見佛不聞法不識僧便作是念我當於彼諸惡道中代諸衆生受種種苦令其解脫菩薩如是受苦毒時轉更精勤不捨不避不驚不怖不退不怯無有疲厭何以故如其所願決欲荷負一切衆生令解脫故菩薩爾時作是念言一切衆生在生老病死諸苦難處隨業流轉邪見無智喪諸善法我應救之令得出離又諸衆生愛網所纏癡蓋所覆染著諸有隨逐不捨入苦籠檻作魔業行福智都盡常懷疑惑不見安隱處不知出離道在於生死輪轉不息諸苦淤泥恆所沒溺菩薩見已起大悲心大饒益心欲令衆生悉得解脫以一切善根回向以廣大心回向如三世菩薩所修回向如大回向經所說回向願諸衆生普得清淨究竟成就一切種智復作是念我所修行欲令衆生皆悉得成無上智王不為自身而求解脫但為救濟一切衆生令其咸得一切智心度生死流解脫衆苦復作是念我當普為一切衆生備受衆苦令其得出無量生死衆苦大壑我當普為一切衆生於一切世界一切惡趣中盡未來劫受一切苦然常為衆生勤修善根何以故我寧獨受如是衆苦不令衆生墮於地獄我當於彼地獄畜生閻羅王等險難之處以身為質救贖一切惡道衆生令得解脫復作是念我願保護一切衆生終不棄捨所言誠實無有虗妄何以故我為救度一切衆生發菩提心不為自身求無上道亦不為求五欲境界及三有中種種樂故修菩薩行何以故世間之樂無非是苦衆魔境界愚人所貪諸佛所呵一切苦患因之而起地獄餓鬼及以畜生閻羅王處忿恚鬪訟更相毀辱如是諸惡皆因貪著五欲所致耽著五欲遠離諸佛障礙生天何況得於阿耨多羅三藐三菩提菩薩如是觀諸世間貪少欲味受無量苦終不為彼五欲樂故求無上菩提修菩薩行但為安樂一切衆生發心修習成滿大願斷截衆生諸苦罥索令得解脫佛子菩薩摩訶薩復作是念我當以善根如是回向令一切衆生得究竟樂利益樂不受樂寂靜樂無依樂無動樂無量樂不捨不退樂不滅樂一切智樂復作是念我當與一切衆生作調御師作主兵臣執大智炬示安隱道令離險難以善方便俾知實義又於生死海作一切智善巧船師度諸衆生使到彼岸佛子菩薩摩訶薩以諸善根如是回向所謂隨宜救護一切衆生令出生死承事供養一切諸佛得無障礙一切智智捨離衆魔遠惡知識親近一切菩薩善友滅諸過罪成就淨業具足菩薩廣大行願無量善根第三代苦救護文至後有無量善根有四十一行餘經於中先總名代苦回向文有多節本文自明後以諸善根如是回向總結回向之益佛子菩薩摩訶薩以諸善根正回向已作如是念不以四天下衆生多故多日出現但一日出悉能普照一切衆生又諸衆生不以自身光明故知有晝夜遊行觀察興造諸業皆由日天子出成辦斯事然彼日輪但一無二菩薩摩訶薩亦復如是修習善根回向之時作是念言彼諸衆生不能自救何能救他唯我一人志獨無侶修集善根如是回向所謂為欲廣度一切衆生故普照一切衆生故示導一切衆生故開悟一切衆生故顧復一切衆生故攝受一切衆生故成就一切衆生故令一切衆生歡喜故令一切衆生悅樂故令一切衆生斷疑故第四逈拔回向文有十行經先四行以喻明次二行法合後四行合前成益佛子菩薩摩訶薩復作是念我應如日普照一切不求恩報衆生有惡悉能容受終不以此而捨誓願不以一衆生惡故捨一切衆生但勤修習善根回向普令衆生皆得安樂善根雖少普攝衆生以歡喜心廣大回向若有善根不欲饒益一切衆生不名回向隨一善根普以衆生而為所緣乃名回向安置衆生於無所著法性回向見衆生自性不動不轉回向於回向無所依無所取回向不取善根相回向不分別業報體性回向不著五蘊相回向不壞五蘊相回向不取業回向不求報回向不染著因緣回向不分別因緣所起回向不著名稱回向不著處所回向不著虗妄法回向不著衆生相世界相心意相回向不起心顛倒想顛倒見顛倒回向不著語言道回向觀一切法真實性回向觀一切衆生平等相回向以法界印印諸善根回向觀諸法離貪欲回向解一切法無種植善根亦如是觀諸法無二無生無滅回向亦如是以如是等善根回向修行清淨對治之法所有善根皆悉隨順出世間法不作二相非即業修習一切智非離業回向一切智一切智非即是業然不離業得一切智以業如光影清淨故報亦如光影清淨報如光影清淨故一切智智亦如光影清淨離我我所一切動亂思惟分別如是了知以諸善根方便回向大文第二明離相回向通有十八行餘經初復作是念下有五行半經明以妄機之智導前大悲以成無緣次安置衆生下有十行半經正明雜相先會前回向衆生令入實際次以如是等善根下有五行半經會前回向菩提入實際菩薩如是回向之時度脫衆生常無休息不住法相雖知諸法無業無報善能出生一切業報而無違諍如是方便善修回向菩薩摩訶薩如是回向時離一切過諸佛所讚第二總結成益由隨離不二故成無礙離過之益佛子是為菩薩摩訶薩第一救護一切衆生離衆生相回向三結名上長行竟爾時金剛幢菩薩觀察十方一切衆會暨于法界入深句義以無量心修習勝行大悲普覆一切衆生不斷三世諸如來種入一切佛功德法藏出生一切諸佛法身善能分別諸衆生心知其所種善根成熟住於法身而為示現清淨色身承佛神力即說頌言不思議劫修行道精進堅固心無礙為欲饒益群生類常求諸佛功德法調御世間無等人修治其意甚明潔發心普救諸含識彼能善入回向藏勇猛精進力具足智慧聰達意清淨普救一切諸群生其心堪忍不傾動心善安住無與等意常清淨大歡悅如是為物勤修行譬如大地普容受不為自身求快樂但欲救護諸衆生如是發起大悲心疾得入於無礙地十方一切諸世界所有衆生皆攝受為救彼故善住心如是修學諸回向修行布施大歡悅護持淨戒無所犯勇猛精進心不動回向如來一切智其心廣大無邊際忍力安住不傾動禪定甚深恆照了智慧微妙難思議十方一切世界中具足修治清淨行如是功德皆回向為欲安樂諸含識大士勤修諸善業無量無邊不可數如是悉以益衆生令住難思無上智普為一切衆生故不思議劫處地獄如是曾無厭退心勇猛決定常回向不求色聲香與味亦不希求諸妙觸但為救度諸群生常求無上最勝智智慧清淨如虗空修習無邊大士行如佛所行諸行法彼人如是常修學大士遊行諸世界悉能安隱諸群生普使一切皆歡喜修菩薩行無厭足除滅一切諸心毒思惟修習最上智不為自己求安樂但願衆生得離苦此人回向得究竟心常清淨離衆毒三世如來所付囑住於無上大法城未曾染著於諸色受想行識亦如是其心永出於三有所有功德盡回向佛所知見諸衆生盡皆攝取無有餘誓願皆令得解脫為彼修行大歡喜其心念念恆安住智慧廣大無與等離癡正念常寂然一切諸業皆清淨彼諸菩薩處於世不著內外一切法如風無礙行於空大士用心亦復然所有身業皆清淨一切語言無過失心常歸向於如來能令諸佛悉歡喜十方無量諸國土所有佛處皆往詣於中覩見大悲尊靡不恭敬而瞻奉心常清淨離諸失普入世界無所畏已住如來無上道復為三有大法池精勤觀察一切法隨順思惟有非有如是趣於真實理得入甚深無諍處以此修成堅固道一切衆生莫能壞善能了達諸法性普於三世無所著如是回向到彼岸普使群生離衆垢永離一切諸所依得入究竟無依處一切衆生語言道隨其種類各差別菩薩悉能分別說而心無著無所礙菩薩如是修回向功德方便不可說能令十方世界中一切諸佛皆稱歎第二爾時下重頌分二先敘儀意言入深句義者說依以無量下亦是說依依此說故亦說所為為此說故次不思議劫下正陳偈辭有二十八偈分二前八偈半頌所回善根後十九偈半頌回向行前七偈半頌隨相後未曾有下十二偈頌離相行於中前五頌正明離相後十方下七偈頌前成益第一救護衆生回向竟
