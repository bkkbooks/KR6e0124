body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈光明覺品第九此品來意自有其十一答前所依果問二為廣名號品總別多端故正廣種種觀察是意業故三者即説十信之體性故如下三會將説正位皆有偈讚此其類也四顯實遍故前但佛名遍此顯身遍四諦即實之權遍此即權之實遍五顯驗故上二品言遍衆目未覩今光示遍相故六顯總遍故前但名諦別遍今此一會即遍法界一一皆悉同時同處同衆同説同遍故七顯圓遍故前顯差別一切方能遍一切今顯無差別一切即圓融遍一切故八與下經為其則故謂下經結通云遍一切者皆如此辨以如來一乘圓教於須彌山等一類世界施化分齊皆若此故九示前神通相故上云現通如何現耶一會不動遍法界故十為顯理事俱無障礙令捨執從法故此意雖通在文偏顯有上諸義故此品來也二釋品名者光明體也覺者用也先有身智二光覺有知覺覺悟又光有能照所照覺有能覺所覺如來放身光照事法界令菩薩覺知見事法界文殊演智光雙照理事令衆覺悟法之性相良以事理俱融唯一無礙境故得一事即遍無邊而不壞本相身智無二唯一無礙光明涅槃云光明者名為智慧又此身智二光不礙覺境此三圓融唯無礙之法界雖平等絶相不壞光明之覺品中辨此故以為名爾時世尊從兩足輪下放百億光明此下大文分二初如來放光次照此下光照分齊今初光從足下放者表信四義一自下而上信最初故二最卑微故三為行本故四顯信該果已滿足故輪義亦然言百億光者以遍法界所照之剎皆百億故照此三千大千世界百億閻浮提百佛弗婆提百億瞿耶尼百億單越百億大海百億輪圍山百億菩薩受生百億菩薩出家百億如來成正覺百億如來轉法輪百億如來入涅槃百億須彌山王百億四天王衆天百億三十三天百億夜摩天百億兜率天百億化樂天百億他化自在天百億梵衆天百億光音天百億遍淨天百億廣果天百億色究竟天其中所有悉皆明現如此處見佛世尊坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞其百億閻浮提中百億如來亦如是坐悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其名曰文殊師利菩薩覺首菩薩財首菩薩寶首菩薩功德首菩薩目首菩薩精進首菩薩法首菩薩智首菩薩賢首菩薩是諸菩薩所從來國所謂金色世界妙色世界蓮華色世界薝蔔華色世界優鉢羅華色世界金色世界寶色世界金剛色世界頗黎色世界平等色世界此諸菩薩各於佛所淨修梵行所謂不動智佛無礙智佛解脫智佛威儀智佛明相智佛究竟智佛最勝智佛自在智佛梵智佛觀察智佛爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言若有見正覺解脫離諸漏不著一切世彼非證道眼若有知如來體相無所有修習得明了此人疾作佛能見此世界其心不搖動於佛身亦然當成勝智者若於佛及法其心了平等二念不現前當踐難思位若見佛及身平等而安住無住無所入當成難遇者色受無有數想行識亦然若能如是知當作大牟尼世及出世見一切皆超越而能善知法當成大光耀若於一切智發生回向心見心無所生當獲大名稱衆生無有生亦復無有壞若得如是智當成無上道一中解無量無量中解一了彼互生起當成無所畏此明光照分齊也始從照一大千世界此總標本會主剎但舉一娑婆之境故云三千大千次云百億閻浮提等四天下乃娑婆內屬境言照百億四天下乃先照人中次云百億菩薩受生此言菩薩八相成道謂一一四天下皆有菩薩八相成道也次云百億須彌乃至色究竟天乃照百億三界諸世界以毗盧遮那現坐閻浮提説法放光故先舉所照本會娑婆之境為本法界後漸漸鱗次外遍將本會遍顯所照盡虗空法界所有世界中佛會故下文挨列十重華藏世界彼一一世界皆有百億四天下等以光所照處即此一會齊遍一切處同時頓照頓遍盡虗空界將顯無盡但言不頓彰故下文節節而遍節節各見故云如於此處見佛世尊坐蓮華藏師子之座等其菩薩文殊等即前文殊等所從來國及本所事佛皆是前會新集十方海衆所來之處故今佛光遍彼一一所來之土故重舉耳初文殊説偈總顯菩薩超情後有十段文各有二皆長行佛以身光照現事境令衆目覩偈頌文殊智光讚述事理令衆悟入言一切處文殊者謂一一佛前皆有文殊故云一切爾時光明過此世界遍照東方十佛國土南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現如此處見佛世尊坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞彼一一世界中各有百億閻浮提百億如來亦如是坐悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等爾時一切處文殊師利菩薩各於佛所同時發聲而説頌言衆生無智慧愛刺所傷毒為彼求菩提諸佛法如是普見於諸法二邊皆捨離道成永不退轉此無等輪不可思議劫精進修諸行為度諸衆生此是大仙力導師降衆魔勇健無能勝光中演妙義慈悲故如是以彼智慧心破諸煩惱障一念見一切此是佛神力擊于正法鼓覺悟十方剎咸令向菩提自在力能爾不懷無邊境而遊諸億剎於有無所著彼自在如佛諸佛如虗空究竟常清淨憶念生歡喜彼諸願具足一一地獄中經於無量劫為度衆生故而能忍是苦不惜於身命常護諸佛法無我心調柔能得如來道爾時光明過十世界遍照東方百世界南西北方四維上下亦復如是彼諸世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現彼一一閻浮提中悉見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言佛了法如幻通達無障礙心淨離衆著調伏諸羣生或有見初生妙色如金山住是最後身永作人中月或見經行時具無量功德念慧皆善巧丈夫師子步或見紺青目觀察於十方有時現戲笑為順衆生欲或見師子吼殊勝無比身示現最後生所説無非實或有見出家解脫一切縛修治諸佛行常樂觀寂滅或見坐道場覺知一切法到功德彼岸癡暗煩惱盡或見勝丈夫具足大悲心轉於妙法輪度無量衆生或見師子吼威光最殊特超一切世間神通力無等或見心寂靜如世燈永滅種種現神通十力能如是爾時光明過百世界遍照東方千世界南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現彼一一閻浮提中悉見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言佛於甚深法通達無與等衆生不能了次第為開示我性未曾有我所亦空寂云何諸如來而得有其身解脫明行者無數無等倫世間諸因量求過不可得佛非世間蘊界處生死法數法不能成故號人師子其性本空寂內外俱解脫離一切妄念無等法如是體性常不動無我無來去而能寤世間無邊悉調伏常樂觀寂滅一相無有二其心不增減現無量神力不作諸衆生業報因緣行而能了無礙善逝法如是種種諸衆生流轉於十方如來不分別度脫無邊類諸佛真金色非有遍諸有隨衆生心樂為説寂滅法爾時光明過千世界遍照東方十千世界南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現彼一一閻浮提中悉見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言發此大悲心救護諸衆生永出人天衆如是業應作意常信樂佛其心不退轉親近諸如來如是業應作志樂佛功德其心永不退住於清涼慧如是業應作一切威儀中常念佛功德晝夜無暫斷如是業應作觀無邊三世學彼佛功德常無厭倦心如是業應作觀身如實相一切皆寂滅離我無我著如是業應作等觀衆生心不起諸分別入於真實境如是業應作悉舉無邊界普飲一切海神通大智力如是業應作思惟諸國土色與非色相一切悉能知如是業應作十方國土塵一塵為一佛悉能知其數如是業應作爾時光明過十千世界遍照東方百千世界南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現彼一一閻浮提中悉見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言若以威德色種族而見人中調御師是為病眼顛倒見彼不能知最勝法如來色形諸相等一切世間莫能測億那由劫共思量色相威德轉無邊如來非以相為體但是無相寂滅法身相威儀悉具足世間隨樂皆得見佛法微妙難可量一切言説莫能及非是和合非不合體性寂滅無諸相佛身無生超戲論非是蘊聚差別法得自在力決定見所行無畏離言道身心悉平等內外皆解脫永劫住正念無著無所繫意淨光明者所行無染著智眼靡不周廣大利衆生一身為無量無量復為一了知諸世間現形遍一切此身無所從亦無所積集衆生分別故見佛種種身心分別世間是心無所有如來知此法如是見佛身爾時光明過百千世界遍照東方百萬世界南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現彼一一閻浮提中悉見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言如來最自在超世無所依具一切功德度脫於諸有無染無所著無想無依止體性不可量見者咸稱歎光明遍清淨塵纍悉蠲滌不動離二邊此是如來智若有見如來身心離分別則於一切法永出諸凝滯一切世間中處處轉法輪無性無所轉導師方便説於法無疑惑永絶諸戲論不生分別心是念佛菩提了知差別法不著於言説無有一與多是名隨佛教多中無一性一亦無有多如是二俱捨普入佛功德衆生及國土一切皆寂滅無依無分別能入佛菩提衆生及國土一異不可得如是善觀察名知佛法義爾時光明過百萬世界遍照東方一億世界南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現彼一一閻浮提中各見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言智慧無等法無邊超諸有海到彼岸壽量光明悉無比此功德者方便力所有佛法皆明了常觀三世無厭倦雖緣境界不分別此難思者方便力樂觀衆生無生想普見諸趣無趣想恆住禪寂不繫心此無礙慧方便力善巧通達一切法正念勤修涅槃道樂於解脫離不平此寂滅人方便力有能勸向佛菩提趣如法界一切智善化衆生入於諦此住佛心方便力佛所説法皆隨入廣大智慧無所礙一切處行悉已臻此自在修方便力恆住涅槃如虗空隨心化現靡不周此依無相而為相到難到者方便力晝夜日月及年劫世界始終成壞相如是憶念悉了知此時數智方便力一切衆生有生滅色與非色想非想所有名字悉了知此住難思方便力過去現在未來世所有言説皆能了而知三世悉平等此無比解方便力爾時光明過一億世界遍照東方十億世界南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現彼一一閻浮提中悉見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言廣大苦行皆修習日夜精勤無厭怠已度難度師子吼普化衆生是其行衆生流轉愛欲海無明網覆大憂迫至仁勇猛悉斷除誓亦當然是其行世間放逸著五欲不實分別受衆苦奉行佛教常攝心誓度於斯是其行衆生著我入生死求其邊際不可得普事如來獲妙法為彼宣説是其行衆生無怙病所纏常淪惡趣起三毒大火猛𦦨恆燒熱淨心度彼是其行衆生迷惑失正道常行邪徑入暗宅為彼大然正法燈永作照明是其行衆生漂溺諸有海憂難無涯不可處為彼興造大法船皆令得度是其行衆生無知不見本迷惑癡狂險難中佛哀愍彼建法橋正念令升是其行見諸衆生在險道老病死苦常逼迫修諸方便無限量誓當悉度是其行聞法信解無疑惑了性空寂不驚怖隨形六道遍十方普教羣迷是其行爾時光明過十億世界遍照東方百億世界千億世界百千億世界那由他億世界百那由他億世界千那由他億世界百千那由他億世界如是無數無量無邊無等不可數不可稱不可思不可量不可説盡法界虗空界所有世界南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現彼一一閻浮提中悉見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言一念普觀無量劫無去無來亦無住如是了知三世事超諸方便成十力十方無比善名稱永離諸難常歡喜普詣一切國土中廣為宣揚如是説為利衆生供養佛如其意獲相似果於一切法悉順知遍十方中現神力從初供佛意柔忍入深禪定觀法性普勸衆生發道心以此速成無上果十方求法情無異為修功德令滿足有無二相悉滅除此人於佛為真見普往十方諸國土廣説妙法興義利住於實際不動搖此人功德同於佛如來所轉妙法輪一切皆是菩提分若能聞已悟法性如是之人常見佛不見十力空如幻雖見非見如盲覩分別取相不見佛畢竟離著乃能見衆生隨業種種別十方內外難盡見佛身無礙遍十方不可盡見亦如是譬如空中無量剎無來無去遍十方生成滅壞無所依佛遍虗空亦如是此下光明所照所遍之世界皆有文殊説偈述光中法界之理事初就本會偈中總顯菩提超情也此下節節皆有佛以身光照事令衆目覩文殊説偈智光讚述事理令衆悟入今照鱗次娑婆之外十佛國土文殊説偈通顯菩提因果次照百世界顯八相菩提次照千世界顯菩提體性次照十千世界顯菩提之相次照百千世界顯答威德次有四節答法性德次照百萬世界總顯內外包攝德次照一億世界顯方便幹能德次照十億世界顯大悲救攝德次照百億世界顯因果圓遍德意顯無盡故無結束上第二會從修因契果生解分初如來名號品初新集菩薩有念請四十問初有十問總問所依果次引例有三十句問初十句問因次二十句問果今前三品佛放光現相及文殊言説通答前十句果問為生解所依已竟次下正答生解因果且先答十句所修因問從問明品起至後四十卷十定品下住處品止於中未信者令信説十信即次三品二已信者令解説十住此在第十六經升須彌山頂三已解者令行説十行此在第十九經升夜摩天宮四已行者令起願説十回向此在第二十二經升兜率天宮五已起願者令證入説十地此在第三十四經十地品六已證入者令等佛説等覺此在第四十經十定品至住處品此下有二十三品經通答前念請十句因問菩薩問明品第十爾時文殊師利菩薩問覺首菩薩言佛子心性是一云何見有種種差別所謂往善趣惡趣諸根滿缺受生同異端正醜陋苦樂不同業不知心心不知業受不知報報不知受心不知受受不知心因不知緣緣不知因智不知境境不知智時覺首菩薩以偈答曰仁今問是義為曉悟羣蒙我如其性答惟仁應諦聽諸法無作用亦無有體性是故彼一切各各不相知譬如河中水湍流競奔逝各各不相知諸法亦如是亦如大火聚猛𦦨同時發各各不相知諸法亦如是又如長風起遇物咸鼓扇各各不相知諸法亦如是又如衆地界展轉因依住各各不相知諸法亦如是眼耳鼻舌身心意諸情根以此常流轉而無能轉者法性本無生示現而有生是中無能現亦無所現物眼耳鼻舌身心意諸情根一切空無性妄心分別有如理而觀察一切皆無性法眼不思議此見非顛倒若實若不實若妄若非妄世間出世間但有假言説爾時文殊師利菩薩問財首菩薩言佛子一切衆生非衆生云何如來隨其時隨其命隨其身隨其行隨其解隨其言論隨其心樂隨其方便隨其思惟隨其觀察於如是諸衆生中為現其身教化調伏時財首菩薩以頌答曰此是樂寂滅多聞者境界我為仁宣説仁今應諦受分別觀內身此中誰是我若能如是解彼達我有無此身假安立住處無方所諦了是身者於中無所著於身善觀察一切皆明見知法皆虗妄不起心分別壽命因誰起復因誰退滅猶如旋火輪初後不可知智者能觀察一切有無常諸法空無我永離一切相衆報隨業生如夢不真實念念常滅壞如前後亦爾世間所見法但以心為主隨解取衆相顛倒不如實世間所言論一切是分別未曾有一法得入於法性能緣所緣力種種法出生速滅不暫停念念悉如是爾時文殊師利菩薩問寶首菩薩言佛子一切衆生等有四大無我無我所云何而有受苦受樂端正醜陋內好外好少受多受或受現報或受後報然法界中無美無惡時寶首菩薩以頌答曰隨其所行業如是果報生作者無所有諸佛之所説譬如淨明鏡隨其所對質現像各不同業性亦如是亦如田種子各各不相知自然能出生業性亦如是又如巧幻師在彼四衢道示現衆色相業性亦如是如機關木人能出種種聲彼無我非我業性亦如是亦如衆鳥類從㲉而得出音聲各不同業性亦如是譬如胎藏中諸根悉成就體相無來處業性亦如是又如在地獄種種諸苦事彼悉無所從業性亦如是譬如轉輪王成就勝七寶來處不可得業性亦如是又如諸世界大火所燒然此火無來處業性亦如是爾時文殊師利菩薩問德首菩薩言佛子如來所悟唯是一法云何乃説無量諸法現無量剎化無量衆演無量音示無量身知無量心現無量神通普能震動無量世界示現無量殊勝莊嚴顯示無邊種種境界而法性中此差別相皆不可得時德首菩薩以頌答曰佛子所問義甚深難可了智者能知此常樂佛功德譬如地性一衆生各別住地無一異念諸佛法如是亦如火性一能燒一切物火𦦨無分別諸佛法如是亦如大海一波濤千萬異水無種種殊諸佛法如是亦如風性一能吹一切物風無一異念諸佛法如是亦如大雲雷普雨一切地雨滴無差別諸佛法如是亦如地界一能生種種芽非地有殊異諸佛法如是如日無雲曀普照於十方光明無異性諸佛法如是亦如空中月世間靡不見非月往其處諸佛法如是譬如大梵王應現滿三千其身無別異諸佛法如是爾時文殊師利菩薩問目首菩薩言佛子如來福田等一無異云何而見衆生布施果報不同所謂種種色種種形種種家種種根種種財種種主種種眷屬種種官位種種功德種種智慧而佛於彼其心平等無異思惟時目首菩薩以頌答曰譬如大地一隨種各生芽於彼無怨親佛福田亦然又如水一味因器有差別佛福田亦然衆生心故異亦如巧幻師能令衆歡喜佛福田如是令衆生敬悅如有才智王能令大衆喜佛福田如是令衆悉安樂譬如淨明鏡隨色而現像佛福田如是隨心獲衆報如阿揭陀藥能療一切毒佛福田如是滅諸煩惱患亦如日出時照耀於世間佛福田如是滅除諸黑暗亦如淨滿月普照於大地佛福田亦然一切處平等譬如毗藍風普震於大地佛福田如是動三有衆生譬如大火起能燒一切物佛福田如是燒一切有為爾時文殊師利菩薩問勤首菩薩言佛子佛教是一衆生得見云何不即悉斷一切諸煩惱縛而得出離然其色蘊受蘊想蘊行蘊識蘊欲界色界無色界無明貪愛無有差別是則佛教於諸衆生或有利益或無利益時勤首菩薩以頌答曰佛子善諦聽我今如實答或有速解脫或有難出離若欲求除滅無量諸過惡當於佛法中勇猛常精進譬如微少火樵濕速令滅於佛教法中懈怠者亦然如鑽燧求火未出而數息火勢隨止滅懈怠者亦然如人持日珠不以物承影火終不可得懈怠者亦然譬如赫日照孩稚閉其目怪言何不覩懈怠者亦然如人無手足欲以芒草箭遍射破大地懈怠者亦然如以一毛端而取大海水欲令盡乾竭懈怠者亦然又如劫火起欲以少水滅於佛教法中懈怠者亦然如有見虗空端居不搖動而言普騰躡懈怠者亦然爾時文殊師利菩薩問法首菩薩言佛子如佛所説若有衆生受持正法悉能除斷一切煩惱何故復有受持正法而不斷者隨貪瞋癡隨慢隨覆隨忿隨恨隨嫉隨慳隨誑隨諂勢力所轉無有離心能受持法何故復於心行之內起諸煩惱時法首菩薩以頌答曰佛子善諦聽所問如實義非但以多聞能入如來法如人水所漂懼溺而渴死於法不修行多聞亦如是如人設美膳自餓而不食於法不修行多聞亦如是如人善方藥自疾不能救於法不修行多聞亦如是如人數他寶自無半錢分於法不修行多聞亦如是如有生王宮而受餒與寒於法不修行多聞亦如是如聾奏音樂悅彼不自聞於法不修行多聞亦如是如盲繢衆像示彼不自見於法不修行多聞亦如是譬如海船師而於海中死於法不修行多聞亦如是如在四衢道廣説衆好事內自無實德不行亦如是爾時文殊師利菩薩問智首菩薩言佛子於佛法中智為上首如來何故或為衆生讚歎布施或讚持戒或讚堪忍或讚精進或讚禪定或讚智慧或復讚歎慈悲喜捨而終無有唯以一法而得出離成阿耨多羅三藐三菩提者時智首菩薩以頌答曰佛子甚希有能知衆生心如仁所問義諦聽我今説過去未來世現在諸導師無有説一法而得於道者佛知衆生心性分各不同隨其所應度如是而説法慳者為讚施毀禁者讚戒多瞋為讚忍好懈讚精進亂意讚禪定愚癡讚智慧不仁讚慈愍好害讚大悲憂戚者讚喜曲心讚歎捨如是次第修漸具諸佛法如先立基堵而後造宮室施戒亦復然菩薩衆行本譬如建城郭為護諸人衆忍進亦如是防護諸菩薩譬如大力王率土咸戴仰定慧亦如是菩薩所依賴亦如轉輪王能與一切樂四等亦如是與諸菩薩樂爾時文殊師利菩薩問賢首菩薩言佛子諸佛世尊唯以一道而得出離云何今見一切佛土所有衆事種種不同所謂世界衆生界説法調伏壽量光明神通衆會教儀法住各有差別無有不具一切佛法而成阿耨多羅三藐三菩提者時賢首菩薩以頌答曰文殊法常爾法王唯一法一切無礙人一道出生死一切諸佛身唯是一法身一心一智慧力無畏亦然如本趣菩提所有回向心得如是剎土衆會及説法一切諸佛剎莊嚴悉圓滿隨衆生行異如是見不同佛剎與佛身衆會及言説如是諸佛法衆生莫能見其心已清淨諸願皆具足如是明達人於此乃能覩隨衆生心樂及以業果力如是見差別此佛威神故佛剎無分別無憎無有愛但隨衆生心如是見有殊以是於世界所見各差別非一切如來大仙之過咎一切諸世界所應受化者常見人中雄諸佛法如是爾時諸菩薩謂文殊師利菩薩言佛子我等所解各自説已唯願仁者以妙辨才演暢如來所有境界何等是佛境界何等是佛境界因何等是佛境界度何等是佛境界入何等是佛境界智何等是佛境界法何等是佛境界説何等是佛境界知何等是佛境界證何等是佛境界現何等是佛境界廣時文殊師利菩薩以頌答曰如來深境界其量等虗空一切衆生入而實無所入如來深境界所有勝妙因億劫常宣説亦復不能盡隨其心智慧誘進咸令益如是度衆生諸佛之境界世間諸國土一切皆隨入智身無有色非彼所能見諸佛智自在三世無所礙如是慧境界平等如虗空法界衆生界究竟無差別一切悉了知此是如來境一切世界中所有諸音聲佛智皆隨了亦無有分別非識所能識亦非心境界其性本清淨開示諸羣生非業非煩惱無物無住處無照無所行平等行世間一切衆生心普在三世中如來於一念一切悉明達此品來意有通有別通者謂前三品已答十句生解所依此下正答生解因果故次來也生解因中先答十住住攬信成將辨所成先辨能成又正答十信故連下二品來也以前問中脫十信問故以賢首別開信位如梁論及仁王經皆有信位此經因無問故云不立今不論成位不成位皆以三品別答信問別一會答皆有問故三品明信者有解行德解為二本此品先來釋名者菩薩是人問明是法遮果表因故云菩薩問即是難明即是答然問有二種一泛爾相問二者難問謂以理徵詰即今品意答亦有二一但依問報答曰答二若俱為解釋旁兼異義美言讚述令理顯煥曰明即今品意也然明者破暗謂能破問者之疑暗故今明即法明以十菩薩問出十種法明故曰問明今此品明正解理觀次品明隨緣願行賢首品明德用該收此品十菩薩各主一門顯十甚深即為十段一問覺首明緣起甚深二問財首明教化甚深三問寶首明業果甚深四問德首明説法甚深五問目首明福田甚深六問勤首明正教甚深七問法首明正行甚深八問智首明正助甚深九問賢首明一道甚深十問文殊明佛境甚深此上十甚深亦可配十信但文不次文殊佛境即當信心文殊主信故佛境是所信故約初發心次第信居其首約所信終極最居其後亦明十心不必次故勤首即進心財首為念心明四念故德首定心心性無念為上定故智首為慧心兼已莊嚴故有十度法首即不退心如説修行不得退故寶首即戒心三聚無缺如寶珠故業果甚深戒所招故覺首即護法心緣起甚深是所護故目首即願心福田等一由願異故目能將身如願導行故賢首即回向心以歸一道即回向真如一身一智即是佛果文云如本趣菩提所有回向心等以是圓融十法各兼多義疏有詳釋恐繁不録上列十甚深即經文如次爾時此娑婆世界中一切衆生所有法差別業差別世間差別身差別根差別受生差別持戒果差別犯戒果差別國土果差別以佛神力悉皆明現如是東方百千億那由他無數無量無邊無等不可數不可稱不可思不可量不可説盡法界虗空界一切世界中所有衆生法差別乃至國土果差別悉以佛神力故分明顯現南西北方四維上下亦復如是此現事結通於中先現事後結通今初因何而現上來十首法光開曉衆生身心故佛力暫現示相而答令其目驗而欣厭故補義曰諦觀經文結通云此娑婆世界中一切衆生所有法差別等乃至以佛神力悉皆明現又云不可説盡法界虗空界一切世界中所有差別悉以佛神力分明顯現此則是上佛光所照世界海中之世界諸世界中所有差別之衆生及種種差別之事相皆因佛光所照一一明見故今九首菩薩即光中所見之差別因果事相故各舉所見以問文殊者乃即問差別之因也文殊問九首佛境界者乃即明差別中之果也意謂法界內因衆生有種種差別故須修行者有種種差別之行以明對治對治行終各於差別中證佛境界為差別果是故發解之初先要明此差別之相一一解了以成理觀故此一品以為信首有深旨也若但就此一問便了又何關於通途大旨耶經文長遠學者幸明記此幸勿迷宗菩薩問明品竟
