body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈十通品第二十八初來意為答第二會中十通問故以二品明業用廣大前定此通義次第故二釋名者通即神通謂妙用難測曰神自在無壅曰通妙用無極寄十顯圓晉經本業俱稱十明者委照無遺故然通與明經論皆異故智度第三云直知過去宿命之事為通若知過去因緣行業為明等今以此經通即委照亦得稱明故下經云非諸菩薩通明境界三宗趣者智用自在為宗為滿等覺無方攝化為趣爾時普賢菩薩摩訶薩告諸菩薩言佛子菩薩摩訶有十種通次正釋文長分為四一舉數標告二徵數列釋三總歎勝能四結數辨果今初言十者一他心二天眼三知過去宿住四盡未來際劫五無礙清淨天耳六無體性無動作往一切佛剎七善分別一切言辭八無數色身九一切法智十入一切法滅盡三昧此十皆言智通者皆以大智為體性故若隨相說前八量智後二理智據實唯一大智此十亦是開彼六通天眼天耳神足漏盡各分二故天眼約見現未分成二四天耳約音聲言辭分出五七亦聞聖教及諸類言辭故神足約業用及色身分成六八漏盡約慧定分成九十一三不分故六為十然小乘六通智用有分三乘平徧亦非曲盡今一乘十通智用重重徧周法界猶如帝網念劫圓融故尚越彼明況於通用為顯圓旨開成十通何者為十第二徵數列釋中先總徵後佛子下別釋十通即為十段段各有三謂標釋結佛子菩薩摩訶薩以他心智通今初標云他心者智以他心為所緣故若直就所緣應名心差別通若王若所種類多種皆能知故並依主釋然智緣他心諸說不同安慧論師云佛智緣他心緣得本質餘皆變影護法論帥則佛亦變影若緣本質得心外法壞唯識故但極似本質有異因人依唯識宗護法為正以今經望前亦未失以攝境從心不壞境故能所兩亡不礙存故第一義心非一非異正緣他時即是自故以即佛心之眾生心非即眾生心之佛心為所緣以即眾生心之佛心非即佛心之眾生心為能緣如是鎔融故非一非異若離佛外別有眾生更須變影却失真唯識義知一三千大千世界眾生心差別所謂善心不善心廣心狹心大心小心順生死心背生死心聲聞心獨覺心菩薩心聲聞行心獨覺行心菩薩行心天心龍心夜叉心乾闥婆心阿修羅心迦樓羅心緊那羅心摩睺羅伽心人心非人心地獄心畜生心閻魔王處心餓鬼心諸難處眾生心如是等無量差別種種眾生心悉分別知二釋相中二初知一剎後如一下以少類多前中三初總所謂下別後如是下結別中有二十八句於中前八句約相總顯後二十心約人別顯前八中初二約性總該諸心次二約行兼濟獨善故次二約報天大人小故上四唯善次二約向背而順通三性善唯有漏背唯是善通漏無漏約人辨中前六約人前三是果後三是因即前背生死心及廣狹心次八部約類即前順生死及大小心地獄等約趣亦順生死心是不善心餘可知如一世界如是百世界千世界百千世界百千億那由他世界乃至不可說不可說佛剎微塵數世界中所有眾生心悉分別知次以少類多是名菩薩摩訶薩第一善知他心智神通三結名佛子菩薩摩訶薩以無礙清淨天眼智通第二天眼標云無礙者見自在故清淨者離障故見無量不可說不可說佛剎微塵數世界中眾生死此生彼善趣惡趣福相罪相或好或醜或垢或淨如是品類無量眾生所謂天眾龍眾夜叉眾乾闥婆眾阿修羅眾迦樓羅眾緊那羅眾摩睺羅伽眾人眾非人眾微細身眾生眾廣大身眾生眾小眾大眾如是種種眾生眾中以無礙眼悉皆明見隨所積集業隨所受苦樂隨心隨分別隨見隨言說隨因隨業隨所緣隨所起悉皆見之無有錯謬二釋中分三初總明多界相殊其善惡趣等後後展開次所謂下別明多類非一隨一一類有前類等三如是種種下委照分明前但覩其現相此則照其因緣十明之目由此而立於中初能見分明次隨所下所見委悉言隨所者所知非一故後悉皆下結其無謬是名菩薩摩訶薩第二無礙天眼智神通三結名佛子菩薩摩訶薩以宿住隨念智通第三宿住通標中謝往之事名宿住在過去明了記憶為隨念即宿住之隨念宿住隨念之通能知自身及不可說不可說佛剎微塵數世界中一切眾生過去不可說不可說佛剎微塵數劫宿住之事所謂某處生如是名如是姓如是種族如是飲食如是苦樂從無始來於諸有中以因以緣展轉滋長次第相續輪迴不絕種種品類種種國土種種趣生種種形相種種業行種種結使種種心念種種因緣受生差別如是等事皆悉了知二釋相中一知凡事於中先總所謂下別又憶過去爾所佛剎微塵數劫爾所佛剎微塵數世界中有爾所佛剎微塵數諸佛一一佛如是名號如是出興如是眾會如是父母如是侍者如是聲聞如是最勝二大弟子於如是城邑如是出家復於如是菩提樹下成最正覺於如是處坐如是座演說如是若干經典如是利益爾所眾生於爾所時住於壽命施作如是若干佛事依無餘依般涅槃界而般涅槃般涅槃後法住久近如是一切悉能憶念次知佛事於中亦二先約界顯多但知其果又憶念不可說不可說佛剎微塵數諸佛名號一一名號有不可說不可說佛剎微塵數佛從初發心起願修行供養諸佛調伏眾生眾會說法壽命多少神通變化乃至入於無餘涅槃般涅槃後法住久近造立塔廟種種莊嚴令諸眾生種植善根皆悉能知後約人顯多兼知其因皆以菩薩得九世眼如見現在故若不爾者過去之法若不落謝不名過去若已落謝無法可知若但曾經心中有種影現前故說憶知者是則但見自心不見彼心又曾不經事應不憶知又但見現在非是過去何名宿住是名菩薩摩訶薩第三知過去際劫宿住智神通三結名佛子菩薩摩訶薩以知盡未來劫智通四知劫通亦從境受名此從第二天眼約口未來分出知不可說不可說佛剎微塵數世界中所有劫一一劫中所有眾生命終受生諸有相續業行果報若善若不善若出離若不出離若決定若不決定若邪定若正定若善根與使俱若善根不與使俱若具足善根若不具足善根若攝取善根若不攝取善根若積集善根若不積集善根若積集罪法若不積集罪法如是一切皆能了知釋相中二先知凡後又知下知佛前中亦二先明所依劫但寄多界以顯多劫非有際限名及後段皆盡未來此位所知同於佛故後一一下顯能依事然大乘宗未來世法體用皆無今云何知依方便教但見現前因種知當果相非見未來法體若一乘宗於九世中未來中現在體用皆有今稱實而知然非現在之現在故稱未來此有若是性有即同小乘若是緣有緣今未會云何言有若今時看緣性俱無以是現在未來定非有故若逐未來時看以是未來之現在故還如今有又知不可說不可說佛剎微塵數世界盡未來際有不可說不可說佛剎微塵數劫一一劫有不可說不可說佛剎微塵數諸佛名號一一名號有不可不可可說佛剎微塵數諸佛如來一一如來從初發心起願立行供養諸佛教化眾生眾會說法壽命多少神通變化乃至入於無餘涅槃般涅槃後法住久近造立塔廟種種莊嚴令諸眾生種植善根如是等事悉能了知二知佛是名菩薩摩訶薩第四知盡未來際劫智神通三結名佛子菩薩摩訶薩成就無礙清淨天耳第五天耳通初標名略無智通若直云天耳即當體受名若取無礙之清淨天耳即以有德業受稱圓滿廣大聰徹離障了達無礙具足成就於諸一切所有音聲欲聞不聞隨意自在釋相中三初總顯德業自在二佛子下別示一方業用三如東方下舉一例餘今初九句皆約用辨德一圓滿者能互用故二遍聞十方及九世故三一時令覽通其源故四離二障故五明了所知故六緣不能礙故七非如權小聞有分限不盡重重故八證已得故九於一切皆自在故謂欲聞則細遠無逃欲不聞則近大不撓故云自在佛子東方有不可說不可說佛剎微塵數二別示一方業用中二初舉多佛欲顯聞廣是諸佛所說所示所開所演所安立所教化所調伏所憶念所分別甚深廣大種種差別無量方便無量善巧清淨之法於彼一切皆能受持次顯聞憶持於中二先聞持教法又於其中若義若文若一人若眾會如其音辭如其智慧如所了達如所示現如所調伏如其境界如其所依如其出道於彼一切悉能記持不忘不失不斷不退無迷無惑為他演說令得悟解終不忘失一文一句後持圓滿即能持之相於中二先舉所持上文通顯佛所說法今辨所說差別於彼下辨能持相兼明轉化如東方南西北方四維上下亦復如是三例餘是名菩薩摩訶薩第五無礙清淨天耳智通結名佛子菩薩摩訶薩住無體性神通無作神通平等神通廣大神通無量神通無作神通隨念神通起神通不起神通不退神通不斷神通不壞神通增長神通隨詣神通第六無體性神通此即六通中神足通初標名中有十四名初一總通即無體性餘別中一無功作用二同理同平三能普遍四量難知五非謂起體起用六但念即形七現有作用八不動本處九作必究竟十用無間歇亦不斷佛種十一他不能壞十二能生善根十三隨何所詣於十三中初二五八是無體性義餘即神通義此二無礙故受斯名此菩薩聞極遠一切世界中諸佛名所謂無數世界無量世界乃至不可說不可說佛剎微塵數世界中諸佛名聞其名已即自見身在彼佛所二釋相中三一明廣大謂聞多剎佛名即自見身在彼多剎故彼諸世界或仰或覆各各形狀各各方所各各差別無邊無礙種種國土種種時劫無量功德各別莊嚴彼彼如來於中出現示現神變稱揚名號無量無數各各不同此菩薩一得聞彼諸如來名不動本處而見其身在彼佛所禮拜尊重承事供養問菩薩法入佛智慧悉能了達諸佛國土道場眾會及所說法至於究竟無所取著二明無量不起等義謂又於彼佛重聞佛名便往敬事受道無著故如是經不可說不可說佛剎微塵數劫普至十方而無所往然詣剎觀佛聽法請道無有斷絕無有廢捨無有休息無有疲厭修菩薩行成就大願悉令具足曾無退轉為令如來廣大種性不斷絕故三明不斷義謂於多時體用無礙故是名菩薩摩訶薩第六住無體性無動作往一切佛剎智神通三結名佛子菩薩摩訶薩以善分別一切眾生言音智通第七善分別言音通此從第五約音聲言辭分出初標名從所了得名即依主得名若從所發得名即通持業知不可說不可說佛剎微塵數世界中眾生種種言辭所謂聖言辭非聖言辭天言辭龍言辭夜叉言辭乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人及非人乃至不可說不可說眾生所有言辭各各表示種種差別如是一切皆能了知二釋相中二先知言辭此菩薩隨所入世界能知其中一切眾生所有性欲如其性欲為出言辭悉令解了無有疑惑如日光出現普照眾色令有目者悉得明見菩薩摩訶薩亦復如是以善分別一切言辭智深入一切言辭雲所有言辭令諸世間聰慧之者悉能解了次明發言辭謂隨樂差別而發言故有法喻合是名菩薩摩訶薩第七善分別一切言辭智神通三結名佛子菩薩摩訶薩以出生無量阿僧祇色身莊嚴智通第八色身莊嚴智通此從第六神足約業用及色身分出依所現得名即有財立稱知一切法遠離色相無差別相無種種相無無量相無分別相無青黃赤白相二釋相中三初知無色以色即空故二菩薩如是下明能現色以空即色故三佛子下雙明無色現色所為不礙悲故今初由了法界無定實色舉體即空非斷空故空中無色不礙色故存亡隱顯皆自在故方能隨樂現種種色故先明之於十六句初一總知色性離相亦無有法而為空故餘五別明離何等相一離差別相麤妙長短等同一無生體故二種種異相虗故三無量多相離故又無大小絕分量故四但妄分別求叵得故色空二見皆情取故即與不即斯見絕故上通形顯五離相依形有故此具法界觀真空觀中四句義菩薩如是入於法界能現其身作種種色二能現色中初結前標後以即空之色為妙色故又色空不二成上真空不二而二現斯妙色色空融即為真法界緣起無盡即一現多所謂無邊色無量色清淨色莊嚴色普徧色無比色普照色增上色無違逆色具諸相色離眾惡色大威力色可尊重色無窮盡色眾雜妙色極端嚴色不可量色善守護色能成熟色隨化者色無障礙色甚明徹色無垢濁色極澄淨色大勇健色不思議方便色不可壞色離瑕翳色無障闇色善安住色妙莊嚴色諸相端嚴色種種隨好色大尊貴色妙境界色善磨瑩色清淨深心色熾然明盛色最勝廣大色無間斷色無所依色無等比色充滿不可說佛剎色增長色堅固攝受色最勝功德色隨諸心樂色清淨解了色積集眾妙色善巧決定色無有障礙色虗空明淨色清淨可樂色離諸塵垢色不可稱量色妙見色普見色隨時示現色寂靜色離貪色真實福田色能作安隱色離諸怖畏色離愚癡行色智慧勇猛色身相無礙色遊行普徧色心無所依色大慈所起色大悲所現色平等出離色具足福德色隨心憶念色無邊妙寶色寶藏光明色眾生信樂色一切智現前色歡喜眼色眾寶莊嚴第一色無有處所色自在示現色種種神通色生如來家色過諸譬喻色周徧法界色眾皆往詣色種種色成就色出離色隨所化者威儀色見無厭足色種種明淨色能放無數光網色不可說光明種種差別色不可思香光明超過三界色不可量日輪光明照耀色示現無比月身色無量可愛樂華雲色出生種種蓮華鬘雲莊嚴色超過一切世間香𦦨普熏色出生一切如來藏色不可說音聲開示演暢一切法色具足一切普賢行色後別顯不同有一百三種或從色相立名或就德受稱可以意求然皆是稱法界之色不同變礙但隨所顯以立色名佛子菩薩摩訶薩深入如是無色法界能現比等種種色身令所化者見令所化者念為所化者轉法輪隨所化者時隨所化者相令所化者親近令所化者開悟為所化者起種種神通為所化者現種種自在為所化者施種種能事二雙明所為中初結前後令所化下顯其所為有十句是名菩薩摩訶薩為度一切眾生故勤修成就第八無數色身智神通第八無數色身智神通佛子菩薩摩訶薩以一切法智神通第九一切法智通初標名從所知真俗等法受稱知一切法無有名字無有種性無來無去非異非不異非種種非不種種非二非不二二釋相中二初明知法即內證事理後此菩薩下明演法即外益眾生亦是前明即是恒理後明即理恒事用寂寂用無障礙故今初又二初約離言顯實次無我下約二空顯實今初初三句一向顯實一名無得物之功故二緣成無性故三體絕去來故下有三句相對顯實然此三對釋有三義一唯約實則相待而空故異相互無故云不異遮異言不異亦無不異可得云非不異二約雙顯體則不異相非不異三約雙遮相即性故非異性即相故非不異又相非相故不異性非性故非不異故離二邊不住中道無我無比不生不滅不動不壞無實無虗一相無相非無非有非法非非法不隨於俗非不隨俗非業非非業非報非非報非有為非無為非第一義非不第一義非道非非道非出離非不出離非量非無量非世間非出世間非從因生非不從因生非決定非不決定非成就非不成就非出非不出非分別非不分別非如理非不如理二約二空顯中亦初三對一向顯實無比者無有我所與我為比對故無實下且約顯實以釋一虗實皆緣顯故二法性不並真故一相一亦不為一故無相有無皆法對彼故無法與非法但假施設並就實而求能治所治無不雙寂此菩薩不取世俗諦不住第一義不分別諸法不建立文字隨順寂滅性二演法外益中三一牒前成智為起用所依故不捨一切願見義知法興布法雲降霔法雨二正明演法雖知實相不可言說而以方便無盡辯才隨法隨義次第開演以於諸法言辭辯說皆得善巧大慈大悲悉已清淨能於一切離文字法中出生文字與法與義隨順無違為說諸法悉從緣起三寂用無礙於中三初寂不礙用雖有言說而無所著演一切法辯才無盡分別安立開法示導令諸法性具足明顯斷眾疑網悉得清淨雖攝眾生不捨真實次用不礙寂於不二法而無退轉常能演說無礙法門以眾妙音隨眾生心普雨法雨而不失時後寂用無二是名菩薩摩訶薩第九一切法智神通結名佛子菩薩摩訶薩以一切法滅盡三昧智通第十滅定智通於漏盡以慧定分九十二通此中三初標名云一切法滅盡者謂五聚之法皆當體寂滅故斯即理滅不同餘宗滅定但明事滅唯滅六七心心所法不滅第八等但事滅故不能即定而用證理滅故定散無礙由即事而理故不礙滅即理而事故不礙用是以文云雖念念入而不廢菩薩道等亦非心定而身起用亦不獨明定散雙絕但是理事無礙故上七地云雖行實際而不作證能念念入亦念念起及淨名云不起滅定現諸威儀皆斯義也事理非一故一切法滅盡之神通非異故滅盡即通通二釋也於念念中入一切法滅盡三昧釋相中二先明即定體用自在後此菩薩住三昧下明入定時分自在前中亦二先標入定亦不退菩薩道不捨菩薩事不捨大慈大悲心修習波羅蜜未甞休息觀察一切佛國土無有厭倦不捨度眾生願不斷轉法輪事不廢教化眾生業不捨供養諸佛行不捨一切法自在門不捨常見一切佛不捨常聞一切法知一切法平等無礙自在成就一切佛法所有勝願皆得圓滿了知一切國土差別入佛種性到於彼岸能於彼彼諸世界中學一切法了法無相知一切法皆從緣起無有體性然隨世俗方便演說雖於諸法心無所住然順眾生諸根欲樂方便為說種種諸法二明不礙用於中初二句總未作不退現作不捨正簡事滅以顯真滅餘句別顯可知此菩薩住三昧時隨其心樂或住一劫或住百劫或住千劫或住億劫或住百億劫或住千億劫或住百千億劫或住那由他億劫或住百那由他億劫或住千那由他億劫或住百千那由他億劫或住無數劫或住無量劫乃至或住不可說不可說劫二明入定時分自在中三初長短隨心菩薩入此一切法滅盡三昧雖復經於爾所劫住而身不離散不羸瘦不變異非見非不見不滅不壞不疲不懈不可盡竭二威儀不忒雖於有於無悉無所作而能成辦諸菩薩事所謂恒不捨離一切眾生教化調伏未曾失時令其增長一切佛法於菩薩行悉得圓滿為欲利益一切眾生神通變化無有休息譬如光影普現一切而於三昧寂然不動二不礙起用定散雙行於中先法後喻光影普現寂然無心隨器虧盈體無來去是為菩薩摩訶薩入一切法滅盡三昧智神通三結名佛子菩薩摩訶薩住於如是十種神通一切天人不能思議一切眾生不能思議一切聲聞一切獨覺及餘一切諸菩薩眾如是皆悉不能思議此菩薩身業不可思議語業不可思議意業不可思議三昧自在不可思議智慧境界不可思議大文第三總歎勝能中二一形劣顯勝劣不測故唯除諸佛及有得此神通菩薩餘無能說此人功德稱揚讚歎二以勝顯勝謂佛等方測故佛子是為菩薩摩訶薩十種神通若菩薩摩訶薩住此神通悉得一切三世無礙智神通大文第四結數辨果上十通品竟十忍品第二十九初來意者為答前普光十頂問故前二已明定通用廣今此辨其智慧深奧故次來也二釋名者忍謂忍解印可即智照觀達寄圓顯十三宗趣者智行深奧為宗為得佛果無礙無盡為趣然此忍行約位即等覺後心為斷微細無明若約圓融實通五位寄終極說體即是智不同餘宗忍因智果雖是一智隨義別說二三四五等諸教不同今此圓教故說十種爾時普賢菩薩告諸菩薩言佛子菩薩摩訶薩有十種忍四正釋文文有長行偈頌前中四一舉數歎勝二列名顯要三依名廣釋四總結其名今初若得此忍則得到於一切菩薩無礙忍地一切佛法無礙無盡後歎勝到無礙地即自分因圓佛法無礙即勝進果滿何者為十所謂音聲忍順忍無生法忍如幻忍如𦦨忍如夢忍如響忍如影忍如化忍如空忍二列名顯要中初徵數次列名後顯要名中前三約法後七就喻三中初一約教謂忍於教聲從境為名音聲之忍次一約行順諸法故順即是忍三無生忍者若約忍無生理即無生之忍若約無生之忍及煩惱不生則無生即忍通二釋也又此三忍約通相說前二皆是無生忍之加行順向無生後一方契若約當位三忍迢然不應此位方有順無生忍故順但順理不是順忍若爾何異無生順忍通順事理故不同無生經云法有亦順知等又依五忍位當寂滅今約三忍明義故當無生後七約喻中並是依主謂如幻之忍等故然此七喻有七家所釋不一謂光統賢首攝論遠公金剛大品楞伽皆明此喻初光統云前四喻音聲電即今之影與化喻順忍空喻無生又云幻者起無起相焰者境無境相夢者知無知相響者聞無聞相電者住無住相今既云影應云現無現相化者有無有相空者為無為相此則能喻局於一相所喻義通多法在文雖無於理無失次賢首云觀識如幻想如𦦨受如夢聲如響行如電色如化總觀一切蘊界處等畢竟空故如虗空也三若依攝論第五八喻皆喻依他起性然並為遣疑所疑不同故所喻亦異疑有八轉并後四家互相發明文繁不錄今經多同前通而偈所喻亦有局者顯義無方故已釋列名此十種忍三世諸佛已說今說當說次顯要要故同說佛子云何為菩薩摩訶薩音聲忍謂聞諸佛所說之法不驚不怖不畏深信悟解愛樂趣向專心憶念修習安住是名菩薩摩訶薩第一音聲忍大文第三依名廣釋即為十段前七皆三謂徵起釋義結名初忍釋中十一句初句總舉所聞謂三無性等法餘顯能聞入法謂聞無相不驚以解徧計無所有故聞無生不怖以解依他必無生故聞無性不畏以解真如無性性故又釋於真空法聞時不驚越思時不續怖修時不定畏又聞有無所有不驚聞空無所有故不畏並如諸般若論說深信者聞慧之始悟解者聞慧之終初信久解故專心憶念者修慧之初起加行故修習為終正明造修至定根本故安住者依定發慧證理相應故佛子云何為菩薩摩訶薩順忍謂於諸法思惟觀察平等無違隨順了知令心清淨正住修習趣入成就是名菩薩摩訶薩第二順忍第二忍釋中有四重止觀一創修止觀謂止思一境觀觀事理二漸次止觀謂止安事境順其理故名平等無違觀達事理名隨順了知偈云法亦有順知法無亦順知故三純熟止觀謂止惑不生名令心清淨觀徹前境為正住修習四契合止觀寂冥理境名為趣入智顯於心故云成就上四皆止觀俱行如是方為真實順忍佛子云何為菩薩摩訶薩無生法忍第三無生忍分三初徵起佛子此菩薩摩訶薩不見有少法生亦不見有少法滅釋中有二先總明後何以下徵釋今初何以故後徵釋中徵意有二一云何以得知無生滅耶二云既稱無生法忍何以不見法滅若無生則無滅若無滅則無盡若無盡則離垢若離垢則無差別若無差別則無處所若無處所則寂靜若寂靜則離欲若離欲則無作若無作則無願若無願則無住若無住則無去無來釋中釋初徵意云真法本自不生從緣之法無性故不生以無生故何有於滅此則以緣集釋無生以無生釋無滅此中略無緣集偈文具有云何無生釋無滅耶此有二意一云若先是生後必可滅本既不生今則無滅二云既即緣無性稱曰不生則不待滅竟方無故次云無滅此二為總餘可倣之釋第二徵意云夫無生忍非獨無生必諸法都寂今從初意立無生稱故無滅等成無生義若從別義亦可得稱無滅忍等是以信力入印度經明此忍能淨初歡喜地云一謂得無生忍亦令他住又云無滅忍者證無生故斯文可據又此諸句各有二義一以前前釋後後以後後成前前前前有故後後有前前無故後後無二者諸句皆在無生句中正無生時諸義頓足以是即事之理非斷滅故即理之智無能所故然文旨包含略為三釋一唯約理二具理智三唯約智今初云何前前有故後後有謂生法既滅滅則終盡盡則是垢染法染則前後別異別則方處不同有處則能所非寂不寂則有所欲有欲則有營作作則有所願求願則心住願事往則有去有來今由前前無故後後斯寂故以後後顯成無生此順長行二雙約理智者初二是總含於理智次四顯理無生後六顯智無生故偈云其心無染著等理智契合名無生忍若唯約智者由了從緣無生則智無有起故名無生無生之智湛然不遷故名無滅無滅故用無斷盡次垢念皆離常無差異旁無方所照而常寂遇境無染雖為而無作雖悲而無願處世而無住等法界而無去來皆以前釋後以後成前言亡慮絕寂照湛然名無生忍若唯約知無生理名無生忍未足深玄是名菩薩摩訶薩第三無生法忍三結名佛子云何為菩薩摩訶薩如幻忍第四如幻忍分三徵起釋義結名今初佛子此菩薩摩訶薩知一切法皆悉如幻從因緣起於一法中解多法於多法中解一法釋中先略後廣略中二先了幻緣相後此菩薩下成就忍行今初有三初指法同喻次從因緣起者彰幻所由由緣生不實故後於一法下顯其幻相初一切法即是所喻所喻通局已見上文此意明通通為無為故大品云設有一法過於涅槃我亦說言如夢如幻涅槃雖真從緣顯故遣著心故廣中合云了世如幻則似有為然有法世亦通無為此為有為所隱覆故所以名世故後云菩提涅槃亦皆不見者了平等故就法喻中各開五法如結一中幻作一馬一有所依之巾二幻師術法三所現幻馬四馬生即是馬死五愚小為有初巾喻法性二術喻能起因緣謂惑業等三喻依他起法即眾生等四喻依他無性即是圓成故廣說皆云非也五喻所為人法今菩薩反此故云解了今經云從因緣起能起即第二所起即第三以第二為因令悟第三成第四遣第五病歸第一理然緣亦從緣故緣果俱幻中論云譬如幻化人復作幻化人即斯意也然上五義各具有五一巾性有相無為馬所隱故二術用有體無以作巾無體故三馬相有實無以實無而現故四生即是無死即是有以無礙故五情有理無但妄見故後顯幻相略為二解一約相類解一無實則知一切皆然並從緣故故云一中解多等二約圓融復有三義一以理從事故說相即如馬頭之巾不異足巾說頭即足故一即多等無行經云貪欲即是道者貪欲性故諸法即貪欲者即貪實故二以理融事一多相即如馬頭無別有即以巾為頭以巾體圓融故令頭即足欲云一中解多等三約緣起相由力則法界同一幻網令一多相即如幻師術力令多即多等賢首品云或現須臾作百年等以幻法虗無障礙故相即既爾相入亦然入則一中多有等異體既爾同體亦然一門既爾餘門思準上了幻從緣竟此菩薩知諸法如幻已了達國土了達眾生了達法界了達世間平等了達佛出現平等了達三世平等成就種種神通變化二成忍行中由知法幻成二種行一忍智現前云了平等二幻用無礙云成通化云何平等一理事平等如巾馬無二故色即空等二理理平等如頭足俱巾巾無別故如聖賢同如三事事平等如前一多中說譬如幻非象非馬非車非步非男非女非童男非童女非樹非葉非華非果非地非水非火非風非晝非夜非日非月非半月非一月非一年非百年非一劫非多劫非定非亂非純非雜非一非異非廣非狹非多非少非量非無量非麤非細非是一切種種眾物第二廣中三一喻二合三忍行成初中二先明性無即體空義故結云非是一切種種之物所非之事亦可次第對前情非情境種種非幻幻非種種然由幻故示現種種差別之事二明其相有即相差別義故云然由幻故示現別事於中初二句結前生後種種非幻者象等非幻故下句反此法合可知然由下正顯相有雖互相非然由因起果虗而假現又喻智了平等而起化用菩薩摩訶薩亦復如是觀一切世間如幻所謂業世間煩惱世間國土世間法世間時世間趣世間成世間壞世間運動世間造作世間二法合文有總別皆言世間者有二義一可破壞故即喻有為二隱覆名世亦通無為則法通五類趣為五趣成壞約器一期說故運動通情非情念念移故造作唯情現營為故菩薩摩訶薩觀一切世間如幻時不見眾生生不見眾生滅不見國土生不見國土滅不見諸法生不見諸法滅不見過去可分別不見未來有起作不見現在一念住不觀察菩提不分別菩提不見佛出現不見佛涅槃不見住大願不見入正位不出平等性第三成忍行中二先成真智行由了體空故故結云不出平等性又前法中明即寂之照云了平等此明即智之止故云不見是知無幻之幻方是幻法絕見之見方為見幻是菩薩雖成就佛國土知國土無差別雖成就眾生界知眾生無差別雖普觀法界而安住法性寂然不動雖達三世平等而不違分別三世法雖成就蘊處而永斷所依雖度脫眾生而了知法界平等無種種差別雖知一切法遠離文字不可言說而常說法辯才無盡雖不取著化眾生事而不捨大悲為度一切轉於法輪雖為開示過去因緣而知因緣性無有動轉二明動寂無二亦權實不二故云智不得有無而興大悲心由了體空不壞幻相差別故如象生即是象死此二相對應成四句謂此二無二故非異無不二故非一非一即非異故非非一非異即非一故非非異亦絕雙照故非亦一亦異若以巾上二義對象上二義辯非一異略有十句一以巾上成象義對象上差別義合為一際名不異此是以本隨末就末明不異經云法身流轉五道名為眾生如來藏與因俱若生若滅等二以巾上住自位義象上體空義合為一際名不異此是以末歸本就本明不異經云一切眾生即如不復更滅等三以攝末所歸之本與攝本所從之末此二雙融無礙不異此是本末平等為不異以前二經文不相離故四以所攝歸本之末亦與所攝隨末之本此二相奪故名不異此是本末雙泯不異以真妄平等異不可得故次下四門明非一謂五以巾住自位義與象上差別義此二本末相違相背故名非一楞伽云如來藏不在阿賴耶中是故七識有生滅如來藏者不生滅此之謂也六巾上成象義與象上體空義此二相返相害故非一楞伽云七識不流轉不受苦樂非涅槃因唯如來藏受苦樂等七以初相背與次相害此二義別故名非一謂相背則各相背捨相去懸遠相害則相與敵對親相食害是故遠近非一以前經文不相離故八以極相害俱泯而不泯與相背俱存而不存不存不泯義為非一此是成壞非一以七識即空而是有故真如即隱而是顯故九上四非一與四非異而亦非一以義不雜故十然亦不異以理徧通法無二故若以不異門取諸門極相和會若以非一門取諸門極相違害極違而極順者是無障礙法也巾象相對既爾術等相對交絡諸句準之上下諸文非一異義皆準此釋是名菩薩摩訶薩第四如幻忍三結名佛子云何為菩薩摩訶薩如𦦨忍第五如𦦨忍分三初徵起釋結今初佛子此菩薩摩訶薩知一切世間同於陽𦦨釋中有三一指法同喻二譬如下別顯喻相三總以法合譬如陽𦦨無有方所非內非外非有非無非斷非常非一色非種種色亦非無色二中若別開義門亦具五義一空地二陽氣三氣與空地合而有𦦨四𦦨似水即無水五令渴鹿謂有初喻如來藏二喻無明習氣三喻習氣勳動心海起緣生似法四喻依他無生五喻凡小執實但隨世間言說顯示次喻其相有菩薩如是如實觀察了知諸法現證一切令得圓滿三法合中初明了法現證下明成忍行是名菩薩摩訶薩第五如𦦨忍三結名佛子云何為菩薩摩訶薩如夢忍第六如夢忍亦徵釋結如前佛子此菩薩摩訶薩知一切世間如夢譬如夢非世間非離世間非欲界非色界非無色界非生非沒非染非淨而有示現二舉喻相然開此夢義亦有五法一所依謂悟心以喻本識二所因謂睡蓋以喻無明習氣三所現謂夢相差別以喻緣所起法四夢事非有非無但心變故非見前法五令夢者取以為實文中初明俱非喻法非有後云而示現有喻法而有辯為俱句互奪為雙非然此四句皆由以是夢故謂一以是夢故有夢事現於夢者為有二既言是夢其性必虗於無實處而見實故然語有則全攝無而為有言無則全攝有而為無以非二相故非但相有性無而已思之三以是夢故必具二義全有之無與全無之有二門峙立不相是故非是半有半無四即言是夢必是雙非形奪俱融二相盡故然此俱非不違雙是若不奪無令盡無以為無若不奪有令盡無以為有是故存亡不礙俱泯自在方為夢自在法門是故經云世間恒如夢智不得有無此之謂也菩薩摩訶薩亦復如是知一切世間悉同於夢無有變異故如夢自性故如夢執著故如夢性離故如夢本性故如夢所現故如夢無差別故如夢想分別故如夢覺時故三合喻中十句初句為總次無有下別別中初句近上總句略無如夢二字於九句中前八辨夢後一明覺就前八中攝為四對初二明常無常門體虗無變即是常義自性無恒是無常義次二辨真妄門妄由著生真由性離次二性相門性本一如相現多種後二明一異門但是一心一而無別隨相分別異異不同又唯是一夢相現多種上之四門各雙存互奪以為四句思之可見後一句明覺即止觀門謂要在覺時方知是夢正夢之時不知是夢純昏心故設知是夢亦未覺故覺時了夢知實無夢然由夢方有覺故辨夢覺時若離於夢夢覺斯絕觀了上之多門止不取於夢妄如此方為了夢法門是名菩薩摩訶薩第六如夢忍三結名佛子云何為菩薩摩訶薩如響忍第七如響忍分三初徵二釋三結今初佛子此菩薩摩訶薩聞佛說法觀諸法性修學成就到於彼岸二釋中分三一忍行所因二知一切下成忍之相三此菩薩下忍成之益今初由聞起觀能成忍故知一切音聲悉同於響無來無去如是示現二中先法後喻法中有二一指法同喻略顯其相通知一切音聲如響無去無來明其體空如是示現彰其相有佛子此菩薩摩訶薩觀如來聲不從內出不從外出亦不從於內外而出雖了此聲非內非外非內外出而能示現善巧名句成就演說二了知佛聲如響非獨但喻世間聲故於中先明即有之無離機無聲故非內離佛無聲故非外二法相依故非內外若言內外合者便有二聲內外相依即顯無性後雖了此聲下明即無之有故牒非三而能巧現譬如谷響從緣所起第二喻顯於中四一喻二合三轉喻四重合今初直舉從緣所起明響無性無性之相已見法中然有五法一空谷二有聲此二是緣三聲擊空谷便有響應此明所起四者有而非真此彰無性五愚小謂有然此一喻通喻三法一喻上一切聲則谷喻喉聲喻風氣二喻上如來聲則谷喻如來聲喻緣感三喻一切法則谷喻如來藏聲喻無明習氣而無法性無有相違令諸眾生隨類各解而得修學第二法合但各佛聲以從近故然而至令諸眾生隨類各解言含法喻謂約法則如來之聲不違法性而能隨類合上能巧示現約喻則不違本聲事法之性隨其呼人類別各解如帝釋夫人阿修羅女名曰舍支於一音中出千種音亦不心念令如是出三轉以喻顯此有二意一則喻上佛聲一音隨類二則喻下菩薩無心普演菩薩摩訶薩亦復如是入無分別界成就善巧隨類之音於無邊世界中恒轉法輪四重合此菩薩善能觀察一切眾生以廣長舌相而為演說其聲無礙徧十方土令隨所宜聞法各異三忍成之益於中二一隨機徧說雖知聲無起而普現音聲雖知無所說而廣說諸法妙音平等隨類各解悉以智慧而能了達次明權實雙行以同於響性相無礙故是則由聞如響之教了如響之聲發如響之音演如響之法也是名菩薩摩訶薩第七如響忍三結名佛子云何為菩薩摩訶薩如影忍第八如影忍文分四別一標二釋三結四果佛子此菩薩摩訶薩非於世間生非於世間沒非在世間內非在世間外非行於世間非不行於世間非同於世間非異於世間非往於世間非不往世間非住於世間非不住世間非是世間非出世間釋中有三謂法喻合今初法中有十一對分三初七對雙遮顯性以成止行如影無實故非修菩薩行非捨於大願非實非不實二二對雙照性相以成觀行如影雖虗而現故性則非修相乃不捨真即俗故非實俗即真故非不實雖常行一切佛法而能辦一切世間事不隨世間流亦不住法流三二對遮照無礙成雙運自在行初對雙照真俗即權實雙行後對雙遮真俗即權實雙寂遮照一時為雙運互奪無礙為自在以此結上二段同斯無礙為忍相之深玄譬如日月男子女人舍宅山林河泉等物二喻中文具五法一日等為所依本質二於油下明能現之處上二是緣三而現其影明緣之所起四影與油下明有之非有五然諸下愚小謂有今初若約影喻別喻菩薩現身則日等喻悲智願等若約影喻通喻一切法則日喻因其河泉二種雖通能現且為所現長河飛泉入鏡中故於油於水於身於寶於明鏡等清淨法中二能現中亦有通別別喻機感及應現處通喻於緣謂無明等而現其影三明所起中亦有通別二果可知影與油等非一非異非離非合於川流中亦不漂度於池井內亦不沈沒雖現其中無所染著四明有非有中攝多義門於中一異合離通顯影義然一異約此影彼影合離約影對水等次於川流下別顯影義不通二影如月暎淮流流水不將月去光臨潭上萬仞不見光沈喻菩薩同世遷流不漂生死證真寂滅不沈涅槃後雖現下雙結有無喻性相交徹兼於鏡像然諸眾生知於此處有是影現亦知彼處無如是影遠物近物雖皆影現影不隨物而有近遠五取為有中由以有無為有無不知即影了不可取故成執著於中先取有無為著後遠物下舉影正義顯上為執不知此影無遠近故菩薩摩訶薩亦復如是能知自身及以他身一切皆是智之境界不作二解謂自他別而於自國土於他國土各各差別一時普現第三合中二先正合前文於中初舉智境合前本質次而於下合前油等後各各下合前現影如種子中無有根芽莖節枝葉而能生起如是等事菩薩摩訶薩亦復如是於無二法中分別二相善巧方便通達無礙二轉以喻合非有之有於中先喻後合有無無礙名方便等是名菩薩摩訶薩第八如影忍三結名菩薩摩訶薩成就此忍雖不往詣十方國土而能普現一切佛剎亦不離此亦不到彼如影普現所行無礙令諸眾生見差別身同於世間堅實之相第四果中三初得稱性之身如影不往而至不分而徧故然此差別即非差別別與不別無所障礙次結成無礙以無差是差之無差故雖不往而遍令物見殊差是無差之差故雖遍而不在彼此此菩薩從於如來種性而生身語及意清淨無礙故能獲得無邊色相清淨之身後顯此身因其無邊身近局果中亦通前法佛子云何為菩薩摩訶薩如化忍第九如化忍文分四別一標二釋三結四果標云化者無而忽有故佛子此菩薩摩訶薩知一切世間皆悉如化釋中有三謂法喻合法中二先總標標法同喻具能所知既知一切世間不局所化情類略標世間必具出世所謂一切眾生意業化覺想所起故一切世間諸行化分別所起故一切苦樂顛倒化妄取所起故一切世間不實法化言說所現故一切煩惱分別化想念所起故後別顯先顯所知後顯能知前中十句前五染化後五淨化今初不出業惑苦三前四是苦即五蘊相一識由想起二行因識生分別是識故三受因想起想取愛憎相故四色亦行生無記報色如沫不實名言熏習即是行故五即是惑惑由想行念即行故業通二處初句意業此句分別皆是業故此中意等從緣無性如化不實本無今有如化相現故仁王云法本自無因緣生諸淨化二義倣此可知復有清淨調伏化無分別所現故於三世不轉化無生平等故菩薩願力化廣大修行故如來大悲化方便示現故轉法輪方便化智慧無畏辯才所說故後明五淨中一方便調生依真智故二湛然真智由理成故故上文云智入三世了法平等三願由行滿四慈悲復依方便立故五具無畏辯能轉法故菩薩如是了知世間出世間化現證知廣大知無邊知如事知自在知真實知非虗妄見所能傾動隨世所行亦不失壞二別顯能知於中初二句結前生後世間結前染出世結前淨亦結餘所不盡謂乃至一法過於涅槃亦如化故或說涅槃不如化者大品云為新發意菩薩恐其驚怖分別生滅方如化故了知之言即是生後次現證下正顯能知上言了知知有六義一若事若理非比度故二旁無遺故三契中道故四稱俗境故五真俗無礙故六歸一實諦故後非虗妄下結上六知處真道而不傾行非道而不壞譬如化不從心起不從心法起不從業起不受果報非世間生非世間滅不可隨逐不可攬觸非久住非須臾住非行世間非離世間不專繫一方不普屬諸方非有量非無量不厭不息非不厭不息非凡非聖非染非淨非生非死非智非愚非見非不見非依世間非入法界非黠慧非遲鈍非取非不取非生死非涅槃非有非無有第二喻中應開四義一能化者以喻因緣二化現事喻所起果三現用而無實四愚小為真故十喻傳云猶如化事雖空無實能令眾生憂苦嗔恚喜樂痴惑諸法亦爾云何無實如彼化人無生老死苦樂異餘人故文中有四十句初句標次三十七句一向雙非以顯無實後非有非無有義同二種一亦是雙非謂無有亦無故二雙融性相化不實故非有現化事故非無有菩薩如是善巧方便行於世間修菩薩道了知世法分身化往三合中二先化行後佛子下化益前中四一起化用以同化相有故然但云菩薩如是者以上諸非一一通法故指上如是為善巧方便不著世間不取自身於世於身無所分別不住世間不離世間不住於法不離於法二明化智以了化不實故以本願故不棄捨一眾生界不調伏少眾生界不分別法非不分別知諸法性無來無去雖無所有而滿足佛法三雙非顯中了法如化非有非無四結示化旨佛子菩薩摩訶薩如是安住如化忍時悉能滿足一切諸佛菩提之道利益眾生二化益是名菩薩摩訶薩第九如化忍三結文菩薩摩訶薩成就此忍凡有所作悉同於化譬如化士於一切佛剎無所依住於一切世間無所取著於一切佛法不生分別而趣佛菩提無有懈倦修菩薩行離諸顛倒雖無有身而現一切身雖無所住而住眾國土雖無有色而普現眾色雖不著實際而明照法性平等圓滿第四果中先得利他業用之果佛子此菩薩摩訶薩於一切法無所依止名解脫者一切過失悉皆捨離名調伏者不動不轉普入一切如來眾會名神通者於無生法已得善巧名無退者具一切力須彌鐵圍不能為障名無礙者後得依自利立勝名果佛子云何為菩薩摩訶薩如空忍第十如空忍中亦四謂標釋結果標云如空如空所喻通一切法佛地喻清淨法界以離差別相故及中邊等論喻圓成實但是此中一義然其喻相小異諸喻諸喻開義多分有五雖正取所成幻等以喻於法而亦取緣等以喻無性此中喻相不開別法直指於空具含多義以喻於法又此諸喻若約能喻前五多取似有以破實有化喻以不有有以破似有此喻以性相俱絕破於一切又前六遣又會空多依空立有少此一遣有入空少依空立有多又上所喻則通一切此中能喻則具多義所喻各隨別義喻一類法然龍樹十喻以四復次釋如空義一近無遠有謂如虗空非可見法以遠視故眼光迴轉則見縹色一切諸法亦復如是空無所有以凡夫人遠無漏慧棄捨實相則見男女等物而實此物竟無所有二約性淨不染三約無初中後四約體實無物上八地中空有十義皆是略明然別義有此不同同義諸喻無別餘無礙義如前後說佛子此菩薩摩訶薩了一切法界猶如虗空以無相故一切世界猶如虗空以無起故一切法猶如虗空以無二故一切眾生行猶如虗空無所行故一切佛猶如虗空無分別故一切佛力猶如虗空無差別故一切禪定猶如虗空三際平等故所說一切法猶如虗空不可言說故一切佛身猶如虗空無著無礙故第二釋中二先忍解之相後忍行成益今初先別明以空九義喻九種法隨義雖別亦以緣成無性故空九句各標法同喻後出所以一標事法界如空下出所以者以無相故謂從緣無性其相自虗即事是理法界故此句是總二世界共業所起故三軌儀教法一味法界所流故餘六句並準初句菩薩如是以如虗空方便了一切法皆無所有後總結佛子菩薩摩訶薩以如虗空忍智了一切法時得如虗空身身業得如虗空語語業得如虗空意意業第二忍行成益中三初總明得如空三業業具譬如虗空一切法依不生不歿菩薩摩訶薩亦復如是一切法身不生不歿譬如虗空不可破壞菩薩摩訶薩亦復如是智慧諸力不可破壞譬如虗空一切世間之所依止而無所依菩薩摩訶薩亦復如是一切諸法之所依止而無所依譬如虗空無生無滅能持一切世間生滅菩薩摩訶薩亦復如是無向無得能示向得普使世間修行清淨譬如虗空無方無隅而能顯現無邊方隅菩薩摩訶薩亦復如是無業無報而能顯示種種業報譬如虗空非行非住而能示現種種威儀菩薩摩訶薩亦復如是非行非住而能分別一切諸行譬如虗空非色非非色而能示現種種諸色菩薩摩訶薩亦復如是非世間色非出世間色而能示現一切諸色譬如虗空非久非近而能久住現一切物菩薩摩訶薩亦復如是非久非近而能久住顯示菩薩所行諸行譬如虗空非淨非穢不離淨穢菩薩摩訶薩亦復如是非障非無障不離障無障譬如虗空一切世間皆現其前非現一切世間之前菩薩摩訶薩亦復如是一切諸法皆現其前非現一切諸法之前譬如虗空普入一切而無邊際菩薩摩訶薩亦復如是普入諸法而菩薩心無有邊際二別顯德齊虗空於中初二句一向喻實無依為依已下皆顯性相無礙從緣有故無性空故又此二相即故便成四句一緣生故空緣生故有二無性故空無性故有三緣生故有無性故空四無性故有緣生故空無法出空故皆現其前空不可見故不現法前餘文並顯何以故菩薩所作如虗空故謂所有修習所有嚴淨所有成就皆悉平等一體一味一種分量如虗空清淨徧一切處如是證知一切諸法於一切法無有分別三徵釋得益之由所以得者空觀成故於中二先智證齊空故一體者真如平等故一味者解脫不殊故一種分量者大小皆稱性故嚴淨一切諸佛國土圓滿一切無所依身了一切方無有迷惑具一切力不可摧壞滿足一切無邊功德已到一切甚深法處通達一切波羅蜜道普坐一切金剛之座普發一切隨類之音為一切世間轉於法輪未曾失時後德用滿空故是名菩薩摩訶薩第十如空忍三結名菩薩摩訶薩成就此忍得無來身以無去故得無生身以無滅故得不動身以無壞故得不實身離虗妄故得一相身以無相故得無量身佛力無量故得平等身同如相故得無差別身等觀三世故得至一切處身淨眼等照無障礙故得離欲際身知一切法無合散故得虗空無邊際身福德藏無盡如虗空故得無斷無盡法性平等辯才身知一切法相唯是一相無性為性如虗空故得無量無礙音聲身無所障礙如虗空故得具足一切善巧清淨菩薩行身於一切處皆無障礙如虗空故得一切佛法海次第相續身不可斷絕如虗空故得一切佛剎中現無量佛剎身離諸貪著如虗空無邊故得示現一切自在法無休息身如虗空大海無邊際故得一切不可壞堅固勢力身如虗空任持一切世間故得諸根明利如金剛堅固不可壞身如虗空一切劫火不能燒故得持一切世間力身智慧力如虗空故第四果中得二十種身前十與十行及離世間入分相似然通相多從德用立名佛子是名菩薩摩訶薩十種忍大文第四總結十忍爾時普賢菩薩摩訶薩欲重宣此義而說頌曰譬如世有人聞有寶藏處以其可得故心生大歡喜如是大智慧菩薩真佛子聽聞諸佛法甚深寂滅相第二祇夜一百七頌大分為二百偈頌前七偈結歎前中但頌廣釋即為十段段各十偈初有十頌頌音聲忍於中先二偈頌所聞佛說聞此深法時其心得安隱不驚亦不怖亦不生恐畏大士求菩提聞斯廣大音心淨能堪忍於此無疑惑自念以聞此甚深微妙法當成一切智人天大導師菩薩聞此音其心大歡喜發生堅固意願求諸佛法以樂菩提故其心漸調伏令信益增長於法無違謗是故聞此音其心得堪忍安住而不動修行菩薩行為求菩提故專行向彼道精進無退轉不捨眾善軛以求菩提道其心無恐畏聞法增勇猛供佛令歡喜二頌能聞八法於中一偈頌不驚怖一偈深信一偈悟解二偈愛樂一偈修習安住後二偈頌趣向專心憶念如有大福人獲得真金藏隨身所應服造作莊嚴具菩薩亦如是聞此甚深義思惟增智海以修隨順法法有亦順知法無亦順知隨彼法如是如是知諸法成就清淨心明徹大歡喜知法從緣起勇猛勤修習平等觀諸法了知其自性不違佛法藏普覺一切法志樂常堅固嚴淨佛菩提不動如須彌一心求正覺以發精進意復修三昧道無量劫勤行未曾有退失菩薩所入法是佛所行處於此能了知其心無厭怠如無等所說平等觀諸法非不平等忍能成平等智隨順佛所說成就此忍門如法而了知亦不分別法三有十偈頌順忍於中初一偈三句頌思惟次二偈一句頌隨順了知令心清淨次一偈却頌觀察平等無違餘頌正住修習三十三天中所有諸天子共同一器食所食各不同所食種種食不從十方來如其所修業自然咸在器菩薩亦如是觀察一切法悉從因緣起無生故無滅三有十偈頌無生忍初三頌標以前三忍皆是法說故偈初各加其喻無滅故無盡無盡故無染於世變異法了知無變異無異則無處無處則寂滅其心無染著願度諸羣生專念於佛法未嘗有散動而以悲願心方便行於世勤求於十力處世而不住無去亦無來方便善說法次四頌釋此忍最為上了法無有盡入於真法界實亦無所入菩薩住此忍普見諸如來同時與授記斯名受佛職了達三世法寂滅清淨相而能化眾生置於善道中後三結歎世間種種法一切皆如幻若能如是知其心無所動諸業從心生故說心如幻若離此分別普滅諸有趣譬如工幻師普現諸色像徒令眾貪樂畢竟無所得世間亦如是一切皆如幻無性亦無生示現有種種第四頌如幻忍初六頌略說於中前四頌指法同喻及顯緣相度脫諸眾生令知法如幻眾生不異幻了幻無眾生眾生及國土三世所有法如是悉無餘一切皆如幻後二頌成就忍行幻作男女形及象馬牛羊屋宅池泉類園林華果等幻物無知覺亦無有住處畢竟寂滅相但隨分別現後四頌廣於中初二頌喻菩薩能如是普見諸世間有無一切法了達悉如幻次一頌合眾生及國土種種業所造入於如幻際於彼無依著後一頌忍成行如是得善巧寂滅無戲論住於無礙地普現大威力第五頌如𦦨忍初一躡前生後以明觀意勇猛諸佛子隨順入妙法善觀一切想纏網於世間眾想如陽𦦨令眾生倒解菩薩善知想捨離一切倒眾生各別異形類非一種了達皆是想一切無真實十方諸眾生皆為想所覆若捨顛倒見則滅世間想世間如陽𦦨以想有差別知世住於想遠離三顛倒次五頌指法同喻譬如熱時𦦨世見謂為水水實無所有智者不應求次一頌喻眾生亦復然世趣皆無有如𦦨住於想無礙心境界若離於諸想亦離諸戲論愚癡著想者悉令得解脫遠離憍慢心除滅世間想住盡無盡處是菩薩方便後三頌合菩薩了世法一切皆如夢非處非無處體性恒寂滅諸法無分別如夢不異心三世諸世間一切悉如是夢體無生滅亦無有方所三界悉如是見者心解脫夢不在世間不在非世間此二不分別得入於忍地譬如夢中見種種諸異相世間亦如是與夢無差別住於夢定者了世皆如夢非同非是異非一非種種眾生諸剎業離染及清淨如是悉了知與夢皆平等菩薩所行行及以諸大願明了皆如夢與世亦無別了世皆空寂不壞於世法譬如夢所見長短等諸色是名如夢忍因此了世法疾成無礙智廣度諸羣生第六頌如夢忍中正頌前合兼頌標喻十頌頌前九句一頌無變二一頌頌自性上二兼頌標法三頌執著翻則解脫兼頌前喻四頌性離五超頌所現六却頌本性七八二頌頌無差別九頌想分別十頌覺時思之可了修行如是行出生廣大解巧知諸法性於法心無著第七頌如響忍初一偈頌忍行所因文云修行如是行似結前喻既言知諸法性義同忍行一切諸世間種種諸音聲非內亦非外了之悉如響如聞種種響心不生分別菩薩聞音聲其心亦如是次二偈頌聞一切聲如響瞻仰諸如來及聽說法音演契經無量雖聞無所著如響無來處所聞聲亦然而能分別法與法無乖謬次二頌如來聲如響善了諸音聲於聲不分別知聲悉空寂普出清淨音了法不在言善入無言際而能示言說如響徧世間了知言語道具足音聲分知聲性空寂以世言音說如世所有音示同分別法其音悉周徧開悟諸羣生菩薩獲此忍淨音化世間善巧說三世於世無所著餘頌忍成之益其喻徧諸偈中為欲利世間專意求菩提而常入法性於彼無分別普觀諸世間寂滅無體性而恒為饒益修行意不動第八頌如影忍頌法說十對喻合含在其中初二偈頌非世生歿謂了寂故不生饒益故不沒不住於世間不離於世間於世無所依依處不可得次偈頌非在內外不住故不內不離故不外了知世間性於性無染著雖不依世間化世令超度次偈頌非行不行了無染故非行化世故非不行世間所有法悉知其自性了法無有二無二亦無著次偈頌非同非異知自性故非同了無二故非異心不離世間亦不住世間非於世間外修行一切智次偈頌非往不往第二句不往餘三句非不往譬如水中影非內亦非外菩薩求菩提了世非世間不於世住出以世不可說次六句頌非住非不住於中初二句兼別頌喻故云非內外亦不在內外如影現世間次不在內外一句頌非是世間非出世間入此甚深義離垢悉明徹不捨本誓心普照智慧燈次一偈頌非修菩薩行非捨於大願世間無邊際智入悉齊等普化諸羣生令其捨眾著次一偈頌雖常行一切佛法而能辦一切世間事觀察甚深法利益羣生眾從此入於智修行一切道菩薩觀諸法諦了悉如化而行如化行畢竟永不捨隨順化自性修習菩提道一切法如化菩薩行亦然第九頌如化忍初三偈頌總知一切世間如化一切諸世間及以無量業平等悉如化畢竟住寂滅次一頌染法化三世所有佛一切亦如化本願修諸行變化成如來佛以大慈悲度脫化眾生度脫亦如化化力為說法次二頌淨法化言度脫亦如化者為釋疑故謂觀察眾生如化何用化之故此答云化若有實可招來難度既如化化之何妨知世皆如化不分別世間化事種種殊皆由業差別修習菩提行莊嚴於化藏無量善莊嚴如業作世間化法離分別亦不分別法此二俱寂滅菩薩行如是化海了於智化性印世間化非生滅法智慧亦如是餘頌法合第十忍明觀眾生及諸法體性皆寂滅如空無處所第十頌如空忍初一偈頌忍解之相餘頌忍行成益獲此如空智永離諸取著如空無種種於世無所礙成就空忍力如空無有盡境界如虗空不作空分別虗空無體性亦復非斷滅亦無種種別智力亦如是虗空無初際亦復無中後其量不可得菩薩智亦然如是觀法性一切如虗空無生亦無滅菩薩之所得於中初五偈頌別顯德齊虗空自住如空法復為眾生說降伏一切魔皆斯忍方便世間相差別皆空無有相入於無相處諸相悉平等唯以一方便普入眾世間謂知三世法悉等虗空性次三偈頌徵釋得忍之由智慧與音聲及以菩薩身其性如處空一切皆寂滅後一偈却頌上總明得如空三業如是十種忍佛子所修行其心善安住廣為眾生說於此善修學成就廣大力法力及智力為菩提方便通達此忍門成就無礙智超過一切眾轉於無上輪末後七偈結歎曰二前三二利行圓言超過一切正顯十頂之義所修廣大行其量不可得調御師智海乃能分別知捨我而修行入於深法性心常住淨法以是施羣生眾生及剎塵尚可知其數菩薩諸功德無能度其限菩薩能成就如是十種忍智慧及所行眾生莫能測
