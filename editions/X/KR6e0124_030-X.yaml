body:
  text: 于闐國三藏沙門實义難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈十迴向品第二十五之六佛子何者是菩薩摩訶薩真如相迴向第八真如相迴向長行中先明位行後明位果前中標名釋名者善根合以成迴向從所依立名義通能所故本業云常照有無二諦一切法一合相故若梵本中具名真如相自性迴向相即德相性即體性以二非即離所以雙舉多說德相即以法界印而為其性此與前後異者謂第七會事向理故云平等此明事盡理現故行等同如第九明從體起用第十明用同體同體而用佛子此菩薩摩訶薩正念明了其心堅住遠離迷惑專意修行深心不動成不壞業趣一切智終不退轉志求大乘勇猛無畏植諸德本普安世間生勝善根修白淨法大悲增長心寶成就常念諸佛護持正法於菩薩道信樂堅固成就無量淨妙善根勤修一切功德智慧為調御師生眾善法以智方便而為迴向菩薩爾時慧眼普觀所有善根無量無邊其諸善根修習之時若求緣若辦具若治淨若趣入若專勵若起行若明達若精審若開示如是一切有種種門種種境種種相種種事種種分種種行種種名字種種分別種種出生種種修習其中所有一切善根悉是趣向十力乘心之所建立皆悉迴向一切種智唯一無二以諸善根如是迴向所謂願得圓滿無礙身業修菩薩行願得清淨無礙口業修菩薩行願得成就無礙意業安住大成願得圓滿無障礙心淨修一切諸菩薩行願起無量廣大施心周給無邊一切眾生願於諸法心得自在演大法明無能障蔽願得明達一切智處發菩提心普照世間願常正念三世諸佛諦想如來常現在前願住圓滿增上志樂遠離一切諸魔怨敵願得安住佛十力智普攝眾生無有休息願得三昧遊諸世界而於世間無所染著願住諸世界無有疲厭教化眾生恒不休息願起無量思慧方便成就菩薩不思議道願得諸方不迷惑智悉能分別一切世間願得自在神道智力於一念中悉能嚴淨一切國土願得普入諸法自性見一切世間悉皆清淨願得生起無差別智於一剎中入一切剎願以一切剎莊嚴之事顯示一切教化無量無邊眾生願於一佛剎中示無邊法界一切佛剎悉亦如是願得自在大神通智普能往詣一切佛土佛子菩薩摩訶薩以諸善根願得莊嚴一切佛國願得周徧一切世界願得成就智慧觀察如為己身如是迴向如是而為一切眾生所謂願一切眾生永離一切地獄畜生閻羅王趣願一切眾生除滅一切障礙之業願一切眾生得周普心平等智慧願一切眾生於怨於親等心攝受皆令安樂智慧清淨願一切眾生智慧圓滿淨光普照願一切眾生思慧成滿了真實義願一切眾生以淨志樂趣求菩提獲無量智願一切眾生普能顯示安隱住處佛子菩薩摩訶薩恒以善心如是迴向為令一切眾生遇清涼雲霪法雨故為令一切眾生常值福田勝境界故為令一切眾生皆能善入菩提心藏自護持故為令一切眾生離諸蓋纏善安住故為令一切眾生皆獲無礙神通智故為令一切眾生得自在身普示現故為令一切眾生成就最勝一切種智普興利益無空過故為令一切眾生普攝羣品令清淨故為令一切眾生皆能究竟一切智故為令一切眾生心不動搖無障礙故佛子菩薩摩訶薩見可愛樂國土園林草木華果名香上服珍寶財物諸莊嚴具或見可樂村邑聚落或見帝王威德自在或見住處離諸諠雜見是事已以方便智精勤修習出生無量勝妙功德為諸眾生勤求善法心無放逸廣集眾善猶如大海以無盡善普覆一切為眾善法所依之處以諸善根方便迴向而無分別開示無量種種善根智常觀察一切眾生心恒憶念善根境界以等真如平等善根迴向眾生無有休息菩薩爾時以諸善根如是迴向所謂願一切眾生得諸如來可愛樂見見法真性平等平等無所取著圓滿清淨願一切眾生見諸如來甚可愛樂圓滿供養願一切眾生往生一切無諸煩惱甚可愛樂清淨佛剎願一切眾生得見諸佛可愛樂法願一切眾生常樂護持一切菩薩可愛樂行願一切眾生得善知識可愛樂眼見無所礙願一切眾生常見一切可愛樂物無有違逆願一切眾生證得一切可愛樂法而勤護持願一切眾生於一切佛可樂法中得淨光明願一切眾生修諸菩薩一切能捨可愛樂心願一切眾生得無所畏能說一切可愛樂法願一切眾生得諸菩薩極可愛樂甚深三昧願一切眾生得諸菩薩甚可愛樂陀羅尼門願一切眾生得諸菩薩甚可愛樂善觀察智願一切眾生能現菩薩甚可愛樂自在神通願一切眾生能於諸佛大眾會中說可愛樂甚深妙法願一切眾生能以方便開示演說甚可愛樂差別之句願一切眾生常能發起甚可愛樂平等大悲願一切眾生念念發起甚可愛樂大菩提心常令諸根歡喜悅豫願一切眾生能入一切甚可愛樂諸如來家願一切眾生得可愛樂能調伏行調伏眾生無有休息願一切眾生得諸菩薩甚可愛樂無盡辯才演說諸法願一切眾生於不可說不可說劫住於一切可樂世界教化眾生心無厭倦願一切眾生以無量方便普能悟入甚可愛樂諸佛法門願一切眾生得可愛樂無礙方便知一切法無有根本願一切眾生得可愛樂離貪欲際知一切法畢竟無二斷一切障願一切眾生得可愛樂離貪欲際知一切法平等真實願一切眾生具足成滿一切菩薩甚可愛樂無戲論法願一切眾生得金剛藏精進之心成可愛樂一切智道願一切眾生具可愛樂無礙善根摧伏一切煩惱怨敵願一切眾生得可愛樂一切智門普於世間現成正覺佛子菩薩摩訶薩修習如是諸善根時得智慧明為善知識之所攝受如來慧日明照其心永滅癡冥勤修正法入諸智業善學智地流布善根充滿法界以智迴向盡諸菩薩善根源底以智深入大方便海成就無量廣大善根大文第二廣釋中長分三段初明隨相迴向二佛子菩薩摩訶薩以此善根下離相迴向三佛子此菩薩摩訶薩如是迴向時得一切下迴向成益初中分二先積善迴向後佛子菩薩摩訶薩若見下觸境迴向前中亦二先明所迴行體後菩薩爾時慧眼下攝將迴向今初云佛子此菩薩正念明了明積集資糧文有十句初一為總謂正念堅明下九為別初三句正念菩提一遠迷惑是明了義專意修行即為正念正念是定明了是慧定慧雙運為道之源二契理不動故云深心緣不能沮成不壞業即自分堅住求佛不退即勝進堅住次四句正念化生初句為總勇求兼濟為大法故下三句別一悲智雙運為明了般若為眾德之本故二進善去漏為正念三悲增智圓為堅住後二正念三寶一念佛二護法三信僧上有正念下句堅固影略該攝以此積集資糧所迴行體次成就無量下結德成就文有四句前三結前非止十故云無量二三統而收之不出福智大悲末句生後迴向下文攝將迴向云菩薩爾時慧眼普觀下先總標觀察善根次其諸善根下別顯次如是一切下總結種類多門故云種種文有十句謂隨前求緣有多差別故次其中所有下結修本意謂本意既然寧不迴向上總明所迴行體下文正明迴向初迴向菩提二迴向眾生經云以諸善根如是迴向初迴向菩提也文有二十願分三初十願願成智行即菩提因果次願得三昧下四願周遍利生即化用因果三願得自在神通下六願普嚴佛剎即淨土因果上總迴向菩提下云佛子菩薩摩訶薩以諸善根下迴向眾生初牒前生後次所為願一切眾生下正顯迴向文有八句初二句願離三障障礙之言義兼煩惱次四成四智後二結二果不唯四智故云無量次云佛子菩薩摩訶薩恒以此心下八行經總結所為上通明積善迴向竟下文佛子菩薩摩訶薩見可愛樂國土下第二明觸境迴向大同淨行對境發願於中五一見可愛等列所見境二見是事已下覩境成德謂增悲智三以諸善根下總明迴向亦是迴向之德四菩薩爾時下別明迴向五佛子下迴向成益前三可知今四別明迴向中初一句總標謂上起行中云以諸善根方便迴向未知迴向其相云何故云爾時如是迴向後所謂下別顯顯如是言有三十一願皆言令得言可愛樂者由見可愛境起可愛樂善願成可愛樂德疏釋有多義次云佛子菩薩修習如是善根下第五迴向成益文有十句攝為五對以顯四益一以因感緣由智內明外為友攝二以緣感因外蒙慧照內滅痴暗此除障益三由勤修入三慧業此明學益四上學證智自善普充此證入益五盡善福源入實智海此成二嚴益即為向實際之本以智窮入故上明隨相竟佛子菩薩摩訶薩以此善根如是迴向所謂不著世間不取眾生其心清淨無所依止正念諸法離分別見不捨一切佛自在慧不違三世一切諸佛正迴向門隨順一切平等正法不壞如來真實之相等觀三世無眾生相善順佛道善說於法深了其義入最勝地悟真實法智慧圓滿信樂堅固雖善修正業而知業性空了一切法皆如幻化知一切法無有自性觀一切義及種種行隨世言說而無所著除滅一切執著因緣知如實理觀諸法性皆悉寂滅了一切法同一實相知諸法相不相違背與諸菩薩而共同止修行其道善攝眾生入去來今一切菩薩迴向之門於諸佛法心無驚怖以無量心令諸眾生普得清淨於十方世界不起執取我我所心於諸世間無所分別於一切境界不生染著勤修一切出世間法於諸世間無取無依於深妙道正見牢固離諸妄見了真實法大文第二離相迴向此與前諸迴向小異前多攝相歸性少有依性起相今此多顯性相無礙以為如相故上標文皆躡前隨相之時今不要對前以成無礙故無時字文分二初直明迴向後譬如下對如廣辨今初又二初順如之行二如諸佛法下順如之益初中止觀雙運不著有無文云佛子菩薩以此善根如是迴向所謂不著下一止寂妄取不違體用次云等觀三世下明觀空有信智雙圓初句觀真空善順下觀妙有次云雖善修正業而知業性空下明權實雙行初句立宗以無礙為宗次了一切法如幻同喻以如幻相有體虗故次知一切下合及出所因因云緣成即無性故次云於諸佛法心無驚怖下順如之益文有十句五對令四心彌固一上安深法下淨眾生即廣大心二二我不生世見斯絕即不顛倒心三於境無染出世勤修四不依世間正道唯固上二即第一心無住涅槃為第一故五妄見斯寂了實體同即常心常不捨離同體悲故上直就迴向第二對如廣辨如相迴向生此段文先敘科義此一段文略以五門分別一釋名真謂真實顯非虗妄如謂如常表無變異此法相宗義若法性宗云不變為真順緣名如由不變故與有為法有非一義由順緣故與有為法有非異義二名種類為或一或二或三或七乃至有十名類不同疏各有釋三辨德用謂一為依持二成觀境乃至有三大等如起信說皆顯德用四約教不同可以思準五釋文者然此百門古釋非一今疏不取但且就十科之以配十地十如初滿徧一切及無相為相等即徧滿真如之義二中無能測量無有比對即最勝義三中於法無礙為眾法眼即勝流義四中無著無住等即無攝受義五中畢竟無盡無有變易即類無別義六中無有分體性無生即無染淨義七中無所不在住有無法即法無分義八中體性清淨體性平等即不增減義九中徧一切法是佛境界即智自在義十中住一切地成就一切佛菩薩等即業自在義其中餘義可以類取隨地別顯唯說十如一具一切十十成百欲顯如德無量無邊地前通修等覺徧等如來證窮今迴向義謂稱如起行體即如是但人信如德尚迷迴向故以如德喻迴向德若取文義徧者應云真如體相遍一切處善根迴向如故亦遍一切無邊際等百門之內各有二句上即所同之如德下善根下能同迴向之德上敘科義下隨文解釋譬如真如徧一切處無有邊際善根迴向亦復如是徧一切處無有邊際譬如真如真實為性善根迴向亦復如是了一切法真實為性譬如真如恒守本性無有改變善根迴向亦復如是守其本性始終不改譬如真如以一切法無性為性善根迴向亦復如是了一切法無性為性譬如真如無相為相善根迴向亦復如是了一切法無相為相譬如真如若有得者終無退轉善根迴向亦復如是若有得者於諸佛法永不退轉譬如真如一切諸佛之所行處善根迴向亦復如是一切如來所行之處譬如真如離境界相而為境界善根迴向亦復如是離境界相而為三世一切諸佛圓滿境界譬如真如能有安立善根迴向亦復如是悉能安立一切眾生譬如真如性常隨順善根迴向亦復如是盡未來劫隨順不斷釋文中最初十句初門顯在緣中故無不遍二明不變故云真實三明隨緣即不變云恒守本性四示其性五示其相此五一向就如以辨次二對智以說故為智境八顯真如非境為境謂要忘境方契如境故如之本性非安立故九即安立如十即如常之義向下九十門即如次十十為一門譬如真如無能測量善根迴向亦復如是等虗空界盡眾生心無能測量譬如真如充滿一切善根迴向亦復如是一剎那中普周法界譬如真如常住無盡善根迴向亦復如是究竟無盡十二云充滿一切者謂若色若心若大若小等極微剎那亦皆圓滿非分滿故譬如真如無有比對善根迴向亦復如是普能圓滿一切佛法無有比對十四無比對者法性不並真故譬如真如體性堅固善根迴向亦復如是體性堅固非諸惑惱之所能沮譬如真如不可破壞善根迴向亦復如是一切眾生不能損壞十五惑不能壞十六人不能壞譬如真如照明為體善根迴向亦復如是以普照明而為其性十七寂而常照智即如用譬如真如無所不在善根迴向亦復如是於一切處悉無不在譬如真如徧一切時善根迴向亦復如是徧一切時譬如真如性常清淨善根迴向亦復如是住於世間而體清淨譬如真如於法無礙善根迴向亦復如是周行一切而無所礙譬如真如為眾法眼善根迴向亦復如是能為一切眾生眼二十二既以照明為體何無照矚之眼譬如真如性無勞倦善根迴向亦復如是修行一切菩薩諸行恒無勞倦譬如真如體性甚深善根迴向亦復如是其性甚深譬如真如無有一物善根迴向亦復如是了知其性無有一物譬如真如性非出現善根迴向亦復如是其體微妙難可得見譬如真如離眾垢翳善根迴向亦復如是慧眼清淨離諸癡翳譬如真如性無與等善根迴向亦復如是成就一切諸菩薩行最上無等譬如真如體性寂靜善根迴向亦復如是善能隨順寂靜之法譬如真如無有根本善根迴向亦復如是能入一切無根本法三十云無根本者前無所依故即無住本故譬如真如體性無邊善根迴向亦復如是淨諸眾生其數無邊譬如真如體性無著善根迴向亦復如是畢竟遠離一切諸著譬如真如無有障礙善根迴向亦復如是除滅一切世間障礙譬如真如非世所行善根迴向亦復如是非諸世間之所能行譬如真如體性無住善根迴向亦復如是一切生死皆非所住譬如真如性無所作善根迴向亦復如是一切所作悉皆捨離譬如真如體性安住善根迴向亦復如是安住真實三十七云安住者由無所住安住真實故譬如真如與一切法而共相應善根迴向亦復如是與諸菩薩聽聞修習而共相應譬如真如一切法中性常平等善根迴向亦復如是於諸世間修平等行譬如真如不離諸法善根迴向亦復如是盡未來際不捨世間譬如真如一切法中畢竟無盡善根迴向亦復如是於諸眾生迴向無盡四十一畢竟無盡者雖在諸法諸法盡而體常又正在法中取不可盡如芥子之空故譬如真如與一切法無有相違善根迴向亦復如是不違三世一切佛法譬如真如普攝諸法善根迴向亦復如是盡攝一切眾生善根譬如真如與一切法同其體性善根迴向亦復如是與三世佛同一體性譬如真如與一切法不相捨離善根迴向亦復如是攝持一切世出世法譬如真如無能暎蔽善根迴向亦復如是一切世間無能暎蔽譬如真如不可動搖善根迴向亦復如是一切魔業無能動搖譬如真如性無垢濁善根迴向亦復如是修菩薩行無有垢濁譬如真如無有變易善根迴向亦復如是愍念眾生心無變易譬如真如不可窮盡善根迴向亦復如是非諸世法所能窮盡譬如真如性常覺悟善根迴向亦復如是普能覺悟一切諸法五十一性常覺語者能內熏發起厭求故譬如真如不可失壞善根迴向亦復如是於諸眾生起勝志願永不失壞五十二不可失壞者在於生死染而不染故譬如真如能大照明善根迴向亦復如是以大智光照諸世間五十三即智大光明遍照法界義故譬如真如不可言說善根迴向亦復如是一切言語所不可說五十四離言真如譬如真如持諸世間善根迴向亦復如是能持一切菩薩諸行譬如真如隨世言說善根迴向亦復如是隨順一切智慧言說譬如真如徧一切法善根迴向亦復如是徧於十方一切佛剎現大神通成等正覺譬如真如無有分別善根迴向亦復如是於諸世間無所分別譬如真如徧一切身善根迴向亦復如是徧十方剎無量身中譬如真如體性無生善根迴向亦復如是方便示生而無所生譬如真如無所不在善根迴向亦復如是十方三世諸佛土中普現神通而無不在六十一無所不在者上遍一切即無邊際今隨一一法皆全在中譬如真如徧在於夜善根迴向亦復如是於一切夜放大光明施作佛事六十二在晝夜乃至盡未來者一念長劫各各收如各各依如故得念劫互收互入譬如真如徧在於晝善根迴向亦復如是悉令一切在晝眾生見佛神變演不退輪離垢清淨無空過者譬如真如徧在半月及以一月善根迴向亦復如是於諸世間次第時節得善方便於一念中知一切時譬如真如徧在年歲善根迴向亦復如是住無量劫明了成熟一切諸根皆令圓滿譬如真如徧成壞劫善根迴向亦復如是住一切劫清淨無染教化眾生咸令清淨譬如真如盡未來際善根迴向亦復如是盡未來際修諸菩薩清淨妙行成滿大願無有退轉譬如真如徧住三世善根迴向亦復如是令諸眾生於一剎那見三世佛未曾一念而有捨離譬如真如徧一切處善根迴向亦復如是超出三界周徧一切悉得自在譬如真如住有無法善根迴向亦復如是了達一切有無之法畢竟清淨七十住有無者理無惑計有無常實故譬如真如體性清淨善根迴向亦復如是能以方便集助道法淨治一切諸菩薩行譬如真如體性明潔善根迴向亦復如是令諸菩薩悉得三昧明潔之心七十二性覺為明離念為潔譬如真如體性無垢善根迴向亦復如是遠離諸垢滿足一切諸清淨意譬如真如無我我所善根迴向亦復如是以無我我所清淨之心充滿十方諸佛國土譬如真如體性平等善根迴向亦復如是獲得平等一切智智照了諸法離諸癡翳譬如真如超諸數量善根迴向亦復如是與超數量一切智乘大力法藏而同止住興徧十方一切世界廣大法雲譬如真如平等安住善根迴向亦復如是發生一切諸菩薩行平等住於一切智道譬如真如徧住一切諸眾生界善根迴向亦復如是滿足無礙一切種智於眾生界悉現在前譬如真如無有分別普住一切音聲智中善根迴向亦復如是具足一切諸言音智能普示現種種言音開示眾生譬如真如永離世間善根迴向亦復如是普使眾生永出世間譬如真如體性廣大善根迴向亦復如是悉能受持去來今世廣大佛法恒不忘失勤修一切菩薩諸行譬如真如無有間息善根迴向亦復如是為欲安處一切眾生於大智地於一切劫修菩薩行無有間息譬如真如體性寬廣徧一切法善根迴向亦復如是淨念無礙普攝一切寬廣法門譬如真如徧攝羣品普根迴向亦復如是證得無量品類之智修諸菩薩真實妙行譬如真如無所取著善根迴向亦復如是於一切法皆無所取除滅一切世間取著普令清淨譬如真如體性不動善根迴向亦復如是安住普賢圓滿行願畢竟不動譬如真如是佛境界善根迴向亦復如是令諸眾生滿足一切大智境界滅煩惱境悉令清淨譬如真如無能制伏善根迴向亦復如是不為一切眾魔事業外道邪論之所制伏譬如真如非是可修非不可修善根迴向亦復如是捨離一切妄想取著於修不修無所分別八十九非可修者無所得故非不可修者為聖境故譬如真如無有退捨善根迴向亦復如是常見諸佛發菩提心大誓莊嚴永無退捨譬如真如普攝一切世間言音善根迴向亦復如是能得一切差別言音神通智慧普發一切種種言詞譬如真如於一切法無所希求善根迴向亦復如是令諸眾生乘普賢乘而得出離於一切法無所貪求譬如真如住一切地善根迴向亦復如是令一切眾生捨世間地住智慧地以普賢行而自莊嚴譬如真如無有斷絕善根迴向亦復如是於一切法得無所畏隨其類音處處演說無有斷絕譬如真如捨離諸漏善根迴向亦復如是令一切眾生成就法智了達諸法圓滿菩提無漏功德九十五捨離諸漏者準梵本云阿那薩攞嚩此云無漏今言捨者性本捨故猶心體離念譬如真如無有少法而能壞亂令其少分非是覺悟善根迴向亦復如是普令開悟一切諸法其心無量徧周法界九十六云無有少法而能壞亂令其少分非覺悟者如遍非情則有少法非是覺悟譬如真如過去非始未來非末現在非異善根迴向亦復如是為一切眾生新新恒起菩提心願普使清淨永離生死九十七云過去非始等者過去初際所以名始未來為終故稱為末現在似有已未分之無蹔住時故名為異今明真如雖遍三世之中體絕三世初中後相故普言非迴向亦爾雖為眾生新新起願同彼真如遍三世之中而今永離生死之相方名清淨譬如真如於三世中無所分別善根迴向亦復如是現在念念心常覺悟過去未來皆悉清淨譬如真如成就一切諸佛菩薩善根迴向亦復如是發起一切大願方便成就諸佛廣大智慧譬如真如究竟清淨不與一切諸煩惱俱善根迴向亦復如是能滅一切眾生煩惱圓滿一切清淨智慧言三世無分別者前約遮詮不同三世今約顯詮常無分別下文尚有二譬共一百門約十真如上離相迴向竟佛子菩薩摩訶薩如是迴向時得一切佛剎平等普嚴淨一切世界故得一切眾生平等普為轉無礙法輪故得一切菩薩平等普出生一切智願故得一切諸佛平等觀察諸佛體無二故得一切法平等普知諸法性無易故得一切世間平等以方便智善解一切語言道故得一切菩薩行平等隨種種善根盡迴向故得一切時平等勤修佛事於一切時無斷絕故得一切業果平等於世出世所有善根皆無染著咸究竟故得一切佛自在神通平等隨順世間現佛事故佛子是為菩薩摩訶薩第八真如相迴向大文第三迴向成益及結名可知菩薩摩訶薩住此迴向證得無量清淨法門能為如來大師子吼自在無畏以善方便教化成就無量菩薩於一切時未曾休息得佛無量圓滿之身一身充徧一切世界得佛無量圓滿音聲一音開悟一切眾生得佛無量圓滿之力一毛孔中普能容納一切國土得佛無量圓滿神通置諸眾生於一塵中得佛無量圓滿解脫於一眾生身示現一切諸佛境界成等正覺得佛無量圓滿三昧一三昧中普能示現一切三昧得佛無量圓滿辯才說一句法窮未來際而不可盡悉除一切眾生疑惑得佛無量圓滿眾生具佛十力盡眾生界示成正覺大文第二菩薩住此下明位果初牒得因後正得下正顯所得文有十句初總餘別皆云無量者同如廣大無盡故皆云得佛者同佛所證故作佛事故佛子是為菩薩摩訶薩以一切善根順真如相迴向大文佛子下總以結示爾時金剛幢菩薩承佛威力普觀十方而說頌言菩薩志樂常安住正念堅固離癡惑其心善輭恒清涼積集無邊功德行菩薩謙順無違逆所有志願悉清淨已得智慧大光明善能照了一切業菩薩思惟業廣大種種差別甚希有決意修行無退轉以此饒益諸羣生諸業差別無量種菩薩一切勤修習隨順眾生不違意普令心淨生歡喜已升調御人尊地離諸熱惱心無礙於法於義悉善知為利羣生轉勤習菩薩所修眾善行無量無數種種別於彼一切分別知為利羣生故迴向以妙智慧恒觀察究竟廣大真實理斷諸有處悉無餘如彼真如善迴向譬如真如徧一切如是普攝諸世間菩薩以此心迴向悉令眾生無所作菩薩願力徧一切譬如真如無不在若見不見念悉周悉以功德而迴向夜中隨住晝亦住半月一月亦隨住若年若劫悉住中真如如是行亦然所有三世及剎土一切眾生與諸法悉住其中無所住以如是行而迴向譬如真如本自性菩薩如是發大心真如所在無不在以如是行而迴向譬如真如本自性其中未曾有一法不得自性是真性以如是業而迴向如真如相業亦爾如真如性業亦爾如真如性本真實業亦如是同真如譬如真如無邊際業亦如是無有邊而於其中無縛著是故此業得清淨如是聰慧真佛子志願堅固不動搖以其智力善通達入於諸佛方便藏覺悟法王真實法於中無著亦無縛如是自在心無礙未曾見有一法起如來法身所作業一切世間如彼相說諸法相皆無相知如是相是知法菩薩住是不思議於中思議不可盡入此不可思議處思與非思皆寂滅如是思惟諸法性了達一切業差別所有我執皆除滅住於功德無能動菩薩一切業果報悉為無盡智所印如是無盡自性盡是故無盡方便滅菩薩觀心不在外亦復不得在於內知其心性無所有我法皆離永寂滅彼諸佛子如是知一切法性常空寂無有一法能造作同於諸佛悟無我了知一切諸世間悉與真如性相等見是不可思議相是則能知無相法若能住是甚深法常樂修行菩薩行為欲利益諸羣生大誓莊嚴無退轉是則超過於世間不起生死妄分別了達其心如幻化勤修眾行度羣生菩薩正念觀世間一切皆從業緣得為欲救度修諸行普攝三界無遺者了知眾生種種異悉是想行所分別於此觀察悉明了而不壞於諸法性智者了知諸佛法以如是行而迴向哀愍一切諸眾生令於實法正思惟第二應頌二十九偈分二初說偈儀初六偈頌行體於中先二偈所迴行體後四迴向之行三有十六偈頌離相迴向於中先九頌對如廣辨後七偈却頌約法直明後六偈頌迴向成益末一偈結迴向意
