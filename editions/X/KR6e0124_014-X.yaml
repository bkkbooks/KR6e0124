body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈淨行品第十一此品來意者夫欲階妙位必資勝行有解無行虗費多聞故故前品明解此品辨行又前明入理觀行今辨隨事所行又前行此願並義次第故次來也釋名者謂三業隨事歷緣名為所行巧願防非離過成德名為清淨又悲智雙行名為所行行越凡小故稱清淨以二乘無漏不能兼利非真淨故得斯意者舉足下足盡文殊心見聞覺知皆普賢行文殊心故心無濁亂普賢行故是佛往脩諸佛菩薩同所行也所行即淨持業釋也三宗趣者以隨事巧願防心不散增長菩薩悲智大行為宗成就普賢實德為趣經文就所歷事中始自出家終於臥覺皆事行也觸境不迷善達事理智行也雙達事理即事理無礙行也以願導智不滯自利大悲行也上二不二悲智無礙行也遇違順境心不馳散止行也智不沉沒觀行也即止觀雙運行也又對於事境善了邪正當願眾生皆假觀也知身空寂心無染著空觀也見理如實中觀也或先空後假或先假後空或一或二或一念頓具斯為妙達三諦觀之行也又所造成行皆施眾生不起二乘之心安忍強軟兩境或增善品心不異緣妙達性空善巧迴轉皆願利物同趣菩提二乘天魔所不能動善知藥病決斷無差即十度齊修之行也又皆願利生皆成佛德見惡必令其斷見善必令其具即四弘誓願之行也故智首總標諸德以求其因文殊令善用心頓獲眾果若但言願豈不惑哉爾時智首菩薩問文殊師利菩薩言此下先標智首問舉德徵因後文殊答標德顯因今初此二菩薩問答者歷事巧願必智為導故事近旨遠唯妙德故文殊則般若觀空智首則漚和涉有涉事不迷於理故雖願而無取觀空不遺於事故雖寂而不證是為權實雙游假茲問答下正陳所問中有二十云何總十一段段各十句成一百一十種德第一段明三業離過德二得堪傳法器三成就眾慧四具道因緣五於法善巧六修涅槃因七滿菩薩行八得十力智九十王敬護十能為饒益十一超勝尊貴皆言因何得者為修何行而得之耶佛子菩薩云何得無過失身語意業云何得不害身語意業云何得不可毀身語意業云何得不可壞身語意業云何得不退轉身語意業云何得不可動身語意業云何得殊勝身語意業云何得清淨身語意業云何得無染身語意業云何得智為先導身語意業此正陳所問分二初一段十句總問其果後十別明今初得此十種三業成下十果由無過三業故超勝尊貴由不恚害故常為饒益由無餘惑不可譏毀故十王敬護由惡緣不可壞故得佛十力由修行不退轉故滿菩薩行由遠離諸相故如如不動成涅槃因由德行殊勝故於法善巧由體清淨如虗空故成具道緣由涉境無染故得堪傳法器由智先導故成就眾慧又由後十能成此十故名為果亦通於因云何得生處具足種族具足家具足色具足相具足念具足慧具足行具足無畏具足覺悟具足此下後十段別明五果謂初一異熟果次四士用果次二離繫果次一增上果後二等流果今初十句即修道之器以菩薩起修行時要具此十方成二利之行言異熟果者謂先因後果必異時而熟異類而熟變異而熟善惡因果之總相以所感故約法生在佛家是生處具足云何得勝慧第一慧最上慧最勝慧無量慧無數慧不思議慧無與等慧不可量慧不可說慧第二十慧下有四段明士用果言士用者謂若法因彼勢力所生如因下地加行心力上地有漏無漏定生四中一慧為揀擇二力謂修習三善巧謂智四道品謂助修悉以三業而得成就云何得因力欲力方便力緣力所緣力根力觀察力奢摩他力毗鉢舍那力思惟力第三力者謂修習即具道因緣皆言力者此十各有資道之能故一因力即惟性等云何得蘊善巧界善巧處善巧緣起善巧欲界善巧色界善巧無色界善巧過去善巧未來善巧現在善巧第四善巧謂智皆約流轉以明以是觀還滅之智故云何得修習念覺分擇法覺分精進覺分喜覺分猗覺分定覺分捨覺分空無相無願第五道品為助修上四皆士用果云何得圓滿檀波羅蜜尸波羅蜜羼提波羅蜜毗梨耶波羅蜜禪那波羅蜜般若波羅蜜及以圓滿慈悲喜捨第六滿菩薩行此下二種明離繫果言離繫者謂由慧盡言慧者擇也盡滅也謂此擇滅離繫所顯故將擇滅釋離繫果謂六度治諸蔽故云何得處非處智力過未現在業報智力根勝劣智力種種界智力種種解智力一切至處道智力禪解脫三昧染淨智力宿住念智力無障礙天眼智力斷諸習智力第七具足十力謂修習之力當士用果由此力故方得離繫云何常得天王龍王夜叉王乾闥婆王阿修羅王迦樓羅王緊那羅王摩睺羅伽王人王梵王之所守護恭敬供養第八十王敬護是增上果言增上者謂除前已生有為之法餘有為法謂之增今十王敬護即有力增上由已具德令彼護故云何得與一切眾生為依為救為歸為趣為炬為明為照為導為勝導為普導第九與一切眾生為依下二段明等流果言等流者謂以自因平等流類故云何於一切眾生中為第一為大為勝為最勝為妙為極妙為上為無上為無等為無等等第十為第一下超勝尊貴略釋其相謂如來功德海滿更無所少故稱第一此亦總句大者體包法界故勝者自利圓滿故最勝者利他究竟故妙者煩惱障盡故極妙者所知障盡故上者望下無及故無上者望上更無故無等者望下無儔故無等等者望儔皆是無等者故所以廣舉者欲顯行之勝故上來問竟爾時文殊師利菩薩告智首菩薩言善哉佛子汝今為欲多所饒益多所安隱哀愍世間利樂天人問如是義第二答中分二初歎問成益佛子若諸菩薩善用其心則獲一切勝妙功德於諸佛法心無所礙住去來今諸佛之道隨眾生住恒不捨離如諸法相悉能通達斷一切惡具足眾善當如普賢色像第一一切行願皆得具足於一切法無不自在而為眾生第二導師第二佛子下正酬其問初標因成德後指事顯因初善用其心乃標因次句獲勝妙德下顯所成德初為總句次於諸佛法下九句別顯如次配上十段之德佛子云何用心能獲一切勝妙功德佛子菩薩在家當願眾生知家性空免其逼迫孝事父母當願眾生善事於佛護養一切妻子集會當願眾生怨親平等永離貪著若得五欲當願眾生拔除欲箭究竟安隱技樂聚會當願眾生以法自娛了技非實若在宮室當願眾生入於聖地永除穢欲著瓔珞時當願眾生捨諸偽飾到真實處上昇樓閣當願眾生昇正法樓徹見一切若有所施當願眾生一切能捨心無愛著眾會聚集當願眾生捨眾聚法成一切智若在厄難當願眾生隨意自在所行無礙第二佛子云何下指事顯因酬其徵因初徵一句總次佛子下別顯後總結成益次別顯中總有一百四十一願一百者表十信圓融一一具十也四十一者即四十一位也明此諸位所有惑障由此能淨所有勝行由此能行故有一百四十一願分為十段初菩薩在家下十一願明在家時願捨居家時當願眾生出家無礙心得解脫入僧伽藍當願眾生演說種種無乖諍法詣大小師當願眾生巧事師長習行善法求請出家當願眾生得不退法心無障礙脫去俗服當願眾生勤修善根捨諸罪軛剃除鬚髮當願眾生永離煩惱究竟寂滅著袈裟衣當願眾生心無所染具大仙道正出家時當願眾生同佛出家救護一切自歸於佛當願眾生紹隆佛種發無上意自歸於法當願眾生深入經藏智慧如海自歸於僧當願眾生統理大眾一切無礙受學戒時當願眾生善學於戒不作眾惡受闍黎教當願眾生具足威儀所行真實受和尚教當願眾生入無生智到無依處受具足戒當願眾生具諸方便得最勝法二有十五願出家受戒時若入堂宇當願眾生昇無上堂安住不動若敷床座當願眾生開敷善法見真實相正身端坐當願眾生坐菩提座心無所著結加趺坐當願眾生善根堅固得不動地修行於定當願眾生以定伏心究竟無餘若修於觀當願眾生見如實理永無乖諍捨加趺坐當願眾生觀諸行法悉歸散滅三有七願坐禪觀下足住時當願眾生心得解脫安住不動若舉於足當願眾生出生死海具眾善法著下裙時當願眾生服諸善根具足慚愧整衣束帶當願眾生檢束善根不令散失若著上衣當願眾生獲勝善根至法彼岸著僧伽黎當願眾生入第一位得不動法四有六願將披挂時手執楊枝當願眾生皆得妙法究竟清淨嚼楊枝時當願眾生其心調淨噬諸煩惱大小便時當願眾生棄貪嗔癡蠲除罪法事訖就水當願眾生出世法中速疾而往洗滌形穢當願眾生清淨調柔畢竟無垢以水盥掌當願眾生得清淨手受持佛法以水洗面當願眾生得淨法門永無垢染五有七願澡漱盥洗時手執錫杖當願眾生設大施會示如實道執持應器當願眾生成就法器受天人供發趾向道當願眾生趣佛所行入無依處若在於道當願眾生能行佛道向無餘法涉路而去當願眾生履淨法界心無障礙見昇高路當願眾生永出三界心無怯弱見趣下路當願眾生其心謙下長佛善根見斜曲路當願眾生捨不正道永除惡見若見直路當願眾生其心正直無諂無誑見路多塵當願眾生遠離塵坌獲清淨法見路無塵當願眾生常行大悲其心潤澤若見險道當願眾生住正法界離諸罪難若見眾會當願眾生說甚深法一切和合若見大柱當願眾生離我諍心無有忿恨若見藂林當願眾生諸天及人所應敬禮若見高山當願眾生善根超出無能至頂見棘刺樹當願眾生疾得翦除三毒之刺見樹葉茂當願眾生以定解脫而為蔭映若見華開當願眾生神通等法如華開敷若見樹華當願眾生眾相如華具三十二若見果實當願眾生獲最勝法證菩提道若見大河當願眾生得預法流入佛智海若見波澤當願眾生疾悟諸佛一味之法若見池沼當願眾生語業滿足巧能演說若見汲井當願眾生具足辯才演一切法若見涌泉當願眾生方便增長善根無盡若見橋道當願眾生廣度一切猶如橋梁若見流水當願眾生得善意欲洗除惑垢見修園圃當願眾生五欲圃中耘除愛草見無憂林當願眾生永離貪愛不生憂怖若見園苑當願眾生勤修諸行趣佛菩提見嚴飾人當願眾生三十二相以為嚴好見無嚴飾當願眾生捨諸飾好具頭陀行見樂著人當願眾生以法自娛歡愛不捨見無樂著當願眾生有為事中心無所樂見歡樂人當願眾生常得安樂樂供養佛見苦惱人當願眾生獲根本智滅除眾苦見無病人當願眾生入真實慧永無病惱見疾病人當願眾生知身空寂離乖諍法見端正人當願眾生於佛菩薩常生淨信見醜陋人當願眾生於不善事不生樂著見報恩人當願眾生於佛菩薩能知恩德見背恩人當願眾生於有惡人不加其報若見沙門當願眾生調柔寂靜畢竟第一見婆羅門當願眾生永持梵行離一切惡見苦行人當願眾生依於苦行至究竟處見操行人當願眾生堅持志行不捨佛道見著甲冑當願眾生常服善鎧趣無師法見無鎧仗當願眾生永離一切不善之業見論議人當願眾生於諸異論悉能摧伏見正命人當願眾生得清淨命不矯威儀若見於王當願眾生得為法王恒轉正法若見王子當願眾生從法化生而為佛子若見長者當願眾生善能明斷不行惡法若見大臣當願眾生恒守正念習行眾善六有五十五願乞食道行時分三初十二願遊涉道路次若見眾會下有十九願所覩事境三見嚴飾人下二十四願所過人物若見城郭當願眾生得堅固身心無所屈若見王都當願眾生功德共聚心恒喜樂見處林數當願眾生應為天人之所歎仰入里乞食當願眾生入深法界心無障礙到人門戶當願眾生入於一切佛法之門入其家已當願眾生得入佛乘三世平等見不捨人當願眾生常不捨離勝功德法見能捨人當願眾生永得捨離三惡道苦若見空鉢當願眾生其心清淨空無煩惱若見滿鉢當願眾生具足成滿一切善法若得恭敬當願眾生恭敬修行一切佛法不得恭敬當願眾生不行一切不善之法見慚恥人當願眾生具慚恥行藏護諸根見無慚恥當願眾生捨離無慚住大慈道若得美食當願眾生滿足其願心無羨欲得不美食當願眾生莫不獲得諸三昧味得柔耎食當願眾生大悲所熏心意柔軟得麤澀食當願眾生心無染著絕世貪愛若飯食時當願眾生禪悅為食法喜充滿若受味時當願眾生得佛上味甘露滿足飯食已訖當願眾生所作皆辦具諸佛法若說法時當願眾生得無盡辯廣宣法要七有二十二願到城乞食時從舍出時當願眾生深入佛智永出三界若入水時當願眾生入一切智知三世等洗浴身體當願眾生身心無垢內外光潔盛暑炎毒當願眾生捨離眾惱一切皆盡暑退涼初當願眾生證無上法究竟清涼八有五願還歸洗浴時諷誦經時當願眾生順佛所說總持不忘若得見佛當願眾生得無礙眼見一切佛諦觀佛時當願眾生皆如普賢端正嚴好見佛塔時當願眾生尊重如塔受天人供敬心觀塔當願眾生諸天及人所共瞻仰頂禮於塔當願眾生一切天人無能見頂右繞於塔當願眾生所行無逆成一切智繞塔三帀當願眾生勤求佛道心無懈歇讚佛功德當願眾生眾德悉具稱歎無盡讚佛相好當願眾生成就佛身證無相法九有十願誦習旋禮佛時若洗足時當願眾生具足神力所行無礙以時寢息當願眾生身得安隱心無動亂睡眠始寤當願眾生一切智覺周顧十方十有三願寤寐安息時佛子若諸菩薩如是用心則獲一切勝妙功德一切世間諸天魔梵沙門婆羅門乾闥婆阿修羅等及以一切聲聞緣覺所不能動次總結歎因所成益若能如上為善用其心如此用心則內德齊圓外不能動以游心大智故人天不能動心冠大悲故二乘不能動淨行品竟賢首品第十二之上此品來意者夫行不虗設必有其德既解行圓妙必勝德難思收前行願成信德用故次來也又前智首舉果徵因文殊廣顯其因略標其果云獲一切勝妙功德故問賢首今廣斯言是以偈初躡前起後此來意也釋名者謂體性至順調善曰賢吉祥勝德超絕名首即以此名菩薩演說此法賢即是首以當三賢之首攝諸德故偏舉賢名天台宗此品立圓頓止觀云此菩薩聞圓法起圓信立圓行住圓位以圓功德而自莊嚴以圓力用建立眾生今宗即圓法意趣有五一信即起圓信二行三位四德五用皆以圓融貫之以此信位圓住行向地等覺五位功德所謂因該果海其實諸位皆依此信建立故爾時文殊師利菩薩說無濁亂清淨行大功德已欲顯示菩提心功德故以偈問賢首菩薩曰我今已為諸菩薩說佛往修清淨行仁亦當於此會中演暢修行勝功德此標文殊問意乃經家敘置結前生後之辭也菩提心功德文含始終約終則顯示信滿菩提心殊勝功德廣具五位因行盡故約始但於生死誓證菩提萬行攸依故今顯示我今已為下一偈正顯發起爾時賢首菩薩以偈答曰善哉仁者應諦聽彼諸功德不可量我今隨力說少分猶如大海一滴水第二爾時賢首下廣說初標舉次善哉仁者下正顯偈頌初有四偈謙讚許說初一偈標章若有菩薩初發心誓求當證佛菩提彼之功德無邊際不可稱量無與等何況無量無邊劫具修地度諸功德十方一切諸如來悉共稱揚不能盡如是無邊大功德我今於中說少分譬如鳥足所履空亦如大地一微塵此下正說文中先三偈開章以發心之德況出修行巧顯深廣於中初一偈舉發心章次一偈況出修行章後偈許說分齊問此初發心與十住初發心住及發心功德品何別答此中發心該於初後取其威德乃是信終取其為本乃在初發故十住初發乃是此中成彼初發此正是發起之發義兼發開彼是開發之發義兼發起其發心品正顯十住初心之功德耳問此信既是初信何得乃具後諸行位及普賢德耶答古德釋此略有二門一行布次第門二圓融通攝門行布者謂從微至著從淺至深次第相乘以階彼岸如瓔珞仁王起信瑜伽等說二圓融者謂一位具足一切位等如此經說亦如大品等中一行具一切行故此中有二門一緣起相由門二法界融攝門此經之中依緣起門義故行位相收總有四說一或始具終如此門中具一切行位普賢德海者是也二或終具始並在十地位後如下十定十通等說或諸位齊收並在十住等一一位中各收一切悉至究竟皆成佛故如下文十住十行等說或諸位皆泯行德顯然如離世間品說上約緣起相由門說二法界融攝門者謂此諸位及所修行皆不離普賢無盡法界然此法界圓融無限隨在一位即具一切今在信門收無不盡下諸位中皆具一切者並準此釋此經縱有行布亦是圓融菩薩發意求菩提非是無因無有緣於佛法僧生淨信以是而生廣大心不求五欲及王位富饒自樂大名稱但為永滅眾生苦利益世間而發心常欲利樂諸眾生莊嚴國土供養佛受持正法修諸智證菩提故而發心深心信解常清淨恭敬尊重一切佛於法及僧亦如是至誠供養而發心深信於佛及佛法亦信佛子所行道及信無上大菩提菩薩以是初發心此下正明發心修行勝德文有三百四十六偈半分為五段初發心行相二略示勝能三所具行位四無方大用五喻說玄旨今初菩薩發意求菩提下五偈明發心行相信為道元功德母長養一切諸善法斷除疑網出愛眾開示涅槃無上道信無垢濁心清淨滅除憍慢恭敬本亦為法藏第一財為清淨手受眾行信能惠施心無恡信能歡喜入佛法信能增長智功德信能必到如來地信令諸根淨明利信力堅固無能壞信能永滅煩惱本信能專向佛功德信于境界無所著遠離諸難得無難信能超出眾魔路示現無上解脫道信為功德不壞種信能生長菩提樹信能增益最勝智信能示現一切佛是故依行說次第信樂最勝甚難得譬如一切世間中而有隨意妙寶珠二信為道元下略示勝能有七偈若常信奉于諸佛則能持戒修學處若常持戒修學處則能具足諸功德戒能開發菩提本學是勤修功德地於戒及學常順行一切如來所稱美若常信奉於諸佛則能興集大供養若能興集大供養彼人信佛不思議若常信奉於尊法則聞佛法無厭足若聞佛法無厭足彼人信法不思議若常信奉清淨僧則得信心不退轉若得信心不退轉彼人信力無能動若得信力無能動則得諸根淨明利若得諸根淨明利則能遠離惡知識若能遠離惡知識則得親近善知識若得親近善知識則能修習廣大善若能修習廣大善彼人成就大因力若人成就大因力則得殊勝決定解若得殊勝決定解則為諸佛所護念此下廣明信中所具行位有五十偈半至菩薩眾亦然止通攝三賢十地行德今且先明所具行次明所具位今具行中有八偈半先五偈明信三寶以成行次若信力無能動下三偈半明成展轉行展轉依前功於信若為諸佛所護念則能發起菩提心若能發起菩提心則能勤修佛功德若能勤修佛功德則得生在如來家若得生在如來家則善修行巧方便若善修行巧方便則得信樂心清淨若得信樂心清淨則得增上最勝心次若為諸佛下明所具行位有三十九偈於中四位分四段初三偈明十住位若得增上最勝心則常修習波羅蜜若常修習波羅蜜則能具足摩訶衍若能具足摩訶衍則能如法供養佛若能如法供養佛則能念佛心不動若能念佛心不動則常覩見無量佛若得增上下二偈半明十行位若常覩見無量佛則見如來體常住若見如來體常住則能知法永不滅若能知法永不滅則得辯才無障礙若得辯才無障礙則能開演無邊法若能開演無邊法則能慈愍度眾生若能慈愍度眾生則得堅固大悲心次若常下三偈明十迴向位若能堅固大悲心則能愛樂甚深法此下有三十偈半明十地行初二句明歡喜地位若能愛樂甚深法則能捨離有為過此二句明離垢地位若能捨離有為過則離憍慢及放逸若離憍慢及放逸則能兼利一切眾此四句明三四地位若能兼利一切眾則處生死無疲厭若處生死無疲厭則能勇徤無能勝此四句明五地位若能勇徤無能勝則能發起大神通若能發起大神通則知一切眾生行此四句明六地位若知一切眾生行則能成就諸羣生若能成就諸羣生則能善攝眾生智若得善攝眾生智則能成就四攝法若得成就四攝法則與眾生無限利若與眾生無限利則具最勝智方便此二偈半明七地位若具最勝智方便則住勇猛無上道若住勇猛無上道則能摧殄諸魔力若能摧殄諸魔力則能超出四魔境若能超出四魔境則得至於不退地若得至於不退地則得無生深法忍若得無生深法忍則為諸佛所授記此三偈明八地位若為諸佛所授記則一切佛現其前若一切佛現其前則了神通深密用若了神通深密用則為諸佛所憶念若為諸佛所憶念則以佛德自莊嚴此二偈明九地位若以佛德自莊嚴則獲妙福端嚴身若獲妙福端嚴身則身晃耀如金山若身晃耀如金山則相莊嚴三十二若相莊嚴三十二則具隨好為嚴飾若具隨好為嚴飾則身光明無限量若身光明無限量則不思議光莊嚴若不思議光莊嚴其光則出諸蓮華其光若出諸蓮華則無量佛坐華上示現十方靡不徧悉能調伏諸眾生若能如是調眾生則現無量神通力若現無量神通力則住不可思議土演說不可思議法令不思議眾歡喜若說不可思議法令不思議眾歡喜則以智慧辯才力隨眾生心而化誘若以智慧辯才力隨眾生心而化誘則以智慧為先導身語意業恒無失此下有十九偈明十地位分五段初八偈明三業殊勝德於中五偈明身業次一偈明語業後二偈明意業若以智慧為先導身語意業恒無失則其願力得自在普隨諸趣而現身若其願力得自在普隨諸趣而現身則能為眾說法時音聲隨類難思議若能為眾說法時音聲隨類難思議則於一切眾生心一念悉知無有餘若於一切眾生心一念悉知無有餘則知煩惱無所起永不沒溺於生死次四偈明三業攝生德若知煩惱無所起永不沒溺於生死則獲功德法性身以法威力現世間若獲功德法性身以法威力現世間則獲十地十自在修行諸度勝解脫此二偈辨得法結位德若得十地十自在修行諸度勝解脫則獲灌頂大神通住於最勝諸三昧若獲灌頂大神通住於最勝諸三昧則於十方諸佛所應受灌頂而昇位若於十方諸佛所應受灌頂而昇位則蒙十方一切佛手以甘露灌其頂此三偈明三昧受位分若蒙十方一切佛手以甘露灌其頂則身充徧如虗空安住不動滿十方若身充徧如虗空安住不動滿十方則彼所行無與等諸天世人莫能知此二偈明大用難測亦是進入佛地菩薩勤修大悲行願度一切無不果見聞聽受若供養靡不皆令獲安樂彼諸大士威神力法眼常全無缺減十善妙行等諸道無上勝寶皆令現譬如大海金剛聚以彼威力生眾寶無減無增亦無盡菩薩功德聚亦然此三偈結歎功能初二偈法說次一偈喻說上第三所具行位竟下第四無方大用此下有二百三偈第四明無方大用分彼能無方大用者由普賢德徧一切時處法界無限故略辨十門三昧業用一圓明海印三昧門二華嚴妙行三昧門三因陀羅網三昧門四手出廣供三昧門五現諸法門三昧門六四攝攝生三昧門七俯同世間三昧門八毛光照益三昧門九主伴嚴麗三昧門十寂用無涯三昧門以無不定心故皆云三昧作用不同略辨十種又初門依體起用末後明用不異體中間並顯妙用自在或有剎土無有佛於彼示現成正覺或有國土不知法於彼為說妙法藏無有分別無功用於一念頃徧十方如月光影靡不周無量方便化羣生於彼十方世界中念念示現成佛道轉正法輪入寂滅乃至舍利廣分布或現聲聞獨覺道或現成佛普莊嚴或現童男童女形天龍及以阿修羅乃至摩睺羅伽等隨其所樂悉令見眾生形相各不同行業音聲亦無量如是一切皆能現海印三昧威神力今初六偈明海印三昧文中前五別明業用周徧後一總結大用所依前中三初偈總明現佛說法次一偈體用自在謂念無分別動無功用故無念之念一念徧於十方無功之功多門攝於羣品次一三乘後一餘類總顯十法界之化也一海印三昧門竟嚴淨不可思議剎供養一切諸如來放大光明無有邊度脫眾生亦無限智慧自在不思議說法言辭無有礙施戒忍進及禪定智慧方便神通等如是一切皆自在以佛華嚴三昧力此下十句明華嚴妙行三昧以萬行嚴於法界成於法身為華嚴也二華嚴三昧門竟一微塵中入三昧成就一切微塵定而彼微塵亦不增於一普現難思剎彼一塵內眾多剎或有有佛或無佛或有雜染或清淨或有廣大或狹小或復有成或有壞或有正住或傍住或如曠野熱時𦦨或如天上因陀網如一塵中所示現一切微塵悉亦然此大名稱諸聖人三昧解脫神通力此下四偈明因陀羅網三昧門由一多相即故入一定能成多定由成多定令一塵內有一切塵一一塵中現一切剎但令一塵現剎一切皆爾故云成就一切微塵定言塵不增者謂不壞相次二頌明一塵中所現剎相無礙如𦦨重現如帝網三因陀羅三昧竟若欲供養一切佛入於三昧起神變能以一手徧三千普供一切諸如來十方所有勝妙華塗香末香無價寶如是皆從手中出供養道樹諸最勝無價寶衣雜妙香寶幢幡益皆嚴好真金為華寶為帳莫不皆從掌中雨十方所有諸妙物應可奉獻無上尊掌中悉雨無不備菩提樹前持供佛十方一切諸技樂鐘鼓琴瑟非一類悉奏和雅妙音聲靡不從於掌中出十方所有諸讚頌稱歎如來實功德如是種種妙言辭皆從掌內而開演菩薩右手放淨光光中香水從空雨普灑十方諸佛土供養一切照世燈又放光明妙莊嚴出生無量寶蓮華其華色相皆殊妙以此供養於諸佛又放光明華莊嚴種種妙華集為帳普散十方諸國土供養一切大德尊又放光明香莊嚴種種妙香集為帳普散十方諸國土供養一切大德尊又放光明末香嚴種種末香聚為帳普散十方諸國土供養一切大德尊又放光明衣莊嚴種種名衣集為帳普散十方諸國土供養一切大德尊又放光明寶莊嚴種種妙寶集為帳普散十方諸國土供養一切大德尊又放光明蓮莊嚴種種蓮華集為帳普散十方諸國土供養一切大德尊又放光明瓔莊嚴種種妙瓔集為帳普散十方諸國土供養一切大德尊又放光明幢莊嚴其幢絢煥備眾色種種無量皆殊好以此莊嚴諸佛土種種雜寶莊嚴蓋眾妙繒幡共垂飾摩尼寶鐸演佛音執持供養諸如來手出供具難思議如是供養一導師一切佛所皆如是大士三昧神通力四若欲下十八偈明手出廣供三昧門初一偈總標後一通結中間別顯欲顯勝妙略舉一手為供所依由於昔時以手持供供佛施人稱周法界故令真流供具等諸佛之難思四手出廣供三昧竟菩薩住在三昧中種種自在攝眾生悉以所行功德法無量方便而開誘或以供養如來門或以難思布施門或以頭陀持戒門或以不動堪忍門或以苦行精進門或以寂靜禪定門或以決了智慧門或以所行方便門或以梵住神通門或以四攝利益門或以福智莊嚴門或以因緣解脫門或以根力正道門或以聲聞解脫門或以獨覺清淨門或以大乘自在門或以無常眾苦門或以無我壽者門或以不淨離欲門或以滅盡三昧門隨諸眾生病不同悉以法藥而對治隨諸眾生心所樂悉以方便而滿足隨諸眾生行差別悉以善巧而成就如是三昧神通相一切天人莫能測此下有八偈明現諸法門三昧門分四初一偈總標多門次有五偈別顯二十種門供等即門通入佛果故後一偈半結多所因由四悉檀故初半偈對治悉檀次半偈即世界悉檀隨行差別即當為人悉檀而成就言謂第一義悉檀後半偈結用難測五現諸法門三昧竟有妙三昧名隨樂菩薩住此普觀察隨宜示現度眾生悉使歡心從法化劫中饑饉災難時悉與世間諸樂具隨其所欲皆令滿普為眾生作饒益或以飲食上好味寶衣嚴具眾妙物乃至王位皆能捨令好施者悉從化或以相好莊嚴身上妙衣服寶瓔珞華鬘為飾香塗體威儀具足度眾生一切世間所好尚色相顏容及衣服隨應普現愜其心俾樂色者皆從道迦陵頻伽美妙音俱枳羅等妙音聲種種梵音皆具足隨其心樂為說法八萬四千諸法門諸佛以此度眾生彼亦如其差別法隨世所宜而化度眾生苦樂利衰等一切世間所作法悉能應現同其事以此普度諸眾生一切世間眾苦患深廣無涯如大海與彼同事悉能忍令其利益得安樂若有不識出離法不求解脫離諠憤菩薩為現捨國財常樂出家心寂靜家是貪愛繫縛所欲使眾生悉免離故是出家得解脫於諸欲樂無所受菩薩示行十種行亦行一切大人法諸仙行等悉無餘為欲利益眾生故若有眾生壽無量煩惱微細樂具足菩薩於中得自在示受老病死眾患或有貪欲瞋恚癡煩惱猛火常熾然菩薩為現老病死令彼眾生悉調伏如來十力無所畏及以十八不共法所有無量諸功德悉以示現度眾生記心教誡及神足悉是如來自在用彼諸大士皆示現能使眾生盡調伏菩薩種種方便門隨順世法度眾生譬如蓮華不著水如是在世令深信此下有十七偈明四攝攝生三昧門初一偈總標下別顯言四攝者一布施二愛語三同事四利行劫中饑饉下四偈乃布施攝次迦陵頻伽下二偈愛語攝眾生苦樂下二偈同事攝若有不識下八偈明利行攝言利行者謂說趨義利之行以益有情此八偈明四段初二偈明一切利行次菩薩示行下二偈明遂求利行謂眾生為八纏所繞開解令離故名遂求或有貪欲下二偈即一切種利行初頌即應攝受者而攝受之次偈即應調伏者而調伏之記心教誡下二偈即一切門利行謂不信者令信故亦總結諸利行也六四攝攝生三昧門竟雅思淵才文中王歌舞談說眾所欣一切世間眾技術譬如幻師無不現或為長者邑中主或為賈客商人導或為國王及大臣或作良醫善眾論或於曠野作大樹或為良藥眾寶藏或作寶珠隨所求或以正道示眾生若見世界始成立眾生未有資身具是時菩薩為工匠為之示現種種業不作逼惱眾生物但說利益世間事呪術藥草等眾論如是所有皆能說一切仙人殊勝行人天等類同信仰如是難行苦行法菩薩隨應悉能作或作外道出家人或在山林自勤苦或露形體無衣服而於彼眾作師長或現邪命種種行習行非法以為勝或現梵志諸威儀於彼眾中為上首或受五熱隨日轉或持牛狗及鹿戒或著壞衣奉事火為化是等作導師或有示謁諸天廟或復示入恒河水食根果等悉示行於彼常思已勝法或現蹲踞或翹足或臥草棘及灰上或復臥杵求出離而於彼眾作師首如是等類諸外道觀其意解與同事所示苦行世靡堪令彼見已皆調伏眾生迷惑稟邪教住於惡見受眾苦為其方便說妙法悉令得解真實諦或邊呪語說四諦或善密語說四諦或人直語說四諦或天密語說四諦分別文字說四諦決定義理說四諦善破於他說四諦非外所動說四諦或八部語說四諦或一切語說四諦隨彼所解語言音為說四諦令解脫所有一切諸佛法皆如是說無不盡知語境界不思議是名說法三昧力第七雅思淵才下十七頌俯同世間三昧門於中三初六偈身同世間利益眾生若依若正無不示為次六偈示同外道救彼邪黨次眾生迷惑下五偈明語業大用次所有一切下一偈總結非唯說四諦六度萬行等皆然一心說法得語實性能起隨類之用名三昧力七俯同世間三昧竟
