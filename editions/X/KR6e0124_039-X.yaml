body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈十地品第二十六之六第十法雲地所以來者瑜伽意云雖於一切品類宣說法中得大自在而未能得圓滿法身現在證受今勤修習已得圓滿故有此來論云於九地中已作淨佛國土及化眾生第十地中修行令智覺滿此是勝故以八九二地同無功用故對之顯勝有此地來又一乘中居最極故雲者是喻略有三義一含水義二覆空義三注雨義約法就喻則有多義雲有四義一喻智慧二喻法身三喻應身四喻多聞熏因空亦四義一喻真如二喻麤重三喻法身四喻黎耶攝大乘論云由得總緣一切法智含藏一切陀羅尼門此喻含水義總緣一切法契經等智不離真如如雲合空總持三昧即是水也又云譬如大雲能覆如空廣大障故此喻覆空義即以前智能覆惑智二障又云推於法身能圓滿故此有二義一喻霪雨義即上之智出生功德充滿所依法身故二喻徧滿即前之智自滿法身耳故金光明云法身如虗空智慧如大雲而瑜伽云麤重之身廣如虗空法身圓滿譬如大雲皆能遍覆此同攝論第二義而無性釋以智覆空此以法身者智滿則法身圓滿起信論云顯現法身智純淨故本分云得大法身具足自在亦以法身喻雲莊嚴論云於十地中由三昧門及陀羅尼門攝一切聞熏習因徧滿阿黎識中譬如浮雲遍滿虗空能以此聞熏習雲於一剎那於一一相於一一好於一一毛孔雨無量無邊法雨充足一切所化眾生由能如雲雨法雨故此從法身未及佛故立賴耶名瑜伽又意云言大雲者未現等覺若現等覺能雨大雨作利益故是則密雲不雨含德而已然諸釋雖眾不出三義謂以智慧含德徧斷諸障徧證法身故所覆麤重即所離障謂於諸法中不得自在障此障十地大法智雲及所含藏所起事業故斯即二愚障所起業名大神通愚障大智雲即悟入微細祕密愚斷此障故便能證得業自在等所依真如謂神通作業總持定門皆自在故便成受位等行具智波羅蜜得化身三昧等果即是雲雨究竟成佛法身及所證如皆一所遍虗空其旨一耳淨居天眾那由他聞此地中諸勝行空中踊躍心歡喜悉共虔誠供養佛不可思議菩薩眾亦在空中大歡喜俱然最上悅意香普熏眾會令清淨自在天王與天眾無量億數在虗空普散天衣供養佛百千萬種繽紛下次正釋文文中三分先讚請中有十六偈前十三讚後三請前中亦二前三偈但申供養有三類可知天諸采女無有量靡不歡欣供養佛名奏種種妙樂音悉以此言而讚歎後十偈天女供讚於中亦二初一總標供讚佛身安坐一國土一切世界悉現身身相端嚴無量億法界廣大悉充滿於一毛孔放光明普滅世間煩惱闇國土微塵可知數此光明數不可測餘九正顯讚辭於中亦二前八讚佛德後一勸修利益前中亦二前五讚大用自在後顯自在所由前中亦二前二用益普周或見如來具眾相轉於無上正法輪或見遊行諸佛剎或見寂然安不動後三隨見不等於中亦二初一總明或現住於兜率宮或現下生入母胎或示住胎或出胎悉令無量國中見或現出家修世道或現道場成正覺或現說法或涅槃普使十方無不覩後二八相上五偈讚大用自在下顯自在所由譬如幻師知幻術在於大眾多所作如來智慧亦復然於世間中普現身佛住甚深真法性寂滅無相同虗空而於第一實義中示現種種所行事所作利益眾生事皆依法性而得有相與無相無差別入於究竟皆無相後所由中亦二初一智了世幻故文有喻合後二證窮性相故於中半偈證體半偈起用半偈用不離體半偈體用俱泯若有欲得如來智應離一切妄分別有無通達皆平等疾作人天大導師後一勸修上十三偈竟下三偈請無量無邊天女眾種種言音稱讚已身心寂靜共安樂瞻仰如來默然住即時菩薩解脫月知諸眾會咸寂靜向金剛藏而請言大無畏者真佛子從第九地入十地所有功德諸行相及以神通變化事願聰慧者為宣說後三請中初一結默念請後二上首言請爾時金剛藏菩薩摩訶薩告解脫月菩薩言佛子菩薩摩訶薩從初地乃至第九地以如是無量智慧觀察覺了已善思惟修習善滿足白法集無邊助道法增長大福德智慧廣行大悲知世界差別入眾生界稠林入如來所行處隨順如來寂滅行常觀察如來力無所畏不共佛法名為得一切種一切智智受職位第二正說論分八分一方便作滿足地分攝前九地所修總為方便滿此地故二得三昧分初住地行行德無量徧舉受職之所依故三得受位分正住地行依前定力攝佛智故四入大盡分是地滿行望前諸地行已窮盡今復地滿盡之極故五釋名分此地學窮辯德顯稱故六神力有上無上分地滿足已妙用自在形前無質形佛劣故七地影像分以喻顯法如因影像知形質故八地顯益分彰說殊勝勸修趣入故後之二分通該十地將前攝後故云此地有八若依前長科後二分通則此地分二先明地行後彰地果地行之中止有六分如上所列六中初一是入心餘是住心出心即調柔果今初分中二先總明後善滿下別顯今初無量智者阿含廣故觀察覺了者證智深故寶性論中地上菩薩起二修行一約根本智名如實修即此證智二約後得智名偏修行即此廣智諸地具起上二種行今於上二決擇思修別中十句攝為七相初三七八三處合故七中一善修行故即是同相謂初三句明證助不住諸地同修故初句證道無漏白法故何以得證由次句助道何因助成由後句不住道增福德故不住無為增智慧故不住有為後六別相謂二廣行大悲即普徧隨順自利利他相此總前七地合為一相以七地差別之相八地之初已辨故此總舉普徧釋廣隨順釋行大悲利他而成自業故云自利三一句令佛土淨即八地相下三相即九地以親證此故多舉之四一句教化眾生相即九地自分行入十一稠林故五有二句善解相謂解達真如是佛所行處故善順如來能證寂滅行故六無厭足相常勤觀察力等欲趣入故上句解此句行並九地勝進故前地云晝夜專勤更無餘念唯入佛境界故七地盡至入相謂十地證窮故同前諸地結行入位已屬十地故云名為得受職位上一方便作滿足地分竟佛子菩薩摩訶薩以如是智慧入受職地已第二三昧分於中二初牒前起後即得菩薩離垢三昧入法界差別三昧莊嚴道場三昧一切種華光三昧海藏三昧海印三昧虗空界廣大三昧觀一切法自性三昧知一切眾生心行三昧一切佛皆現前三昧次即得下正顯於中四初別舉十名二如是等下結所得數三菩薩於此下彰入滿足四其最後下顯最後名今初十中初總餘別總云離垢者離煩惱垢故是障盡地偏受此名別中九定離八種垢一入密無垢謂解入事事法界深密之處不與惑俱故二近無垢萬行已圓道場斯近故上來初一是解次一是行下三成德即三業密也三放光無垢謂光開心華令其見實亦能坐種種大寶蓮華光無不照故四陀羅尼無垢如海包藏五起通無垢則無心頓現上五皆起法身之定也六有二定清淨佛土無垢上句無量則盡法界之疆域下句正觀窮國土之體性上六自利七化生無垢上之二利皆自分行八正覺無垢謂勝進上覺將成菩提時一切諸佛迭共現前而證知故如下受職處說以本覺將現前故如是等百萬阿僧祇三昧皆現在前三結數者亦是眷屬皆現前者久修成就不加功用自然現故菩薩於此一切三昧若入若起皆得善巧亦善了知一切三昧所作差別三彰入滿足中能入者通方便定體入起相即隱顯無方故云善巧善了所作即知業用其最後三昧名受一切智勝職位四彰後名者將說受位分故一切智者佛無別智也論經重言智者兼後得智二智平等名受位也此三昧現在前時有大寶蓮華忽然出生其華廣大量等百萬三千大千世界以眾妙寶間錯莊嚴超過一切世間境界出世善根之所生起知諸法如幻性眾行所成恒放光明普照法界非諸天處之所能有毗瑠璃摩尼寶為莖栴檀王為臺碼碯為鬚閻浮檀金為葉其華常有無量光明眾寶為藏寶網彌覆十三千大千世界微塵數蓮華以為眷屬第三明受位分於中有四一法二喻三合四結今初有六一座二身三眷屬四相五出處六得位六中前五自分德後一上攝佛果前中初三位體次一位相後一位用前三即依正眷屬今初隨何等座謂大蓮華王座故於中二先明主華自有十相一主相即實蓮華二其華下量相三以眾如下勝相具德故四超過下地相生處故五出世下因相六知諸下成相七恒放下第一義相正觀普照法界現事故如世蓮華開敷菡萏為第一故八非諸天下功德相菩薩德招故九毗瑠璃下體相十其華下莊嚴相二十三千下明眷屬華補義曰一真法界如來藏心不屬迷悟故聖凡平等依正不二染淨融通具有恒沙稱性功德一一周徧圓融該攝事事無礙與法界等故統曰法界但眾生迷此一心而為恒沙染緣故有生死惟我毗盧遮那曠大劫來先悟此心名為普光明智依此大智而為行本建立萬行故以十信為基以歷三賢十地大智深證惑盡真窮故本有如來藏心頓然顯現名證法身之體酬此勝因故內感盧舍那佛廣大微妙莊嚴之報身外感華藏莊嚴之報土此轉凡成聖之極則也今說菩薩十地因窮將證法身堪能克紹法界之家名受職位故此位菩薩已能入百萬阿僧祇三昧智與理冥行極道圓故但以三昧融前差別之行攝入平等法界故此三昧現前時有大蓮華忽然出現而華具十相而為全德之象其猶周易乾之九五飛龍在天利見大人之象也其疏釋文有據而通途大義未暇及此爾時菩薩坐此華座身相大小正相稱可第二隨何等身殊妙之身稱於座故無量菩薩以為眷屬各坐其餘蓮華之上周帀圍繞一一各得百萬三昧向大菩薩一心瞻仰三隨何眷屬佛子此大菩薩并其眷屬坐華座時所有光明及以言音普皆充滿十方法界一切世界咸皆震動惡趣休息國土嚴淨同行菩薩靡不來集人天音樂同時發聲所有眾生悉得安樂以不思議供養之具供一切佛諸佛眾會悉皆顯現四隨何等相周徧作業為其相故佛子此菩薩坐彼大蓮華座時於兩足下放百萬阿僧祇光明普照十方諸大地獄滅眾生苦於兩膝輪放百萬阿僧祇光明普照十方諸畜生趣滅眾生苦於䐡輪中放百萬阿僧祇光明普照十方閻羅王界滅眾生苦從左右脇放百萬阿僧祇光明普照十方一切人趣滅眾生苦從兩手中放百萬阿僧祇光明普照十方一切諸天及阿修羅所有宮殿從兩肩上放百萬阿僧祇光明普照十方一切聲聞從其項背放百萬阿僧祇光明普照十方辟支佛身五隨何處出十處出光令惡道出離菩薩增行故文分為四一舒光作業二眾聖咸知三下類奔風四同聲相應今初十處放光有三種業一利益業二發覺業三攝伏業今類例相從且分為四一前之七光但有益業前五益凡後二益小從其面門放百萬阿僧祇光明普照十方初始發心乃至九地諸菩薩身二第八一光有二業半一者益益九地已還菩薩故二者發覺令知故言一半者但有攝而無伏義攝彼令來故從兩眉間放百萬阿僧祇光明普照十方受職菩薩令魔宮殿悉皆不現第九一光亦二業半一益等位菩薩故下文彼光既令此益此光必益於彼故二發覺令知故言一半者魔宮不現但是伏業而無攝義從其頂上放百萬阿僧祇三千大千世界微塵數光明普照十方一切世界諸佛如來道場眾會四第十頂光但有發覺文分為三一顯照分齊右繞十帀住虗空中成光明網名熾然光明發起種種諸供養事供養於佛餘諸菩薩從初發心乃至九地所有供養而比於此百分不及一乃至筭數譬喻所不能及其光明網普於十方一一如來眾會之前雨眾妙香華鬘衣服幢幡寶蓋諸摩尼等莊嚴之具以為供養皆從出世善根所生起過一切世間境界若有眾生見如此者皆於阿耨多羅三藐三菩提得不退轉二右繞下正顯作業謂興供成益益言不退菩提者論有四義一於登地證決定故二入正定聚故三定離放逸惡故四定即善事故佛子此大光明作於如是供養事畢復繞十方一切世界一一諸佛道場眾會經十帀已從諸如來足下而入三佛子下事訖收光言足下入者若約教相頂光入足顯深敬故若約證實終極之智從下趣入諸佛境故顯證佛境即自證故上初舒作業竟爾時諸佛及諸菩薩知某世界中某菩薩摩訶薩能行如是廣大之行到受職位第二眾聖咸知佛子是時十方無量無邊乃至九地諸菩薩眾皆來圍繞恭敬供養一心觀察正觀察時其諸菩薩即各獲得十千三昧第三下位奔風申敬獲益當爾之時十方所有受職菩薩皆於金剛莊嚴臆德相中出大光明名能壞魔怨百萬阿僧祇光明以為眷屬普照十方現於無量神通變化作是事已而來入此菩薩摩訶薩金剛莊嚴臆德相中其光入已令此菩薩所有智慧勢力增長過百千倍第四同聲相應以修平等因行互相資故表內吉祥深廣之德嚴心已圓故外於此相放光相益又上此照彼放眉間光表中道已照今彼照此乃於胷相者表心契懸同德圓魔盡名壞魔怨爾時十方一切諸佛從眉間出清淨光明名增益一切智神通無數光明以為眷屬普照十方一切世界右繞十帀示現如來廣大自在開悟無量百千億那由他諸菩薩眾周徧震動一切佛剎滅除一切諸惡道苦隱蔽一切諸魔宮殿示一切佛得菩提處道場眾會莊嚴威德如是普照盡虗空徧法界一切世界已而來至此菩薩會上周帀右繞示現種種莊嚴之事第六爾時十方下明隨所得位於中二一放光於中十業初光名即益業益一切智令佛成故二無數下是眷屬光是因業三示現下示佛是敬業四開悟下開悟業五周徧下振動業六滅除下止惡業七隱蔽下降魔業八示一切下示現業九如是下卷舒業十示現種種變化業現是事已從大菩薩頂上而入其眷屬光明亦各入彼諸菩薩頂當爾之時此菩薩得先所未得百萬三昧名為已得受職之位入佛境界具足十力墮在佛數二現是事已下入頂成益入頂者若約化相上收於下也若約實義照極心源名為智頂成果在己是為光入論云諸如來光明彼菩薩迭互智平等攝受故謂菩薩頂光入佛足則因上進於果也佛光入菩薩頂果收因也亦因收果入則無跡因果雙亡名平等也當爾之時下得益名為下結位入佛境者所證同也具十力者行德同也墮佛數者如始出家便墮僧數補義曰十地菩薩當受職時通身上下放十種光遍照十法界窮盡十方微塵剎土上與諸佛主伴并同行受職菩薩下及六道三途互相交徹成光明網作諸事業者顯此根本普光明智為十法界一切聖凡染淨根本眾生各各性自具足向為無明障蔽其體故根塵隔越自他分別而為生死染緣不顯其大用今菩薩依此本智創立信心歷劫熏修無明既破法身顯現則本有智光一旦煥發稱法界量照徹無遺所謂自然而有不思議業種種廣大之業用此返妄歸真究竟之地將躋正等正覺故此受職菩薩坐大寶蓮華以顯得體其放十處光明以顯得用了此光明則知修因究竟成就之實證也故此地菩薩乃總會前三賢九地之因成一圓融極果當紹覺位故為輪王正后太子灌頂受職之象也上受位法竟下喻佛子如轉輪聖王所生太子母是正后身相具足其轉輪王令此太子坐白象寶妙金之座張大網幔建大幢幡然香散華奏諸音樂取四大海水置金瓶內王執此瓶灌太子頂是時即名受王職位墮在灌頂剎利王數即能具足行十善道亦得名為轉輪聖王第二喻喻上六事文少不次初喻隨何身二其轉輪下喻隨何座三張大下喻隨何相四取四大下喻隨所得位王喻真身手喻應身瓶喻白毫水喻相光應有第三隨何等眷屬謂文武百僚以為輔弼五即能下明隨何等出處菩薩受職亦復如是諸佛智水灌其頂故名為受職具足如來十種力故墮在佛數第三合但合隨所得位正意在此故佛子是名菩薩受大智職菩薩以此大智職故能行無量百千萬億那由他難行之行增長無量智慧功德名為安住法雲地第四總結結斯一分上三得受位分竟下文第四佛子菩薩住此法雲下明入大晝分於中有五種大一智大二解脫大三三昧大四陀羅尼大五神通大此五依五種義一依正覺實智義離智障故二依心自在義離煩惱障故三依發心即成就一切事義意定力故四依一切世間隨利益眾生義意能遍持口能遍隨故五依堪能度眾生義身及諸通廣能運故前二自利後三利他上敘科下釋文佛子菩薩摩訶薩住此法雲地如實知欲界集色界集無色界集世界集法界集有為界集無為界集眾生界集識界集虗空界集涅槃界集此菩薩如實知諸見煩惱行集知世界成壞集知聲聞行集辟支佛行集菩薩行集如來力無所畏色身法身集一切種一切智智集示得菩提轉法輪集入一切法分別決定智集舉要言之以一切智知一切集文中三前二別明後三合例今初智大分二先別明後總結今初有七種智一集智大二應化智大三加持智大四入微細智大五密處智大六入劫智大七入道智大此七展轉相生今初集智依能斷疑力了法緣集故緣集者謂一切諸法依緣集而起故一妄緣集謂三界虗妄唯一心作如夢所見唯是心解二真緣集一切諸法皆真心起如夢所見皆報心作又識論有三一事緣集從事緣起一切法二妄緣集從其妄緣起一切法三真緣集真識體中具過一切恒沙性德互相集成故言緣集今文中先別明後舉要下總結前中有二十集皆明因緣集然通真妄及與和合故有三分一染分二淨分三滅分在文有六重一唯染謂初四及眾生集諸見煩惱集二唯淨謂聲聞已下諸集三唯滅謂虗空四淨染合說謂識及有為世界成壞五淨滅合說謂無為及涅槃擇滅無為為淨非擇滅為滅性淨涅槃為滅餘三為淨六通染淨滅謂法界故論云隨所正不正以法界通善不善及無為故而論諸句皆有隨所言者隨何等差別皆能知故佛子此菩薩摩訶薩以如是上上覺慧如實知眾生業化煩惱化諸見化世界化法界化聲聞化辟支佛化菩薩化如來化一切分別無分別化如是等皆如實知第二佛子下明應化智中三初牒前起後以依前緣集智身起化用故故論云依彼身起力次如實下正顯後如是下總結顯中十句初三眾生世間自在化化起眾生善惡業及利鈍使令眾生見似真造作故造次一句器世間自在化次五智正覺世間自在化三乘正覺故一法界化為三乘所說法行餘四化為三乘人及果後一通三世間有性有分別器無分別智正覺通上二也又如實知佛持法持僧持業持煩惱持時持願持供養持行持劫持智持如是等皆如實知第三又如實下加持智論云依如是如是轉行力謂依彼應化常化不絕為加持行其事非一重言如是有十一句初三不斷三寶是境界持餘人是行持於中初二是逆行勝熱炙身無厭行虐婆須染欲徧行處邪皆其事也後六順行前四起因行時謂起因之時願等因體後二得果在時時謂長劫智即果體謂一切智智故又如實知諸佛如來入微細智所謂修行微細智命終微細智受生微細智出家微細智現神通微細智成正覺微細智轉法輪微細智住壽命微細智般涅槃微細智教法住微細智如是等皆如實知第四明微細智謂知佛化用微細自在故論云依彼應化加持善集不二作故謂依前應化等三智合為不二之智作此微細化用故隨應化一事即具前三非但八相一具餘七又入如來祕密處所謂身祕密語祕密心祕密時非時思量祕密授菩薩記祕密攝眾生祕密種種乘祕密一切眾生根行差別祕密業所作祕密得菩提行祕密如是等皆如實知第五又入下明密處智依護根未熟眾生不令驚怖故現麤隱細而祕密俱成初三即總顯三密次三別顯起化密一意知化時二口與其記謂懈怠遲記或引實行聲聞與應化者記又昔但記菩薩則於聲聞記為祕密隨機隱顯後攝眾生密論經云攝伏謂攝受折伏皆通身口次一教密約實則無三說三三即為密但為化菩薩故約機非一說一一亦為密後三約所知明密知根種種知業萬差知逆順行皆得菩提故為密也又知諸佛所有入劫智所謂一劫入阿僧祇劫阿僧祇劫入一劫有數劫入無數劫無數劫入有數劫一念入劫劫入一念劫入非劫非劫入劫有佛劫入無佛劫無佛劫入有佛劫過去未來劫入現在劫現在劫入過去未來劫過去劫入未來劫未來劫入過去劫長劫入短劫短劫入長劫如是等皆如實知第六又知下明入劫智依命行加持捨自在意謂劫時遷流名為命行一攝一切名曰加持一入一切名之為捨以廢己同他故劫隨心轉名為自在亦十世隔法異成門也以得不思議解脫不見長短一多大小互相即入等並如發心品又知如來諸所入智所謂入毛道智入微塵智入國土身正覺智入眾生身正覺智入眾生心正覺智入眾生行正覺智入隨順一切處正覺智入示現徧行智入示現順行智入示現逆行智入示現思議不思議世間了知不了知行智入示現聲聞智辟支佛智菩薩行如來行智第七又知如來下明入道智論云依對治意說謂徧入諸道若逆若順皆為對治無非入道此約知凡夫道若約知化凡夫道即此逆順等便是佛道別中有十四句初句總入所化謂毛道凡夫隨風不定故論經云入凡夫道論云依凡夫地餘句別顯所化各有三種一依我慢行者令入微塵智觀破摶聚唯塵無我故二依信求生天者入淨國土過於所信故餘皆依覺觀者於中初句起覺觀身次二句正顯覺觀心行差別次句明所覺境上四即所化之覺觀次四句能化之行初句顯徧行故次二隨宜若逆若順後句若深若淺後四句化令入三乘果佛子一切諸佛所有智慧廣大無量此地菩薩皆能得入第二總結前七皆佛之智菩薩能入故名智大智大竟佛子菩薩摩訶薩住此地第二明解脫大中三初標得位即得菩薩不思議解脫無障礙解脫淨觀察解脫普照明解脫如來藏解脫隨順無礙輪解脫通達三世解脫法界藏解脫光明輪無餘境界解脫次即得下略顯有十總約通智為對初依神通境界轉變自在言念不及故云不思議如淨名所得二能至無量世界以願智力無拘礙故云無障礙三明離障解脫故云淨觀離障有二並皆知之一約位則世出世間所離不同二就出世中學無學別此學無學並通三乘上三中前二約通此一約智共為一對總相以明約身明通約人顯智次三一對一通二智四約心明通故云普照普照物機隨意轉變一時普應如觀音普門示現故次二約法明智五即法陀羅尼顯如來藏中蘊恒沙性德故六即能破他言隨彼言破無礙圓滿故云隨順無礙次二一對相入通智約時明通由達三世劫隨意住持相入故約因緣集顯智一切種皆包藏法界之中故云法界藏後二一對約相即明通智約身明通不離一身光明輪而普照故是解脫光輪約時明智即一而能知多故云無餘境界此十為首有無量百千阿僧祇解脫門皆於此第十地中得後此十下結廣如是乃至無量百千阿僧祇三昧門無量百千阿僧祇陀羅尼門無量百千阿僧祇神通門皆悉成就第三如是下總例餘三大盡分竟下釋名分佛子此菩薩摩訶薩通達如是智慧隨順無量菩提成就善巧念力大文第釋名分中三一能受如來大法雲雨故名法雲二佛子此地菩薩以自願下明能注雨滅惑故名法雲三佛子此地菩薩於一念下明注雨生善故名法雲然後之二段從自受名今此一段從所立名論云法雲相似以徧覆故此地中聞法相似猶如虗空身徧覆故謂佛身雲徧覆法界法雨益多唯此能受故名法雲文中二先總明能受之德由前七智成就念力能受多法此智實成多德故云無量菩提近說受持之義耳十方無量諸佛所有無量大法明大法照大法雨於一念頃皆能安能受能攝能持譬如娑伽羅龍王所霪大雨唯除大海餘一切處皆不能安不能受不能攝不能持如來祕密藏大法明大法照大法雨亦復如是唯除第十地菩薩餘一切眾生聲聞獨覺乃至第九地菩薩皆不能安不能受不能攝不能持次別顯受法之相於中三初總顯受多二歷數顯多三問答顯多今初有法喻合法中三一明所受法多二大法明下所受法妙故下合云祕密藏也文有三句上二句性故謂三慧所知名法自性大法明是聞思智攝受故照是修慧所攝受故下句作故謂說受眾生如雲與他雨法雨故於一念下顯能受德一念者速故既多妙又速展轉顯勝能安者堪能安受文故受者信受故上二受文攝者思惟攝取義故持者攝受後文義成二持故此但順說下喻合返顯不能佛子譬如大海能安能受能攝能持一大龍王所霪大雨若二若三乃至無量諸龍王雨於一念間一時霪下皆能安能受能攝能持何以故以是無量廣大器故住法雲地菩薩亦復如是能安能受能攝能持一佛法明法照法雨若二若三乃至無量於一念頃一時演說悉亦如是是故此地名為法雲第二歷數顯多中先喻後合海能安者受一切水故受者不濁故濁如不信攝者餘水數入失本名故持者用不可盡故解脫月菩薩言佛子此地菩薩於一念間能於幾如來所安受攝持大法明大法照大法雨第三問答顯多中先問後答金剛藏菩薩言佛子不可以算數能知我當為汝說其譬喻佛子譬如十方各有十不可說百千億那由他佛剎微塵數世界其世界中一一眾生皆得聞持陀羅尼為佛侍者聲聞眾中多聞第一如金剛蓮華上佛所大勝比丘然一眾生所受之法餘不重受佛子於汝意云何此諸眾生所受之法為有量耶為無量耶解脫月菩薩言其數甚多無量無邊金剛藏菩薩言佛子我為汝說令汝得解佛子此法雲地菩薩於一佛所一念之頃所安所受所攝所持大法明大法照大法雨三世法藏前爾所世界一切眾生所聞持法於此百分不及一乃至譬喻亦不能及答中二先校量顯示一佛之所受法廣多如一佛所如是十方如前所說爾所世界微塵數佛復過此數無量無邊於彼一一諸如來所所有法明法照法雨三世法藏皆能安能受能攝能持是故此地名為法雲後如一佛下類顯多佛言三世法藏者三世佛法之藏也而論云於法界中三種事藏者意取法明照雨蘊在法界故以彼經云法界藏故故為此釋佛子此地菩薩以自願力起大悲雲震大法雷通明無畏以為電光福德智慧而為密雲現種種身周旋往返於一念頃普徧十方百千億那由他世界微塵數國土演說大法摧伏魔怨復過此數於無量百千億那由他世界微塵數國土隨諸眾生心之所樂霔甘露雨滅除一切眾生業惑塵𦦨是故此地名為法雲第二霔雨滅惑釋名中此中雲等如出現品廣明悲雲普覆故法雷驚蟄故通明無畏照機速疾令見道故以福智因成種種身如雲形顯多故法雨正能破四魔故佛子此地菩薩於一世界從兜率天下乃至涅槃隨所應度眾生心而現佛事若二若三乃至如上微塵數國土復過於此乃至無量百千億那由他世界微塵數國土皆亦如是是故此地名為法雲第三霔雨生善釋名八相漸益故可知五釋名竟佛子此地菩薩智慧明達神通自在大文第六神通力有上無上分中有六種相一依內二依外三自相四作住持相五令歡喜相六者大勝若就經文分二前四合為一段正顯神通後二為一斷顯勝今初分二先別明後總結別中三初明依內智慧明達者即起通之智亦陀羅尼二神通者是通體三自在即通德亦攝不思議解脫及與三昧具此三事即通無上隨其心念能以狹世界作廣世界廣世界作狹世界第二依外謂業用依外境而起故亦是第三依自相謂轉變作用是神通相故此二經文是一義分為二今依自相釋文自有二種一轉變外事於中三一同類略廣轉垢世界作淨世界淨世界作垢世界亂住次住倒住正住如是無量一切世界皆能互作二垢淨異事轉或隨心念於一塵中置一世界須彌盧等一切山川塵相如故世界不減或復於一微塵之中置二置三乃至不可說世界須彌盧等一切山川而彼微塵體相如本於中世界悉得明現或隨心念於一世界中示現二世界莊嚴乃至不可說世界莊嚴或於一世界莊嚴中示現二世界乃至不可說世界或隨心念以不可說世界中眾生置一世界或隨心念以一世界中眾生置不可說世界而於眾生無所嬈害三塵容世界等是自在轉或隨心念於一毛孔示現一切佛境界莊嚴之事二應化自身可知上二依外或隨心念於一念中示現不可說世界微塵數身一一身示現如是微塵數手一一手各執恒河沙數華奩香篋鬘蓋幢幡周徧十方供養於佛一一身復示現爾許微塵數頭一一頭復現爾許微塵數舌於念念中周徧十方歎佛功德或隨心念於一念間普徧十方示成正覺乃至涅槃及以國土莊嚴之事或現其身普徧三世而於身中有無量諸佛及佛國土莊嚴之事世界成壞靡不皆現或於自身一毛孔中出一切風而於眾生無所惱害或隨心念以無邊世界為一大海此海水中現大蓮華光明嚴好徧覆無量無邊世界於中示現大菩提樹莊嚴之事乃至示成一切種智或於其身現十方世界一切光明摩尼寶珠日月星宿雲電等光靡不皆現或以口噓氣能動十方無量世界而不令眾生有驚怖想或現十方風災火災及以水災或隨眾生心之所樂示現色身莊嚴具足或於自身示現佛身或於佛身而現自身或於佛身現己國土或於國土而現佛身第三作住持相謂常用不絕故佛子此法雲地菩薩能現如是及餘無量百千億那由他自在神力二總結神通分竟下斷疑顯勝爾時會中諸菩薩及天龍夜叉乾闥婆阿脩羅護世四王釋提桓因梵天淨居摩醯首羅諸天子等咸作是念若菩薩神通智力能如是者佛復云何第二爾時下斷疑顯勝中二先斷疑後顯勝今初即論生喜由疑除故於中二先示自神通力斷疑二說法斷疑今初有二問答初一問答顯神力無上令眾歡喜後一問答顯神力有上令眾歡喜前中先問後答問中先大眾生疑舉佛疑菩薩如上之事佛可得爾菩薩豈然爾時解脫月菩薩知諸眾會心之所念白金剛藏菩薩言佛子今此大眾聞其菩薩神通智力墮在疑網善哉仁者為斷彼疑當少示現菩薩神力莊嚴之事後上首為請時金剛藏菩薩即入一切佛國土體性三昧答中二一入定現通二問答決擇今初即事為驗故於中三一法主入定國土體性無所不容故能一身包容無外入此三昧時諸菩薩及一切大眾皆自見身在金剛藏菩薩身內於中悉見三千大千世界所有種種莊嚴之事經於億劫說不能盡又於其中見菩提樹其身周圍十萬三千大千世界高百萬三千大千世界枝葉所蔭亦復如是稱樹形量有師子座座上有佛號一切智通王一切大眾悉見其佛坐菩提樹下師子座上種種諸相以為莊嚴假使億劫說不能盡二入此下眾覩希奇表通自在故佛號通王金剛藏菩薩示現如是大神力已還令眾會各在本處時諸大眾得未曾有生奇特想默然而住向金剛藏一心瞻仰三金剛藏下攝用增敬爾時解脫月菩薩白金剛藏菩薩言佛子今此三昧甚為希有有大勢力其名何等金剛藏言此三昧名一切佛國土體性第二問答決擇中三初問名字又問此三昧境界云何答言佛子若菩薩修此三昧隨心所念能於身中現恒河沙世界微塵數佛剎復過此數無量無邊二又問下業用分齊佛子菩薩住法雲地得如是等無量百千諸大三昧故此菩薩身身業不可測知語語業意意業神通自在觀察三世三昧境界智慧境界遊戲一切諸解脫門變化所作神力所作光明所作略說乃至舉足下足如是一切諸有所作乃至法王子住善慧地菩薩皆不能知三類顯廣多於中二初但結多定已顯業用難思佛子此法雲地菩薩所有境界略說如是若廣說者假使無量百千阿僧祇劫亦不能盡後佛子此法雲下結略顯廣則餘德無盡此中亦即大盡中事上初斷疑顯勝中初斷疑竟下顯神通力有上解脫月菩薩言佛子若菩薩神通境界如是佛神通力其復云何第二顯有上中謂劣於佛故先問後答問中即舉菩薩疑佛謂菩薩既實得爾則佛應不勝若言勝者其相云何故問辭則同疑意懸隔金剛藏言佛子譬如有人於四天下取一塊土而作是言為無邊世界大地土多為此土多我觀汝問亦復如是如來智慧無邊無等云何而與菩薩比量答中三一總呵問非顯佛德無量復次佛子如四天下取少許土餘者無量此法雲地神通智慧於無量劫但說少分況如來地二舉所未說顯佛德無量謂向所說法乃是十地德之少分如四天下之少土全將菩薩之德以比如來狀如四天下土以比無邊大地況將己說之少分以比如來則如一塊以比無邊大地佛證極故佛子我今為汝引事為證令汝得知如來境界佛子假使十方一一方各有無邊世界微塵數諸佛國土一一國土得如是地菩薩充滿如甘蔗竹葦稻麻叢林彼諸菩薩於百千億那由他劫修菩薩行所生智慧比一如來智慧境界百分不及一乃至優波尼沙陀分亦不能及第三引事類顯佛德無量上通力斷疑竟佛子此菩薩住如是智慧不異如來身語意業不捨菩薩諸三昧力於無數劫承事供養一切諸佛一一劫中以一切種供養之具而為供養一切諸佛神力所加智慧光明轉更增勝於法界中所有問難善為解釋百千億劫無能屈者第二佛子下說法斷疑者謂此地菩薩智慧能令眾生入一切智復顯上說其德不虗故疑除生喜上明位行竟下明位果佛子譬如金師以上妙真金作嚴身具大摩尼寶鈿廝其間自在天王身自服戴其餘天人莊嚴之具所不能及此地菩薩亦復如是始從初地乃至九地一切菩薩所有智行皆不能及此地菩薩智慧光明能令眾生乃至入於一切智智餘智光明無能如是佛子譬如摩醯首羅天王光明能令眾生身心清涼一切光明所不能及此地菩薩智慧光明亦復如是能令眾生皆得清涼乃至住於一切智智一切聲聞辟支佛乃至第九地菩薩智慧光明悉不能及佛子此菩薩摩訶薩已能安住如是智慧諸佛世尊復更為說三世智法界差別智徧一切世界智照一切世界智慈念一切眾生智舉要言之乃至為說得一切智智此菩薩十波羅蜜中智波羅蜜最為增上餘波羅蜜非不修行佛子是名略說菩薩摩訶薩第十法雲地若廣說者假使無量阿僧祇劫亦不能盡此下第二明其位果於中亦有三果今初調柔果中五一調柔行二此地菩薩智慧下教智淨三佛子此菩薩已能安住下勝過自在四此菩薩十波羅蜜下別地行相五佛子是名下總結地名五中合為說法令喜可知後三及餘二果俱名大勝顯義多含就大勝中初三明神通勝就前文第三先明過勝自在於中三初牒前次諸佛下別顯後舉要下總結別中五句為三初句即能斷疑行謂令通達三世之中所有道義故二一句速疾神通行聞說如來祕密法界故三餘三句等作助行謂以平等三道助通化益故於中初句作淨佛國土平等化即是助道次句作法明平等化謂教智化後句作正覺平等化謂慈念令得證智故故論經云令一切眾生得證法故餘別地結名及算數等並可知佛子菩薩住此地多作摩醯首羅天王於法自在能授眾生聲聞獨覺一切菩薩波羅蜜行於法界中所有問難無能屈者布施愛語利行同事如是一切諸所作業皆不離念佛乃至不離念具足一切種一切智智復作是念我當於一切眾生為首為勝乃至為一切智智依止者若勤加精進於一念頃得十不可說百千億那由他佛剎微塵數三昧乃至示現爾所微塵數菩薩以為眷屬二攝報果中得十不可說等名算數勝以二種事勝一切地故名大勝偏舉此二者以是神通有上無上門中明故若以菩薩殊勝願力自在示現過於此數所謂若修行若莊嚴若信解若所作若身若語若光明若諸根若神變若音聲若行處乃至百千億那由他劫不能數知第三願智果竟此品大科有十分前盡十地文七說分已竟後第八影像分以別說難曉以喻總明故有此分下大文第八後佛子此菩薩摩訶薩十地行相下地影像分於中四喻謂池山海珠喻四功德前二阿含德後二證德前中池喻修行功德即諸地中起修之行二山喻上勝功德即依修成德德位高出故三海喻難度能度大果功德即修所成德能至大果故謂大海難度十德皆徧故名能度大海難成由攬十德能成智海故云大果此釋法喻兼含矣四珠喻轉盡堅固功德謂從初地轉至法雲障盡證堅固又十地有三一是修地因前果後故初二喻顯之二是成地隨分修成即是佛智故珠喻顯之三是法地就佛智法開之為十故海喻顯之以後一融前二無有障礙又此四喻皆喻十地與彼佛智非一非異無差別之差別而旨趣各殊初一喻始異終同次山喻能所依別所依之地則一能依之山不同此則無差之差上二喻有能所依下二直喻地智不立能所三海喻全一佛智之體而十德不同德非別物又互相徧不同於山斯乃無差別之差別差即無差四珠喻唯是一珠前後之異唯一智體前後增明喻雖無差別不礙差別又初喻前後體別前非是後而後包前次喻前前非後後後後非前前而同依一體海喻前後雖殊而前後相徧珠喻前後一體而前前非後後後後必具前前初一即是圓家漸次喻圓中漸珠喻即是漸圓海喻圓圓也四喻圓融上來所解在論雖無理必應爾若得斯旨不疑十地差別等相佛子此菩薩摩訶薩十地行相次第現前則能趣入一切智智今初修行地中有法喻合法中始從歡喜終至法雲名次第行相次第既具則入智海譬如阿耨達池出四大河其河流注徧閻浮提既無盡竭復更增長乃至入海令其充滿譬中四大河者面各出一故具如十定品而言大者阿含婆沙云出二十河以四河去池四十里各分為四并本四為二十今就本河所以言大下云增長攝餘十六而勝鬘云八者以東面五河人皆具見餘三大河名聲普聞十二小河不聞不見故但言八佛子菩薩亦爾從菩提心流出善根大願之水以四攝法充滿眾生無有窮盡復更增長乃至入於一切智海令其充滿合中菩提心合地流出善根等四河依菩提心修四攝行自善增長故準十定四河今文含具一願智河即大願之水二波羅蜜河三三昧河即合善根四大悲河即以四攝法充滿眾生故言無有窮盡等者合上無盡竭大願等皆無盡也佛子菩薩十地因佛智故而有差別第二山喻上勝功德中有四初總舉於法次如因下總顯於喻三佛子如靈山下法喻對顯四佛子此十寶下總結法喻今初言因佛智者為修平等佛智而起諸行修既無窮故隨十地之行各一增上斯乃為修無差而成於差以本統末非全隔越如因大地有十山王何等為十所謂雪山王香山王陀梨山王神仙山王由乾陀山王馬耳山王尼民陀羅山王斫羯羅山王計都末底山王須彌盧山王第二總顯於喻喻意可知陀梨者此云種種持由乾陀此云雙持迴文即云持雙也尼民陀羅此云持邊斫羯羅此云輪圍計都末底此云幢慧佛子如雪山王一切藥草咸在其中取不可盡菩薩所住歡喜地亦復如是一切世間經書技藝文頌呪術咸在其中說不可盡佛子如香山王一切諸香咸集其中取不可盡菩薩所住離垢地亦復如是一切菩薩戒行威儀咸在其中說不可盡佛子如陀梨山王純寶所成一切眾寶咸在其中取不可盡菩薩所住發光地亦復如是一切世間禪定神通解脫三昧三摩鉢底咸在其中說不可盡佛子如神仙山王純寶所成五通神仙咸住其中無有窮盡菩薩所住𦦨慧地亦復如是一切道中殊勝智慧咸在其中說不可盡佛子如由乾陀羅山王純寶所成夜叉大神咸住其中無有窮盡菩薩所住難勝地亦復如是一切自在如意神通咸在其中說不可盡佛子如馬耳山王純寶所成一切諸果咸在其中取不可盡菩薩所住現前地亦復如是入緣起理聲聞果證咸在其中說不可盡如尼民陀羅山王純寶所成大力龍神咸住其中無有窮盡菩薩所住遠行地亦復如是方便智慧獨覺果證咸在其中說不可盡如斫羯羅山王純寶所成諸自在眾咸住其中無有窮盡菩薩所住不動地亦復如是一切菩薩自在行差別世界咸在其中說不可盡如計都山王純寶所成大威德阿脩羅王咸住其中無有窮盡菩薩所住善慧地亦復如是一切世間生滅智行咸在其中說不可盡如須彌盧山王純寶所成大威德諸天咸住其中無有窮盡菩薩所住法雲地亦復如是如來力無畏不共法一切佛事咸在其中問答宣說不可窮盡第三法喻對顯十山即對十地於中語其山體前二土山餘八是寶故論云是中純淨諸寶山喻八種地三地世間云何言淨論云厭地善清淨故謂能修善厭伏煩惱亦得為淨喻以寶山論但顯喻義含於法今略合之初地法藥初破無明故二地戒香三地禪等可蘊積故四地道品資助能生福故五地修無住不示滅故六地無漏慧資法身故七地功用滿足無所少故八地三世間化得自在故九地善知稠林得無礙辨破惑業故十地如佛降四魔故皆言集在其中如所說事能生一切物故不可盡者隨順修行不永斷不暫息故佛子此十寶山王同在大海差別得名菩薩十地亦復如是同在一切智中差別得名第四總結法喻即結成本意本意有二一既同智海得差別名則差非差也二互相顯義謂彼十大山因海得高勝名若在餘處不足為高故大海亦因大山得深廣名含斯大義故十地亦爾因修佛智故得高勝佛智亦因十地所不能窮方顯深廣故論云因果相顯前言依地即一切智地生長住持故此言依海即一切智海由深廣故以山依二處法含二義故更顯之又地則但依海兼明入故一一山皆深入大海一一地智皆入佛智又一一山皆有於地則一一地中皆有佛地又山在海海則非山山若依地山即是地法合是顯非一非異思之又山出海上高下等殊若入海中量加齊等十地教行則優劣懸差若證如入智量皆平等佛子譬如大海以十種相得大海名不可移奪何等為十一次第漸深二不受死屍三餘水入中皆失本名四普同一味五無量珍寶六無能至底七廣大無量八大身所居九潮不過限十普受大雨無有盈溢菩薩行亦復如是以十相故名菩薩行不可移奪何等為十所謂歡喜地出生大願漸次深故離垢地不受一切破戒屍故發光地捨離世間假名字故𦦨慧地與佛功德同一味故難勝地出生無量方便神通世間所作眾珍寶故現前地觀察緣生甚深理故遠行地廣大覺慧善觀察故不動地示現廣大莊嚴事故善慧地得深解脫行於世間如實而知不過限故法雲地能受一切諸佛如來大法明雨無厭足故第三大海十相明難度能度大果功德先喻後合皆有總別合中總云不可移奪者此有二義一果海因十地相不可奪其果海深廣之名二地行因相由依智海不可奪其因行之稱以是海家之相故果家之因故若奪因相則果亦不成喻中約果名不可奪法中舉因名不可奪文影略耳故論云因果相順故云何相順謂十地如大海此舉總也能度難度者顯因順果也如海十相方能成海得大菩提果故如海成時不失十相離十相而無海離十地而無佛智故十地即智海也別中攝十為八一易入功德以漸故二淨功德三平等功德四護功德護自一味恒不失故五利益功德利世間故六六七二句合為不竭功德以深廣故七住處功德無功用行是菩薩所住故經云大身者以無量身修菩薩行十身相作故八末後二句合名護世間功德九地潮不過限不誤傷物知機授法不差根器十地若無大海水溺四洲餘不能受必生毀謗又得此二法用護世間佛子譬如大摩尼珠有十種性出過眾寶何等為十一者從大海出二者巧匠治理三者圓滿無缺四者清淨離垢五者內外明徹六者善巧鑽穿七者貫以寶縷八者置在瑠璃高幢之上九者普放一切種種光明十者能隨王意雨眾寶物如眾生心充滿其願第四寶珠喻轉盡功德者先喻後合各有總別總云過眾寶者論經云過十寶性雖不列名論但云過瑠璃等意但取玻瓈等不能出寶者以小乘八背及緣覺行果但有淨相無利生用今以出寶乃至放光則出過眾寶故取之為喻故論云以出故取佛子當知菩薩亦復如是有十種事出過眾聖何等為十一者發一切智心二者持戒頭陀正行明淨三者諸禪三昧圓滿無缺四者道行清白離諸垢穢五者方便神通內外明徹六者緣起智慧善能鑽穿七者貫以種種方便智縷八者置於自在高幢之上九者觀眾生行放聞持光十者受佛智職墮在佛數能為眾生廣作佛事別中攝十為八合六七八故八中一出功德可取者選擇出海故由初地中如智善觀出煩惱海也二色功德由治理之則色明淨故三形相四無垢五明淨並可知六起行功德即次下三句謂智行穿徹方便行攝持自在行高顯故相用不染猶彼瑠璃頌云金剛取不動不壞上二皆是異相莊嚴故合為一後二句明功用殊勝謂七神力功德聞持普照體用微妙故八不護功德謂隨王雨寶無護惜故約法則得佛正智受位如王令一切眾生同己善根藏故如隨意雨寶故合之廣作佛事上八地影像分竟下地利益分佛子此集一切種一切智功德菩薩行法門品若諸眾生不種善根不可得聞大文第九地利益分於中三初顯法利益二如此世界下結通十方三爾時復以下他方來證今初分二初生信功德後雨眾天華下供養功德今初復二先明說益生信為欲令物生決定信故說利益後爾時下動地生信今初亦二先總歎難聞解脫月菩薩言聞此法門得幾所福後問答顯益先問金剛藏菩薩言如一切智所集福德聞此法門福德如是後答中二先正顯等於佛智何以故非不聞此功德法門而能信解受持讀誦何況精進如說修行是故當知要得聞此集一切智功德法門乃能信解受持修習然後至於一切智地後徵以釋成先反後順然聞有二義一者汎爾聞為遠益故二不取聞相初後圓融真實聞故聞已等佛何更修耶若更修行等多佛故爾時佛神力故法如是故十方各有十億佛剎微塵數世界六種十八相動所謂動徧動等徧動起徧起等徧起踊徧踊等徧踊震徧震等徧震吼徧吼等徧吼擊徧擊等徧擊第二動地生信佛力為緣而動地者亦為生信故又法如是者亦是因也上生信功德下供養功德雨眾天華天鬘天衣及諸天寶莊嚴之具幢幡繒葢奏天技樂其音和雅同時發聲讚一切智地所有功德二供養功德者非謂供養能生功德顯此法勝能令供養是地功德上生信亦然如此世界他化自在天王宮演說此法十方所有一切世界悉亦如是第二結通十方爾時復以佛神力故十方各十億佛剎微塵數世界外有十億佛剎微塵數菩薩而來此會作如是言善哉善哉金剛藏快說此法我等悉亦同名金剛藏所住世界各各差別悉名金剛德佛號金剛幢我等住在本世界中皆承如來威神之力而說此法眾會悉等文字句義與此所說無有增減悉以佛神力而來此會為汝作證如我等今者入此世界如是十方一切世界悉亦如是而往作證第三他方證成上地利益一分竟爾時金剛藏菩薩觀察十方一切眾會普周法界第三重頌若取長科即當第十於中二先說偈儀意後正顯偈辭今初欲讚歎發一切智智心欲示現菩薩境界欲淨治菩薩行力欲說攝取一切種智道欲除滅一切世間垢欲施與一切智欲示現不思議智莊嚴欲顯示一切菩薩諸功德欲令如是地義轉更開顯承佛神力而說頌言後說意意有九句初句即顯初地次句即二地以三聚戒為行境故三即三四二地厭禪出世智皆淨治行力故四即五地五明成種智故五即六地般若能除垢故六即七地空有無礙與一切智故七即八地無功不思議智莊嚴三世間故八即九十二地能說能受諸功德故九即總結便指上八句如是地義以頌說之云更開顯其心寂滅恒調順平等無礙如虗空離諸垢濁住於道此殊勝行汝應聽第二正顯偈辭有四十二頌分三初一偈總讚勸聽後一偈結說無盡百千億劫修諸善供養無量無邊佛聲聞獨覺亦復然為利眾生發大心精勤持戒常柔忍慚愧福智皆具足志求佛智修廣慧願得十力發大心三世諸佛咸供養一切國土悉嚴淨中間正頌分八初十三偈頌方便作滿足地分於中初二頌半總頌前九地同相中善擇功德了知諸法皆平等為利眾生發大心住於初地生是心永離眾惡常歡喜願力廣修諸善法以悲愍故入後位戒聞具足念眾生滌除垢穢心明潔觀察世間三毒火廣大解者趣三地三有一切皆無常如箭入身苦熾然厭離有為求佛法廣大智人趣𦦨地念慧具足得道智供養百千無量佛常觀最勝諸功德斯人趣入難勝地智慧方便善觀察種種示現救眾生復供十力無上尊趣入無生現前地世所難知而能知不受於我離有無法性本寂隨緣轉得此微妙向七地智慧方便心廣大難行難伏難了知雖證寂滅勤修習能趣如空不動地佛勸令從寂滅起廣修種種諸智業具十自在觀世間以此而升善慧地以微妙智觀眾生心行業惑等稠林為欲化其令趣道演說諸佛勝義藏次第修行具眾善乃至九地集福慧常求諸佛最上法得佛智水灌其頂餘頌諸地別義若依總攝即次第頌前十地前八地中唯三地半偈餘各一偈九地有三偈兼結入位獲得無數諸三昧亦善了知其作業最後三昧名受職住廣大境恒不動二有一偈頌三昧分菩薩得此三昧時大寶蓮華忽然現身量稱彼於中坐佛子圍繞同觀察放大光明百千億滅除一切眾生苦復於頂上放光明普入十方諸佛會悉住空中作光網供養佛已從足入即時諸佛悉了知今此佛子登職位十方菩薩來觀察受職大士舒光照諸佛眉間亦放光普照而來從頂入十方世界咸震動一切地獄苦消滅是時諸佛與其職如轉輪王第一子若蒙諸佛與灌頂是則名登法雲地三有五偈半頌受位分智慧增長無有邊開悟一切諸世間欲界色界無色界法界世界眾生界有數無數及虗空如是一切咸通達一切化用大威力諸佛加持微細智祕密劫數毛道等皆能如實而觀察受生捨俗成正道轉妙法輪入涅槃乃至寂滅解脫法及所未說皆能了四有三偈半頌大盡分菩薩住此法雲地具足念力持佛法譬如大海受龍雨此地受法亦復然十方無量諸眾生悉得聞持持佛法於一佛所所聞法過於彼數無有量以昔智願威神力一念普徧十方土霔甘露雨滅煩惱是故佛說名法雲五有三偈頌釋名分神通示現徧十方超出人天世間境復過是數無量億世智思惟必迷悶一舉足量智功德乃至九地不能知何況一切諸眾生及以聲聞辟支佛六有二偈頌神通力無上有上分此地菩薩供養佛十方國土悉周徧亦供現前諸聖眾具足莊嚴佛功德住於此地復為說三世法界無礙智眾生國土悉亦然乃至一切佛功德此地菩薩智光明能示眾生正法路自在天光除世闇此光滅闇亦如是住此多作三界王善能演說三乘法無量三昧一念得所見諸佛亦如是此地我今已略說若欲廣說不可盡七有四偈半頌前位果亦是神通攝如長行辨如是諸地佛智中如十山王嶷然住初地藝業不可盡譬如雪山集眾藥二地戒聞如香山三如毗陀發妙華𦦨慧道寶無有盡譬如仙山仁善住五地神通如由乾六如馬耳具眾果七地大慧如尼民八地自在如輪圍九如計都集無礙十如須彌具眾德八有七偈半頌地影像分中於中初三偈半頌山喻初地願首二持戒三地功德四專一五地微妙六甚深七廣大慧八莊嚴九地思量微妙義出過一切世間道十地受持諸佛法如是行海無盡竭次二偈頌海喻十行超世發心初持戒第二禪第三行淨第四成就五緣生第六貫穿七第八置在金剛幢第九觀察眾稠林第十灌頂隨王意如是德寶漸清淨後二偈頌珠喻池及地利益分文略不頌十方國土碎為塵可於一念知其數毫末度空可知量億劫說此不可盡其利益分亦可結說無盡頌之第十法雲地竟
