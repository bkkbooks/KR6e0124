body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈十迴向品第二十五之二佛子云何為菩薩摩訶薩不壞迴向第二釋不壞迴向文中長行先位行後位果今初標名徵起言不壞者謂於地寶等十種勝境深信堅固得不壞名然十表無盡信通事理故本業云觀一切法但有用但有名念念不住故名不壞是知善根迴向皆通事事無礙方真不壞耳佛子此菩薩摩訶薩於去來今諸如來所得不壞信悉能承事一切佛故於諸菩薩乃至初發一念之心求一切智得不壞信誓修一切菩薩善根無疲厭故於一切佛法得不壞信發深志樂故於一切佛教得不壞信守護住持故於一切眾生得不壞信慈眼等觀善根迴向普利益故於一切白淨法得不壞信普集無邊諸善根故於一切菩薩迴向道得不壞信滿足殊勝諸欲解故於一切菩薩法師得不壞信於諸菩薩起佛想故於一切佛自在神通得不壞信深信諸佛難思議故於一切菩薩善巧方便行得不壞信攝取種種無量無數行境界故佛子菩薩摩訶薩如是安住不壞信時於諸佛菩薩聲聞獨覺若諸佛教若諸眾生如是等種種境界中種諸善根無量無邊令菩提心轉更增長慈悲廣大平等觀察隨順修學諸佛所作攝取一切清淨善根入真實義集福德行行大惠施修諸功德等觀三世第二長行廣釋中大分三段初舉所迴善根二辨迴向之行三明迴向所為今初於去來今下有十五行經初舉所迴善根於中先十行經明起不壞信次佛子如是安住下二行餘經於信種善根中先種善根次令菩提心下十句明長菩薩道菩薩摩訶薩以如是等善根功德迴向一切智願常見諸佛親近善友與諸菩薩同共止住念一切智心無暫捨受持佛教勤加守護教化成熟一切眾生心常迴向出世之道供養瞻侍一切法師解了諸法憶持不忘修行大願悉使滿足菩薩如是積集善根成就善根增長善根思惟善根繫念善根分別善根愛樂善根修習善根安住善根菩薩摩訶薩如是積集諸善根已以此善根所得依果修菩薩行於念念中見無量佛如其所應承事供養以阿僧祇寶阿僧祇華阿僧祇鬘阿僧祇衣阿僧祇蓋阿僧祇幢阿僧祇幡阿僧祇莊嚴具阿僧祇給侍阿僧祇塗飭地阿僧祇塗香阿僧祇末香阿僧祇和香阿僧祇燒香阿僧祇深信阿僧祇愛樂阿僧祇淨心阿僧祇尊重阿僧祇讚歎阿僧祇禮敬阿僧祇寶座阿僧祇華座阿僧祇香座阿僧祇鬘座阿僧祇栴檀座阿僧祇衣座阿僧祇金剛座阿僧祇摩尼座阿僧祇寶繒座阿僧祇寶色座阿僧祇寶經行處阿僧祇華經行處阿僧祇香經行處阿僧祇鬘經行處阿僧祇衣經行處阿僧祇寶間錯經行處阿僧祇一切寶繒采經行處阿僧祇一切寶多羅樹經行處阿僧祇一切寶欄楯經行處阿僧祇一切寶鈴網彌覆經行處阿僧祇一切寶宮殿阿僧祇一切華宮殿阿僧祇一切香宮殿阿僧祇一切鬘宮殿阿僧祇一切栴檀宮殿阿僧祇一切堅固妙香藏宮殿阿僧祇一切金剛宮殿阿僧祇一切摩尼宮殿皆悉殊妙出過諸天阿僧祇諸雜寶樹阿僧祇種種香樹阿僧祇諸寶衣樹阿僧祇諸音樂樹阿僧祇寶莊嚴具樹阿僧祇妙音聲樹阿僧祇無厭寶樹阿僧祇寶繒采樹阿僧祇寶璫樹阿僧祇一切華香幢幡鬘蓋所嚴飭樹如是等樹扶疎蔭暎莊嚴宮殿其諸宮殿復有阿僧祇軒檻莊嚴阿僧祇牕牗莊嚴阿僧祇門闥莊嚴阿僧祇樓閣莊嚴阿僧祇半月莊嚴阿僧祇帳莊嚴阿僧祇金網彌覆其上阿僧祇香周帀普熏阿僧祇衣敷布其地佛子菩薩摩訶薩以如是等諸供養具於無量無數不可說不可說劫淨心尊重恭敬供養一切諸佛恒不退轉無有休息一一如來滅度之後所有舍利悉亦如是恭敬供養為令一切眾生生淨信故一切眾生攝善根故一切眾生離諸苦故一切眾生廣大解故一切眾生以大莊嚴而莊嚴故無量莊嚴而莊嚴故諸有所作得究竟故知諸佛興難可值故滿足如來無量力故莊嚴供養佛塔廟故住持一切諸佛法故如是供養現在諸佛及滅度後所有舍利其諸供養於阿僧祇劫說不可盡第二菩薩摩訶薩以如是下明迴向行中初六行餘經明先將善根迴向次如是積集善根下明將勝報善根迴向有二十五行經於中初廣列供事以阿僧寶廣列六門次佛子以如是等下二行餘經明先供現佛次一一下明供舍利次為令下五行經明供意有十一句次如是下結供分齊如是修集無量功德皆為成熟一切眾生無有退轉無有休息無有疲厭無有執著離諸心想無有依止永絕所依遠離於我及以我所如實法印印諸業門得法無生住佛所住觀無生性印諸境界諸佛護念發心迴向與諸法性相應迴向入無作法成就所作方便迴向捨離一切諸事想著方便迴向住於無量善巧迴向永出一切諸有迴向修行諸行不住於相善巧迴向普攝一切善根迴向普淨一切菩薩諸行廣大迴向發無上菩提心迴向與一切善根同住迴向滿足最上信解心迴向佛子菩薩摩訶薩以諸善根如是迴向時雖隨生死而不改變求一切智未曾退轉在於諸有心無動亂悉能度脫一切眾生不染有為法不失無礙智菩薩行位因緣無盡世間諸法無能變動具足清淨諸波羅蜜悉能成就一切智力菩薩如是離諸癡暗成菩提心開示光明增長淨法迴向勝道具足眾行以清淨意善能分別了一切法悉隨心現知業如幻業報如像諸行如化因緣生法悉皆如響菩薩諸行一切如影出生無著清淨法眼見於無作廣大境界證寂滅性了法無二得法實相具菩薩行於一切相皆無所著善能修行同事諸業於白淨法恒無廢捨離一切著住無著行菩薩如是善巧思惟無有迷惑不違諸法不壞業因明見真實善巧迴向知法自性以方便力成就業報到於彼岸智慧觀察一切諸法獲神通智諸業善根無作而行隨心自在第二如是修習下顯迴向行中有三段初迴向之心二迴向之相三迴向行成初有四行餘經明迴向之心於中不離大悲即兼迴向眾生之意無有執著即離相之意次與諸法性相應下五行經明迴向之相兼顯迴向菩提有十一句次佛子以諸善根下迴向行成於中初一句牒前次雖隨生死下文有十句正顯隨相行成由前法性相應故隨生死而不變次菩薩如是下一行半經結前生後次以清淨意下六行餘經明離相行成由前事不礙理故觸境了如十一句皆明離相觀行次菩薩如是善巧下三行餘經雙結二行無礙以成迴向菩薩摩訶薩以諸善根如是迴向為欲度脫一切眾生不斷佛種永離魔業見一切智無有邊際信樂不捨離世境界斷諸雜染亦願眾生得清淨智入深方便出生死法獲佛善根永斷一切諸魔事業以平等印普印諸業發心趣人一切種智成就一切出世間法第三迴向所為以專為度脫一切眾生不斷佛種是迴向所為也於中魔業通一切惡魔事通一切相但違法印皆魔事故佛子是為菩薩摩訶薩第二不壞迴向第三依釋結名菩薩摩訶薩住此迴向時得見一切無數諸佛成就無量清淨妙法普於眾生得平等心於一切法無有疑惑一切諸佛神力所加降伏眾魔永離其業成就生貴滿菩提心得無礙智不由他解善能開闡一切法義能隨想力入一切剎普照眾生悉使清淨菩薩摩訶薩以此不壞迴向之力攝諸善根如是迴向第二位果亦如十地調柔等果初牒得時次得見下正辨果相次菩薩下總結所屬爾時金剛幢菩薩觀察十方承佛神力即說頌言菩薩已得不壞意修行一切諸善業是故能令佛歡喜智者以此而迴向供養無量無邊佛布施持戒伏諸根為欲利益諸眾生普使一切皆清淨一切上妙諸香華無量差別勝衣服寶蓋及以莊嚴具供養一切諸如來如是供養於諸佛無量無數難思劫恭敬尊重常歡喜未曾一念生疲厭專心想念於諸佛一切世間大明燈十方所有諸如來靡不現前如目覩不可思議無量劫種種布施心無厭百千萬億眾劫中修諸善法悉如是彼諸如來滅度已供養舍利無厭足悉以種種妙莊嚴建立難思眾塔廟造立無等最勝形寶藏淨金為莊嚴巍巍高大如山王其數無量百千億淨心尊重供養已復生歡喜利益意不思議劫處世間救護眾生令解脫了知眾生皆妄想於彼一切無分別而能善別眾生根普為群生作饒益菩薩修集諸功德廣大最勝無與比了達體性悉非有如是決定皆迴向以最勝智觀諸法其中無有一法生如是方便修迴向功德無量不可盡以是方便令心淨悉與一切如來等此方便力不可盡是故福報無盡極發起無上菩提心一切世間無所依普至十方諸世界而於一切無所礙一切如來出世間為欲啟導眾生心如其心性而觀察畢竟推求不可得一切諸法無有餘悉入於如無體性以是淨眼而迴向開彼世間生死獄雖令諸有悉清淨亦不分別於諸有知諸有性無所有而令歡喜意清淨於一佛土無所依一切佛土悉如是亦不染著有為法知彼法性無依處以是修成一切智以是無上智莊嚴以是諸佛皆歡喜是為菩薩迴向業菩薩專心念諸佛無上智慧巧方便如佛一切無所依願我修成此功德專心救護於一切令其遠離眾惡業如是饒益諸群生繫念思惟未曾捨住於智地守護法不以餘乘取涅槃唯願得佛無上道菩薩如是善迴向不取眾生所言說一切有為虗妄事雖復不依言語道亦復不著無言語十方所有諸如來了達諸法無有餘雖知一切皆空寂而不於空起心念以一莊嚴嚴一切亦不於法生分別如是開悟諸群生一切無性無所觀第二偈頌二十五偈分三初二偈頌所迴善根及第一節迴向次十八偈頌所成供行後五偈頌迴向所為佛子云何為菩薩摩訶薩等一切佛迴向第三等一切佛迴向長行亦二先位行後位果釋名者準下文但等三世諸佛所行之道亦等善根文云如過去佛所修一切善根我亦如是故本業云三世諸佛善一切時行兼顯無間故下文云與妻子俱未曾暫捨菩提之心此從所等立名即等一切佛之迴向以深入法性行普門善而為其性佛子此菩薩摩訶薩隨順修學去來現在諸佛世尊迴向之道如是修學迴向道時見一切色乃至觸法若美若惡不生愛憎心得自在無諸過失廣大清淨歡喜悅樂離諸憂惱心意柔軟諸根清涼次標舉廣釋中先顯迴向後明成益先迴向中先等隨相後等離相隨相中復二先明對境善根以將迴向後總攝萬善以將迴向今初如是下二行半經明所迴善根謂學佛修時於六境違順成四淨心一於違順成就行捨不為境牽名心自在二於凡小以悲智廣大淨諸惑故三離憂過故有喜樂捨無憂苦惱四禪定輕安故心意柔軟不妄取境故諸根清涼此四淨心學佛之修為所迴善根佛子菩薩摩訶薩獲得如是安樂之時復更發心迴向諸佛作如是念願以我今所種善根令諸佛樂轉更增勝所謂不可思議佛所住樂無有等比佛三昧樂不可限量大慈悲樂一切諸佛解脫之樂無有邊際大神通樂最極尊重大自在樂廣大究竟無量力樂離諸知覺寂靜之樂住無礙住恒正定樂行無二行不變異樂佛子菩薩摩訶薩以諸善根迴向佛已復以此善根迴向菩薩所謂願未滿者令得圓滿心未淨者令得清淨諸波羅蜜未滿足者令得滿足安在金剛菩提之心於一切智得不退轉不捨大精進守護菩提門一切善根能令眾生捨離我慢發菩提心所願成滿安住一切菩薩所住獲得菩薩明利諸根修習善根證薩婆若佛子菩薩摩訶薩以諸善根如是迴向菩薩已復以迴向一切眾生願一切眾生所有善根乃至極少一彈指頃見佛聞法恭敬聖僧彼諸善根皆離障礙念佛圓滿念法方便念僧尊重不離見佛心得清淨獲諸佛法集無量德淨諸神通捨法離念依教而住如為眾生如是迴向為聲聞辟支佛迴向亦復如是又願一切眾生永離地獄餓鬼畜生閻羅王等一切惡處增長無上菩提之心專意勤求一切種智永不毀謗諸佛正法得佛安樂身心清淨證一切智第二正迴向中迴向五乘之境文分五段一佛二菩薩三有善眾生四二乘五有惡眾生初一行餘經結前起後次願以我今下五行經正顯所願所願增佛然佛德已圓今願增者尊重荷恩展誠敬故亦猶獻芹於上香華奉佛非彼須待次佛子下迴向菩薩初結前生後所謂下正顯有十願前六自利後能令下四利他次佛子下五行經迴向有善眾生次如為眾生下一行經明迴向二乘次又願一切下三行經明為有惡眾生謂不遺闡提上來五段初一迴向菩提餘迴向眾生上明對境善根以將迴向竟佛子菩薩摩訶薩所有善根皆以大願發起正發起積集正積集增長正增長悉令廣大具足充滿佛子菩薩摩訶薩在家宅中與妻子俱未曾暫捨菩提之心正念思惟薩婆若境自度度彼令得究竟以善方便化己眷屬令入菩薩智令成熟解脫雖與同止心無所著以本大悲處於居家以慈心故隨順妻子於菩薩清淨道無所障礙菩薩摩訶薩雖在居家作諸事業未曾暫捨一切智心所謂若著衣裳若噉滋味若服湯藥澡漱塗摩迴旋顧視行住坐臥身語意業若睡若寤如是一切諸有所作心常迴向薩婆若道繫念思惟無時捨離為欲饒益一切眾生安住菩提無量大願攝取無數廣大善根勤修諸善普救一切永離一切憍慢放逸決定趣於一切智地終不發意向於餘道常觀一切諸佛菩提永捨一切諸雜染法修行一切菩薩所學於一切智道無所障礙住於智地愛樂誦習以無量智集諸善根心不戀樂一切世間亦不染著所行之行專心受持諸佛教法菩薩如是處在居家普攝善根令其增長迴向諸佛無上菩提佛子菩薩爾時乃至施與畜生之食一摶一粒咸作是願當令此等捨畜生道利益安樂究竟解脫永度苦海永滅苦受永除苦蘊永斷苦覺苦聚苦行苦因苦本及諸苦處願彼眾生皆得捨離菩薩如是專心繫念一切眾生以彼善根而為上首為其迴向一切種智菩薩初發菩提之心普攝眾生修諸善根悉以迴向欲令永離生死曠野得諸如來無礙快樂出煩惱海修佛法道慈心徧滿悲力廣大普使一切得清淨樂守護善根親近佛法出魔境界入佛境界斷世間種植如來種住於三世平等法中菩薩摩訶薩如是所有已集當集現集善根悉以迴向第二總攝萬善迴向有二十九行經大分兩段先明歷事別陳次顯積集迴向前中初二行經總顯其相於中所有善根即所發起等也皆以大願即能發起等也云正發起等者謂隨發起積集增進必向二處不餘趣求離諸過失名之為正次佛子下歷事別陳初四行半經明隨染無污次雖在居家下四行經明動與道合次為欲饒益下二行經總顯迴向之相次永離下四行半經別顯有十句次菩薩如是下總結歷事次佛子菩薩爾時乃至下第二明積集迴向二初明微細積集一摶一粒其福至微施與眾生其田至劣積此微善亦以大願令成發起成迴向行故云微細積集次咸作是願下十句正明迴向之行總名離苦得樂次菩薩初發菩提之心下明長時積集以從初發心即積集故故云長時言欲令者是心願故文有十三句次如是所有下總結一摶一粒即現集也初發心來即已集也當來之善亦必要起故皆迴向上等隨相行竟復作是念如過去諸佛菩薩所行恭敬供養一切諸佛度諸眾生令永出離勤加修習一切善根悉以迴向而無所著所謂不依色不著受無倒想不作行不取識捨離六處不住世法樂出世間知一切法皆如虗空無所從來不生不滅無有真實無所染著遠離一切諸分別見不動不轉不失不壞住於實際無相離相唯是一相如是深入一切法性常樂習行普門善根悉見一切諸佛眾會如彼過去一切如來善根迴向我亦如是而為迴向解如是法證如是法依如是法發心修習不違法相知所修行如幻如影如水中月如鏡中像因緣和合之所顯現乃至如來究竟之地佛子菩薩摩訶薩復作是念如過去諸佛修菩薩行時以諸善根如是迴向未來現在悉亦如是我今亦應如彼諸佛如是發心以諸善根而為迴向第一迴向勝迴向最勝迴向上迴向無上迴向無等迴向無等等迴向無比迴向無對迴向尊迴向妙迴向平等迴向正直迴向大功德迴向廣大迴向善迴向清淨迴向離惡迴向不隨惡迴向菩薩如是以諸善根正迴向已成就清淨身語意業住菩薩住無諸過失修習善業離身語惡心無瑕穢修一切智住廣大心知一切法無有所作住出世法世法不染分別了知無量諸業成就迴向善巧方便永拔一切取著根本第二復作是念下等佛離相迴向者即迴向實際於前二說有先後行在一心文中二初等過去後佛子下等於現未初中先舉所等初二行經言無所著者標隨相即有離相次別顯離云所謂不依色等下顯離妄契真次知一切法下釋前不著次如是深入下結其無礙謂既稱法性修隨相故一攝一切名普門善悉見諸佛略辨成益次如彼過去下牒前總顯能等次解如是法下二行半經別顯等相次佛子復作是念下等現未初二行經牒例次我今亦應下總顯能等次第一迴向下別明等相文有十九句上顯迴向竟下明成益佛子是為菩薩摩訶薩第三等一切佛迴向第三依釋結名菩薩摩訶薩住此迴向深入一切諸來業趣向如來勝妙功德入深清淨智慧境界不離一切諸菩薩業善能分別巧妙方便入深法界善知菩薩修行次第入佛種性以巧方便分別了知無量無邊一切諸法雖復現身於世中生而於世法心無所著第二位果辨十種勝德爾時金剛幢菩薩承佛神力普觀十方即說頌言彼諸菩薩摩訶薩修過去佛迴向法亦學未來現在世一切導師之所行於諸境界得安樂諸佛如來所稱讚廣大光明清淨眼悉以迴向大聰哲菩薩身根種種樂眼耳鼻舌亦復然如是無量上妙樂悉以迴向諸最勝一切世間眾善法及諸如來所成就於彼悉攝無有餘盡以隨喜益眾生世間隨喜無量種令此迴向為眾生人中師子所有樂願使羣萌悉圓滿一切國土諸如來凡所知見種種樂願令眾生皆悉得而為照世大明燈菩薩所得勝妙樂悉以迴向諸羣生雖為羣生故迴向而於迴向無所著菩薩修行此迴向興起無量大悲心如佛所修迴向德願我修行悉成滿如諸最勝所成就一切智乘微妙樂及我在世之所行諸菩薩行無量樂示入眾趣安隱樂恒守諸根寂靜樂悉以迴向諸羣生普使修成無上智非身語意即是業亦不離此而別有但以方便滅癡冥如是修成無上智菩薩所修諸行業積集無量勝功德隨順如來生佛家寂然不亂正迴向十方一切諸世界所有眾生咸攝受悉以善根迴向彼願令具足安隱樂不為自身求利益欲令一切悉安樂未曾暫起戲論心但觀諸法空無我十方無量諸最勝所見一切真佛子悉以善根迴向彼願使速成無上覺一切世間含識類等心攝取無有餘以我所行諸善業令彼眾生速成佛無量無邊諸大願無上導師所演說願諸佛子皆清淨隨其心樂悉成滿普觀十方諸世界悉以功德施於彼願令皆具妙莊嚴菩薩如是學迴向心不稱量諸二法但恒了達法無二諸法若二若不二於中畢竟無所著十方一切諸世間悉是眾生想分別於想非想無所得如是了達於諸想彼諸菩薩身淨已則意清淨無瑕穢語業已淨無諸過當知意淨無所著一心正念過去佛亦憶未來諸導師及以現在天人尊悉學於其所說法三世一切諸如來智慧明達心無礙為欲利益眾生故迴向菩提集眾業彼第一慧廣大慧不虗妄慧無倒慧平等實慧清淨慧最勝慧者如是說第二偈頌有二十四偈分三初二十一頌頌前位行次二頌位果後一結歎佛子云何為菩薩摩訶薩至一切處迴向第四至一切處迴向長行亦二先位行後位果今初牒名徵起言至一切者至是能至善根及其供具一切處即所至之供境謂以大願令此善根供具徧至一切時處隨所應供供諸福田本業云以大願力入一切佛國中供養一切佛故言至一切疏有多義佛子此菩薩摩訶薩修習一切諸善根時作是念言願此善根功德之力至一切處譬如實際無處不至至一切物至一切世間至一切眾生至一切國土至一切法至一切虗空至一切三世至一切有為無為至一切語言音聲願此善根亦復如是徧至一切諸如來所供養三世一切諸佛過去諸佛所願悉滿未來諸佛具足莊嚴現在諸佛及其國土道場眾會徧滿一切虗空法界願以信解大威力故廣大智慧無障礙故一切善根悉迴向故以如諸天諸供養具而為供養充滿無量無邊世界第二依徵廣釋中三初迴向眾生菩提二迴向實際三結歎成益初迴向眾生中先略明有九行經有法喻合法中謂願力及善根力此二相資故能遍至次譬如實際下舉喻言實際者即一切法真實之際故次願以下法合先總次過去下別明先舉三世合所至處次願以信解下二行餘經明能至供佛子菩薩摩訶薩復作是念諸佛世尊普徧一切虗空法界種種業所起十方不可說一切世界種世界不可說佛國土佛境界種種世界無量世界無分齊世界轉世界側世界仰世界覆世界如是一切諸世界中現住於壽示現種種神通變化彼有菩薩以勝解力為諸眾生堪受化者於彼一切諸世界中現為如來出興於世以至一切處智普徧開示如來無量自在神力法身徧往無有差別平等普入一切法界如來藏身不生不滅善巧方便普現世間證法實性超一切故得不退轉無礙力故生於如來無障礙見廣大威德種性中故佛子菩薩摩訶薩以其所種一切善根願於如是諸如來所以眾妙華及眾妙香鬘蓋幢旛衣服燈燭及餘一切諸莊嚴具以為供養若佛形像若佛塔廟悉亦如是以此善根如是迴向所謂不亂迴向一心迴向自意迴向尊敬迴向不動迴向無住迴向無依迴向無眾生心迴向無躁競心迴向寂靜心迴向二佛子下廣明徧至於中二初約十方佛明其徧至次約常住佛明其徧至前中言不可說世界者總明供處次如是一切諸世界下別明供養初供現住壽者是現在佛於中有實報佛有權應佛現身說法權應之事有六行半經次佛子以其所種下二行經明供行次若佛形像下供住持佛次以此善根如是迴向下通顯迴向之心謂前以善根迴向成供供諸田時如是用心文有十句以顯十心故能即事順理上明供十方佛竟復作是念盡法界虗空界去來現在一切劫中諸佛世尊得一切智成菩提道無量名字各各差別於種種時現成正覺悉皆住壽盡未來際一一各以法界莊嚴而嚴其身道場眾會周徧法界一切國土隨時出興而作佛事如是一切諸佛如來我以善根普皆迴向願以無數香蓋無數香幢無數香旛無數香帳無數香網無數香像無數香光無數香𦦨無數香雲無數香座無數香經行地無數香所住處無數香世界無數香山無數香海無數香河無數香樹無數香衣服無數香蓮華無數香宮殿無量華蓋廣說乃至無量華宮殿無邊鬘蓋廣說乃至無邊鬘宮殿無等塗香蓋廣說乃至無等塗香宮殿不可數末香蓋廣說乃至不可數末香宮殿不可稱衣蓋廣說乃至不可稱衣宮殿不可思寶蓋廣說乃至不可思寶宮殿不可量燈光明蓋廣說乃至不可量燈光明宮殿不可說莊嚴具蓋廣說乃至不可說莊嚴具宮殿不可說不可說摩尼寶蓋不可說不可說摩尼寶幢如是摩尼寶旛摩尼寶帳摩尼寶網摩尼寶像摩尼寶光摩尼寶𦦨摩尼寶雲摩尼寶座摩尼寶經行地摩尼寶所住處摩尼寶剎摩尼寶山摩尼寶海摩尼寶河摩尼寶樹摩尼寶衣服摩尼寶蓮華摩尼寶宮殿皆不可說不可說如是一一諸境界中各有無數欄楯無數宮殿無數樓閣無數門闥無數半月無數却敵無數牕牖無數清淨寶無數莊嚴具以如是等諸供養物恭敬供養如上所說諸佛世尊第二約常住佛以明徧至謂三世住壽盡未來際亦應常也三身十身融無礙故不同前文有塔廟等文中有三初以善根迴向供佛二願令一切下以供佛善根迴向眾生三譬如下總願善根普攝迴向初盡法界下四行餘經明所供境次顯能供行文云如是等三句結前生後次所成供具列有香蓋等二十八事次如是一一下又增前數以如是等下結成供行上總顯佛行下文以此供佛行迴向眾生願令一切世間皆得清淨一切眾生咸得出離住十力地於一切法中得無礙法明令一切眾生具足善根悉得調伏其心無量等虗空界往一切剎而無所至入一切土施諸善法常得見佛植諸善根成就大乘不著諸法具足眾善立無量行普入無邊一切法界成就諸佛神通之力得於如來一切智智第二以供佛善根迴向眾生正顯迴向之願初總顯所為次令一切眾生下四行經別顯願得因圓果滿譬如無我普攝諸法我諸善根亦復如是普攝一切諸佛如來咸悉供養無有餘故普攝一切無量諸法悉能悟入無障礙故普攝一切諸菩薩眾究竟皆與同善根故普攝一切諸菩薩行以本願力皆圓滿故普攝一切菩薩法明了達諸法皆無礙故普攝諸佛大神通力成就無量諸善根故普攝諸佛力無所畏發無量心滿一切故普攝菩薩三昧辯才陀羅尼門善能照了無二法故普攝諸佛善巧方便示現如來大神力故普攝三世一切諸佛降生成道轉正法輪調伏眾生入般涅槃恭敬供養悉周徧故普攝十方一切世界嚴淨佛剎咸究竟故普攝一切諸廣大劫於中出現修菩薩行無斷絕故普攝一切所有趣生悉於其中現受生故普攝一切諸眾生界具足普賢菩薩行故普攝一切諸惑習氣悉以方便令清淨故普攝一切眾生諸根無量差別咸了知故普攝一切眾生解欲令離雜染得清淨故普攝一切化眾生行隨其所應為現身故普攝一切應眾生道悉入一切眾生界故普攝一切如來智性護持一切諸佛教故第三總願善根普攝迴向者以上來三段別明善根但說成供供佛今欲顯此善根無所不成故復明此於此初喻謂二無我理普攝理事無不周故次我諸善根下法合有二十句前十二句攝成自利德次普攝一切下八句成利他德佛子菩薩摩訶薩以諸善根如是迴向時用無所得而為方便不於業中分別報不於報中分別業雖無分別而普入法界雖無所作而恒住善根雖無所起而勤修勝法不信諸法而能深入不有於法而悉知見若作不作皆不可得知諸法性恒不自在雖悉見諸法而無所見普知一切而無所知菩薩如是了達境界知一切法因緣為本見於一切諸佛法身至一切法離染實際解了世間皆如變化明達眾生唯是一法無有二性不捨業境善巧方便於有為界示無為法而不滅壞有為之相於無為界示有為法而不分別無為之相菩薩如是觀一切法畢竟寂滅成就一切清淨善根而起救護眾生之心智慧明達一切法海常樂修行離愚癡法已具成就出世功德不更修學世間之法得淨智眼離諸癡翳以善方便修迴向道第二佛子至以諸善根下迴向實際初總標云用無所得為方便者略有二義一以無所得導前隨相則涉有不迷於空為入有之方便二假無得以入有不存無得即此無得亦是方便此為入空之方便也今文兼二義欲顯隨相離相無前後故次下別顯有三段初正顯觀心文有十句初不於業中分別報等三句明會事歸理觀謂事法既虗相無不盡理無不現故業果皆空業空故無體能招報況謂因中而有果耶報空故無體可以酬因況謂果中有因耶若約觀心名用會歸寂次云雖無所作而恒住善根下五句明理不礙事約心則寂不礙用於中初句理無能所分別而不礙有能入之智所入之法界次句無作而造作次句無起而修起次句無能所信而能即事入玄末句不有能所見而不礙所見次雖悉見諸法下二句明事理無礙約心則寂照雙流良以事虗攬理無不理之事理實應緣無不事之理所以寂而常照照而常寂故終日知見而無所知見上總顯觀心次菩薩如是了達境界下明觀成之相文有八句通顯緣生性空義疏有多釋三菩薩如是觀一切法下明觀成之益上明離相行佛子菩薩摩訶薩以諸善根如是迴向稱可一切諸佛之心嚴淨一切諸佛國土教化成就一切眾生具足受持一切佛法作一切眾生最上福田為一切商人智慧導師作一切世間清淨日輪一一善根充徧法界悉能救護一切眾生皆令清淨具足功德佛子菩薩摩訶薩如是迴向時能護持一切佛種能成熟一切眾生能嚴淨一切國土能不壞一切諸業能了知一切諸法能等觀諸法無二能徧往十方世界能了達離欲實際能成就清淨信解能具足明利諸根佛子是為菩薩摩訶薩第四至一切處迴向菩薩摩訶薩住此迴向時得至一切處身業普能應現一切世界故得至一切處語業於一切世界中演說法故得至一切處意業受持一切佛所說法故得至一切處神足通隨眾生心悉往應故得至一切處隨證智普能了達一切法故得至一切處總持辯才隨眾生心令歡喜故得至一切處入法界於一毛孔中普入一切世界故得至一切處徧入身於一眾生身普入一切眾生身故得至一切處普見劫一一劫中常見一切諸如來故得至一切處普見念一一念中一切諸佛悉現前故佛子菩薩摩訶薩得至一切處迴向能以善根如是迴向第二大段位果文有十句初三三業體遍次三三業用遍後四顯用自住爾時金剛幢菩薩承佛威力普觀十方而說頌言內外一切諸世間菩薩悉皆無所著不捨饒益眾生業大士修行如是智十方所有諸國土一切無依無所住不取活命等眾法亦不妄起諸分別普攝十方世界中一切眾生無有餘觀其體性無所有至一切處善迴向普攝有為無為法不於其中起妄念如於世間法亦然照世燈明如是覺菩薩所修諸業行上中下品各差別悉以善根迴向彼十方一切諸如來菩薩迴向到彼岸隨如來學悉成就恒以妙智善思惟具足人中最勝法清淨善根普迴向利益群迷恒不捨悉令一切諸眾生得成無上照世燈未曾分別取眾生亦不妄想念諸法雖於世間無染著亦復不捨諸含識菩薩常樂寂滅法隨順得至涅槃境亦不捨離眾生道獲如是等微妙智菩薩未曾分別業亦不取著諸果報一切世間從緣生不離因緣見諸法深入如是諸境界不於其中起分別一切眾生調御師於此明了善迴向第二重頌有十一偈分三初七偈頌迴向眾生及菩提次三偈半頌迴向實際後半偈頌成益第四迴向竟
