body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈十迴向品第二十五之十佛子云何菩薩摩訶薩等法界無量迴向第十等法界無量迴向於中長行先位行後位果前牒名廣釋中釋名謂稱法界起大用故等者入義故本分中名入法界法界無量即是所入何法能入略有其四一所迴行法謂法施之行稱法界施故二所行行體廣大無邊故三能迴之智四所迴之德謂以稱法界之大智迴等法界之善根向同法界之大用成法界之行體此則位滿至極故標法界之名當法受稱等何法界此通四義一等理法界故經云如法界性二等事法界經云欲見等法界無量諸佛調伏等法界無量眾生三等理事無礙法界經云願一切眾生作修行無相道法師以諸妙相而自莊嚴則相無礙皆其類也四等事事無礙法界經云一切佛剎中現一切佛剎然其四事全等四種法界融而無二故此能等即是所等非有二物而可依之故上稱入入無所入本業但云法界無等入言即斯意也釋云覺一切法第一義諦中道無相一切法皆一相照故第一中道即是所入皆一相照即是能入此二無二即是法界故不可但以事法界為名言無量者約理則無分量約事則無數量前迴向明依體起用此明體用無礙圓極自在即以法施及諸相應普賢自在大善巧德為其位體佛子此菩薩摩訶薩以離垢繒而繫其頂住法師位第二廣釋中大文分三初明所迴善根二以此善根下攝將迴向三佛子菩薩摩訶薩如是迴向時安住下迴向成益初中先明行依身位第二廣行下依位起行今初言離垢等者如十地得離垢三昧受智職位內得此定灌心首故外示表彰白繒繫頂法從喻稱名離垢繒但有此相知得彼定表位成滿方能雲雨說法以益羣生名法師位然此位滿總有五重一信滿如賢首品說使得灌頂而昇位等二約解滿如灌頂住三約所滿如第十行入因陀羅網法界等四善巧願滿如此位辨五約證滿如十地說此五重內隨一成處必具理行內相應故皆名位滿若約圓融但一位滿即是究竟更不待餘又若得一即得餘位總一法界受職之位隨門差別五位不同法體融通全攝無礙廣行法施起大慈悲安立眾生於菩提心常行饒益無有休息以菩提心長養善根為諸眾生作調御師示諸眾生一切智道為諸眾生作法藏日善根光明普照一切於諸眾生其心平等修諸善行無有休息心淨無染智慧自在不捨一切善根道業作諸眾生大智商主普令得入安隱正道為諸眾生而作導首令修一切善根法行為諸眾生作不可壞堅固善友令其善根增長成就佛子此菩薩摩訶薩以法施為首發生一切清淨白法攝受趣向一切智心殊勝願力究竟堅固成就增益具大威德依善知識心無諂誑思惟觀察一切智門無邊境界二依位起行中二先明起行後佛子下顯其行成又前即利他後明自利又前明自分後顯勝進今初中十一句初總餘別別顯慈等皆是法施夫法施者生解之妙方起行之根本入聖道之階漸越苦海之津梁古德云此經中託人以弘道多歎法師之勝德寄行以表法每引普賢為末篇故知法施之功過財施之難喻於中十句一慈悲安物二益物無息此二即廣大心三大心長養四究竟調御此二即第一心五法日普照六等勸修善此二即常心常愛眾生同於己故名為平等七心淨無礙即不顛倒心八示果寶渚故云商主然寶渚即涅槃菩提之果九導以萬行之因此二即第一心十增長不壞為護念也始令發心終令成就有始有卒者其唯聖人乎次云佛子此菩薩以法施為首下顯其行成初牒前法施攝受下五句正顯成相然所向者特此善根耳以此善根如是迴向願得修習成就增長廣大無礙一切境界願得於佛正教之中乃至聽聞一句一偈受持演說願得憶念與法界等無量無邊一切世界去來現在一切諸佛既憶念已修菩薩行又願以此念佛善根為一眾生於一世界盡未來劫修菩薩行如於一世界盡法界虗空界一切世界皆亦如是如為一眾生為一切眾生亦復如是以善方便一一皆為盡未來劫大誓莊嚴終無離佛善知識想常見諸佛現在其前無有一佛出興於世不得親近一切諸佛及諸菩薩所讚所說清淨梵行誓願修行悉令圓滿所謂不破梵行不缺梵行不雜梵行無玷梵行無失梵行無能蔽梵行佛所讚梵行無所依梵行無所得梵行增益菩薩清淨梵行三世諸佛所行梵行無礙梵行無著梵行無諍梵行無滅梵行安住梵行無比梵行無動梵行無亂梵行無恚梵行佛子菩薩摩訶薩若能為己修行如是清淨梵行則能普為一切眾生令一切眾生皆得安住令一切眾生皆得開曉令一切眾生皆得成就令一切眾生皆得清淨令一切眾生皆得無垢令一切眾生皆得照明令一切眾生離諸塵染令一切眾生無諸障翳令一切眾生離諸熱惱令一切眾生離諸纏縛令一切眾生永離諸惡令一切眾生無諸惱害畢竟清淨何以故菩薩摩訶薩自於梵行不能清淨不能令他而得清淨自於梵行而有退轉不能令他無有退轉自於梵行而有失壞不能令他無有失壞自於梵行而有遠離不能令他常不遠離自於梵行而有懈怠不能令他不生懈怠自於梵行不生信解不能令他心生信解自於梵行而不安住不能令他而得安住自於梵行而不證入不能令他心得證入自於梵行而有放捨不能令他恒不放捨自於梵行而有散動不能令他心不散動何以故菩薩摩訶薩住無倒行說無倒法所言誠實如說修行淨身口意離諸雜染住無礙行滅一切障菩薩摩訶薩自得淨心為他演說清淨心法自修和忍以諸善根調伏其心令他和忍以諸善根調伏其心自離疑悔亦令他人永離癡悔自得淨信亦令他得不壞淨信自住正法亦令眾生安住正法第二攝將迴向下文總有二十一門大文分三初九門別對十一句善根以明迴向即自分次四門通顯迴向之意三有八門更以異門別明迴向即勝進今初即為九段第一願聞法見佛修二利行對前二句於中初一願總明餘皆別顯今初初句牒前次願得已下正顯願辭一切境界者文局初段義總該於二十一段迴向皆一切境此一切境廣大如法界理事事事皆無障礙如此境界皆得增長成就次別顯中二初云願得於佛正教之中一行經願聞法受持即成上廣行法施之義次云願得憶念下一行半經願念佛修行成上饒益無休於中先正明念佛之行次又願以此善根下四行經迴念佛善成二利行於中亦二先總為一切徧於時處修菩薩行後一切諸佛下別明修行梵行為萬行之本故偏明之於中有三初一行餘經總舉所願次所謂不破梵行下四行半經列所修之行於中有二十梵行與智論所列十界多同謂不缺不破不穿不雜隨道無著智所讚自在隨定具足通用性戒而為根本今開十為二十一疏依經次第會論十戒經不破在初者謂持四重十重若犯此者猶破器無用故二不缺者謂持僧殘殘如器缺猶可修補三不雜者謂持方便若念破戒事染心共語聞環釧聲皆名為雜四無點者謂持波逸提如白圭之點雖則可磨亦不為也六無失者定心相應乃至吉羅亦不誤失六緣不能壞上三皆不穿戒穿如漏器不堪受道前六皆律儀七即智所讚八無依者不依名利果報九無得謂不得能持所持次增益下三皆隨道戒十揀小道十一顯是佛行十二兼能通達非道故云無礙十三無著即見真成聖次無諍下四即具足戒謂觀中道具事理故一事理無違二順理而行則心常不滅三心能詣理故云安住四對餘超勝故云無比次無動已下皆隨定戒謂首楞嚴定不起滅定現諸威儀雖示十法界像無戒不行而寂然不動順境不能亂違境而無恚次云佛子菩薩摩訶薩若能為已下七行經第三通難釋成有伏難云菩薩期心先人後己今先自行豈不相違故下釋云但自修行即為益物此亦成上安立眾生於菩提心及以菩提心長養善根文中二初正明二重徵釋今初若能一句總明次令一切下別顯有十二句總顯持犯次何以故下徵釋中二初正徵反釋後重徵順釋今初正釋中有八行經文有十句徵意云自他行異如何自行便是為他釋意云自身不正其令不從故上自行便為利物次何以故下重徵順釋有六行經徵意云石雖不利而能利刀自雖不行何妨利物今云不能益者其故何耶釋意云若自犯教他便成顛倒菩薩無倒必言行相符故要如說而行方能如行如說文中先總明後菩薩下別顯初門竟佛子菩薩摩訶薩復以法施所生善根如是迴向所謂願我獲得一切諸佛無盡法門普為眾生分別解說皆令歡喜心得滿足摧滅一切外道異論願我能為一切眾生演說三世諸佛法海於一一法生起一一法義理一一法名言一一法安立一一法解說一一法顯示一一法門戶一一法悟入一一法觀察一一法分位悉得無邊無盡法藏獲無所畏具四辯才廣為眾生分別解說窮未來際而無有盡為欲令一切眾生立勝志願出生無礙無謬失辯為欲令一切眾生皆生歡喜為欲令一切眾生成就一切淨法光明隨其類音演說無斷為欲令一切眾生深信歡喜住一切智辯了諸法俾無迷惑作是念言我當普於一切世界為諸眾生精勤修習得徧法界無量自在身得徧法界無量廣大心具等法界無量清淨音聲現等法界無量眾會道場修等法界無量菩薩業得等法界無量菩薩住證等法界無量菩薩平等學等法界無量菩薩法住等法界無量菩薩行入等法界無量菩薩迴向是為菩薩摩訶薩以諸善根而為迴向為令眾生悉得成就一切智故第二門願得廣演以益自他亦成上文為調御師示一切智道文中有三初以法施一句牒前起後次所謂下正明中有二初一願總明得法文有四節一得法二解脫三益機四摧滅次云願我能為下別明演法釋前文四義文有五節初二句總明次於一一法下明得法三獲無所畏下明能演四為欲令一切下四行經明所為機五作是念下五行半經明自修成德即為物勤修自成己德成十種德初二云徧徧於理事餘八云等兼等無礙次云是為菩薩摩訶薩以諸善根下總結中上成自德亦為攝生故復重云為令眾生成一切智上第二門竟佛子菩薩摩訶薩復以善根如是迴向所謂為欲見等法界無量諸佛調伏等法界無量眾生住持等法界無量佛剎證等法界無量菩薩智獲等法界無量無所畏成等法界無量諸菩薩陀羅尼得等法界無量諸菩薩不思議住具等法界無量功德滿等法界無量利益眾生善根又願以此善根故令我得福德平等智慧平等力平等無畏平等清淨平等自在平等正覺平等說法平等義平等決定平等一切神通平等如是等法皆悉圓滿如我所得願一切眾生亦如是得如我無異第三門願得二利行圓成上作法藏日獲智見佛等皆普照故文中二初有五行餘經先通二利次云又願以此下四行經別明二利即成上文於諸眾生其心平等初以自等於理後我所得下令物等自第三門竟佛子菩薩摩訶薩復以善根如是迴向所謂如法界無量善根迴向亦復如是所得智慧終無有量如法界無邊善根迴向亦復如是見一切佛無有其邊如法界無限善根迴向亦復如是詣諸佛剎無有齊限如法界無際善根迴向亦復如是於一切世界修菩薩行無有涯際如法界無斷善根迴向亦復如是住一切智永不斷絕如法界一性善根迴向亦復如是與一切眾生同一智性如法界自性清淨善根迴向亦復如是令一切眾生究竟清淨如法界隨順善根迴向亦復如是令一切眾生悉皆隨順普賢行願如法界莊嚴善根迴向亦復如是令一切眾生以普賢行而為莊嚴如法界不可失壞善根