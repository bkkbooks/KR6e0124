body:
  text: 于闐國三藏沙門實義難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈普賢三昧品第三爾時普賢菩薩摩訶薩於如來前坐蓮華藏師子之座承佛神力入于三昧此三昧名一切諸佛毗盧遮那如來藏身普入一切佛平等性能於法界示衆影像廣大無礙同於虗空法界海旋靡不隨入出生一切諸三昧法普能包納十方法界三世諸佛智光明海皆從此生十方所有諸安立海悉能示現含藏一切佛力解脫諸菩薩智能令一切國土微塵普能容受無邊法界成就一切佛功德海顯示如來諸大願海一切諸佛所有法輪流通護持使無斷絶如此世界中普賢菩薩於世尊前入此三昧如是盡法界虗空界十方三世微細無礙廣大光明佛眼所見佛力能到佛身所現一切國土及此國土所有微塵一一塵中有世界海微塵數佛剎一一剎中有世界海微塵數諸佛一一佛前有世界海微塵數普賢菩薩皆亦入此一切諸佛毗盧遮那如來藏身三昧爾時一一普賢菩薩皆有十方一切諸佛而現其前彼諸如來同聲讚言善哉善哉善男子汝能入此一切諸佛毗盧遮那如來藏身菩薩三昧佛子此是十方一切諸佛共加於汝以毗盧遮那如來本願力故亦以汝修一切諸佛行願力故所謂能轉一切佛法輪故開顯一切如來智慧海故普照十方諸安立海悉無餘故令一切衆生淨治雜染得清淨故普攝一切諸大國土無所著故深入一切諸佛境界無障礙故普示一切佛功德故能入一切諸法實相增智慧故觀察一切諸法門故了知一切衆生根故能持一切諸佛如來教文海故爾時十方一切諸佛即與普賢菩薩摩訶薩能入一切智性力智與入法界無邊量智與成就一切佛境界智與知一切世界海成壞智與知一切衆生界廣大智與住諸佛甚深解脫無差別諸三昧智與入一切菩薩諸根海智與知一切衆生語言海轉法輪詞辨智與普入法界一切世界海身智與得一切佛音聲智如此世界中如來前普賢菩薩蒙諸佛與如是智如是一切世界海及彼世界海一一塵中所有普賢悉亦如是何以故證彼三昧法如是故是時十方諸佛各舒右手摩普賢菩薩頂其手皆以相好莊嚴妙網光舒香流𦦨發復出諸佛種種妙音及以自在神通之事過現未來一切菩薩普賢願海一切如來清淨法輪及三世佛所有影像皆於中現如此世界中普賢菩薩為十方佛所共摩頂如是一切世界海及彼世界海一一塵中所有普賢悉亦如是為十方佛之所摩頂爾時普賢菩薩即從是三昧而起從此三昧起時即從一切世界海微塵數三昧海門起所謂從知三世念念無差別善巧智三昧門起從知三世一切法界所有微塵三昧門起從現三世一切佛剎三昧門起從現一切衆生舍宅三昧門起從知一切衆生心海三昧門起從知一切衆生各別名字三昧門起從知十方法界處所各差別三昧門起從知一切微塵中各有無邊廣大佛身雲三昧門起從演説一切法理趣海三昧門起普賢菩薩從如是等三昧門起時其諸菩薩一一各得世界海微塵數三昧海雲世界海微塵數陀羅尼海雲世界海微塵數諸法方便海雲世界海微塵數辨才門海雲世界海微塵數修行海雲世界海微塵數普照法界一切如來功德藏智光明海雲世界海微塵數一切如來諸力智慧無差別方便海雲世界海微塵數一切如來一一毛孔中各現衆剎海雲世界海微塵數一一菩薩示現從兜率天宮歿下生成佛轉正法輪般涅槃等海雲如此世界中普賢菩薩從三昧起諸菩薩衆獲如是益如是一切世界海及彼世界海所有微塵一一塵中悉亦如是此品來意以前衆既集光示法主今將説法是故法主入定受加為近方便以出定即説故以三昧為近也品標普賢者明説法主以説普法故三昧是業用以非證不宣此則人法合舉言三昧名毗盧遮那如來藏身者以毗者廣大也盧遮者生也那者思也慈悲無邊故名廣智慧無上故稱為大生想已盡故云生息涅槃云離有常住故名如來萬德含攝是謂藏身即出纏之法身也以此法身是法界體故言藏身者謂諸佛法身周遍法界塵中復含諸剎重重無盡明此遍剎之身包容所遍剎海無不皆在如來身中故名藏身融通總有四句一身遍剎海二剎在身中三身遍身內剎四剎入遍剎身即內即外依正混融無障無礙是此三昧所作故以為名將説此法故入茲定佛平等性即如來藏是故但入如來藏身即是已入佛平等故下文云如此世界中普賢菩薩於世尊前入三昧如是盡法界虗空界十方三世微細無礙廣大光明佛眼所見佛力能到佛身所現一切國土及此國土所有微塵一一塵中有世界海微塵數佛剎一一剎中有微塵數諸佛一一佛前有世界海微塵數普賢菩薩皆亦入此一切諸佛毗盧遮那藏身三昧一一普賢前皆有十方諸佛現前讚普賢菩薩能入此三昧即此三昧已彰法界重重無盡矣此諸佛讚以顯諸佛加持此口加也下文爾時十方一切諸佛即與普賢菩薩能入一切智大智此意加也次十方諸佛各舒右手摩普賢菩薩頂此身加也次結通云如此世界十方諸佛摩普賢頂一切世界海一一塵中所有普賢皆為十方諸佛之所摩頂此通顯加分也下爾時普賢菩薩從三昧起從此三昧起時即從一切世界海微塵數三昧海門起令諸菩薩各得法益下結通云如此世界乃至及彼世界海所有微塵一一塵中悉亦如是爾時十方一切世界海以諸佛威神力及普賢菩薩三昧力故悉皆微動一一世界衆寶莊嚴及出妙音演説諸法復於一切如來衆會道場海中普雨十種大摩尼王雲何等為十所謂妙金星幢摩尼王雲光明照耀靡尼王雲寶輪垂下摩尼王雲衆寶藏現菩薩像摩尼王雲稱揚佛名摩尼王雲光明熾盛普照一切佛剎道場摩尼王雲光照十方種種變化摩尼王雲稱讚一切菩薩功德摩尼王雲如日光熾盛摩尼王雲悅意樂音周聞十方摩尼王雲普雨如是十種大摩尼王雲已一切如來諸毛孔中咸放光明於光明中而説頌言普賢遍住於諸剎坐寶蓮華衆所觀一切神通靡不現無量三昧皆能入普賢恆以種種身法界周流悉充滿三昧神通方便力圓音廣説皆無礙一切剎中諸佛所種種三昧現神通一一神通悉周遍十方國土無遺者如一切剎如來所彼剎塵中悉亦然所現三昧神通事毗盧遮那之願力普賢身相如虗空依真而住非國土隨諸衆生心所欲示現普身等一切普賢安住諸大願獲此無量神通力一切佛身所有剎悉現其形而詣彼一切衆海無有邊分身住彼亦無量所現國土皆嚴淨一剎那中見多劫普賢安住一切剎所現神通勝無比震動十方靡不周令其觀者悉得見一切佛智功德力種種大法皆成滿以諸三昧方便門示己往昔菩提行如是自在不思議十方國土皆示現為顯普入諸三昧佛光雲中讚功德爾時一切菩薩衆皆向普賢合掌瞻仰承佛神力同聲讚言從諸佛法而出生亦因如來願力起真如平等虗空藏汝已嚴淨此法身一切佛剎衆會中普賢遍住於其所功德智海光明者等照十方無不見普賢廣大功德海遍往十方親近佛一切塵中所有剎悉能詣彼而明現佛子我曹常見汝諸如來所悉親近住於三昧實境中一切國土微塵劫佛子能以普遍身悉詣十方諸國土衆生大海咸濟度法界微塵無不入入於法界一切塵其身無盡無差別譬如虗空悉周遍演説如來廣大法一切功德光明者如雲廣大力殊勝衆生海中皆往詣説佛所行無等法為度衆生於劫海普賢勝行皆修習演一切法如大雲其音廣大靡不聞國土云何得成立諸佛云何而出現及以一切衆生海願隨其義如實説此中無量大衆海悉在尊前恭敬住為轉清淨妙法輪一切諸佛皆隨喜此下現相作證分以十方菩薩得益心喜喜則地動及有諸瑞諸會聞竟得故現瑞證居後此會雖即未聞先已得益故先現瑞以此會辨果顯殊勝故補義云以此果法初則海衆不言而請然如來命普賢説但以光加亦未有言命故今普賢入此如來藏身三昧即此三昧已彰無盡法界之全體故雖不言而已示答盡故十方海衆亦不待説而先默證乎絶言之體此即普賢業已説畢故海衆得益而地動現瑞以證其益也故次一切如來諸毛孔中咸放光明於光明中説頌讚德以讚普賢乃深入法界之説主也故次一切菩薩以聞光中偈讚普賢之德是則前雖得益而不知益之所以而今乃知從普賢得故皆向普賢承佛神力同聲説頌以讚請也十偈分三初一分總述前定次八別顯遍相後一結讚所由以內堪受法外有諸佛隨喜故應説故上普賢三昧品竟世界成就品第四此品來意以前説緣既具此下正陳所説總明果相別答法界安立海問故此品來下華藏品為別明本師之所嚴淨此品以為總明諸佛果相釋名世界者世謂三世墮去來今故界為方分有彼此故又世謂隱覆界亦分齊謂諸有為可壞者世即隱覆無為不可壞法從真性起同無為法即隱覆有為可破壞世名不相雜是其分齊是故感華藏者對娑婆而見華藏感娑婆者對華藏而見娑婆成就者即能成之緣有十緣等能所合目故云世界成就爾時普賢菩薩摩訶薩以佛神力遍觀察一切世界海一切衆生海一切諸佛海一切法界海一切衆生業海一切衆生根欲海一切諸佛法輪海一切三世海一切如來願力海一切如來神變海如是觀察已普告一切道場衆海諸菩薩言佛子諸佛世尊知一切世界海成壞清淨智不可思議知一切衆生業海智不可思議知一切法界安立海智不可思議説一切無邊佛海智不可思議入一切欲解根海智不可思議一念普知一切三世智不可思議顯示一切如來無量願海智不可思議示現一切佛神變海智不可思議轉法輪智不可思議建立演説海不可思議清淨佛身不可思議無邊色相海普照明不可思議相及隨好皆清淨不可思議無邊色相光明輪海具足清淨不可思議種種色相光明雲海不可思議殊勝寶𦦨海不可思議成就言音海不可思議示現三種自在海調伏成熟一切衆生不可思議勇猛調伏諸衆生海無空過者不可思議安住佛地不可思議入如來境界不可思議威力護持不可思議觀察一切佛智所行不可思議諸力圓滿無能摧伏不可思議無畏功德無能過者不可思議住無差別三昧不可思議神通變化不可思議清淨自在智不可思議一切佛法無能毀壞不可思議如是等一切法我當承佛神力及一切如來威神力故具足宣説為令衆生入佛智慧海故為令一切菩薩於佛功德海中得安住故為令一切世界海一切佛自在所莊嚴故為令一切劫海中如來種性恆不斷故為令於一切世界海中顯示諸法真實性故為令隨一切衆生無量解海而演説故為令隨一切衆生諸根海方便令生諸佛法故為令隨一切衆生樂欲海摧破一切障礙山故為令隨一切衆生心行海令淨修治出要道故為令一切菩薩安住普賢願海中故是時普賢菩薩復欲令無量道場衆海生歡喜故令於一切法增長愛樂故令生廣大真實信解海故令淨治普門法界藏身故令安立普賢願海故令淨治入三世平等智眼故令增長普照一切世間藏大慧海故令生陀羅尼力持一切法輪故令於一切道場中盡佛境界悉開示故令開闡一切如來法門故令增長法界廣大甚深一切智性故即説頌言智慧甚深功德海普現十方無量國隨諸衆生所應見光明遍照轉法輪十方剎海叵思議佛無量劫皆嚴淨為化衆生使成熟出興一切諸國土佛境甚深難可思普示衆生令得入其心樂小著諸有不能通達佛所悟若有淨信堅固心常得親近善知識一切諸佛與其力此乃能入如來智離諸諂誑心清淨常樂慈悲性歡喜志欲廣大深信人彼聞此法生欣悅安住普賢諸願地修行菩薩清淨道觀察法界如虗空此乃能知佛行處此諸菩薩獲善利見佛一切神通力修餘道者莫能知普賢行人方得悟衆生廣大無有邊如來一切皆護念轉正法輪靡不至毗盧遮那境界力一切剎土入我身所住諸佛亦復然汝應觀我諸毛孔我今示汝佛境界普賢行願無邊際我已修行得具足普眼境界廣大身是佛所行應諦聽此下正陳法海有三品於中初二品明果後一品辨因明果答前三十句果問辨因答前十句因問今初品通辨諸佛衆生所有剎海後品別明本師之所嚴淨此品答安立之問具因具果後品唯果遍觀等者先入三昧內契其源今云遍觀外審其相如是下正説次諸佛世尊知一切世界海下十不可思議牒上十句世界海等問次清淨佛身不可思議下十不可思議牒上六根三業十句問次安住地不可思議下十不可思議牒上最初德用圓備十句問次如是等一切法至具足宣説許説分齊疏問云若言具説者何以下文唯説安立及世界耶答經來不盡故以遮那品末無有結屬故若經具來應更答餘三十八問又雖説二世界海亦已通具三十句問次云為令衆生入佛智慧海故下十句説所成益次是時普賢菩薩復欲令無量衆海生歡喜故下讚勝勸聽次令於一切法增長愛樂故下十句別顯喜義次即説頌言十偈初二偈明佛出現次辨定法器初一偈揀非器次四偈明正是法器後一偈結歸佛力後二偈勸聽下文正陳所説爾時普賢菩薩摩訶薩告諸大衆言此一句乃結集生起諸佛子世界海有十種事過去現在未來諸佛已説現説當説此下普賢顯説於前三十句果問中答世界安立海一問餘並攝之世界廣深目之為海謂積剎成種積種成海海無別體乃世界之都名然事類廣多略舉其十何者為十所謂世界海起具因緣世界海所依住世界海形狀世界海體性世界海莊嚴世界海清淨世界海佛出興世界海劫住世界海劫轉變差別世界海無差別門此徵列世界海十種不同諸佛子略説世界海有此十事若廣説者與世界海微塵數等過去現在未來諸佛已説現説當説此結略顯廣言世界海塵者智猶難測言豈能陳非證法雲安受茲説然上十事於一一剎多少不定具緣一種或一或二或三或多清淨一種或一或多或無以有純穢剎故其無差別一切皆具以約體性平等佛力融攝故説無差別所以染淨皆具也言有世界海塵數者約融攝無盡之説也謂以世界海盡末為塵一塵作一剎海每一剎海其具緣等又各有剎海塵數之緣等謂剎海之多而一一所具緣等亦各有多多也故云無盡諸佛子略説以十種因緣故一切世界海已成現成當成何者為十所謂如來神力故法應如是故一切衆生行業故一切菩薩成一切智所得故一切衆生及諸菩薩同集善根故一切菩薩嚴淨國土願力故一切菩薩成就不退行願故一切菩薩清淨勝解自在故一切如來善根所流及一切諸佛成道時自在勢力故普賢菩薩自在願力故諸佛子是為略説十種因緣若廣説者有世界海微塵數爾時普賢菩薩欲重宣其義承佛威力觀察十方而説頌言所説無邊衆剎海毗盧遮那悉嚴淨世尊境界不思議智慧神通力如是菩薩修行諸願海普隨衆生心所欲衆生心行廣無邊菩薩國土遍十方菩薩趣於一切智勤修種種自在力無量願海普出生廣大剎土皆成就修諸行海無有邊入佛境界亦無量為淨十方諸國土一一土經無量劫衆生煩惱所擾濁分別欲樂非一相隨心造業不思議一切剎海斯成立佛子剎海莊嚴藏離垢光明寶所成斯由廣大信解心十方所住咸如是菩薩能修普賢行遊行法界微塵道塵中悉現無量剎清淨廣大如虗空等虗空界現神通悉詣道場諸佛所蓮華座上示衆相一一身包一切剎一念普現於三世一切剎海皆成立佛以方便昔入中此是毗盧所嚴淨爾時普賢菩薩復告大衆言諸佛子一一世界海有世界海微塵數所依住所謂或依一切莊嚴住或依虗空住或依一切寶光明住或依一切佛光明住或依一切寶色光明住或依一切佛音聲住或依如幻業生大力阿修羅形金剛手住或依一切世主身住或依一切菩薩身住或依普賢菩薩願所生一切差別莊嚴海住諸佛子世界海有如是等世界海微塵數所依住爾時普賢菩薩欲重宣其義承佛威力觀察十方而説頌曰遍滿十方虗空界所有一切諸國土如來神力之所加處處現前皆可見或有種種諸國土無非離垢寶所成清淨摩尼最殊妙熾然普現光明海或有清淨光明剎依止虗空界而住或在摩尼寶海中復有安住光明藏如來處此衆會海演説法輪皆巧妙諸佛境界廣無邊衆生見者心歡喜有以摩尼作嚴飾狀如華燈廣分布香𦦨光雲色熾然覆以妙寶光明網或有剎土無邊際安住蓮華深大海廣博清淨與世殊諸佛妙善華嚴故或有剎海隨輪轉以佛威神得安住諸菩薩衆安在中常見無央廣大寶或有住於金剛手或復有住天主身毗盧遮那無上尊常於此處轉法輪或依寶樹平均住香𦦨雲中亦復然或有依諸大水中有住堅固金剛海或有依止金剛幢或有住於華海中廣大神變無不周毗盧遮那此能現或修或短無量種其相旋環亦非一妙莊嚴藏與世殊清淨修治乃能見如是種種各差別一切皆依願海住或有國土常在空諸佛如雲悉充遍或有在空懸覆住或時而有或無有或有國土極清淨住於菩薩寶冠中十方諸佛大神通一切皆於此中見諸佛音聲咸遍滿斯由業力之所化或有國土周法界清淨離垢從心起如影如幻廣無邊如因陀網各差別或現種種莊嚴藏依止虗空而建立諸業境界不思議佛力顯世皆令見一一國土微塵內念念示現諸佛剎數皆無量等衆生普賢所作恆如是為欲成熟衆生故是中修行經劫海廣大神變靡不興法界之中悉周遍法界國土一一塵諸大剎海住其中佛雲平等悉彌覆於一切處咸充滿如一塵中自在用一切塵內亦復然諸佛菩薩大神通毗盧遮那悉能現一切廣大諸剎土如影如幻亦如𦦨十方不見所從生亦復無來無去處滅壞生成互循復於虗空中無暫已莫不皆由清淨願廣大業力之所持爾時普賢菩薩復告大衆言諸佛子世界海有種種差別形相所謂或圓或方或非圓方無量差別或如水旋形或如山𦦨形或如樹形或如華形或如宮殿形或如衆生形或如佛形如是等有世界海微塵數爾時普賢菩薩欲重宣其義承佛威力觀察十方而説頌言諸國土海種種別種種莊嚴種種住殊形共美遍十方汝等咸應共觀察其狀或圓或有方或復三維及八隅摩尼輪狀蓮華等一切皆由業令異或有清淨𦦨莊嚴真金間錯多殊好門闥競開無壅滯斯由業廣意無雜剎海無邊差別藏譬如雲布在虗空寶輪布地妙莊嚴諸佛光明照耀中一切國土心分別種種光明而照現佛於如是剎海中各各示現神通力或有雜染或清淨受苦受樂各差別斯由業海不思議諸流轉法恆如是一毛孔內難思剎等微塵數種種住一一皆有遍照尊在衆會中宣妙法於一塵中大小剎種種差別如塵數平坦高下各不同佛悉往詣轉法輪一一塵中所現剎皆是本願神通力隨其心樂種種殊相虗空中悉能作一切國土所有塵一一塵中佛皆入普為衆生起神變毗盧遮那法如是爾時普賢菩薩復告大衆言諸佛子應知世界海有種種體所謂或以一切寶莊嚴為體或以一寶種種莊嚴為體或以一切寶光明為體或以種種色光明為體或以一切莊嚴光明為體或以不可壞金剛為體或以佛力持為體或以妙寶相為體或以佛變化為體或以日摩尼輪為體或以極微細寶為體或以一切寶𦦨為體或以種種香為體或以一切寶華冠為體或以一切寶影像為體或以一切莊嚴所示現為體或以一念心普示現境界為體或以菩薩形寶為體或以寶華蕊為體或以佛言音為體爾時普賢菩薩欲重宣其義承佛威力觀察十方而説頌言或有諸剎海妙寶所合成堅固不可壞安住寶蓮華或是淨光明出生不可知一切光莊嚴依止虗空住或淨光為體復依光明住光雲作嚴飾菩薩共遊處或有諸剎海從於願力生猶如影像住取説不可得或以摩尼成普放日藏光珠輪以嚴地菩薩悉充滿有剎寶𦦨成𦦨雲覆其上衆寶光殊妙皆由業所得或從妙相生衆相莊嚴地如冠共持戴斯由佛化起或從心海生隨心所解住如幻無處所一切是分別或以佛光明摩尼光為體諸佛於中現各現神通力或普賢菩薩化現諸剎海願力所莊嚴一切皆殊妙爾時普賢菩薩復告大衆言諸佛子應知世界海有種種莊嚴所謂或以一切莊嚴具中出上妙雲莊嚴或以説一切菩薩功德莊嚴或以説一切衆生業報莊嚴或以示現一切菩薩願海莊嚴或以表示一切三世佛影像莊嚴或以一念頃示現無邊劫神通境界莊嚴或以出現一切佛身莊嚴或以出現一切寶香雲莊嚴或以示現一切道場中諸珍妙物光明照耀莊嚴或以示現一切普賢行願莊嚴如是等有世界海微塵數爾時普賢菩薩欲重宣其義承佛威力觀察十方而説頌言廣大剎海無有邊皆由清淨業所成種種莊嚴種種住一切十方皆遍滿無邊色相寶𦦨雲廣大莊嚴非一種十方剎海常出現普現妙音而説法菩薩無邊功德海種種大願所莊嚴此土俱時出妙音普震十方諸剎網衆生業海廣無量隨其感報各不同於一切處莊嚴中皆由諸佛能演説三世所有諸如來神通普現諸剎海一一事中一切佛如是嚴淨汝應觀過去未來現在劫十方一切諸國土於彼所有大莊嚴一一皆於剎中見一切事中無量佛數等衆生遍世間為令調伏起神通以此莊嚴國土海一切莊嚴吐妙雲種種華雲香𦦨雲摩尼寶雲常出現剎海以此為嚴飾十方所有成道處種種莊嚴皆具足流光布逈若彩雲於此剎海咸令見普賢願行諸佛子等衆生劫勤修習無邊國土悉莊嚴一切處中皆顯現爾時普賢菩薩復告大衆言諸佛子應知世界海有世界海微塵數清淨方便海所謂諸菩薩親近一切善知識同善根故增長廣大功德雲遍法界故淨修廣大諸勝解故觀察一切菩薩境界而安住故修治一切諸波羅蜜悉圓滿故觀察一切菩薩諸地而入住故出生一切淨願海故修習一切出要行故入於一切莊嚴海故成就清淨方便力故如是等有世界海微塵數爾時普賢菩薩欲重宣其義承佛威力觀察十方而説頌言一切剎海諸莊嚴無數方便願力生一切剎海常光耀無量清淨業力起久遠親近善知識同修善業皆清淨慈悲廣大遍衆生以此莊嚴諸剎海一切法門三昧等禪定解脫方便地於諸佛所悉淨治以此出生諸剎海發生無量決定解能解如來等無異忍海方便已修治故能嚴淨無邊剎為利衆生修勝行福德廣大常增長譬如雲布等虗空一切剎海皆成就諸度無量等剎塵悉已修行令具足願波羅蜜無有盡清淨剎海從此生淨修無等一切法生起無邊出要行種種方便化群生如是莊嚴國土海修習莊嚴方便地入佛功德法門海普使衆生竭苦源廣大淨剎皆成就力海廣大無與等普使衆生種善根供養一切諸如來國土無邊悉清淨爾時普賢菩薩復告大衆言諸佛子應知一一世界海有世界海微塵數佛出現差別所謂或現小身或現大身或現短壽或現長壽或唯嚴淨一佛國土或有嚴淨無量佛土或唯顯示一乘法輪或有顯示不可思議諸乘法輪或現調伏少分衆生或示調伏無邊衆生如是等有世界海微塵數爾時普賢菩薩欲重宣其義承佛威力觀察十方而説頌言諸佛種種方便門出興一切諸剎海皆隨衆生心所樂此是如來善權力諸佛法身不思議無色無形無影像能為衆生現衆相隨其心樂悉令見或為衆生現短壽或現住壽無量劫法身十方普現前隨宜出現於世間或有嚴淨不思議十方所有諸剎海或唯嚴淨一國土於一示現悉無餘或隨衆生心所樂示現難思種種乘或有唯宣一乘法一中方便現無量或有自然成正覺令少衆生住於道或有能於一念中開悟羣迷無有數或於毛孔出化雲示現無量無邊佛一切世間皆現覩種種方便度羣生或有言音普周遍隨其心樂而説法不可思議大劫中調伏無量衆生海或有無量莊嚴國衆會清淨儼然坐佛如雲布在其中十方剎海靡不充諸佛方便不思議隨衆生心悉現前普住種種莊嚴剎一切國土皆周遍爾時普賢菩薩復告大衆言諸佛子應知世界海有世界海微塵數劫住所謂或有阿僧祇劫住或有無量劫住或有無邊劫住或有無等劫住或有不可數劫住或有不可稱劫住或有不可思劫住或有不可量劫住或有不可説劫住或有不可説不可説劫住如是等有世界海微塵數爾時普賢菩薩欲重宣其義承佛威力觀察十方而説頌言世界海中種種劫廣大方便所莊嚴十方國土咸觀見數量差別悉明了我見十方世界海劫數無量等衆生或長或短或無邊以佛音聲今演説我見十方諸剎海或住國土微塵劫或有一劫或無數以願種種各不同或有純淨或純染或復染淨二俱雜願海安立種種殊住於衆生心想中往昔修行剎塵劫獲大清淨世界海諸佛境界具莊嚴永住無邊廣大劫有名種種寶光明或名等音𦦨眼藏離塵光明及賢劫此清淨劫攝一切有清淨劫一佛興或一劫中無量現無盡方便大願力入於一切種種劫或無量劫入一劫或復一劫入多劫一切劫海種種門十方國土皆明現或一切劫莊嚴事於一劫中皆現覩或一劫內所莊嚴普入一切無邊劫始從一念終成劫悉依衆生心想生一切剎海劫無邊以一方便皆清淨爾時普賢菩薩復告大衆言諸佛子應知世界海有世界海微塵數劫轉變差別所謂法如是故世界海無量成壞劫轉變染汙衆生住故世界海成染汙劫轉變修廣大福衆生住故世界海成染淨劫轉變信解菩薩住故世界海成染淨劫轉變無量衆生發菩提心故世界海純清淨劫轉變諸菩薩各各遊諸世界故世界海無邊莊嚴劫轉變十方一切世界海諸菩薩雲集故世界海無量大莊嚴劫轉變諸佛世尊入涅槃故世界海莊嚴滅劫轉變諸佛出現於世故一切世界海廣博嚴淨劫轉變如來神通變化故世界海普清淨劫轉變如是等有世界海微塵數爾時普賢菩薩欲重宣其義承佛威力觀察十方而説頌言一切諸國土皆隨業力生汝等應觀察轉變相如是染汙諸衆生業惑纏可怖彼心令剎海一切成染汙若有清淨心修諸福德行彼心令剎海雜染及清淨信解諸菩薩於彼劫中生隨其心所有雜染清淨見無量諸衆生悉發菩提心彼心令剎海住劫恆清淨無量億菩薩往詣於十方莊嚴無有殊劫中差別見一一微塵內佛剎如塵數菩薩共雲集國土皆清淨世尊入涅槃彼土莊嚴滅衆生無法器世界成雜染若有佛興世一切悉珍好隨其心清淨莊嚴皆具足諸佛神通力示現不思議是時諸剎海一切普清淨爾時普賢菩薩復告大衆言諸佛子應知世界海有世界海微塵數無差別所謂一一世界海中有世界海微塵數世界無差別一一世界海中諸佛出現所有威力無差別一一世界海中一切道場遍十方法界無差別一一世界海中一切如來道場衆會無差別一一世界海中一切佛光明遍法界無差別一一世界海中一切佛變化名號無差別一一世界海中一切佛音聲普遍世界海無邊劫住無差別一一世界海中法輪方便無差別一一世界海中一切世界海普入一塵無差別一一世界海中一一微塵一切三世諸佛世尊廣大境界皆於中現無差別諸佛子世界海無差別略説如是若廣説者有世界海微塵數無差別爾時普賢菩薩欲重宣其義承佛威力普觀十方而説頌言一微塵中多剎海處所各別悉嚴淨如是無量入一中一一區分無雜越一一塵內難思佛隨衆生心普現前一切剎海靡不周如是方便無差別一一塵中諸樹王種種莊嚴悉垂布十方國土皆同現如是一切無差別一一塵內微塵衆悉共圍繞人中主出過一切遍世間亦不迫隘相雜亂一一塵中無量光普遍十方諸國土悉現諸佛菩提行一切剎海無差別一一塵中無量身變化如雲普周遍以佛神通導羣品十方國土亦無別一一塵中説衆法其法清淨如輪轉種種方便自在門一切皆演無差別一塵普演諸佛音充滿法器諸衆生遍住剎海無央劫如是音聲亦無異剎海無量妙莊嚴於一塵中無不入如是諸佛神通力一切皆由業性起一一塵中三世佛隨其所樂悉令見體性無來亦無去以願力故遍世間此下別釋十事不同則為十段一一皆有長行偈頌今初起具因緣標中略舉十種通成三世一切佛剎何者下徵列十緣然佛土之義雖有多種不出其三一法性土二受用土三變化土若開受用有自有他則成四土統唯二種謂淨及穢或性及相今融而為一有異餘宗又此淨土一質不成淨穢虧盈異質不成一理齊平有質不成搜源則冥無質不成緣起萬形故形奪圓融無有障礙土既不等因緣亦殊今文十中初三通顯次四分別明後三即融攝轉變言初三者一如來神力者謂一切淨穢等土皆是如來通慧力成為物而取擬將普應二法如是者梵云達磨多此云法爾或云法性若是法性即以本識如來藏身為所依持恆頓變起外諸器界三衆生業力者業有善惡土有淨穢次四別明者有因有緣初一自受用土因大圓鏡智之所成故二變化土因謂衆生菩薩共搆一緣各隨行業來生其國凡聖同居三四二種他受用土因然初即初地已上如十大願中修淨土願是也後即八地已上功用不退行之所成故八地中有淨土分後三融攝者通於因緣初一即八地已上攪大海為酥酪變大地作黃金以染為淨以淨為染自在攝生故十自在中有剎自在窮其因者清淨勝解勝解印持隨心轉變次一謂成正覺時其身充滿十方世界微塵剎土念劫圓融一時成立由二種因一善根所流語因也二成道勢力明果用也此一受用變化相融也即如經初摩竭陀地堅固等後一無問成與不成常能融攝又前是妙覺此是等覺其法性土為諸土之體其偈頌中初一偈頌如來神力二一偈頌同集善根三一偈頌成一切智四一偈頌六七二句五一偈頌衆生行業六一偈頌菩薩勝解七一偈頌普賢行願八二偈頌如來自在上總明世界起具因緣次二所依住三形狀四體性五莊嚴六清淨七佛出興八住劫不同九住劫轉變十無差別如是次第下文各有長行偈頌臨文可知疏各有多義學者尋之上世界成就品竟
