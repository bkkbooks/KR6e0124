body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈世主妙嚴品第一之三復次持國乾闥婆王得自在方便攝一切衆生解脫門樹光乾闥婆王得普見一切功德莊嚴解脫門淨目乾闥婆王得永斷一切衆生憂苦出生歡喜藏解脫門華冠乾闥婆王得永斷一切衆生邪見惑解脫門喜步普音乾闥婆王得如雲廣布普蔭澤一切衆生解脫門樂搖動美目乾闥婆王得現廣大妙好身令一切獲安樂解脫門妙音師子幢乾闥婆王得普散十方一切大名稱寶解脫門普放寶光明乾闥婆王得現一切大歡喜光明清淨身解脫門金剛樹華幢乾闥婆王得普滋榮一切樹令見者歡喜解脫門普現莊嚴乾闥婆王得善入一切佛境界與衆生安樂解脫門爾時持國乾闥婆王承佛威力普觀一切乾闥婆衆而説頌言諸佛境界無量門一切衆生莫能入善逝如空性清淨普為世間開正道如來一一毛孔中功德大海皆充滿一切世間咸利樂此樹光王所能見世間廣大憂苦海佛能消竭悉無餘如來慈愍多方便淨目於此能深解十方剎海無有邊佛以智光咸照曜普使滌除邪惡見此樹華王所入門佛於往昔無量劫修習大慈方便行一切世間咸慰安此道普音能悟入佛身清淨皆樂見能生世間無盡樂解脫因果次第成美目於斯善開示衆生迷惑常流轉愚癡障蓋極堅密如來為説廣大法師子幢王能演暢如來普現妙色身無量差別等衆生種種方便照世間妙音如是觀於佛大智方便無量門佛為羣生普開闡入勝菩提真實行此金剛幢善觀察一剎那中百千劫佛力能現無所動等以安樂施羣生此樂莊嚴之解脫復次增長鳩槃茶王得滅一切怨害力解脫門龍主鳩槃茶王得修習無邊行門海解脫門莊嚴幢鳩槃茶王得知一切衆生心所樂解脫門饒益行鳩槃茶王得普成就清淨大光明所作業解脫門可怖畏鳩槃茶王得開示一切衆生安隱無畏道解脫門妙莊嚴鳩槃茶王得消竭一切衆生愛欲海解脫門高峰慧鳩槃茶王得普現諸趣光明雲解脫門勇健臂鳩槃茶王得普放光明滅如山重障解脫門無邊淨華眼鳩槃茶王得開示不退轉大悲藏解脫門廣大面鳩槃茶王得普現諸趣流轉身解脫門爾時增長鳩槃茶王承佛威力普觀一切鳩槃茶衆而説頌言成就忍力世導師為物修行無量劫永離世間憍慢惑是故其身最嚴淨佛昔普修諸行海教化十方無量衆種種方便利羣生此解脫門龍主得佛以大智救衆生莫不明了知其心種種自在而調伏嚴幢見此生歡喜神道應現如光影法輪真實同虗空如是處世無央劫此饒益王之所證衆生癡翳常蒙惑佛光照現安隱道為作救護令除苦可畏能觀此法門欲海漂淪具衆苦智光普照滅無餘既除苦已為説法此妙莊嚴之所悟佛身普應無不見種種方便化羣生音如雷震雨法雨如是法門高慧入清淨光明不唐發若遇必令消重障演佛功德無有邊勇臂能明此深理為欲安樂諸衆生修習大悲無量劫種種方便除衆苦如是淨華之所見神通自在不思議其身普現遍十方而於一切無來去此廣面王心所了復次毗樓博叉龍王得消滅一切諸龍趣熾然苦解脫門娑竭羅龍王得一念中轉自龍形示現無量衆生身解脫門雲音幢龍王得於一切諸有趣中以清淨音説佛無邊名號海解脫門𦦨口龍王得普現無邊佛世界建立差別解脫門𦦨眼龍王得一切衆生嗔癡蓋纏如來慈愍令除滅解脫門雲幢龍王得開示一切衆生大喜樂福德海解脫門德叉迦龍王得以清淨救護音滅除一切怖畏解脫門無邊步龍王得示現一切佛色身及住劫次第解脫門清淨色速疾龍王得出生一切衆生大愛樂歡喜海解脫門普行大音龍王得示現一切平等悅意無礙音解脫門無熱惱龍王得以大悲普覆雲滅一切世間苦解脫門爾時毗樓博叉龍王承佛威力普觀一切諸龍衆已而説頌言汝觀如來法常爾一切衆生咸利益能以大悲哀愍力拔彼畏塗淪墜者一切衆生種種別於一毛端皆示現神通變化滿世間娑竭如是觀於佛佛以神通無限力廣演名號等衆生隨其所樂普使聞如是雲音能悟解無量無邊國土衆佛能令入一毛孔如來安坐彼會中此𦦨口龍之所見一切衆生瞋恚心纏蓋愚癡深若海如來慈愍皆除滅𦦨龍觀此能明見一切衆生福德力佛毛孔中皆顯現現已令歸大福海此高雲幢之所觀佛身毛孔發智光其光處處演妙音衆生聞者除憂畏德叉迦龍悟斯道三世一切諸如來國土莊嚴劫次第如是皆於佛身現廣步見此神通力我觀如來往昔行供養一切諸佛海於彼咸增喜樂心此速疾龍之所入佛以方便隨類音為衆説法令歡喜其音清雅衆所悅普行聞此心欣悟衆生逼迫諸有中業惑漂轉無人救佛以大悲令解脫無熱大龍能悟此復次毗沙門夜叉王得以無邊方便救護惡衆生解脫門自在音夜叉王得普觀察衆生方便救護解脫門嚴持器仗夜叉王得能資益一切甚羸惡衆生解脫門大智慧夜叉王得稱揚一切聖功德海解脫門𦦨眼主夜叉王得普觀察一切衆生大悲智解脫門金剛眼夜叉王得種種方便利益安樂一切衆生解脫門勇健臂夜叉王得普入一切諸法義解脫門勇敵大軍夜叉王得守護一切衆生令住於道無空過者解脫門富財夜叉王得增長一切衆生福德聚令恆受快樂解脫門力壞高山夜叉王得隨順憶念出生佛力智光明解脫門爾時多聞大夜叉王承佛威力普觀一切夜叉衆會而説頌言衆生罪惡深可怖於百千劫不見佛漂流生死受衆苦為救是等佛興世如來救護諸世間悉現一切衆生前息彼畏塗輪轉苦如是法門音王入衆生惡業為重障佛示妙理令開解譬以明燈照世間此法嚴仗能觀見佛昔劫海修諸行稱讚十方一切佛故有高遠大名聞此智慧王之所了智慧如空無有邊法身廣大不思議是故十方皆出現𦦨目於此能觀察一切趣中演妙音説法利益諸羣生其聲所暨衆苦滅入此方便金剛眼一切甚深廣大義如來一句能演説如是教理等世間勇健慧王之所悟一切衆生住邪道佛示正道不思議普使世間成法器此勇敵軍能悟解世間所有衆福業一切皆由佛光照佛智慧海難測量如是富財之解脫憶念往劫無央數佛於是中修十力能令諸力皆圓滿此高幢王所了知復次善慧摩睺羅伽王得以一切神通方便令衆生集功德解脫門淨威音摩睺羅伽王得使一切衆生除煩惱得清涼悅樂解脫門勝慧莊嚴髻摩睺羅伽王得普使一切善不善思覺衆生入清淨法解脫門妙目主摩睺羅伽王得了達一切無所著福德自在平等相解脫門燈幢摩睺羅伽王得開示一切衆生令離黑暗怖畏道解脫門最勝光明幢摩睺羅伽王得了知一切佛功德生歡喜解脫門師子臆摩睺羅伽王得勇猛力為一切衆生救護主解脫門衆妙莊嚴音摩睺羅伽王得令一切衆生隨憶念生無邊喜樂解脫門須彌臆摩睺羅伽王得於一切所緣決定不動到彼岸滿足解脫門可愛樂光明摩睺羅伽王得為一切不平等衆生開示平等道解脫門爾時善慧威光摩睺羅伽王承佛威力普觀一切摩睺羅伽衆而説頌言汝觀如來性清淨普現威光利羣品示甘露道使清涼衆苦永樂無所依一切衆生居有海諸惡業惑自纏覆示彼所行寂靜法離塵威音能善了佛智無等叵思議知衆生心無不盡為彼闡明清淨法如是嚴髻心能悟無量諸佛現世間普為衆生作福田福海廣大深難測妙目大王能悉見一切衆生憂畏苦佛普現前而救護法界虗空靡不周此是燈幢所行境佛一毛孔諸功德世間共度不能了無邊無盡同虗空如是廣大光幢見如來通達一切法於彼法性皆明照如須彌山不傾動入此法門師子臆佛於往昔廣大劫集歡喜海深無盡是故見者靡不欣此法嚴音之所入了知法界無形相波羅蜜海悉圓滿大光普救諸衆生山臆能知此方便汝觀如來自在力十方降現罔不均一切衆生咸照悟此妙光明能善入復次善慧光明天緊那羅王得普生一切喜樂業解脫門妙華幢緊那羅王得能生無上法喜令一切受安樂解脫門種種莊嚴緊那羅王得一切功德滿足廣大清淨信解藏解脫門悅意吼聲緊那羅王得恆出一切悅意聲令聞者離憂怖解脫門寶樹光明緊那羅王得大悲安立一切衆生令覺悟所緣解脫門普樂見緊那羅王得示現一切妙色身解脫門最勝光莊嚴緊那羅王得了知一切殊勝莊嚴果所從生業解脫門微妙華幢緊那羅王得善觀察一切世間業所生報解脫門動地力緊那羅王得恆起一切利益衆生事解脫門威猛主緊那羅王得善知一切緊那羅心巧攝御解脫門爾時善慧光明天緊那羅王承佛威力普觀一切緊那羅衆而説頌言世間所有安樂事一切皆由見佛興導師利益諸衆生普作救護歸依處出生一切諸善樂世間咸得無有盡能令見者不唐捐此是華幢之所悟佛功德海無有盡求其邊際不可得光明普照於十方此莊嚴王之解脫如來大音常演暢開示離憂真實法衆生聞者咸欣悅如是吼聲能信受我觀如來自在力皆由往昔所修行大悲救物令清淨此寶樹王能悟入如來難可得見聞衆生億劫時乃遇衆生為嚴悉具足此樂見王之所覩汝觀如來大智慧普應羣生心所欲一切智道靡不宣最勝莊嚴此能了業海廣大不思議衆生苦樂皆從起如是一切能開示此華幢王所了知諸佛神通無間歇十方大地恆震動一切衆生莫能知此廣大力恆明見處於衆會現神通放大光明令覺悟顯示一切如來境此威猛主能觀察復次大速疾力迦樓羅王得無著無礙眼普觀察衆生界解脫門不可壞寶髻迦樓羅王得普安住法界教化衆生解脫門清淨速疾迦樓羅王得普成就波羅蜜精進力解脫門不退心莊嚴迦樓羅王得勇猛力入如來境界解脫門大海處攝持力迦樓羅王得入佛行廣大智慧海解脫門堅法淨光迦樓羅王得成就無邊衆生差別智解脫門妙嚴冠髻迦樓羅王得莊嚴佛法城解脫門普捷示現迦樓羅王得成就不可壞平等力解脫門普觀海迦樓羅王得了知一切衆生身而為現形解脫門龍音大目精迦樓羅王得普入一切衆生歿生行智解脫門爾時大速疾力迦樓羅王承佛威力普觀一切迦樓羅衆而説頌言佛眼廣大無邊際普見十方諸國土其中衆生不可量現大神通悉調伏佛神通力無所礙遍坐十方覺樹下演法如雲悉充滿寶髻聽聞心不逆佛於往昔修諸行普淨廣大波羅蜜供養一切諸如來此速疾王深信解如來一一毛孔中一念普現無邊行如是難思佛境界不退莊嚴悉明覩佛行廣大不思議一切衆生莫能測導師功德智慧海此執持王所行處如來無量智慧光能滅衆生癡惑網一切世間咸救護此是堅法所持説法城廣大不可窮其門種種無數量如來處世大開闡此妙冠髻能明入一切諸佛一法身真如平等無分別佛以此力常安住普捷現王斯具演佛昔諸有攝衆生普放光明遍世間種種方便示調伏此勝法門觀海悟佛觀一切諸國土悉依業海而安住普雨法雨於其中龍音解脫能如是復次羅睺阿修羅王得現為大會尊勝主解脫門毗摩質多羅阿修羅王得示現無量劫解脫門巧幻術阿修羅王得消滅一切衆生苦令清淨解脫門大眷屬阿修羅王得修一切苦行自莊嚴解脫門婆稚阿修羅王得震動十方無邊境界解脫門遍照阿修羅王得種種方便安立一切衆生解脫門堅固行妙莊嚴阿修羅王得普集不可壞善根淨諸染著解脫門廣大因慧阿修羅王得大悲力無疑惑主解脫門現勝德阿修羅王得普令見佛承事供養修諸善根解脫門善音阿修羅王得普入一切趣決定平等行解脫門爾時羅睺阿修羅王承佛威力普觀一切阿修羅衆而説頌言十方所有廣大衆佛在其中最殊特光明遍照等虗空普現一切衆生前百千萬劫諸佛土一剎那中悉明現舒光化物靡不周如是毗摩深讚喜如來境界無與等種種法門常利益衆生有苦皆令滅苫末羅王此能見無量劫中修苦行利益衆生淨世間由是牟尼智普成大眷屬王斯見佛無礙無等大神通遍動十方一切剎不使衆生有驚怖大力於此能明了佛出於世救衆生一切智道咸開示悉令捨苦得安樂此義遍照所弘闡世間所有衆福海佛力能生普令淨佛能開示解脫處堅行莊嚴入此門佛大悲身無與等周行無礙悉令見猶如影像現世間因慧能宣此功德希有無等大神通處處現身充法界各在菩提樹下坐此義勝德能宣説如來往修三世行諸趣輪回靡不經脫衆生苦無有餘此妙音王所稱讚復次示現宮殿主晝神得普入一切世間解脫門發起慧香主晝神得普觀察一切衆生皆利益令歡喜滿足解脫門樂勝莊嚴主晝神得能放無邊可愛樂法光明解脫門華香妙光主晝神得開發無邊衆生清淨信解心解脫門普集妙藥主晝神得積集莊嚴普光明力解脫門樂作喜目主晝神得普開悟一切苦樂衆生皆令得法樂解脫門觀方普現主晝神得十方法界差別身解脫門大悲威力主晝神得救護一切衆生令安樂解脫門善根光照主晝神得普生喜足功德力解脫門妙華瓔珞主晝神得聲稱普聞衆生見者皆獲益解脫門爾時示現宮殿主晝神承佛威力普觀一切主晝神衆而説頌言佛智如空無有盡光明照耀遍十方衆生心行悉了知一切世間無不入知諸衆生心所樂如應為説衆法海句義廣大各不同具足慧神能悉見佛放光明照世間見聞歡喜不唐捐示其深廣寂滅處此樂莊嚴心悟解佛雨法雨無邊量能令見者大歡喜最勝善根從此生如是妙光心所悟普入法門開悟力曠劫修治悉清淨如是皆為攝衆生此妙藥神之所了種種方便化羣生若見若聞咸受益皆令踊躍大歡喜妙眼晝神如是見十力應現遍世間十方法界悉無餘體性非無亦非有此觀方神之所入衆生流轉險難中如來哀愍出世間悉令除滅一切苦此解脫門悲力住衆生暗覆淪永夕佛為説法大開曉皆使得樂除衆苦大善光神入此門如來福量同虗空世間衆福悉從生凡有所作無空過如是解脫華瓔得復次普德淨光主夜神得寂靜禪定樂大勇健解脫門喜眼觀世主夜神得廣大清淨可愛樂功德相解脫門護世精氣主夜神得普現世間調伏衆生解脫門寂靜海音主夜神得積集廣大歡喜心解脫門普現吉祥主夜神得甚深自在悅意言音解脫門普發樹華主夜神得光明滿足廣大歡喜藏解脫門平等護育主夜神得開悟衆生令成熟善根解脫門遊戲快樂主夜神得救護衆生無邊慈解脫門諸根常喜主夜神得普現莊嚴大悲門解脫門示現淨福主夜神得普使一切衆生所樂滿足解脫門爾時普德淨光主夜神承佛威力遍觀一切主夜神衆而説頌言汝等應觀佛所行廣大寂靜虗空相欲海無涯悉治淨離垢端嚴照十方一切世間咸樂見無量劫海時一遇大悲念物靡不周此解脫門觀世覩導師救護諸世間衆生悉見在其前能令諸趣皆清淨如是護世能觀察佛昔修治歡喜海廣大無邊不可測是故見者咸欣樂此是寂音之所了如來境界不可量寂而能演遍十方普使衆生意清淨尸利夜神聞踊悅佛於無福衆生中大福莊嚴甚威曜示彼離塵寂滅法普發華神悟斯道十方普現大神通一切衆生悉調伏種種色相皆令見此護育神之所觀如來往昔念念中悉淨方便慈悲海救護世間無不遍此福樂神之解脫衆生愚癡常亂濁其心堅毒甚可畏如來慈愍為出興此滅怨神能悟喜佛昔修行為衆生一切願欲皆令滿由是具成功德相此現福神之所入復次遍住一切主方神得普救護力解脫門普現光明主方神得成辦化一切衆生神通業解脫門光行莊嚴主方神得破一切暗障生喜樂大光明解脫門周行不礙主方神得普現一切處不唐勞解脫門永斷迷惑主方神得示現等一切衆生數名號發生功德解脫門遍遊淨空主方神得恆發妙音令聽者皆歡喜解脫門雲幢大音主方神得如龍普雨令衆生歡喜解脫門髻目無亂主方神得示現一切衆生業無差別自在力解脫門普觀世業主方神得觀察一切趣生中種種業解脫門周遍遊覽主方神得所作事皆究竟生一切衆生歡喜解脫門爾時遍住一切主方神承佛威力普觀一切主方神衆而説頌言如來自在出世間教化一切諸羣生普示法門令悟入悉使當成無上智神通無量等衆生隨其所樂示諸相見者皆蒙出離苦此現光神解脫力佛於暗障衆生海為現法炬大光明其光普照無不見此行莊嚴之解脫具足世間種種音普轉法輪無不解衆生聽者煩惱滅此遍住神之所悟一切世間所有名佛名等彼而出生悉使衆生離癡惑此斷迷神所行處若有衆生至佛前得聞如來美妙音莫不心生大歡喜遍遊虗空悟斯法佛於一一剎那中普雨無邊大法雨悉使衆生煩惱滅此雲幢神所了知一切世間諸業海佛悉開示等無異普使衆生除業惑此髻目神之所了一切智地無有邊一切衆生種種心如來照見悉明了此廣大門觀世入佛於往昔修諸行無量諸度悉圓滿大慈哀愍利衆生此遍遊神之解脫復次淨光普照主空神得普知諸趣一切衆生心解脫門普遊深廣主空神得普入法界解脫門生吉祥風主空神得了達無邊境界身相解脫門離障安住主空神得能除一切衆生業惑障解脫門廣步妙髻主空神得普觀察思惟廣大行海解脫門無礙光𦦨主空神得大悲光普救護一切衆生厄難解脫門無礙勝力主空神得普入一切無所著福德力解脫門離垢光明主空神得能令一切衆生心離諸蓋清淨解脫門深遠妙音主空神得普見十方智光明解脫門光遍十方主空神得不動本處而普現世間解脫門爾時淨光普照主空神承佛威力普觀一切主空神衆而説頌言如來廣大目清淨如虗空普見諸衆生一切悉明了佛身大光明遍照於十方處處現前住普遊觀此道佛身如虗空無生無所取無得無自性吉祥風所見如來無量劫廣説諸聖道普滅衆生障圓光悟此門我觀佛往昔所集菩提行悉為安世間妙髻行斯法一切衆生界流轉生死海佛放滅苦光無礙神能見清淨功德藏能為世福田隨以智開覺力神於此悟衆生癡所覆流轉於險道佛為放光明離垢神能證智慧無邊際悉現諸國土光明照世間妙音斯見佛佛為度衆生修行遍十方如是大願心普現能觀察復次無礙光明主風神得普入佛法及一切世間解脫門普現勇業主風神得無量國土佛出現咸廣大供養解脫門飄擊雲幢主風神得以香風普滅一切衆生病解脫門淨光莊嚴主風神得普生一切衆生善根令摧滅重障山解脫門力能竭水主風神得能破無邊惡魔衆解脫門大聲遍吼主風神得永滅一切衆生怖解脫門樹杪垂髻主風神得入一切諸法實相辨才海解脫門普行無礙主風神得調伏一切衆生方便藏解脫門種種宮殿主風神得入寂靜禪定門滅極重愚癡暗解脫門大光普照主風神得隨順一切衆生行無礙力解脫門爾時無礙光明主風神承佛威力普觀一切主風神衆而説頌言一切諸佛法甚深無礙方便普能入所有世間常出現無相無形無影像汝觀如來於往昔一念供養無邊佛如是勇猛菩提行此普現神能悟了如來救世不思議所有方便無空過悉使衆生離諸苦此雲幢神之解脫衆生無福受衆苦重蓋密障常迷覆一切皆令得解脫此淨光神所了知如來廣大神通力克殄一切魔軍衆所有調伏諸方便勇健威力能觀察佛於毛孔演妙音其音普遍於世間一切苦畏皆令息此遍吼神之所了佛於一切衆剎海不思議劫常演説此如來地妙辨才樹杪髻神能悟解佛於一切方便門智入其中悉無礙境界無邊無與等此普行神之解脫如來境界無有邊處處方便皆令見而身寂靜無諸相種種宮神解脫門如來劫海修諸行一切諸力皆成滿能隨世法應衆生此普照神之所見次下自持國乾闥婆王起至無礙光明主風神
