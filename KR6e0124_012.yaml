body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈第二會普光明殿文殊師利菩薩説十信法門此會有六品經如來名號品四聖諦品光明覺品菩薩問明品淨行品賢首品此初如來名號品第七此下第三修因契果生解分第二會初從此第十二經盡十三經菩薩問明品將釋此品五門分別初來意者先明分來前既舉果令生信樂今明能生因果信解故次來也二會來者生解之中信為首故又前舉所信之境今明能信之行故次來也三品來者前品舉因顯果成所信之境今舉果辨因彰能信之行果中三業身為其總故先來也又遠答名號海問二釋名亦三初分名修因契果生解分謂修五位之圓因成十身之滿果令諸菩薩解此相故即生修因契果之解依主釋也二會名約處名普光明殿會然有三釋一以殿是寶成光普照故二佛於其中放普光故三佛於其中説普法門慧光照世故立其名三品名如來現相品已釋召體曰名表德為號名別號通一切諸佛皆具十號名釋迦等則不同故如來即十號之一品中正説隨機就德以立別名爾時世尊在摩竭提國阿蘭若法菩提場中始成正覺於普光明殿坐蓮華藏師子之座此下釋文且順一會分三第一序分第二請分第三説分今先序分具如經初但加普光明殿為小異耳以此經乃初成頓演乃至九會亦序初成況不動而升故今説處在普光明殿疏云此殿去菩提場東南可三里許熙連河曲彼河之龍為佛所造而普光之名上文已釋其實佛依普光明智説此普法六位因果皆依此智圓成故後説等妙二覺猶會普光者通顯不離此智故此通途之大旨也故今會普光明殿即不離覺樹故序初成妙悟皆滿二行永絶達無相法住於佛住得佛平等到無障處不可轉法所行無礙立不思議普見三世此妙悟下十句別顯主德亦即示成正覺之相也準後八會文説佛有二十一種功德今文不全後當明此十句疏釋甚明恐繁不録與十佛剎微塵數諸菩薩俱莫不皆是一生補處悉從他方而共來集普善觀察諸衆生界法界世界涅槃界諸業果報心行次第一切文義世出世間有為無為過現未來時諸菩薩作是思惟若世尊見愍我等願隨所樂此下明輔翼圓滿此十佛剎塵數之衆若是前光召者則已問果法則不應重標而言從他方來集故知是新集衆也次普觀察下十句疏云歎佛德次時諸菩薩作是思惟下乃請分初標念請若世尊見愍我等願隨所樂正顯問端補義曰然下所問句雖五十問但有四十句為正問以第二十句是説意故此四十句與前第一會有異後二十句全同前二十句大同小異又復前後不同初十句即前第三十海前會即總説所觀深廣此則別説如來依正以前會中為總故此會別顯信所依故故前會皆致海言此中但云剎等第二十句前名菩薩十海此列住等行位前通諸會總顯行布圓融因故此約當分欲顯差別因之相故後二十句雖則全同前總此別又前即所信今辨所成欲顯所信所成體無異故此上辨所問與前同異義甚詳細今取文義俱便大分為二初十句直爾疑問後三十句引例請問義不異前更有一義以前所舉佛之因果但總顯因深果廣然未知差別之因及隨因所證之果今要發行造修故須一一別問故下首問果之依正但云剎而不言海者意在行布以海則圓融故也開示佛剎佛住佛剎莊嚴佛法性佛剎清淨佛所説法佛剎體性佛威德佛剎成就佛大菩提此正顯所問初問果中依正各有五句同前剎海如十方一切世界諸佛世尊為成就一切菩薩故令如來種性不斷故救護一切衆生故令諸衆生永離一切煩惱故了知一切諸行故演説一切諸法故淨除一切雜染故永斷一切疑網故拔除一切希望故滅壞一切愛著處故此下第二引例請問文分為三此初十句標彼諸佛説意明其有悲後三十句舉彼所説顯其有智末後一句結以正請意謂前雖説佛廣大因果但顯圓融果海未明差別之因行故此先舉十果即如前之圓融之果然猶未明取果差別之因故引十方如來亦以大悲故亦説差別之因如下所列十住等行故今特請所以此下答所請問通有六位因果皆次第答此中之問也補義曰此下請因正答十海中衆生海問也故次列六位之因以通該後文故疏云皆答此問説諸菩薩十住十行十回向十藏十地十願十定十通十頂第二説諸菩薩下舉彼十方如來所説以請願今亦如例而説也此初十句問因但有九句欠十忍一句後二十句問果疏中辨問中欠十忍而後答文有十忍又問中有十頂而答中無況問中唯九今辨後將十忍已下四品共答頂問以是等覺位極頂故如此則少一位意將十信當立一位則成十矣及説如來地如來境界如來神力如來所行如來力如來無畏如來三昧如來神通如來自在如來無礙如來眼如來耳如來鼻如來舌如來身如來意如來辨才如來智慧如來最勝願佛世尊亦為我説第二有二十句問所成果全同初會於中初十句明內德成滿次如來眼下十句明體相顯著辨才是語業智慧是意業最勝是身業準前會中唯欠佛光明次結請云願佛世尊亦為我説欲同彼諸佛故致亦言上請分竟下答初如來現相答後文殊言答爾時世尊知諸菩薩心之所念各隨其類為現神通此下第三説分於中通下六會答此所問準問長科亦分為三此初三品答所依果二問明已下答所修因問三從不思議品下答所成果問其平等因果因乃果中之因果乃此果之用故屬果收二別列初中分二先如來現相答由念請故又如來證窮故後文殊言説答伴助主故假言顯故今初分二一佛現神通二衆海雲集今初知其心念者領念請也現神通示相答也言隨類者有其三義一隨疑者所疑異故謂示色令見以聲令聞冥資令曉皆是神通以法界身圓明頓現故二隨疑者流類別故三隨疑者所疑異故故知初會現相遍於九會此會現神通通此一分故下三會皆有不起覺樹之言現神通已東方過十佛剎微塵數世界有世界名金色佛號不動智彼世界中有菩薩名文殊師利與十佛剎微塵數諸菩薩俱來詣佛所到已作禮即於東方化作蓮華藏師子之座結加趺坐南方過十佛剎微塵數世界有世界名妙色佛號無礙智彼有菩薩名曰覺首與十佛剎微塵數諸菩薩俱來詣佛所到已作禮即於南方化作蓮華藏師子之座結加趺坐西方過十佛剎微塵數世界有世界名蓮華色佛號滅暗智彼有菩薩名曰財首與十佛剎微塵數諸菩薩俱來詣佛所到已作禮即於西方化作蓮華藏師子之座結加趺坐北方過十佛剎微塵數世界有世界名薝蔔華色佛號威儀智彼有菩薩名寶首與十佛剎微塵數諸菩薩俱來詣佛所到已作禮即於北方化作蓮華藏師子之座結加趺坐東北方過十佛剎微塵數世界有世界名優鉢羅華色佛號明相智彼有菩薩名功德首與十佛剎微塵數諸菩薩俱來詣佛所到已作禮即於東北方化作蓮華藏師子之座結加趺坐東南方過十佛剎微塵數世界有世界名金色佛號究竟智彼有菩薩名目首與十佛剎微塵數諸菩薩俱來詣佛所到已作禮即於東南方化作蓮華藏師子之座結加趺坐西南方過十佛剎微塵數世界有世界名寶色佛號最勝智彼有菩薩名精進首與十佛剎微塵數諸菩薩俱來詣佛所到已作禮即於西南方化作蓮華藏師子之座結加趺坐西北方過十佛剎微塵數世界有世界名金剛色佛號自在智彼有菩薩名法首與十佛剎微塵數諸菩薩俱來詣佛所到已作禮即於西北方化作蓮華藏師子之座結加趺坐下方過十佛剎微塵數世界有世界名頗黎色佛號梵智彼有菩薩名智首與十佛剎微塵數諸菩薩俱來詣佛所到已作禮即於下方化作蓮華藏師子之座結加趺坐上方過十佛剎微塵數世界有世界名平等色佛號觀察智彼有菩薩名賢首與十佛剎微塵數諸菩薩俱來詣佛所到已作禮即於上方化作蓮華藏師子之座結加趺坐第二現神通下衆海雲集即現相答初十句之問光現佛剎答佛剎問剎有金色等是剎莊嚴既以金成亦答剎體彼剎菩薩亦剎莊嚴菩薩大寶以為嚴故亦剎清淨純淨佛剎唯菩薩故淨修梵行是剎成就淨土行故亦剎清淨所修淨故此已上答五句依問兼答五句正報士各有佛及見如來坐蓮華藏是答佛住現通放光是答威德名不動智等是答法性見佛轉法輪是答説法佛成正覺是答菩提文雖在下義皆此具光明覺現即現此故十首菩薩表信為首故以梵云室利一名四實一首二勝三吉祥四德故譯人前後不同今文殊亦云首也爾時文殊師利菩薩摩訶薩承佛威力普觀一切菩薩衆會而作是言此諸菩薩甚為希有諸佛子佛國土不可思議佛住佛剎莊嚴佛法性佛剎清淨佛説法佛出現佛剎成就佛阿耨多羅三藐三菩提皆不可思議何以故諸佛子十方世界一切諸佛知諸衆生樂欲不同隨其所應説法調伏如是乃至等法界虗空界此下第二爾時文殊下辨言答就文分四一歎衆希有二諸佛子下牒問總歎三何以故下徵歎總釋四諸佛子如來下廣顯難思今初標也前衆疑問佛令文殊答者以文殊示居此土生有十徵來自他方體含萬德降魔制外通辨難思化滿塵方用周三際道成先劫已稱龍種尊王現證菩提復曰摩尼寶積實為三世佛母豈獨釋迦之師影響而來一切咸見故宜説也不待請者佛意許故又以文殊大智表依根本智建立衆行故為信首初歎希有歎如來現相及十方雲集為希有次諸佛子佛國土不可思議下十句歎所問十果德不可思議次何以故下徵釋不可思議之所以也諸佛子如來於此娑婆世界諸四天下種種身種種名種種色相種種修短種種壽量種種處所種種諸根種種生處種種語業種種觀察令諸衆生各別知見諸佛子如來於此四天下中或名一切義成或名圓滿月或名師子吼或名釋迦牟尼或名第七仙或名毗盧遮那或名瞿曇氏或名大沙門或名最勝或名導師如是等其數十千令諸衆生各別知見諸佛子此四天下東次有世界名為善護如來於彼或名金剛或名自在或名有智慧或名難勝或名雲王或名無諍或名能為主或名心歡喜或名無與等或名斷言論如是等其數十千令諸衆生各別知見諸佛子此四天下南次有世界名為難忍如來於彼或名帝釋或名寶稱或名離垢或名實語或名能調伏或名具足喜或名大名稱或名能利益或名無邊或名最勝如是等其數十千令諸衆生各別知見諸佛子此四天下西次有世界名為親慧如來於彼或名水天或名喜見或名最勝王或名調伏天或名真實慧或名到究竟或名歡喜或名法慧或名所作已辦或名善住如是等其數十千令諸衆生各別知見諸佛子此四天下北次有世界名有師子如來於彼或名大牟尼或名苦行或名世所尊或名最勝田或名一切智或名善意或名清淨或名醫羅跋那或名最上施或名苦行得如是等其數十千令諸衆生各別知見諸佛子此四天下東北方次有世界名妙觀察如來於彼或名調伏魔或名成就或名息滅或名賢天或名離貪或名勝慧或名心平等或名無能勝或名智慧音或名難出現如是等其數十千令諸衆生各別知見諸佛子此四天下東南方次有世界名為喜樂如來於彼或名極威嚴或名光𦦨聚或名遍知或名祕密或名解脫或名性安住或名如法行或名淨眼王或名大勇健或名精進力如是等其數十千令諸衆生各別知見諸佛子此四天下西南方次有世界名甚堅牢如來於彼或名安住或名智王或名圓滿或名不動或名妙眼或名頂王或名自在音或名一切施或名持衆仙或名勝須彌如是等其數十千