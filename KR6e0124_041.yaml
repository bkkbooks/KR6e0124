body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈十定品第二十七之二佛子云何為菩薩摩訶薩次第遍往諸佛國土神通三昧第三定初標佛子此菩薩摩訶薩過於東方無數世界復過爾所世界微塵數世界於彼諸世界中入此三昧第二釋中有三謂法喻合法中五一明遍剎入定或剎那入或須臾入或相續入或日初分時入或日中分時入或日後分時入或夜初分時入或夜中分時入或夜後分時入或一日入或五日入或半月入或一月入或一年入或百年入或千年入或百千年入或億年入或百千億年入或百千那由他億年入或一劫入或百劫入或百千劫入或百千那由他億劫入或無數劫入或無量劫入或無邊劫入或無等劫入或不可數劫入或不可稱劫入或不可思劫入或不可量劫入或不可説劫入或不可説不可説劫入二明入時次第若久若近若法若時種種不同三總結多門菩薩於彼不生分別心無染著不作二不作不二不作普不作別四心契定體雖離此分別而以神通方便從三昧起於一切法不忘不失至於究竟五不廢起通及喻合等文並可知譬如日天子周行照曜晝夜不住日出名晝日沒名夜晝亦不生夜亦不滅次喻菩薩摩訶薩於無數世界入神通三昧入三昧已明見爾所無數世界亦復如是三合佛子是為菩薩摩訶薩第三次第遍往諸佛國土神通大三昧善巧智三結名佛子云何為菩薩摩訶薩清淨深心行三昧第四定中初標佛子此菩薩摩訶薩知諸佛身數等衆生見無量佛過阿僧祇世界微塵數二釋中分二先明定內深心行後明定起深心行今初分二先起行後深心前中先舉內於彼一一諸如來所以一切種種妙香而作供養以一切種種妙華而作供養以一切種種蓋大如阿僧祇佛剎而作供養以超過一切世界一切上妙莊嚴具而作供養散一切種種寶而作供養以一切種種莊嚴具莊嚴經行處而作供養以一切無數上妙摩尼寶藏而作供養以佛神力所流出過諸天上味飲食而作供養一切佛剎種種上妙諸供養具能以神力普皆攝取而作供養次起行於中先明外事供養行於彼一一諸如來所恭敬尊重頭頂禮敬舉身布施請問佛法讚佛平等稱揚諸佛廣大功德入於諸佛所入大悲得佛平等無礙之力於一念頃一切佛所勤求妙法後三業供養行然於諸佛出興於世入般涅槃如是之相皆無所得明深心中二先法説如散動心了別所緣心起不知何所緣起心滅不知何所緣滅此菩薩摩訶薩亦復如是終不分別如來出世及涅槃相後喻各有喻合一忘念無知喻喻其契實無念佛子如日中陽𦦨不從雲生不從池生不處於陸不住於水非有非無非善非惡非清非濁不堪飲漱不可穢汙非有體非無體非有味非無味以因緣故而現水相為識所了遠望似水而興水想近水則無水想自滅此菩薩摩訶薩亦復如是不得如來出興於世及涅槃相諸佛有相及以無相皆是想心之所分別二喻了妄同真佛子此三昧名為清淨深心行菩薩摩訶薩於此三昧入已而起起已不失譬如有人從睡得寤憶所夢事覺時雖無夢中境界而能憶念心不忘失菩薩摩訶薩亦復如是入於三昧見佛聞法從定而起憶持不忘而以此法開曉一切道場衆會莊嚴一起諸佛國土無量義趣悉得明達一切法門皆亦清淨然大智炬長諸佛種無畏具足辨才不竭開示演説甚深法藏第二定起深心行中初法次喻後合合中上明供養自利行今明開演利他行文影略耳開演深理即深心起行也是為菩薩摩訶薩第四清淨深心行大三昧善巧智三結名佛子云何為菩薩摩訶薩知過去莊嚴藏三昧第五定初標也佛子此菩薩摩訶薩能知過去諸佛出現所謂劫次第中諸剎次第剎次第中諸劫次第劫次第中諸佛出現次第佛出現次第中説法次第説法次第中諸心樂次第心樂次第中諸根次第根次第中調伏次第調伏次第中諸佛壽命次第壽命次第中知億那由他年歲數量次第第二釋中有五一對辨智佛子此菩薩摩訶薩得如是無邊次第智故則知過去諸佛則知過去諸剎則知過去法門則知過去諸劫則知過去諸法則知過去諸心則知過去諸解則知過去諸衆生則知過去諸煩惱則知過去諸儀式則知過去諸清淨二正顯智知各有十句皆是過去藏中之法佛子此三昧名過去清淨藏於一念中能入百劫能入千劫能入百千劫能入百千億那由他劫能入無數劫能入無量劫能入無邊劫能入無等劫能入不可數劫能入不可稱劫能入不可思劫能入不可量劫能入不可説劫能入不可説不可説劫三所知時分有十四重即釋過去之義佛子彼菩薩摩訶薩入此三昧不滅現在不緣過去四顯知相狀不滅現在者不捨也不緣過去者不取也謂但約過去門顯非有取捨而緣佛子彼菩薩摩訶薩從此三昧起於如來所受十種不可思議灌頂法亦得亦清淨亦成就亦入亦證亦滿亦持平等了知三輪清淨五明出定獲益有三初舉數辨相有十句初句總位終成果名受灌頂法也餘句別一屬己二淨障三究竟四始入五正證六修滿七持令不失八無知而知九淨三輪總該前九如約智辨三輪者謂無能知所知及正知故何等為十一者辨不違義二者説法無盡三者訓詞無失四者樂説不斷五者心無恐畏六者語必誠實七者衆生所依八者救脫三界九者善根最勝十者調御妙法次徵列其名初四是四無礙辨次二自利不畏深法如言能行次二利他為善者依為惡者救後二總明二利勝妙佛子此是十種灌頂法若菩薩入此三昧從三昧起無間則得如歌羅邏入胎藏時於一念間識則託生菩薩摩訶薩亦復如是從此定起於如來所一念則得此十種法三結得速疾有法喻合歌羅邏者此云薄酪佛子是名菩薩摩訶薩第五知過去莊嚴藏大三昧善巧智三結定名佛子云何為菩薩摩訶薩智光明藏三昧第六初標佛子彼菩薩摩訶薩住此三昧能知未來一切世界一切劫中所有諸佛二釋中分二前明定業用後彰定利益初中分六一總知諸佛若已説若未説若已授記若未授記種種名號各各不同所謂無數名無量名無邊名無等名不可數名不可稱名不可思名不可量名不可説名二知多名號當出現於世當利益衆生當作法王當興佛事當説福利當讚善義當説白分義當淨治諸惡當安住功德當開示第一義諦當成灌頂位當成一切智三知當作佛彼諸如來修圓滿行發圓滿願入圓滿智有圓滿衆備圓滿莊嚴集圓滿功德悟圓滿法得圓滿果具圓滿相成圓滿覺四知彼佛因圓果滿彼諸如來名姓種族方便善巧神通變化成熟衆生入般涅槃如是一切悉皆了知五知現所作此菩薩於一念中能入一劫百劫千劫百千劫百千億那由他劫入閻浮提微塵數劫入四天下微塵數劫入小千世界微塵數劫入中千世界微塵數劫入大千世界微塵數劫入百佛剎微塵數劫入百千佛剎微塵數劫入百千億那由他佛剎微塵數劫入無數佛剎微塵數劫入無量佛剎微塵數劫入無邊佛剎微塵數劫入無等佛剎微塵數劫入不可數佛剎微塵數劫入不可稱佛剎微塵數劫入不可思佛剎微塵數劫入不可量佛剎微塵數劫入不可説佛剎微塵數劫入不可説不可説佛剎微塵數劫如是未來一切世界所有劫數能以智慧皆悉了知六明知分齊上彰定業用以了知故其心復入十種持門何者為十所謂入佛持故得不可説佛剎微塵數諸佛護念入法持故得十種陀羅尼光明無盡辨才入行持故出生圓滿殊勝諸願入力持故無能映蔽無能摧伏入智持故所行佛法無有障礙入大悲持故轉於不退清淨法輪入差別善巧句持故轉一切文字輪淨一切法門地入師子受生法持故開法關鑰出欲淤泥入智力持故修菩薩行常不休息入善友力持故令無邊衆生普得清淨入無住力持故入不可説不可説廣大劫入法力持故以無礙方便智知一切法自性清淨二彰定利益於中四前二自利後二利他謂一令心入持益即由上知故持之不失由持不失得持之益一心中持佛得佛護念二心入持法得總持辨才益餘句倣此有十二者增數十也師子受生者不畏受生苦故示生死實性名開法關鑰了生死本空故出欲淤泥智力持者定慧雙運也入無住力持則大劫不離一念佛子菩薩摩訶薩住此三昧已善巧住不可説不可説劫善巧住不可説不可説剎善巧知不可説不可説種種衆生善巧知不可説不可説衆生異相善巧知不可説不可説同異業報善巧知不可説不可説精進諸根習氣相續差別諸行善巧知不可説不可説無量染淨種種思惟善巧知不可説不可説法種種義無量文字演説言辭善巧知不可説不可説種種佛出現種族時節現相説法施為佛事入般涅槃善巧知不可説不可説無邊智慧門善巧知不可説不可説一切神通無量變現佛子譬如日出世間所有村營城邑宮殿屋宅山澤鳥獸樹林華果如是一切種種諸物有目之人悉得明見佛子日光平等無有分別而能令目見種種相此大三昧亦復如是體性平等無有分別能令菩薩知不可説不可説百千億那由他差別之相二明得善巧益有法喻合然善巧有二一如事善巧故法云不可説無量喻云見種種物二如理善巧故云日光平等又云此二無礙方名善巧故合云無分別而能知佛子此菩薩摩訶薩如是了知時令諸衆生得十種不空何等為十一者見不空令諸衆生生善根故二者聞不空令諸衆生得成熟故三者同住不空令諸衆生心調伏故四者發起不空令諸衆生如言而作通達一切諸法義故五者行不空令無邊世界皆清淨故六者親近不空於不可説不可説佛剎諸如來所斷不可説不可説衆生疑故七者願不空隨所念衆生令作勝供養成就諸願故八者善巧法不空皆令得住無礙解脫清淨智故九者雨法雨不空於不可説不可説諸根衆生中方便開示一切智行令住佛道故十者出現不空現無邊相令一切衆生皆蒙照故三明得不空益佛子菩薩摩訶薩住此三昧得十種不空時諸天王衆皆來頂禮諸龍王衆興大香雲諸夜叉王頂禮其足阿修羅王恭敬供養迦樓羅王前後圍繞諸梵天王悉來勸請緊那羅王摩睺羅伽王咸共稱讚乾闥婆王常來親近諸人王衆承事供養四十王敬養益佛子是為菩薩摩訶薩第六智光明藏大三昧善巧智三結定名佛子云何為菩薩摩訶薩了知一切世界佛莊嚴三昧第七定初標佛子此三昧何故名了知一切世界佛莊嚴二釋中二先明定體用後明定利益前中亦二先徵後釋所以重徵者前通徵一定此別徵莊嚴佛子菩薩摩訶薩住此三昧能次第入東方世界能次第入南方世界西方北方四維上下所有世界悉亦如是能次第入釋中二先釋一切世界以是現在故但云十方皆見諸佛出興於世亦見彼佛一切神力亦見諸佛所有遊戲亦見諸佛廣大威德亦見諸佛最勝自在亦見諸佛大師子吼亦見諸佛所修諸行亦見諸佛種種莊嚴亦見諸佛神足變化亦見諸佛衆會雲集二釋其莊嚴於中二先總列十門皆是莊嚴其中第八別別莊嚴者即功德智慧以嚴其心色相光明以嚴其身衆會清淨衆會廣大衆會一相衆會多相衆會處所衆會居止衆會成熟衆會調伏衆會威德如是一切悉皆明見次別顯嚴相以廣前二一廣衆會二廣莊嚴今初有三初見他二見自三能見今初亦三初見衆會體相亦見衆會其量大小等閻浮提亦見衆會等四天下亦見衆會等小千界亦見衆會等中千界亦見衆會量等三千大千世界亦見衆會充滿百千億那由他佛剎亦見衆會充滿阿僧祇佛剎亦見衆會充滿百佛剎微塵數佛剎亦見