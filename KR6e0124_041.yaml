出過一切三十三天何等為十一者色相二者形體三者示現四者眷屬五者資具六者音聲七者神通八者自在九者慧解十者智用如是十種悉過一切三十三天菩薩摩訶薩亦復如是初始獲得此三昧時則得十種廣大智藏何等為十一者照耀一切佛剎智二者知一切衆生受生智三者普作三世變化智四者普入一切佛身智五者通達一切佛法智六者普攝一切淨法智七者普令一切衆生入法身智八者現見一切法普眼清淨智九者一切自在到於彼岸智十者安住一切廣大法普盡無餘智第四智德包含益於中二先喻後合各有十句合中總標合初獲即得十句合前十事唯八九不次以智雖是一從所知別故一佛剎合色相二衆生合形體三變化合示現四入佛合眷屬以互為主伴如眷屬故五通達佛法為助道資具六普攝淨法則圓音示人七皆令入法方是神通八普眼清淨超合慧解九自在却合自在十住法合智用佛子菩薩摩訶薩住此三昧復得十種最清淨威德身何等為十一者為照耀不可説不可説世界故放不可説不可説光明輪二者為令世界咸清淨故放不可説不可説無量色相光明輪三者為調伏衆生故放不可説不可説光明輪四者為親近一切諸佛故化作不可説不可説身五者為承事供養一切諸佛故雨不可説不可説種種殊妙香華雲六者為承事供養一切佛及調伏一切衆生故於一一毛孔中化作不可説不可説種種音樂七者為成熟衆生故現不可説不可説種種無量自在神變八者為於十方種種名號一切佛所請問法故一步超過不可説不可説世界九者為令一切衆生見聞之者皆不空故現不可説不可説種種無量清淨色相身無能見頂十者為與衆生開示無量祕密法故發不可説不可説音聲語言第五身威超勝益有標釋佛子菩薩摩訶薩得此十種最清淨威德身已能令衆生得十種圓滿何等為十一者能令衆生得見於佛二者能令衆生深信於佛三者能令衆生聽聞於法四者能令衆生知有佛世界五者能令衆生見佛神變六者能令衆生念所集業七者能令衆生定心圓滿八者能令衆生入佛清淨九者能令衆生發菩提心十者能令衆生圓滿佛智第六令他圓滿益先牒前起後後徵名相佛子菩薩摩訶薩令衆生得十種圓滿已復為衆生作十種佛事何等為十所謂以音聲作佛事為成熟衆生故以色形作佛事為調伏衆生故以憶念作佛事為清淨衆生故以震動世界作佛事為令衆生離惡趣故以方便覺悟作佛事為令衆生不失念故以夢中現相作佛事為令衆生恆正念故以放大光明作佛事為普攝取諸衆生故以修菩薩行作佛事為令衆生住勝願故以成正等覺作佛事為令衆生知幻法故以轉妙法輪作佛事為衆説法不失時故以現住壽命作佛事為調伏一切衆生故以示般涅槃作佛事知諸衆生起疲厭故第七轉作佛事益佛子是為菩薩摩訶薩第七了知一切世界佛莊嚴大三昧善巧智第三結定名
