body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈第三會忉利天宮法慧菩薩為會主說十住等法門已信者令解自十六卷起至十八卷止共六品經升須彌山頂品須彌山頂偈讚品十住品梵行品初發心功德品明法品升須彌山頂品第十三初來意者先辨會來前信此解義次第故正答前十住問總有二段前信是住之方便此明正位故次來也品來者前品說信究竟此品趣後說住故次來也釋名者約會名忉利天宮會約人名法慧菩薩會約法名十住會品名須彌正名蘇迷盧此名妙高如來以自在力不起覺樹應機現彼故云升也表位漸增不處人間顯位清淨故居天也若約觀心釋者妙高謂三昧須彌寂然不動無思無心不收不攝任性而定稱本心地入佛智海湛然不遷是妙法樂觸境自在合本性淨是四德寶而自莊嚴是則本覺如來升法須彌之頂也爾時如來威神力故十方一切世界一一四天下閻浮提中悉見如來坐於樹下各有菩薩承佛神力而演說法靡不自謂恆對於佛文中此會六品分為二分初二品方便發起後四品當會正說前中初二唯是由致偈讚一品義有兩兼一是方便謂前品化主赴機後品助化讚佛主伴圓備方演法故三天說法皆有偈讚欲顯三賢皆依佛智有差別故離如來智無自體故今初一品長分十段一木會齊現二不離而升三各見佛來四各嚴殿座五皆來請佛六俱時入殿七音樂並止八各念昔因九同讚如來十殿皆廣博嚴淨也言爾時者即前二會時主伴齊遍演前二會之法也今此明遍即十重說處中第一重也不離而升疏釋有多義爾時世尊不離一切菩提樹下而上升須彌尚帝釋殿第二不動而升時天帝釋在妙勝殿前遙見佛來第三各見佛來即以神力莊嚴此殿置普光明藏師子之座其座悉以妙寶所成十千層級逈極莊嚴十千金網彌覆其上十千種帳十千種蓋周回間列十千繒綺以為垂帶十千珠瓔周遍交絡十千衣服敷布座上十千天子十千梵王前後圍繞十千光明而為照耀第四各嚴殿座爾時帝釋奉為如來敷置座已曲躬合掌恭敬向佛而作是言善來世尊善來善逝善來如來應正等覺唯願哀愍處此宮殿第五請佛居殿爾時世尊即受其請入妙勝殿十方一切諸世界中悉亦如是第六俱時入殿爾時帝釋以佛神力諸宮殿中所有樂音自然止息第七音樂止息即自憶念過去佛所種諸善根而說頌言第八各念昔因獲智益也散緣既止勝德現前寂然無思發宿住智善根者即下十佛曾入此殿聞法供養故亦表見自心性同昔佛故迦葉如來具大悲諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥拘那牟尼見無礙諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥迦羅鳩䭾如金山諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥毗舍浮佛無三垢諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥尸棄如來離分別諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥毗婆尸佛如滿月諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥弗沙明達第一義諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥提舍如來辨無礙諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥波頭摩佛淨無垢諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥然燈如來大光明諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥如此世界中忉利天王以如來神力故偈讚十佛所有功德十方世界諸釋天王悉亦如是讚佛功德第九同讚如來謂三世諸佛皆於此處說十住法獨讚此十佛者表說十住及無盡故所讚十佛各舉一德後結通云如此世界忉利天王讚十佛功德十方世界亦然爾時世尊入妙勝殿結加趺坐此殿忽然廣博寬容如其天衆諸所住處十方世界悉亦如是第十殿皆廣博如來入殿即覺智現前忽然廣博則身心無際十方以下結通無盡須彌頂上偈讚品第十四初來意者既明化主赴感今辨助化讚揚將演住門先陳體性性即佛智先讚如來故品來也二釋名者須彌約處稱讚佛德依處有讚故立此名亦頂之讚揀餘處也三宗趣者以集衆放光偈讚為宗為成正說為趣又顯佛德為宗令知住體為趣爾時佛神力故十方各有一大菩薩一一各與佛剎微塵數菩薩俱從百佛剎微塵數國土外諸世界中而來集會其名曰法慧菩薩一切慧菩薩勝慧菩薩功德慧菩薩精進慧菩薩善慧菩薩智慧菩薩真實慧菩薩無上慧菩薩堅固慧菩薩所從來土所謂因陀羅華世界波頭摩華世界寶華世界優鉢羅華世界金剛華世界妙香華世界悅意華世界阿盧那華世界那羅陀華世界虗空華世界各於佛所淨修梵行所謂殊特月佛無盡月佛不動月佛風月佛水月佛解脫月佛無上月佛星宿月佛清淨月佛明了月佛是諸菩薩至佛所已頂禮佛足隨所來方各化作毗盧遮那藏師子之座於其座上結加趺坐如此世界中須彌頂上菩薩來集一切世界悉亦如是彼諸菩薩所有名字世界佛號悉等無別第四釋文此品總為三分第一集衆分第二放光分第三偈讚分今初集衆文有十同一集會同皆佛力故二主首同皆大菩薩故三眷屬同各與佛剎微塵數故四來處量同從百佛剎微塵數國土外故五表法名同慧即十解故六從來世界名同同名華故七所事佛同同名月故月表位中佛果智明暗息恩益清涼應器周故八伸敬威儀住同同體各住一方故十結十方同若剎若人皆遍法界法界重重無盡故爾時世尊從兩足指放百千億妙色光明普照十方一切世界須彌頂上帝釋宮中佛及大衆靡不皆現第二爾時下如來放光分從兩足指者足指距地得任有力成位不退而行有恆也數位過前加於千也相表解顯故云妙色普照十方顯佛衆會一光照於一切則一切皆爾重疊無礙無不互見為一法界圓明大會爾時法慧菩薩承佛威神普觀十方而說頌曰佛放淨光明普見世導師須彌山王頂妙勝殿中住一切釋天王請佛入宮殿悉以十妙頌稱讚諸如來彼諸大會中所有菩薩衆皆從十方至化座而安坐彼會諸菩薩皆同我等名所從諸世界名字亦如是本國諸世尊名號悉亦同各於其佛所淨修無上行佛子汝應觀如來自在力一切閻浮提皆言佛在中我等今見佛住於須彌頂十方悉亦然如來自在力一一世界中發心求佛道依於如是願修習菩提行佛以種種身遊行遍世間法界無所礙無能測量者慧光恆普照世暗悉除滅一切無等倫云何可測知爾時一切慧菩薩承佛威力普觀十方而說頌言假使百千劫常見於如來不依真實義而觀救世者是人取諸相增長癡惑網繫縛生死獄盲冥不見佛觀察於諸法自性無所有如其生滅相但是假名說一切法無生一切法無滅若能如是解諸佛常現前法性本空寂無取亦無見性空即是佛不可得思量若知一切法體性皆如是斯人則不為煩惱所染著凡夫見諸法但隨於相轉不了法無相以是不見佛牟尼離三世諸相悉具足住於無所住普遍而不動我觀一切法皆悉得明了今見於如來決定無有疑法慧先已說如來真實性我從彼了知菩提難思議爾時勝慧菩薩承佛威力普觀十方而說頌言如來大智慧希有無等倫一切諸世間思惟莫能及凡夫妄觀察取相不如理佛離一切相非彼所能見迷惑無知者妄取五蘊相不了彼真性是人不見佛了知一切法自性無所有如是解法性則見盧舍那因前五蘊故後蘊相續起於此性了知見佛難思議譬如暗中寶無燈不可見佛法無人說雖慧莫能了亦如目有翳不見淨妙色如是不淨心不見諸佛法又如明淨日瞽者莫能見無有智慧心終不見諸佛若能除眼翳捨離於色想不見於諸法則得見如來一切慧先說諸佛菩提法我從於彼聞得見盧舍那爾時功德慧菩薩承佛威力普觀十方而說頌言諸法無真實妄取真實相是故諸凡夫轉回生死獄言辭所說法小智妄分別是故生障礙不了於自心不能了自心云何知正道彼由顛倒慧增長一切惡不見諸法空恆受生死苦斯人未能有清淨法眼故我昔受衆苦由我不見佛故當淨法眼觀其所應見若得見於佛其心無所取此人則能見如佛所知法若見佛真法則名大智者斯人有淨眼能觀察世間無見即是見能見一切法於法若有見此則無所見一切諸法性無生亦無滅奇哉大導師自覺能覺他勝慧先已說如來所悟法我等從彼聞能知佛真性爾時精進慧菩薩承佛威力普觀十方而說頌言若住於分別則壞清淨眼愚癡邪見增永不見諸佛若能了邪法如實不顛倒知妄本自真見佛則清淨有見則為垢此則未為見遠離於諸見如是乃見佛世間言語法衆生妄分別知世皆無生乃是見世間若見見世間見則世間相如實等無異此名真見者若見等無異於物不分別是見離諸惑無漏得自在諸佛所開示一切分別法是悉不可得彼性清淨故法性本清淨如空無有相一切無能說智者如是觀遠離於諸想不樂一切法此亦無所修能見大牟尼如德慧所說此名見佛者所有一切行體性皆寂滅爾時善慧菩薩承佛威力普觀十方而說頌言希有大勇健無量諸如來離垢心解脫自度能度彼我見世間燈如實不顛倒如於無量劫積智者所見一切凡夫行莫不速歸盡其性如虗空故說無有盡智者說無盡此亦無所說自性無盡故得有難思盡所說無盡中無衆生可得知衆生性爾則見大名稱無見說為見無生說衆生若見若衆生了知無體性能見及所見見者悉除遣不壞於真法此人了知佛若人了知佛及佛所說法則能照世間如佛盧舍那正覺善開示一法清淨道精進慧大士演說無量法若有若無有彼想皆除滅如是能見佛安住於實際爾時智慧菩薩承佛威力普觀十方而說頌言我承最勝教即生智慧光普照十方界悉見一切佛此中無少物但有假名字若計有我人則為入險道諸取著凡夫計身為實有如來非所取彼終不得見此人無慧眼不能得見佛於無量劫中流轉生死海有諍說生死無諍即涅槃生死及涅槃二俱不可得若逐假名字取著此二法此人不如實不知聖妙道若生如是想此佛此最勝顛倒非實義不能見正覺能知此實體寂滅真如相則見正覺尊超出語言道言語說諸法不能顯實相平等乃能見如法佛亦然正覺過去世未來及現在永斷分別根是故說名佛爾時真實慧菩薩聞佛威力普觀十方而說頌言寧受地獄苦得聞諸佛名不受無量樂而不聞佛名所以於往昔無數劫受苦流轉生死中不聞佛名故於法不顛倒如實而現證離諸和合相是名無上覺現在非和合去來亦復然一切法無相是則佛真體若能如是觀諸法甚深義則見一切佛法身真實相於實見真實非實見不實如是究竟解是故名為佛佛法不可覺了此名覺法諸佛如是修一法不可得知以一故衆知以衆故一諸法無所依但從和合起無能作所作唯從業想生云何知如是異此無有故一切法無住定處不可得諸佛住於此究竟不動搖爾時無上慧菩薩承佛威力普觀十方而說頌言無上摩訶薩遠離衆生想無有能過者故號為無上諸佛所得處無作無分別粗者無所有微細亦復然諸佛所行境於中無有數正覺遠離數此是佛真法如來光普照滅除衆暗冥是光非有照亦復非無照於法無所著無念亦無染無住無處所不壞於法性此中無有二亦復無有一大智善見者如理巧安住無中無有二無二亦復無三界一切空是則諸佛見凡夫無覺解佛令住正法諸法無所住悟此見自身非身而說身非起而現起無身亦無見是佛無上身如是實慧說諸佛妙法性若聞此法者當得清淨眼爾時堅固慧菩薩承佛威力普觀十方而說頌言偉哉大光明勇健無上士為利羣迷故而興於世間佛以大悲心普觀諸衆生見在三有中輪回受衆苦唯除正等覺具德尊導師一切諸天人無能救護者若佛菩薩等不出於世間無有一衆生而能得安樂如來等正覺及諸賢聖衆出現於世間能與衆生樂若見如來者為得大善利聞佛名生信則是世間塔我等見世尊為得大利益聞如是妙法悉當成佛道諸菩薩過去以佛威神力得清淨慧眼了諸佛境界今見盧舍那重增清淨信佛智無邊際演說不可盡勝慧等菩薩及我堅固慧無數億劫中說亦不能盡第三爾時法慧下十方菩薩偈讚即為十段初一為總餘九為別以法慧是說法主故總敘此會本末事義總顯佛德餘九歎佛差別之德總別共顯如來無礙之會此十菩薩名亦表十住其所說法表位勝進今初東方法慧總了佛法故南方一切慧者了一切法真實之性淨心地故西方勝慧者以解佛勝智隨空心淨故北方功德慧者生在佛家善解佛德故東北方精進慧者以勤觀真理集無量善俱無住故東南方善慧者以成就般若慧鑑不動可謂善矣西南方智慧者決斷不動所以名智西北方真實慧者謂心不顛倒是真實慧下方無上慧者謂從法王教生當紹佛位故名無上上方堅固慧者智力成就不可壞故此十方菩薩各說十頌讚佛總別之德頌義微妙疏有廣釋茲取大綱故不具録十住品第十五此品來意上由致既彰正宗宜顯故次來也又前辨所依佛德今辨能依十住故次來也釋名者慧住於理得位不退故名為住此十住法有四品謂十住梵行初發心功德明法此四品分二前三品當住位行德後一品勝進趣後前會無勝進者但是趣位方便未成位故回向是位無進趣者三賢位滿總為趣地之方便故亦顯無分別離趣相故今前初品辨位次品辨行後品明德初亦名解此初品文分七段一三昧分二加分三起分四本分五說分六證分七重頌分且初爾時法慧菩薩承佛威力入菩薩無量方便三昧第一三昧分也問何故入定答略辨六義一此三昧是法體故二非證不說故三顯此法非思量境故四觀機審法故五為受佛加故六成軌儀故以三昧力十方各千佛剎微塵數世界之外有千佛剎微塵數諸佛皆同一號名曰法慧普現其前告法慧菩薩言善哉善哉善男子汝能入是菩薩無量方便三昧善男子十方各千佛剎微塵數諸佛悉以神力共加於汝又是毗盧遮那如來往昔願力威神之力及汝所修善根力故入此三昧令汝說法為增長佛智故深入法界故善了衆生界故所入無礙故所行無障故得無等方便故入一切智性故覺一切法故知一切根故能持說一切法故所謂發起諸菩薩十種住善男子汝當承佛威神之力而演此法是時諸佛即與法慧菩薩無礙智無著智無斷智無癡智無異智無失智無量智無勝智無懈智無奪智何以故此三昧力法如是故是時諸佛各伸右手摩法慧菩薩頂第二加分初至令汝說法是加之因緣次為增長佛智下十一句是加所為次汝當承佛神力而演此法下是加相先口加勸說以增辨次興十種智下是意加以增智後摩頂是身加以增威法慧菩薩即從定起第三起分略由四意一三昧事訖故二已得勝力故三說時至故四定無言說故告諸菩薩言佛子菩薩住處廣大與法界虗空等佛子菩薩住三世諸佛家彼菩薩住我今當說諸佛子菩薩住有十種過去未來現在諸佛已說當說今說何者為十所謂初發心住治地住修行住生貴住具大方便住正心住不退住童真住法王子住灌頂住是名菩薩十住去來現在諸佛所說第四本分有三初言住處廣大等總顯體相次言住有十種下標以許說次何者為十下徵列其名今此住位名住處者若以增勝則以深般若住於真如即復由此而為行願之所住處若從通俱住上三菩提心家故梵本為家舊譯為種姓即四種姓中習種姓也良以此家菩薩所居故翻名住處疏有多義佛子云何為菩薩發心住此菩薩見佛世尊形貌端嚴色相圓滿人所樂見難可值遇有大威力或見神足或聞記別或聽教誡或見衆生受諸劇苦或聞如來廣大佛法發菩提心求一切智此菩薩緣十種難得法而發於心何者為十所謂是處非處智善惡業報智諸根勝劣智種種解差別智種種界差別智一切至處道智諸禪解脫三昧智宿命無礙智天眼無礙智三世漏普盡智是為十佛子此菩薩應勸學十法何者為十所謂勤供養佛樂住生死主導世間令除惡業以勝妙法常行教誨歎無上法學佛功德生諸佛前恆蒙攝受方便演說寂靜三昧讚歎遠離生死輪回為苦衆生作歸依處何以故欲令菩薩於佛法中心轉增廣有所聞法即自開解不由他教故此下第五正說文中為說分即是行相釋此十住即為十段一一段中皆先徵後釋釋中皆先明自分後明勝進又前是住位後是起行今初發心住見佛世尊下乃至求一切智明發心之緣有十種緣次此菩薩緣十種難得法下正明緣境發心上云求一切智今明緣十種智即一切智正是所緣之境次勸學十法下第二勝進行謂欲求勝位應勸勵亦勸他學列有十種不出悲智供佛為總次何以故下徵釋何須學此謂令得通別二種益故別為增上廣大此之別益皆希後位以解從內發不由他教故佛子云何為菩薩治地住此菩薩於諸衆生發十種心何者為十所謂利益心大悲心安樂心安住心憐愍心攝受心守護心同己心師心導師心是為十佛子此菩薩應勸學十法何者為十所謂誦習多聞虗間寂靜近善知識發言和悅語必知時心無怯怖了達於義如法修行遠離愚迷安住不動何以故欲令菩薩於諸衆生增長大悲有所聞法即自開解不由他教故第二治地住初令衆生發十種心是自分次勸學十法乃勝進行次徵云何要學此法耶謂以智導悲令轉勝故佛子云何為菩薩修行住此菩薩以十種行觀一切法何等為十所謂觀一切法無常一切法苦一切法空一切法無我一切法無作一切法無味一切法不如名一切法無處所一切法離分別一切法無堅實是為十佛子此菩薩應勸學十法何者為十所謂觀察衆生界法界世界觀察地界水界火界風界觀察欲界色界無色界何以故欲令菩薩智慧明了有所聞法即自開解不由他教故第三修行初自分十種觀一切法是護煩惱行次勸學十種法謂觀察衆生等是護小乘行以小乘不求種智不欲廣知故次徵意云但觀無常足矣何用廣知釋意云觀空不礙廣有知見性相兼了法智增明故佛子云何為菩薩生貴住此菩薩從聖教中生成就十法何者為十所謂永不退轉於諸佛所深生淨信善觀察法了知衆生國土世界業行果報生死涅槃是為十佛子此菩薩應勸學十法何者為十所謂了知過去未來現在一切佛法修集過去未來現在一切佛法圓滿過去未來現在一切佛法了知一切諸佛平等何以故欲令增進於三世中心得平等有所聞法即自開解不由他教故第四生貴住初住釋名謂從聖教中生以多聞熏習等流無漏教法生其智故以生菩提家故名生貴初自分十法言不退轉者既從聖教生成就四智教化衆生於自住處不退轉故次勸學十法為勝進後徵意云何以要觀三世耶釋意云欲進後位真俗平等故遍觀三世不殊方知平等故佛子云何為菩薩具足方便住此菩薩所修善根皆為救護一切衆生饒益一切衆生安樂一切衆生哀愍一切衆生度脫一切衆生令一切衆生離諸災難令一切衆生出生死苦令一切衆生發生淨信令一切衆生悉得調伏令一切衆生咸證涅槃佛子此菩薩應勸學十法何者為十所謂知衆生無邊知衆生無量知衆生無數知衆生不思議知衆生無量色知衆生不可量知衆生空知衆生無所作知衆生無所有知衆生無自性何以故欲令其心轉復增勝無所染著有所聞法即自開解不由他教故第五具足方便住言自分十心亦是方便次勝進勸學十法亦具足故次徵釋意云為雙明深廣性相交徹轉復增勝形奪兩忘皆無染著成般若故佛子云何為菩薩正心住此菩薩聞十種法心定不動何者為十所謂聞讚佛毀佛於佛法中心定不動聞讚法毀法於佛法中心定不動聞讚菩薩毀菩薩於佛法中心定不動聞讚菩薩毀菩薩所行法於佛法中心定不動聞說衆生有量無量於佛法中心定不動聞說衆生有垢無垢於佛法中心定不動聞說衆生易度難度於佛法中心定不動聞說法界有量無量於佛法中心定不動聞說法界有成有壞於佛法中心定不動聞說法界若有若無於佛法中心定不動是為十佛子此菩薩應勸學十法何者為十所謂一切法無相一切法無體一切法不可修一切法無所有一切法無真實一切法空一切法無性一切法如幻一切法如夢一切法無分別何以故欲令其心轉復增進得不退轉無生法忍有所聞法即自開解不由他教故第六正心住初自分十心內由成就般若乃法性相故皆不動名為正心次勝進勸學十法通聞思修次徵釋云此如順忍欲後位不退忍故不退即無生忍佛子云何為菩薩不退住此菩薩聞十種法堅固不退何者為十所謂聞有佛無佛於佛法中心不退轉聞有法無法於佛法中心不退轉聞有菩薩無菩薩於佛法中心不退轉聞有菩薩行無菩薩行於佛法中心不退轉聞有菩薩修行出離修行不出離於佛法中心不退轉聞過去有佛過去無佛於佛法中心不退轉聞未來有佛未來無佛於佛法中心不退轉聞現在有佛現在無佛於佛法中心不退轉聞佛智有盡佛智無盡於佛法中心不退轉聞三世一相三世非一相於佛法中心不退轉是為十佛子此菩薩應勸學十種廣大法何者為十所謂說一即多說多即一文隨於義義隨於文非有即有有即非有無相即相相即無相無性即性性即無性何以故欲令增進於一切法善能出離有所聞法即自開解不由他教故第七不退住自分十法皆云不退者然此位已入無生知所聞法畢竟空故又前位會事入理令心不動今此事理雙觀而心不退後位從理向事唯隨事行轉純熟故是故前位但聞讚毀三寶等忍之尚易今聞有無利害轉深成忍則難故過前位又前言不動但能正心今云不退有進趣義次勸學十種廣大法是為勝進次徵釋中善能出離者不沉沒於事理成後位自在故佛子云何為菩薩童真住此菩薩住十種業何者為十所謂身行無失語行無失意行無失隨意受生知衆生種種欲知衆生種種解知衆生種種界知衆生種種業知世界成壞神足自在所行無礙是為十佛子此菩薩應勸學十種法何者為十所謂知一切佛剎動一切佛剎持一切佛剎觀一切佛剎詣一切佛剎遊行無數世界領受無數世界現變化自在身出廣大遍滿音一剎那中承事供養無數諸佛何以故欲令增進於一切法能得善巧有所聞法即自開解不由他教故第八童真住自分中初三業無失永離習氣唯佛得之任運無功此多同八地能行無漏故得無失次勸學十法是為勝進是不動行初六於剎自在後四三業自在此同八地若色若土皆自在故次徵釋云為得善巧入於後位辨才自在故佛子云何為菩薩法王子住此菩薩善知十種法何者為十所謂善知諸衆生受生善知諸煩惱現起善知習氣相續善知所行方便善知無量法善解諸威儀善知世界差別善知前際後際事善知演說世諦善知演說第一義諦是為十佛子此菩薩應勸學十種法何者為十所謂法王處善巧法王處軌度法王處宮殿法王處趣入法王處觀察法王灌頂法王力持法王無畏法王宴寢法王讚歎何以故欲令增進心無障礙有所聞法即自開解不由他教故第九法王子住初自分十法初知六趣四生受報差別等乃至第十知演說第一義者即如九地了知衆生諸行差別教化調伏說第一義法令其調伏也次勸學十法為勝進皆言法王者既言王子倣佛之儀合子法度而言處者即是位也次徵釋云欲令增進得於後位無礙智故佛子云何為菩薩灌頂住此菩薩得成就十種智何者為十所謂震動無數世界照耀無數世界住持無數世界往詣無數世界嚴淨無數世界開示無數衆生觀察無數衆生知無數衆生根令無數衆生趣入令無數衆生調伏是為十佛子此菩薩身及身業神通變現過去智未來智現在智成就佛土心境界智境界皆不可知乃至法王子菩薩亦不能知佛子此菩薩應勸學諸佛十種智何者為十所謂三世智佛法智法界無礙智法界無邊智充滿一切世界智普照一切世界智住持一切世界智知一切衆生智知一切法智知無邊諸佛智何以故欲令增長一切種智有所聞法即自開解不由他教故第十灌頂住前自分中有二十句前十句所成德用後十句讚勝難測以位終故加此一段讚勝皆是神通後勸學十法皆言智者即學佛一切智一切種智以當位滿灌頂成佛以攝諸位皆此中具故次徵釋云成十勝智復更學者為欲成佛種智位故上十住位竟次證成爾時佛神力故十方各一萬佛剎微塵數世界六種震動所謂動遍動等遍動起遍起等遍起踊遍踊等遍踊震遍震等遍震吼遍吼等遍吼擊遍擊等遍擊雨天妙華天末香天華鬘天雜香天寶衣天寶雲天莊嚴具天諸音樂不鼓自鳴放天光明及妙音聲如此四天下須彌山頂帝釋殿上說十住法現諸神變十方所有一切世界悉亦如是又以佛神力故十方各過一萬佛剎微塵數世界有十佛剎微塵數菩薩來詣於此充滿十方作如是言善哉善哉佛子善說此法我等諸人同名法慧所從來國同名法雲彼土如來皆名妙法我等佛所亦說十住衆會眷屬文句義理悉亦如是無有增減佛子我等承佛神力來入此會為汝作證如於此會十方所有一切世界悉亦如是第六顯實證成先現瑞顯實地動雨供言一萬佛剎者行猶劣故如此下結通十方次又以佛神力故下菩薩證成作如是言者發言讚述次我等下舉同顯證言同名等者謂能說人及說處會主并所說法皆同以此一會遍一切處故以皆同故故表作證故云如於此會一切世界悉亦如是爾時法慧菩薩承佛威神觀察十方暨于法界而說頌曰見最勝智微妙身相好端嚴皆具足如是尊重甚難遇菩薩勇猛初發心見無等比大神通聞說記心及教誡諸趣衆生無量苦菩薩以此初發心聞諸如來普勝尊一切功德皆成就譬如虗空不分別菩薩以此初發心三世因果名為處我等自性為非處欲悉了知真實義菩薩以此初發心過去未來現在世所有一切善惡業欲悉了知無不盡菩薩以此初發心諸禪解脫及三昧雜染清淨無量種欲悉了知入住出菩薩以此初發心隨諸衆生根利鈍如是種種精進力欲悉了達分別知菩薩以此初發心一切衆生種種解心所好樂各差別如是無量欲悉知菩薩以此初發心衆生諸界各差別一切世間無有量欲悉了知其體性菩薩以此初發心一切有為諸行道一一皆有所至處悉欲了知其實性菩薩以此初發心一切世界諸衆生隨業漂流無暫息欲得天眼皆明見菩薩以此初發心過去世中曾所有如是體性如是相欲悉了知其宿住菩薩以此初發心一切衆生諸結惑相續現起及習氣欲悉了知究竟盡菩薩以此初發心隨諸衆生所安立種種談論語言道如其世諦悉欲知菩薩以此初發心一切諸法離言說性空寂滅無所作欲悉明達此真義菩薩以此初發心欲悉震動十方國傾覆一切諸大海具足諸佛大神通菩薩以此初發心欲一毛孔放光明普照十方無量土一一光中覺一切菩薩以此初發心欲以難思諸佛剎悉置掌中而不動了知一切如幻化菩薩以此初發心欲以無量剎衆生置一毛端不迫隘悉知無人無有我菩薩以此初發心欲以一毛滴海水一切大海悉令竭而悉分別知其數菩薩以此初發心不可思議諸國土盡抹為塵無遺者欲悉分別知其數菩薩以此初發心過去未來無量劫一切世間成壞相欲悉了達窮其際菩薩以此初發心三世所有諸如來一切獨覺及聲聞欲知其法盡無餘菩薩以此初發心無量無邊諸世界欲以一毛悉稱舉如其體相悉了知菩薩以此初發心無量無數輪圍山欲令悉入毛孔中如其大小皆得知菩薩以此初發心欲以寂靜一妙音普應十方隨類演如是皆令淨明了菩薩以此初發心一切衆生語言法一言演說無不盡悉欲了知其自性菩薩以此初發心世間言音靡不作悉令其解證寂滅欲得如是妙舌根菩薩以此初發心欲使十方諸世界有成壞相皆得見而悉知從分別生菩薩以此初發心一切十方諸世界無量如來悉充滿欲悉了知彼佛法菩薩以此初發心種種變化無量身一切世界微塵等欲悉了達從心起菩薩以此初發心過去未來現在世無量無數諸如來欲於一念悉了知菩薩以此初發心欲具演說一句法阿僧祇劫無有盡而令文義各不同菩薩以此初發心十方一切諸衆生隨其流轉生滅相欲於一念皆明達菩薩以此初發心欲以身語及意業普詣十方無所礙了知三世皆空寂菩薩以此初發心菩薩如是發心已應令往詣十方國恭敬供養諸如來以此使其無退轉菩薩勇猛求佛道住於生死不疲厭為彼稱歎使順行如是令其無退轉十方世界無量剎悉在其中作尊主為諸菩薩如是說以此令其無退轉最勝最上最第一甚深微妙清淨法勸諸菩薩說與人如是教令離煩惱一切世間無與等不可傾動摧伏處為彼菩薩常稱讚如是教令不退轉佛是世間大力主具足一切諸功德令諸菩薩住是中以此教為勝丈夫無量無邊諸佛所悉得往詣而親近常為諸佛所攝受如是教令不退轉所有寂靜諸三昧悉皆演暢無有餘為彼菩薩如是說以此令其不退轉摧滅諸有生死輪轉於清淨妙法輪一切世間無所著為諸菩薩如是說一切衆生墮惡道無量重苦所纏迫與作救護歸依處為諸菩薩如是說此是菩薩發心住一向志求無上道如我所說教誨法一切諸佛亦如是第二治地住菩薩應當發起如是心十方一切諸衆生願使悉順如來教利益大悲安樂心安住憐愍攝受心守護衆生同己心師心及以導師心已住如是勝妙心次令誦習求多聞常樂寂靜正思惟親近一切善知識發言和悅離粗獷言必知時無所畏了達於義如法行遠離愚迷心不動此是初學菩提行能行此行真佛子我今說彼所應行如是佛子應勤學第三菩薩修行住當依佛教勤觀察諸法無常苦及空無有我人無動作一切諸法不可樂無如名字無處所無所分別無真實如是觀者名菩薩次令觀察衆生界及以勸觀於法界世界差別盡無餘於彼咸應勸觀察十方世界及虗空所有地水與火風欲界色界無色界悉勸觀察咸令盡觀察彼界各差別及其體性咸究竟得如是教勤修行此則名為真佛子第四生貴住菩薩從諸聖教而出生了達諸有無所有超過彼法生法界信佛堅固不可壞觀法寂滅心安住隨諸衆生悉了知體性虗妄無真實世間剎土業及報生死涅槃悉如是佛子於法如是觀從佛親生名佛子過去未來現在世其中所有諸佛法了知積集及圓滿如是修學令究竟三世一切諸如來能隨觀察悉平等種種差別不可得如是觀者達三世如我稱揚讚歎者此是四住諸功德若能依法勤修行速成無上佛菩提從此第五諸菩薩說名具足方便住深入無量巧方便發生究竟功德業菩薩所修衆福德皆為救護諸羣生專心利益與安樂一向哀愍令度脫為一切世除衆難引出諸有令歡喜一一調伏無所遺皆令具德向涅槃一切衆生無有邊無量無數不思議及以不可稱量等聽受如來如是法此第五住真佛子成就方便度衆生一切功德大智尊以如是法而開示第六正心圓滿住於法自性無迷惑正念思惟離分別一切天人莫能動聞讚毀佛與佛法菩薩及以所行行衆生有量若無量有垢無垢難易度法界大小及成壞若有若無心不動過去未來今現在諦念思惟恆決定一切諸法皆無相無體無性空無實如幻如夢離分別常樂聽聞如是義第七不退轉菩薩於佛及法菩薩行若有若無出不出雖聞是說無退動過去未來現在世一切諸佛有以無佛智有盡或無盡三世一相種種相一即是多多即一文隨於義義隨文如是一切展轉成此不退人應為說若法有相及無相若法有性及無性種種差別互相屬此人聞已得究竟第八菩薩童真住身語意行皆具足一切清淨無諸失隨意受生得自在知諸衆生心所樂種種意解各差別及其所有一切法十方國土成壞相逮得速疾妙神通一切處中隨念往於諸佛所聽聞法讚歎修行無懈倦了知一切諸佛國震動加持亦觀察超過佛土不可量遊行世界無邊數阿僧祗法悉咨問所欲受身皆自在言音善巧靡不充諸佛無數咸承事第九菩薩王子住能見衆生受生別煩惱現習靡不知所行方便皆善了諸法各異威儀別世界不同前後際如其世俗第一義悉善了知無有餘法王善巧安立處隨其處所所有法法王宮殿若趣入及以於中所觀見法王所有灌頂法神力加持無怯畏宴寢宮室及歎譽以此教詔法王子如是為說靡不盡而令其心無所著於此了知修正念一切諸佛現其前第十灌頂真佛子成滿最上第一法十方無數諸世界悉能震動光普照住持往詣亦無餘清淨莊嚴皆具足開示衆生無有數觀察知根悉能盡發心調伏亦無邊咸令趣向大菩提一切法界咸觀察十方國土皆往詣其中身及身所作神通變現難可測三世佛土諸境界乃至王子無能了一切見者三世智於諸佛法明了智法界無礙無邊智充滿一切世界智照耀世界住持智了知衆生諸法智及知正覺無邊智如來為說咸令盡如是十住諸菩薩皆從如來法化生隨其所有功德行一切天人莫能測過去未來現在世發心求佛無有邊十方國土皆充滿莫不當成一切智一切國土無邊際世界衆生法亦然惑業心樂各差別依彼而發菩提意始求佛道一念心世間衆生及二乘斯等尚亦不能知何況所餘功德行十方所有諸世界能以一毛悉稱舉彼人能知此佛子趣向如來智慧行十方所有諸大海悉以毛端滴令盡彼人能知此佛子一念所修功德行一切世界抹為塵悉能分別知其數如是之人乃能見此諸菩薩所行道去來現在十方佛一切獨覺及聲聞悉以種種妙辨才開示初發菩提心發心功德不可量充滿一切衆生界衆智共說無能盡何況所餘諸妙行第七重頌分中總有一百頌分二初九十一頌正顯前法後如十住下九頌結歎勸修前中十住即為十段初有四十一頌頌發心住於中初二頌發心緣次三世因果下三十二頌所緣境發心次菩薩如是發心已下三十頌勝進所學後一頌結德後十住名頌文自顯後如是十住諸菩薩下九頌結歎勸修
