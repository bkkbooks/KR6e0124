body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈十地品第二十六之五第八不動地所以來者瑜伽云雖於無相作意無缺無間多修習住而未能於無相住中捨離功用又未能得於相在修習得滿故次來也又約寄位初之三地寄同世間次有四地寄三乘法第八已去寄顯一乘莊嚴論釋七地云近一乘故梁論亦説八地已上以為一乘是知從前差別進入一乘故次來也言不動者總有三義故成唯識云無分別智任運相續相用煩惱不能動故謂任運故功用不能動相續故相不能動總由上二煩惱不動與本分大同金光明云無相正思惟修習得自在諸煩惱行不能令動但有二義由相於前已不動故行即功用攝論云由前一切相有功用行不能動故此則略無煩惱無性釋意云第七地行動相不動此中行相俱不動解深密云由於無相得無功用於諸法中不為現煩惱所動此但約煩惱不動十住論云若天魔梵沙門婆羅門無能動其願故此即約人不能動人亦是相仁王名等觀地者上皆對他立名此當體受稱即無相觀下經自有釋名故所離障亦離無相中作加行障由有加行未能現相及土此地能斷説斷二愚一於無相作功用愚二於相自在愚今於相中不自在故其所證如名不增減以住無相不隨淨染有增減故即此亦名相土自在所依真如證此真如現相現土皆自在故所成行亦名無生法忍相土自在及所得果即定自在等皆由無相無功用故是時天王及天衆聞此勝行皆歡喜為欲供養於如來及以無央大菩薩雨妙華幡及幢蓋香鬘纓絡與寶衣無量無邊千萬種悉以摩尼作嚴飾次正釋文亦有三分初讚請中有二頌分二前十讚後二請前中二前二偈天王天衆供讚天女同時奏天樂普發種種妙音聲供養於佛并佛子共作是言而讚歎一切見者兩足尊哀憫衆生現神力令此種種諸天樂普發妙音咸得聞後八天女樂讚於中二初二標讚所依餘六正顯讚德總讚如來身土自在將説身土自在地故於中毛端約剎論處毛孔約身於一毛端百千億那由他國微塵數如是無量諸如來於中安住説妙法一毛孔內無量剎各有四洲及大海須彌鐵圍亦復然悉見在中無迫隘一毛端處有六趣三種惡道及人天諸龍神衆阿修羅各隨自業受果報於彼一切剎土中悉有如來演妙音隨順一切衆生心為轉最上淨法輪剎中種種衆生身身中復有種種剎人天諸趣各各異佛悉知已為説法大剎隨念變為小小剎隨念亦變大如是神通無有量世間共説不能盡六中前四依正互在五依正重重六轉變自在兼結無盡普發此等妙音聲稱讚如來功德已衆會歡喜默然住一心瞻仰欲聽法時解脫月復請言今此衆會皆寂靜願説隨次之所入第八地中諸行相後請可知爾時金剛藏菩薩告解脫月菩薩言佛子菩薩摩訶薩於七地中第二正説分中二先地行後地果前中有七種差別一總明方便集作地分二入一切法本來無生下得淨忍分三佛子菩薩成就此忍下得勝行分四佛子菩薩住此第八地以大下淨佛國土分五佛子菩薩成就如是身智下得自在分六此菩薩如是入已下大勝分七佛子此菩薩智地下釋名分七中初二是趣地方便一是遠方便總前七地集作此地方便故二是近方便前地得忍光明此修熟令淨故此二是入心下是住心三是初住地行謂前淨忍發起勝修故次二即安住地行謂四是正住之始依前勝行更起修淨佛土之行五即正住之終由淨土之行成德無礙六是地滿行此地望前通皆是勝今復地滿勝中之勝故云大勝七即辨德彰號通於始終今初分二先標集德處謂總前七地非獨第七雖亦有下十法而非次第以是功用行滿無功用際故總集之四節中當第三也四節者謂一入位二入地三無功用四菩薩地盡善修習方便慧善清淨諸道善集助道法善修已下正顯所集有十一句分二前三同相諸地通行故後八別相諸地異修故同中三句一二種無我上上證故此即證道地地轉勝名上上證巧證不著經云方便二善淨諸道者不住道清淨故悲智雙運故名為諸三善集助道者彼方便智行所攝滿足菩提分法故方便是前證道行即不住道悲智等行故菩提分即是彼二所攝之助助彼二故大願力所攝如來力所加自善力所持常念如來力無所畏不共佛法善清淨深心思覺能成就福德智慧大慈大悲不捨衆生入無量智道大願下別相攝八為七一初地大願攝持能至此故二三地攝善戒中如來力加故彼經為證十力四無所畏等故是我今等行十善等即上承佛力三地中因修自證禪定神通名自善力所持四常念下論云四地中所説法分別智教化智障淨勝念通達佛法者謂前十法明門是智方便即前觀察依彼智明入如來所説法中次教化智即彼經清淨分中以十種智成就法故生如來家障淨勝者即彼論釋謂滅三地智障攝四地勝智故上之二段皆念通達佛法故與此同五地中有十種平等深淨心故云善淨深心此心是思覺六能成下六地三種大悲故云成就福德三皆觀因緣集即成就智慧七中二句以近此地故初空中方便智有中殊勝行皆是大慈大悲不捨衆生行次句即以無量衆生入無量智道上總明集作方便地竟入一切法本來無生無起無相無成無壞無盡無轉第二淨忍分有十五句分三初十正明無生忍次四明無生忍淨後一結得忍名然無生忍略有二種一約法二約行約法則諸無起之理皆曰無生慧心安此故名為忍即正明中意約行則報行純熟智冥於理無相無功曠若虗空湛猶渟海心識妄惑寂然不起方曰無生即淨忍中意前一猶通諸地未得於後不稱淨忍今初段中言一切法者總該萬有理事之法入即證達以歷事無窮略陳其十十中相從為四無生前七為一名事無生後三各一二自性無生三數差別無生四作業無生四中一破相二破性三因泯四果離即前二破相入如後二證實捨相若寄位初加行二證體四後得三通始終又四中約法性收不出真妄妄法本空稱曰無生其法離相亦曰無生事無生中前四不增正顯無生後三不減亦即無生法本不生今則無滅以初攝後皆曰無生別言七者為治七種實故實者隨相執定故文有七實以七無生對治疏有多義文廣不録上明事無生竟無性為性第二無性為性者即自性無生此則顯詮論經云非有性者明非有彼定執自性此則遮詮無性即是法無我理此理既以無性為其自性則自體無性非是先有今無亦非全無真體故云為性以前觀事無生正忍此理故故論云彼觀事故是此忍不得言無此則非有非無以顯中道此二亦不二又此理亦非所觀事外故論云所有觀法無我理無二相故斯非即非離無二為中道義上明自性無生竟初中後際皆悉平等第三明數差別無生於三時中染淨法不增減故謂先際非染增淨減後際非淨增染減中際亦非半增半減以知三際皆空無自性故三明數差別無生竟無分別如如智之所入處第四無分別下明作業差別無生果位作用名業差別如智貫之則無差別無差別即是無生下如是理如上如是智如智如於真理故無差別此智是佛究竟入處今菩薩證如同佛入處故論云於真如中淨無分別佛智故如是四種皆是示現無生忍觀上四無生竟離一切心意識分別想無所取著猶如虗空入一切法如虗空性二名無生忍淨中二初句離障後三顯治前言離者論云示現行遠離謂契實捨妄名行遠離揀非心體離也所離一切略有二種一離心者離報心憶想分別謂第八異熟識轉現遍行亦不行故二離意識者離方便心憶想分別論云離攝受分別性想故謂六七識及中心所等亦不行故是則心行處滅名離一切想後無所取下明治上但明所治非有今明能治不無故論云想者遠離障法想非無治法想者治即無分別智所以明此者有二義故一則揀異外道斷滅無想二乘滅盡故二揀異如來尚是照寂非是寂照以無功用自然行故云無所取著無取果心任性自進故此顯治妙遍一切法想故云猶若虗空此顯治廣入真如不動自然行故云入一切法如虗空性此顯治深此則入於起信離念相者等虗空界無所不遍法界一相故云入一切法如虗空性然論云不動自然行者任性趣故非謂有彼自然行心故上離即止此治即觀無功雙運唯證相應勿滯言也是名得無生法忍三結名可知上淨忍分竟下第三得勝行分佛子菩薩成就此忍即時得入第八不動地第三得勝行中二初明深行勝對前彰出二佛子此地菩薩下發起勝對後彰入前中亦是攝童真住文中二先結前生後已入第八地是結前入位生後深行為所依故為深行菩薩難可知無差別離一切相一切想一切執著無量無邊一切聲聞辟支佛所不能及離諸喧諍寂滅現前二正顯深行先法後喻法中八句初句總相位行玄奧故餘七別相一難可知者即難入深正是對下彰出二無差別者同行深與諸無漏淨地菩薩同故如麥在麥聚故難知差別三離一切下境界深分齊殊絶故由所取相離能取想不現前故復言離一切著者護此地一切所治障想故四無量無邊即修行深自利無分量利他無邊故五一切聲聞等明不退深二乘不能壞其勝故六離諸喧諍即離障深謂離功用障故七寂滅現前即對治現前深以證真如為能治故一切寂滅七句通顯離前地過譬如比丘具足神通得心自在次第乃至入滅盡定一切動心意想分別悉皆止息此菩薩摩訶薩亦復如是住不動地即捨一切功用行得無功用法身口意業念務皆息住於報行第二喻中文有三喻從後次第喻前三段為順治障故從細至粗為法中顯深故從粗至細三中略有喻合今初滅定喻喻前離障寂滅喻中那含羅漢心解脫人多能入之九次第定當其第九故云乃至動心止息者謂所依六七心王已滅能依心所憶想自亡合中住不動地合入滅定即捨已下合動心止息即捨一切功用行者過所治故得無功用法者明得彼治法故身口等息者以得無功用法自然行故即同前無所取著離第一有行有間發過住於報行者文含二意一成上示現得有功用相違法謂得無功用地故此約教道同前無所取著二者謂善住阿賴耶識真如法中故此約證道同前入一切法如虗空性即離第二淨地勤方便過不同前地修無功用故云報行報行者前地所修報熟現前故住真如者以本識有二分一妄染分凡夫所住二真淨分此地所住由住真如故捨黎耶之名又佛地單住真如不云黎耶真如今為有變易報在是故雙舉則黎耶言約異熟識如來但名無垢識故譬如有人夢中見身墮在大河為欲度故發大勇猛施大方便以大勇猛施方便故即便覺寤既覺寤已所作皆息菩薩亦爾見衆生身在四流中為救度故發大勇猛起大精進以勇猛精進故至此不動地既至此已一切功用靡不皆息二行相行悉不現前第二夢寤喻喻前正行廣大論云此示行護彼過想者離彼化生勤方便過故有正智想者非無此地無功智故如夢寤雖無夢想非無寤想但此行寂滅故云所作皆息合中勇猛約心精進約行合上方便並是功用二行已下出所息障依內證清淨生死涅槃二心不行名二行不現如彼寤時此彼岸無依外緣境界受用念想不行故云想行不現即離化生聖道等想如彼寤時人船俱無合中見人墮河喻中身自墮者衆生病即菩薩病故佛子如生梵世欲界煩惱皆不現前住不動地亦復如是一切心意識行皆不現前此菩薩摩訶薩菩薩心佛心菩提心涅槃心尚不現起況復起於世間之心第三生梵天喻喻分殊絶合中正合下地心意識不現合欲界心不現行也所以不行者得報行故此離微細想行過故論云此説遠離勝也後此菩薩下舉勝況劣謂佛等不順行世間一分心等尚不行況順行世間一分心耶佛心等者即七地求如來智心也此中但況世間亦應以大況小大尚不行況小乘耶則若世若出世若人若法若因若果若智若斷皆不行也上明深行勝對前彰出下正明勝行佛子此地菩薩本願力故諸佛世尊親現其前與如來智令其得入法流門中第二明發起勝行此下亦是攝尊重行因勸起行皆尊重故勝亦尊重之義文有四段一説主總敘二作如是下顯勸辭三佛子諸佛世尊下顯勸所為四佛子若諸佛下彰勸之益今初願即勸因大論説三加七勸今諸佛現前即現身加與如來智即是意加後讚善哉即口加以先加而後勸今疏但云説主總敘而已經本願力應云住本願力諸佛世尊下總顯勸相諸佛所以與智勸者轉彼行深樂足之心令入法流門故法流者決無生止水令起無功用行河任運趣佛智海即以能趣為門又法流者即是行海言與智者有二意故一現行與覺念猶彼意加二令其修取故名為與下之七勸皆佛智攝故但云與智作如是言善哉善哉善男子此忍第一順諸佛法二正顯勸辭中二先讚即口加也然善男子我等所有十力無畏十八不共諸佛之法汝今未得汝應為欲成就此法勤加精進勿復放捨於此忍門後正勸文有七段一勸修如來善調御智二勸悲愍衆生三勸成其本願四勸求無礙智五勸成佛外報六勸證佛內明無量勝行七勸總修無遺成遍知道然七皆含轉住增去今初有三一明多未作以未得修十力等教授衆生法故次汝應下勸令修習三勿復下莫捨忍門然捨有二義一若以放捨身心住此忍門斯則不可故云勿復是以論云若不捨此忍行不得成就一切佛法此令捨著二全棄捨則所不應故論云依彼有力能作故故云勿復放捨此令依之又善男子汝雖得是寂滅解脫然諸凡夫未能證得種種煩惱皆悉現前種種覺觀常相侵害汝當愍念如是衆生第二勸中三初明自所得忍二然諸下明他無忍起過在家多有煩惱出家多起覺觀皆是衆生無利益事三汝當下勸起悲心悲心依上而轉又善男子汝當憶念本所誓願普大饒益一切衆生皆令得入不可思議智慧之門第三勸中願有二種一依廣心下化衆生二皆令得下依大心然有二義一令他得二令自得自得佛智依此智行廣利衆生又善男子此諸法法性若佛出世若不出世常住不異諸佛不以得此法故名為如來一切二乘亦能得此無分別法第四勸中有三初法性真常定其所尚次諸佛下奪其異佛勸其上求以有深無礙智大用無涯方不共二乘故後一切下抑同二乘令不住忍三獸度河同涉理故趣寂為垢故應勿住又善男子汝觀我等身相無量智慧無量國土無量方便無量光明無量清淨音聲亦無有量汝今宜應成就此事第五勸中舉身相等六皆是化生事業若成就此法則有力化生故勸修成就又善男子汝今適得此一法明所謂一切法無生無分別善男子如來法明無量入無量作無量轉乃至百千億那由他劫不可得知汝應修行成就此法第六勸中有三初明其所得未廣次善男子下示佛無量勝行無量入者所入法門差別故作是法門業用轉是業用上上不斷後汝應下結勸又善男子汝觀十方無量國土無量衆生無量法種種差別悉應如實通達其事第七勸中二先舉三種無量即淨土中三自在行後悉應下結勸明少作在既言悉應通達明少分觀察即能成就去佛非遙此同德生勸於善財勿以少行而生知足故云無量佛子諸佛世尊與此菩薩如是等無量起智門令其能起無量無邊差別智業第三顯勸所為令起智業故佛子若諸佛不與此菩薩起智門者彼時即入究竟涅槃棄捨一切利衆生業第四彰勸益中亦是所為為是故勸於中二先明不勸之損故不得不勸後以諸佛下彰勸之益是故須勸今初有二一自損既不與智即入涅槃故應須與故論云即入涅槃者與智慧示現二者損他不利衆生故然勸有四意一為引定性二乘二為警漸悟菩薩樂寂之習三為發起始行無厭上求四為顯此地甚深玄奧難捨所以須勸但有此深奧法流之處必有諸佛作七勸橋故無一人便趣永寂又設佛不勸亦無趣寂為顯勸益假以為言以諸佛與如是等無量無邊起智門故第二勸益中有法喻合法中三初牒前與智彰益之因故論云彼行中攝功德勝故云何勝諸佛同作教授説故於一念頃所生智業從初發心乃至七地所修諸行百分不及一乃至百千億那由他分亦不及一如是阿僧祇分歌羅分算數分譬喻分優波尼沙陀分亦不及一二於一下起行速疾何以故佛子是菩薩先以一身起行今住此地得無量身無量音聲無量智慧無量受生無量淨國教化無量衆生供養無量諸佛入無量法門具無量神通有無量衆會道場差別住無量身語意業集一切菩薩行以不動法故三何以下釋疾所由謂先唯一身故長時劣此一念此地身等無量故一念頓超有十一句前十別明後一總結十中初六依教化衆生次二依自集助道後二依障清淨十中一多身隨現所以多者論云一切菩薩依信解如自一身故謂智契同體故能即一為多此實報能為不同前諸地變化此對前一身餘音聲等對前起行類亦無量二圓音隨説三隨所知智四隨取何類生五隨應以何國六隨其教化何類衆生七隨供養集福德助道八隨入何法門集智慧助道九隨神通障淨十隨智慧障淨故能處無量衆會隨機説法皆言隨者隨宜非一釋無量言故隨時之義其大矣哉後一結釋中先結謂起行衆多不離三業後以不動法故者釋由無相無功用無有間斷故相用不動任運集成佛子譬如乘船欲入大海未至於海多用功力若至海已但隨風去不假人力以至大海一日所行比於未至其未至時設經百歲亦不能及喻中喻彼行速疾論云應知因勝示現者釋疾所由船由入海故疾行入無生故疾佛子菩薩摩訶薩亦復如是積集廣大善根資糧乘大乘船到菩薩行海於一念頃以無功用智入一切智智境界本有功用行經於無量百千億那由他劫所不能及合中初合未至海即前七地次到菩薩下合若至海即第八地無生之智亦是行故名為行海又頓能遍起即深而廣亦得名海無功用智以合上風一切智境明其趣果前喻所無以無生智同佛智海故喻不分本有已下合前校量上第三得勝行分竟下第四淨佛國土分大文第四淨佛國土分者問經中但云大方便智一切觀察皆如實智廣説化生應形作用瑜伽論中十自在前起智門後但云得分身智何以論主判為淨土分耶答淨土有二一是能淨之因二是所淨之果此有二對一相淨果謂寶嚴等以行業為因謂直心等三自在淨果謂三世間圓融等以德業為因謂淨土三昧等今約後對然淨土行業始起凡夫滿在一地淨土德業始起不動終在如來佛子菩薩住此第八地以大方便善巧智所起無功用覺慧觀一切智智所行境第二釋淨土文分三別一器世間自在行二衆生間自在行三智正覺世間自在行初是化處次是所化後是能化具後二淨方名淨土然初一多約能淨後二多約所淨無功用智為能觀智智所行境為所觀方便善巧即無功用因在於七地修無功用今得自在所謂觀世間成觀世間壞後所謂下別顯其相有五種自在一隨心欲二隨何欲三隨時欲四隨廣狹欲五隨心幾許欲今初觀世間成壞論云隨心所欲彼能現及不現故者謂約能淨論隨隨自心欲知即能知故約所淨論隨隨衆生心樂欲見者則現成現壞不欲見者則不現故經云觀知則唯約因論主欲顯義兼於果故云隨現即轉變自在下之四段隨現準知由此業集故成由此業盡故壞二由此業下明隨何欲謂隨物欲知何業成壞皆能現故幾時成幾時壞幾時成住幾時壞住皆如實知三幾時成下明隨時欲謂時長劫即能現故若約能淨即隨時智如此世界成二十劫初劫成器餘成衆生壞亦二十先壞衆生後一壞器並稱事稱理名如實知又知地界小相大相無量相差別相知水火風界小相大相無量相差別相四又知地下隨廣狹欲彼能現故文中三初知四大差別即是廣相小相者非定地報識境界大相者定地境界乃至四禪緣三千故無量者如來境界上三十事分齊皆以境界智知差別相者是法分齊故以相智知知其自相同相差別故微塵細相差別相無量差別相隨何世界中所有微塵聚及微塵差別相皆如實知二知微塵下知狹相細相者透全塵故論經次云粗相者隟塵故差別同前無量差別者一塵之中含多法故塵之粗細俱通定散故不云小大隨何世界中所有地水火風界各若干微塵所有寶物若干微塵衆生身若干微塵國土身若干微塵皆如實知知衆生大身小身各若干微塵成知地獄身畜生身餓鬼身阿修羅身天身人身各若干微塵成得如是知微塵差別智三隨何下知能所成雙明廣狹文二先總知內外次知地獄下別明六道斯即楞伽責所不問意顯窮幽又云無性故又知欲界色界無色界成知欲界色界無色界壞知欲界色界無色界小相大相無量相差別相得如是觀三界差別智第五又知欲界下明隨心幾許欲即能現故文中二初約智知自在上即三界互望論大小今則一界之中自分大小欲界中人境為小天境為大色中覺觀為小無覺觀為大無色界中論云佛法中凡境為小聖境為大聲聞菩薩為大者為揀外道妄取為涅槃故特云佛法如來所知一切三界皆名無量相佛子此菩薩復起智明教化衆生所謂善知衆生身差別善分別衆生身善觀察所生處隨其所應而為現身教化成熟第二約通明自在隨物現化文中三初隨機現化於中初標能化智次所謂下明所知機有三句一知身類不同故二同隨身所用方便智故三生何等界能利生故後隨其下正明隨化雖言現身意在生處故屬器界此菩薩於一三千大千世界隨衆生身信解差別以智光明普現受生如是若二若三乃至百千乃至不可説三千大千世界隨衆生身信解差別普於其中示現受生二明化分齊此菩薩成就如是智慧故於一佛剎其身不動乃至不可説佛剎衆會中悉現其身三明現自在謂不動而遍猶月入百川上明器世間竟佛子此菩薩隨諸衆生身心信解種種差別於彼佛國衆會之中而現其身第二明衆生世間自行謂隨感能調伏衆生自在故於中三初總明感應所謂於沙門衆中示沙門形婆羅門衆中示婆羅門形剎利衆中示剎利形如是毗舍衆首陀衆居士衆四天王衆三十三天衆夜摩天衆兜率陀天衆化樂天衆他化自在天衆魔衆梵衆乃至阿迦尼吒天衆中各隨其類而為現形二所謂下別顯感應於中顯化生行有二自在一化同物身沙門中現沙門形等故即身自同事又應以聲聞身得度者現聲聞形應以辟支佛身得度者現辟支佛形應以菩薩身得度者現菩薩形應以如來身得度者現如來身二化應物心以身不必同其所化即心自同事故論云彼行化衆生身心自同事佛子菩薩如是於一切不可説佛國土中隨諸衆生信樂差別如是如是而為現身三總結感應如是如是等現類衆多故若身若心無偏頓應故論結云自身心等分示現故上明衆生世間竟佛子此菩薩遠離一切身想分別住於平等第三明智正覺世間自在行遠公云若就行境應名二諦自在行今就行體名智正覺智於二諦正覺無礙故名自在今更一釋以所知十身皆是毗盧遮那正覺之體亦得從境名智正覺能令相作亦自在故文中二初明第一義智後此菩薩下明世諦智今初上句離妄下句住實由自身他身不分別故住於平等不分別言非唯照同一性亦乃能所照亡論此不同二乘第一義智示現者以彼不得法空不能即俗而真非一異故此菩薩知衆生身國土身業報身聲聞身獨覺身菩薩身如來身智身法身虗空身二明俗諦智有三一總知十身二此菩薩下令十身相作顯通自在三此菩薩知衆生身下別顯知相彰智自在今初十身論攝為三初三染分次六淨分後一不二分皆言分者同一大緣起法界分為十故即染分依他淨分依他同依一實故染分中三者初是衆生世間次國土世間業報身者彼二生因謂業煩惱經略煩惱故論具之而云報者業能招報從果立名然國土身合通於淨且從一類以判為染次六總以三乘為淨分於中前四是人菩薩及佛但因果之異次一是能證智後一是所證法故論云此二乘隨何智隨何法彼淨顯示謂因法智殊顯三乘別後虗空身是不二分者通為二依非染淨故觀下別顯多約事空義兼於理此菩薩知諸衆生心之所樂能以衆生身作自身亦作國土身業報身乃至虗空身又知衆生心之所樂能以國土身作自身亦作衆生身業報身乃至虗空身又知諸衆生心之所樂能以業報身作自身亦作衆生身國土身乃至虗空身又知衆生心之所樂能以自身作衆生身國土身乃至虗空身第二十身相作皆先明相作所由由隨機故文中二一別顯相作略有四翻云何法智虗空得為自身入法智中自然應現自己身故令於虗空忽見自身故名為作餘作亦爾隨諸衆生所樂不同則於此身現如是形二總結例餘上但舉四翻理應具十成一百身然自身即是菩薩若將自望菩薩別則有一百一十身故云則如是現所以相作得無礙者廣如懸談今文略有三意一由證即事第一義故事無理外之事事隨理而融通故二緣起相由故三業用自在故上十身相作下別顯知相此菩薩知衆生集業身報身煩惱身色身無色身第三別顯知相十身為八三乘身合故即有八段初衆生身有五相初三業生煩惱妄想染差別此約總明三界後二約上二界即就報別開若總開三界五趣則具十矣又知國土身小相大相無量相染相淨相廣相倒住相正住相普入相方網差別相二國土身具有十相前八一四相後二真實義相前中初三分齊相即小中大千次二染淨差別次廣即寬狹差別此略無狹次二依住差別真實一重頓入名為普入十方交絡名為方網又重重現故多同初地知業報身假名差別知聲聞身獨覺身菩薩身假名差別三四二段共有四身皆云假名差別者但有自相同相差別假名分別實無我人餘亦假名偏語此四者業因尚假苦果可知聖人尚假況於凡類又三乘聖人方能知假佛德超絶不得云假知如來身有菩提身願身化身力持身相好莊嚴身威勢身意生身福德身法身智身五知佛身自有十相餘之九身既是佛身一一有此則已成百若更相作則重重無盡菩提身者示成正覺故二願生兜率故三所有佛應化故揀異猿猴鹿馬等化故云應化即王宮生身四自身舍利住持故上四於三身中皆化身攝五所有實報身無邊相海等揀三十二相等故云實報即三中報身六所有光明攝伏衆生故云威勢即通報化七意生身者論云所有同異世出世間心得自在解脫故者謂意俱生即種類俱生無行作意生身也此通變化及他受用八福德身者所有不共二乘之福能作廣大因故故種少善根必得佛果九法身者所有如來無漏界故斯即所證法體界是藏義生義含無邊德生世出世諸樂事故十智身者所有無障礙智謂大圓鏡智已出障垢證平等性故次云此智能作一切事者即成所作智彼事差別皆悉能知者即妙觀察智此通四身但兩重十身一一圓融故異諸教知智身善思量相如實決擇相果行所攝相世間出世間差別相三乘差別相共相不共相出離相非出離相學相無學相六智身有十一相攝為三類初二約體分別初通聞思二即修慧俱通理教次果行相即因果分別行即是因通於三慧果唯證入相離前三餘有八智皆約位分別於中初一是總世間俗智名之為世三乘聖智名為出世又道前名世見道已去名為出世五三乘者於出世中大小分別小乘十智等中乘七十七智等大乘權實無量六七二相於大乘中粗妙分別甚深般若不共二乘相似般若是則名共八九二相通就三乘縛解分別於新熏性習未習故後二通於三乘修成分別知法身平等相不壞相隨時隨俗假名差別相衆生非衆生法差別相佛法聖僧法差別相七知法身前能知智此所知法並通一切智法不同前佛法智唯局如來文有五相一平等相即是理法論云無量法門明等一法身故者謂法門雖殊同詮平等法身生佛無二故二不壞相即是行法論云如聞取故謂稱理起行名如聞取行符乎理則冥之菩提名不可壞三即教法隨所化衆生根性相應時説差別故理本無言假言顯理若權若實皆是隨俗假名四即重顯理法所遍之境此通染淨平等法身遍情非情故五即果法唯約於淨故論云第一相差別三乘同證第一義故三寶最勝故隨智有異三種不同知虗空身無量相周遍相無形相無異相無邊相顯現色身相八知虗空身文有六相一無量相芥子中空亦無分量故二遍至一切色非色處故三不可見故今世人見者但見空顯色想心謂見故涅槃經中廣破見空此又含無為空故亦不可見四無異相者無障礙故謂不同色法彼此相異有障礙故五無邊相謂無始終起盡之邊故六能通受色相持所持故故下經云譬如虗空寬廣非色而能顯現一切諸色既因色分別彼是虗空則知因空顯彼為色上淨佛國土分竟下第五自在分佛子菩薩成就如是身智已大文第五自在分中分二初牒前為因修行三種世間自在行故得十自在此但約智通説若依攝論以六度為因如下別明得命自在心自在財自在業自在生自在願自在解自在如意自在智自在法自在二顯自在果命自在者不可説不可説命住持故心則無量阿僧祇三昧智入故財謂一切世界無量莊嚴嚴飾住持示現故上三自在以施為因如次以一切時一切處一切物施故業則以現生後世業報住持示現故生則一切世界生示現故上二自在以戒為因戒調身語成勝業故復由戒淨隨欲生故願則隨心所欲佛國土時示現成就三菩提故此則由進策勤無懈廢故解則一切世界中遍滿示現故論經名信解用忍為因以修忍時隨衆生意故得一切皆隨心轉謂變地為金等如意則一切佛國中如意作變事示現故以定為因智則如來力無畏不共法相好莊嚴三菩提示現故相法則無中邊法門明示現故上二同以般若為因內照所知得智自在應根宣説得法自在於此十中若智若通皆無壅滯故云自在約因而論此地方得約果而論圓滿在佛此約行布下離世間上賢首品皆有此十而約普賢位通貫始終上自在分竟下大勝分得此十自在故則為不思議智者無量智者廣大智者無能壞智者大文第六得此已下明大勝分於中三初智大智解殊勝故二業大行業寬廣故三彼二所住功德大智業所成故今初文有五句初句牒前為因則為下正顯顯有四智初一為總謂不住世間涅槃寂用難測名不思議此不思議有三一修行盡至不思議謂證涅槃無分量故二所知不思議廣照世境故三除障不思議謂令真如出所知障天魔外道不能壞故此菩薩如是入已如是成就已二業大有三初三句牒前為因一入自在二成就智次得畢竟下正顯業大三佛子下總結多門得畢竟無過失身業無過失語業無過失意業身語意業隨智慧行般若波羅蜜增上大悲為首方便善巧善能分別善起大願佛力所護常勤修習利衆生智普住無邊差別世界次正顯中有十二句初三明三業淨當相辨業後九約修辨業攝為四相初一句明起論云能起能起同時謂身語意是所起智慧為能起此三業起必與能起同時故經云隨行智為導首故二般若下四句智攝不染作利衆生行等謂由般若攝彼大悲故不染愛見能起方便利衆生行三善起下二句因攝謂內由大願而為自行他行之因又外蒙佛攝得成二因四後二句作業所持初句利益衆生後句淨佛國土佛子舉要言之菩薩住此不動地身語意業諸有所作皆能積集一切佛法後總結可知佛子菩薩住此地第三彼二所住功德大中三初一句標所住分齊次得善下顯所住德三此菩薩下結成功德得善住深心力一切煩惱不行故得善住勝心力不離於道故得善住大悲力不捨利益衆生故得善住大慈力救護一切世間故得善住陀羅尼力不忘於法故得善住辨才力善觀察分別一切法故得善住神通力普往無邊世界故得善住大願力不捨一切菩薩所作故得善住波羅蜜力成就一切佛法故得如來護念力一切種一切智智現前故二中十句依七種功德謂初四為一善住道功德此是功德體以二利行為菩薩道故初二自利先契理離障名為深心後對治堅固名為勝心後二慈悲利他後六各一約修辨德初三三輪化益修上利他後三願行相符外招佛護修上自利此菩薩得如是智力能現一切諸作事於諸事中無有過咎三結成中近結此段遠結前三得如是智結前智大以智證理得無憎愛故次能現下結作業大平等作故後於諸下結所住功德大得七功德無過咎故佛子此菩薩智地名為不動地無能沮壞故名為不轉地智慧無退故名為難得地一切世間無能測故名為童真地離一切過失故名為生地隨樂自在故名為成地更無所作故名為究竟地智慧決定故名為變化地隨願成就故名為力持地他不能動故名為無功用地先已成就故大文第七釋名分亦攝相回向釋如不動等故釋名分二一地釋名即約法名位二智者釋名即約人彰德今初謂此諸名對前經立初二從淨忍分受名得無生忍入不動故此句為總此智現前故無退壞次二約得勝行受名一得為深行菩薩不可知故二離一切相等諸過失故次三約淨土受名生地謂器世間自在隨樂生故成地衆生世間隨物成身自無作故究竟地者正覺世間決二諦故次一約自在分隨願成就方名自在次一約大勝分得深心等十種力持力後無功用通該始終上約名位佛子菩薩成就如是智慧二智者釋名中三初牒前為因由得智地故二入佛下正就人顯三於無量下總結所住入佛境界佛功德照順佛威儀佛境現前二就人顯中以何義故菩薩名為不動地有二義故一一向不動謂行修上順故二一體不動謂與諸菩薩行體同故文中二先總明後常為下別顯今初文有四句皆含一向一體二義論云佛性隨順因故佛性即初句以梵云馱都譯通界性致譯論經云得入佛性即是法身果性故論云佛性者界滿足勝故究竟見性故云滿足此即分齊境界菩薩由得地智能上入之隨順因者即下三句由三為因故能隨順佛境一攝功德佛功德照者善清淨義故謂以無垢慧善照佛德即是攝義二者行謂正行威儀順同佛故三者近即佛境現前近如可覩故常為如來之所護念梵釋四王金剛力士常隨侍衛恆不捨離諸大三昧能現無量諸身差別於一一身有大勢力報得神通三昧自在隨有可化衆生之處示成正覺後別明中先明一向不動論經十句今經闕一總顯佛加解參玄極上德被己故既常為佛加故名一向不動餘句別顯五種功德以顯不動一供養功德即梵釋四王論經王下有奉迎之言二守護功德謂金剛等現形衛故三依止功德恆不捨三昧故四國土清淨功德即能現諸身差別若器若衆生皆能隨現故云無量五於一一下加化衆生功德此復五種前三自分後二勝進一願取諸有多為主導故云有大勢力二根心使智力即報得神通窮三際中衆生根欲等故三無量法力三昧自在轉法輪故四受力彼經云能受無量記故今經闕此五説力即隨有可化示成正覺真能説故論經此後更有一句結云是菩薩如是通達論云一向不動故佛子菩薩如是入大乘會獲大神通放大光明入無礙法界知世界差別示現一切諸大功德隨意自在善能通達前際後際普伏一切魔邪之道深入如來所行境界二明一體不動文有十句初總餘別總云大乘會者謂入同類大乘衆數者入數者不破壞義和合一故別有九種具此九種堪入衆數一智不壞獲法智通故二説不壞謂放教智光故三解脫不壞謂不住行證入空有等無礙法界業用無礙故四佛國清淨不壞知世界自在故五入大乘不壞智能示現大功德故六神通不壞隨意自在故七善能下能解釋義不壞稱三際説故八普伏下坐道場不壞萬行及菩提下伏魔邪故九正覺不壞入如來境同佛覺故於無量國土修菩薩行以能獲得不退轉法是故説名住不動地第三總結所住中行無障礙不斷不轉念不退故大文第一明地相竟下第二明地果佛子菩薩住此不動地已以三昧力常得現見無量諸佛恆不捨離承事供養此菩薩於一一劫一一世界見無量百佛無量千佛乃至無量百千億那由他佛恭敬尊重承事供養一切資生悉以奉施於諸佛所得於如來甚深法藏受世界差別等無量法明若有問難世界差別如是等事無能屈者如是經於無量百劫無量千劫乃至無量百千億那由他劫所有善根轉增明淨大文第二位果中先調柔行法説中受世界差別等無量法明者等取衆生智正覺故論名彼因相故者以所受法為自在因故譬如真金治作寶冠置閻浮提主聖王頂上一切臣民諸莊嚴具無與等者喻中真金作閻浮提主冠者喻得清淨地身心勝故以此地中報行純熟三世間自在故特加於王無與等者喻善根光明轉更明淨此地菩薩所有善根亦復如是一切二乘乃至第七地菩薩所有善根無能及者以住此地大智光明普滅衆生煩惱黑暗善能開闡智慧門故此菩薩下三合佛子譬如千世界主大梵天王能普運慈心普放光明滿千世界此地菩薩亦復如是能放光明照百萬佛剎微塵數世界令諸衆生滅煩惱火而得清涼二教智淨梵王普放光明者勝前日光勝有三義一多故二淨故三廣故此菩薩十波羅蜜中願波羅蜜增上餘波羅蜜非不修行但隨力隨分三別地行相是名略説諸菩薩摩訶薩第八不動地若廣説者經無量劫不可窮盡四結説地名佛子菩薩摩訶薩住此地多作大梵天王主千世界最勝自在善説諸義能與聲聞辟支佛諸菩薩波羅蜜道若有問難世界差別無能退屈布施愛語利行同事如是一切諸所作業皆不離念佛乃至不離念一切種一切智智第二攝報果分二初上勝身復作是念我當於一切衆生中為首為勝乃至為一切智智依止者此菩薩若以發起大精進力於一念頃得百萬三千大千世界微塵數三昧乃至示現百萬三千大千世界微塵數菩薩以為眷屬二次勝果若以菩薩殊勝願力自在示現過於是數乃至百千億那由他劫不能數知三願智果爾時金剛藏菩薩欲重宣其義而説頌曰七地修治方便慧善集助道大願力復得人身所攝持為求勝智登八住功德成就恆慈愍智慧廣大等虗空大文第三重頌中二十二偈分三初十八偈半頌位行次二偈半頌位果經一結説分齊今初頌上七分即為七段初一偈半頌集作地分聞法能生決定力是則寂滅無生忍知法無生無起相無成無壞無盡轉離有平等絶分別超諸心行如空住二一偈半頌淨忍分成就是忍超戲論甚深不動恆寂滅一切世間無能知心相取著悉皆離住於此地不分別譬如比丘入滅定如夢度河覺則無如生梵天絶下欲三有七偈頌德行分於中二初二偈頌深行勝以本願力蒙勸導歎其忍勝與灌頂語言我等衆佛法汝今未獲當勤進汝雖已滅煩惱火世間惑𦦨猶熾然當念本願度衆生悉使修因趣解脫法性真常離心念二乘於此亦能得不以此故為世尊但以甚深無礙智如是人天所應供與此智慧令觀察無邊佛法悉得成一念超過曩衆行菩薩住茲妙智地則獲廣大神通力一念分身遍十方如船入海因風濟後五偈頌發起勝於中云但以甚深無礙智者長行所無故知唯念法性則同二乘事理事事皆無障礙是菩薩學故晉經全有一偈云但以得無礙甚深微妙智通達三世故乃得名為佛又此一句亦可總頌餘勸心無功用任智力悉知國土成壞住諸界種種各殊異小大無量皆能了三千世界四大種六趣衆生身各別及以衆寶微塵數以智觀察悉無餘菩薩能知一切身為化衆生同彼形國土無量種種別悉為現形無不遍譬如日月住虗空一切水中皆現影住於法界無所動隨心現影亦復然隨其心樂各不同一切衆中皆現身聲聞獨覺與菩薩及以佛身靡不現衆生國土業報身種種聖人智法身虗空身相皆平等普為衆生而示作四有六偈頌淨佛國土分於中三初二器世間次三衆生世間後一智正覺世間十種聖智普觀察復順慈悲作衆業五有半偈頌十自在故晉經云能得於十種妙大自在智所有佛法皆成就持戒不動如須彌十力成就不動搖一切魔衆無能轉六一偈頌大勝分諸佛護念天王禮密迹金剛恆侍衛此地功德無邊際千萬億劫説不盡七一偈頌釋名分密迹者古譯為力士復以供佛善益明如王頂上莊嚴具菩薩住此第八地多作梵王千界主演説三乘無有窮慈光普照除衆惑一念所獲諸三昧百萬世界微塵等諸所作事悉亦然願力示現復過是次二偈半頌位果菩薩第八不動地我為汝等已略説若欲次第廣分別經於億劫不能盡三結説分齊第八不動地竟第九善慧地所以來者瑜伽意云前雖於無相性中捨離功用亦能於相自在而未能於異名衆相訓詞差別一切品類宣説法中得大自在為令此分得圓滿故次有此來言善慧者攝大乘云由得最勝無礙智故無性釋云謂得最勝四無礙解無礙解智於諸智中最為殊勝智即是慧故名善慧即下文十種四無礙是也莊嚴論云於九地中四無礙慧最為殊勝云何勝耶於一剎那三千世界所有人天異類異者異義問此菩薩能以一音普答衆問遍斷衆疑故金光明云説法自在無患纍故增長智慧自在無礙者此兼顯離障名勝仁王名為慧光者言兼法喻智論名善相從所了得名能所雖殊皆名説法之慧故所離障離利他中不欲行障有四辨故四無礙障分成二愚前三為一名於無量所説法無量名句字後後慧辨陀羅尼自在愚謂所説法是義名句字是法後後慧辨是詞陀羅尼自在愚通於上三二辨才自在愚即愚第四無礙故所證真如名智自在所依謂若證得此真如已如無礙解得自在故便成善達法器自在説法行梁論云由通上真如得應身果金光明中得智藏三昧皆一義耳説此菩薩八地時如來現大神通力震動十方諸國土無量億數難思議一切知見無上尊其身普放大光明照耀彼諸無量土悉使衆生獲安樂次正釋文二分之內初讚請分中有十三偈分三初二如來現相顯説無功用行無動之動難思議故特此現通菩薩無量百千億俱時踊在虗空住以過諸天上妙供供養説中最勝者次十頌別讚後一結讚別讚中亦三初一菩薩讚大自在王自在天悉共同心喜無量各以種種衆供具供養甚深功德海次一天王供復有天女千萬億身心歡喜悉充遍各奏樂音無量種供養人中大導師後八天女供讚於中二初一供餘七讚是時衆樂同時奏百千萬億無量別悉以善逝威神力演出妙音而讚歎讚中二初一標讚寂靜調柔無垢害隨所入地善修習心如虗空詣十方廣説佛道悟羣生天上人間一切處悉現無等妙莊嚴以從如來功德生令其見者樂佛智後六讚詞於中亦二初二讚菩薩通於八地及説法主不離一剎詣衆土如月普現照世間音聲心念悉皆滅譬猶谷響無不應若有衆生心下劣為彼演説聲聞行若心明利樂辟支則為彼説中乘道若有慈悲樂饒益為説菩薩所行事若有最勝智慧心則示如來無上法譬如幻師作衆事種種形相皆非實菩薩智幻亦如是雖現一切離有無後四雙讚佛及菩薩三輪化益此文云菩薩幻智後結云讚佛已故文中通讚八九地如月普現前地有故此法師位隨機説權實故文中三初一身無心而普應次二口隨機而演説後一喻結心常契中既特云最勝智心示如來法權實明矣如是美音千萬種歌讚佛已默然住解脫月言今衆淨願説九地所行道三結請爾時金剛藏菩薩告解脫月菩薩言佛子菩薩摩訶薩以如是無量智思量觀察第二正説分先明地行文有四分一法師方便成就謂此地能起辨才説法名法師地趣地行立名方便故二智成就具能知法之智慧故三入行成就達所化器之心行故四説成就稱根正授故四中初一入心餘皆住心亦攝三位至下當知然第八中但淨佛土教化衆生此地辨才力故教化衆生成就一切相能教化故一切相者具上四分故初分中三初牒前起後前得二諦等智故謂諸佛勸起無量智慧思量觀察即是思修次欲更下正顯方便三得入下結行入地欲更求轉勝寂滅解脫復修習如來智慧入如來祕密法觀察不思議大智性淨諸陀羅尼三昧門具廣大神通入差別世界修力無畏不共法隨諸佛轉法輪不捨大悲本願力次正顯中文有十句不離二利論云一一五三句示現者初句利他次句自利故云一一次五利他後三自利故云五三示現之言通上四段初句依無色得解脫想可化衆生利益他故化其令得大涅槃故云轉勝二依未得究竟自利益故復令修習如來智慧三依根熟菩薩化入如來祕密三密化益故四依邪念可化衆生令觀察不思議智得正念故謂觀無念見性故五依未知法衆生轉法輪令得知故即淨陀羅尼三昧門皆説法所依故六依邪歸依衆生具廣大神通令入正法故七依信生天衆生令入差別世界佛淨土故上五利他下三自利中八依正覺內證智德故修力等九依轉法輪外化恩德十依無住涅槃斷德得入菩薩第九善慧地三結行入位上法師方便成就佛子菩薩摩訶薩住此善慧地如實知善不善無記法行有漏無漏法行世間出世間法行思議不思議法行定不定法行聲聞獨覺法行菩薩行法行如來地法行有為法行無為法行第二智成就此下二三段攝王子住知法知根皆法王軌度故且依智成文中初句總知三性謂淨染不二即無記後有漏下展轉別開一於淨法開漏無漏謂施戒等取相心修與漏相應名為有漏無漏返此二於無漏開出見道已前名世見道已去名出世三即就上二世出世異名為思議即世出世名不思議四彼有漏思議中定能證入名之為定為緣所動名為不定亦可佛性定有餘一切法皆悉不定三聚定等下文自説五總上諸善開出三乘謂諦緣度等皆通上四唯佛果一是為無漏等而屬菩薩乘果六於三乘法中示有為無為依順行故謂滅諦緣性彼岸真理皆名無為道諦緣智能證修起皆是有為如來一切皆是無為佛智有為非極説故涅槃令覆有為相故三乘聖人依此起行依此差別故名順行上智成就此菩薩以如是智慧如實知衆生心稠林煩惱稠林業稠林根稠林解稠林性稠林樂欲稠林隨眠稠林受生稠林習氣相聚稠林三聚差別稠林第二明入行成就於中三初總標章門二此菩薩如實知下依章廣釋三佛子菩薩隨順下總結安住今初有十一林以疏義頗難消釋今撮略疏義以為補義補義曰按疏云此十一稠林初衆生心者為總故論釋心為依共以是下十染淨共依故菩薩依此而知故名為依餘十是別此十通不出三雜染言三雜染者乃惑業苦也故論云依煩惱業生然煩惱業是惑業生是苦果此通明十稠林義也然下十林又束為七者一煩惱林是惑二業林即業三束根解性欲四林共為業四隨眠林乃惑染種子五習氣林通染淨習氣六受生林是苦果七三聚林乃通約聖凡根性有定不定時如是故後十林束為七也故論釋此七云依共染煩惱染淨等依定不定時也文有四節一依共者謂根解性欲四林共是業故二依染謂隨眠即煩惱種子名染眠伏藏識令心染汙故三煩惱染淨等即習氣四依定不定時即三聚林然習氣三聚二林通三雜染故云餘二通三又云不出三者謂隨眠是煩惱根等是業今習氣三聚二林亦不出三離染也此十皆名稠林者多故名林難知曰稠然此十名如發心品辨而習氣通二義一者殘習二者種子熏習如下當辨此菩薩如實知衆生心種種相所謂雜起相速轉相壞不壞相無形質相無邊際相清淨相垢無垢相縛不縛相幻所作相隨諸趣生相如是百千萬億乃至無量皆如實知第二依章廣釋文有九段以性解欲合一例故今初心中略舉十門攝之為八二三後二合故一差別相謂心意及識六種別言雜起者此八緣境許得齊起故名雜起以必與所俱極少猶有遍行五故二速轉下二句合明行相謂四相遷流故速是住相住體輕危速就異故轉是異相壞是滅相不壞是生相三無形質者第一義相觀彼心離心故云何離謂身心不可得故身者體依聚義即同起信心體離念等四無邊際相即自相順行無量境界取故取境不同故名為自上之四相初一是所相二是能相此二並心之相三是心之空性性相不同合為心體四即心用此四並通染淨後四明淨心隨緣第五清淨者自性不染相即自覺聖智真妄所依不空性也染而不染名自性淨次下二句即不染而染六垢無垢者即同煩惱不同煩惱相隨緣有垢性恆離故七縛不縛者同使不同使相義不異前但種現有別耳八有二句合一同名因相隨因受生故菩薩以幻智願力生餘衆生隨業諸趣生又知諸煩惱種種相所謂久遠隨行相無邊引起相俱生不捨相眠起一義相與心相應不相應相隨趣受生而住相三界差別相愛見癡慢如箭深入過患相三業因緣不絶相略説乃至八萬四千皆如實知第二釋煩惱稠林亦三別中九句攝為三種事後七合故一遠入相乃至有頂故此約四住現行下至金剛自約種説久者無始長隨故二無邊引起者難知相言無邊者修習無量善根故引起者引起惑故惑與善俱所以難知即勝鬘恆河沙等上煩惱也三俱生下七句合為染相即三雜染謂此煩惱亦與業生二俱起故即分為三初三句當體明煩惱染一俱生不離者明隨所縛此句總明能所所縛即妄心謂惑與妄心遞共同事故云俱生生即是事然雖惑不名妄心離心惑依何住故迭相共依名為不捨二眠起一義者是以何縛謂使為能縛使即隨眠起即現行現行由使不得解脫以現及種同一惑義故然下辨使不必與現行俱此中現行必由於使如有種子未必有芽若已芽必有種子故云一義三與心相應不相應者是所縛事事即真心若彼妄染名與相應是縛非解心性淨故名不相應示可解脫二隨趣下有二句約生明煩惱染論云身事生道界因故者苦報集起名身事生上句是道因下句是界因三愛見下二句約業名煩惱染初句明於三分中業因障解脫故言三分者愛是欲求中追求現報受欲行者見是邪梵行求癡是欲求中追求現報習惡行者故論云無戒衆生為現少樂習衆惡行愚癡之甚慢通上三而多屬見有求屬生染所攝故此略無上三俱障解脫過患難拔如箭深入木故外道得非想定尚與見慢相應上即論意亦可見愛等通七識中煩惱故云深入下句明此惑隨順世間身口意業不斷起因故結中八萬四千煩惱隨好品自明今此疏有多義大約以貪瞋癡等分各具二萬一千故有八萬四千又知諸業種種相所謂善不善無記相有表示無表示相與心同生不離相因自性剎那壞而次第集果不失相有報無報相受黑黑等衆報相如田無量相凡聖差別相現受生受後受相乘非乘定不定相略説乃至八萬四千皆如實知第三釋業亦三別中十句為九種差別後二合故初句道因差別謂通説三性為六趣因引業為善惡各有三品二地已説滿業通三性名言熏習亦通三性許為因種故又俱舍十七以三性因對五種果無記亦能招果故論主通以三為道因惑既不能招異熟則論主言總三為道因意別但取善惡為因二有表示等者自性差別論經此句云作未作相並以思為自性論云此有二種一籌量時此在意地唯有審慮一種思故此未作義二作業時有決定思若在身語唯動發思成唯識云動身之思名為身業發語之思名為語業三與心同生不離者方便差別心共生熏心不別生果故謂業種不離心得果不離種也謂此業思與等起意識共生隨其善惡生已即熏本識成名言等種種似能熏故云不別生果即不離義四因自性剎那壞等者盡集果差別謂無始業因以是有為故自性剎那壞故云盡此顯非常而得持至果功不敗亡故云集果不失此顯非斷前念雖滅後念續存故云次第亦是因則頓熏果則次第如識等五也五有報無報相者論云已受果未受果差別過去生報業現在已受名為有報後報未受名為無報非謂全無更有一理謂已悔之業則許無報有報可知六黑黑等衆報者對差別謂四業相對成差別故初二黑白相對後二漏無漏相對言黑黑者即四中初一因果俱惡故又因果俱與無明相應故即三途業等者等於餘三謂二名白白業三黑白業即欲界善業因中善惡雜故受報亦愛非愛雜四非黑非白業謂諸無漏業無異熟故對上黑白二業立雙非名言衆報相者上三有相故論云業集成就故若俱舍意其黑白業約相續説以無一業及一異熟是黑亦白互相違故言相續者或意樂黑方便白是為誑他行敬事等或意樂白方便黑如愍弟子現粗語等若以意推正以諂心而行敬事亦可同時餘雖集第八俱舍第十六廣明七如田無量者因緣差別謂識種為因業田為緣隨田高下等殊令種亦多差別故論經云業田無量相八凡聖差別者即已集未集差別出世未集世已集故九十二句定不定差別前句明三種時報定不定謂現作現得報名現受現報次來生獲報名生報現作第三生去方得報名後受於此三中各有定不定謂前二時定報通定不定後一時報俱通定不定第十句明乘非乘定不定乘即三乘唯修自乘業名定乍修此乘復修彼乘名為不定非乘謂世間無運出義故定者難度不定者易度故結中亦言八萬四千者惑因既爾所起之業亦然根等諸門皆成八萬翻此即顯波羅蜜門三昧門等又知諸根軟中勝相先際後際差別無差別相上中下相煩惱俱生不相離相乘非乘定不定相淳熟調柔相隨根網輕轉壞相增上無能壞相退不退差別相遠隨共生不同相略説乃至八萬四千皆如實知第四釋根中二先別後結別中十相為九差別五六合故一説器差別謂説法所授之器信等五根有下中上故亦是鈍中利謂於教理受有遲速及多少故二根轉差別過未為先後際現在已定兩望論差謂前上中下根於三際中互望轉變若後轉為中上前根則下後轉為下前根則增是差別義不轉則平是無差別故論云前後根前根下增平故三三性差別謂約菩薩等三乘根性相形為上中下故不同第一通於三乘四煩惱染差別謂喜樂等五受根隨貪等煩惱得增上故五六二相謂定不定差別初句乘非乘皆約熟不熟明大乘中熟者定不熟者不定小乘中熟者不定可轉向大乘故不熟者定各隨自乘而解脫故若世間非乘熟者不定可化入道故不熟者報已定故且暫捨之即離世間中待時方化清淨捨也後句純熟調柔一向是定六隨根網輕轉壞者順行差別此知眼等根順行境界得增上故於中有三種順行一依身順行謂六入展轉迭共相縛如網魚鳥不得解脫故云根網此行內境二生滅順謂體是有為生住不久故云輕易可異滅故云轉壞三觀行取相順行此行外境即論經云取相今文闕此或根網中收七聲聞淨差別望凡夫二乘行增上故以二乘根由滅障能成故煩惱無能壞八菩薩淨差別此通三種退不退也三種即位證念也九遠隨等者示一切根攝差別謂三無漏根總攝諸根三者一始行即未知當知根二方便即已知根正在修道故云方便三報熟者即具知根謂前信等共三無漏根生而隨優劣三位不同自始至末故名遠隨此之三根於修無學涅槃增上故此上九中初二約信等三五七八並約三乘通於諸根四約五受六約眼等六根九約三無漏根粗説可然細説無盡故結云乃至八萬四千又知諸解軟中上諸性軟中上樂欲軟中上皆略説乃至八萬四千第五例三稠林謂性解欲此三與根性相順入舉一可反三隅故皆略例又知諸隨眠種種相所謂與深心共生相與心共生相心相應不相應差別相久遠隨行相無始不拔相與一切禪定解脫三昧三摩鉢底神通相違相三界相續受生繫縛相令無邊心相續現起相開諸處門相堅實難治相地處成就不成就相唯以聖道拔出相第六釋隨眠先總中晉及論經皆名為使論云隨順逐轉義如世公使隨逐衆生得便繫縛即是隨眠眠伏藏識隨逐纏繞故此唯約種不同小宗別有十二句論攝為二前六明何處隨逐後六明以何隨逐今初為五一合初二句約心明處初句於報心隨逐正顯眠伏藏識即久安處而言深者無始來有微細難知故下句於非報心隨逐即轉識分別事識不離現事而生故但云心即暫回轉處二相應不相應者約三界明處唯與當界心相應不與異界心相應故論云欲色無色或上中下差別無色惑微所以名下等雖則隨眠性皆成就隨其現惑亦有不相應義三久遠隨行相者約地明處論云隨順乃至有頂故然有頂之言通有二義一至金剛之頂二至三有之頂今取通大小義直云有頂論經但云遠入今云久遠亦無始來上至九地頂故四無始不拔相此約時明處處既無邊時亦無始唯智能怖隨眠賊既未曾有聞思修智故不能拔出五與一切禪定等者此約行明處由隨眠隨逐令世間禪定等不能滅愛見等心不能隨順正修行故名為相違故下偈云禪定境排仍退轉也後三界下明以何隨逐即顯隨逐之相由此相故名為隨眠此有六種一於上三有不斷隨逐所以三有不斷相似相續者由有此使所繫縛故如世眠者不能起牀二遠時隨逐即於上無始時令心相續現起無邊如世眠者夢心相續三開諸處門者一身生隨逐謂於前一身之上報非報心明隨逐也如世眠者夢中見聞於中二義一令眼等諸根門集生六種識時使與同生故云開門此明外逐方便心二論云及阿賴耶熏故此明內熏報心論經門字下更有集字即賴耶集起之心然是諸處通依故今經義含耳四堅實難治即不實隨逐謂修禪等時不得真實對治故不實堅實如世重眠不得重觸大聲無由起故五地處等者微細隨逐此於上有頂處九地中六入處煩惱身隨逐故然九地有二義一約三界九地雖並成就細故不知成處多少如世眠者夢中謂覺二以善慧為九地十地猶有故名微細不成就此地中分有斷除故故下偈云金剛道滅方畢竟六離苦隨逐謂唯無分別智出世間聖道方能拔出如眠得觸又知受生種種相所謂隨業受生相六趣差別相有色無色差別相有想無想差別相業為田愛水潤無明暗覆識為種子生後有芽相名色俱生不相離相癡愛希求續有相欲受欲生無始樂著相妄謂出三界貪求相第七釋受生稠林中十句先總後別論通為八一身種種謂形類多故二業種種三住處種種四四五二句色想上下種種五同外色因種種謂田等取外同喻故六自體種種名色與識俱生相依不離是報自體故七本順生因種種謂癡愛為本順生求有令有續故八末後二句集苦諦種種謂三求不同皆是集因但集苦果故云種種上句顯欲有二求欲受即欲求貪愛共取追求不已也欲生即有求愛生三有自得勝身復攝眷屬故言無始樂著者顯上二求之過下句即邪梵行求由心取著故不知三界輪回貪求三界小大無量之相妄謂涅槃謂或拍腹為道或計無想非想為涅槃故又知習氣種種相所謂行不行差別相隨趣熏習相隨衆生行熏習相隨業煩惱熏習相善不善無記熏習相隨入後有熏習相次第熏習相不斷煩惱遠行不捨熏習相實非實熏習相見聞親近聲聞獨覺菩薩如來熏習相八釋習氣中亦先總後別總云習氣既通二義不可局於羅漢餘習雖標習氣別中皆言熏習熏謂熏灼如外香氣習謂習學唯約有情習必能熏以成氣分故云習氣即賴耶識以為所熏以恆住一類是無記性可受熏故前七轉識以為能熏由有生滅勢力增勝有增減故能所共相和合故名熏習此如攝論及唯識第二若依起信真如亦能內熏佛善友等以為外熏內外和合以成氣分前中雖聞教等亦因識能領受故判識為能熏今並通此文中既有因熏於果等定知熏習種成為氣分義別中十種差別一與果現在非現在差別謂過去善惡業因與今現果同起名行不同起名不行如人行施令行人身亦常好施等此即因習二隨趣熏者道熏差別如從天來今猶鮮淨廣明道習如大威燈光仙人所問經此即果習上二皆是對過説今三隨衆生行者親近衆生行差別此是緣習熏故宜遠惡近善慎所習也所以昔王不立廄於寺而立之於屠四隨業等者功業煩惱熏差別功業者釋經業字謂是起作事業揀非業因如煉金之子宜教數息等煩惱習者如人愛眠眠滋轉多等五善不善等者善業等熏差別此業即是業因以是善等三性望來果稱業故如久行施者施心轉濃等上三唯約現世以明習氣六隨入後有者中陰熏差別中有即是本有後故如梵行人至中有內亦不染欲七次第者與果次第熏差別謂修善惡業於後有位諸趣之中受果次第習亦於果次第無差上二約現望後以説熏習八不斷等者離世間禪因熏差別謂諸無漏定名離世間禪修學無漏即是彼因由未斷煩惱雖修無漏亦為煩惱牽煩惱隨至無漏名為遠行行亦入義九實非實者同法異外道行解脫熏差別同法釋實即三乘同佛法故異外道釋非實在佛法外故名為異行者上二之因解脫者上二之果各有熏習好習本法故曾修小乘今雖學大先發小習餘可準知此習邪正雙明約修證説亦含三乘餘習之相十乘熏差別唯就於正約其見聞故法華安樂行令不親近二乘恐習成種故前七約時三世三有互望明習通於善惡八明惡隨於善後二約人種種習氣皆能了之令成如來無習氣之習氣智故又知衆生正定邪定不定相所謂正見正定相邪見邪定相二俱不定相五逆邪定相五根正定相二俱不定相八邪邪定相正性正定相更不作二俱離不定相深著邪法邪定相習行聖道正定相二俱捨不定相第九釋三聚稠林亦先總後別論通為五總即第一有涅槃無涅槃法三乘中一向定差別無即邪定有即正定各於自乘定故離此不定此就種性約位以明外凡無涅槃三乘聖人定有內凡不定又約一期久遠非究竟無二善行惡行因差別此約解惑以分三聚謂正見是善行因邪見惡行因二見定起二行名之為定言二俱不定者無正慧決擇又不撥無因果率之則可清升任之則便鄙替故曰不定下不定倣此三惡道善道因差別此約行業以辨四外道聲聞因差別此約位以分翻彼八正名曰八邪外道邪位定正性離生聖人位定已見道故前三善根則名不定五菩薩差別此約修大乘者得失以分著邪是失所謂六蔽聖道為得即六度等佛子菩薩隨順如是智慧名住善慧地第三總結安住文屬入行論意總結前三故云前三種事成就方能安住此地三種事即法師方便成就智成就入行成就住此地已了知衆生諸行差別教化調伏令得解脫大文第四明説成就亦攝善法行辨才饒益多同彼故文中二先牒前總佛子此菩薩善能演説聲聞乘法獨覺乘法菩薩乘法如來地法次廣顯説成有三成就一智成就謂知法知器知化儀故二口業成就能起説故三法師自在成就得陀羅尼等成彼德故各有佛子以為揀別今初分二先明隨所知之法二一切下隨所依之器此二何異前文智成入成前二各別而知今此總收以法逗器今初所知法即三乘一乘解脫差別各含教證教道以將化生令器熟故證道以將度生令得解脫正體度故一切行處智隨行故能隨衆生根性欲解所行有異諸趣差別亦隨受生煩惱眠縛諸業習氣而為説法令生信解增益智慧各於其乘而得解脫二隨所依之器文有三節初總明次能隨下別顯後令生下結益論主收為七種器一説所法對器自釋云隨應度者授對治法故即總中二句下是所説法上句即所對之器別中初能隨及後而為説法即上説所説法中間根等諸林即所對之器論經衆生下有心字即是心稠林通為五種器初衆生心根性欲解五器明所説法成就謂十一林中此五正顯已成信等法器可隨根欲等説故別顯之三所行有異含其二義一約能行之行名種種異行器即上根等能行二所行之境即上根等所行名譬喻器總喻上五故世稼穡具五因緣彼所種之物成就堪用一有心物二有根益其生力三有可生性四含潤欲發五決定可生喻上心等故云譬喻四諸趣差別者即定不定根轉器亦通上根等五亦隨下以彼生煩惱業熏難捨要作同行巧辨方能化故三令生下結成益即隨乘因能乘出器以上諸義不出自乘解脫補義云疏引論收此一段為七器者以初總有二句為一器次別中云能隨衆生根性欲解準論經衆生下有一心字則以心根性欲解為五種器後結成益中令生智慧各於其乘而得解脫為一器是為七種中間所行有異等三句即明上根等差別之義故不分耳佛子菩薩住此善慧地作大法師具法師行善能守護如來法藏第二口業成就曲分為二先總明具説之德二以無量下正明口業成就今初亦是智成就以具法師行即是智故而言説者護如來慧藏通於説故斯則內持於智外口説故何名具法師行深妙義中具二十種功德故一知時二正義三頓四相續五漸六次七句義漸次八示九喜十勸十一具德十二不毀十三不亂十四如法十五隨衆十六慈心十七安隱心十八憐愍心十九不著名利二十不自讚毀他慈氏論中説具十德者名大法師攝義具足一善知法義二能廣宣説三處衆無畏四無斷辨才五巧方便説六法隨法行七威儀具足八勇猛精進九身心無倦十成就忍力以無量善巧智起四無礙辨用菩薩言辭而演説法此菩薩常隨四無礙智轉無暫捨離何等為四所謂法無礙智義無礙智辭無礙智樂説無礙智第二正明口業中先略明後此菩薩以法下廣顯今初先顯名體謂外以菩薩美妙言辭而演法義名四無礙辨內由智起名四無礙智次辨體者此智即無漏後得為體故云善巧即上知法知機智也次菩薩下約位顯勝以初地分得此地任運故無暫捨離後何等下徵列名字知緣法等無物礙故法等皆智境界從境分四一法者法體謂法自體有軌持故即二空所攝即真之俗境故論云遠離二邊生法所攝如色礙相等二義者法境界體謂於體上差別境義即上二空所攝真諦之境故論云即彼遠離二邊生法所攝中如實智境界故然得此真智者由菩薩於生法二執所攝境中以智安住求彼色等但是虗妄即俗而真是彼色等之中別義上即遠公之意其猶不生不滅是無常義亦可不約二諦法約自體義約差別謂十一色等虗妄分別之相即是別義言如實智者稱事實也三詞者正得與衆生謂得彼方言與他説故故論云於彼如實智境中隨他所喜言説正知此釋正得隨他言説正知而與故此釋與衆生四樂説者正求與無量門謂樂説乃辭中別義七辨剖析名無量門論云於彼隨他所喜言語正知無量種種義語隨知而與故上略明四無礙智下廣顯中理實此四通該一切且約圓教以列十門各有復次論云後五是淨者謂三行果則顯前五是三乘教理通於染淨言十者一依自相謂知事法體各殊故二依同相謂知理法若性若相各有同理故三行相此約時辨法三世遷流故上三知義即是所詮四説相此知教法上四皆約所知五智相此約能知六無我慢相此約所離明淨七小乘大乘相此約所行上二通辨諸乘行果後三別約一乘八菩薩地相此約因行後二知果九如來地相約體十作住持相約用然十中法義則別後二多同皆辭則説於法義樂説乃辭中別義亦有以辭説於法樂説説義十中皆四無礙即四種相此菩薩以法無礙智知諸法自相義無礙智知諸法別相辭無礙智無錯謬説樂説無礙智無斷盡説二廣顯十中初自相有四種一生法自相謂知色是變礙相等二義者差別自相謂知色有十一處等上二約總別以分法義後二同體義分三想堅自相想者起言所依亦以慧心取彼二種相故一隨自所覺諸法相二隨彼所化言辭所宜相以所覺法隨彼言辭為彼生説説無錯謬名為堅固四彼想差別自相想義同上但以次第不息以多異名堅固彼義令他受樂名不斷盡此自相一門是總復次以法無礙智知諸法自性義無礙智知諸法生滅辭無礙智安立一切法不斷説樂説無礙智隨所安立不可壞無邊説第二同相約性與相分於法義一一切法同相謂諸法同以無性為自性故二有為法同相同生滅故謂觀無常生滅門相得入初句法無我性故無我智境得成是則生滅是常義也三一切法假名同相故云安立所立之法已是假名更以言詮假名而談名不斷説四假名假名同相謂不壞前假名更以異異無邊假名説故重言假名復次以法無礙智知現在法差別義無礙智知過去未來法差別辭無礙智於去來今法無錯謬説樂説無礙智於一一世無邊法明了説第三行相中約三世以分法義一生行相現法緣生故設知過未亦名現在以三世皆是當世現在故故論云過去未來彼彼世間攝受故二已生未生行相設知現在亦名過未以現是過家未未家過故是則當世而知名法逆見過未能知現在是則名義為菩薩知境三物假名行相總説三世之物不謬故四説事行相然所説事中不出三世總相物中故云一一世但曲明異異事法故云無邊法明復次以法無礙智知法差別義無礙智知義差別辭無礙智隨其言音説樂説無礙智隨其心樂説四説相中約本釋以分法義一修多羅相故但云法二解釋相所以名義三隨順相隨類言音故四相似説相謂隨心樂聞何法宜何譬喻説似彼心故復次法無礙智以法智知差別不異義無礙智以比智知差別如實辭無礙智以世智差別説樂説無礙智以第一義智善巧説第五智相約法類以分法義一現見智二比智比即類也然所知境即是二諦法比等智是無礙體從體立稱不同前後又法比等智通於大小四無礙智唯局大乘故涅槃説唯菩薩有聲聞設有少故名無若就二智所觀普通大小約能觀智唯局大乘於大乘中依觀所取能以立法類一法智觀如故云現見謂觀差別二諦同如不異故二比智即觀前能觀如實分別之智類餘亦爾類何等耶比知如前差別即如實故三欲得方便智謂此是相見道依真假説後得智攝故云世智若欲得第一義假説以為方便四得智謂以世智説而與第一義相應非顛倒異方名樂説故云善巧可以證得第一義故餘如唯識雜集各第九瑜伽十六説復次法無礙智知諸法一相不壞義無礙智知蘊界處諦緣起善巧辭無礙智以一切世間易解了美妙音聲文字説樂説無礙智以轉勝無邊法明説第六無我慢相中約真俗以分法義一第一義諦無我故云一相言不壞者不壞無我故若言我知無我我證無我則壞無我以有能所故二世諦無我故云蘊等迷蘊著積聚我迷界著異因我計種族別故迷處著欲我計為生門能受入故迷諦緣起著作我皆明因果有造作故並是法我亦通人我今隨順觀察世諦緣生無實以為對治得入第一義法無我名善巧方便故蘊界等是菩薩智境所治之義三説美妙無我愜情稱美順理為妙四説無上無我故云轉勝辭中差別故云無邊法明復次法無礙智知一乘平等性義無礙智知諸乘差別性辭無礙智説一切乘無差別樂説無礙智説一一乘無邊法第七大小乘相中約權實以分法義以知實為法知權為義會三歸一為辭開方便門為樂説一觀相謂一觀不異唯一事實故二性相就彼根性有三乘故三解脫相會彼三乘同歸一實解脫相中無差別故論云依同解脫不懼者法華云今我喜無畏但説無上道故四念相即開方便門隨機念異心行不同以多法明説諸乘法然皆為一事故論云隨順解脫復次法無礙智知一切菩薩行智行法行智隨證義無礙智知十地分位義差別辭無礙智説地道無差別相樂説無礙智説一一地無邊行相第八菩薩地相中約地體相以分法義一智相一切菩薩行者總標也何者是耶謂所證法行能證智行何以此二名菩薩行以智契如故故經云智隨證論云觀智説故此菩薩行即十地智體二説相謂體雖一智相有十地分位故然此分位由心差別故論云十地差別者謂心而名説相者約口言也以論經云義無量者説十地差別故作是釋斯則異前義大三與方便相謂巧説十地授與衆生不顛倒教授與地證道無有差別故四入無量門相入諸地相差別故復次法無礙智知一切如來一念成正覺義無礙智知種種時種種處等各差別辭無礙智説成正覺差別樂説無礙智於一一句法無量劫説不盡第九如來地相約真應以分法義謂一法身相即始本無二之法身故云一念成正覺二色身相種種時者隨何劫中種種處者隨何國土依報事各差別者隨何等佛身上報事三成正覺相通説正覺十佛差別故四説相佛德無盡故説亦無盡復次法無礙智知一切如來語力無所畏不共佛法大慈大悲辨才方便轉法輪一切智智隨證義無礙智知如來隨八萬四千衆生心行根解差別音聲辭無礙智隨一切衆生行以如來音聲差別説樂説無礙智隨衆生信解以如來智清淨行圓滿説第十作住持相約諸佛能説德所説聲教以分法義一覺相即作住持德覺法性相故語者隨自意語隨他意語隨自他意語此能説法故十力破魔憍慢無畏伏外道不共異二乘慈悲故常説辨才故能説方便者隨順物機轉法輪者正説此上皆一切智智隨證二差別相知佛隨心種性等差別聲教故三説相用前音聲差別説故四彼無量相異異説故隨信解者示現菩薩無盡樂説故以如來智等者諸佛法身以利生為行此行合智故無垢清淨不可破壞故云圓滿此地分得故用之而説佛子菩薩住第九地得如是善巧無礙智得如來妙法藏作大法師大文第三法師自在成就中二先牒前標後二得義下正顯成就有四種事一持成就得不失故二説成就巧能演故三問答成就斷疑網故四受持成就更受勝法故則前三自分後一勝進又前一釋得妙法藏後三釋作大法師於此四種皆無縛著即攝第九回向也得義陀羅尼法陀羅尼智陀羅尼光照陀羅尼善慧陀羅尼衆財陀羅尼威德陀羅尼無礙門陀羅尼無邊際陀羅尼種種義陀羅尼如是等百萬阿僧祇陀羅尼門皆得圓滿以百萬阿僧祇善巧音聲辨才門而演説法第一持成就中分二初列十持持先已得後此菩薩得如是下用前十持持當所得今初先列十持並從所起業用立名初三起意業次三起身業後四起口業一持義二持教法三持能知智四善軟者慈光攝受五剛強者善慧降伏種種施為故六上供諸佛下攝貧窮故名衆財七於大乘中狹劣衆生示教大乘威德勝利令生善故八不斷辨才智常説故九無盡樂説深説故十種種樂説廣説故後如是下總結以百萬下顯持之用此菩薩得如是百萬阿僧祇陀羅尼門已於無量佛所一一佛前悉以如是百萬阿僧祇陀羅尼門聽聞正法聞已不忘以無量差別門為他演説二持當得中聞已不忘正顯持義為他演説亦持之用此菩薩初見於佛頭頂禮敬即於佛所得無量法門此所得法門非彼聞持諸大聲聞於百千劫所能領受第二明説成就中三初顯所受法多此菩薩得如是陀羅尼如是無礙智坐於法座而説於法大千世界滿中衆生隨其心樂差別為説唯除諸佛及受職菩薩其餘衆會威德光明無能與比二能廣開演此菩薩處於法座欲以一音令諸大衆皆得解了即得解了或時欲以種種音聲令諸大衆皆得開悟或時心欲放大光明演説法門或時心欲於其身上一一毛孔皆演法音或時心欲乃至三千大千世界所有一切形無形物皆悉演出妙法言音或時心欲發一言音周遍法界悉令解了或時心欲一切言音皆作法音恆住不滅或時心欲一切世界簫笛鐘鼓及以歌詠一切樂聲皆演法音或時心欲於一字中一切法句言音差別皆悉具足或時心欲令不可説無量世界地水火風四大聚中所有微塵一一塵中皆悉演出不可説法門如是所念一切隨心無不得者三明起説自在上二説成就竟佛子此菩薩假使三千大千世界所有衆生咸至其前一一皆以無量言音而興問難一一問難各各不同菩薩於一念頃悉能領受仍以一音普為解釋令隨心樂各得歡喜如是乃至不可説世界所有衆生一剎那間一一皆以無量言音而興問難一一問難各各不同菩薩於一念頃悉能領受亦以一音普為解釋各隨心樂令得歡喜乃至不可説不可説世界滿中衆生菩薩皆能隨其心樂隨根隨解而為説法承佛神力廣作佛事普為一切作所依怙大文第三問答成就初一界答難二明一切世界佛子此菩薩復更清淨成就智明假使一毛端處有不可説世界微塵數諸佛衆會一一衆會有不可説世界微塵數衆生一一衆生有不可説世界微塵數性欲彼諸佛隨其性欲各與法門如一毛端處一切法界處悉亦如是如是所説無量法門菩薩於一念中悉能領受無有忘失第四受持成就上通明地行竟下明位果佛子菩薩住此第九地晝夜專勤更無餘念唯入佛境界親近如來入諸菩薩甚深解脫常在三昧恆見諸佛未曾捨離一一劫中見無量佛無量百佛無量千佛乃至無量百千億那由他佛恭敬尊重承事供養於諸佛所種種問難得説法陀羅尼所有善根轉更明淨大文第二明位果三果同前但此初調柔果中見佛緣初依內證見佛法身後依三昧見佛色身餘可知譬如真金善巧金師用作寶冠轉輪聖王以嚴其首四天下內一切小王及諸臣民諸莊嚴具無與等者二喻明此第九地菩薩善根亦復如是一切聲聞辟支佛及下地菩薩所有善根無能與等三合佛子譬如二千世界主大梵天王身出光明二千界中幽遠之處悉能照耀除其黑暗此地菩薩所有善根亦復如是能出光明照衆生心煩惱黑暗皆令息滅二教智淨此菩薩十波羅蜜中力波羅蜜最勝餘波羅蜜非不修行但隨力隨分三別地相佛子是名略説菩薩摩訶薩第九善慧地若廣説者於無量劫亦不能盡第四結説地名佛子菩薩摩訶薩住此地多作二千世界主大梵天王善能統理自在饒益能為一切聲聞緣覺及諸菩薩分別演説波羅蜜行隨衆生心所有問難無能屈者布施愛語利行同事如是一切諸所作業皆不離念佛乃至不離念一切種一切智智復作是念我當於一切衆生中為首為勝乃至為一切智智依止者此菩薩若發勤精進於一念頃得百萬阿僧祇國土微塵數三昧乃至示現百萬阿僧祇國土微塵數菩薩以為眷屬第二攝報果若以菩薩殊勝願力自在示現過於此數乃至百千億那由他劫不能數知三願智果爾時金剛藏菩薩欲重宣其義而説頌曰無量智力善觀察最上微妙世難知普入如來祕密處利益衆生入九地總持三昧皆自在獲大神通入衆剎力智無畏不共法願力悲心入九地第三重頌分中二十四偈分三初十九偈頌地行次四偈位果後一結歎今初具頌上四分初二頌法師方便住於此地持法藏了善不善及無記有漏無漏世出世思不思議悉善知若法決定不決定三乘所作悉觀察有為無為行差別如是而知入世間次二頌智成就若欲知諸衆生心則能以智如實知種種速轉壞非壞無質無邊等衆相煩惱無邊恆共伴眠起一義續諸趣業性種種各差別因壞果集皆能了諸根種種下中上先後際等無量別解性樂欲亦復然八萬四千靡不知衆生惑見恆隨縛無始稠林未除翦與志共俱心並生常相羇繫不斷絶但惟妄想非實物不離於心無處所禪定境排仍退轉金剛道滅方畢竟六趣受生各差別業田愛潤無明覆識為種子名色芽三界無始恆相續惑業心習生諸趣若離於此不復生衆生悉在三聚中或溺於見或行道三七偈頌入行成就住於此地善觀察隨其心樂及根解四有八偈頌説成就於中初半偈頌智成就悉以無礙妙辨才如其所應差別説處於法座如師子亦如牛王寶山王又如龍王布密雲霔甘露雨充大海善知法性及奧義隨順言辭能辨説次二偈頌口業成就其中諸喻長行所無總持百萬阿僧祇譬如大海受衆雨總持三昧皆清淨能於一念見多佛一一佛所皆聞法復以妙音而演暢後五偈半頌法師自在成就於中初偈半頌持若欲三千大千界教化一切諸羣生如雲廣布無不及隨其根欲悉令喜次一偈頌説毛端佛衆無有數衆生心樂亦無極悉應其心與法門一切法界皆如是次一偈頌問答菩薩勤加精進力復獲功德轉增勝聞持爾所諸法門如地能持一切種十方無量諸衆生咸來親近會中坐一念隨心各問難一音普對悉充足後二偈頌受持兼頌問答住於此地為法王隨機誨誘無厭倦日夜見佛未曾捨入深寂滅智解脫供養諸佛善益明如王頂上妙寶冠復使衆生煩惱滅譬如梵王光普照住此多作大梵王以三乘法化衆生所行善業普饒益乃至當成一切智一念所入諸三昧阿僧祇剎微塵數見佛説法亦復然願力所作復過此第二四偈頌位果此是第九善慧地大智菩薩所行處甚深微妙難可見我為佛子已宣説第三一頌結説第九善慧地竟
