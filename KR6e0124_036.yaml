body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈十地品第二十六之三第四𦦨慧地所以來者瑜伽引解深密明四種清淨能攝諸地前三即意樂戒定增上三清淨訖此下第四訖於佛地明慧增上故次來也又慧有多種四地正明覺分相應增上慧住故次來也又前地雖得世定總持而未能得菩提分法捨於定愛及與法愛今修證彼行故次來也若依本論前三寄世間今此出世次第故來若近望前地由前定聞發此證智故次來也故論云依彼淨三昧因持如實智淨顯示故言𦦨慧者法喻雙舉亦有三義一約初入地釋初入證智能燒前地解法慢薪故本分云不忘煩惱薪智火能燒故二約地中釋成唯識云安住最勝菩提分法燒煩惱薪慧𦦨增故以此地正明菩提分法言中該初後以菩提分慧為𦦨自性以惑智二障為薪自性此地菩薩能起慧𦦨燒二障薪名𦦨慧地三約地滿從證智摩尼放阿含光故名為焰然所燒煩惱即所離微細煩惱現行障謂所知障中俱生一分亦攝定愛法愛菩提分法特違於彼故能燒之由斯四地說斷二愚及彼粗重一等至愛愚味八定故二法愛愚即解法慢今得無漏定及無漏教故違於彼由斯證得無攝受真如謂此真如無所繫屬非我執等所依取故得此真如寧有定法之愛便能成菩提分行及不住道精進不退由達無攝受真如便得攝無生之果佛子聞此廣大行可樂深妙殊勝法心皆勇悅大歡喜昔散衆華供養佛演說如是妙法時大地海水皆震動一切天女咸歡喜悉吐妙音同讚歎自在天王大欣慶雨摩尼寶供養佛次正釋文文亦三分一讚請二正說三重頌今初六偈分三初二偈半集經者敘述地海動者表無明厚地大愛海水可傾竭故讚言佛為我出興演說第一功德行如是智者諸地義於百千劫甚難得我今忽然而得聞菩薩勝行妙法音願更演說聰慧者後地決定無餘道利益一切諸天人此諸佛子皆樂聞勇猛大心解脫月請金剛藏言佛子從此轉入第四地所有行相願宣說後三偈半正明讚請於中先初二偈半天王請後一衆首請爾時金剛藏菩薩告解脫月菩薩言佛子菩薩摩訶薩第三地善清淨已欲入第四𦦨慧地當修行十法明門第二正說分中大文二段初明地相後明地果前中為四分一清淨對治修行增長因分謂清淨等是次二分今趣地方便為彼之因二佛子住此𦦨慧地下清淨分是初入地出障行故三佛子住此第四下對治修行增長分即正住地行道品等行能有所除故云對治進習上上名修行增長四佛子至所有身見下彼果分是中二分之果又此四分即加行無間解脫勝進四道又四中初一是入心後三是住心出心在調柔果住心中三分攝前三位初清淨分即攝生貴住次攝至一切處回向後攝無盡行至文當知今初因文分三初結前標後次何等下徵列別名三菩薩以此下結行入位今初十法明門者門即通入之意明為能入之門法為所入之處故論云得證地智光明依彼智明入如來所說法中言證地智者即四地證智也光明者即三地慧光謂三地中得此四地證智前相故前地論云彼慧此中名光明即其義也所言法者前求多聞從佛聞說衆生法界等十種之法便以智光遊入遊入即是修行修行即下觀察觀察增上極圓滿故方得證入四地何等為十所謂觀察衆生界觀察法界觀察世界觀察虗空界觀察識界觀察欲界觀察色界觀察無色界觀察廣心信解界觀察大心信解界二徵列中有十種差別觀察此十略以三重釋之有總別初一句為總本為衆生故餘九為別皆衆生事故二染淨前八為染後二為淨三能所依前五推能依至所依後五依所依立能依初中一觀衆生假名差別假有三種一因成假二相續假三相待假假為空詮故先觀之因成假有二一五蘊和合假名某甲則入衆生空二陰亦因緣而有則入法空二空所顯即是真如不壞假名空有不二即是中道言相續者由前陰滅後陰續生念念續生假而非實亦入二空真實言相待者待非衆生以說衆生入實亦然此一推假入實餘九例知二法界者即染法界此就別義若淨法界通為十依則十與法界究竟無別三世界者彼假名衆生所住依報四依正所依虗空五染淨所依是本識界後五依此所依立後能依故此識界前後兩向向前依正教向後為染淨依後五中初三句由煩惱使染成染分依他有三界差別著欲著受及著想故三界唯心故後二廣大信解成淨分依他前是勝心信解依煩惱不染與聲聞同後大心信解依不捨衆生不同聲聞今即前云廣則護俠兼濟之心大即是護小心成大菩提則二心俱異二乘又皆言界者通理事也事則曲盡差別理則一一入實即清淨法界故皆為明門菩薩以此十法明門得入第四𦦨慧地三結行入位觀察圓滿與十理冥則入四地佛子菩薩住此焰慧地則能以十種智成熟法故得彼內法生如來家大文第二清淨分即攝生貴住故前文云於諸佛聖教中生云何清淨於如來家轉有十力故文中三初總明次何等下徵釋是為十者下總結初中文有三句末句生家是總相初句十智為能生因次句內法為所生家由以十智觀察下諸行等十法得成熟故成熟則滅除三地解法智障攝四地出世聖智契於法體故云得彼內法內法者顯非外相此法即如來所說教化之法名如來家此地寄出世之首故名為生何等為十所謂深心不退故於三寶中生淨信畢竟不壞故觀諸行生滅故觀諸法自性無生故觀世間成壞故觀因業有生故觀生死涅槃故觀衆生國土業故觀前際後際故觀無所有盡故是為十二徵列中文有十句論攝為四種智初自住處畢竟智謂大乘是菩薩自所住處深心相應為住畢竟即是不退二同敬三寶畢竟智謂證三寶同體成不壞信故三有二句明真如智謂見第一義證二無我故一但有蘊等諸行而生滅流轉故無人我二即此蘊等諸法本來不生故無法我四餘六句明分別說智謂是教智故名為說知世諦故名為分別分別染淨故初二句是染後三句是淨末一句具染淨即是四諦謂初二句名隨煩惱染即是苦諦世間依報有生正報謂依正二報隨煩惱集因所生故業與煩惱二俱集因亦可因業有生是集諦三生死涅槃雙觀苦滅二諦後三句道諦觀衆生一句論云諸佛世界中教化衆生自業成熟故準此應云觀諸國土化衆生業則不濫前因業有生後二句自利行初句約事觀煩惱無始故為前際涅槃無終故為後際後句順理觀煩惱本空無有損減故無可盡涅槃性淨非新增益自性盡性皆無所有盡自下大文第三對治修行增長分有二初護煩惱行後菩薩修行如是下護小乘行前是大智自利異凡後是大悲利他異小此二相導成不住道無所不至故攝至一切處回向也今初即修菩提分法菩提是覺分是因義有三十七品為諸乘覺因故亦名道品通於大小言三十七者謂四念處四正勤四神足五根五力七覺支八正道明此體性雖三十七品但依十法而為根本謂信戒念精進定慧除喜捨思惟由信二戒三念開為四精進定慧此三各八餘四各一故成三十七言信二者即一信根二信力言戒三者即八正中正語正業正命念開為四者一念根二念力三覺支中念覺四八正中正念精進八者即四正勤五精進根六精進力七精進覺支八正精進定有八者謂神足為四五定根六定力七定覺分八正定慧有八者四念處為四念以慧為體故五慧根六慧力七擇法覺分八正見見即慧故餘四各一者即除喜捨思惟也由前疏云初護煩惱行即菩提分法以寄位修後各有文故首列於此今經初治顛倒行名四念處謂身受心法然念以慧為體修身觀等為修習破四顛倒趣入四諦身等離繫以為其果此身等四前三即三蘊而合想行為法念者為明我所依事我受用事我自體事我染淨事故要此四者治四倒故謂觀身不淨治於淨倒觀受是苦觀心無常觀法無我三治可知破此四倒行四正行開實相門應觀此身法性緣生色故一色一切色故中論云因緣所生法我說即是空亦為是假名亦名中道義若三乘緣生但各各緣生今法性緣生法性融故令一色一切色是則對治法藥有四法性觀智名之為念一諦三諦名之為處只一念心廣遠若此故深觀念即坐道場更不須餘機宜不同故說餘品今經但云觀身不言淨不淨等從通相說顯包含故佛子菩薩住此第四地觀內身循身觀勤勇念知除世間貪憂觀外身循身觀勤勇念知除世間貪憂觀內外身循身觀勤勇念知除世間貪憂文中二初別觀身念後如是下類顯餘三今初觀身自有內等三觀瑜伽云內自有情色為內身外非情色為外身他有情數為內外身初即自身我愛愛故次即資具等我所愛故後即眷屬妻子彼我我愛我所愛故所以有此三者破三種邪行故有人著內情多捨妻以全身有人著外情多貪財喪軀為妻捨命有二俱著破此三邪成三正行此約三人各別對治若約一人起觀始終謂先觀自身求淨等不可得或當外有次便觀外復不可得便自疑云我觀內時於外或錯我觀外時於內或錯次內外俱觀亦不可得言循身觀者總顯修相智論云尋隨觀察知其不淨等次言勤勇念知者顯修之儀以貪等世事無始惡習離之甚難過於世間慈父離於愛子故須精勤方能除遣勤即欲勤策勵勇謂勇猛不息念則明記不忘知則決斷無悔又心若馳散當念老病死苦三惡道苦身命無常佛法欲滅名為念知則能鞭心令復本觀便生勇猛具上諸義則不放逸上觀身如是觀內受外受內外受循受觀觀內心外心內外心循心觀觀內法外法內外法循法觀勤勇念知除世間貪憂後例餘三處者準瑜伽意依前內等三身生受心法故受心法隨所依生亦有內外等論問云於四念中心唯是內身通內外云何於四皆有四等答受有二種一身二心心受名內身受名外又意識相應受名內五識相應受名外等心雖是內緣外法故名外五識一向是外又定為內散心為外法雖外緣內法心數法名內緣外法心數法及無為心不相應行是外後三念處亦合前二以為內外上觀四念處復次此菩薩未生諸惡不善法為不生故欲生勤精進發心正斷已生諸惡不善法為斷故欲生勤精進發心正斷未生諸善法為生故欲生勤精進發心正行已生諸善法為住不失故修令增廣故欲生勤精進發心正行第二斷諸懈怠道謂四正勤言四正勤者四念智火若得勤風則無所不燒故次辨之瑜伽云如是於四念住中慣習行故已能除遣粗重顛倒已能了達善不善法從此無間於未生善法為令生故等此來意也謂以精進為體故總名勤言非外道無益勤苦故名為正雖是一勤隨義分四前二勤斷二惡是正惡行後二勤修二善是作善行二善二惡皆所緣境亦名四正斷後二是修而言斷者善是斷處正修行者斷懈怠故約大乘說勤觀法性除實相之外皆名為惡二惡不生棄捨二善得生增廣是正勤果上四勤下四神足先敘意第四引發神通道謂四神足言四神足者謂欲定念思惟也以勤過散亂智火微弱故須定制則所欲自在此來意也神即神通足即是定瑜伽云如有足者能往能還以騰躍勇健能得能證世間勝法世殊勝法說名為神彼能到此故名神足此舉喻也由出世法最勝自在是最勝神欲等四定能證此故名為神足亦名如意足所欲如心故此釋名也神足所緣即種種變事神足自體即三摩地若辨其相則欲勤心觀皆是助伴欲謂猛利樂欲勤為精進無間心即是定謂專心守境觀即是慧由聞教法內自簡擇由欲增上力證心一境性名為欲定餘三亦然勤觀心性名為上定皆從加行受名此四加行即前正勤中欲生勤精進發心正斷等以發心中持此能生心定持太舉故策心能生觀定策太沉故是以隨一念處有四正勤隨一正勤有四神足上敘意下釋文復次此菩薩修行欲定斷行成就神足依止厭依止離依止滅回向於捨修行精進定心定觀定斷行成就神足依止厭依止離依止滅回向於捨釋文中先別名欲定次修行精進下通顯餘三言修行欲定者標舉所修助伴自體斷行二字總顯修相亦修之果云何修相此復有二一修習欲定能斷現行諸惑纏故二為欲永害所有隨眠修八斷行謂欲勤信安念正知思及捨若斷行成就亦神足果次成就神足唯是彼果依止厭下復顯修相兼辨所緣以神足即緣四諦而修謂緣苦修必依厭苦若緣集修必依離欲若緣滅修必求證滅若緣道修必趣滅苦之行能捨於苦緣此境時必求修習故云回向後精進下同顯餘三上四神足第四五根見觀方便道謂增上名根五根自體即信等五此五通於生起出世間法而為增上前四復能起後得增上名而信為上首能起於四復次此菩薩修行信根依止厭依止離依止滅回向於捨修行精進根念根定根慧根依止厭依止離依止滅回向於捨釋文中先別明信根後通顯餘四有二先各標舉所修後依止等別顯修相下之三科例此今此所修即於諦實深忍樂欲餘四即於前策勵而行明記不忘繫緣一境揀擇是非然始入佛法即有信心未有安慧不得名根今由前三科則信不可拔此中念即念處中念進即正勤定即神足慧即緣四諦慧前三至此總得名根若依位者在於見道之前則以速發現觀而為其果今在四地則應以發後地為果上五根下五力復次此菩薩修行信力依止厭依止離依止滅回向於捨修行精進力念力定力慧力依止厭依止離依止滅回向於捨第五五力即前五根增長魔梵惑等不能屈伏故名為力又能損減不須等障故復名力智論云能破煩惱得無生忍故名為力上五力下七覺支第六現觀自體道謂七覺支覺謂覺了覺支自體即念等七復次此菩薩修行念覺分依止厭依止離依止滅回向於捨修行擇法覺分精進覺分喜覺分猗覺分定覺分捨覺分依止厭依止離依止滅回向於捨釋文中亦二先別明念覺後通顯餘六然七覺分七皆自體餘六皆覺之分謂念是所依支由繫念故令諸善法皆不忘失擇法是自體支覺自相故精進是出離支由此勢力能到所到故喜是利益支由心勇悅身調適故猗定捨三是不染污支猗即輕安由此不染污故謂由安故能捨粗重定者依此不染污故謂依止定得轉依故捨者體是不染污故謂行捨平等永除貪憂不染污位為自性故總收七覺不出三品念通定慧次三是慧彼三定攝依位所明能斷見惑以為其體又雖一剎那七法俱起而隨行相各說功能念除妄念擇除不正知餘除懈怠昏沉粗重散亂掉舉大乘七覺不念諸法故決擇不可得故離進怠相故絶憂喜故除安心緣皆叵得故性定之中無定亂故亦不見於能所捨故上七覺復次此菩薩修行正見依止厭依止離依止滅回向於捨修行正思惟正語正業正命正精進正念正定依止厭依止離依止滅回向於捨第七八正若依位說即現觀後起道為斷修道諸煩惱故離八邪故名為八正開通涅槃故名為道亦名八聖道聖者道故八正自體即正見等文中亦先別別名正見後通顯餘七言正見者是分別支依前所證真實揀擇故正思惟者是誨示他支如其所證方便安立思惟名義發語言故次三是令他信支謂正語者善依所證問答決擇令他信有見清淨故正業者身業進止正行具足令他信有戒清淨故正命者如法乞求依聖種住離五邪命令他信有命清淨故正精進者是淨煩惱障支由此永斷一切結故正念者是淨隨煩惱支由不忘失正止舉相永不容受沉掉等故正定者是能淨最勝功德障支由此引發神通等無量勝功德故若能如上分別誨示等即是道支之果然其八中語業命三是戒蘊攝念定是定餘三是慧若依此經離世間品八正是菩薩道一者正見遠離邪見乃至第八正定善巧方便於一三昧出生菩薩不可思議一切三昧則與前說旨趣懸殊上之七類總以喻顯法性如大地念處如種子正勤為種植神足如抽芽五根如生根五力如莖葉增長開七覺華結八正果上對治修行增長分中護煩惱行竟下護小乘行菩薩修行如是功德為不捨一切衆生故本願所持故大悲為首故大慈成就故思念一切智智故成就莊嚴佛土故成就如來力無所畏不共佛法相好音聲悉具足故求於上上殊勝道故隨順所聞甚深佛解脫故思惟大智善巧方便故第二護小乘行中十句初總餘別總中如是功德指前道品為不捨衆生正明護義不同二乘之獨善別中具有悲智九句為四一始二益三希四行前三護小心後一護小行一始者大願為起行之本故二慈悲益物上二護狹心三思念種智為希此護小心也四行中有五句前四句自利初二求果一修淨土行求佛依報二修起佛法行求佛十力等正報之法後二求因三求彼地方便無厭足行謂五六七地故云上上勝道四修修入不退轉地行即八地已上覺法自性順佛解脫也後一利他即教化衆生行必須善巧上對治修行增長分竟佛子菩薩住此𦦨慧地所有身見為首我人衆生壽命蘊界處所起執著出沒思惟觀察治故我所故財物故著處故於如是等一切皆離大文第四彼果分中即攝無盡行離障成德窮盡生界為利樂故果有二種一離障果從護煩惱生二成德果從護小乘生前中又二一煩惱染生遠離果此離惑障二業染生遠離果此離業障皆言生者煩惱染猶如生食今是寄位出世之首能離彼生今初離惑先顯所離就所離中所起執著出沒是此總相餘別相總中執著是前地中解法慢也論云我知大知我知謂我能知大知謂執所知大法出沒是前地中正受慢也出者三昧起義故謂修起彼定沒者三昧滅義故謂定所除今計我能修此定此定即我所修恃以成慢別有五種一本二起三行四護五過本即所有身見至蘊界處於中身見為總我等為別別中我人等四為人我慢蘊界處三是法我慢而云本者有二義故一以此慢為解法正受二慢之本二者身覆為二我及六十二見之本此中身見若約實位此地斷第六識中俱生身見及所起過以分別起者初地斷故二思惟者明起謂不正思惟而起慢故三觀察者明行謂心行緣中多觀所得若法若定求覓勝相令他知故四治故下三句明護治者數數觀察修治所見我所者起於我想取彼勝相屬我已故財物者如畜財者受用護持故已上三事防護自己所得五著處者明過謂心堅安處法定二事故五中前三起慢方便後二隨助慢心後結離中由得道品正助方便無不離也上離煩惱生下明離業染生此菩薩若見業是如來所訶煩惱所染皆悉捨離若見業是順菩薩道如來所讚皆悉修行第二此菩薩下明業染上修道品正離煩惱煩惱既去業亦隨亡亡不善而修善業一佛所不讚者尊敬佛故不為二煩惱染者畏惡名故不作上初離障果竟第二成德果中有四一於勝功德生增上心欲果二彼說法尊中起報恩果三彼方便行中發勤精進果四彼增上欲本心界滿足果此之四果前三從前生後一從此三果生前中初二護小心果後一護小行果前中初果者由本欲上求下救今更為物轉轉上求故云增上佛子此菩薩隨所起方便慧修集於道及助道分第一果中二初牒前修因後如是而得下顯所得果今初即牒前護小乘行中總句也隨所起方便慧者牒前不捨一切衆生故不捨衆生而修道品是有方便修習於道及助道者即前修習如是功德也道即四地證智助道即菩提分法如是而得潤澤心柔軟心調順心利益安樂心無雜染心求上上勝法心求殊勝智慧心救一切世間心恭敬尊德無違教命心隨所聞法皆善修行心二正顯得果有十句初總餘別總云潤澤者深欲愛敬故由得二道潤及含生為深欲愛別中九句釋彼潤澤有三種勝一柔軟心明利樂行勝二調順者調和善順是三昧自在勝此二是行體三利益下七句明離過對治勝此是行用於中利他無過故利益自利無過故安樂下六句即離六過一無雜染治為利於食過及為名妬心過求上上勝法治少欲功德過求殊勝智治不求勝智過救一切世間治懈怠不攝生過恭敬一句治自見取不遵聖教過皆善修行治不隨說行過又上救生即前悲果求殊勝智即上求果上於功德生增上心欲果竟此菩薩知恩知報恩心極和善同住安樂質直柔軟無稠林行無有我慢善受教誨得說者意第二此菩薩下說法尊中起報恩心果謂前地中從佛聞法是說法尊今起傳法修行之心則為己報諸佛之恩也上希求種智由知佛有恩故今思報文中先別明有十句初總餘別總云知恩者謂若隨順師教行報恩行方是知恩故別中有九類攝為七一知報恩者依尊起報恩心尊即是佛此為恩主故偏名報恩二極和善下二句依同法起報恩心此明順同行善友意三質直柔軟二句依法起行謂隨順受教不違師命故云質直發修行事逢苦能忍故云柔軟四無稠林行者依受用衣食於施主所自過不覆故五雖有實而不高慢六善受教誨得師言詮七於教不倒得師意旨此菩薩如是忍成就如是調柔成就如是寂滅成就此菩薩下總結謂十句不出此三忍即心極和善同住安樂調柔即質直柔軟寂滅即通結餘句上報恩果竟如是忍調柔寂滅成就淨治後地業作意修行時第二如是忍下發勤精進果謂行二利行勤無怠故於前不捨衆生護小行中勤修故名方便行中正是無盡行相文中二先牒其得時得不休息精進不雜染精進不退轉精進廣大精進無邊精進熾然精進無等等精進無能壞精進成熟一切衆生精進善分別道非道精進次得不休下正顯於中十句初總餘別別有九種不休息義一不雜染彼精進行平等流注故雜染者共懈怠染故染則著而太過懈則墮而不及不進不懈為平等流二不退自乘上二自利三起廣念利他之心四為無邊衆生作利益願起攝受行上二利他通皆自分下四勝進謂五熾然者常志順行猶如熾火上進叵滅六修習過餘七魔惑莫壞上三自利八攝取衆生即是利他上八皆行後一是解九謂自斷疑惑決是非故能伏他若能具此為正修習上發勤精進果竟是菩薩心界清淨深心不失悟解明利善根增長離世垢濁斷諸疑惑明斷具足喜樂充滿佛親護念無量志樂皆悉成就第四是菩薩下彼增上欲本心界滿足果菩提分心是本心界正念真如修上道品故云滿足由精進故瑜伽躡前精進後即云由此因緣所有意樂增上意樂勝解界性皆得圓滿故知此果從前二果生謂意樂即第一果增上意樂即第二果勝解界性即此心界文有十句初總餘別別有九種一深心不失者彼道品心修行增益故此一自分下皆勝進二悟解明利者謂於五地已上勝上證中明鑒決斷故三善根增長即彼上證因謂對治過前故云增長四離世垢濁謂除滅所治煩惱障垢五斷諸疑惑謂斷除此地祕密疑事即是智障法慢為祕密疑事由無攝受則能除之上二除內障六明斷具足謂境明斷七喜樂充滿謂依樂行三昧適神八佛親護念謂上依佛力化衆生故九無量志樂謂依現無量三昧心智障清淨故此除定中智障經總顯本願皆得成就上二成德果中四果竟佛子菩薩住此𦦨慧地以願力故得見多佛所謂見多百佛見多千佛見多百千佛乃至見多百千億那由他佛第二位果中亦三初調柔果中四一調柔行二如摩尼下別教智淨三此菩薩下別地行相四佛子下總結地相初中有三一鍊行緣皆恭敬尊重承事供養衣服臥具飲食湯藥一切資生悉以奉施亦以供養一切衆僧次明能鍊行又三初供佛福行以此善根皆悉回向阿耨多羅三藐三菩提二以此下回向於彼佛所恭敬聽法聞已受持具足修行復於彼諸佛法中出家修道三聽法慧於中先在家次出家上三能鍊行又更修治深心信解經無量百千億那由他劫令諸善根轉復明淨佛子譬如金師鍊治真金作莊嚴具餘所有金皆不能及菩薩摩訶薩亦復如是住於此地所有善根下地善根所不能及二所鍊行中有法喻合金莊嚴具者以地阿含金現作此四地證智嚴具故餘所有金者未作嚴具之金如摩尼寶清淨光輪能放光明非諸餘寶之所能及風雨等緣悉不能壞菩薩摩訶薩亦復如是住於此地下地菩薩所不能及衆魔煩惱悉不能壞二教智淨者以此地成就證淨從體起用故偏有此文前以教成證故喻金為嚴具今從證起教故喻摩尼放光摩尼寶珠即證智體無垢名淨寂照名光圓滿名輪具上三義故稱證智此菩薩於四攝中同事偏多十波羅蜜中精進偏多餘非不修但隨力隨分第三別地行相以不捨衆生故同事偏多佛子是名略說菩薩摩訶薩第四𦦨慧地第四大文總結地相菩薩住此地多作須夜摩天王以善方便能除衆生身見等惑令住正見布施愛語利行同事如是一切諸所作業皆不離念佛不離念法不離念僧乃至不離念具足一切種一切智智第二攝報果又二初上勝身復作是念我當於一切衆生中為首為勝為殊勝為妙為微妙為上為無上乃至為一切智智依止者第二上勝果先自分是菩薩若發勤精進於一念頃得入億數三昧得見億數佛得知億數佛神力能動億數世界乃至能示現億數身一一身億數菩薩以為眷屬次勝進若以菩薩殊勝願力自在示現過於此數百劫千劫乃至百千億那由他劫不能數知第三願智果爾時金剛藏菩薩欲重宣其義而說頌言菩薩已淨第三地次觀衆生世法界空界識界及三界心解悉了能趣入第三重頌有十七偈分三初十二偈頌位行次四偈頌位果後一顯名結說前中四初一頌增長因分始登𦦨地增勢力生如來家永不退於佛法僧信不壞觀法無常無有起觀世成壞業有生生死涅槃剎等業觀前後際亦觀盡如是修行生佛家次二偈頌清淨分得是法已增慈愍轉更勤修四念處身受心法內外觀世間貪愛皆除遣菩薩修治四勤行惡法除滅善增長神足根力悉善修七覺八道亦如是三有四偈頌修行增長分中二初二偈頌護煩惱行為度衆生修彼行本願所護慈悲首求一切智及佛土亦念如來十種力四無所畏不共法殊特相好深美音亦求妙道解脫處及大方便修行彼後二偈頌護小乘身見為首六十二我及我所無量種蘊界處等諸取著此四地中一切離如來所訶煩惱行以無義利皆除斷智者修行清淨業為度衆生無不作菩薩勤修不懈怠即得十心皆具足專求佛道無厭倦志期受職度衆生恭敬尊德修行法知恩易誨無慍暴捨慢離諂心調柔轉更精勤不退轉菩薩住此𦦨慧地其心清淨永不失悟解決定善增長疑網垢濁悉皆離四有五偈頌修行增長果此地菩薩人中勝俱那由他無量佛聽聞正法亦出家不可沮壞如真金菩薩住此具功德以智方便修行道不為衆魔心退轉譬如妙寶無能壞住此多作𦦨天王於法自在衆所尊普化羣生除惡見專求佛智修善業菩薩勤加精進力獲三昧等皆億數若以願智力所為過於此數無能知五四偈頌位果如是菩薩第四地所行清淨微妙道功德義智共相應我為佛子已宣說後一偈結說第四𦦨慧地竟第五難勝地所以來者略有四義一約寄位四五六地寄出世間前寄初果此寄羅漢義次第故雖有四果舉於始終以攝中間約所觀行相以後六地既觀緣起寄同緣覺故二前明覺分相應慧今辨諸諦相應慧三前得出世未能順世今能五明攝化故次明之四前得三十七菩提分今辨方便所攝菩提故言難勝者深密云即由於彼菩提分法方便修習最極艱難名極難勝初分經云善修菩提分法故等攝大乘論云由真諦智與世間智更互相違合此難合令相應故世親釋云由此地中智真諦智是無分別知世間工巧等智是有分別此二相違應令修合能合難合名極難勝瑜伽云今此地中顯示菩薩於聖諦決定妙智極難可勝名難勝地莊嚴論云於此五地有二種難一勸化無惱難二生不從心無惱難此地菩薩能退二難於難得勝顯揚論云證得極淨緣諦所知諸微妙慧成極難成不住流轉寂靜聖道名極難勝上諸經論多舉難勝之法未知何等無能勝耶十住論云功德力成一切諸魔不能壞故此對人顯勝亦兼於惑煩惱魔故然諸經論言異義同皆辨真俗無礙故此地中斷於下乘般涅槃障即前四地出世厭生死苦樂趣涅槃此障五地令人真俗無差別道便能斷之此斷欣厭即是二愚一純作意厭生死愚二純作意向涅槃愚由斯證得類無差別真如亦約生死涅槃皆平等故其所成行亦成二種謂諸諦增上慧行五明處教化行此二無礙故得無差別法身之果菩薩聞此勝地行於法解悟心歡喜空中雨華讚歎言善哉大士金剛藏次正釋文中亦分三分初讚請分中九頌半分二初八頌半供讚後一頌請說前中三初一菩薩供讚自在天王與天衆聞法踊躍住虗空普放種種妙光雲供養如來喜充滿次一天王衆餘天女天諸婇女奏天樂亦以言辭歌讚佛悉以菩薩威神故於彼聲中發是言於中三初一偈標佛願久遠今乃滿佛道久遠今乃得釋迦文佛至天宮利天人者久乃見大海久遠今始動佛光久遠今乃放衆生久遠始安樂大悲音聲久乃聞次四偈半讚於中初二偈美感應皆言久者佛應由機機難有故大海動者動佛智海竭苦海故功德彼岸皆已到憍慢黑暗皆已滅最極清淨如虗空不染世法猶蓮華大牟尼尊現於世譬如須彌出巨海供養能盡一切苦供養必得諸佛智此應供處供無等是故歡心供養佛後二偈半讚具德初偈具智斷次半具恩後一具此三德是故應供如是無量諸天女發此言辭稱讚已一切恭敬喜充滿瞻仰如來默然住是時大士解脫月復請無畏金剛藏第五地中諸行相唯願佛子為宣說三一偈結讚并請說第二說分中先明位行後辨位果前中論分為三初勝慢對治二佛子菩薩摩訶薩如實知下不住道行勝三佛子菩薩摩訶薩住此下明彼果勝初即加行道及初住地無間道次即正住地解脫道後即地滿勝進道初勝慢對治者慢有二種一他地慢謂四地中得出世智取其勝相名為勝慢今以十種淨心為治二自地慢謂於十心希求勝相復以為慢以隨順如道為治此二通名勝慢故此一分有其二道論云勝慢對治者謂十平等深淨心者前段能治也又云同念不退轉心者後段能治也言同念者即後總句云隨順真如與如同一念故不退轉者即後段末句略舉初後以該中間前地治解法慢此治身淨分別慢所治有殊言身淨者得出世智不染身故爾時金剛藏菩薩告解脫月菩薩言佛子菩薩摩訶薩第四地所行道善圓滿已欲入第五難勝地當以十種平等清淨心趣入釋文中二先治他地慢後佛子菩薩摩訶薩住此下治自地慢前中三初結前舉後二徵起正顯三結能入地今初言平等有二義一是如理二是因果淨法千聖同軌名深淨心是此地觀解故論云於平等心中得清淨故此復何異後地觀察十平等法此有三異一此地治前於淨起慢故偏名淨法平等後地對此依真入俗觀染淨諸法皆悉平等二此約舉等理以顯淨心後地舉觀察以入等理三此通理事二等後地一向約理融二諦故此皆背相捨後漸勝故何等為十所謂於過去佛法平等清淨心未來佛法平等清淨心現在佛法平等清淨心戒平等清淨心心平等清淨心除見疑悔平等清淨心道非道智平等清淨心修行智見平等清淨心於一切菩提分法上上觀察平等清淨心教化一切衆生平等清淨心二正顯中十心分二初三明諸佛法論云三世力等者即果位中十力等也後七明隨順諸佛法二利因行順成果故於中前六自利後一利他前中合為三學初戒定餘四慧故離為七淨一淨戒二定淨三見淨四度疑淨見疑經合一句五道非道淨六名行斷經云修行智見略無斷字七名菩提分法上上淨以依行斷起勝求故菩薩摩訶薩以此十種平等清淨心得入菩薩第五地三結能入佛子菩薩摩訶薩住此第五地已二治自地慢明如道行又順經意前明入心此下皆明住心應分為三此攝方便具足住修行十心是方便義不退轉者即是住義二不住道行勝攝離癡亂行智清淨等無癡亂故三彼果勝攝無盡功德藏回向攝德無盡故今且順論此明如道行初標分位為顯隨如已入五地次以善下總顯後願力下別明以善修菩提分法故善淨深心故復轉求上勝道故隨順真如故二總顯中四句皆是正修諸行故總明順如謂前二句為所治即四地修菩提分以前十心能善清淨得入五地於此淨心希求勝相即復是慢慢在文外故以後二句而為能治初句轉求不住道行勝為能治謂不住淨心而起諸行即治住淨慢故後句雖起諸行不退失前平等深淨之心則能隨順真如平等即如故願力所持故於一切衆生慈愍不捨故積集福智助道故精勤修習不息故出生善巧方便故觀察照明上上地故受如來護念故念智力所持故後別明中顯上隨如之行有其八種經有九句前七各一後二合一八中前二是起行心一自利願即修菩提心二利他慈即不疲倦心後六是行謂三得善根力四不捨衆行五善巧修六無厭足故照明上上七得他勝力八自得勝力此有二句初句具三慧念是聞思智即修慧後句勝進究竟六中前三自分後二勝進佛子此菩薩摩訶薩如實知此是苦聖諦此是苦集聖諦此是苦滅聖諦此是苦滅道聖諦第二不住道行勝有二種觀一所知法中智清淨勝二佛子下得如是諸諦下利益衆生勤方便勝初即自利護煩惱行故不住世間後即利他護小乘行故不住涅槃同時相導名不住道今初智勝分二先明四諦實法分別後善知俗下復託此四明十觀門化生差別此乃十種觀於四諦非謂觀十四諦也今初言實法者有佛無佛苦集二諦體是妄想雜染因果滅道二諦體是出世清淨因果後十觀中略啓四門一制立二明開合三明通別四正譯文初制立者謂四諦義含法界菩薩照窮無疑隨智異說難窮略舉十明無盡然十皆菩薩自智智相難明故論約化生以明其異以此通明所知法中智清淨也二明開合者此十總唯是一化生分別若隨所化大小分二前九化小後一化大故若隨化所起則分為三前五生解次四起行後一合證故三對實法以明通別此十望前四諦前五通觀四諦謂一世俗者觀四諦法相二觀其性空三通觀性相無礙四觀性相各異五觀此四緣起集成次四別觀四諦謂六七八九如次觀苦集滅道後一但觀滅道菩薩地因證佛智故上敘科意下正釋文善知俗諦善知第一義諦善知相諦善知差別諦善知成立諦善知事諦善知生諦善知盡無生諦善知入道智諦善知一切菩薩地次第成就諦乃至善知如來智成就諦次四正釋文中先列十名此菩薩隨衆生心樂令歡喜故知俗諦通達一實相故知第一義諦覺法自相共相故知相諦了諸法分位差別故知差別諦善分別蘊界處故知成立諦覺身心苦惱故知事諦覺諸趣生相續故知生諦一切熱惱畢竟滅故知盡無生智諦出生無二故知入道智諦正覺一切行相故善知一切菩薩地次第相續成就乃至如來智成就諦以信解智力知非以究竟智力知後解釋中疏依本論攝十為七初一為根未熟衆生未堪入大為說四諦十六行等名知四諦言十六行者苦下有四謂苦空無常無我集下有四者謂集因生緣滅下有四者謂滅靜妙離道下有四者謂道如行出二為根熟堪說大者為說法空第一義三為疑惑衆生故知相諦謂有聞第一義諦猶豫不決若是空耶則無因果若是有耶云何言空今明即俗自相是空共相俱處無違故名相諦四為謬解迷惑深法衆生故知差別謂前緣二境故名為疑今聞俱處便謂是一名為謬解今明體雖不異性相分位歷然差別五為離正念衆生故知成立諦謂既聞差別謂皆有體名離正念今明差別但是緣成無有自性故云成立六為正見衆生知事生無生等道四諦由無前疑執故名正見事即苦諦生即集因無生是滅因亡曰盡即盡智也後果不生名為無生即無生智也七為大乘可化衆生故知菩薩地乃至如來智諦謂先住大乘化令進故言正覺一切相者大乘要須於五明處善巧知故菩薩地是因言次第相續者如從初地二地乃至十地入佛地大果也以信解等者為疑外疑六地已上乃至佛地未曾證入彼云何知故此釋云信解鏡像觀智力知非成就智鏡像即影像觀未得本質故上不住道中初所知法中智清淨勝竟下利益衆生勤方便勝佛子此菩薩摩訶薩得如是諸諦智已二利益衆生勤方便智中二先總起悲觀二佛子下別起悲觀總中三初結前次如實下觀過後菩薩下起悲如實知一切有為法虗妄詐僞誑惑愚夫次正觀過中先明非真今初虗妄二字觀內五蘊謂妄想常等不相似無故虗此明所取非真常作我想慢事故妄此辨能取不實非有計有常樂我淨皆名我想非唯我見我為本故獨云我想也詐僞二字觀外六塵世法牽取愚夫故詐此顯能取迷真謂由妄取令彼世法隱虗詐實使其貪取也世法盡壞故僞此明所取不實世法相似相續似有義利而實速滅無利故僞誑惑愚夫乃對人彰過上虗僞二境引心總名為誑詐僞二心迷境皆名為惑愚夫即是依彼正取我慢之人菩薩爾時於諸衆生轉增大悲生大慈光明二正起慈悲者憐愍故悲勝利益故慈不住道行勝故轉增皆言大者勝前地故云光明者救生方便智成故轉增光明俱通慈悲轉前慈悲分同諸佛故名為生佛子此菩薩摩訶薩得如是智力不捨一切衆生常求佛智第二別起悲觀中二先明化生願次如實觀下明化他心今初先牒前得是智力近牒觀有為遠牒觀諸諦不捨衆生牒前慈悲後常求佛智正明起願願救衆生義故如實觀一切有為行前際後際二化他心中二先明大悲觀後佛子菩薩復作是念此諸衆生下明大慈觀前中悲有二相一如實觀苦因緣集故即知苦體性二佛子至復作是念下觀深重苦人而多故即就人彰過前中有四初總二際次知從下順觀二際三虗妄下逆觀二際四若有下結如實知今初前即過去後即未來顯無始終流轉相故知從前際無明有愛故生生死流轉於諸蘊宅不能動出增長苦聚二順觀中二先明前際後如實下類顯後際前中復二先顯緣集聚苦次無我下顯空無我今初無明有愛顯流轉因能發能潤此以為本故生即是果故涅槃云生死本際凡有二種一者無明二者有愛是二中間有生老死今菩薩觀此而起大悲亦同淨名從癡有愛即我病生矣然生果有三一欲衆生故流轉生死欲貪即是愛身本故二妄梵行求衆生故於蘊宅不能動出外道計我常住其中故三有求衆生故增長苦聚三有皆苦故無我無壽者無養育者無更數取後趣身者離我我所如前際後際亦如是皆無所有次顯空無我及類顯後際虗妄貪著斷盡出離三逆觀中順即苦集逆即滅道虗妄斷盡即是滅也出離是道若有若無皆如實知四結如實知即雙結二際逆順有無三義一約凡夫但有苦集而無滅道二約菩薩順有逆無三雙約凡聖真滅本有道亦符之妄苦本空集亦同爾凡夫迷故不覺不知菩薩正了名如實知佛子此菩薩摩訶薩復作是念此諸凡夫愚癡無智甚為可愍第二深觀重苦久而多故無始隨逐故深種種苦事故重文中二初總標可愍不知本空故名愚癡不知厭苦故云無智故為可愍有無數身已滅今滅當滅二釋可愍所由初明深苦不知故為可愍如是盡滅不能於身而生厭想次明重苦不知故為可愍於中先牒前呵後轉更增長機關苦事隨生死流不能還返於諸蘊宅不求出離次轉更下正明重苦於中三初觀生苦機關苦事即是生苦言機關者顯無我故抽之即動息手便無若造業因生生不息隨生死下名有集愛於諸蘊下明離滅道不知憂畏四大毒蛇不能拔出諸慢見箭不能息滅貪恚癡火不能破壞無明黑暗不能乾竭愛欲大海不求十力大聖導師入魔意稠林二不知下觀老病死四大毒蛇是不知病苦不能拔下明具彼集文有四句一妄梵行求衆生不能拔出諸慢見箭外道多起故二欲求衆生欲愛不能息三毒火三欲求衆生行惡行者不破無明以見少利行大惡行後受大苦故云黑暗四有求衆生不能竭愛欲大海三有之愛廣無邊故觀如實中說彼三求以為苦果令為集者三求皆能為集因而受果故次不求十力大聖導師明遠彼滅不向滅者故入魔意下稠林明遠彼道順冤道故煩惱結使名為稠林是魔所行故名冤道於生死海中為覺觀波濤之所漂溺三於生死下總結過患舉生死海總顯於苦覺觀波濤總明有集上大悲觀竟下大慈觀佛子此菩薩摩訶薩復作是念此諸衆生受如是苦孤窮困迫無救無依無洲無舍無導無目無明覆翳黑暗纏褁第二大慈觀中二初觀境興慈後佛子下廣願饒益前中二先覩境後我今下興慈今初即覩前衆生受深重苦以為慈境文中先總次無救下別總中無父曰孤明無所恃途盡曰窮明後無所依任重無替曰困常受生死故強力所逼曰迫業惑所陵故後別中無救無依釋上孤義論云謂現報已受不可救脫當報因招無善為依次無洲舍釋上窮義溺於覺觀波濤不聞正法智洲為對治故在於生死曠野不為善友慈舍庇故次無導無目釋上困義離於寂靜正念思惟究竟前導故離於正見之明目故既無導無目非困如何次無明下釋上迫義無明者無明住地舊煩惱故黑暗者四住客塵故常起邪念故為其覆翳不聞正法故為彼纏褁我今為彼一切衆生修行福智助道之法獨一發心不求伴侶以是功德令諸衆生畢竟清淨乃至獲得如來十力無礙智慧二興慈中獨拔修善令物得菩提涅槃之樂佛子此菩薩摩訶薩以如是智慧觀察所修善根皆為救護一切衆生利益一切衆生安樂一切衆生哀愍一切衆生成就一切衆生解脫一切衆生攝受一切衆生令一切衆生離諸苦惱令一切衆生普得清淨令一切衆生悉皆調伏令一切衆生入般涅槃第二廣顯饒益亦彰慈所為文中二先牒前總明上來修善皆為救護即是慈相後利益下別顯救護有十種相前二為救護未來後八通於前未一住不善衆生令住善法利益二住善法衆生令得安樂果為成彼善故三愍貧乏者興資生具四修行多障者令其成就上二救順緣不足苦五世間繫閉者令得解脫下有五種令諸外道信解正法謂六未信攝令正信七令離無利勤苦八疑惑衆生疑除解淨九已住決定勸修三學以調三業十已住三學令得涅槃上三即解行證論意皆為外道理實兼通餘類上來不住道行勝竟下彼勝果佛子菩薩摩訶薩住此第五難勝地名為念者不忘諸法故名為智者能善決了故名為有趣者知經意趣次第連合故大文第三明彼果勝即不住道行勝之果有四勝果一攝功德勝二名為無厭足下修行勝三佛子菩薩如是勤修下教化衆生勝四佛子菩薩為利益下起隨順世間智勝四中初二自利即所知法中智清淨果初自分後勝進後二即利他勤方便果前化他行後化他智今初攝功德中十句初三句攝聞勝然有二義一即三慧如次配聞思修二顯二持念即聞持智及有趣即是義持名為慚愧者自護護他故名為堅固者不捨戒行故次二句攝戒勝一忍辱柔和勝即戒因也謂內懷慚愧不誑幽明自護七支不招譏毀故能持戒二戒無缺勝即戒體成也乃至命難不捨戒故名為覺者能觀是處非處故名為隨智者不隨於他故名為隨慧者善知義非義句差別故名為神通者善修禪定故名為方便善巧者能隨世行故三後五中攝智勝一者因緣集智此知法相智無因倒因名為非處正因緣集名之為處知處治於非處故名覺者二者證智知魔事對治隨識分別皆魔事故三知妄說智異說對治即知教智正說為義句邪說為非義句邪正交雜揀邪得正名善分別四神力起用智依定起通治邪依故五化衆生智折伏攝受隨世宜故上五中前三自利後二利他名為無厭足者善集福德故名為不休息者常求智慧故名為不疲倦者集大慈悲故名為為他勤修者欲令一切衆生入涅槃故第二修行勝有十一句前四自分一增長因行集五度福故二依止因行慧為所依故此自利福智對三化生不疲行四令初證滅行此二利他因果對名為勤求不懈者求如來力無畏不共法故名為發意能行者成就莊嚴佛土故名為勤修種種善業者能具足相好故名為常勤修習者求莊嚴佛身語意故名為大尊重恭敬法者於一切菩薩法師處如教而行故名為心無障礙者以大方便常行世間故名為日夜遠離餘心者常樂教化一切衆生故後七句勝進五起佛法行六起淨土行此依正一對七依佛法身起行相好法身故八依佛所作起行顯三密用故此二外相內密對上四皆起菩提九敬重法行進依勝己故上五自利後二利他十願取有行十一離小乘行即顯是揀非對佛子菩薩摩訶薩如是勤修行時以布施教化衆生以愛語利行同事教化衆生第三教化衆生勝中二初正明化生後佛子此菩薩下結行成益今初分二初總以四攝攝生示現色身教化衆生演說諸法教化衆生開示菩薩行教化衆生顯示如來大威力教化衆生示生死過患教化衆生稱讚如來智慧利益教化衆生現大神通力教化衆生以種種方便行教化衆生後別明四攝文有八句一示現色身是同事攝隨順衆生應化自衆故二演說法即愛語攝諦語法語為愛語性一切種愛語中多約開演三開示下皆利行攝此句為於菩提無方便衆生示菩薩行即利行自性四於大乘疲倦衆生示佛威力即一切利行未成令成故五為世間衆生樂著財位故示其過患明位大憂大財多禍多六為不信大乘先未行勝善讚如來智七為無智外道示以神通上三即難行利行八總顯一切門一切種利行故云種種方便然利行愛語亦可參用由彼愛語示其所學即為利行故佛子此菩薩摩訶薩能如是勤方便教化衆生心恆相續趣佛智慧所作善根無有退轉常勤修學殊勝行法次結行成益中初結前心恆下成益趣佛智者為化衆生更求勝力餘明已作不退未作者增修上彼果勝竟下隨順世智勝佛子此菩薩摩訶薩為利益衆生故世間技藝靡不該習大文第四隨順世智勝者明染障對治染即煩惱障即所知文分三段初總標多門二所謂下別示其相三及餘下總結成益今初總標所謂文字算數二別顯其五明相故大般若云五地菩薩學五明故即分為五一文字算數即是聲明通治儒智障言文字者名句文身即聲論中設法施設建立算數即數建立故治取與生疑障圖書印璽地水火風種種諸論咸所通達二圖書至咸通達即當因明咸通達者正是明義種種論者言論尚論諍論毀謗論順正論教道論等類非一故地水火風即是諍論中攝謂諸邪見計不同故順世外道唯地為因一切皆以微塵成故水風二仙外道以風水為因世界水成故風輪所持故事火外道以火為因火成熟故圖書印璽即尚論隨世所聞故又此圖書亦正教量即治所用事中忘障論云取與寄附即事中障聞法思議解中障作不作已作未作應作不應作皆業中障印璽亦是現量又治所取物不守護障璽即玉印又善方藥療治諸病顛狂乾消鬼魅蠱毒悉能除斷三即醫方明即四大不調衆生毒相病障對治故善療除斷皆除斷方便斷已不生故名為善顛至蠱毒病相病因於中顛等內四大鬼等外衆生蠱毒通二有草毒蛇毒等故文筆讚詠歌舞技樂戲笑談說悉善其事國城村邑宮宅園苑泉流陂池草樹華藥凡所布列咸得其宜金銀摩尼真珠琉璃螺貝璧玉珊瑚等藏悉知其處出以示人日月星宿鳥鳴地震夜夢吉凶身相休咎咸善觀察一無錯謬四工巧明文筆讚詠即書算計度數印工業中書所攝故韻屬曰文對詞曰筆顯德曰讚寄情曰詠次歌至談說即音樂工業悉善其事通上二文皆憂惱障對治國城至其宜即營造工業草樹華果亦兼營農工業此即不喜樂障對治金至示人即生成工業繫閉障對治日月至無錯謬即占相工業是所得報分過惡因障對治日月五星以為七曜及二十八宿並上知天文地震即下知地理夜夢至休咎即中知人情鳥鳴即察鳥情亦是人情所感咸善無謬總究上三才持戒入禪神通無量四無色等五持戒下內明治五種染一持戒治破戒染二入禪治貪欲染三神通治邪歸依染四無量治妄行功德染謂治殺生祀祠求梵福故五四無色定治妄修解脫染上來所釋多依本論及瑜伽三十四五其中更有別理及餘一切世間之事但於衆生不為損惱為利益故咸悉開示漸令安住無上佛法第三結成益者此起世智具四種相一異障中無障故云但於衆生不為損惱事中不知名之為障損惱生事復是事中異障今無此捕獵等之異障二與無過樂即為利益故謂雖不惱令其染著亦不為之三發起清淨即咸習開示謂能起助道之事四所用清淨即漸令安住無上佛法謂用此得淨故上順世間智勝竟佛子菩薩住是難勝地以願力故得見多佛所謂見多百佛見多千佛見多百千佛乃至見多百千億那由他佛悉恭敬尊重承事供養衣服飲食臥具湯藥一切資生悉以奉施亦以供養一切衆僧以此善根回向阿耨多羅三藐三菩提於諸佛所恭敬聽法聞已受持隨力修行復於彼諸佛法中而得出家既出家已又更聞法得陀羅尼為聞持法師住此地中經於百劫經於千劫乃至無量百千億那由他劫所有善根轉更明淨大文第二位果亦有三果初調柔果中有四一調柔行二教智淨三別地行相四結說地相初中有法喻合法中正起行內又更聞法得陀羅尼者論云非得義持者對勝顯劣般若未現前故所以得聞持者得二難故一地初十平等心難得能得故二地中樂出世間智現世間智此不住道難得能得故此之二難對劣顯勝故得聞持不同三地唯世間聞持佛子譬如真金以硨磲磨瑩轉更明淨喻中真金硨磲磨瑩者證智契如事如真金教智光明能示現如事猶彼硨磲此地菩薩所有善根亦復如是以方便慧思惟觀察轉更明淨三合可知佛子菩薩住此難勝地以方便智成就功德下地善根所不能及佛子如日月星宿宮殿光明風力所持不可沮壞亦非餘風所能傾動此地菩薩所有善根亦復如是以方便智隨逐觀察不可沮壞亦非一切聲聞獨覺世間善根所能傾動二教智淨中日月等者論云依阿含增長智慧光明勝前地智故謂勝前地珠光此菩薩十波羅蜜中禪波羅蜜偏多餘非不修但隨力隨分三別地行相佛子是名略說菩薩摩訶薩第五難勝地四結說地相菩薩住此地多作兜率陀天王於諸衆生所作自在摧伏一切外道邪見能令衆生住實諦中布施愛語利行同事如是一切諸所作業皆不離念佛不離念法不離念僧乃至不離念具足一切種一切智智復作是念我當於衆生中為首為勝為殊勝為妙為微妙為上為無上乃至為一切智智依止者此菩薩若發勤精進於一念頃得千億三昧見千億佛知千億佛神力能動千億佛世界乃至示現千億身一一身示千億菩薩以為眷屬二攝報果若以菩薩殊勝願力自在示現過於此數百劫千劫乃至百千億那由他劫不能數知三願智果爾時金剛藏菩薩欲重宣其義而說頌曰菩薩四地已清淨思惟三世佛平等戒心除疑道非道如是觀察入五地念處為弓根利箭正勤為馬神足車五力堅鎧破怨敵勇健不退入五地慚愧為衣覺分鬘淨戒為香禪塗香智慧方便妙莊嚴入總持林三昧苑如意為足正念頸慈悲為眼智慧牙人中師子無我吼破煩惱怨入五地第三重頌二十二偈分三初十七偈頌地行次四偈頌地果後一偈結說初中又三初五偈三句頌勝慢對治於中初四偈頌十平等菩薩住此第五地轉修勝上清淨道志求佛法不退轉思念慈悲無厭倦積集福智勝功德精勤方便觀上地佛力所加具念慧餘二頌如道行了知四諦皆如實善知世諦勝義諦相諦差別成立諦事諦生盡及道諦乃至如來無礙諦如是觀諦雖微妙未得無礙勝解脫以此能生大功德是故超過世智慧第二了知下六偈三句頌不住道於中初兩偈一句頌所知法中智清淨既觀諦已知有為體性虗僞無堅實得佛慈愍光明分為利衆生求佛智觀諸有為先後際無明黑暗受纏縛流轉遲回苦聚中無我無人無壽命受取為因受來苦欲求邊際不可得迷妄漂流無返期此等可愍我應度蘊宅界蛇諸見箭心火猛熾癡暗重愛河漂轉不暇觀苦海淪湑闕明導如是知已勤精進所作皆為度衆生後既觀下四偈半頌教化衆生勤方便於中初一偈頌總觀有為虗僞起慈悲心次一偈半頌悲觀中觀緣集苦次一偈半頌觀身重苦後半頌大慈觀名為有念有慧者乃至覺解方便者習行福智無厭足恭敬多聞不疲倦國土相好皆莊嚴如是一切為衆生為欲教化諸世間善知書數印等法亦復善解諸方藥療治衆病悉令愈文辭歌舞皆巧妙宮宅園池悉安隱寶藏非一咸示人利益無量衆生故日月星宿地震動乃至身相亦觀察四禪無色及神通為益世間皆顯示第三名為下四偈半頌彼果勝中初半偈頌攝功德勝次一頌修行勝於中如是一切為衆生句兼頌教化衆生勝智者住此難勝地供那由佛亦聽法如以妙寶磨真金所有善根轉明淨譬如星宿在虗空風力所持無損動亦如蓮華不著水如是大士行於世住此多作兜率王能摧異道諸邪見所修諸善為佛智願得十力救衆生彼復修行大精進即時供養千億佛得定動剎亦復然願力所作過於是次四偈頌起世智勝頌位果如是第五難勝地人中最上真實道我以種種方便力為諸佛子宣說竟三果可知第五難勝地竟
