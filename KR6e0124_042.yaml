body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈十定品第二十七之三佛子云何為菩薩摩訶薩一切衆生差別身三昧第八一切衆生差別身三昧初標名佛子菩薩摩訶薩住此三昧得十種無所著何者為十所謂於一切剎無所著於一切方無所著於一切劫無所著於一切衆無所著於一切法無所著於一切菩薩無所著於一切菩薩願無所著於一切三昧無所著於一切佛無所著於一切地無所著是為十二釋中分五一明能入智二顯入出之相三明入定之益四明境界自在五總結究竟今初由得十種無著成後出入自在一切地者佛地菩薩地等佛子菩薩摩訶薩於此三昧云何入云何起佛子菩薩摩訶薩於此三昧內身入外身起外身入內身起同身入異身起異身入同身起人身入夜叉身起夜叉身入龍身起龍身入阿修羅身起阿修羅身入天身起天身入梵王身起梵王身入欲界身起二入出相中二先徵起後釋相於中先法後喻法中略辨十類以表無盡一諸類正報相對明出入天中入地獄起地獄入人間起人間入餘趣起千身入一身起一身入千身起那由他身入一身起一身入那由他身起二天中下六趣依報明出入三千身下一多相對閻浮提衆生衆中入西瞿陀尼衆生衆中起西瞿陀尼衆生衆中入北拘盧衆生衆中起北拘盧衆生衆中入東毗提訶衆生衆中起東毗提訶衆生衆中入三天下衆生衆中起三天下衆生衆中入四天下衆生衆中起四天下衆生衆中入一切海差別衆生衆中起一切海差別衆生衆中入一切海神衆中起四四洲大海相對明出入一切海神衆中入一切海水大中起一切海水大中入一切海地大中起一切海地大中入一切海火大中起一切海火大中入一切海風大中起一切海風大中入一切四大種中起一切四大種中入無生法中起無生法中入妙高山中起妙高山中入七寶山中起七寶山中入一切地種種稼穡樹林黑山中起一切地種種稼穡樹林黑山中入一切妙香華寶莊嚴中起五大種事法相對明出入其無生法乘四大種生便故來一切妙香華寶莊嚴中入一切四天下下方上方一切衆生受生中起六諸方相對明出入一切四天下下方上方一切衆生受生中入小千世界衆生衆中起小千世界衆生衆中入中千世界衆生衆中起中千世界衆生衆中入大千世界衆生衆中起大千世界衆生衆中入百千億那由他三千大千世界衆生衆中起百千億那由他三千大千世界衆生衆中入無數世界衆生衆中起無數世界衆生衆中入無量世界衆生衆中起無量世界衆生衆中入無邊佛剎衆生衆中起無邊佛剎衆生衆中入無等佛剎衆生衆中起無等佛剎衆生衆中入不可數世界衆生衆中起不可數世界衆生衆中入不可稱世界衆生衆中起不可稱世界衆生衆中入不可思世界衆生衆中起不可思世界衆生衆中入不可量世界衆生衆中起不可量世界衆生衆中入不可說世界衆生衆中起不可說世界衆生衆中入不可說不可說世界衆生衆中起七衆數多少相對明出入不可說不可說世界衆生衆中入雜染衆生衆中起雜染衆生衆中入清淨衆生衆中起清淨衆生衆中入雜染衆生衆中起八染淨相對明出入眼處入耳處起耳處入眼處起鼻處入舌處起舌處入鼻處起身處入意處起意處入身處起自處入他處起他處入自處起九諸界相對明出入一微塵中入無數世界微塵中起無數世界微塵中入一微塵中起聲聞入獨覺起獨覺入聲聞起自身入佛身起佛身入自身起一念入億劫起億劫入一念起同念入別時起別時入同念起前際入後際起後際入前際起前際入中際起中際入前際起三世入剎那起剎那入三世起真如入言說起言說入真如起十雜明諸類相對明出入謂粗細凡聖念劫真妄等其出入等義如賢首品上法說下喻顯佛子譬如有人為鬼所持其身戰動不能自安鬼不現身令他身然菩薩摩訶薩住此三昧亦復如是自身入定他身起他身入定自身起二喻顯中有四喻喻前十類各有法合一鬼力持人喻喻第一第四多約身故佛子譬如死尸以呪力故而能起行隨所作事皆得成就尸之與呪雖各差別而能和合成就彼事菩薩摩訶薩住此三昧亦復如是同境入定異境起異境入定同境起第二呪起死尸喻喻第二五六多約依報境說佛子譬如比丘得心自在或以一身作多身或以多身作一身非一身沒多身生非多身沒一身生菩薩摩訶薩住此三昧亦復如是一身入定多身起多身入定一身起第三羅漢現通喻喻第三第七多約數故佛子譬如大地其味一種所生苗稼種種味別地雖無差別然味有殊異菩薩摩訶薩住此三昧亦復如是無所分別然有一種入定多種起多種入定一種起第四起一苗多喻喻後三門雜明種種故喻合相映文理自顯佛子菩薩摩訶薩住此三昧得十種稱讚法之所稱讚何者為十所謂入真如故名為如來覺一切法故名之為佛為一切世間所稱讚故名為法師知一切法故名一切智為一切世間所歸依故名所依處了達一切法方便故名為導師引一切衆生入薩婆若道故名大導師為一切世間燈故名為光明心志圓滿義利成就所作皆辦住無礙智分別了知一切諸法故名為十力自在通達一切法輪故名一切見者是為十第三入定益中有三一得讚同佛果益皆上句顯義下句結名十力義中云心志圓滿者明力自利義義利成就顯力利他所作皆辦彰力圓滿住無礙智總顯力體分別了知一切諸法通明力用餘文可知佛子菩薩摩訶薩住此三昧復得十種光明照耀何者為十所謂得一切諸佛光明與彼平等故得一切世界光明普能嚴淨故得一切衆生光明悉往調伏故得無量無畏光明法界為場演說故得無差別光明知一切法無種種性故得方便光明於一切法離欲際而證入故得真實光明於一切法離欲際心平等故得遍一切世間神變光明蒙佛所加恆不息故得善思惟光明到一切佛自在岸故得一切法真如光明於一毛孔中善說一切故是為十二身智光照益佛子菩薩摩訶薩住此三昧復得十種無所作何者為十所謂身業無所作語業無所作意業無所作神通無所作了法無性無所作知業不壞無所作無差別智無所作無生起智無所作知法無滅無所作隨順於文不壞於義無所作是為十三業用無作益上三明入定益竟佛子菩薩摩訶薩住此三昧無量境界種種差別所謂一入多起多入一起同入異起異入同起細入粗起粗入細起大入小起小入大起順入逆起逆入順起無身入有身起有身入無身起無相入有相起有相入無相起起中入入中起如是皆是此之三昧自在境界第四明境界自在先法後喻今初前第二段但明入起今兼明逆順有無等為種種境界起中入者即用之寂故入中起者即滅之用故是知菩薩之定常入常起常雙入出常無入出方為自在為顯自在寄諸境界交絡而明佛子譬如幻師持呪得成能現種種差別形相呪與幻別而能作幻呪唯是聲而能幻作眼識所知種種諸色耳識所知種種諸聲鼻識所知種種諸香舌識所知種種諸味身識所知種種諸觸意識所知種種境界菩薩摩訶薩住此三昧亦復如是同中入定異中起異中入定同中起二喻顯中文有六喻皆自有合一幻現六境喻喻前同異佛子譬如三十三天共阿修羅鬬戰之時諸天得勝修羅退衄阿修羅王其身長大七百由旬四兵圍繞無數千萬以幻術力將諸軍衆同時走入藕絲孔中菩薩摩訶薩亦復如是已善成就諸幻智地幻智即是菩薩菩薩即是幻智是故能於無差別法中入定差別法中起差別法中入定無差別法中起二修羅竄匿喻喻前粗細大小二對約理事相望則無差別為細差別為粗理細事粗故或無差為粗總相入故差別為細別相入故無差則大周法界差則隨事成小若唯約事明大小並差別所收佛子譬如農夫田中下種種子在下果生於上菩薩摩訶薩住此三昧亦復如是一中入定多中起多中入定一中起三農夫下種喻喻明上下合辨一多佛子譬如男女赤白和合或有衆生於中受生爾時名為歌羅邏位從此次第住母胎中滿足十月善業力故一切支分皆得成就諸根不缺心意明了其歌羅邏與彼六根體狀各別以業力故而能令彼次第成就受同異類種種果報菩薩摩訶薩亦復如是從一切智歌羅邏位信解願力漸次增長其心廣大任運自在無中入定有中起有中入定無中起四受胎生長喻喻上有身無身如彼從無之有故佛子譬如龍宮依地而立不依虗空龍依宮住亦不在空而能興雲遍滿空中有人仰視所見宮殿當知皆是乾闥婆城非是龍宮佛子龍雖處下而雲布上菩薩摩訶薩住此三昧亦復如是於無相入有相起於有相入無相起五龍下雲上喻喻有相無相佛子譬如妙光大梵天王所住之宮名一切世間最勝清淨藏此大宮中普見三千大千世界諸四天下天宮龍宮夜叉宮乾闥婆宮阿修羅宮迦樓羅宮緊那羅宮摩睺羅伽宮人間住處及三惡道須彌山等種種諸山大海江河陂澤泉源城邑聚落樹林衆寶如是一切種種莊嚴盡大輪圍所有邊際乃至空中微細遊塵莫不皆於梵宮顯現如於明鏡見其面像菩薩摩訶薩住此一切衆生差別身大三昧知種種剎見種種佛度種種衆證種種法成種種行滿種種解入種種三昧起種種神通得種種智慧住種種剎那際六梵宮普現喻喻上入中起起中入及逆順相對故云種種佛子此菩薩摩訶薩到十種神通彼岸何者為十所謂到諸佛盡虗空遍法界神通彼岸到菩薩究竟無差別自在神通彼岸到能發起菩薩廣大行願入如來門佛事神通彼岸到能震動一切世界一切境界悉令清淨神通彼岸到能自在知一切衆生不思議業果皆如幻化神通彼岸到能自在智諸三昧粗細入出差別相神通彼岸到能勇猛入如來境界而於其中發生大願神通彼岸到能化作佛化轉法輪調伏衆生令生佛種令入佛乘速得成就神通彼岸到能了知不可說一切祕密文句而轉法輪令百千億那由他不可說不可說法門皆得清淨神通彼岸到不假晝夜年月劫數一念悉能三世示現神通彼岸是為十第五總結究竟佛子是名菩薩摩訶薩第八一切衆生差別身大三昧善巧智三結定名上第八三昧竟佛子云何為菩薩摩訶薩法界自在三昧第九法界自在三昧初標名佛子此菩薩摩訶薩於自眼處乃至意處入三昧名法界自在二釋中四一顯定體用二明定成益三以喻寄顯四總結雙行今初分三初總顯名體謂於眼等法界得自在故菩薩於自身一一毛孔中入此三昧二彰入定處謂於毛孔中入眼等定顯互用自在故自然能知諸世間知諸世間法知諸世界知億那由他世界知阿僧祇世界知不可說佛剎微塵數世界見一切世界中有佛出興菩薩衆會悉皆充滿光明清淨淳善無雜廣大莊嚴種種衆寶以為嚴飾三明定功用於中四一了三世間菩薩於彼或一劫百劫千劫億劫百千億那由他劫無數劫無量劫無邊劫無等劫不可數劫不可稱劫不可思劫不可量劫不可說劫不可說不可說劫不可說不可說佛剎微塵數劫修菩薩行常不休息次多劫修行又於如是無量劫中住此三昧亦入亦起亦成就世界亦調伏衆生亦遍了法界亦普知三世亦演說諸法亦現大神通種種方便無著無礙三入出無礙以於法界得自在故善分別眼善分別耳善分別鼻善分別舌善分別身善分別意如是種種差別不同悉善分別盡其邊際四結成自在此有二義一於理法界自在故能善分別眼等界二善分別眼等十八界即是事法界自在此二無礙及事事無礙故如是種種皆橫盡其邊竪盡其際菩薩如是善知見已能生起十千億陀羅尼法光明成就十千億清淨行獲得十千億諸根圓滿十千億神通能入十千億三昧成就十千億神力長養十千億諸力圓滿十千億深心運動十千億力持示現十千億神變具足十千億菩薩無礙圓滿十千億菩薩助道積集十千億菩薩藏照明十千億菩薩方便演說十千億諸義成就十千億諸願出生十千億回向淨治十千億菩薩正位明了十千億法門開示十千億演說修治十千億菩薩清淨第二明定成益中辨十重益一生多功德益有二十一句各十千億佛子此菩薩摩訶薩復有無數功德無量功德無邊功德無等功德不可數功德不可稱功德不可思功德不可量功德不可說功德無盡功德佛子此菩薩於如是功德皆已辦具皆已積集皆已莊嚴皆已清淨皆已瑩徹皆已攝受皆能出生皆可稱歎皆得堅固皆已成就二具無盡德益隨前一事皆至無盡故於中二十句前十句所具之多後十句能具之相清淨者除垢故瑩徹者發本智光故佛子菩薩摩訶薩住此三昧為東方十千阿僧祇佛剎微塵數名號諸佛之所攝受一一名號復有十千阿僧祇佛剎微塵數佛各各差別如東方南西北方四維上下亦復如是三諸佛攝受益於中三初明攝受彼諸佛悉現其前為現諸佛清淨剎為說諸佛無量身為說諸佛難思眼為說諸佛無量耳為說諸佛清淨鼻為說諸佛清淨舌為說諸佛無住心為說如來無上神通次現身說法令修如來無上菩提令得如來清淨音聲開示如來不退法輪顯示如來無邊衆會令入如來無邊祕密讚歎如來一切善根令入如來平等之法宣說如來三世種性示現如來無量色相闡揚如來護念之法演暢如來微妙法音辨明一切諸佛世界宣揚一切諸佛三昧示現諸佛衆會次第護持諸佛不思議法說一切法猶如幻化明諸法性無有動轉開示一切無上法輪讚美如來無量功德令入一切諸三昧雲令知其心如幻如化無邊無盡後令其修證佛子菩薩摩訶薩住此法界自在三昧時彼十方各十千阿僧祇佛剎微塵數名號如來一一名中各有十千阿僧祇佛剎微塵數佛同時護念令此菩薩得無邊身令此菩薩得無礙心令此菩薩於一切法得無忘念令此菩薩於一切法得決定慧令此菩薩轉更聰敏於一切法皆能領受令此菩薩於一切法悉能明了令此菩薩諸根猛利於神通法悉得善巧令此菩薩境界無礙周行法界恆不休息令此菩薩得無礙智畢竟清淨令此菩薩以神通力一切世界示現成佛四諸佛護念益護念即佛力來加佛子菩薩摩訶薩住此三昧得十種海何者為十所謂得諸佛海咸覩見故得衆生海悉調伏故得諸法海能以智慧悉了知故得諸剎海以無性無作神通皆往詣故得功德海一切修行悉圓滿故得神通海能廣示現令開悟故得諸根海種種不同悉善知故得諸心海知一切衆生種種差別無量心故得諸行海能以願力悉圓滿故得諸願海悉使成就永清淨故五得十海深廣益佛子菩薩摩訶薩得如是十種海已復得十種殊勝何等為十一者於一切衆生中最為第一二者於一切諸天中最為殊特三者於一切梵王中最極自在四者於諸世間無所染著五者一切世間無能映蔽六者一切諸魔不能惑亂七者普入諸趣無所罣礙八者處處受生知不堅固九者一切佛法皆得自在十者一切神通悉能示現佛子菩薩摩訶薩得如是十種殊勝已復得十種力於衆生界修習諸行何等為十一謂勇健力調伏世間故二謂精進力恆不退轉故三謂無著力離諸垢染故四謂寂靜力於一切法無諍論故五謂逆順力於一切法心自在故六謂法性力於諸義中得自在故七謂無礙力智慧廣大故八謂無畏力能說諸法故九謂辨才力能持諸法故十謂開示力智慧無邊故七得諸力幹能益於中初列十力佛子此十種力是廣大力最勝力無能摧伏力無量力善集力不動力堅固力智慧力成就力勝定力清淨力極清淨力法身力法光明力法燈力法門力無能壞力極勇猛力大丈夫力善丈夫修習力成正覺力過去積集善根力安住無量善根力住如來力力心思惟力增長菩薩歡喜力出生菩薩淨信力增長菩薩勇猛力菩提心所生力菩薩清淨深心力菩薩殊勝深心力菩薩善根熏習力究竟諸法力無障礙身力入方便善巧法門力清淨妙法力安住大勢一切世間不能傾動力一切衆生無能映蔽力後顯其超勝隨前一一力皆具此三十八力佛子此菩薩摩訶薩於如是無量功德法能生能成就能圓滿能照明能具足能遍具足能廣大能堅固能增長能淨治能遍淨治八結能圓滿益此菩薩功德邊際智慧邊際修行邊際法門邊際自在邊際苦行邊際成就邊際清淨邊際出離邊際法自在邊際無能說者此菩薩所獲得所成就所趣入所現前所有境界所有觀察所有證入所有清淨所有了知所有建立一切法門於不可說劫無能說盡九自德無邊故他不能說益佛子菩薩摩訶薩住此三昧能了知無數無量無邊無等不可數不可稱不可思不可量不可說不可說不可說一切三昧彼一一三昧所有境界無量廣大於境界中若入若起若住所有相狀所有示現所有行處所有等流所有自性所有除滅所有出離如是一切靡不明見十三昧無邊自無不了益上十段中前七別明後三總結佛子譬如無熱惱大龍王宮流出四河無濁無雜無有垢穢光色清淨猶如虗空其池四面各有一口一一口中流出一河於象口中出恆伽河師子口中出私陀河於牛口中出信度河於馬口中出縛芻河其四大河流出之時恆伽河口流出銀沙私陀河口流出金剛沙信度河口流出金沙縛芻河口流出琉璃沙恆伽河口作白銀色私陀河口作金剛色信度河口作黃金色縛芻河口作琉璃色一一河口廣一由旬其四大河既流出已各共圍繞大池七匝隨其方面四向分流澒湧奔馳入於大海其河旋繞一一之間有天寶所成優鉢羅華波頭摩華拘物頭華芬陀利華奇香發越妙色清淨種種華葉種種臺蕊悉是衆寶自然映徹咸放光明互相照現其無熱池周圍廣大五十由旬衆寶妙沙遍布其底種種摩尼以為嚴飾無量妙寶莊嚴其岸旃檀妙香普散其中優鉢羅華波頭摩華拘物頭華芬陀利華及餘寶華皆悉遍滿微風吹動香氣遠徹華林寶樹周匝圍繞日光出時普皆照明池河內外一切衆物接影連輝成光明網如是衆物若遠若近若高若下若廣若狹若粗若細乃至極小一沙一塵悉是妙寶光明鑒徹靡不於中日輪影現亦復展轉更相現影如是衆影不增不減非合非散皆如本質而得明見大文第三以喻寄顯中正顯前體用及益亦明前所未顯故不全似上文文中二先總舉喻體佛子如無熱大池於四口中流出四河入於大海菩薩摩訶薩亦復如是從四辨才流出諸行究竟入於一切智海後對喻別合有十三門各先喻後合一合流沙入海喻中先總明喻合雖舉四河意在四口出沙故下第九別明四河如恆伽大河從銀色象口流出銀沙菩薩摩訶薩亦復如是以義辨才說一切如來所說一切義門出生一切清淨白法究竟入於無礙智海如私陀大河從金剛色師子口流出金剛沙菩薩摩訶薩亦復如是以法辨才為一切衆生說佛金剛句引出金剛智究竟入於無礙智海如信度大河從金色牛口流出金沙菩薩摩訶薩亦復如是以訓辭辨說隨順世間緣起方便開悟衆生令皆歡喜調伏成熟究竟入於緣起方便海如縛芻大河於琉璃色馬口流出琉璃沙菩薩摩訶薩亦復如是以無盡辨雨百千億那由他不可說法令其聞者皆得潤洽究竟入於諸佛法海後別明四辨即喻四口所說即喻四沙如四大河隨順圍繞無熱池已四方入海二合繞池入海喻於中先喻後合此喻菩薩摩訶薩亦復如是成就隨順身業隨順語業隨順意業成就智為前導身業智為前導語業智為前導意業四方流注究竟入於一切智海佛子何者名為菩薩四方佛子所謂見一切佛而得開悟聞一切法受持不忘圓滿一切波羅蜜行大悲說法滿足衆生後合中先合繞池菩提心志名之為池三業隨順智慧即為繞義後佛子下合其四方如四大河圍繞大池於其中間優鉢羅華波頭摩華拘物頭華芬陀利華皆悉遍滿菩薩摩訶薩亦復如是於菩提心中間不捨衆生說法調伏悉令圓滿無量三昧見佛國土莊嚴清淨三合池間寶華喻說法有開敷之義三昧有感果之能莊嚴清淨皆華上之別義如無熱大池寶樹圍繞菩薩摩訶薩亦復如是現佛國土莊嚴圍繞令諸衆生趣向菩提四合寶樹繞池喻如無熱大池其中縱廣五十由旬清淨無濁菩薩摩訶薩亦復如是菩提之心其量無邊善根充滿清淨無濁五合大池清淨喻即是池體如無熱大池以無量寶莊嚴其岸散栴檀香遍滿其中菩薩摩訶薩亦復如是以百千億十種智寶莊嚴菩提心大願之岸普散一切衆善妙香六合旃檀香岸喻十種智寶有二義一即離世間中七種如寶智二即他心等十種智也如無熱大池底布金沙種種摩尼間錯莊嚴菩薩摩訶薩亦復如是微妙智慧周遍觀察不可思議菩薩解脫種種法寶間錯莊嚴得一切法無礙光明住於一切諸佛所住入於一切甚深方便七合底布金寶喻妙智合金沙解脫合摩尼無礙光明合二種放光住佛所住入於甚深合布其底上四段各以如無熱大池為首如阿那婆達多龍王永離龍中所有熱惱菩薩摩訶薩亦復如是永離一切世間憂惱雖現受生而無染著八合龍王無惱喻即合池名名因龍得故如四大河潤澤一切閻浮提地既潤澤已入於大海菩薩摩訶薩亦復如是以四智河潤澤天人沙門婆羅門令其普入阿耨多羅三藐三菩提智慧大海以四種力而為莊嚴何者為四一者願智河救護調伏一切衆生常不休息二者波羅蜜智河修菩提行饒益衆生去來今世相續無盡究竟入於諸佛智海三者菩薩三昧智河無數三昧以為莊嚴見一切佛入諸佛海四者大悲智河大慈自在普救衆生方便攝取無有休息修行祕密功德之門究竟入於十力大海九合四河潤澤喻如四大河從無熱池既流出已究竟無盡入於大海菩薩摩訶薩亦復如是以大願力修菩薩行自在知見無有窮盡究竟入於一切智海十合四河無盡喻如四大河入於大海無能為礙令不入者菩薩摩訶薩亦復如是常勤修習普賢行願成就一切智慧光明住於一切佛菩提法入如來智無有障礙十一合入海無障喻如四大河奔流入海經於纍劫亦無疲厭菩薩摩訶薩亦復如是以普賢行願盡未來劫修菩薩行入如來海不生疲厭十二合入海無厭喻上之四喻各以如四大河而為喻首上之十喻皆以菩薩而為合初佛子如日光出時無熱池中金沙銀沙金剛沙琉璃沙及餘一切種種寶物皆有日影於中顯現其金沙等一切寶物亦各展轉而現其影互相鑒徹無所妨礙十三合衆寶交影喻先喻後合菩薩摩訶薩亦復如是住此三昧於自身一一毛孔中悉見不可說不可說佛剎微塵數諸佛如來亦見彼佛所有國土道場衆會一一佛所聽法受持信解供養各經不可說不可說億那由他劫而不想念時節長短其諸衆會亦無迫隘何以故以微妙心入無邊法界故入無等差別業果故入不思議三昧境界故入不思議思惟境界故入一切佛自在境界故得一切佛所護念故得一切佛大神變故得諸如來難得難知十種力故入普賢菩薩行圓滿境界故得一切佛無勞倦神通力故合中二先正合後何以故下徵釋涉入所由佛子菩薩摩訶薩雖能於定一念入出而亦不廢長所在定亦無所著雖於境界無所依住而亦不捨一切所緣雖善入剎那際而為利益一切衆生現佛神通無有厭足雖等入法界而不得其邊雖無所住無有處所而恆趣入一切智道以變化力普入無量衆生衆中具足莊嚴一切世界雖離世間顛倒分別超過一切分別之地亦不捨於種種諸相雖能具足方便善巧而究竟清淨雖不分別菩薩諸地而皆已善入佛子譬如虗空雖能容受一切諸物而離有無菩薩摩訶薩亦復如是雖普入一切世間而離世間想雖勤度一切衆生而離衆生想雖深知一切法而離諸法想雖樂見一切佛而離諸佛想雖善入種種三昧而知一切法自性皆如無所染著雖以無邊辨才演無盡法句而心恆住離文字法雖樂觀察無言說法而恆示現清淨音聲雖住一切離言法際而恆示現種種色相雖教化衆生而知一切法畢竟性空雖勤修大悲度脫衆生而知衆生界無盡無散雖了達法界常住不變而以三輪調伏衆生恆不休息雖常安住如來所住而智慧清淨心無怖畏分別演說種種諸法轉於法輪常不休息大文第四總結雙行謂權實定散無障礙故於中三先法次佛子下喻後菩薩下合然法中即寂而用喻合明即用而寂佛子是為菩薩摩訶薩第九法界自在大三昧善巧智三結定名
