演無量法隨衆生意悉令滿足第八於一切下明其所安立不可思議即觀察如來安立正法功德文中分二初約所詮以辨深廣次以大慈下現身説法約能詮教以明安立於去來今心常清淨令諸衆生不著境界恆與一切諸菩薩記令其皆入佛之種性生在佛家得佛灌頂第九於去來今下明遊於三世平等法性即觀察如來授記功德常遊十方未曾休息而於一切無所樂著法界佛剎悉能遍往諸衆生心靡不了知所有福德離世清淨不住生死而於世間如影普現第十常遊十方下明其身流布一切世間即觀察如來於一切世界示現受用變化身功德以智慧月普照法界了達一切悉無所得恆以智慧知諸世間如幻如影如夢如化一切皆以心為自性如是而住隨諸衆生業報不同心樂差別諸根各異而現佛身如來恆以無數衆生而為所緣為説世間皆從緣起知諸法相皆悉無相唯是一相智慧之本欲令衆生離諸相著示現一切世間性相而行於世為其開示無上菩提第十一以智慧月下明於一切法智無疑滯即觀察如來斷疑功德文中有二初自斷疑後文隨諸衆生下能斷他疑為欲救護一切衆生出現世間開示佛道令其得見如來身相攀緣憶念勤加修習除滅世間煩惱之相修菩提行心不散動於大乘門皆得圓滿成就一切諸佛義利第十二為欲救護下明於一切行成就大覺即觀察如來令入種種行功德文中有二初約説法令入開示佛道者令悟入故次令其得見下約現身令入悉能觀察衆生善根而不滅壞清淨業報智慧明了普入三世第十三悉能觀察下明於諸法智無有疑惑即觀察如來當來法生妙智功德永離一切世間分別放光明網普照十方一切世界無不充滿色身妙好見者無厭以大功德智慧神通出生種種菩薩諸行諸根境界自在圓滿作諸佛事作已便沒第十四永離一切下明凡所現身不可分別下經但云無能測身即觀察如來如其勝解示現功德善能開示過現未來一切智道為諸菩薩普雨無量陀羅尼雨令其發起廣大欲樂受持修習第十五善能開示下明一切菩薩等所求智即觀察如來無量所依調伏有情加行功德成就一切諸佛功德圓滿熾盛無邊妙色莊嚴其身一切世間靡不現覩永離一切障礙之法於一切法真實之義已得清淨於功德法而得自在第十六成就一切下明得佛無二住勝彼岸即觀察如來平等法身波羅蜜多成滿功德為大法王如日普照為世福田具大威德於一切世間普現化身放智慧光悉令開悟欲令衆生知佛具足無邊功德以無礙繒繫頂受位隨順世間方便開導以智慧手安慰衆生為大醫王善療衆病一切世間無量國土悉能遍往未曾休息清淨慧眼離諸障翳悉能明見於作不善惡業衆生種種調伏令其入道善取時宜無有休息若諸衆生起平等心即為化現平等業報隨其心樂隨其業果為現佛身種種神變而為説法令其悟解得法智慧心大歡喜諸根踊躍見無量佛起深重信生諸善根永不退轉第十七為大法王下明不相間雜如來解脫妙智究竟即觀察如來隨其勝解示現差別佛土功德一切衆生隨業所繫長眠生死如來出世能覺悟之安慰其心使無憂怖若得見者悉令證入無依義智智慧善巧了達境界莊嚴妙好無能映奪智山法牙悉已清淨或現菩薩或現佛身令諸衆生至無患地無數功德之所莊嚴業行所成現於世間一切諸佛莊嚴清淨莫不皆以一切智業之所成就第十八一切衆生下明證無中邊佛平等地即觀察佛身方處無分限功德常守本願不捨世間作諸衆生堅固善友清淨第一離垢光明令一切衆生皆得現見六趣衆生無量無邊佛以神力常隨不捨若有往昔同種善根皆令清淨而於六趣一切衆生不捨本願無所欺誑悉以善法方便攝取令其修習清淨之業摧破一切諸魔鬬諍第十九常守本願下明極於法界即觀察如來窮生死際常現利益安樂一切有情功德從無礙際出廣大力最勝日藏無有障礙於淨心界而現影像一切世間無不覩見以種種法廣施衆生佛是無邊光明之藏諸力智慧皆悉圓滿恆以大光普照衆生隨其所願皆令滿足離諸怨敵為上福田一切衆生共所依怙凡有所施悉令清淨修少善行受無量福悉令得入無盡智地為一切衆生種植善根淨心之主為一切衆生發生福德最上良田智慧甚深方便善巧能救一切三惡道苦第二十從無礙際下顯於二句謂盡虗空性窮未來際即觀察如來無盡等功德深密佛地具斯二句開則別中自有二十一句今文合之上所引功德之名全依無著其所解釋疏中多依無性與離世間品小有同異大旨無違至下品中當更顯示如是信解如是觀察第三如是下結成觀解如是入於智慧之淵如是遊於功德之海如是普至虗空智慧如是而知衆生福田如是正念現前觀察如是觀佛諸業相好如是觀佛普現世間如是觀佛神通自在末後八句就所觀德以辨能觀前四句內德後四句外相前中謂佛內德無量不出福智前二句福智之體次二句福智之用後外相中初一句重舉能觀正念者明非散心後三句亦就所觀以辨能觀初一句總後二句別身雲普現即是相好神通自在即前業用上觀佛身雲勝德竟時彼大衆見如來身一一毛孔出百千億那由他阿僧祇光明一一光明有阿僧祇色阿僧祇清淨阿僧祇照明令阿僧祇衆觀察阿僧祇衆歡喜阿僧祇衆快樂阿僧祇衆深信增長阿僧祇衆志樂清淨阿僧祇諸根清涼阿僧祇衆恭敬尊重第二時彼大衆下明見佛光用前雖有用乃觀如來常所具德今現目覩故不同也文中三初覩常光二覩放光三顯光意今初有十一句初總餘別別中前三光相後七光益爾時大衆咸見佛身放百千億那由他不思議大光明一一光明皆有不思議色不思議光照不思議無邊法界二爾時下覩放光中先舉體相以佛神力出大妙音其音演暢百千億那由他不思議讚頌超諸世間所有言詞出世善根之所成就復現百千億那由他不思議微妙莊嚴於百千億那由他不思議劫歎不可盡皆是如來無盡自在之所出生又現不可説諸佛如來出興於世令諸衆生入智慧門解甚深義又現不可説諸佛如來所有變化盡法界虗空界令一切世間平等清淨如是皆從如來所住無障礙一切智生亦從如來所修行不思議勝德所生復現百千億那由他不思議妙寶光𦦨從昔大願善根所起以曾供養無量如來修清淨行無放逸故薩婆若心無有障礙生善根故為顯如來力廣遍故為斷一切衆生疑故為令咸得見如來故令無量衆生住善根故顯示如來神通之力無映奪故欲令衆生普得入於究竟海故為令一切諸佛國土菩薩大衆皆來集故為欲開示不可思議佛法門故後以佛下辨光業用中有五現一現説法二現嚴三現佛四現神變五現寶𦦨光後為顯如來下四行經明現光意爾時如來大悲普覆示一切智所有莊嚴第二爾時如來下明現勝德之意文分為二別先牒前現德欲令不可説百千億那由他阿僧祇世界中衆生二欲令下正明現意分二先明下益衆生次開示如來下明上弘佛道今初分二先彰現因後世尊下辨現益之因今初先舉所益未信者信已信者增長已增長者令其清淨已清淨者令其成熟已成熟者令心調伏觀甚深法具足無量智慧光明發生無量廣大之心薩婆若心無有退轉不違法性不怖實際證真實理滿足一切波羅蜜行出世善根皆悉清淨猶如普賢得佛自在離魔境界入諸佛境了知深法獲難思智大乘誓願永不退轉常見諸佛未曾捨離成就證智證無量法具足無邊福德藏力發歡喜心入無疑地離惡清淨依一切智見法不動得入一切菩薩衆會常生三世諸如來家後未信者下辨益不同此中文義若約行布則從初信以至地滿疏各有指若約圓融初之五句信中攝位句各一位從觀甚深下義通諸位以圓教中位位攝德故世尊所現如是莊嚴皆是過去先所積集善根所成為欲調伏諸衆生故二辨現因既積善所成故為益深大亦結前因生後開示開示如來大威德故照明無礙智慧藏故示現如來無邊勝德極熾然故顯示如來不可思議大神變故以神通力於一切趣現佛身故示現如來神通變化無邊際故本所志願悉成滿故顯示如來勇猛智慧能遍往故於法自在成法王故出生一切智慧門故示現如來身清淨故又現其身最殊妙故顯示證得三世諸佛平等法故開示善根清淨藏故顯示世間無能為喻上妙色故顯示具足十力之相令其見者無厭足故為世間日照三世故第二開示下明上弘佛道分二先別彰所為二自在已下舉因結歎前中有二十七句為欲顯前二十一種殊勝功德自在法王一切功德皆從往昔善根所現一切菩薩於一切劫稱揚讚説不可窮盡第二舉因結歎前舉積因後歎無盡爾時兜率陀天王奉為如來嚴辦如是諸供具已與百千億那由他阿僧祇兜率天子向佛合掌白佛言善來世尊善來善逝善來如來應正等覺唯見哀愍處此宮殿第六爾時兜率下天王請佛處殿爾時世尊以佛莊嚴而自莊嚴具大威德為令一切衆生生大歡喜故一切菩薩發深悟解故一切兜率陀天子增益欲樂故兜率陀天王供養承事無厭足故無量衆生緣念於佛而發心故無量衆生種見佛善根福德無盡故常能發起清淨信故見佛供養無所求故所有志願皆清淨故勤集善根無懈息故發大誓願求一切智故受天王請入一切寶莊嚴殿如此世界十方所有一切世界悉亦如是第七爾時世尊下如來受請分二先受請入殿二爾時一切下入已現嚴前中先明此界次如此世界下結通十方爾時一切寶莊嚴殿自然而有妙好莊嚴出過諸天莊嚴之上一切寶網周匝彌覆普雨一切上妙寶雲普雨一切莊嚴具雲普雨一切寶衣雲普雨一切旃檀香雲普雨一切堅固香雲普雨一切寶莊嚴蓋雲普雨不可思議華聚雲普出不可思議妓樂音聲讚揚如來一切種智悉與妙法而共相應如是一切諸供養具悉過諸天供養之上第二入已現嚴顯是佛力故出過諸天時兜率宮中妓樂歌讚熾然不息以佛神力令兜率王心無動亂往昔善根皆得圓滿無量善法益加堅固增長淨信起大精進生大歡喜淨深志樂發菩提心念法無斷總持不忘第八時兜率宮下天王獲益文中心無動亂得定益往昔已下進善益十住位中攝散歸靜故樂音止息此位超勝得動實性故動寂無二故樂音熾然心不動也爾時兜率陀天王承佛威力即自憶念過去佛所所種善根而説頌言第九爾時下承力偈讚然憶念昔因亦是益相故為説偈依先明此處偈讚後結通十方昔有如來無礙月諸吉祥中最殊勝彼曾入此莊嚴殿是故此處最吉祥昔有如來名廣智諸吉祥中最殊勝彼曾入此金色殿是故此處最吉祥昔有如來名普眼諸吉祥中最殊勝彼曾入此蓮華殿是故此處最吉祥昔有如來號珊瑚諸吉祥中最殊勝彼曾入此寶藏殿是故此處最吉祥昔有如來論師子諸吉祥中最殊勝彼曾入此山王殿是故此處最吉祥昔有如來名日照諸吉祥中最殊勝彼曾入此衆華殿是故此處最吉祥昔有佛號無邊光諸吉祥中最殊勝彼曾入此樹嚴殿是故此處最吉祥昔有如來名法幢諸吉祥中最殊勝彼曾入此寶宮殿是故此處最吉祥昔有如來名智燈諸吉祥中最殊勝彼曾入此香山殿是故此處最吉祥昔有佛號功德光諸吉祥中最殊勝彼曾入此摩尼殿是故此處最吉祥後正陳偈讚十頌頌各一佛佛各各異略無別德此佛即前會次前十佛寄位漸深憶念漸遠耳如此世界兜率天王承佛神力以頌讚歎過去諸佛十方一切諸世界中兜率天王悉亦如是歎佛功德第二如此世界下結通爾時世尊於一切寶莊嚴殿摩尼寶藏師子座上結加趺坐第十爾時世尊下如來就座文分四別一明就座法身清淨妙用自在與三世佛同一境界住一切智與一切佛同入一性佛眼明了見一切法皆無障礙有大威力普遊法界未嘗休息具大神通隨有可化衆生之處悉能遍往以一切諸佛無礙莊嚴而嚴其身善知其時為衆説法二法身下顯德亦大同前二十一德不可説諸菩薩衆各從他方種種國土而共來集衆會清淨法身無二無所依止而能自在起佛身行三不可説下衆集即眷屬圓滿坐此座已於其殿中自然而有無量無數殊特妙好出過諸天供養之具所謂華鬘衣服塗香末香寶蓋幢幡妓樂歌讚如是等事一一皆悉不可稱數以廣大心恭敬尊重供養於佛十方一切兜率陀天悉亦如是四坐此座已下現嚴初此界後十方下結通
