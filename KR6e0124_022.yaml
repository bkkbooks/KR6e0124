body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈第五會兜率天宮金剛幢菩薩説十回向等法門令已行者起願自二十二卷起至三十三卷止有三品經初二品明當會由致三品者升兜率天宮品兜率天宮偈讚品十回向品升兜率天宮品第二十三自下第五會説十回向法初來意先會來者正為答前回向問故回前解行以向真證廣益自他令行彌綸無不周故菩薩大乘藏經云以少善根引無量果者謂回向心以回向心為大利故故行後明之又前解行既著令悲願彌博後品來者前會既終將明後説先明説處表法故來二釋名者先會得名亦有三義同前二會二釋品名者兜率是處佛以法界之身不起而應故名為升處此説者表位超勝是次第故又上下放逸此天知足表世間行滿故居喜足之天又以彼有一生補處表菩提之心功行滿故又積劫纍勳知階未足回勳授子乃知有餘菩薩亦爾勤苦積行未見有餘回向衆生乃知自足又欲界六天此居其中表悲智均平處於中故又生此天而修三福謂施戒定自餘不具偏多不均故處此説也三宗趣者會以十向大願為宗得地為趣品以升天赴感為宗説向為趣爾時佛神力故十方一切世界一一四天下閻浮提中皆見如來坐於樹下各有菩薩承佛神力而演説法靡不自謂恆對於佛第四釋文此會有三品經初二品當會由致後一品正説所以無勝進者由二義故一以此會是三賢位終攝前解行總為趣地方便回向當體自是勝進是故無也此經上下其例有四一約行滿入位之際如賢首品信滿總為入住方便二約願滿入證之際如此回向初僧祇滿總為入地方便三約功用滿約無功用之際如第八地總攝前七地以為方便此第二僧祇也四約因位成滿之際如第十地初攝前九地為入方便此約三僧祇滿處攝也餘位相接即別有方便故非一例二方欲入地必離進趣相與無分別為方便故上辨勝進就初二品前一化主赴機後品助化讚佛今初品中大分十段一本會齊現二不離而升三見佛嚴處四迎佛興供五覩佛勝德六請佛處殿七如來受請八天王獲益九承力偈請十如來就座今初也初言神力即是遍因未必起神境通但是修成心力自在爾時世尊復以神力不離於此菩提樹下及須彌頂夜摩天宮而往詣於兜率陀天一切妙寶所莊嚴殿第二爾時下明不離而升謂前十方一切四會皆儼然不散而升故云不離菩提樹等此説意明橫遍十方竪該九會佛法界遍時處故時兜率天王遙見佛來即於殿上敷摩尼藏師子之座其師子座天諸妙寶之所集成過去修行善根所得一切如來神力所現無量百千億那由他阿僧祇善根所生一切如來淨法所起無邊福力之所嚴瑩清淨業報不可沮壞觀者欣樂無有厭足是出世法非世所染一切衆生咸來觀察無有能得究其妙好第三見佛嚴處即於下正顯嚴處有二初一方嚴後結通十方初中分二初總顯體德後有百萬下別明體用今初有十一句初一句總餘十句為別別中分三段初一句自體相以寶成故次六句因相謂過去善根後三句總顯殊特有百萬億層級周匝圍繞百萬億金網百萬億華帳百萬億寶帳百萬億鬘帳百萬億香帳張施其上華鬘垂下香氣普熏百萬億華蓋百萬億鬘蓋百萬億寶蓋諸天執持四面行列百萬億寶衣以敷其上二別明體用中通有三百二種百萬億廣上三段即為三別初自此已下有二百一十四句廣自體次有百萬億初發心下七十五句廣前殊特三百萬億善根下十句廣前因相初一多明器世間嚴後二顯衆生世間嚴皆智正覺世間之力也皆言百萬億位增十行之百萬故初中長分為十前九色嚴後一音聲嚴百萬億樓閣綺煥莊嚴百萬億摩尼網百萬億寶網彌覆其上百萬億寶瓔珞網四面垂下百萬億莊嚴具網百萬億蓋網百萬億衣網百萬億寶帳網以張其上百萬億寶蓮華網開敷光榮百萬億寶香網其香美妙稱悅衆心第二樓閣下十句復於殿內建立樓閣繞座莊嚴網嚴樓閣百萬億寶鈴帳其鈴微動出和雅音百萬億旃檀寶帳香氣普熏百萬億寶華帳其華敷榮百萬億衆妙色衣帳世所希有百萬億菩薩帳百萬億雜色帳百萬億真金帳百萬億琉璃帳百萬億種種寶帳悉張其上百萬億一切寶帳大摩尼寶以為莊嚴第三寶鈴帳下十句辨帳嚴是繞座前已辨覆故百萬億妙寶華周匝瑩飾百萬億頻婆帳殊妙間錯百萬億寶鬘百萬億香鬘四面垂下百萬億天堅固香其香普熏百萬億天莊嚴具瓔珞百萬億寶華瓔珞百萬億勝藏寶瓔珞百萬億摩尼寶瓔珞百萬億海摩尼寶瓔珞莊嚴座身百萬億妙寶繒采以為垂帶第四如寶華下有十二句辨嚴座身頻婆羅此云影質謂帳莊嚴中現外質之影故百萬億因陀羅金剛寶百萬億自在摩尼寶百萬億妙色真金藏以為間飾百萬億毗盧遮那摩尼寶百萬億因陀羅摩尼寶光明照耀百萬億天堅固摩尼寶以為窗牖百萬億清淨功德摩尼寶彰施妙色百萬億清淨妙藏寶以為門闥百萬億世中最勝半月寶百萬億離垢藏摩尼寶百萬億師子面摩尼寶間錯莊嚴百萬億心王摩尼寶所求如意百萬億閻浮檀摩尼寶百萬億清淨藏摩尼寶百萬億帝幢摩尼寶咸放光明彌覆其上百萬億白銀藏摩尼寶百萬億須彌幢摩尼寶莊嚴其藏第五因陀羅金剛寶下有十七句亦嚴座四周皆明妙寶以為窗門及覆亦嚴座體莊嚴其藏是蓮華藏不言蓮華或是座身之龕名藏百萬億真珠瓔珞百萬億琉璃瓔珞百萬億赤色寶瓔珞百萬億摩尼瓔珞百萬億寶光明瓔珞百萬億種種藏摩尼瓔珞百萬億甚可樂見赤真珠瓔珞百萬億無邊色相藏摩尼寶瓔珞百萬億極清淨無比寶瓔珞百萬億勝光明摩尼寶瓔珞周匝垂布以為莊嚴百萬億摩尼身殊妙嚴飾百萬億因陀羅妙色寶第六真珠瓔珞下十二句瓔珞周垂嚴其摩尼身下二句文似闕略謂妙色寶下無所結屬百萬億黑旃檀香百萬億不思議境界香百萬億十方妙香百萬億最勝香百萬億甚可愛樂香咸發香氣普熏十方百萬億頻婆羅香普散十方百萬億淨光香普熏衆生百萬億無邊際種種色香普熏一切諸佛國土永不歇滅百萬億塗香百萬億熏香百萬億燒香香氣發越普熏一切百萬億蓮華藏沉水香出大音聲百萬億遊戲香能轉衆心百萬億阿樓那香香氣普熏其味甘美百萬億能開悟香普遍一切令其聞者諸根寂靜復有百萬億無比香王香種種莊嚴第七黑旃檀下有十六句以香為嚴阿樓那此云紅赤色雨百萬億天華雲雨百萬億天香雲雨百萬億天末香雲雨百萬億天拘蘇摩華雲雨百萬億天波頭摩華雲雨百萬億天優鉢羅華雲雨百萬億天拘物頭華雲雨百萬億天芬陀利華雲雨百萬億天曼陀羅華雲雨百萬億一切天華雲雨百萬億天衣雲雨百萬億摩尼寶雲雨百萬億天蓋雲雨百萬億天幡雲雨百萬億天冠雲雨百萬億天莊嚴具雲雨百萬億天寶鬘雲雨百萬億天寶瓔珞雲雨百萬億天旃檀香雲雨百萬億沉水香雲第八雨百萬下二十句雨雲為嚴建百萬億寶幢懸百萬億寶幡垂百萬億寶繒帶然百萬億香爐布百萬億寶鬘持百萬億寶扇執百萬億寶拂懸百萬億寶鈴網微風吹動出妙音聲百萬億寶欄楯周匝圍繞百萬億寶多羅樹次第行列百萬億妙寶窗牖綺麗莊嚴百萬億寶樹周匝垂陰百萬億寶樓閣延袤綺飾百萬億寶門垂布瓔珞百萬億金鈴出妙音聲百萬億吉祥相瓔珞嚴淨垂下百萬億寶悉底迦能除衆惡百萬億金藏金縷織成百萬億寶蓋衆寶為竿執持行列百萬億一切寶莊嚴具網間錯莊嚴第九建百萬下四十八句座外四面嚴於中有四初二十句雜莊嚴羅列座側言樓閣延袤者淨法云梵云蒲莫迦此云帳輿前文已有樓閣故寶悉底迦者具云塞縛悉底迦此云有樂若見此相必獲安樂其形如卍字百萬億光明寶放種種光百萬億光明周遍照耀百萬億日藏輪百萬億月藏輪並無量色寶之所集成百萬億香𦦨光明映徹百萬億蓮華藏開敷鮮榮百萬億寶網百萬億華網百萬億香網彌覆其上次光明寶下九句光明嚴言網覆者如世之燈以護夕蟲成隱映故百萬億天寶衣百萬億天青色衣百萬億天黃色衣百萬億天赤色衣百萬億天奇妙色衣百萬億天種種寶奇妙衣百萬億種種香熏衣百萬億一切寶所成衣百萬億鮮白衣悉善敷布見者歡喜三天寶衣下九句寶衣敷布嚴百萬億天鈴幢百萬億金網幢出微妙音百萬億天繒幢衆采具足百萬億香幢垂布香網百萬億華幢雨一切華百萬億天衣幢懸布妙衣百萬億天摩尼衆幢衆寶莊嚴百萬億天莊嚴具幢衆具校飾百萬億天鬘幢種種華鬘四面行布百萬億天蓋幢寶鈴和鳴聞皆歡喜四天鈴幢下十句寶幢行列嚴上九段色相嚴次下第十一段音聲嚴百萬億天螺出妙音聲百萬億天鼓出大音聲百萬億天箜篌出微妙音百萬億天牟陀羅出大妙音百萬億天諸雜樂同時俱奏百萬億天自在樂出妙音聲其聲普遍一切佛剎百萬億天變化樂其聲如響普應一切百萬億天鼓因於撫擊而出妙音百萬億天如意樂自然出聲音節相和百萬億天諸雜樂出妙音聲滅諸煩惱第十天螺出妙音聲下辨音聲嚴於中二初十句樂音嚴百萬億悅意音讚歎供養百萬億廣大音讚歎承事百萬億甚深音讚歎修行百萬億衆妙音歎佛業果百萬億微細音歎如實理百萬億無障礙真實音歎佛本行百萬億清淨音讚歎過去供養諸佛百萬億法門音讚歎諸佛最勝無畏百萬億無量音歎諸菩薩功德無盡百萬億菩薩地音讚歎開示一切菩薩地相應行百萬億無斷絶音歎佛功德無有斷絶後悅意下二十句法音嚴前樂音中牟陀羅者此云蜂鼓謂天樂初奏此鼓先作故後法音嚴中初十一句讚歎三寶百萬億隨順音讚歎稱揚見佛之行百萬億甚深法音讚歎一切法無礙智相應理百萬億廣大音其音充滿一切佛剎百萬億無礙清淨音隨其心樂悉令歡喜百萬億不住三界音令其聞者深入法性百萬億歡喜音令其聞者心無障礙深信恭敬百萬億佛境界音隨所出聲悉能開示一切法義百萬億陀羅尼音善宣一切法句差別決了如來祕密之藏百萬億一切法音其音和暢克諧衆樂後隨順音下九句説法益物上廣自體竟有百萬億初發心菩薩才見此座倍更增長一切智心百萬億治地菩薩心淨歡喜百萬億修行菩薩悟解清淨百萬億生貴菩薩住勝志樂百萬億方便具足菩薩起大乘行百萬億正心住菩薩勤修一切菩薩道百萬億不退菩薩淨修一切菩薩地百萬億童真菩薩得一切菩薩三昧光明百萬億法王子菩薩入不思議諸佛境界百萬億灌頂菩薩能現無量如來十力大文第二廣顯殊特前略云見者無厭亦已略明益相今廣顯之即座之德用恭敬供養復顯為嚴文中二初明獲益後申供儀前有三十九句曲分為四初十約位辨益百萬億菩薩得自在神通百萬億菩薩生清淨解百萬億菩薩心生愛樂百萬億菩薩深信不壞百萬億菩薩勢力廣大百萬億菩薩名稱增長百萬億菩薩演説法義令智決定百萬億菩薩正念不亂百萬億菩薩生決定智百萬億菩薩得聞持力持一切佛法百萬億菩薩出生無量廣大覺解百萬億菩薩安住信根二得萬自在下有十二句雜辨得益百萬億菩薩得檀波羅蜜能一切施百萬億菩薩得尸波羅蜜具持衆戒百萬億菩薩得忍波羅蜜心不妄動悉能忍受一切佛法百萬億菩薩得精進波羅蜜能行無量出離精進百萬億菩薩得禪波羅蜜具足無量禪定光明百萬億菩薩得般若波羅蜜智慧光明能普照耀百萬億菩薩成就大願悉皆清淨百萬億菩薩得