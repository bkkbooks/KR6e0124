body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈第六會他化自在天宮金剛藏菩薩說十地品第二十六之一初來意者為遠答普光十地問故夫功不虗設終必有歸前明解導行願賢位因終今明智冥真如聖位果立故有此會來也前是教道此是證道教為證因證即證前三心之教故無性攝論云此聞熏習雖是有漏而是出世心種子性即斯義也然會來即是品來一會之中唯一品故故釋明宗趣亦品會無差次釋名者會名有三一約人名金剛藏會二約處名他化自在天會謂他化作樂具自得受用表所入地證如無心不礙後得而起用故因他受用而有所作非自事故自他相作得自在故得證離欲之實際故三約法名十地會即同品名所以得此名者地名為持持百萬阿僧祇功德一名生成一切因果故名為地生成佛智住持故有別行譯本名十住經復有別譯名漸備一切智德經以後後過前前故云漸備三宗趣者先總後別總有二義一以地智斷證寄位修行為宗以顯圓融無礙行相為趣二前二皆宗為成佛果為趣後別者別於上總略有十義一約本唯是果海不可說性以離能所證故雖通一部此品正明二所證是離垢真如三約智謂根本後得亦通方便四約所斷謂離二障種現五約所修初地修願行二地修戒行三禪行四道品行五四諦行六緣生行七菩提行八淨土行九說法行十受位行六約修成有四行謂初地信樂行二戒行三定行四地已上皆慧行於中四五六地是寄二乘行七地已去是菩薩慧七約寄位行十地各寄一度八約法有三德謂證德阿含德及不住道是十地之德故九約寄乘法謂初二三地寄人天乘四五六七寄出世三乘八地已上出世間是一乘法故以諸乘為此地法十撮要為六決定宗辨此故本分當明於此十中二三四八十通於圓融行布初一雙非以離言故餘皆行布多約寄位顯淺深故若以圓融融彼行布則無不圓融故以別從總皆十地宗若別中之別則地地皆宗別論其趣不異總趣問何以地前顯圓融德地上行布彰淺深劣耶答顯一乘故云何顯耶三乘之位地前行布地上圓融今一乘位地前地上俱有行布圓融若俱雙辨則前後不異若地前行布地上圓融則全同三乘前淺後深故又似行布圓融各別教行不知法性教行非即非離故於地前但顯圓融已過三乘地上多明行布以顯超勝勝相云何謂賢位始終已圓融自在登地已去則甚深甚深言所不至若不寄位何以顯深若不包三乘何以顯廣故虗空鳥迹迹迹合空大海十德德德若海地地之中具攝一切諸地功德文文之中皆云若以殊勝願力復過於此不可數知故剛藏俟五請而方說世親以六相而圓融意在斯矣又此一會文為一品闕於方便及勝進者正是斯義所以闕方便者有二義一表正法無二離方便故二總攝三賢皆為入地之方便故闕勝進者亦有二義一十地如佛更無趣故二以十定等品即此勝進故若爾何以別會說耶含二義故一開此勝進成等覺故二勝進趣佛行深遠故若別立方便勝進則不得包攝前後顯地圓融十地甚深良在於此地前乃我地之前安得云深異於地上此解尤妙學者應思補義云佛於天宮會應如前三會天王設座請佛偈讚之儀而今無者有三義故一此天以他化樂具為己受用天既如此而佛亦隨所變化故座與供不必設也二顯地智高出世間無心成事離施作故三以前三賢功行蘊積於此以成地德如他化故經特無者有此義故向下經文隨釋大科總有十分一序分二三昧分三加分四起分五本分六請分七正說分八影像分九利益分十重頌分今初爾時世尊在他化自在天王宮摩尼寶藏殿與大菩薩衆俱其諸菩薩皆於阿耨多羅三藐三菩提不退轉悉從他方世界來集住一切菩薩智所住境入一切如來智所入處勤行不息善能示現種種神通諸所作事教化調伏一切衆生而不失時為成菩薩一切大願於一切世一切劫一切剎勤修諸行無暫懈息具足菩薩福智助道普益衆生而恆不匱到一切菩薩智慧方便究竟彼岸示入生死及以涅槃而不廢捨修菩薩行善入一切菩薩禪定解脫三昧三摩鉢底神通明智諸所施為皆得自在獲一切菩薩自在神力於一念頃無所動作悉能往詣一切如來道場衆會為衆生首請佛說法護持諸佛正法之輪以廣大心供養承事一切諸佛常勤修習一切菩薩所行事業其身普現一切世間其音普及十方法界心智無礙普見三世一切菩薩所有功德悉已修行而得圓滿於不可說劫說不能盡今初序分亦不離而升也言爾時者謂初成正覺之時十身初滿無盡身雲普周法界故不動而升論云此法勝故故時主處衆皆勝也謂初成之時故時勝世尊為主中主剛藏為說主以初成尊特之佛加大菩薩說此勝法故主勝他化超下五天居欲界頂故處勝與大菩薩俱揀異地前言從他方來俱是新集故衆勝下云住一切菩薩云云等歎德勝歎德之文有二十句初住一切智所住境二句略明初句自分行滿謂權實無礙之智住真俗雙融之境境智一如無住住故次句勝進行滿證佛所證則是如來勤行不息故是菩薩次善能示現下十六句前十三句廣自分後三句廣勝進前中二初三句明行修具足餘具足菩薩下十句歎德用圓備次其身普現下三句廣勝進即三業廣大後悉已下二句結文其名曰金剛藏菩薩寶藏菩薩蓮華藏菩薩德藏菩薩蓮華德藏菩薩日藏菩薩蘇利耶藏菩薩無垢月藏菩薩於一切國土普現莊嚴藏菩薩毗盧遮那智藏菩薩妙德藏菩薩栴檀德藏菩薩華德藏菩薩俱蘇摩德藏菩薩優鉢羅德藏菩薩天德藏菩薩福德藏菩薩無礙清淨智德藏菩薩功德藏菩薩那羅延德藏菩薩無垢藏菩薩離垢藏菩薩種種辨才莊嚴藏菩薩大光明網藏菩薩淨威德光明王藏菩薩金莊嚴大功德光明王藏菩薩一切相莊嚴淨德藏菩薩金剛𦦨德相莊嚴藏菩薩光明𦦨藏菩薩星宿王光照藏菩薩虗空無礙智藏菩薩妙音無礙藏菩薩陀羅尼功德持一切衆生願藏菩薩海莊嚴藏菩薩須彌德藏菩薩淨一切功德藏菩薩如來藏菩薩佛德藏菩薩解脫月菩薩如是等無數無量無邊無等不可數不可稱不可思不可量不可說諸菩薩摩訶薩衆其名下依德立名有四十衆前金剛藏為說主後解脫月為請主中三十八衆同名藏者表地法有含攝衆德出生果用故後一名解脫月者即請法上首脫衆疑暗如夜月故於中蘇利耶者此云月也俱蘇摩者悅意也即是華名如是等下結數難測金剛藏菩薩而為上首五標說主問云菩薩衆多何故唯金剛藏說答云一切煩惱難壞此法能破善根堅固猶如金剛故不異名說問云何名金剛藏此釋藏義也答謂藏即名堅其猶樹藏謂如樹心堅密能生長枝葉華實地智亦爾能生因果此就能藏名藏又如懷孕在藏是故堅如金剛如金剛藏此謂子孕在胎藏中善業所持堅不可壞而謂生長此就所藏名藏二喻俱有生長義補義云金剛藏說地法者以金輪持世界種故大地以金剛為體故地最下為金剛際表根本智為地法體故藏者楞伽云識藏如來藏謂識藏有三藏義謂能藏所藏我愛執藏以藏識能藏一切染淨種子又是彼種子所藏之處長劫以來不失不壞以我愛執藏故今識藏即如來藏如來藏乃法身智藏名一切種智以佛地一切淨妙功德唯此智能持亦是彼諸功德所蘊積為真常淨妙四德盡未來際不失不壞故是藏義故此菩薩名依法立乃說自證所得法故又是表金剛心智破一切堅固無明故雖多衆獨此說也疏義未及此上序分竟爾時金剛藏菩薩承佛神力入菩薩大智慧光明三昧第二三昧分也爾時者衆已集時剛藏入定者以既為衆首知已當說故先入定以妙契佛心故承佛力大智慧光明者三昧名也三昧是通稱智慧是體光明是用證如名慧照事名智此二無礙能破見惑及無明故故名光明能斷大惑證大理成大果故云大智與理冥故稱為入入是三昧已第三入是三昧下加分有六一辨加所因二即時下能加佛現三作如是下讚其得定四善男子此是下雙辨加定因緣五欲令下辨加所為六善男子下別顯加相今初入是三昧已者若未入定佛不加故所以偏加金剛藏者得此三昧故即時十方各過十億佛剎微塵數世界外各有十億佛剎微塵數諸佛同名金剛藏而現其前第二能加佛現中有五義一佛現時即入定時二十方下來處遠近三各有下能加佛數四同名金剛藏名同所加顯道同故五現其前現身生信故言十億者謂以圓數顯無盡故同名同時現前者意顯地法諸佛同證同說人異道同故亦遮那本願故作如是言善哉善哉金剛藏乃能入是菩薩大智慧光明三昧第三同讚得定顯有加因善男子此是十方各十億佛剎微塵數諸佛共加於汝以毗盧遮那如來應正等覺本願力故威神力故亦是汝勝智力故第四雙辨加定因緣於中四句有四因緣一伴佛同加故二主佛本願故三主佛現威故四定者智力故加有二種一冥加二顯加冥加在前顯居定故欲令汝為一切菩薩說不思議諸佛法光明故所謂令入智地故攝一切善根故善簡擇一切佛法故廣知諸法故善能說法故無分別智清淨故一切世法不染故出世善根清淨故得不思議智境界故得一切智人智境界故又令得菩薩十地始終故如實說菩薩十地差別相故緣念一切佛法故修習分別無漏法故善選擇觀察大智光明巧莊嚴故善入決定智門故隨所住處次第顯說無所畏故得無礙辨才光明故住大辨才地善決定故憶念菩薩心不忘失故成熟一切衆生界故能遍至一切處決定開悟故第五明加所為文有二十句初十句依自利行後十利他行今初總顯加意有三初為一切菩薩是所被機二說不思議諸佛法光明是所說法三令入智地等是說之益二又令得菩薩十地下十句依利他行是增數十經有十二句論經合七八二句故唯十一以初句為總餘十為別善男子汝當辨說此法門差別善巧法所謂承佛神力如來智明所加故淨自善根故普淨法界故普攝衆生故深入法身智身故受一切佛灌頂故得一切世間最高大身故超一切世間道故清淨出世善根故滿足一切智智故第六別顯加相有三初口加次意加後身加今初有十一句初總餘別總中令以樂辨才說十地法門差別相不違理事善巧成立故云汝當辨說所謂十句別中疏有多義爾時十方諸佛與金剛藏菩薩無能映奪身與無礙樂說辨與善分別清淨智與善憶念不忘力與善決定明了慧與至一切處開悟智與成道自在力與如來無所畏與一切智人觀察分別諸法門辨才智與一切如來上妙身語意具足莊嚴二意加中有二初正顯次徵釋偏加所以前中十句初總餘別初中與無映奪身業二與無礙樂辨口業與善別清淨智等與意業故末句云與一切如來上妙身語意業具足莊嚴疏釋有多義今但略出其相何以故得此三昧法如是故本願所起故善淨深心故善淨智輪故善積集助道故善修治所作故念其無量法器故知其清淨信解故得無錯謬總持故法界智印善印故此何以故下釋偏加所以以顯自力堪加偏就意業釋者意為本故初徵意云諸佛慈力若隨缺者可許偏加既有力能與有慈能普何以上十偏加剛藏而不加餘下釋文有十句初總餘別總名得此三昧法合偏加餘不得此故不加耳所以得此三昧者具八種淨即下八句前四自利淨後四利他淨爾時十方諸佛各申右手摩金剛藏菩薩頂三身加增威令起故言各申者不離本處而申即延促無礙諸佛皆摩故云各申即一多無礙即四通中如意通也摩頂已金剛藏菩薩從三昧起第四摩頂已下起分所以起者三昧事訖已得勝力說時至故以定無言說故須起也大文下第五普告下本分略示綱要為廣本故文分為三初明六決定以為地體次佛子何等下標列十名以顯定相三佛子我不見下舉十方同說彰地要勝普告一切菩薩衆言諸佛子諸菩薩願善決定無雜不可見廣大如法界究竟如虗空盡未來際遍一切佛剎救護一切衆生為一切諸佛所護入過去未來現在諸佛智地今初地體文中初句標告諸佛子下正顯於中初句總明後無雜下別顯總中言菩薩願善決定者標人顯法故云菩薩於大菩提立誓趣求故名為願即下初地中發菩提心也此願所以明善決定者以真實智攝故謂攝導此願皆令順理決擇楷定故此已入初地是證決定非是地前信地所攝之願受決定名後別中此善決定有六種即經六句一無雜者即觀相善決定真如觀一味相故謂正體緣如境智一味為觀之相則無帶相之雜二不可見者是真實善決定非一切世間境界出世間故謂此真智超出世間可壞之法故云真實真實故非世智所見三廣大如法界者勝善決定論總釋云大法界故一切諸佛根本故四究竟如虗空盡未來際是因善決定以此智寂而常用故為無常因用而常寂故為常果因謂涅槃永寂而智體不無故窮未來際五遍一切佛剎救護一切衆生者是大善決定謂隨順作利益他行故即普覆名大謂由前因善則不住生死由此大善則大悲不住涅槃六為一切下是不怯弱決定上入智地不怯弱故六相圓融類前可知上六決定以顯地體下徵列地相佛子何等為菩薩摩訶薩智地次列地相中文有四節初寄問徵起次佛子下舉數顯同三何等下徵數列名四佛子此菩薩下結名顯勝且初佛子菩薩摩訶薩智地有十種過去未來現在諸佛已說當說今說我亦如是說二舉數顯同以生成住持故三世同說同說之言文在地相義兼地體以三世同說者地體六決定也何等為十一者歡喜地二者離垢地三者發光地四者𦦨慧地五者難勝地六者現前地七者遠行地八者不動地九者善慧地十者法雲地三列地名中為對治十障證十真如成十勝行說於十地疏引論文廣釋其義今略取十障者一凡夫我相障二邪行障三暗鈍障四解法慢障五身淨慢障六微細煩惱障七細相習障八無相有加行障九不能善利益衆生障十於諸法中不得自在障唯識論說一一障中各有二愚除障斷愚證十真如至下別釋今依本論略釋地名論云一成就無上自利利他行初證聖處多生歡喜名歡喜地由前三位修習今得初成聖位新得故生歡喜也二離能起誤心犯戒煩惱垢故清淨戒具足故名離垢地三隨聞思修等照法顯現故為明地謂得四地慧光明相故名明地唯識此經皆名發光謂成就勝定大法總持能發無邊妙慧光故此約後位得名四不忘煩惱薪智火能燒故名𦦨地𦦨乃慧𦦨即根本智火能燒前地聞持不忘恃以成慢之煩惱薪故五得出世間智方便善巧能度難度故名難勝謂真俗無違極難勝故既能出世又能隨俗巧達五明能度偏滯實為難勝六般若波羅蜜行有間大智現前故名現前地謂妙達緣生引無分別名般若行親如目覩名曰現前七善修無相行功用究竟能過世間二乘出世間道故名遠行此有三義一善修無相到無相邊二功用至極三望前超過故八報行純熟無相無間故名不動此有三義一捨三界行生受變易果故云報行依此起行任運而成故功用不動二得無生忍無相妙慧則有相不動三此二無間故煩惱不動九得無礙力說法成就利他行故名善慧地得無礙慧尚未稱善遍說遍益方名為善十得大法身具足自在故名法雲此有二義一得大法身如雲能說法如雨自在用故二諸佛大法雲雨悉能受故佛子此菩薩十地三世諸佛已說當說今說四結名顯勝佛子我不見有諸佛國土其中如來不說此十地者釋文第三舉十方同說彰地要勝為欲令物生渴仰故文中二初云不見不說反顯十方報化皆說何以故此是菩薩摩訶薩向菩提最上道亦是清淨法光明門所謂分別演說菩薩諸地佛子此處不可思議所謂諸菩薩所證智二徵釋所由也徵云佛國不同化儀亦異如何十地要皆說耶釋意云此最勝故謂萬法皆如體如成聖離斯證智皆是隨宜故為要勝已上本分竟第六爾時金剛藏菩薩說此下請分中三初說已默住二是時下三家五請三爾時金剛藏觀察下許說分齊所以默者將欲說之必固默之欲令大衆渴仰請說故所以俟請者略有二義一增諸菩薩尊敬法故二前舉地歎勝為增樂欲令此請中生解勝故云何生解謂由請故得說默之由顯地體甚深離於言念令衆先解後聞說分不隨聲取離謬解故即復由此故有第三示說分齊今初爾時金剛藏菩薩說此菩薩十地名已默然而住不復分別此初說已默住第二請中三家請殊即分三段謂初解脫月請二大衆請三如來請所以要三家者衆首顯揚當機渴仰化主加勸事方周故又佛請者即名為加謂衆雖已請要假主佛威光方堪說故亦名為教如來教說顯剛藏說傳佛教故又前二家請顯此地法因人修故後一家請顯此地法佛所證故三請三止文有六段止請相乘且為五段一怪默騰疑請二法深難受止三歎衆堪聞請四不堪有損止雖有堪者亦有不堪故五雙歎人法請謂不堪聞者以法深故亦得佛護固應為說於是剛藏理窮更無違請是時一切菩薩衆聞菩薩十地名不聞解釋咸生渴仰作如是念何因何緣金剛藏菩薩唯說菩薩十地名而不解釋就初請中分二初明大衆覩默生疑二解脫月下騰疑為請今初言何因何緣者疑怪之辭為因說者不能說耶為緣聽者不堪聞耶解脫月菩薩知諸大衆心之所念以頌問金剛藏菩薩曰二騰疑為請初敘請因領衆疑念何故淨覺人念智功德具說諸上妙地有力不解釋一切咸決定勇猛無怯弱何故說地名而不為開演諸地妙義趣此衆皆欲聞其心無怯弱願為分別說衆會悉清淨離懈怠嚴潔能堅固不動具功德智慧相視咸恭敬一切悉專仰如蜂念好蜜如渴思甘露二以頌正請文有五偈顯說聽無過是以應說初一偈說者無過遣大衆何因之疑後四偈聽者無過亦遣大衆何緣之疑今初歎說者淨覺無過何故不解釋耶然說法之過有三種一慳嫉不說二懈怠不說三無辨力不樂說今離此三過謂由無瞋等功德具故離慳嫉過二由前已說上妙地名故無說法懈過三由有樂說辨力無不樂說過二歎聽者無過中四偈初二偈歎同生衆次一偈歎異生衆後一偈雙歎今初二偈歎根欲前偈歎根故云決定次偈歎欲故云欲聞若有欲無根雖聞不解有根無欲設聞不受故須雙歎此中意明但有根而無欲不堪聞法今前偈於教決解於理決證具二決定為非現前之根復有今偈現前之欲教證決定故堪受也根欲雙具諸地妙義願為說之第二一偈歎異生衆但云衆會故雙歎根欲初句為總心無濁故名為清淨後三句為別別離六濁一不欲濁謂心無餐采故離懈怠治之二威儀濁不恭肅故嚴整治之三五蓋濁貪名等故潔淨治之四異想濁謂貢高雜染輕慢雜染等皆名異想今說行堅固不動治之五不足功德濁善根微少於彼說不樂住具功德治之六愚癡濁謂愚暗不了故智慧治之後一偈雙歎二衆瞻侍則遍四偈然蜂之念蜜渴之思漿喻希法喜解脫之味復言好蜜甘露顯法之妙思渴情深大衆如此故應說也爾時大智無所畏金剛藏菩薩聞說是已欲令衆會心歡喜故為諸佛子而說頌言第二法深難受止先敘意為衆歡喜是總酬答相菩薩行地事最上諸佛本顯示分別說第一希有難微細難可見離念超心地出生佛境界聞者悉迷惑酬中五偈分四初二頌法難說遣上何因之疑於中難者是總相云何難謂難得難證故難得有四一微細難得顯非聞慧境故二難見難得亦非思慧心眼見故三離念難得亦非世間修慧境故以地智是真修故非地前分別心數緣修之境四超心地故難得非唯非地前之境亦非登地已上報生善得修道智境謂變易所起異熟心識名為報生生便能知無常等智故名善得修道智以非照實之智故亦不測地智知無常等未忘心境名為心地以七地已前皆容出觀故又善得修道智即後得智非根本智既非四心之境是誰境耶即佛智故何者是智見實義故所以難說者恐聞者隨聞取著生迷惑故持心如金剛深信佛勝智知心地無我能聞此勝法第二一頌顯難聞者然具德能聞反顯難聞兼欲使人學能聞故初句為總謂持聽法心堅如金剛則能得聞第二句即決定信堅深信者謂於佛智設心智不及仰推佛智非我境界是深信相佛勝智即法華所說權實二智經云諸佛智慧甚深無量其智慧門難解難入故云勝智堅證者有二義一知是能證二心地是所證即二空真理所依之事謂唯識相言無我者通能所證於此二類如實了知我法二空成無成智末句結成既知難聞之義如是具上二堅方聞上來微細勝智如空中彩畫如空中風相牟尼智如是分別甚難見第三一頌喻顯說聞補義云此二喻疏取論有多釋今約義總釋空喻佛無依智經云佛智如空無所依故畫喻說相風喻音聲聞相二者皆無所依以喻地智難聞故合云牟尼智如是分別甚難見我念佛智慧最勝難思議世間無能受默然而不說第四一頌舉難結默意云說聞本在證見難見說之何益況復難信故我默然爾時解脫月菩薩聞是說已白金剛藏菩薩言第三解脫月歎衆堪聞請前已歎竟此復歎者由聞上言證信難得顯示此衆有信有證有堪能故長行先敘請佛子今此衆會皆悉已集善淨深心善潔思念善修諸行善集助道善能親近百千億佛成就無量功德善根此下發言正請於中三初陳衆集次云善淨下歎德文有十句初句為總餘九為別初善淨深心離教證過故名善淨心一具修諸善行故即下教淨二與理相應故即下證淨善潔思念下九句前五句教淨後捨離下四句證教淨謂順教修行名為教淨證理起行名證淨今初五句中一善潔思念即欲淨二善修諸行求淨三業三善集助道即生得淨四善能等即受持淨五成就善根即行淨捨離癡惑無有垢染深心信解於佛法中不隨他教次此四句證淨也捨離癡惑者真見道中決理無惑皆破無明故二無有垢染即不行淨修道中一切煩惱不行故煩惱即是垢染不行即是無有三深心信解即無厭足淨謂不樂小乘決定信佛勝功德故四於佛法下不隨他教淨謂於趣菩薩地盡道中自正行故歎德竟善哉佛子當承佛神力而為演說此諸菩薩於如是等甚深之處皆能證知二結請爾時解脫月菩薩欲重宣其義而說頌曰願說最安隱菩薩無上行分別於諸地智淨成正覺此衆無諸垢志解悉明潔承事無量佛能知此地義二重頌中二偈初偈直舉法請次偈重頌前義爾時金剛藏菩薩言佛子雖此衆集善淨思念捨離愚癡及以疑惑於甚深法不隨他教第四不堪有損止長行中先領所歎對下有損所以言雖然有其餘劣解衆生聞此甚深難思議事多生疑惑於長夜中受諸衰惱我愍此等是故默然後正舉損違請劣解之人通凡小等皆是迷法之器故多生疑者正行相違猶豫義故惑者心迷於理能破壞善法故此明現損長夜下明其當損我愍此下結默違請爾時金剛藏菩薩欲重宣其義而說頌曰雖此衆淨廣智慧甚深明利能決擇其心不動如山王不可傾覆猶大海有行未久解未得隨識而行不隨智聞此生疑墮惡道我愍是等故不說偈中亦二前一偈頌領前段後一偈頌後段不堪有損下文第五雙歎人法請中復重請者示彼疑惑應須斷之豈可避之避之不說有多過咎何等過咎不得成就一切佛法爾時解脫月菩薩重白金剛藏菩薩言佛子願承佛神力分別說此不思議法此人當得如來護念而生信受何以故說十地時一切菩薩法應如是得佛護念得護念故於此智地能生勇猛何以故此是菩薩最初所行成就一切諸佛法故譬如書字數說一切皆以字母為本字母究竟無有少分離字母者佛子一切佛法皆以十地為本十地究竟修行成就得一切智是故佛子願為演說此人必為如來所護令其信受爾時解脫月菩薩欲重宣其義而說頌曰善哉佛子願演說趣入菩提諸地行十方一切自在尊莫不護念智根本此安住智亦究竟一切佛法所從生譬如書數字母攝如是佛法依於地第五雙歎人法請中亦二先長行中初標請何以故下釋請是故下結請補義云此段長行有多釋大義謂雖有不堪之機今說此大法佛必護念若得護念亦令信受故所以佛必護念者以諸佛之法必以教證為本故設字喻今說地智是佛法之本必為如來所護念也次重頌義亦可知爾時諸大菩薩衆一時同聲向金剛藏菩薩而說頌言上妙無垢智無邊分別辨宣暢深美言第一義相應念持清淨行十力集功德辨才分別義說此最勝地定戒集正心離我慢邪見此衆無疑念唯願聞善說如渴思冷水如饑念美食如病憶良藥如蜂貪好蜜我等亦如是願聞甘露法善哉廣大智願說入諸地成十力無礙善逝一切行第二海會大衆同請者自陳有根有欲於中前有四偈半歎人後善哉下有一偈歎法成益歎人中二偈前五句歎說者自成教證後三句歎能令他入後二偈半歎聽者初定戒下一偈歎衆有根後如渴下一偈歎衆有欲顯示大衆求法轉深後善哉一偈歎法利益自下如來加請前雖二家四請為顯法勝復待佛加前來為分主伴主佛唯明意加今欲具於身口故佛重加又前默與威神今有加請今加為說不與前同上力被下說以為加因加勸說目之為請加即是請前加分中不加大衆今此加者前若即加說主無由三止此若不加請主前言得佛護念便為無驗上敘科意爾時世尊從眉間出清淨光明名菩薩力𦦨明百千阿僧祇光明以為眷屬普照十方一切世界靡不周遍三惡道苦皆得休息又照一切如來衆會顯現諸佛不思議力又照十方一切世界一切諸佛所加說法菩薩之身作是事已於上虗空中成大光明雲網臺而住初主佛光加文中通有八業二身先長行有七業二身頌中但明請業先此佛光照十方後十方佛放光照此方二光互照必互相見二段皆有二身七業今初先明光體業用作是事已下正明所作今初先明光本上加於下多用眉間之光亦表將說中正之道出清淨下正明體用文有六業一覺業即光明體謂光照菩薩身已自覺如來力加故覺照光明故曰𦦨明二百千下因業能生眷屬故三普照下卷舒業舒則普照十方卷則還入常光今文略無卷業四三惡下止業皆息苦故五降伏業論經一切魔宮隱蔽不現今經闕此六又照一切下敬業顯現佛會令物敬故七又照十方下示現業正為令衆見說聽者皆得佛加堪說聽故長行受身加之名偏從此立作是已下二正顯所作即二身之一言二身者一流星身往來他方世界故二如日身謂如日處空即此所作於上空中為臺是也以身約有體業約有用時十方諸佛悉亦如是從眉間出清淨光明其光名號眷屬作業悉同於此又亦照此娑婆世界佛及大衆并金剛藏菩薩身師子座已於上虗空中成大光明雲網臺二十方佛放光照此者正為照此然其作業亦周十方七業二身不殊此佛故云悉同時光臺中以諸佛威神力故而說頌言第二頌明請業所依望前猶屬於身佛無等等如虗空十方無量勝功德人間最勝世中上釋師子法加於彼正請中五偈分二前四加請所說後一教說分齊前中先二偈舉法請後二偈舉益請前中初正顯作加後一偈顯加所為初中言世中上者具四種勝義故云世中上四勝者一者自在勝所作無礙故謂不為他屈他即二障由離二障解脫自在不染如空即經云無等等二力勝經即十力能伏邪智之冤敵故三眷屬勝即無量勝功德人間最勝四種姓勝謂家姓勝即釋師子以釋姓為輪王貴胄故由上四義故稱法王名世中上今具勝德之人加金剛藏佛子當承諸佛力開此法王最勝藏諸地廣智勝妙行以佛威神分別說第二一偈加所為者欲令開曉法藏義故勝藏有二種一義藏二字藏義藏即勝妙行行者諸菩薩行所謂助道法故妙者真實證故即是證道勝者神力勝故是不住道染淨無礙故云神力如是顯示深妙勝上之義二字藏者即諸地廣智及分別說上舉法請若為善逝力所加當得法寶入其心第二舉益請者顯所說法利他有三時益故二偈分三初半偈聞時益若得上加則法寶入心成聞持益即上解脫月請云此不思議法當得如來護念而生信受諸地無垢次第滿亦具如來十種力次半偈修時益上句修時因圓下句所修果滿雖住海水劫火中堪受此法必得聞其有生疑不信者永不得聞如是義後一偈顯轉生益即具堅種人上半順明有信之益下半反顯舉無信之損堅種人者謂具金剛種雖在八難而得聞故地獄天子三重頓圓此中意顯有信受者雖在惡道難處而得聞經以難不障聞故言雖也海水劫火是轉生難處大海龍宮即是惡道畜生趣故劫火中者即是善趣指色界二禪以火燒初禪二禪不壞而二禪已上天人為長壽天難亦得聞經補義云總顯法勝聞種堅固故經有如人食少金剛之喻而疏多義槩不出此應說諸地勝智道入住展轉次修習從行境界法智生利益一切衆生故第二一偈教說分齊中應說諸地者總勸也說地何義謂說前字藏之中諸地廣智三漸次相故云何為三一觀漸次二證漸次三修漸次此即十地之中加行根本後得三智為地地中初中後相勝智道猶因也以加行智為正證勝智之漸次故次入住展轉者是證漸次入者入地心住即住地心未轉向餘地故展轉即出地心地地轉所住處故即此三心證智自為漸次以後得智要由正真修行方能了俗故名修行漸次言法智者正辨後得智體緣法別故一名為法智此智從二境生一由證真故云從行故二外能了俗故云從境生謂以正證之行行於俗境是後得也利益衆生一句結說之益亦是後得智境正證之義廣如疏釋爾時金剛藏菩薩觀察十方欲令大衆增淨信故而說偈曰此下第三許說分齊謂所說不過義說二大是地分齊於中先敘說儀後正顯偈辭今初觀察十方是敘說儀觀十方佛將欲承力故無我慢觀十方機擬將普被故無偏心故上下文皆云承佛神力普觀十方也欲令大衆增淨信者是敘說意謂衆先有信深渴所聞今更示說正地二大增益聞者堪受正義不如言取名增淨信義名所以深廣稱大即是當法受名說名詮表因於此說得彼義故依於彼義說名為大大之說故依他受稱於中先就義大次為說大後辨雙融義中有三一約果海可以總標令人知有名為可說不可指斥示人名不可說二約證處既所證理離相離名還云此法不說聞以此遣言之言當彼法故名為可說有言斯遣名不可說三約本智謂以遮詮易解故名可說直詮不逮故不可說此三大義也次就說中亦有三一約後得智隨事行相可以言辭分別是則可說是出世間故不可說二約加行智謂是意言觀故是則可說觀中行相言不至故名不可說三約寄位法可以寄此表示令人解十地故名為可說不可以此即為十地名不可說後約雙融中此上六法各說果海即是無說無說之說無二俱融準思可知上來敘意竟如來大仙道微妙難可知非念離諸念求見不可得無生亦無滅性淨恆寂然離垢聰慧人彼智所行處第二正顯偈辭有十二偈分為二段前七偈顯義大後五偈明說大初四偈總顯地微有二初二偈總顯次二偈別顯二一偈類顯三一偈對彰四一偈喻顯初中先二偈正顯地智微妙之相以依智地說故謂聖道是體難知故微也大仙是佛道是所證謂微妙地智是因依修證智得成功果故指此地智是佛道也次六句顯微所以非念者謂非念慮分別心者之境界也以智體無念故云離念次五句明證時甚微初句總求欲正見難可得故次四句別有四微初即功德甚微不生不滅謂無住涅槃寂用無礙功德次句即清淨甚微謂性離煩惱無不離之時故恆寂然即性淨涅槃三句言離垢者即觀行甚微謂觀智中離無明垢故四句聰慧人下即依止甚微聰慧人者登地已上有智之者此上四微並異凡小總顯地智故自性本空寂無二亦無盡解脫於諸趣涅槃平等性非初非中後非言辭所說出過於三世其相如虗空次二偈別顯微相謂微之體相也是智有二相初二句明同相智體空寂故後六句不同相智位差別故初二句言自性等者謂此智自體本空寂故何以言同此即性淨涅槃上同諸佛下同衆生一切衆生皆有此故橫同諸法諸法如故此如即是自體空故一切皆以空為自性智性色性本無差別一切皆有安樂性故下句別釋空義疏依論經云有不二不盡釋約此句離三種空攝真空相三種空者即地前空亂意菩薩有三種疑一疑空滅色取斷滅空此失空如來藏即損減謗也二疑空異色取色外空三疑空是物取空是有今言有即非斷滅故云色即是空言不二者謂不異此空智更有異空言不盡者謂空非有物之可轉滅故云空即是色非別有空離此三空即見自性本空空如來藏矣此疏依論經釋次解脫下有六句即方便淨涅槃謂不同凡小修斷故即智之性為性淨以智出惑障為方便淨解脫於諸趣者謂於諸趣得以離諸趣雜染為解脫故言平等者世間之性即涅槃故以生死即涅槃非若二乘背生死也謂三時無斷方說斷惑故云非初中後非言辭下三句明三德初句即般若德是觀行相謂無分別觀體絶名言真智內發次句即法身德是轉依相謂轉無常依故出過三世三其相如虗空即解脫相謂不同聲聞猶有二障今此二障雙亡故如空無礙此不同相由得前同成斯不同能顯前同有離障清淨如融金成像像非金外寂滅佛所行言說莫能及地行亦如是難說難可受第二一偈類他行微於中上半牒前地智離言以為能類下半正舉地行以為所類謂以上地智類顯地行為甚微妙寂即同相性淨涅槃自性寂故滅即不同相方便淨涅槃要智緣滅非約性滅故此二涅槃是佛所行故言不及行者證也言不及者說聽皆難也下半所類者謂非唯證智如是深玄而令智眷屬行亦難說受檀等六度是智眷屬設地是地體意在舉地取行故云地行將此地智修行檀等故名同行同彼事而行故斯即後得為證智眷屬也智起佛境界非念離心道非蘊界處門智知意不及第三一偈寄對彰微者對聞思等以顯微故初句舉法體智即所起地智即前五偈明根本之智起者即加行後得二皆觀如如即佛境次非念下二句明難說於中初句非心數故難說非念者非思慧境故離心道者非報生識智境報生識者如上違請中辨次句明不同三科有色心根境故不可說經文無說字以門即是說故法華以說為智慧門下句不可聞智知者唯證智知故意不及者如聞敢故即依智不依識如空中鳥迹難說難可示如是十地義心意不能了第四一偈喻顯地微此中喻者不取餘處虗空亦不取沙土之迹正取空中鳥迹以空中鳥迹不可說示故前風畫喻是顯默不說意此中喻及難說誠衆捨著許為宣說意不同也以著心隨聲取義有多過故意令大衆自知離過所以酷明難說難聞慈悲及願力出生入地行次第圓滿心智行非慮境是境界難見可知不可說自此下第二復顯說大令生正信五偈分三初一偈半正顯說大三成就義二有三偈彰己無過誡衆除失三有半偈示說分齊但是說因今初言三成就者一因成就大謂慈悲願力為起行本故名為因二因漸成就大謂聞思慧等為出世智因起之不頓故名為漸三教說修成就大謂即修慧真修契實如於正證可寄言詮故名教說教說二字正揀大義非如果分不可說故因成就大者即初二句慈悲是利他願通二利力通上三以二利熏修不同二乘故名為力下句即二利之功出生地行正是因義二因漸成就大即次第二字三圓滿下明教說修成就大此有二種一滿足修即初八字二者觀修即後兩句真修位極世慮都寂能滿地智名滿足修真智內發寂照分明名為觀修如瑩明鏡垢無不淨如滿足修鑒無不徹如彼觀修二修如於出世但是因分之終正證捨修方名果分文中慮即聞思智即真修之智心即真修心體謂若無聞思緣慮之心方名真修之心圓滿故唯真修之智所能行耳故云智行非慮境次觀修中是境界者即真修之境難見者非聞思能見可知者唯真修自心寂照方知知即見也既難可見亦難可說而隨修以顯說大中收不同果分但是深義佛力故開演汝等應敬受如是智入行億劫說不盡我今但略說真實義無餘一心恭敬待我承佛力說勝法微妙音譬喻字相應無量佛神力咸來入我身第二佛力下彰己無過誡衆無失有三偈初半偈總明後二偈半別顯今初由說聽者各有二過不能得證故並彰離說者二過一佛不隨喜說今云佛力開演則知佛已隨喜二不平等今云汝等應受則情無彼此聽二過者一見諍過言我法是彼法非如是執著種種諸見二於說法者不生恭敬今令敬受則雙離二過以敬法故無諍過以敬人故無後過次別顯中二偈半廣上承力開演敬受分三段初一偈顯開演次一偈顯受後半偈顯承力此處難宣示我今說少分第三示說分齊半偈言此處者即牒上義說二大為此處也少分者但是說因耳謂果分則不可說也因果有二義一就十地以證智為果分方便寄法等為因分謂寄法可說而證智則不可說也又以地法為趣究竟果海之因所趣果海離言故不可說故今地法但說因耳若以普賢行願廣大如空冥同果海皆不可說也空中鳥迹喻正顯此大文自下第七明說分中三門分別一來意二釋名三釋文今初來意者請儀既終已示分齊彰其地實地實難明寄顯在相相即因分從此已下廣名地相令尋相得實故有此來又請分生其正解此後顯其行修故次來也二釋名演暢宣陳十地差別故名說分三釋文者十地即為十段就初地中七門分別一來意二釋名三斷障四證理五成行六得果七釋文初來意者十地之中最初斷障證理得聖性故二釋名者唯識論云初獲聖性具證二空能益自他生大歡喜故此有三義一得位二證理三成行由此三故名極歡喜三斷障者唯識論云異生性障是其所斷異生即是凡夫名凡夫我相障障於初地是其所斷由斯初地說斷二愚及彼粗重一執著我法愚即異生障二惡趣雜染愚即惡趣諸業果等此雖非愚愚品類攝下九地各有二愚四所證理者由斷前障證遍行真如謂此真如二空所顯無有一法而不在故五所成行者略有四種一約增勝修成施行二約所成起十六大三約修成謂信等十行四約實行謂十度等無不皆修六所得果者略有四種一得當地滿時調柔等四果二得檀行成大財果三通達障空得一切障滅果四得三性三無性理智等果然上諸門多約行布若約圓融一斷一切斷一證一切證一行一切行一得一切得也七釋文分二先長行後偈頌前中若直就經文應分為二初明地法後佛子菩薩住此地多作閻浮提王下地果前中先廣明後佛子是名下總結前中有三初明入心次佛子此菩薩以大悲為首下明住地心後佛子菩薩住此歡喜地已以大願力得見多佛下明其出心十地之文大體皆爾今且依論判長行中分二先明初地說分後佛子菩薩住此下校量分前中依論總有一百句分為三段初四十句明住分二佛子菩薩住歡喜地下三十句釋名分後佛子菩薩住大悲下三十句安住分若通校量勝即為初地四分初云住者出世菩提心生堅守初地更不退失故稱為住然十地之中既三心齊證則地地之中皆攝前之三位此中住分攝發心住其釋名分攝歡喜行後之二分攝救護衆生離衆生相回向今長行一百句中初四十句明住分佛子若有衆生深種善根善修諸行善集助道善供養諸佛善集白淨法為善知識善攝善清淨深心立廣大志生廣大解慈悲現前今初住分中文分為二初別顯住法後菩薩住如是下結住入位前中四十句分四初十句依何身次十句為何義三有十句以何因四有十句有何相今初謂深種善根十句為所依身次為求佛智為所緣境義三以大悲為首為發心之因四以過凡得聖為發心福利之相今初依何身十句初若有衆生深種善根此句為總衆生即解行之人言深種者約行布則經一僧祇已積資糧故云深種論經名厚集別有九句有九種集前六護煩惱行後三護二乘行言九集者一行集即善修諸行善作眷屬持戒故三聚非一故名為諸不淨尸羅不生三昧故首明之二定集即善集助道善作眷屬三昧故以定資慧故名眷屬三親近集即善供養諸佛供佛欲集聞慧故四聚集即善集白淨法謂依聞思彼若名義自性差別有上下故成暖頂位治諸蔽漏故云白淨五獲集即為善知識善攝由內修實證得外教授故修行實證即如實智亦分上下立於忍位及世第一上皆同加行下四皆已入地六淨心集即善清淨深心以得出世間正智於所緣境無分別智都無所得不取種種戲論相故名為善淨智能契理故曰深心七廣集即立廣大志深心廣大利故八信心集即生廣大解以求一切智智故九現集即慈悲現前以多行慈悲無時暫捨故云現前以小乘無求佛志無利生心故後三護之也上十句明依何身竟下明為何義為求佛智故為得十力故為得大無畏故為得佛平等法故為救一切世間故為淨大慈悲故為得十方無餘智故為淨一切佛剎無障礙故為一念知一切三世故為轉大法輪無所畏故第二有十句為何義者為求佛果故先別顯求果之相後佛子下總結發心今初十句初總餘別總云佛智謂無上智知斷證修故此智差別有九種皆悉求之一力佛智問記為業以十種力隨機答故二無畏佛智破邪見業揀異菩薩復稱為大三平等佛智得人法無我教授衆生證入之業四救佛智以四攝法化衆生業五淨佛智能為救攝用業慈悲淨瞋恚故六無餘佛智常以佛眼觀世間衆生業十方遍觀故云無餘七無染佛智以無障礙智嚴其依報自然應化令其信樂為業八覺佛智一念知三世衆生心心數法為業九轉法輪佛智解脫方便善巧業然上九句皆先總標智體後顯其業初三自利後六利他利他之中四攝是利他之行慈悲是利他之心後四利他之智佛子菩薩起如是心二總結發心中言起如是心者即指前十心是為發菩提心而論云前六決定中願善決定謂願即初地中發菩提心即指此十心也上說為何義以有求佛智義故下說以何因以大悲為首智慧增上善巧方便所攝最上深心所持如來力無量善觀察分別勇猛力智力無礙智現前隨順自然智能受一切佛法以智慧教化廣大如法界究竟如虗空盡未來際第三以大悲下明以何因生如是心謂以大悲為衆生故文有十句初總餘別別有九種一增上大細行苦智慧增上生故若了苦苦壞苦智非增上故二善巧等即攝大四攝曲屈隨宜攝故三最上下淳至大淳至即最上義謂向發大心許盡衆生界無盡利益故曰深心四如來力無量者無量大攝取如來無量神力生物信故五善觀等即決定大於上妙法決定信解名善觀分別於諸衆生決定能度為勇猛力於所治障決能對治為智力無礙智現前通結上句六隨順自然智即隨順大七能受等即受持大能取大勝法授與衆生故八廣大如法界即是最妙大九究竟下即是住盡大佛子菩薩始發如是心即得超凡夫地入菩薩位生如來家無能說其種族過失離世間趣入出世道得菩薩法住菩薩處入三世平等於如來種中決定當得無上菩提第四佛子菩薩下有何相正顯得位福利之相文有九句初總餘別總云始發如是心者指前二段即得超凡夫地者以得出世間聖道故二入菩薩位下別有八種過論皆先法後喻此入聖位生如來家如世王子生王家故故句句皆有相似法一入位過初成出世間心如始住胎相似法二生如來家者即生家過相似法三無能下種姓過子相似法大乘行生故四離世下道過以非有漏故如王之體相似法故五得菩薩法即法體過以同體大悲為菩薩體如王以治國為體相似六住菩薩處者處過謂不住道是其住處不同凡小如世王子不處鄙陋七入三世平等者業過謂證平等真如以資慧命如無滋味則壽命夭促不堪紹繼相似八於如來下畢定過佛種不斷得無上道如世王子志氣成立決定紹位名成就相似總顯與地前不相似也菩薩住如是法名住菩薩歡喜地以不動相應故第二菩薩住下結住入位住如是法者指上四段名住歡喜地者是初住地義以不動相應故者釋成住義一證真理不復失故二乘異道不能動故上初四十句明住分竟下三十句釋名分佛子菩薩住歡喜地成就多歡喜多淨信多愛樂多適悅多欣慶多踊躍多勇猛多無鬪諍多無惱害多無瞋恨大文第二釋名分中有三十句初句總標次有十句明喜相後有二十句明喜因今別顯成就下釋喜相中十句初總有三喜云多歡喜一心喜謂入觀之心適悅二體喜出觀喜受相應三根喜由前心喜內充外及五根輕安調暢故此喜相亦名為樂別中九句前六自利喜行之體後三化他顯於喜能以內及觀心即無喜之喜不同二禪浮動之喜故名極喜喜之極故上釋喜相佛子菩薩住此歡喜地念諸佛故生歡喜念諸佛法故生歡喜念諸菩薩故生歡喜念諸菩薩行故生歡喜念清淨諸波羅蜜故生歡喜念諸菩薩地殊勝故生歡喜念菩薩不可壞故生歡喜念如來教化衆生故生歡喜念能令衆生得利益故生歡喜念入一切如來智方便故生歡喜二彰喜所因有二十句先念當得故喜後念現得故喜各有十句今初初句總餘別總云念諸佛者謂如諸佛所得我亦當得故判為念當得也別有九種一念佛法二念佛菩薩三念佛行四念佛淨五念佛勝六念佛不壞七念佛教化八念佛利益九念佛入皆念佛者為成佛故復作是念我轉離一切世間境界故生歡喜親近一切佛故生歡喜遠離凡夫地故生歡喜近智慧地故生歡喜永斷一切惡趣故生歡喜與一切衆生作依止處故生歡喜見一切如來故生歡喜生佛境界中故生歡喜入一切菩薩平等性中故生歡喜遠離一切怖畏毛竪等事故生歡喜第二念現得中二初正明所念二何以故下隨難徵釋前中十句初總餘別總云我轉離一切世間境界者轉離一切凡夫取著事故然事有粗有細粗則外六塵境通是一切凡夫取著境故細謂現前立少物謂是唯識性亦為地前凡夫取著境故別有九種轉離對前有何相中總別九句文雖不次法體全同以是念前福利相故揀異地前不相似故疏各配釋何以故此菩薩得歡喜地已所有怖畏悉得遠離所謂不活畏惡名畏死畏惡道畏大衆威德畏如是怖畏皆得永離二隨難徵釋由捨轉離文義廣故重徵釋之義有四重謂怖畏於離各有因果而文分五節一總徵二列名總答三轉徵四舉因顯相五菩薩如是下結酬初徵今初徵意云何以此中說離畏耶後答意云以五怖畏是初地障得初地時法爾離故又離此即是此地利益翻畏名喜此相最顯何以故此菩薩離我想故尚不愛自身何況資財是故無有不活畏不於他所希求供養唯專給施一切衆生是故無有惡名畏遠離我見無有我想是故無有死畏自知死已決定不離諸佛菩薩是故無有惡道畏我所志樂一切世間無與等者何況有勝是故無有大衆威德畏三轉徵者釋離畏所以也此之一徵文含四意一云何以名為不活畏耶二云何因而有此五畏耶此二是怖畏因果三云何以名為永離耶四云因何令此得永離耶此二是離畏因果若得因離自然無果次四舉因顯相以答者謂正舉離因顯離果相反顯畏因及畏果相故通有四意酬前四徵如不愛自身何況資財是離不活因則反顯愛身資財是不活畏因若不畏不活即是離畏因則反顯畏於不活是此畏果餘四例然又此離因即是能治其怖畏即是所治菩薩如是遠離驚怖毛竪等事五菩薩如是下結酬初徵前云何以能離今酬云如上三段所以能離上三十句釋名竟下三十句安住分佛子此菩薩以大悲為首廣大志樂無能沮壞轉更勤修一切善根而得成就自下大文第三佛子此菩薩以大悲下安住地分中有三初總明安住二所謂下別顯安住三佛子菩薩以成下總結安住今初文有三句一大悲為首是安住因菩薩所行皆為衆生悲為行本故云為首二廣大志樂無能沮壞是安住觀謂契理深心為大故煩惱不能壞悲化兼物為廣故小乘不能壞三更勤修一切善根而得成就是安住行下別顯安住有三十句即為三段所謂信增上故多淨信故解清淨故信決定故發生悲愍故成就大慈故心無疲懈故慚愧莊嚴故成就柔和故敬順尊重諸佛教法故二別顯安住即顯前勤修善根云何勤修文有三十句顯三種成就一信心成就二修行成就三回向成就信為行始次依信起行後回行成德以為行修次第今初信心十句增上者謂下所列諦實等境深信決定名為增上別中有九初六始起信心後三信增成欲前中初二自利後四利他日夜修習善根無厭足故親近善知識故常愛樂法故求多聞無厭足故如所聞法正觀察故心無依著故不耽著利養名聞恭敬故不求一切資生之物故生如寶心無厭足故第二日夜下修行成就中九句總云無厭足者即無間修別有八集前七教行後一證行前中初二攝法方便一親近集近善友意在不忘諸法故二樂法集於問答中論議解釋心喜樂故後五句次第修行於中前三內觀順理之行一多聞集即聞慧二正觀集即思慧三不染著即修慧於三昧中無依著故後二隨緣離著行謂六不貪集七不求集是少欲行未得不求故八如寶集即證行圓滿常現前故求一切智地故求如來力無畏不共佛法故求諸波羅蜜助道法故離諸諂誑故如說能行故常護實語故不汙如來家故不捨菩薩戒故生一切智心如山王不動故不捨一切世間事成就出世間道故集助菩提分法無厭足故常求上上殊勝道故第三求一切智下回向成就謂求一切智是回向菩提有十二句初句即所求之事名之為家一切智地是求處故下十一句即能求之因初句求如來力等顯能求之觀餘十句能求之行初求諸度名無障求謂求諸度無著法故能除蔽障下九句別別治諸障故一離求治於諂曲見乞者求詐現方便一向無心與故二如說能行求是治妄語謂許而不與等此治檀中二垢三者護求治戒一垢犯不覆藏故四不污求治忍一垢謂惱亂他業是污如來利益家故五不捨求治進一垢六不動求治禪二垢一者亂心外攀如山治之二者不能調伏憶想分別一切智心治之下三句治般若三垢謂七不捨成就求治障不住道垢八者集求治障助道垢九者常求證障證道垢於上勝妙證法之中願欲心薄故上來回向成就竟下總結佛子菩薩成就如是淨治地法名為安住菩薩歡喜地第三總結者上三十句廣勤行具足成就此勤行有四一信二欲三精進四方便信謂忍受決定欲謂希求趣彼行故初十句中前七是信後三是欲次十是精進對行造修後十是方便行成巧求故是名此地說分中安住故云成就如是淨治地法名為安住上安住分竟下第四校量勝分有三初願勝為標志遐廣二修行勝依願造修三果益勝即位行成就今初敘意然其勝義乃有衆多統而收之不出三種謂願行智此三歷位故有衆多略明十位一初發心勝二信勝三解勝四行勝五願勝上即三心六證入勝七從七地去權實自智勝八無功起行勝九上等諸佛勝十究竟勝所謂諸佛三心果滿故今此正明行願勝也言圓融者以稱性故一願之中具一切願即入重重六相圓融正在此文此是疏義其文未録佛子菩薩住此歡喜地能成就如是大誓願如是大勇猛如是大作用二正釋文中分二初顯十願彰自利行後明十盡句與衆生共今初分四初總標二所謂下別列三佛子菩薩住此歡喜地下總結四以此十願門為首下明攝眷屬初十願彰自利行初總標也能成就言該下三句如是一句始起要期次大勇猛乃起方便三大作用願遂行成所謂生廣大清淨決定解以一切供養之具恭敬供養一切諸佛令無有餘廣大如法界究竟如虗空盡未來際一切劫數無有休息初供養願總明供養論云供養勝田通師及三寶今從勝故但云供佛次云廣大如法界下彰願德言如法界攝功德大如虗空因大盡未來時大一切劫下明願分齊又發大願願受一切佛法輪願攝一切佛菩提願護一切諸佛教願持一切諸佛法廣大如法界究竟如虗空盡未來際一切劫數無有休息二受持願初句標願此受持亦名護法願次願行相四句皆通二利受謂受領攝謂攝屬謂攝授正法護謂防護持謂任持謂護持正法次廣大下願德能一切劫下願分齊又發大願願一切世界佛興于世從兜率天宮沒入胎住胎初生出家成道說法示現涅槃皆悉往詣親近供養為衆上首受行正法於一切處一時而轉廣大如法界究竟如虗空盡未來際一切劫數無有休息三轉法輪願初句標次一切世界轉處從兜率下轉時謂現八相時皆悉下二句攝法方便次於一切處下二句明轉法頓周次廣大下願德一切劫下轉分齊又發大願願一切菩薩行廣大無量不壞不雜攝諸波羅蜜淨治諸地總相別相同相異相成相壞相所有菩薩行皆如實說教化一切令其受行心得增長廣大如法界究竟如虗空盡未來際一切劫數無有休息四修行二利願願一切下明行相攝諸波羅蜜即是行體次淨治諸業即是行業總相下明行方便六相圓融自利如實說利他次教化一切下明心得增長廣大下願德末句願分齊又發大願願一切衆生界有色無色有想無想非有想非無想卵生胎生濕生化生三界所繫入於六趣一切生處名色所攝如是等類我皆教化令入佛法令永斷一切世間趣令安住一切智智道廣大如法界究竟如虗空盡未來際一切劫數無有休息五成熟衆生願就行相中初明所化衆生通有十類該盡三界但粗細不同有色為粗無色為細有想為粗無想為細非有想為細非無想為粗四生該於六道人傍生具四鬼通胎化二地獄及諸天中有唯化生人有卵生者毗舍佶夫人生三十二卵卵各出一兒般遮羅王妃生五百卵卵各一子濕生如頂生王從頂皰而生化生者如劫初起人皆化生我皆教化令入下別明所為謂未信者令信入佛法已信者令證入言斷世間趣謂業惑苦三道通因果次廣大下德能一切劫下分齊又發大願願一切世界廣大無量粗細亂住倒住正住若入若行若去如帝網差別十方無量種種不同智皆明了現前知見廣大如法界究竟如虗空盡未來際一切劫數無有休息六承事願願往諸佛土常見諸佛恆敬事聽受故願一切下承事行相初明所知次辨能知前中廣大下別有三種一一切相二真實義相三無量相今初界相不同故云一切小中含大故云無量粗細者明體質粗妙謂業報等殊亂住下謂安立不同亂則不依行伍倒即覆剎正即仰剎若入若行若住謂世界道路往來一者順後入即攝他入己去即為他所攝行即往來不住故如帝網差別即真實義相土土同體不守自性互相涉入如帝珠網故名真實智皆明了者辨能知也謂真實義相唯智能知故廣大下願德一切下分齊又發大願願一切國土入一國土一國土入一切國土無量佛土普皆清淨光明衆具以為莊嚴離一切煩惱成就清淨道無量智慧衆生充滿其中普入廣大諸佛境界隨衆生心而為示現皆令歡喜廣大如法界究竟如虗空盡未來際一切劫數無有休息七淨土願願清淨自土安立正法及能修行衆生故於行相中總有七淨一同體淨以同法性故令一多互相即入二普皆嚴淨者即自在淨如摩尼珠美惡斯現淨穢圓通故云普皆清淨三光明衆具下明莊嚴淨即相淨也四離一切下明受用淨謂受用此土離過成德故五無量智慧下住處衆生淨謂具德人居故六普入下因淨謂鏡智淨識及後智通慧為依故云是諸佛境界七隨衆生下果淨即臨機示現末二句德能分齊又發大願願與一切菩薩同一志行無有怨嫉集諸善根一切菩薩平等一緣常共集會不相捨離隨意能現種種佛身任其自心能知一切如來境界威力智慧得不退如意神通遊行一切世界現形一切衆會普入一切生處成就不思議大乘修菩薩行廣大如法界究竟如處空盡未來際一切劫數無有休息八不離願願與一切衆生處恆不離佛菩薩得同意行故行相中有十二句初一句總後句結中十別明菩薩行前五修行同後得不退下五德用同修菩薩行結也廣大下德能分齊又發大願願乘不退輪行菩薩行身語意業悉不唐捐若暫見者則必定佛法暫聞音聲則得實智慧才生淨信則永斷煩惱得如大藥王樹身得如如意寶身修行一切菩薩行廣大如法界究竟如虗空盡未來際一切劫數無有休息九利益願願於一切時恆作利益衆生事無有空過故行相中二先總明謂乘念不退圓滿教輪三業皆益若暫見下別顯有二不空一作業必定不空三業能安樂故謂見身行行聞口說法能生智慧念意實德諸惑不生得如大藥王樹下次利益不空二喻皆喻拔苦樹拔病苦寶拔貧苦廣大下德能分齊又發大願願於一切世界成阿耨多羅三藐三菩提不離一毛端處於一切毛端處皆悉示現初生出家詣道場成正覺轉法輪入涅槃十成正覺願願與一切衆生同時得無上菩提恆作佛事故行相中二初成菩提體即自運已圓次不離一毛下菩提作業即運他不息有七種業一從不離一毛至入涅槃是示成正覺業一切毛端是成佛處上云一切世界乃平漫十方此遍法界一一毛端極小量處皆於其中八相成道以彼皆有可化衆生故得佛境界大智慧力於念念中隨一切衆生心示現成佛令得寂滅二說實諦業謂說四真諦令悟實故以一三菩提知一切法界即涅槃相三證教化業以一極無二之菩提契差別性淨之涅槃則不復更滅說此證法令物生信名教化業以一音說法令一切衆生心皆歡喜四種種說法業一音稱機故示入大涅槃而不斷菩薩行五不斷佛種業涅槃常住動寂無二雙林應盡增物悲戀故云示入既非永滅常作佛事故佛種不斷此得果不捨因也示大智慧地安立一切法六法輪不住業大智慧地唯一事實即是佛智能生萬物終歸於此故名為地而智慧門隨機萬差名安立一切以法智通神足通幻通自在變化充滿一切法界七自在業三種通即自在所依法智通者觀一切法無性相故神足通者自身現生住滅修短隨心自在故幻通者轉變外事無不隨意廣大如法界究竟如虗空盡未來際一切劫數無有休息此彰德能分齊佛子菩薩住歡喜地發如是大誓願如是大勇猛如是大作用此總結十願也上十願竟以此十願門為首滿足百萬阿僧祇大願大文第四以此下明攝眷屬謂此十大願一一願中有百千萬阿僧祇大願以為眷屬則此十願攝無不盡上明十願彰自勤行竟下十盡句與衆生共佛子此大願以十盡句而得成就何等為十所謂衆生界盡世界盡虗空界盡法界盡涅槃界盡佛出現界盡如來智界盡心所緣界盡佛智所入境界界盡世間轉法轉智轉界盡此以十盡句與衆生共謂前十願皆為衆生由十無盡成前大願皆無盡也初句為總何等下徵釋有十句衆生為總餘九為別皆集成度生義故皆云盡者無斷盡故若衆生界盡我願乃盡若世界乃至世間轉法轉智轉界盡我願乃盡而衆生界不可盡乃至世間轉法轉智轉界不可盡故我此大願善根無有窮盡二大願成就中先反顯而衆生下順明無盡所以上校量勝中初願勝竟下二修行勝佛子菩薩發如是大願已則得利益心柔軟心隨順心寂靜心調伏心寂滅心謙下心潤澤心不動心不濁心第二佛子下修行勝即行校量有十種行就文分三初明行所依心二成淨信下顯所成行相三佛子菩薩如是下結十名體今初由先大願熏心故則得利益等十心為起行依於後十行起作自在故十行分九慈悲合故第二別顯行相列有十門一信行二悲三慈四施五無疲厭六知經論七了世法八慚愧莊嚴九堅固力十供養佛成淨信者有信功用能信如來本行所入信成就諸波羅蜜信入諸勝地信成就力信具足無所畏信生長不可壞不共佛法信不思議佛法信出生無中邊佛境界信隨入如來無量境界信成就果舉要言之信一切菩薩行乃至如來智地說力故二正釋中初成淨二句攝德成人次能信下正顯信相有十一句文分三別初能信如來一句總信因果次信成就下九句別明因果九中初二句為因餘七為果舉要下一句總信一切因果智地佛子此菩薩復作是念諸佛正法如是甚深如是寂靜如是寂滅如是空如是無相如是無願如是無染如是無量如是廣大第二雙辨慈悲二行中有二先明三觀為方便後菩薩見諸衆生下明所起之行前中三觀即為三段諸佛正法下九句明遠離最上第一義樂觀初總云佛法者唯佛教證所能顯故具下諸義所以甚深別有九種甚深而諸凡夫心墮邪見第二具足諸苦觀約十二因緣明之然十二因緣具業惑苦今但云苦觀者業惑是苦因故下文有二段初凡夫邪見總次無明下四行半經別明三支後三界田下別明後九支無明覆翳立憍慢高幢入渴愛網中行諂誑稠林不能自出心與慳嫉相應不捨恆造諸趣受生因緣後無明覆翳下別有九種邪見初五無明即具五種邪見次三是行後一是識支業及識種亦名邪見者邪見俱故邪見引故所以無明句多者顯一切煩惱皆能發潤而發業位無明力增故委明之憍慢諂誑慳嫉俱如論釋貪恚愚癡積集諸業日夜增長以忿恨風吹心識火熾然不息凡所作業皆顛倒相應次三句明行支初貪恚一句集業邪見次以忿恨風下二句別明行支吹心識火熾然邪見即內心思業為煩惱風次凡所作業即作業邪見即兼動身口欲流有流無明流見流相續起心識種子三欲流下第九心意識邪見明所引識支上明前際三支竟下明中後九支於三界田中復生苦芽所謂名色共生不離此名色增長生六處聚落於中相對生觸觸故生受因受生愛愛增長故生取取增長故生有三明中後九支文分三段初於三界下至有生明自相言自相者謂現在名色等支體狀別故次有生下至長苦聚明同相言同相者謂未來二支亦同現在有名色等故三是中下至如影像明顛倒相今初自相言三界乃所生之處復生苦芽即名色也言共生不離者謂與阿賴耶識共生不離也攝論云本識有三種相一自相謂本識自體二因相謂種子識三果相謂異熟識以有三相共通因果今言共生不離者意謂本識以所持雜染種子為因即感名色為異熟果是則識支因相一半在過去持餘雜染因一半與後名色所依故云共彼生謂名色但從種子依識而生不雜本識生也故過去三支唯有二支半中後有九支半如此方顯相續義也名色增長成餘八支非別有體有生故有生老死憂悲苦惱如是衆生生長苦聚二同相生及老死正顯同相言同相者謂未來二支亦同現在有名色等生死既同則苦亦同也如是下結前十二前二支支半為能生長後九支半為所生長是中皆空離我我所無知無覺無作無受如草木石壁亦如影像三顛倒相中言是中者是前十二因緣中皆空已下明倒所以由空謂有所以名倒以緣生無性故空離我我所釋成空義離我人空離所法空無知下釋無我我所知覺通外小外道僧佉說覺以為神相衛世說知以為神相皆執神為我今無知覺成上自體本無有我若約小乘就五蘊說受蘊名覺三蘊名知約六根說身識名覺餘五名知五陰造業故云作者當陰招報故云受者今並遣之故都云無如草木下喻無知覺義然諸衆生不覺不知第三彼二顛倒觀妄苦本空得而不覺真樂本有失而不知遠樂就苦名彼顛倒上三觀為方便竟菩薩見諸衆生於如是苦聚不得出離是故即生大悲智慧復作是念此諸衆生我應救拔置於究竟安樂之處是故即生大慈光明智第二正起慈悲初明興悲謂見苦應拔次復作下興慈謂無樂應與既言具苦必不知樂故十行中上合二三慈悲行竟下施行佛子菩薩摩訶薩隨順如是大悲大慈以深重心住初地時於一切物無所吝惜求佛大智修行大捨第四施行於中三段初總明施行二別顯施物三總結行成今初文有五句一明施所依即大慈悲二以深重下彰其施位以初地檀度得圓滿故於一切下明施體相求佛大智顯施所為結施行名凡是所有一切能施所謂財穀倉庫金銀摩尼真珠琉璃珂貝璧玉珊瑚等物珍寶瓔珞嚴身之具象馬車乘奴婢人民城邑聚落園林臺觀妻妾男女內外眷屬及餘所有珍玩之具頭目手足血肉骨髓一切身分皆無所惜二凡是所有下別明施物偏顯上文一切無吝施有二種一外施謂財穀四事等二內施即頭目等為求諸佛廣大智慧是名菩薩住於初地大捨成就三為求下總結行成先結所為是名下正結行成然初地行應具三施從增勝說但舉於財二三地中方得無畏四地已上乃行法施四施行竟佛子菩薩以此慈悲大施心為欲救護一切衆生轉更推求世出世間諸利益事無疲厭故即得成就無疲厭心第五無疲厭行中有三初牒前起後次轉更下正顯行相三即得下結共成行五無疲厭行竟得無疲厭心已於一切經論心無怯弱無怯弱故即得成就一切經論智六成知經論智行獲是智已善能籌量應作不應作於上中下一切衆生隨應隨力隨其所習如是而行是故菩薩得成世智七成就世智行言隨應者隨機所應宜以何法隨力者隨己智力所能隨他智力所堪隨其所習者約機現作論釋隨宜成世智已知時知量以慚愧莊嚴勤修自利利他之道是故成就慚愧莊嚴八慚愧行知時下正顯行相時有三種一者念時如是時中宜修定等剎那不間故二日夜時晝則存心初中後夜亦勿廢故三所作必不斷時此即知量謂量力所能亦愛亦策勿令過分有休廢故以此之時修前八科二利之行煩惱睡蛇晝夜不雜為慚愧服而自莊嚴八慚愧行於此行中勤修出離不退不轉成堅固力第九成堅固力謂此即前慚愧二利行中欲早求度應當精勤不退自分不轉勝進九堅固力行得堅固力已勤供諸佛於佛教法能如說行第十供養行利養供養通二供養佛子菩薩如是成就十種淨諸地法所謂信悲慈捨無有疲厭知諸經論善解世法慚愧堅固力供養諸佛依教修行大文第三佛子下結十名體用先結體用所謂下結名言體用者此十即是淨諸地法以治十障故障如前說問前安住地分有三十句亦名信慈悲等與此何異論答云前是清淨此地法以局初地今盡是盡淨諸地障此十種法於一切地能淨修治故上第二修行勝依願造修竟大文第三果利益校量勝即位果有四種果一調柔果二發趣果三攝報果四願智果通稱果者地中滿足故別言調柔者謂調鍊柔熟以供養攝化等為能調鍊信等十行為所調鍊由行供等令信調柔隨意堪用故名調柔下鍊金喻其義甚顯二發趣者發謂發進趣謂趣向發自此地趣向後後為所發趣下商人喻義甚相似三攝報果者王位之身酬因名報因成納果故名為攝四內證願力教智自在令業用無邊故名願智果發趣文局初地義通十地餘三義局初地文通十地佛子菩薩住此歡喜地已以大願力得見多佛所謂見多百佛多千佛多百千佛多億佛多百億佛多千億佛多百千億佛多億那由他佛多百億那由他佛多千億那由他佛多百千億那由他佛第五四果即為四別今初調柔果文有法喻合法中四者一見佛為鍊行緣二悉以下所鍊行體三以前二下別地行相四是菩薩隨所下鍊行成熟初中以大願力是見佛因力兼神力故論云以勝通幻見色身佛以正願力見法身佛即功德法身言多百者是多箇百多箇千然一中已攝於多理實入華藏剎海見法界身雲也悉以大心深心恭敬尊重承事供養衣服飲食臥具醫藥一切資生悉以奉施亦以供養一切衆僧以此善根皆悉回向無上菩提佛子此菩薩因供養諸佛故得成就衆生法二所鍊行體中以行入行故名為鍊如金入火然有三種入一入功德即供佛行去薄福垢二以此善根下入無上果即回向上去下劣垢三佛子此菩薩下入大悲心即利生行去懈怠垢以前二攝攝取衆生謂布施愛語後二攝法但以信解力故行未善通達是菩薩十波羅蜜中檀波羅蜜增上餘波羅蜜非不修行但隨力隨分三別地行相中先約四攝然四攝望前猶是利生法望後為別地行相以因利生之便故此明之愛語是法施初地檀滿故說二增為別地證相各說一增以十地難分故寄十度以顯差別其實地地具修稱性圓融一具一切是菩薩隨所勤修供養諸佛教化衆生皆以修行清淨地法所有善根悉以回向一切智地轉轉明淨調柔成就隨意堪用四所鍊行成熟中總收三入初牒供佛化生以為能練信等淨法以為所鍊後舉前回向能鍊信等淨也言轉轉者此之信等於初地中三節淨謂初住地時證前緣修令成真修已是一淨二行校量中對除障法復一度淨今此地後更歷三修故云轉轉佛子譬如金師善巧鍊金數數入火轉轉明淨調柔成就隨意堪用第二喻中金師喻菩薩金喻信等火喻供等三行三行非一名數數入調柔成就喻鍊行成就信等衆行未證真前但約緣修為對治行妄識為體證真之後乃知信等非是今有即如來藏中恆沙佛法真心為體今已證真寄相顯真故分能所菩薩亦復如是供養諸佛教化衆生皆為修行清淨地法所有善根悉以回向一切智地轉轉明淨調柔成就隨意堪用第三法合準喻可知佛子菩薩摩訶薩住於初地應從諸佛菩薩善知識所推求請問於此地中相及得果無有厭足為欲成就此地法故亦應從諸佛菩薩善知識所推求請問第二地中相及得果無有厭足為欲成就彼地法故亦應如是推求請問第三第四第五第六第七第八第九第十地中相及得果無有厭足為欲成就彼地法故第二發趣果中二初正明發趣果後佛子是名下總結地相前中有四一法二喻三合四結法中亦四一問二知三行四到知是明解正能發趣然由問故知所以先問知意在行行必能到初地已滿而更問者一問勝進二問一地之中具攝一切諸地功德故問中相及得果者相即隨諸地中所有諸障及對治相故謂諸地能所觀相得者即正證出世間智故果者因證智力得世間出世間智故相即方便智得是根本智果即後得後得緣俗故名世間無分別故復名出世是菩薩善知諸地障對治善知地成壞善知地相果善知地得修善知地法清淨善知地地轉行善知地地處非處善知地地殊勝智善知地地不退轉善知淨治一切菩薩地乃至轉入如來地第二明知由問故知知不異問故佛子菩薩如是善知地相始於初地起行不斷如是乃至入第十地無有斷絶由此諸地智光明故成於如來智慧光明第三佛子下行次由此下到並可知佛子譬如商主善知方便欲將諸商人往詣大城未發之時先問道中功德過失及住止之處安危可不然後具道資糧作所應作佛子彼大商主雖未發足能知道中所有一切安危之事善以智慧籌量觀察備其所須令無乏少將諸商衆乃至安隱到彼大城身及衆人悉免憂患第二喻中初喻前問有二方便一不迷方便道中喻行因住止喻得地各有障治故曰安危二資具方便具資糧故不迷多約利他資具多明自利次佛子彼大商主下喻知善以智慧下喻行四乃至下喻到佛子菩薩商主亦復如是住於初地善知諸地障對治乃至善知一切菩薩地清淨轉入如來地然後乃具福智資糧將一切衆生經生死曠野險難之處安隱得至薩婆若城身及衆生不經患難第三合中初合知然後下合行安隱下合到喻中略行合中略問欲影顯耳是故菩薩常應匪懈勤修諸地殊勝淨業乃至趣入如來智地第四結勸可知佛子是名略說菩薩摩訶薩入菩薩初地門廣說則有無量無邊百千阿僧祇差別事第二佛子下總結地相行修已竟故於此結前說分齊深故說其一分此中廣故說所不盡佛子菩薩摩訶薩住此初地多作閻浮提王豪貴自在常護正法大文第三攝報果利益勝中分二先明在家果後是菩薩若欲下出家果前中復二初上勝身顯其報勝後能以大施下明上勝果今初閻浮提王者即鐵輪王常護正法應是行勝能以大施攝取衆生善除衆生慳貪之垢常行大施無有窮盡布施愛語利益同事二上勝果者依前王報起於勝行是身之果於中二初行後願前中亦二一大悲利他謂若施若攝如是一切諸所作業皆不離念佛不離念法不離念僧不離念同行菩薩不離念菩薩行不離念諸波羅蜜不離念諸地不離念力不離念無畏不離念不共佛法乃至不離念具足一切種一切智智二不失自利正作利他業時即不離念佛等故謂利他事中回向菩提故成大功德事不生分別故除諸妄想順理合體故云不離復作是念我當於一切衆生中為首為勝為殊勝為妙為微妙為上為無上為導為將為帥乃至為一切智智依止者二復作下明願有十一句前七自德後四攝化首唯是總謂大菩提位尊高故妙等唯別勝大亦總亦別導謂分別法義將者令他得證義滅諸煩惱故後二約智前因後果帥者教令入正道故後句以大菩提而教化故是菩薩若欲捨家於佛法中勤行精進便能捨家妻子五欲依如來教出家學道既出家已勤行精進於一念頃得百三昧得見百佛知百佛神力能動百佛世界能過百佛世界能照百佛世界能教化百世界衆生能住壽百劫能知前後際各百劫事能入百法門能示現百身於一一身能示百菩薩以為眷屬第二出家果中初捨俗出家後既出已下謂既為眷屬修行剋證禪定勝業勝業有二一者三昧勝即勝定體二三昧所作勝謂因三昧得見佛等文有十一句明其二利初二句自利一見百佛者十方各十他受用身二知神力取其所加次四句利他有信機者動剎現通次三有悟機者往剎光照正授以法次有二句竪論二利留命住劫後三句二利速疾若以菩薩殊勝願力自在示現過於是數百劫千劫百千劫乃至百千億那由他劫不能數知第四願智果正願久積以智內照故其自在示現難可窮究則顯上來百數彰地階差非定爾也今行合法界是圓融實德故云過此下偈頌爾時金剛藏菩薩欲重宣其義而說頌言若人集衆善具足白淨法供養天人尊隨順慈悲道信解極廣大志樂亦清淨為求佛智慧發此無上心第二應頌四十六偈半大段分二初正頌前次二結說前中分四初十一偈頌住分又四初二頌依何身淨一切智力及以無所畏成就諸佛法救攝羣生衆為得大慈悲及轉勝法輪嚴淨佛國土發此最勝心一念知三世而無有分別種種時不同以示於世間略說求諸佛一切勝功德發生廣大心量等虗空界次四偈頌為何義悲先慧為主方便共相應信解清淨心如來無量力無礙智現前自悟不由他具足同如來發此最勝心次二偈頌以何因佛子始發生如是妙寶心則超凡夫位入佛所行處生在如來家種族無瑕玷與佛共平等決成無上覺才生如是心即得入初地志樂不可動譬如大山王後三偈頌有何相多喜多愛樂亦復多淨信極大勇猛心及以慶躍心遠離於鬪諍惱害及瞋恚慚敬而質直善守護諸根救世無等者所有衆智慧第二五偈頌釋名分先二偈半頌喜相此處我當得憶念生歡喜餘頌喜因於中先半偈頌念當得始得入初地即超五怖畏不活死惡名惡趣衆威德以不貪著我及以與我所是諸佛子等遠離諸怖畏後二偈頌念現得常行大慈愍恆有信恭敬慚愧功德備日夜增善法樂法真實利不愛受諸欲三有六偈頌安住地分初一偈半頌信心成就思惟所聞法遠離取著行不貪於利養唯樂佛菩提一心求佛智專精無異念次一偈半頌修行成就修行波羅蜜遠離諂虗誑如說而修行安住實語中不汙諸佛家不捨菩薩戒不樂於世事常利益世間修善無厭足轉求增勝道如是好樂法功德義相應後三偈頌回向成就恆起大願心願見於諸佛護持諸佛法攝取大仙道常生如是願修行最勝行成熟諸羣生嚴淨佛國土一切諸佛剎佛子悉充遍平等共一心所作皆不空一切毛端處一時成正覺如是等大願無量無邊際虗空與衆生法界及涅槃世間佛出興佛智心境界如來智所入及以三轉盡彼諸若有盡我願方始盡如彼無盡期我願亦復然恆起下二十二偈半頌校量勝分於中三初六偈半頌願校量如是發大願心柔軟調順能信佛功德觀察於衆生知從因緣起則興慈念心如是苦衆生我今應救脫為是衆生故而行種種施王位及珍寶乃至象馬車頭目與手足乃至身血肉一切皆能捨心得無憂悔求種種經書其心無厭倦善解其義趣能隨世所行慚愧自莊嚴修行轉堅固供養無量佛恭敬而尊重次六偈頌行校量如是常修習日夜無懈倦善根轉明淨如火鍊真金菩薩住於此淨修於十地所作無障礙具足不斷絶後十偈頌果校量初二偈頌調柔果譬如大商主為利諸商衆問知道險易安隱至大城菩薩住初地應知亦如是勇猛無障礙到於第十地次二偈頌發趣果住此初地中作大功德王以法化衆生慈心無損害統領閻浮地化行靡不及皆令住大捨成就佛智慧欲求最勝道捨己國王位能於佛教中勇猛勤修習則得百三昧及見百諸佛震動百世界光照行亦爾化百土衆生入於百法門能知百劫事示現於百身及現百菩薩以為其眷屬次五偈頌攝報果若自在願力過是數無量後半偈頌願智果我於地義中略述其少分若欲廣分別億劫不能盡菩薩最勝道利益諸羣生如是初地法我今已說竟二偈結說初歡喜地竟
