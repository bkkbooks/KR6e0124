body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈明法品第十八此品來意者前明當位所成之德今明趣後勝進之行又前明發心之勝德今辨所具之行相故次來也釋名者準梵具翻應云法光明品統有四義一法慧智慧於能所詮進趣行法分明照了故即明所知法二明能詮以能顯行故法是所詮可軌則故此則詮旨全目明有法故法之明故通持業依主二釋三明是智用法是理行及果境智合説俱是所詮法之明明之法依主釋也四所修行法體離無明亦唯所詮有明之法法即是明通有財持業二釋也宗趣者明法不同略有四種謂教理行果尋教悟理觀理起行行成得果皆初宗後趣又此四皆宗為成後位及成勝德為趣爾時精進慧菩薩白法慧菩薩言釋文中大分為三分一請説分二正説分三結説今初先長行後祗夜前中亦二初敘問答之人勝進趨後非勤不能故精進慧問佛子菩薩摩訶薩初發求一切智心成就如是無量功德具大莊嚴升一切智乘入菩薩正位捨諸世間法得佛出世法去來現在諸佛攝受決定至於無上菩提究竟之處此下第二正申所問亦分為二初領前自分勝德後請説勝進之行前中先總後具大下有七句一領德即前莊嚴佛不共法二領乘即已住究竟一乘三領位位不退故四領道住離生因故五領法得出世法故六得勝緣即佛護讚等七領當果至菩提故德雖無量不出此七彼諸菩薩於佛教中云何修習令諸如來皆生歡喜入諸菩薩所住之處一切大行皆得清淨所有大願悉使滿足獲諸菩薩廣大之藏隨所應化常為説法而恆不捨波羅蜜行所念衆生咸令得度紹三寶種使不斷絶善根方便皆悉不虗佛子彼諸菩薩以何方便能令此法當得圓滿願垂哀愍為我宣説此諸大會靡不樂聞此請説勝進行有二先問所成行體後問行成德用以破癡等為德用故此先問行體也問有十句初五自利兼他次四利他兼自末結不虗後彼諸下結請復次如諸菩薩摩訶薩常勤修習滅除一切無明黑暗降伏魔怨制諸外道永滌一切煩惱心垢悉能成就一切善根永出一切惡趣諸難淨治一切大智境界成就一切菩薩諸地諸波羅蜜總持三昧六通三明四無所畏清淨功德莊嚴一切諸佛國土及諸相好身語心行成就滿足善知一切諸佛如來力無所畏不共佛法一切智智所行境界為欲成熟一切衆生隨其心樂而取佛土隨根隨時如應説法種種無量廣大佛事及餘無量諸功德法諸行諸道及諸境界皆悉圓滿疾與如來功德平等第二問行成德用有二先問因行次問成果德此問因也有十二事一問云何滅無明二問降魔三問制外道四問斷煩惱五問善根以何而成六問三惡八難云何可出七問淨治境八問地等功德云何成就九問三業功德云何莊嚴滿足十以何觀力知佛功德十一一切境智復云何知十二何法能成就衆生乃至作大佛事後及餘無量下結因成果德也於諸如來應正等覺百千阿僧祇劫修菩薩行時所集法藏悉能守護開示演説諸魔外道無能沮壞攝持正法無有窮盡於一切世界演説法時天王龍王夜叉王乾闥婆王阿修羅王迦樓羅王緊那羅王摩睺羅伽王人王梵王如來法王皆悉守護一切世間恭敬供養同灌其頂常為諸佛之所護念一切菩薩亦皆愛敬得善根力增長白法開演如來甚深法藏攝持正法以自莊嚴一切菩薩所行次第願皆演説第二於諸如來下顯等佛之用護持正法便等佛故文有十句初句為總謂開示演説皆正法也下九句知明一魔不能侵二攝持修行三十王外護四舉世同欽五諸佛灌頂六菩薩愛敬七得衆善根八能演深法九攝德自嚴若得此九方名護法後一切下結請爾時精進慧菩薩欲重宣其義而説頌言大名稱者善能演菩薩所成功德法深入無邊廣大行具足清淨無師智若有菩薩初發心成就福德智慧乘入離生位超世間普獲正等菩提法彼復云何佛教中堅固勤修轉增勝令諸如來悉歡喜佛所住地速當入所行清淨願皆滿及得廣大智慧藏常能説法度衆生而心無依無所著菩薩一切波羅蜜悉善修行無缺減所念衆生咸救度常持佛種使不絶所作堅固不唐捐一切功成得出離如諸勝者所修行彼清淨道願宣説永破一切無明暗降伏衆魔及外道所有垢穢悉滌除得近如來大智慧永離一切諸險難淨治大智殊勝境獲妙道力鄰上尊一切功德皆成就證得如來最勝智住於無量諸國土隨衆生心而説法及作廣大諸佛事云何而得諸妙道開演如來正法藏常能受持諸佛法無能超勝無與等云何無畏如師子所行清淨如滿月云何修習佛功德猶如蓮華不著水第二偈文重頌有十一偈初一偈讚能説次一偈頌前次四偈頌所修行體後五偈頌行所成德分二前三頌所成因德後二結因成果德爾時法慧菩薩告精進慧菩薩言善哉佛子汝今為欲多所饒益多所安樂多所惠利哀愍世間諸天及人問於如是菩薩所修清淨之行佛子汝住實法發人精進增長不退已得解脫能作是問同於如來諦聽諦聽善思念之我今承佛威神之力為汝於中説其少分第二正答文中先讚問利益能問具德誡聽許説佛子菩薩摩訶薩已發一切智心應離癡暗精勤守護無令放逸此下正答文中先答所成行體後答行成德用初中答前十問即為十段今初段中有五十句前二十句答前修習後三十句答令佛歡喜今總標不放逸遍下十段皆由不放逸成是修習相不守根門是名放逸佛子菩薩摩訶薩住十種法名不放逸何者為十一者護持衆戒二者遠離愚癡淨菩提心三者心樂質直離諸諂誑四者勤修善根無有退轉五者恆善思惟自所發心六者不樂親近在家出家一切凡夫七者修諸善業而不願求世間果報八者永離二乘行菩薩道九者樂修衆善令不斷絶十者恆善觀察自相續力佛子若諸菩薩行此十法是則名為住不放逸初答第一段修習有二十句前十句始修後十句終成今初始修文有標徵列結四節後皆倣此佛子菩薩摩訶薩住不放逸得十種清淨何者為十一者如説而行二者念智成就三者住於深定不沉不舉四者樂求佛法無有懈息五者隨所聞法如理觀察具足出生巧妙智慧六者入深禪定得佛神通七者其心平等無有高下八者於諸衆生上中下類心無障礙猶如大地等作利益九者若見衆生乃至一發菩提之心尊重承事猶如和尚十者於授戒和尚及阿闍梨一切菩薩諸善知識法師之所常生尊重承事供養佛子是名菩薩住不放逸十種清淨三答修習終成謂此十種清淨皆由不放逸成佛子菩薩摩訶薩住不放逸發大精進起於正念生勝欲樂所行不息於一切法心無依處於甚深法能勤修習入無諍門增廣大心佛法無邊能順了知令諸如來皆悉歡喜次答令佛歡喜有三十句初十句結前生後即牒前十種清淨佛子菩薩摩訶薩復有十法能令一切諸佛歡喜何者為十一者精進不退二者不惜身命三者於諸利養無所希求四者知一切法皆如虗空五者善能觀察普入法界六者知諸法印心無倚著七者常發大願八者成就清淨忍智光明九者觀自善法心無增減十者依無作門修諸淨行佛子是為菩薩住十種法能令一切如來歡喜此十句答正成行相前明即前修習故令佛歡喜今更別明修相於中法印疏有多釋佛子復有十法能令一切諸佛歡喜何者為十所謂安住不放逸安住無生忍安住大慈安住大悲安住滿足諸波羅蜜安住諸行安住大願安住巧方便安住勇猛力安住智慧觀一切法皆無所住猶如虗空佛子若諸菩薩住此十法能令一切諸佛歡喜後有十句顯純熟究竟行修行成熟故云安住亦由前十成此十種但生熟異耳上答初問五十句竟佛子有十種法令諸菩薩速入諸地何等為十一者善巧圓滿福智二行二者能大莊嚴波羅蜜道三者智慧明達不隨他語四者承事善友恆不捨離五者常行精進無有懈怠六者善能安住如來神力七者修諸善根不生疲倦八者深心利智以大乘法而自莊嚴九者於地地法門心無所住十者與三世佛善根方便同一體性佛子此十種法令諸菩薩速入諸地此答第二入菩薩所住處問文有三段初有十法起入地行次有十一句明住地觀修後九句明地要勝今初復次佛子諸菩薩初住地時應善觀察隨其所有一切法門隨其所有甚深智慧隨所修因隨所得果隨其境界隨其力用隨其示現隨其分別隨其所得悉善觀察知一切法皆是自心而無所著如是知已入菩薩地能善安住二復次下明住地觀修言住地觀修者梁論云地者對治我皆言隨其者諸地非一故皆自心者智與心相應故佛子彼諸菩薩作是思惟我等宜應速入諸地何以故我等若於地地中住成就如是廣大功德具功德已漸入佛地住佛地已能作無邊廣大佛事是故宜應常勤修習無有休息無有疲厭以大功德而自莊嚴入菩薩地三佛子下顯地要勝佛子有十種法令諸菩薩所行清淨何等為十一者悉捨資財滿衆生意二者持戒清淨無所毀犯三者柔如忍辱無有窮盡四者勤修諸行永不退轉五者以正念力心無迷亂六者分別了知無量諸法七者修一切行而無所著八者其心不動猶如山王九者廣度衆生猶如橋梁十者知一切衆生與諸如來同一體性佛子是為十法令諸菩薩所行清淨第三答大行清淨問有二十句初十句是因後十句是果今初行成出障故云清淨菩薩既得行清淨已復得十種增勝法何等為十一者他方諸佛皆悉護念二者善根增勝超諸等列三者善能領受佛加持力四者常得善人為所依怙五者安住精進恆不放逸六者知一切法平等無異七者心恆安住無上大悲八者如實觀法出生妙慧九者能善修行巧妙方便十者能知如來方便之力佛子是為菩薩十增勝法第二菩薩既得下由行淨因得勝法果十皆增勝法佛子菩薩有十種清淨願何等為十一願成熟衆生無有疲倦二願具行衆善淨諸世界三願承事如來常生尊重四願護持正法不惜軀命五願以智觀察入諸佛土六願與諸菩薩同一體性七願入如來門了一切法八願見者生信無不獲益九願神力住世盡未來劫十願具普賢行淨治一切種智之門佛子是為菩薩十種清淨願第四答大願問有二十句初十起勝淨願後十勵志令滿今初全同初地十願佛子菩薩住十種法令諸大願皆得圓滿何等為十一者心無疲厭二者具大莊嚴三者念諸菩薩殊勝願力四者聞諸佛土悉願往生五者深心長久盡未來劫六者願悉成就一切衆生七者住一切劫不以為勞八者受一切苦不生厭離九者於一切樂心無貪著十者常勤守護無上法門二令願成滿者由斯十句能滿前十及餘多願於中五深心則可久六悉成則可大可久則菩薩之德可大則菩薩之業佛子菩薩滿足如是願時即得十種無盡藏何等為十所謂普見諸佛無盡藏總持不忘無盡藏決了諸法無盡藏大悲救護無盡藏種種三昧無盡藏滿衆生心廣大福德無盡藏演一切法甚深智慧無盡藏報得神通無盡藏住無量劫無盡藏入無邊世界無盡藏佛子是為菩薩十無盡藏第五答獲菩薩藏問謂由前行願蘊集成藏故文有十句菩薩得是十種藏已福德具足智慧清淨於諸衆生隨其所應而為説法佛子菩薩云何於諸衆生隨其所應而為説法所謂知其所作知其因緣知其心行知其欲樂貪欲多者為説不淨瞋恚多者為説大慈愚癡多者教勤觀察三毒等者為説成就勝智法門樂生死者為説三苦若著處所説處空寂心懈怠者説大精進懷我慢者説法平等多諂誑者為説菩薩其心質直樂寂靜者廣為説法令其成就菩薩如是隨其所應而為説法為説法時文相連屬義無舛謬觀法先後以智分別是非審定不違法印次第建立無邊行門令諸衆生斷一切疑善知諸根入如來教證真實際知法平等斷諸法愛除一切執常念諸佛心無暫捨了知音聲體性平等於諸言説心無所著巧説譬喻無相違反悉令得悟一切諸佛隨應普現平等智身第六答隨所應化常為説法問文分三初菩薩得是下四句結前生後次云何下徵以標起三所謂下正解其義於中初所謂下知器次貪欲多者下授法次為説法時下具德成益菩薩如是為諸衆生而演説法則自修習增長義利不捨諸度具足莊嚴波羅蜜道是時菩薩為令衆生心滿足故內外悉捨而無所著是則能淨檀波羅蜜具持衆戒而無所著永離我慢是則能淨尸波羅蜜悉能忍受一切諸惡於諸衆生其心平等無有動搖譬如大地能持一切是則能淨忍波羅蜜普發衆業常修靡懈諸有所作恆不退轉勇猛勢力無能制伏於諸功德不取不捨而能滿足一切智門是則能淨精進波羅蜜於五欲境無所貪著諸次第定悉能成就常正思惟不住不出而能銷滅一切煩惱出生無量諸三昧門成就無邊大神通力逆順次第入諸三昧於一三昧門入無邊三昧門悉知一切三昧境界與一切三昧三摩鉢底智印不相違背能速入於一切智地是則能淨禪波羅蜜於諸佛所聞法受持近善知識承事不倦常樂聞法心無厭足隨所聽受如理思惟入真三昧離諸僻見善觀諸法得實相印了知如來無功用道乘普門慧入於一切智智之門永得休息是則能淨般若波羅蜜示現一切世間作業教化衆生而不厭倦隨其心樂而為現身一切所行皆無染著或現凡夫或現聖人所行之行或現生死或現涅槃善能觀察一切所作示現一切諸莊嚴事而不貪著遍入諸趣度脫衆生是則能淨方便波羅蜜盡成就一切衆生盡莊嚴一切世界盡供養一切諸佛盡通達無障礙法盡修行遍法界行身恆住盡未來劫智盡知一切心念盡覺悟流轉還滅盡示現一切國土盡證得如來智慧是則能淨願波羅蜜具深心力無有雜染故具深信力無能摧伏故具大悲力不生疲厭故具大慈力所行平等故具總持力能以方便持一切義故具辨才力令一切衆生歡喜滿足故具波羅蜜力莊嚴大乘故具大願力永不斷絶故具神通力出生無量故具加持力令信解領受故是則能淨力波羅蜜知貪欲行者知瞋恚行者知愚癡行者知等分行者知修學地行者一念中知無邊衆生行知無邊衆生心知一切法真實知一切如來力普覺悟法界門是則能淨智波羅蜜第七菩薩如是下答恆不捨離諸波羅蜜問於中二先結前生後則前正説法時便具十度謂自修此亦為利他一向大悲了平等故通至佛果故皆名道次是時菩薩下正是不捨度相十度即為十段皆先辨相後是則下結名於中禪波羅蜜疏有廣釋佛子菩薩如是清淨諸波羅蜜時圓滿諸波羅蜜時不捨諸波羅蜜時住大莊嚴菩薩乘中隨其所念一切衆生皆為説法令增淨業而得度脫墮惡道者教使發心在難中者令勤精進多貪衆生示無貪法多瞋衆生令行平等著見衆生為説緣起欲界衆生教離欲恚惡不善法色界衆生為其宣説毗鉢舍那無色界衆生為其宣説微妙智慧二乘之人教寂靜行樂大乘者為説十力廣大莊嚴如其往昔初發心時見無量衆生墮諸惡道大師子吼作如是言我當以種種法門隨其所應而度脫之菩薩具足如是智慧廣能度脫一切衆生第八佛子下答前所念衆生咸令得度問於中初結前生後次墮惡道者下正明化度後如其往昔下結如本誓故能真度師子吼者決定度故佛子菩薩具足如是智慧令三寶種永不斷絶所以者何菩薩摩訶薩教諸衆生發菩提心是故能令佛種不斷常為衆生開闡法藏是故能令法種不斷善持教法無所乖違是故能令僧種不斷復次悉能稱讚一切大願是故能令佛種不斷分別演説因緣之門是故能令法種不斷常勤修習六和敬法是故能令僧種不斷復次於衆生田中下佛種子是故能令佛種不斷護持正法不惜身命是故能令法種不斷統理大衆無有疲倦是故能令僧種不斷復次於去來今佛所説之法所制之戒皆悉奉持心不捨離是故能令佛法僧種永不斷絶第九佛子下答前紹三寶種使不斷絶問文分三初仍前總標次所以下徵釋所由由化衆生入三寶海故能紹前令不斷也文有四番為成十句前九別明後一總結謂弘法奉戒三學兼修則不斷三寶化化不絶菩薩如是紹隆三寶一切所行無有過失隨有所作皆以回向一切智門是故三業皆無瑕玷無瑕玷故所作衆善所行諸行教化衆生隨應説法乃至一念無有錯謬皆與方便智慧相應悉以向於一切智智無空過者第十菩薩如是下答前善根方便皆悉不空問先略後廣略中分三初結前生後次隨有所作下三業無瑕後無瑕玷故下明不所作言瑕玷者玉之內病曰瑕瑕謂體破外病曰玷玷謂色汗以顯三業內外無失上略明菩薩如是修習善法念念具足十種莊嚴何者為十所謂身莊嚴隨諸衆生所應調伏而為示現故語莊嚴斷一切疑皆令歡喜故心莊嚴於一念中入諸三昧故佛剎莊嚴一切清淨離諸煩惱故光明莊嚴放無邊光普照衆生故衆會莊嚴普攝衆會皆令歡喜故神通莊嚴隨衆生心自在示現故正教莊嚴能攝一切聰慧人故涅槃地莊嚴於一處成道周遍十方悉無餘故巧説莊嚴隨處隨時隨其根器為説法故菩薩成就如是莊嚴於念念中身語意業皆無空過悉以回向一切智門第二菩薩如是下廣明不空文有二段初明自業不空次若有衆生下明利他不空初中雖明不空義兼無失以一切清淨離煩惱故又此無失即自業不空順止寂故又有標徵釋結次菩薩成就下結也若有衆生見此菩薩當知亦復無空過者以必當成阿耨多羅三藐三菩提故若聞名若供養若同住若憶念若隨出家若聞説法若隨喜善根若遙生欽敬乃至稱揚讚歎名字皆當得阿耨多羅三藐三菩提佛子譬如有藥名為善見衆生見者衆毒悉除菩薩如是成就此法衆生若見諸煩惱毒皆得除滅善法增長二明利他不空於中有法喻合佛與菩薩俱益不空今不見者不宜見故見不益者無行力故亦遠益故上來並答初所成行問竟下答行所成德問佛子菩薩摩訶薩住此法中勤加修習以智慧明滅諸癡暗以慈悲力摧伏魔軍以大智慧及福德力制諸外道以金剛定滅除一切心垢煩惱以精進力集諸善根以淨佛土諸善根力遠離一切惡道諸難以無所著力淨智境界以方便智慧力出生一切菩薩諸地諸波羅蜜及諸三昧六通三明四無所畏悉令清淨以一切善法力成滿一切諸佛淨土無邊相好身語及心具足莊嚴以智自在觀察力知一切如來力無所畏不共佛法悉皆平等以廣大智慧力了知一切智智境界以往昔誓願力隨所應化現佛國土轉大法輪度脫無量無邊衆生大文第二答行所成德問前問文有二今答亦二段第一答以行成因德二答以因成果德今初具答十二問各有二句皆上句答下句上云修何滅癡今答云以智慧明他皆倣此佛子菩薩摩訶薩勤修此法次第成就諸菩薩行乃至得與諸佛平等第二佛子下答以因成果德以前問中有因德有果德上答因德今此下答所成果德初勤修此法至諸佛平等先結因成果謂但能勤修上來諸行則能次第從因得果於無邊世界中為大法師護持正法二正答所成之德謂護持正法謂但當勤修上來以行成因之德自當成後護持法等諸德故乘前結因成德明之答上十句文分九段第一答初總句如來法藏守護開演一切諸佛之所護念二答衆魔外道無能沮壞以佛護故守護受持廣大法藏獲無礙辨深入法門三答攝持正法無有窮盡於無邊世界大衆之中隨類不同普現其身色相具足最勝無比以無礙辨巧説深法其音圓滿善巧分布故能令聞者入於無盡智慧之門四答於一切世界中演説法時十王敬護謂聲勝音巧令聞者入智故知諸衆生心行煩惱而為説法所出言音具足清淨故一音演暢能令一切皆生歡喜五答舉世同欽稱機令喜故其身端正有大威力故處於衆會無能過者六答菩薩愛敬端正有德故其佛灌頂在前佛護念中善知衆心故能普現身善巧説法故音聲無礙得心自在故巧説大法無能沮壞得無所畏故心無怯弱於法自在故無能過者於智自在故無能勝者般若波羅蜜自在故所説法相不相違背辨才自在故隨樂説法相續不斷陀羅尼自在故決定開示諸法實相辨才自在故隨所演説能開種種譬喻之門大悲自在故勤誨衆生心無懈息大慈自在故放光明網悅可衆心七答得善根力增長白法於中先總明三業後得心下別顯十種自在皆是善根其十自在之能並是增長白法菩薩如是處於高廣師子之座演説大法唯除如來及勝願智諸大菩薩其餘衆生無能勝者無見頂者無映奪者欲以難問令其退屈無有是處八答開演如來甚深法藏佛子菩薩摩訶薩得如是自在力已假使有不可説世界量廣大道場滿中衆生一一衆生威德色相皆如三千大千世界主菩薩於此才現其身悉能映蔽如是大衆以大慈悲安其怯弱以深智慧察其欲樂以無畏辨為其説法能令一切皆生歡喜九答攝持正法以自莊嚴於中初明自嚴何以故佛子菩薩摩訶薩成就無量智慧輪故成就無量巧分別故成就廣大正念力故成就無盡善巧慧故成就決了諸法實相陀羅尼故成就無邊際菩提心故成就無錯謬妙辨才故成就得一切佛加持深信解故成就普入三世諸佛衆會道場智慧力故成就知三世諸佛同一體性清淨心故成就三世一切如來智一切菩薩大願智能作大法師開闡諸佛正法藏及護持故次徵後釋以攝正法故有十句德亦即是前所成之德可思爾時法慧菩薩欲重宣其義承佛神力而説頌言心住菩提集衆福常不放逸植堅慧正念其意恆不忘十方諸佛皆歡喜念欲堅固自勤勵於世無依無退怯以無諍行入深法十方諸佛皆歡喜佛歡喜已堅精進修行福智助道法入於諸地淨衆行滿足如來所説願如是而修獲妙法既得法已施羣生隨其心樂及根性悉順其宜為開演菩薩為他演説法不捨自己諸度行波羅蜜道既已成常於有海濟羣生晝夜勤修無懈倦令三寶種不斷絶所行一切白淨法悉以回向如來地菩薩所修衆善行普為成就諸羣生令其破暗滅煩惱降伏魔軍成正覺如是修行得佛智深入如來正法藏為大法師演妙法譬如甘露悉霑灑慈悲哀愍遍一切衆生心行靡不知如其所樂為開闡無量無邊諸佛法進止安徐如象王勇猛無畏猶師子不動如山智如海亦如大雨除衆熱時法慧菩薩説此頌已如來歡喜大衆奉行第二重頌有十偈初六偈頌前十種所成行體後四偈頌所成德前中初二偈頌佛喜二有一偈頌入地行願三有一偈頌菩薩説法四有一偈頌不捨自行五半偈頌不斷三寶六有半偈頌善根攝授後四偈頌行所成德分二前一偈頌以行成因德次三偈頌因成果德上第三會竟
