body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈第七重會普光明殿毗盧遮那如來說阿僧祇數量法門及如來隨好光明功德及普賢等諸菩薩說十大三昧等等覺法門從四十卷起至五十二卷止共十一品經十定品十通品十忍品阿僧祇品如來壽量品菩薩住處品佛不思議法品十身相海品如來隨好光明功德品普賢行品如來出現品今初十定品第二十七之一初明來意先辨會來會來有二一約圓融謂前明普門中所具差別正位故歷人天今明位後德用不離普門是則會別入普有此會來重會普光意在斯矣等妙二位全同如來普光明智故二約次第前明十地今顯等妙二覺故來以極果由於始信故重會普光謂前依本不動智體起差別之位今位極成不離本智之因後出現因果因是果中之因得位不捨因故果是果中之果大用無涯故二品來者為答第二會中十定問故第二釋名會名有二約處名重會普光明殿會由第二會已會會此故重意如前約法名說普門法會二品名者定謂心一境性十是數之圓極以普賢深定妙用無涯寄十以顯無盡故云十定品即帶數釋若依梵本具云如來十三昧品以等覺三昧上同佛故三世諸佛之所行故云如來三昧譯家以義通因果故略如來二字然三昧為定雖非敵對由等持心至一境故義旨相順又別行本名等目菩薩所問三昧經皆人法雙舉梵本是依主釋別行即依土釋三宗趣者會以普賢因果德用圓備為宗令物證入為趣品以普賢三昧無礙自在無邊大用而為宗趣次正釋文此會有十一品經分二前六明因圓後五明果滿若依古德前九謂生解因果後二明平等因果前中亦二前六品明先後因相後三品明差別果相然六品之因若約次第與前五會俱是差別之因若約圓融等同果相故與果同會果是對因之果與因同會平等因果由差別成亦與此同會今初此因即是等覺然文有等覺之義而無等覺之名者以此等覺亦即十地之勝進故是以諸教開合不同仁王等合此勝進入於十地是以不立等覺故教化品中約五忍分位於寂滅忍唯有上中下忍中行名為菩薩即第十地上忍中行為薩婆若此謂如來若依瓔珞開此勝進為無垢地即是等覺然等覺照寂妙覺寂照又賢聖學觀中說六種性及六堅六忍等瑜伽具有二義引深密說十一地第十法雲十一說名佛地唯有二十二愚得佛地時由斷二愚一於一切所知境極微細著愚即俱生極微細所知障種二極微細礙愚即是任運煩惱障種斷此便能證大菩提更不別說等覺斷證論復有文亦立等覺又菩薩地云此菩薩雖已修行功德海滿由未能捨三種法故不名妙覺一由未捨劣無漏法二由未捨白淨無記法三由未捨有漏善法至妙覺位方捨此三今經欲顯開合無礙故存其義不彰其名下離世間品智慧助道具中既云隨順六堅固法有等覺明矣補義曰楞嚴說九地為因因十地為因中之果等覺金剛喻定為因圓即入妙覺古師皆依仁王瓔珞釋之似無容議唯此經圓宗逈異諸經故古德以差別平等二種因果總判全經且差別中有因因因果平等中有果因果果以顯因該果海果徹因源故難與三乘漸教同日論也請試論之唯此經以智立體即毗盧遮那普光明智為根本實智也以行成德即普賢稱法界性所修妙行也故二會普光明殿文殊說十信法正以文殊為根本大智而為行本此智乃佛之果智今為發覺初心是以果智為因心故此經不立信位以後四十二位總不離普光明智信地故所謂發心畢竟二無別故六會他化說十地法則行布門中差別因圓今第七重會普光明殿說十一品經而首十定品說普賢十種三昧而判為等覺一位者此正以普賢十種三昧妙行融前先後差別之相以成一位真因以為因中之果故古德以前九品謂生解因果融前差別支流入法性海是為等覺以後普賢行品辨因該果海如來出現品辨果徹因源為平等因果是為妙覺謂會前差別之因果而為圓融果海是為果果此通辨毗盧遮那廣大因果以稱性而修為真因頓契法界為妙果以顯我毗盧遮那曠劫修如是因感如是果欲令菩薩頓生圓解以便依此圓解發起圓行故判此前十信起至後如來出現三十一品經為修因契果生解分疏中單就等覺一位辨其有無特未申明通途大旨故令學人難知歸趣耳大科七重會普光明殿有十一品經前十定等六品明等覺位為差別因圓今文六品分二前三品正答前問總顯深廣今初分二前二品明業用廣大後一品明智慧深玄前中亦二初品就定明用後品就通明用爾時世尊在摩竭提國阿蘭若法菩提場中前中分五一序分二請分三示說者分四本分五說分初中三初總顯三成就二始成下別顯三成就三與十佛剎下別顯衆成就始成正覺於普光明殿入剎那際諸佛三昧以一切智自神通力現如來身清淨無礙無所依止無有攀緣住奢摩他最極寂靜具大威德無所染著能令見者悉得開悟隨宜出興不失於時恆住一相所謂無相二中分三初約主顯時二於普光明下約主彰處三入剎那下就德顯主於中十句即攝二十一種功德中二十別句總句即前結成正覺故一入剎那際三昧者即窮法真源謂時之極促名曰剎那窮彼剎那時相都寂無際之際名剎那際即攝二句謂二行永絶及達無相法若有二行則有剎那二行既絶則剎那無際由達清淨真如本無相故所以此中特名入剎那際者為顯將說等覺位故菩薩地盡唯有果纍無常生相未寂猶名識藏若以無間智覺心初起心無初相遠離微細念故即無剎那若入此際即見心性常住名究竟覺故云諸佛三昧亦顯差別歷位不離最初剎那際故二以一切智自神通力現如來身者依通起用此攝二句一切智通即住於佛住謂由一切智無有功用自神通力常作佛事故次現如來身即攝得佛平等謂依上一切智現身利樂有情故三清淨無礙攝三句謂清淨攝二句一攝到無障處謂慣習覺慧永斷所治故云清淨二攝不可轉法由清淨故他不能轉無礙者即所行無礙世間八法不能礙故四無所依止無有攀緣即立不思議謂雖立教法不依世間故非諸世所能攀緣故五住奢摩他最極寂靜即普見三世以見三世平等如理無異為最寂靜六具大威德即身恆充滿一切世間現受用變化身大利樂故七無所染著即智恆明達一切諸法謂於諸法善決定故無有染也八能令見者悉得開悟此攝二句一攝了一切行謂知有情性行差別隨開悟故二攝除一切疑謂知彼遠劫微少善根亦令開悟故九隨宜出興不失於時亦攝二句一攝無能測身謂如其勝解而示現身如摩尼珠名隨宜出生不失於時二攝一切菩薩等所求智謂調伏有情攝受付囑皆不失時故十恆住一相所謂無相攝餘五句謂到佛究竟無二彼岸等隨義雖殊皆由一相無相而成可以意得餘如升兜率品辨與十佛剎微塵數菩薩摩訶薩俱第三顯衆成就中五一舉數二靡不下歎德三其名下列名四如是等下結數五往昔下集意靡不皆入灌頂之位具菩薩行等於法界無量無邊獲諸菩薩普見三昧大悲安隱一切衆生神通自在同於如來智慧深入演真實義具一切智降伏衆魔雖入世間心恆寂靜住於菩薩無住解脫二歎德中十一句初二句總位極行圓故餘九為別前四自分德初二行相一深二廣後二行體一定二悲後五勝進德前三同佛三業大用可知後二同佛無住涅槃初句釋謂不住涅槃故入世間不住生死故心恆寂靜後句結德屬人其名曰金剛慧菩薩無等慧菩薩義語慧菩薩最勝慧菩薩常捨慧菩薩那伽慧菩薩成就慧菩薩調順慧菩薩大力慧菩薩難思慧菩薩無礙慧菩薩增上慧菩薩普供慧菩薩如理慧菩薩善巧慧菩薩法自在慧菩薩法慧菩薩寂靜慧菩薩虗空慧菩薩一相慧菩薩善慧菩薩如幻慧菩薩廣大慧菩薩勢力慧菩薩世間慧菩薩佛地慧菩薩真實慧菩薩尊勝慧慧菩薩智光慧菩薩無邊慧菩薩三列名中一百菩薩初有三十同名慧者表純德故念莊嚴菩薩達空際菩薩性莊嚴菩薩甚深境菩薩善解處非處菩薩大光明菩薩常光明菩薩了佛種菩薩心王菩薩一行菩薩常現神通菩薩智慧芽菩薩功德處菩薩法燈菩薩照世菩薩持世菩薩最安隱菩薩最上菩薩無上菩薩無比菩薩超倫菩薩無礙行菩薩光明𦦨菩薩月光菩薩一塵菩薩堅固行菩薩霔法雨菩薩最勝幢菩薩普莊嚴菩薩智眼菩薩法眼菩薩慧雲菩薩總持王菩薩無住願菩薩智藏菩薩心王菩薩內覺慧菩薩住佛智菩薩陀羅尼勇健力菩薩持地力菩薩妙月菩薩須彌頂菩薩寶頂菩薩普光照菩薩威德王菩薩智慧輪菩薩大威德菩薩大龍相菩薩質直行菩薩不退轉菩薩持法幢菩薩無忘失菩薩攝諸趣菩薩不思議決定慧菩薩遊戲無邊智菩薩無盡妙法藏菩薩智日菩薩法日菩薩智藏菩薩智澤菩薩普見菩薩不空見菩薩金剛踊菩薩金剛智菩薩金剛𦦨菩薩金剛慧菩薩普眼菩薩佛日菩薩持佛金剛祕密義菩薩普眼境界智莊嚴菩薩次七十菩薩別名者表雜德故如是等菩薩摩訶薩十佛剎微塵數四結數往昔皆與毗盧遮那如來同修菩薩諸善根行五集意爾時普眼菩薩摩訶薩承佛神力從座而起偏袒右肩右膝著地合掌白佛言世尊我於如來應正等覺欲有所問願垂哀許大文第二請分四一普眼請問要以普眼方見普法故佛言普眼恣汝所問當為汝說令汝心喜二如來許問普眼菩薩言世尊普賢菩薩及住普賢所有行願諸菩薩衆成就幾何三昧解脫而於菩薩諸大三昧或入或出或時安住以於菩薩不可思議廣大三昧善入出故能於一切三昧自在神通變化無有休息三舉法正問佛言善哉普眼汝為利益去來現在諸菩薩衆而問斯義四歎問利益普眼普賢菩薩今現在此大文第三示說者分以法屬普賢故示其令請於中有六一示人令問二聞名獲益三推求不見四教起見方五依教而求六為現身相今初分三一示處已能成就不可思議自在神通出過一切諸菩薩上難可值遇從於無量菩薩行生菩薩大願悉已清淨所行之行皆無退轉無量波羅蜜門無礙陀羅尼門無盡辨才門皆悉已得清淨無礙大悲利益一切衆生以本願力盡未來際而無厭倦二歎德汝應請彼彼當為汝說其三昧自在解脫三教問爾時會中諸菩薩衆聞普賢名即時獲得不可思議無量三昧其心無礙寂然不動智慧廣大難可測量境界甚深無能與等現前悉見無數諸佛得如來力同如來性去來現在靡不明照所有福德不可窮盡一切神通皆已具足第二聞名獲益中獲十種益其諸菩薩於普賢所心生尊重渴仰欲見悉於衆會周遍觀察而竟不覩亦不見其所坐之座此由如來威力所持亦是普賢神通自在使其然耳第三推求不見中有三推求皆悉不見一渴仰推求不見二重觀察不見三以三昧力推求不見文各有十今初先求不見後此由下釋不見所以威力持者欲令大衆渴仰得顯深旨故爾時普眼菩薩白佛言世尊普賢菩薩今何所在佛言普眼普賢菩薩今現在此道場衆會親近我住初無動移二重求中三一審問重示法本湛然故初無動移是時普眼及諸菩薩復更觀察道場衆會周遍求覓白佛言世尊我等今者猶未得見普賢菩薩其身及座二推求不見猶謂可見故佛言如是善男子汝等何故而不得見三釋不見所由於中二初印定徵起善男子普賢菩薩住處甚深不可說故普賢菩薩獲無邊智慧門入師子奮迅定得無上自在用入清淨無礙際生如來十種力以法界藏為身一切如來共所護念於一念頃悉能證入三世諸佛無差別智是故汝等不能見耳後正釋所由以住處甚深故文有十句初句總次八句別後一句結別中四對一廣智勝定深謂智門無邊以有邊之智焉覩定用起伏無畏展促自在唯以出世定求故不可見次二外用內證深次二得力成身深後二多護速證深由上八深故不能見爾時普眼菩薩聞如來說普賢菩薩清淨功德得十千阿僧祇三昧第三以三昧力推求不見於中分四一新獲三昧以三昧力復遍觀察渴仰欲見普賢菩薩亦不能覩其餘一切諸菩薩衆俱亦不見二以定推求時普眼菩薩從三昧起白佛言世尊我已入十千阿僧祇三昧求見普賢而竟不得不見其身及身業語及語業意及意業座及住處悉皆不見三自陳不見佛言如是如是善男子當知皆以普賢菩薩住不思議解脫之力四釋不見所由於中五一約法總標由住難思解脫翻上三昧可思入故普眼於汝意云何頗有人能說幻術文字中種種幻相所住處不答言不也佛言普眼幻中幻相尚不可說何況普賢菩薩祕密身境界祕密語境界祕密意境界而於其中能入能見二以近況遠何以故三徵釋所由普賢菩薩境界甚深不可思議無有量已過量釋中二初略標深廣翻上三昧尚有數故舉要言之普賢菩薩以金剛慧普入法界於一切世界無所行無所住知一切衆生身皆即非身無去無來得無斷盡無差別自在神通無依無作無有動轉至於法界究竟邊際後舉略顯廣文有十句初句總以金剛慧達差別法界俱空故餘句別由了空故一世界無住處二衆生無可化三寂無去來四竪無斷盡五橫泯差別六體非體故不礙現通七用非用故無依無作八不離如如故無動轉九理事圓故窮法界邊善男子若有得見普賢菩薩若得承事若得聞名若有思惟若有憶念若生信解若勤觀察若始趣向若正求覓若興誓願相續不絶皆獲利益無空過者四彰見之益爾時普眼及一切菩薩衆於普賢菩薩心生渴仰願得瞻覲作如是言南無一切諸佛南無普賢菩薩如是三稱頭頂禮敬五歸敬彌增爾時佛告普眼菩薩及諸衆會言諸佛子汝等宜更禮敬普賢殷勤求請又應專至觀察十方想普賢身現在其前如是思惟周遍法界深心信解厭離一切誓與普賢同一行願入於不二真實之法其身普現一切世間悉知衆生諸根差別遍一切處集普賢道若能發起如是大願則當得見普賢菩薩第四教起見方中勸令策進前心次又應下別示深觀上捨境別求故未識其體今令十方齊觀知其體周下依此觀是以得見後誓與下起願思齊具上三心則能得見是時普眼聞佛此語與諸菩薩俱時頂禮求請得見普賢大士第五依教修行然普眼位深而猶重習觀修者略有二義一位未等故二示深獎物故爾時普賢菩薩即以解脫神通之力如其所應為現色身令彼一切諸菩薩衆皆見普賢親近如來於此一切菩薩衆中坐蓮華座亦見於餘一切世界一切佛所從彼次第相續而來亦見在彼一切佛所演說一切諸菩薩行開示一切智智之道闡明一切菩薩神通分別一切菩薩威德示現一切三世諸佛第六為現身相於中五一為衆現身不見顯深現不礙用故是時普眼菩薩及一切菩薩衆見此神變其心踊躍生大歡喜莫不頂禮普賢菩薩心生尊重如見十方一切諸佛二衆覩喜敬是時以佛大威神力及諸菩薩信解之力普賢菩薩本願力故自然而雨十千種雲所謂種種華雲種種鬘雲種種香雲種種末香雲種種蓋雲種種衣雲種種嚴具雲種種珍寶雲種種燒香雲種種繒采雲不可說世界六種震動奏天音樂其聲遠聞不可說世界放大光明其光普照不可說世界令三惡趣悉得除滅嚴淨不可說世界令不可說菩薩入普賢行不可說菩薩成普賢行不可說菩薩於普賢行願悉得圓滿成阿耨多羅三藐三菩提三現瑞成益爾時普眼菩薩白佛言世尊普賢菩薩是住大威德者住無等者住無過者住不退者住平等者住不壞者住一切差別法者住一切無差別法者住一切衆生善巧心所住者住一切法自在解脫三昧者四歎德廣深於中十句無等者下無等故無過者上無過故佛言如是如是普眼如汝所說普賢菩薩有阿僧祇清淨功德所謂無等莊嚴功德無量寶功德不思議海功德無量相功德無邊雲功德無邊際不可稱讚功德無盡法功德不可說功德一切佛功德稱揚讚歎不可盡功德五如來印述初印後述述中十一句初句總後所謂下別別有十德一二嚴德二圓明德三深廣德四色相德五慈覆德六超勝德七知法德八絶言德九同佛德十讚無盡德爾時如來告普賢菩薩言普賢汝應為普眼及此會中諸菩薩衆說十三昧令得善入成滿普賢所有行願大文第四本文有四一舉益令說二何者下列所說名三此十大下歎定勝德四是故普賢下結勸成益今初初分二初勸說成益諸菩薩摩訶薩說此十大三昧故令過去菩薩已得出離現在菩薩今得出離未來菩薩當得出離後引例證勸以三世諸菩薩若說此定皆成益故何者為十一者普光大三昧二者妙光大三昧三者次第遍往諸佛國土大三昧四者清淨深心行大三昧五者知過去莊嚴藏大三昧六者智光明藏大三昧七者了知一切世界佛莊嚴大三昧八者衆生差別身大三昧九者法界自在大三昧十者無礙輪大三昧第二列名中皆云大者因滿之定稱法界故一普光者身心業用周遍全包為普智照自在名光二妙光者身智遍照為光勝用交映為妙三十方無餘之剎皆至入定為偏往往無雜亂不礙時節歷然為次第即能起用名神通以智用如理本自遍故四名達諸法本自清淨離於想念契理深心依此起用遍供諸佛請法起說名之為行五佛出劫剎等事皆名莊嚴過去門中包此無盡為藏亦名過去清淨藏者入定能入劫一念無緣起定能受法三輪無著皆名清淨六未來藏中包含諸佛及佛法等名之為藏智慧照徹稱曰光明七現在諸佛作用衆會身相益物皆曰莊嚴橫遍十方故云一切現可目覩故不云藏八於差別衆生身內外入定起定皆自在故雖通三種世間從多但云衆生前後諸定皆從多說九於眼等十八界自在入出又知事法界邊際與理法界無礙自在故十無礙輪者三輪攝化皆自在故又得十無礙滿佛果故無盡大用一一無礙皆悉圓滿能摧伏故尋初後際不得邊故此十大三昧諸大菩薩乃能善入去來現在一切諸佛已說當說現說第三歎定勝德於中四一約人以歎人勝故法勝若諸菩薩愛樂尊重修習不懈則得成就二約修以歎於中二先明修成如是之人則名為佛則名如來亦則名為得十力人亦名導師亦名大導師亦名一切智亦名一切見亦名住無礙亦名達諸境亦名一切法自在後修益於中亦二初有十句明上等佛果亦是等覺等覺之義顯矣然一品始末等佛義多此菩薩普入一切世界而於世界無所著普入一切衆生界而於衆生無所取普入一切身而於身無所礙普入一切法界而知法界無有邊親近三世一切佛明見一切諸佛法巧說一切文字了達一切假名成就一切菩薩清淨道安住一切菩薩差別行於一念中普得一切三世智普知一切三世法普說一切諸佛教普轉一切不退輪於去來現在一一世普證一切菩提道於此一一菩提中普了一切佛所說後明身智遍周皆言普入者一一皆窮帝網境故此是諸菩薩法相門是諸菩薩智覺門是一切種智無勝幢門是普賢菩薩諸行願門是猛利神通誓願門是一切總持辨才門是三世諸法差別門是一切諸佛示現門是以薩婆若安立一切衆生門是以佛神力嚴淨一切世界門三直就法歎明此十定該攝諸法體相用等一一超勝故十門五對一境智通悟二因果游入三通辨出處四佛法所從五嚴土攝生罔不由此若菩薩入此三昧得法界力無有窮盡得虗空行無有障礙得法王位無量自在譬如世間灌頂受職得無邊智一切通達得廣大力十種圓滿成無諍心入寂滅際大悲無畏猶如師子為智慧丈夫然正法明燈一切功德歎不可盡聲聞獨覺莫能思議四約證以歎前約修歎望於佛果以顯終同此約證歎直就此定以明業用亦二十句前十明勝德無限得法界智住無動際而能隨俗種種開演住於無相善入法相得自性清淨藏生如來清淨家善開種種差別法門而以智慧了無所有善知於時常行法施開悟一切名為智者善攝衆生悉令清淨以方便智示成佛道而常修行菩薩之行無有斷盡入一切智方便境界示現種種廣大神通後明智德自在是故普賢汝今應當分別廣說一切菩薩十大三昧今此衆會咸皆願聞四結勸文並可知爾時普賢菩薩承如來旨觀普眼等諸菩薩衆而告之言大文第五說分中三初承旨總告二佛子云何下別釋十定三第四十三卷末云佛子此是下總結十數佛子云何為菩薩摩訶薩普光明三昧二別中十定即為十段各有標釋結佛子此菩薩摩訶薩有十種無盡法何者為十所謂諸佛出現智無盡衆生變化智無盡世界如影智無盡深入法界智無盡善攝菩薩智無盡菩薩不退智無盡善觀一切法義智無盡善持心力智無盡住廣大菩提心智無盡住一切佛法一切智願力智無盡佛子是名菩薩摩訶薩十種無盡法就初定中分五一智無盡二心無盡三定自在四智巧現五觀超絶各有佛子以為揀別五中初二定方便次一定體後二定用又前三各有標徵釋結今初十中十句五對初二所事所化次二化處化法如影者無實故隨現故次二攝護始終次二所持能持後二始心終願佛子此菩薩摩訶薩發十種無邊心何等為十所謂發度脫一切衆生無邊心發承事一切諸佛無邊心發供養一切諸佛無邊心發普見一切諸佛無邊心發受持一切佛法不忘失無邊心發示現一切佛無量神變無邊心發為得佛力故不捨一切菩提行無邊心發普入一切智微細境界說一切佛法無邊心發普入佛不思議廣大境界無邊心發於佛辨才起深志樂領受諸佛法無邊心發示現種種自在身入一切如來道場衆會無邊心是為十二心無邊者前明所知無盡今辨對境發心以境無邊故心無邊有十一句者增數十也佛子此菩薩摩訶薩有十種入三昧差別智何者為十所謂東方入定西方起西方入定東方起南方入定北方起北方入定南方起東北方入定西南方起西南方入定東北方起西北方入定東南方起東南方入定西北方起下方入定上方起上方入定下方起是為十第三定自在者由前大智大心故於三昧自在方處非一入出不同故云差別佛子此菩薩摩訶薩有十種入大三昧善巧智第四智巧現分三初標何者為十二徵佛子菩薩摩訶薩以三千大千世界為一蓮華現身遍此蓮華之上結加趺坐身中復現三千大千世界其中有百億四天下一一四天下現百億身一一身入百億百億三千大千世界於彼世界一一四天下現百億百億菩薩修行一一菩薩修行生百億百億決定解一一決定解令百億百億根性圓滿一一根性成百億百億菩薩法不退業三釋中分三初法說二舉喻三以劣況勝今初法說中亦二初十句別明展轉深細然所現身非一非多入定出定無所錯亂第二總顯離相分明佛子如羅睺阿修羅王本身長七百由旬化形長十六萬八千由旬於大海中出其半身與須彌山而正齊等佛子彼阿修羅王雖化其身長十六萬八千由旬然亦不壞本身之相諸蘊界處悉皆如木心不錯亂不於變化身而作他想於其本身生非己想本受生身恆受諸樂化身常現種種自在神通威力二舉喻佛子阿修羅王有貪恚癡具足憍慢尚能如是變現其身何況菩薩摩訶薩能深了達心法如幻一切世間皆悉如夢一切諸佛出興於世皆如影像一切世界猶如變化言語音聲悉皆如響見如實法以如實法而為其身知一切法本性清淨了知身心無有實體其身普住無量境界以佛智慧廣大光明淨修一切菩提之行三以劣況勝佛子菩薩摩訶薩住此三昧超過世間遠離世間無能惑亂無能映奪佛子譬如比丘觀察內身住不淨觀審見其身皆是不淨菩薩摩訶薩亦復如是住此三昧觀察法身見諸世間普入其身於中明見一切世間及世間法於諸世間及世間法皆無所著第五觀超絶中分三初法二喻三合異前化現故云法身法性包含故一時頓見由此異故無能映奪故云皆無所著佛子是名菩薩摩訶薩第一普光明大三昧善巧智後總結佛子云何為菩薩摩訶薩妙光明三昧二妙光明大三昧分三初標佛子此菩薩摩訶薩能入三千大千世界微塵數三千大千世界於一一世界現三千大千世界微塵數身一一身放三千大千世界微塵數光一一光現三千大千世界微塵數色一一色照三千大千世界微塵數世界一一世界中調伏三千大千世界微塵數衆生二釋分二初法中分四初明身雲展入是諸世界種種不同菩薩悉知所謂世界雜染世界清淨世界所因世界建立世界同住世界光色世界來往如是一切菩薩悉知菩薩悉入二明身智俱入是諸世界亦悉來入菩薩之身三明其卷入然諸世界無有雜亂種種諸法亦不壞滅四明展卷無礙佛子譬如日出繞須彌山照七寶山其七寶山及寶山間皆有光影分明顯現二喻文有二喻喻前互入無雜亂義文分為二一寶山光影喻二幻師善巧喻先喻有五初明日光影現喻七寶山者即七金山如十地末所列其名但除妙高及雪香二山山間有七香海海現日影山以淨金亦能現影其寶山上所有日影莫不顯現山間影中其七山間所有日影亦悉顯現山上影中如是展轉更相影現二明兩影互現正喻菩薩自他互入以彼影明淨如今之鏡故能互現或說日影出七寶山或說日影出七山間或說日影入七寶山或說日影入七山間第三得名不同謂水中本影現山上影時此所現影從山上出來入山間若山上本影現水中影時此所現影從山間出入七金寶山上故正入時即名為出但此日影更相照現無有邊際第四明重現無盡喻菩薩帝網身土古德立帝網義經有帝網之名而無廣說之處以昔未有此品經文故此一段文可誠證也體性非有亦復非無不住於山不離於山不住於水亦不離水五明體離二邊既離二邊故能互現而無雜亂謂取不可得故非有影現分明故非無不住不離者謂不住成上非有不離成其非無若有定住則不能相入若其離者則無可相入故不住不離方能相入佛子菩薩摩訶薩亦復如是住此妙光廣大三昧不壞世間安立之相不滅世間諸法自性不住世界內不住世界外於諸世界無所分別亦不壞於世界之相觀一切法一相無相亦不壞於諸法自性住真如性恆不捨離二法合直明不壞不住故得互入無亂明不壞性相謂若壞性相則無可相入若住內外則不能相入謂若住世間內則不能身包世界若住世界外則不能遍入世界由俱無住故能互入次釋其所以由定無分別而不壞相慧觀一相而不壞諸既事理雙游故不壞不住若不壞不住則住真如恆不捨離既即事不捨故相隨性而融通如無不在故同真如而內外互入佛子譬如幻師善知幻術二幻師善巧喻二初總喻二別喻初中有三一總明能幻住四衢道作諸幻事於一日中一須臾頃或現一日或現一夜或復現作七日七夜半月一月一年百年隨其所欲皆能示現城邑聚落泉流河海日月雲雨宮殿屋宅如是一切靡不具足二明本時處現幻時處喻互相入不以示現經年歲故壞其根本一日一時不以本時極短促故壞其所現日月年歲幻相明現本日不滅次本末互不相礙喻不壞相菩薩摩訶薩亦復如是入此妙光廣大三昧現阿僧祇世界入一世界其阿僧祇世界一一皆有地水火風大海諸山城邑聚落園林屋宅天宮龍宮夜叉宮乾闥婆宮阿修羅宮迦樓羅宮緊那羅宮摩睺羅伽宮種種莊嚴皆悉具足欲界色界無色界小千世界大千世界業行果報死此生彼一切世間所有時節須臾晝夜半月一月一歲百歲成劫壞劫雜染國土清淨國土廣大國土狹小國土於中諸佛出興于世佛剎清淨菩薩衆會周匝圍繞神通自在教化衆生其諸國土所在方處無量人衆悉皆充滿殊形異趣種種衆生無量無邊不可思議去來現在清淨業力出生無量上妙珍寶如是等事咸悉示現入一世界後合中亦五一明一多相容不同合上現多時處菩薩於此普皆明見普入普觀普思普了以無盡智皆如實知二明智鑒不昧合前能幻之術不以彼世界多故壞此一世界不以此世界一故壞彼多世界三合不壞本末之相何以故四徵釋所由先徵意云何以互入得不壞相菩薩知一切法皆無我故是故入無命法無作法者菩薩於一切世間勤修行無諍法故是名住無我法者菩薩如實見一切身皆從緣起故是名住無衆生法者菩薩知一切生滅法皆從因生故是名住無補伽羅法者菩薩知諸法本性平等故是名住無意生無摩納婆法者釋意有三一由知人無我故人無我之相已見上文菩薩知一切法本性寂靜故是名住寂靜法者菩薩知一切法一相故是名住無分別法者菩薩知法界無有種種差別法故是名住不思議法者二知法無我菩薩勤修一切方便善調伏衆生故是名住大悲法者三得同體大悲故由此故能融通事理佛子菩薩如是能以阿僧祇世界入一世界知無數衆生種種差別見無數菩薩各各發趣觀無數諸佛處處出興彼諸如來所演說法其諸菩薩悉能領受亦見自身於中修行五結成上義於中三一結上多入一然不捨此處而見在彼亦不捨彼處而見在此彼身此身無有差別入法界故二結上不壞性相常勤觀察無有休息不捨智慧無退轉故三結上明鑒上寶山光影喻合竟如有幻師隨於一處作諸幻術不以幻地故壞於本地不以幻日故壞於本日第二別喻中有三逆喻總中三段一幻不壞本喻別喻不壞相二如世幻者下幻必依處喻別喻前依本時處現多時處三如彼幻師作諸幻事下明幻師不迷喻別喻前能幻今初先喻菩薩摩訶薩亦復如是於無國土現有國土於有國土現無國土於有衆生現無衆生於無衆生現有衆生無色現色色現無色初不亂後後不亂初後合中有二先正合菩薩了知一切世法悉亦如是同於幻化知法幻故知智幻知智幻故知業幻知智幻業幻已起於幻智觀一切業後釋其所以如世幻者不於處外而現其幻亦不於幻外而有其處第二幻必依處喻先喻後合喻中略無幻必依時菩薩摩訶薩亦復如是不於虗空外入世間亦不於世間外入虗空合中分二先合依處後合依時前中初總合以記物現故空即事空何以故虗空世間無差別故次徵釋所由理無差故住於世間亦住虗空菩薩摩訶薩於虗空中能見能修一切世間種種差別妙莊嚴業後結成自在於一念頃悉能了知無數世界若成若壞亦知諸劫相續次第能於一念現無數劫亦不令其一念廣大二合依於時於中先正顯菩薩摩訶薩得不思議解脫幻智到於彼岸住於幻際入世幻數思惟諸法悉皆如幻不違幻世盡於幻智了知三世與幻無別決定通達心無邊際如諸如來住如幻智其心平等菩薩摩訶薩亦復如是知諸世間皆悉如幻於一切處皆無所著無有我所後釋其所由以得幻智同於佛故如彼幻師作諸幻事雖不與彼幻事同住而於幻事亦無迷惑菩薩摩訶薩亦復如是知一切法到於彼岸心不計我能入於法亦不於法而有錯亂第三幻師不迷喻文並可知是為菩薩摩訶薩第二妙光明大三昧善巧智三結名也
