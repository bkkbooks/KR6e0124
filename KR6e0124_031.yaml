有三初以無著下總標次云所謂小世界甚微細智下別顯有二十一智初九直語器界次九明其受用其一多相作亦是菩薩受用後三正知無取著三云如是了知下結顯能知德七知三界微細智此顯即理之事法界故云一切法界即事之理復云不生等亦初標所依次云得無量下列所得智初句總餘別後云如是等下結能知之德八知入劫微細智亦三初以無著下標德所依次云所謂下列所得智三如是等下結能知德九知法無礙微細智初標二所謂下別所得智文有十句義有四重一法體具德二一切入一等明法用即入三入非法等明理事相即四入方便無別是體用善巧後如是等下結能知德十總知一切盡無餘微細智晉經十句皆有無餘之言文中分四初以無著下總標所依二所謂下別列所得法即牒前十門名或小變次或不等會義皆同三云乃至知一切下結所不說四如幻下顯能知之德亦有通別通從前生別則次第對前十句一外剎是心之影像故今能知剎則知影像二衆生想現故云如夢三者果報幻生故如幻四心性寂然緣感成異故云如響五說時如化六即空界七言語本寂八即法界九世間無依十出世間行即是佛法上通前總明回向菩提衆生竟下回向實際即離相行佛子菩薩摩訶薩以無著無縛解脫心回向不分別若世間若世間法不分別若菩提若菩提薩埵不分別若菩薩行若出離道不分別若佛若一切佛法不分別若調伏衆生若不調伏衆生不分別若善根若回向不分別若自若他不分別若施物若受施者不分別若菩薩行若等正覺不分別若法若智大文第二回向實際文有十對初假實對二即人法三即體用於中五對皆約能所第九因果等正覺約人契法異前菩提十即教法教智以不分別故一一入實上廣顯其相佛子菩薩摩訶薩以彼善根如是回向所謂心無著無縛解脫身無著無縛解脫口無著無縛解脫業無著無縛解脫報無著無縛解脫世間無著無縛解脫佛剎無著無縛解脫衆生無著無縛解脫法無著無縛解脫智無著無縛解脫大文第二佛子下總結多門由心無縛故令身等皆無縛著也菩薩摩訶薩如是回向時如三世諸佛為菩薩時所修回向而行回向學過去諸佛回向成未來諸佛回向住現在諸佛回向安住過去諸佛回向道不捨未來諸佛回向道隨順現在諸佛回向道勤修過去諸佛教成就未來諸佛教了知現在諸佛教滿足過去諸佛平等成就未來諸佛平等安住現在諸佛平等行過去諸佛境界住未來諸佛境界等現在諸佛境界得三世一切諸佛善根具三世一切諸佛種性住三世一切諸佛所行順三世一切諸佛境界大文第三菩薩下明回向成益初牒後顯顯有十句初總餘別別中一回向者正起修行二道者常游法徑三回向教四平等智五所緣境六功行絶修是佛善根七了見本源成如來性八無礙悲智是所行九無盡體用是分齊境佛子是為菩薩摩訶薩第九無著無縛解脫心回向第三結名從初廣說故有心言菩薩摩訶薩住此回向時一切金剛輪圍山所不能壞於一切衆生中色相第一無能及者悉能摧破諸魔邪業普現十方一切世界修菩薩行為欲開悟一切衆生以善方便說諸佛法得大智慧於諸佛法心無迷惑在在生處若行若住常得值遇不壞眷屬三世諸佛所說正法以清淨念悉能受持盡未來劫修菩薩行常不休息無所依著普賢行願增長具足得一切智施作佛事成就菩薩自在神通第二位果成三種果一現成果於中先自利後為欲下利他二在在下成當得果初自利後盡未來下兼於自他三普賢下明終成果因果無礙爾時金剛幢菩薩承佛神力普觀十方而說頌言普於十方無等尊未曾一起輕慢心隨其所修功德業亦復恭敬生尊重所修一切諸功德不為自己及他人恆以最上信解心利益衆生故回向未嘗暫起高慢心亦復不生下劣意如來所有身等業彼悉請問勤修習所修種種諸善根悉為利益諸含識安住深心廣大解回向人尊功德位世間所有無量別種種善巧奇特事粗細廣大及甚深靡不修行皆了達世間所有種種身以身平等入其中於此修行得了悟慧門成就無退轉世間國土無量種微細廣大仰覆別菩薩能以智慧門一毛孔中無不見衆生心行無有量能令平等入一心以智慧門悉開悟於所修行不退轉衆生諸根及欲樂上中下品各不同一切甚深難可知隨其本性悉能了衆生所有種種業上中下品各差別菩薩深入如來力以智慧門普明見不可思議無量劫能令平等入一念如是見已遍十方修行一切清淨業過去未來及現在了知其相各不同而亦不違平等理是則大心明達行世間衆生行不同或顯或隱無量種菩薩悉知差別相亦知其相皆無相十方世界一切佛所現自在神通力廣大難可得思議菩薩悉能分別知一切世界兜率中自然覺悟人師子功德廣大淨無等如其體相悉能見或現降神處母胎無量自在大神變成佛說法示滅度普遍世間無暫已人中師子初生時一切勝智悉承奉諸天帝釋梵王等靡不恭敬而瞻侍十方一切無有餘無量無邊法界中無始無末無遐邇示現如來自在力人中尊導現生已遊行諸方各七步欲以妙法悟羣生是故如來普觀察見諸衆生沉欲海盲暗愚癡之所覆人中自在現微笑念當救彼三有苦大師子吼出妙音我為世間第一尊應然明淨智慧燈滅彼生死愚癡暗人師子王出世時普放無量大光明令諸惡道皆休息永滅世間衆苦難或時示現處王宮或現捨家修學道為欲饒益衆生故示其如是自在力如來始坐道場時一切大地皆動搖十方世界悉蒙光六趣衆生咸離苦震動一切魔宮殿開悟十方衆生心若曾受化及修行皆使了知真實義十方所有諸國土悉入毛孔無有餘一切毛孔剎無邊於彼普現神通力一切諸佛所開演無量方便皆隨悟說諸如來所不說亦能解了勤修習遍滿三千大千界一切魔軍興鬪諍所作無量種種惡無礙智門能悉滅如來或在諸佛剎或復現處諸天宮或在梵宮而現身菩薩悉皆無障礙佛現無量種種身轉於清淨妙法輪乃至三世一切劫求其邊際不可得寶座高廣最無等遍滿十方無量界種種妙相而莊嚴佛處其上難思議諸佛子衆共圍繞盡於法界悉周遍開示菩提無量行一切最勝所由道諸佛隨宜所作業無量無邊等法界智者能以一方便一切了知無不盡諸佛自在神通力示現一切種種身或現諸趣無量生或現綵女衆圍繞或於無量諸世界示現出家成佛道乃至最後般涅槃分布其身起塔廟如是種種無邊行導師演說佛所住世尊所有大功德誓願修行悉令盡以彼善根回向時住於如是方便法如是修習菩提行其心畢竟無厭怠如來所有大神通及以無邊勝功德乃至世間諸智行一切悉知無不盡如是一切人中主隨其所有諸境界於一念中皆了悟而亦不捨菩提行諸佛所有微細行及一切剎種種法於彼悉能隨順知究竟回向到彼岸有數無數一切劫菩薩了知一切念於此善入菩提行常勤修習不退轉十方所有無量剎或見雜染或清淨及彼一切諸如來菩薩悉能分別知於念念中悉明見不可思議無量劫如是三世無有餘具足修治菩薩行於一切心平等入入一切法亦平等盡空佛剎斯亦然彼最勝行悉了知出生衆生及諸法所有種種諸智慧菩薩神力亦復然如是一切無窮盡諸微細智各差別菩薩盡攝無有餘同相異相悉善知如是修行廣大行十方無量諸佛剎其中衆生各無量趣生族類種種殊住行力已悉能知過去未來現在世所有一切諸導師若人知此而回向則與彼佛行平等若人能修此回向則為學佛所行道當得一切佛功德及以一切佛智慧一切世間莫能壞一切所學皆成就當得憶念一切佛常見一切世間燈菩薩勝行不可量諸功德法亦如是已住如來無上行悉知諸佛自在力第二應頌有五十一偈分二先頌位行後頌位果前中三初三頌所回善根二所修下四十四頌頌回向行三過去下二頌頌行成利益頌回向行中初所修下一偈頌普賢自分究竟餘頌勝進究竟前長行有三攝法廣大德二即入重重德三微細容持德今通頌之但顯微細於中分十第一有三偈頌世間微細智二有一偈頌衆生趣由行別故三有二偈頌第五衆生界界即根性四有三偈頌第三菩薩行德菩薩亦受衆生之稱五十方下有二十七偈頌第四位德大用於中三初一偈總次二十三別頌因果八相等後三偈頌能知之德六有數下一偈頌第八知劫智七十方下一偈頌第六世界智八於念念下二偈頌第七法界智九出生下一偈頌第九知法智十諸微細下二偈頌一切法智過去未來下四偈頌成益位果可知
