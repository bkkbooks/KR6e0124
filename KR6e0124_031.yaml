body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈十回向品第二十五之九佛子云何為菩薩摩訶薩無著無縛解脫回向第九無著無縛解脫回向長行中亦先位行後位果前中初牒名徵起釋名者謂理智無依不為能所見著相惑所縛由此即名解脫此約行體釋之故本業云以諸法無二般若無生二諦平等三世一合相故又解脫者亦作用自在如不思議等此約行用由攝善根皆用回向普賢三業無邊自在德用故問於何無縛著耶謂心等十以自身有心身口業果及所作佛事有世界佛剎衆生法智等故又問不為何等所縛著耶略如上說別有十事五對一由離凡故不縛生死以出小乘故不著二乘二離六識取不縛外境離第七執不著於內三離現行縛無種子著四不取有縛不執空著五無惑障縛無智障著皆縛粗著細若約一事由著故縛義如總中或縛著一義此約無礙大用受名通能所回向約脫惑障無縛無著即是解脫約用解脫乃無縛著之解脫若望心等亦是無縛著之心即上體用並為其性佛子是菩薩摩訶薩於一切善根心生尊重所謂於出生死心生尊重於攝取一切善根心生尊重於希求一切善根心生尊重於悔諸過業心生尊重於隨喜善根心生尊重於禮敬諸佛心生尊重於合掌恭敬心生尊重於頂禮塔廟心生尊重於勸佛說法心生尊重於如是等種種善根皆生尊重隨順忍可第二廣釋中大文分三一明所回善根二佛子下能回向行三菩薩摩訶薩如是回向時如三世下回向成益初中有六行經初一句總標尊重別有十句佛子菩薩摩訶薩於彼善根皆生尊重隨順忍可時究竟欣樂堅固信解自得安住令他安住勤修無著自在積集成勝志樂住如來境勢力增長悉得知見以諸善根如是回向所謂以無著無縛解脫心成就普賢身業以無著無縛解脫心清淨普賢語業以無著無縛解脫心圓滿普賢意業以無著無縛解脫心發起普賢廣大精進第二回向行中初佛子於彼善根下三行經仍前進修擬將回向次正明願行中義有十門大文分二第一廣顯其相後佛子以彼善根如是回向所謂心無縛下總結多門前中分二先明衆生及菩提回向後佛子以無著無縛解脫心回向不分別下回向實際前明廣大後顯甚深前廣大回向有六十一門其甚深之內有二十門并前尊重進修復二十門總有一門一百顯圓融無盡深廣無礙為廣大回向就廣大六十一門廣顯普賢自在德用大文為二今初云以諸善根下四門內三成就三業以下諸門不出三慧故後一精進通策萬行故於中無著無縛解脫心是能回之心成就普賢身業正是所回他皆倣此前諸善根即是所回故以善根之言下流八十門內此一回向不願成佛願成普賢者以普賢通於位前位後得道不捨因行窮盡生界利樂有情故願成普賢即兼菩提衆生二回向故下別顯中一一門內皆攝法界自在德用或理或行或智或境或自行或他生或體或用或因或果或人或法皆各總攝一切法故不相從上一段經總有四門總敘科義下列門以無著無縛解脫心具足普賢無礙音聲陀羅尼門其聲廣大普遍十方以無著無縛解脫心具足普賢見一切佛陀羅尼門恆見十方一切諸佛以無著無縛解脫心成就解了一切音聲陀羅尼門同一切音說無量法以無著無縛解脫心成就普賢一切劫住陀羅尼門普於十方修菩薩行別科略分為二初二十三門顯普賢自分究竟即位中普賢後三十四門顯普賢勝進究竟即位後普賢二分無礙是普賢德前即因圓果滿後即得道不捨因行故二段中皆含因果今初分三初四成普賢總持德二有十二門成普賢自在力用三有七門願成普賢行然諸門德皆約三業今初總持亦具三業一語業總持二身業見佛三意業解了後一三業用之時處以無著無縛解脫心成就普賢自在力於一衆生身中示修一切菩薩行盡未來劫常無間斷如一衆生身一切衆生身悉亦如是以無著無縛解脫心成就普賢自在力普入一切衆道場普現一切諸佛前修菩薩行以無著無縛解脫心成就普賢佛自在力於一門中示現經不可說不可說劫無有窮盡令一切衆生皆得悟入以無著無縛解脫心成就普賢佛自在力於種種門中示現經不可說不可說劫無有窮盡令一切衆生皆得悟入其身普現一切佛前以無著無縛解脫心成就普賢自在力念念中令不可說不可說衆生住十方智心無疲倦以無著無縛解脫心成就普賢自在力於一切衆生身中現一切佛自在神通令一切衆生住普賢行以無著無縛解脫心成就普賢自在力於一切衆生語言中作一切衆生語言令一切衆生一一皆住一切智地以無著無縛解脫心成就普賢自在力於一一衆生身中普容納一切衆生身令皆自謂成就佛身以無著無縛解脫心成就普賢自在力能以一華莊嚴一切十方世界以無著無縛解脫心成就普賢自在力出大音聲普遍法界周聞一切諸佛國土攝受調伏一切衆生以無著無縛解脫心成就普賢自在力盡未來際不可說不可說劫於念念中悉能遍入一切世界以佛神力隨念莊嚴以無著無縛解脫心成就普賢自在力盡未來際所住之劫常能遍入一切世界示現成佛出興於世以無著無縛解脫心成普賢行一光普照盡虗空界一切世界以無著無縛解脫心成普賢行得無量智慧具一切神通說種種法以無著無縛解脫心成普賢行入於如來盡一切劫不可測量神通智慧以無著無縛解脫心成普賢行住盡法界諸如來所以佛神力修習一切諸菩薩行身口意業曾無懈倦以無著無縛解脫心成普實行不違於義不壞於法言詞清淨樂說無盡教化調伏一切衆生令其當得一切諸佛無上菩提以無著無縛解脫心修普賢行入一法門時放無量光照不思議一切法門如一法門一切法門皆亦如是通達無礙究竟當得一切智地以無著無縛解脫心住菩薩行於法自在到於普賢莊嚴彼岸於一一境界皆以一切智觀察悟入而一切智亦不窮盡第二有十二門成普賢自在力用於中二先九願一多攝入自在次出大音聲下三願明廣大自在第三有七願成普賢行於中二初云成普賢行一光普照下四願成神通次成普賢行不違於義下三願成四辨即顯果滿究竟上二十三門明普賢自分究竟竟以無著無縛解脫心始從此生盡未來際住普賢行常不休息得一切智悟不可說不可說真實法於法究竟無有迷惑以無著無縛解脫心修普賢業方便自在得法光明於諸菩薩所行之行照了無礙以無著無縛解脫心修普賢行得一切方便智知一切方便所謂無量方便不思議方便菩薩方便一切智方便一切菩薩調伏方便轉無量法輪方便不可說時方便說種種法方便無邊際無畏藏方便說一切法無餘方便以無著無縛解脫心住普賢行成就身業令一切衆生見者歡喜不生誹謗發菩提心永不退轉究竟清淨以無著無縛解脫心修普賢行得了一切衆生語言清淨智一切言詞具足莊嚴普應衆生皆令歡喜以無著無縛解脫心住普賢行立殊勝志具清淨心得廣大神通廣大智慧普詣一切廣大世間廣大國土廣大衆生所說一切如來不可說廣大法廣大莊嚴圓滿藏以無著無縛解脫心成滿普賢回向行願得一切佛清淨身清淨心清淨解攝佛功德住佛境界智印普照示現菩薩清淨之業善入一切差別句義示諸佛菩薩廣大自在為一切衆生現成正覺以無著無縛解脫心勤修普賢諸根行願得聰利根調順根一切法自在根無盡根勤修一切善根根一切佛境界平等根受一切菩薩不退轉記大精進根了知一切佛法金剛界根一切如來智慧光照金剛𦦨根分別一切諸根自在根安立無量衆生於一切智根無邊廣大根一切圓滿根清淨無礙根以無著無縛解脫心修普賢行得一切菩薩神力所謂無量廣大力神力無量自在智神力不動其身普現一切佛剎神力無礙不斷自在神力普攝一切佛剎置於一處神力一身遍滿一切佛剎神力無礙解脫遊戲神力無所作一念自在神力住無性無依神力一毛孔中次第安立不可說世界遍遊法界諸佛道場示諸衆生皆令得入大智慧門神力大文第二明勝進究竟有三十四門於中分三初有九門攝法廣大自在德次有十五門相即相入重重德三有十門明微細容持甚深德初中分六一云始從此生下有三願成智次云成就身業下有二願成利益三云立殊勝志下有一願廣大三業四云成滿普賢下有一願清淨三業五云勤修普賢下有一願種諸善根於中三業別有十四根皆以勝用增上光顯義故立以根名初聰利等三根約眼等六兼五受根餘約信等五根一無盡信根亦兼命根勤修進根次一切佛念根次不退轉是定根餘七皆慧六一願云修普賢行得一切菩薩神力即願神力三業上九門攝法廣大自在德竟以無著無縛解脫心入普賢門生菩薩行以自在智於一念頃普入無量諸佛國土一身容受無量佛剎獲能嚴淨佛國土智恆以智慧觀見無邊諸佛國土永不發起二乘之心以無著無縛解脫心修普賢方便行入智慧境界生如來家住菩薩道具足不可說不可說無量不思議殊勝心行無量願未曾休息了知三世一切法界以無著無縛解脫心成就普賢清淨法門於一毛端量處悉包容盡虗空遍法界不可說不可說一切國土皆使明見如一毛端量處遍法界虗空界一一毛端量處悉亦如是以無著無縛解脫心成就普賢深心方便於一念心中現一衆生不可說不可說劫念心如是乃至現一切衆生爾許劫念心以無著無縛解脫心入普賢回向行方便地於一身中悉能包納盡法界不可說不可說身而衆生界無所增減如一身乃至周遍法界一切身悉亦如是以無著無縛解脫心成就普賢大願方便捨離一切想倒心倒見倒普入一切諸佛境界常見諸佛虗空界等清淨法身相好莊嚴神力自在常以妙音開示演說無礙無斷令其聞者如說受持於如來身了無所得以無著無縛解脫心修普賢行住菩薩地於一念中入一切世界所謂入仰世界覆世界不可說不可說十方網一切處廣大世界以因陀羅網分別方便普分別一切法界以種種世界入一世界以不可說不可說無量世界入一世界以一切法界所安立無量世界入一世界以一切虗空界所安立無量世界入一世界而亦不壞安立之相悉令明見以無著無縛解脫心修習普賢菩薩行願得佛灌頂於一念中入方便地成滿安住衆行智寶悉能了知一切諸想所謂衆生想法想剎想方想佛想世想業想行想界想解想根想時想持想煩惱想清淨想成熟想見佛想轉法輪想聞法解了想調伏想無量想出離想種種地想無量地想菩薩了知想菩薩修習想菩薩三昧想菩薩三昧起想菩薩成想菩薩壞想菩薩歿想菩薩生想菩薩解脫想菩薩自在想菩薩住持想菩薩境界想劫成壞想明想暗想晝想夜想半月一月一時一歲變異想去想來想住想坐想睡想覺想如是等想於一念中悉能了知而離一切想無所分別斷一切障無所執著一切佛智充滿其心一切佛法長其善根與諸如來等同一身一切諸佛之所攝取離垢清淨一切佛法皆隨修學到於彼岸以無著無縛解脫心為一切衆生修普賢行生大智寶於一一心中知無量心隨其依止隨其分別隨其種性隨其所作隨其業用隨其相狀隨其思覺種種不同靡不明見以無著無縛解脫心成就普賢大願智寶於一處中知於無量不可說處如於一處於一切處悉亦如是以無著無縛解脫心修習普賢行業智地於一業中能知無量不可說不可說業其業各以種種緣造明了知見如於一業於一切業悉亦如是以無