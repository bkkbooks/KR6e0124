body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈毗盧遮那品第六此品來意者前品明此因之果今辨前之因答前因問故次來也因是果人之因故標果稱若不以人取法知是誰因前品初言毗盧遮那曠劫修因之所嚴淨今方顯修因之事釋名者略云光明遍照廣如前釋三宗趣者明因果廣大為宗證成前果為趣此下經文序毗盧遮那如來往昔修因之時及處并所遇佛先顯其時爾時普賢菩薩復告大衆言諸佛子乃往古世過世界微塵數劫復倍是數此一品分三段初總明本事之時次有世界下別顯本事之處三彼勝音世界最初劫中下別顯時中本事今初時言復倍是數者即倍佛剎塵數劫也有世界海名普門淨光明此世界海中有世界名勝音依摩尼華網海住須彌山微塵數世界而為眷屬其形正圓其地具有無量莊嚴三百重衆寶樹輪圍山所共圍繞一切寶雲而覆其上清淨無垢光明照耀城邑宮殿如須彌山衣服飲食隨念而至其劫名曰種種莊嚴此明處初一句總明剎海次此世界下別指一剎其劫名曰種種莊嚴明剎中之時立此處此時為修因之始諸佛子彼勝音世界中有香水海名清淨光明其海中有大蓮華須彌山出現名華𦦨普莊嚴幢十寶欄楯周匝圍繞於其山上有一大林名摩尼華枝輪無量華樓閣無量寶臺觀周回布列無量妙香幢無量寶山幢逈極莊嚴無量寶芬陀利華處處敷榮無量香摩尼蓮華網周匝垂布樂音和悅香雲照耀數各無量不可紀極有百萬億那由他城周匝圍繞種種衆生於中止住諸佛子此林東有一大城名𦦨光明人王所都百萬億那由他城周匝圍繞清淨妙寶所共成立縱廣各有七千由旬七寶為郭樓櫓却敵悉皆崇麗七重寶塹香水盈滿優鉢羅華波頭摩華拘物頭華芬陀利華悉是衆寶處處分布以為嚴飾寶多羅樹七重圍繞宮殿樓閣悉寶莊嚴種種妙網張施其上塗香散華芬瑩其中有百萬億那由他門悉寶莊嚴一一門前各有四十九寶尸羅幢次第行列復有百萬億園林周匝圍繞其中皆有種種雜香摩尼樹香周流普熏衆鳥和鳴聽者歡悅此大城中所有居人靡不成就業報神足乘空往來行同諸天心有所欲應念皆至其城次南有一天城名樹華莊嚴其次右旋有大龍城名曰究竟次有夜叉城名金剛勝妙幢次有乾闥婆城名曰妙宮次有阿修羅城名曰寶輪次有迦樓羅城名妙寶莊嚴次有緊那羅城名遊戲快樂次有摩睺羅城名金剛幢次有梵天王城名種種妙莊嚴如是等百萬億那由他數此一一城各有百萬億那由他樓閣所共圍繞一一皆有無量莊嚴此彼勝音下別明感應之處初立定香水海名清淨光明為處之本次言此海中有須彌山其山上有一大林名摩尼華枝輪立定此為道場聞法之處次云此林東有大城名𦦨光明乃人王所都此城為昔生處次此城南有一天城言其伴城顯不孤也次云此一一城皆有無量莊嚴此上約二十五行經通明往昔生處諸佛子此寶華枝輪大林之中有一道場名寶華遍照以衆大寶分布莊嚴摩尼華輪遍滿開敷然以香燈具衆寶色𦦨雲彌覆光網普照諸莊嚴具常出妙寶一切樂中恆奏雅音摩尼寶王現菩薩身種種妙華周遍十方其道場前有一大海名香摩尼金剛出大蓮華名華𦦨蕊輪其華廣大百億由旬莖葉鬚臺皆是妙寶十不可説百千億那由他蓮華所共圍繞常放光明恆出妙音周遍十方諸佛子彼勝音世界最初劫中有十須彌山微塵數如來出興於世其第一佛號一切功德山須彌勝雲諸佛子應知彼佛將出現時一百年前此摩尼華枝輪大林中一切莊嚴周遍清淨所謂出不思議寶𦦨雲發歎佛功德音演無數佛音聲舒光布網彌覆十方宮殿樓閣互相照耀寶華光明騰聚成雲復出妙音説一切衆生前世所行廣大善根説三世一切諸佛名號説諸菩薩所修願行究竟之道説諸如來轉妙法輪種種言辭現如是等莊嚴之相顯示如來當出於世其世界中一切諸王見此相故善根成熟悉欲見佛而來道場此下別明道場之處顯為遇佛聞法之處也故云林中有一道場言道場前有一大海者指此海將為蓮華之處也次云彼勝音世界最初劫中有十須彌山微塵數如來出興於世者此別明本事之時言劫中多佛出世界者以經來不盡故無結束言最初劫有如是多佛其義不順豈有一劫之中有許多佛出耶疏云此最初劫應回文於佛出興於世下云其劫最初第一佛云云此正甚善次云其第一佛號一切功德山須彌勝雲此正顯本事之佛次云彼佛將出現時一百年前此摩尼華大林中莊嚴周遍者顯為佛現之前瑞相也有七行經明其瑞事次其世界中一行餘經明其機熟爾時一切功德山須彌勝雲佛於其道場大蓮華中忽然出現其身周普等真法界一切佛剎皆示出生一切道場悉詣其所無邊妙色具足清淨一切世間無能映奪具衆寶相一一分明一切宮殿悉現其像一切衆生咸得目見無邊化佛從其身出種種色光充滿世界如於此清淨光明香水海華𦦨莊嚴幢須彌頂上摩尼華枝輪大林中出現其身而坐於座其勝音世界有六十八千億須彌山頂悉亦於彼現身而坐爾時彼佛即於眉間放大光明其光明發起一切善根音十佛剎微塵數光明而為眷屬充滿一切十方國土若有衆生應可調伏其光照觸即自開悟息諸惑熱裂諸蓋網摧諸障山淨諸垢濁發大信解生勝善根永離一切諸難恐怖滅除一切身心苦惱起見佛心趣一切智此下正顯佛興言忽然出現言非八相應身乃是頓成之佛即法報同體之佛故次云其身周普等真法界無邊化佛從其身出種種色光充滿法界法界塵毛重重全遍此顯毗盧最初本所師之佛即是頓佛故後聞法亦是普法以其本因廣大故今感果亦廣大也至下起見佛心趣一切智共九行經明佛出興光明益生之事時一切世間主并其眷屬無量百千蒙佛光明所開覺故悉詣佛所頭面禮足諸佛子彼𦦨光明大城中有王名喜見善慧統領百萬億那由他城夫人采女三萬七千人福吉祥為上首王子五百人大威光為上首大威光太子有十千夫人妙見為上首爾時大威光太子見佛光明已以昔所修善根力故即時證得十種法門何謂為十所謂證得一切諸佛功德輪三昧證得一切佛法普門陀羅尼證得廣大方便藏般若波羅蜜證得調伏一切衆生大莊嚴大慈證得普雲音大悲證得生無邊功德最勝心大喜證得如實覺悟一切法大捨證得廣大方便平等藏大神通證得增長信解力大願證得普入一切智光明辨才門爾時大威光太子獲得如是法光明已承佛威力普觀大衆而説頌言世尊坐道場清淨大光明譬如千日出普照虗空界無量億千劫導師時乃現佛今出世間一切所瞻奉汝觀佛光明化佛難思議一切宮殿中寂然而正受汝觀佛神通毛孔出𦦨雲照耀於世間光明無有盡汝應觀佛身光網極清淨現形等一切遍滿於十方妙音遍世間間者皆欣樂隨諸衆生語讚歎佛功德世尊光所照衆生悉安樂有苦皆滅除心生大歡喜觀諸菩薩衆十方來萃止悉放摩尼雲現前稱讚佛道場出妙音其音極深遠能滅衆生苦此是佛神力一切咸恭敬心生大歡喜共在世尊前瞻仰於法王此下明當機雲集初一行半經通顯諸王雲集此即前敘𦦨光城南諸天城之王也次云彼𦦨光明城中有王名喜見王者此正出本事之緣也故次明夫人采女大威光王子而為上首次下大威光王子見佛光明即時證得十種法門第一證得一切佛法普門陀羅尼此未見佛已得總持法門矣初大威光王子見光得益經有長行偈頌有十頌末偈勸云十方萃止宜共瞻仰於法王此引例勸歸無遠不歸固宜往見諸佛子彼大威光太子説此頌時以佛神力其聲普遍勝音世界時喜見善慧王聞此頌已心大歡喜觀諸眷屬而説頌言汝應速召集一切諸王衆王子及大臣城邑宰官等普告諸城內疾應擊大鼓共集所有人俱行往見佛一切四衢道悉應鳴寶鐸妻子眷屬俱共往觀如來一切諸城郭宜令悉清淨普建勝妙幢摩尼以嚴飾寶帳羅衆網技樂如雲布嚴備在虗空處處令充滿道路皆嚴淨普雨妙衣服巾馭汝寶乘與我同觀佛各各隨自力普雨莊嚴具一切如雲布遍滿虗空中香𦦨蓮華蓋半月寶瓔珞及無數妙衣汝等皆應雨須彌香水海上妙摩尼輪及清淨栴檀悉應雨滿空衆寶華瓔珞莊嚴淨無垢及以摩尼燈皆令在空住一切持向佛心生大歡喜妻子眷屬俱往見世所尊爾時喜見善慧王與三萬七千夫人采女俱福吉祥為上首五百王子俱大威光為上首六萬大臣俱慧力為上首如是等七十七百千億那由他衆前後圍繞從𦦨光明大城出以王力故一切大衆乘空而往諸供養具遍滿虗空至於佛所頂禮佛足却坐一面復有妙華城善化幢天王與十億那由他眷屬俱復有究竟大城淨光龍王與二十五億眷屬俱復有金剛勝幢城猛健夜叉王與七十七億眷屬俱復有無垢城喜見乾闥婆王與九十七億眷屬俱復有妙輪城淨色思惟阿修羅王與五十八億眷屬俱復有妙莊嚴城十力行迦樓羅王與九十九千眷屬俱復有遊戲快樂城金剛德緊那羅王與十八億眷屬俱復有金剛幢城寶稱幢摩睺羅伽王與三億百千那由他眷屬俱復有淨妙莊嚴城最勝梵王與十八億眷屬俱如是等百萬億那由他大城中所有諸王并其眷屬悉共往詣一切功德須彌勝雲如來所頂禮佛足却坐一面此下明父王宣告太子説此頌時彼喜見善慧王心大歡喜即召集諸王王子大臣等一時勸往見佛各令辦供時喜見王與夫人采女眷等俱至佛所頂禮佛足復有天城中諸天王及八部等悉共往一切功德須彌勝雲如來所頂禮佛足却坐一面上有二十九行經明見佛之儀時彼如來為欲調伏諸衆生故於衆會道場海中説普集一切三世佛自在法修多羅世界微塵數修多羅而為眷屬隨衆生心悉令獲益是時大威光菩薩聞是法已即獲一切功德須彌勝雲佛宿世所集法海光明所謂得一切法聚平等三昧智光明一切法悉入最初菩提心中住智光明十方法界普光明藏清淨眼智光明觀察一切佛法大願海智光明入無邊功德海清淨行智光明趣向不退轉大力速疾藏智光明法界中無量變化力出離輪智光明決定入無量功德圓滿海智光明了知一切佛決定解莊嚴成就海智光明了知法界無邊佛現一切衆生前神通海智光明了知一切佛力無所畏法智光明爾時大威光菩薩得如是無量智光明已承佛威力而説頌言我聞佛妙法而得智光明以是見世尊往昔所行事一切所生處名號身差別及供養於佛如是我咸見往昔諸佛所一切皆承事無量劫修行嚴淨諸剎海捨施於自身廣大無涯際修治最勝行嚴淨諸剎海耳鼻頭手足及以諸宮殿捨之無有量嚴淨諸剎海能於一一剎億劫不思議修習菩提行嚴淨諸剎海普賢大願力一切佛海中修行無量行嚴淨諸剎海如因日光照還見於日輪我以佛智光見佛所行道我觀佛剎海清淨大光明寂靜證菩提法界悉周遍我當如世尊廣淨諸剎海以佛威神力修習菩提行此時彼如來下廣演法門言説普集一切三世佛自在法修多羅者乃彼佛自證之法也故大威光菩薩聞此法已即得十二種三昧智光明大威光既得益已復説偈讚述上聞法得益長行明得法頌有十偈諸佛子時大威光菩薩以見一切功德山須彌勝雲佛承事供養故於如來所心得悟了為一切世間顯示如來往昔行海顯示往昔菩薩行方便顯示一切佛功德海顯示普入一切法界清淨智顯示一切道場中成佛自在力顯示佛力無畏無差別智顯示普示現如來身顯示不可思議佛神變顯示莊嚴無量清淨佛土顯示普賢菩薩所有行願令如須彌山微塵數衆生發菩薩心佛剎微塵數衆生成就如來清淨國土爾時一切功德山須彌勝雲佛為大威光菩薩而説頌言善哉大威光福藏廣名稱為利衆生故發趣菩提道汝獲智光明法界悉充遍福慧咸廣大當得深智海一剎中修行經於剎塵劫如汝見於我當獲如是智非諸劣行者能知此方便獲大精進力乃能淨剎海一一微塵中無量劫修行彼人乃能得莊嚴諸佛剎為一一衆生輪回經劫海其心不疲懈當成世導師供養一一佛悉盡未來際心無暫疲厭當成無上道三世一切佛當共滿汝願一切佛會中汝身安住彼一切諸如來誓願無有邊大智通達者能知此方便大光供養我故獲大威力令塵數衆生成熟向菩提諸修普賢行大名稱菩薩莊嚴佛剎海法界普周遍此下明威光得了悟已轉化衆生之事次為一世間下明轉悟他顯示十種法門令多衆生得益次爾時一切功德山下言彼如來亦説偈讚勵威光大果當成有十一偈此上大威光太子初逢一切功德山佛因緣已竟諸佛子汝等應知彼大莊嚴劫中有恆河沙數小劫人壽命二小劫諸佛子彼一切功德須彌勝雲佛壽命五十億歲此二行餘經將明威光遇第二佛故此為結前生後之文然總説劫壽明多小劫者欲顯多佛現故説人壽佛壽者由佛壽促而人壽長故得威光一生歷事三佛彼佛滅度後有佛出世名波羅蜜善眼莊嚴王亦於彼摩尼華枝輪大林中而成正覺爾時大威光童子見彼如來成等正覺現神通力即得念佛三昧名無邊海藏門即得陀羅尼名大智力法淵即得大慈名普隨衆生調伏度脫即得大悲名遍覆一切境界雲即得大喜名一切佛功德海威力藏即得大捨名法性虗空平等清淨即得般若波羅蜜名自性離垢法界清淨身即得神通名無礙光普隨現即得辨才名善入離垢淵即得智光名一切佛法清淨藏如是等十千法門皆得通達爾時大威光童子承佛威力為諸眷屬而説頌言不可思議億劫中導世明師難一遇此土衆生多善利而今得見第二佛佛身普放大光明色相無邊極清淨如雲充滿一切土處處稱揚佛功德光明所照咸歡喜衆生有苦悉除滅各令恭敬起慈心此是如來自在用出不思議變化雲放無量色光明網十方國土皆充滿此佛神通之所現一一毛孔現光雲普遍虗空發大音所有幽冥靡不照地獄衆苦咸令滅如來妙音遍十方一切言音咸具演隨諸衆生宿善力此是大師神變用無量無邊大海衆佛於其中皆出現普轉無盡妙法輪調伏一切諸衆生佛神通力無有邊一切剎中皆出現善逝如是智無礙為利衆生成正覺汝等應生歡喜心踊躍愛樂極尊重我當與汝同詣彼若見如來衆苦滅發心回向趣菩提慈念一切諸衆生悉住普賢廣大願當如法王得自在諸佛子大威光童子説此頌時以佛神力其聲無礙一切世界皆悉得聞無量衆生發菩提心時大威光王子與其父母并諸眷屬及無量百千億那由他衆生前後圍繞寶蓋如雲遍覆虗空共詣波羅蜜善眼莊嚴王如來所其佛為説法界體性清淨莊嚴修多羅世界海微塵等修多羅而為眷屬彼諸大衆聞此經已得清淨智名入一切淨方便得於地名離垢光明得波羅蜜輪名示現一切世間愛樂莊嚴得增廣行輪名普入一切剎土無邊光明清淨見得趣向行輪名離垢福德雲光明幢得隨入證輪名一切法海廣大光明得轉深發趣行名大智莊嚴得灌頂智慧海名無功用修極妙見得顯了大光明名如來功德海相光影遍照得出生願力清淨智名無量願力信解藏時彼佛為大威光菩薩而説頌言善哉功德智慧海發心趣向大菩提汝當得佛不思議普為衆生作依處汝已出生大智海悉能遍了一切法當以難思妙方便入佛無盡所行境已見諸佛功德雲已入無盡智慧地諸波羅蜜方便海大名稱者當滿足已得方便總持門及以無盡辨才門種種行願皆修習當成無等大智慧汝已出生諸願海汝已入於三昧海當具種種大神通不可思議諸佛法究竟法界不思議廣大深心已清淨普見十方一切佛離垢莊嚴衆剎海汝已入我菩提行昔時本事方便海如我修行所淨治如是妙行汝皆悟我於無量一一剎種種供養諸佛海如彼修行所得果如是莊嚴汝咸見廣大劫海無有盡一切剎中修淨行堅固誓願不可思當得如來此神力諸佛供養盡無餘國土莊嚴悉清淨一切劫中修妙行汝當成佛大功德此彼佛滅下顯第二佛出興文有三段初明先佛已滅次佛出興次明覩相獲益三讚德勸請此初明佛興即於先佛道場次爾時大威光童子下明威光覩相獲益次即得念佛三昧下正明獲益次標十種法門後結云如是等十千法門次爾時大威光而説頌言下讚德勸詣意謂幸得見第二佛頌有十偈讚佛三業之德勸衆同歸次大威光説此頌時一切世界皆悉得聞無量衆生發菩提心此威光説頌聞者先已得益次時大威光王子與其父母眷屬共詣波羅蜜善眼莊嚴王如來所其佛為説法界體性清淨莊嚴修多羅此言法界體性即大方廣也清淨佛也莊嚴即華嚴有多眷屬者顯此圓教故次下明大衆聞此經已即得清淨智有十種大益疏以此十益如次配十地顯法廣大故得益殊即如今經頓圓十地之義威光大衆既已得益時彼佛説偈讚述文有十偈前六讚其已具勝德當成極果後四偈言行齊佛因當如佛證此上明大威光逢第二佛因緣竟諸佛子波羅蜜善眼莊嚴王如來入涅槃已喜見善慧王尋亦去世大威光童子受轉輪王位彼摩尼華枝輪大林中第三如來出現於世名最勝功德海時大威光轉輪聖王見彼如來見佛之相與其眷屬及四兵衆城邑聚落一切人民并持七寶俱往佛所以一切香摩尼莊嚴大樓閣奉上於佛時彼如來於其林中説菩薩普眼光明行修多羅世界微塵數修多羅而為眷屬爾時大威光菩薩聞此法已得三昧名大福德普光明得此三昧故悉能了知一切菩薩一切衆生過現未來福非福海時彼佛為大威光菩薩而説頌言善哉福德大威光汝等今來至我所愍念一切衆生海發勝菩提大願心汝為一切苦衆生起大悲心令解脫當作羣迷所依怙是名菩薩方便行若有菩薩能堅固修諸勝行無厭怠最勝最上無礙解如是妙智彼當得福德光者福幢者福德處者福海者普賢菩薩所有願是汝大光能趣入汝能以此廣大願入不思議諸佛海諸佛福海無有邊汝以妙解皆能見汝於十方國土中悉見無量無邊佛彼佛往昔諸行海如是一切汝咸見若有住此方便海必得入於智地中此是隨順諸佛學決定當成一切智汝於一切剎海中微塵劫海修諸行一切如來諸行海汝皆學已當成佛如汝所見十方中一切剎海極嚴淨汝剎嚴淨亦如是無邊願者所當得今此道場衆會海聞汝願已生欣樂皆入普賢廣大乘發心回向趣菩提無邊國土一一中悉入修行經劫海以諸願力能圓滿普賢菩薩一切行此下顯大威光逢第三佛出興也佛名功德海者謂功德已滿無加過也時大威光太子已嗣轉輪王位故與其眷屬及四兵衆俱往見佛以香樓閣為供時彼如來為説普眼光明行修多羅以見普法故名為普眼以慧為性故曰光明次爾時大威光菩薩聞此法已得大福德普光明三昧言大福德者定也以定為福最大故普光明者慧也寂無不照名普光明言福非福者福乃相也非福性也謂雙了性相顯定慧圓明之益也然威光遇初佛得十益者自力未勝故遇次佛得十千者道轉深故今唯得一者道已滿故次時彼如來為大威光而説頌言下乃彼佛記別威光當成妙果也有十一偈初四偈顯具菩提心次四偈明上入佛境三有一偈示其果相得同諸佛四有二偈讚其現能利他住普賢行此上明威光遇第三佛已竟諸佛子彼摩尼華枝輪大林中復有佛出號名稱普聞蓮華眼幢是時大威光於此命終生須彌山上寂靜寶宮天城中為大天王名離垢福德幢共諸天衆俱詣佛所雨寶華雲以為供養時彼如來為説廣大方便普門遍照修多羅世界海微塵數修多羅而為眷屬時天王衆聞此經已得三昧名普門歡喜藏以三昧力能入一切法實相海獲是益已從道場出還歸本處此下明威光遇第四佛出興也佛號蓮華眼幢者約相目類青蓮約德心無所染相德高顯名稱外彰摧邪衆歸故曰幢也彼佛出興時大威光於此命終生須彌山上為大天王名離垢福德幢此明菩薩行道報處天宮此城即品初所列之一時天王聞佛同諸天衆俱往供養時彼如來為説廣大方便普門遍照修多羅言大方便者謂即實之權權實無滯名大方便事理雙照是為普門次云時天王聞此經已得三昧名普門歡喜藏以聞上普門正受安住法喜無盡故名曰藏由此證達諸實相海然初標云此劫之中有十須彌山塵數如來出興於世今但云遇四佛且經文又無結會古今之文亦無現證得益等事是知經來未盡故也若言歷事多佛其文多可知況云毗盧遮那曠劫修因所感之果若具述其因不勝之多矣若結會者應云爾時威光菩薩者毗盧遮那是補義曰此分名舉果而言因者乃特舉本師曠劫所修之因以感此果者此因單明本師之因非答十句因問也後答十句因問乃教諸菩薩所修之因將契此果故通全經上毗盧遮那品竟上舉果勸樂生信分通為所信因果周下十二卷起至五十二卷止通為修因契果生解分
