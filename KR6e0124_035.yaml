body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈十地品第二十六之二第二離垢地所以來者論云如是已證正位依出世間道因清淨戒説第二菩薩離垢地言正位者即初地見道是出世間依此修於三學戒最在初前地雖證真有戒未無誤犯又以十度寄明地位前施此戒故次明之下八準此言離垢者慈氏云由極遠離犯戒垢故謂性成就非如初地思擇護戒亦名增上戒住此地斷邪行障謂所知障中俱生一分及彼所起誤犯三業能障二地由斯二地説斷二愚及彼粗重一微細誤犯愚即上俱生一分此能起業二種種業趣愚即彼所起誤犯三業言最勝真如者謂此真如具無邊德於一切法最為勝故此亦由翻破戒之失為無邊德以成於戒得最勝故諸菩薩聞此最勝微妙地其心盡清淨一切皆歡喜皆從於座起踊住虗空中普散上妙華同時共稱讚次正釋文分三分初讚請分二正説分三重頌分今初五頌分二初三慶聞初地二請説二地今初前二經家敘其三業慶喜善哉金剛藏大智無畏者善説於此地菩薩所行法後一發言申讚領前請後解脫月菩薩知衆心清淨樂聞第二地所有諸行相即請金剛藏大慧願演説佛子皆樂聞所住第二地後二初序後請爾時金剛藏菩薩告解脫月菩薩言佛子菩薩摩訶薩已修初地欲入第二地當起十種深心第二正説分中先明地相後彰地果前中分二一發起淨即是入地心二佛子菩薩住此離垢下即住地心三聚無誤地中正行名自體淨直心起彼名發起淨初中有三謂標列結今初標也深心者深契理事故標深列直義一名異言直心者則令自體淨中性戒成就性戒有二一久積成性二真如性中無破戒垢今稱如持使得性成故云成就何等為十所謂正直心柔軟心堪能心調伏心寂靜心純善心不雜心無顧戀心廣心大心二徵列中有十句初句為總餘九為別別中前四律儀次三攝善後二饒益有情菩薩以此十心得入第二離垢地第三結行入位由上十心成就上品極圓滿故入斯戒住以此十心為發起淨下文第一自體淨中明三聚淨戒即分為三初攝律儀戒二攝善法戒三攝衆生戒此三聚戒攝前三位初攝治地住次攝饒益行思彼衆生墮惡等故後攝不壞回向謂有智願等於法寶等皆不壞故律儀通於止作攝善唯約善行此二自利後一唯約利他佛子菩薩住離垢地今初律儀分三初標所依謂離垢地戒增上故性自遠離一切殺生不畜刀杖不壞怨恨有慚有愧仁恕具足於一切衆生有命之者常生利益慈念之心是菩薩尚不惡心惱諸衆生何況於他起衆生想故以重意而行殺害二正顯戒相中有十善業道即為十段今初離殺分二初總明次不畜下別顯今初性自遠離文屬殺生義該下九謂自性成就十善業道即自性戒然離有三種一要期離謂諸凡夫二方便離所謂二乘三自體離謂諸菩薩契窮實性自體無染然離亦有四地前離現行登地離種子除誤犯顯性淨正當二地次別顯中有三種離一離因謂離殺因緣二於一切下對治離謂離殺法三是菩薩下果行離即離殺業今正不殺故名果離性不偷盜菩薩於自資財常知止足於他慈恕不欲侵損若物屬他起他物想終不於此而生盜心乃至草葉不與不取何況其餘資生之具第二離盜初句總非理損財不與而取故名為盜別中亦三一因離二於他下對治離三若物下果行離因中止謂少欲足謂自足自之所有尚生止足故無盜性不邪淫菩薩於自妻知足不求他妻於他妻妾他所護女親族媒定及為法所護尚不生於貪染之心何況從事況於非道第三離邪淫乖理曰邪深愛曰淫別中亦三一因離謂自妻知足此亦二意一內心知足離於起因二自足妻色離受畜因故此由寄報輪王相同世間故得示有妻妾耳二對治離謂不求他妻現在梵行淨故不求未來妻色他人之妻蓋不在言三於他妻下明果行離亦有粗細細約起心粗約從事性不妄語菩薩常作實語真語時語乃至夢中亦不忍作覆藏之語無心欲作何況故犯第四離妄語違想背心名之為妄別中分二初對治離次乃至下果行離今初對治即是因離不別明因有二義故一無外事謂無刀杖妻財之外事故無受畜因二無異因故謂但用誑他思即妄語因無別貪等以為異因異因即起因故離彼誑心即誠實語實語即是雜心對治故對治離即是因離不同身三各具三離口四唯二意三唯一性不兩舌菩薩於諸衆生無離間心無惱害心不將此語為破彼故而向彼説不將彼語為破此故而向此説未破者不令破已破者不增長不喜離間不樂離間不作離間語不説離間語若實若不實第五言不乖離名離兩舌兩舌事成能令離間別中亦二初對治離後未破下果行離對治離者即不破壞行此唯約心果行離者通心及事即是差別性不惡口所謂毒害語粗獷語苦他語令他瞋恨語現前語不現前語鄙惡語庸賤語不可樂聞語聞者不悅語瞋忿語如火燒心語怨結語熱惱語不可愛語不可樂語能壞自身他身語如是等語皆悉捨離常作潤澤語柔軟語悅意語可樂聞語聞者喜悅語善入人心語風雅典則語多人愛樂語多人悅樂語身心踊悅語第六言不粗鄙名離惡口別中分二初果行離後常作下對後諸業望治果行非全次第故先顯治後能離果今此先明果行中先明所離後明能離初中有十七語句各一義前四總顯惡言體用後十三語重顯前四疏有多義性不綺語菩薩常樂思審語時語實語義語法語順道理語巧調伏語隨時籌量決定語是菩薩乃至戲笑尚恆思審何況故出散亂之言第七言辭不正故云綺語其猶綺文總離可知別中亦二先對治後果行前中八語初一為總故下結云戲笑尚恆思審是以菩薩常樂三思而後言則無散亂矣下七語別時之一字亦總亦別總者上言思審者思合其時語默得中也別者下七種語皆明其時略有三義一教化時謂稱適其機二教受時即實義法三種語三教誡語即順道理等四種語即律中五義一制謂有罪者治二聽謂無罪者聽三舉謂有過者舉四折伏謂折攝合宜故云巧調伏五令喜謂有實德者稱揚令喜故云決定隨時籌量者若制若聽若舉若折皆須適時故總結之二是菩薩下果行離中亦以輕況重性不貪欲菩薩於他財物他所資用不生貪心不願不求第八離貪此下意三但有對治者以貪等是業有之本更無所依故非果行非果則不可更立異因故但有其一今初離貪謂離求欲心別中有三一於他財物是事二他所資用是體三不生貪等明差別初始欲名求次希得屬己為願性離瞋恚菩薩於一切衆生恆起慈心利益心哀愍心歡喜心和潤心攝受心永捨瞋恨怨害熱惱常思順行仁慈祐益第九離於忿怒含毒故云離瞋別中有三一別顯能治二永捨下總顯所治三常思下類通治益別中六種心論攝為五一於怨生慈心治二於惡行生利益心治三於貧苦生哀愍歡喜心治四於樂衆生生和潤心論名利潤治彼染著無利潤故五於發菩提心人起攝受心攝令成故又離邪見菩薩住於正道不行占卜不取惡戒心見正直無誑無諂於佛法僧起決定信第十離於乖理推求不言性離者蓋文略耳別中治七種邪見一住正道者治異乘見小乘對大非正道故二不行占卜治虗妄分別見即是邪見夫吉凶悔吝由愛惡生故云邪見三不取惡戒治於戒取四心見正直治於見取五無誑者治覆藏見六無諂治詐現不實見七於佛法下治非清淨見佛子菩薩摩訶薩如是護持十善業道常無間斷第三佛子下結成增上戒上攝律儀竟復作是念一切衆生墮惡趣者莫不皆以十不善業第二復作是念下攝善法戒謂非唯律儀不闕不斷常攝善法亦無斷闕文中分三初略觀不善起攝善行次佛子下廣觀障治起攝善行三如是方便下總結勸修今初分二先明觀智後是故下明起願行且初是故我當自修正行亦勸於他令修正行何以故若自不能修行正行令他修者無有是處後起願行者由念衆生惡因果故便起大悲修二和行佛子此菩薩摩訶薩復作是念十不善業道是地獄畜生餓鬼受生因第二廣觀障治起攝善法中謂觀五重善法謂人天聲聞緣覺菩薩佛也意於上上清淨佛善起增上心求學修行攝善法戒清淨行故十善業道是人天乃至有頂處受生因後攝觀十善具諸法門然通相而辨善皆能治以順理益物正反惡故文有五重今初人天十善又此上品十善業道以智慧修習心狹劣故怖三界故闕大悲故從他聞聲而解了故成聲聞乘第二辨三乘善各有三段今初聲聞乘善初標所修善次以智慧下顯所用功異三成聲聞乘結成自乘又此上品十善業道修治清淨不從他教自覺悟故大悲方便不具足故悟解甚深因緣法故成獨覺乘第三緣覺善所用異中初句總明以能修習名修清淨未能圓修不名具足方便謂教法以緣覺出世無九部法故又此上品十善業道修治清淨心廣無量故具足悲愍故方便所攝故發生大願故不捨衆生故希求諸佛大智故淨治菩薩諸地故淨修一切諸度故成菩薩廣大行第四菩薩十善所用異中修治清淨是自利心廣是利他無量即大乘心是二利行體具足悲愍是菩薩用方便所攝即四攝攝生是彼悲力發生大願即淨深心當初地二不捨衆生即不退轉地雖得寂滅不捨衆生即八地三希求佛智等即受大位地即當第十地又此上上十善業道一切種清淨故乃至證十力四無畏故一切佛法皆得成就是故我今等行十善應令一切具足清淨第五佛善上上是總一切下別有四種義顯上上事前三屬佛後一菩薩思齊一切智中自在純熟方名具足亦滅習氣故云清淨如是方便菩薩應學結勸可知佛子此菩薩摩訶薩又作是念十不善業道上者地獄因中者畜生因下者餓鬼因第三十不善業道下利益衆生戒長文分二初廣明攝生後如是護持於戒下結成益生之戒前中顯此戒增有五種義一智二願三行四集五集果今初言智者謂善知衆生苦因果故文分為三初總明知因二於中下別顯知果三佛子下結成苦因今初總中果有三塗不同因有三時階降論名時差別疏有多義於中殺生之罪能令衆生墮於地獄畜生餓鬼若生人中得二種果報一者短命二者多病十惡即分為十初殺生中殺令夭折不終天年故得短命即正惡等流二未死受苦故獲多病即方便等流怖無精光感外增上資具等物乏少光澤偷盜之罪亦令衆生墮三惡道若生人中得二種果報一者貧窮二者共財不得自在二盜損彼財故獲貧窮令其不得稱意受用故共財不得自在感外田苗霜雹損耗邪淫之罪亦令衆生墮三惡道若生人中得二種果報一者妻不貞良二者不得隨意眷屬三淫中令其妻不貞良方便詃誘故淫之穢污感外臭惡塵坌妄語之罪亦令衆生墮三惡道若生人中得二種果報一者多被誹謗二者為他所誑四妄語等流又誹謗約違境被誑約違心言無實故兩舌之罪亦令衆生墮三惡道若生人中得二種果報一者眷屬乖離二者親族弊惡五兩舌中令他離間親友成怨故惡口之罪亦令衆生墮三惡道若生人中得二種果報一者常聞惡聲二者言多諍訟六惡口中語體惡故語用惡故言恆有諍違惱他人綺語之罪亦令衆生墮三惡道若生人中得二種果報一者言無人受二者語不明了七綺語言無人受機不領故語不明了自綺錯故貪欲之罪亦令衆生墮三惡道若生人中得二種果報一者心不知足二者多欲無厭八貪欲中已得不足故未得欲求故瞋恚之罪亦令衆生墮三惡道若生人中得二種果報一者常被他人求其長短二者恆被於他之所惱害九瞋恚中二種等流似前輕後重見其不可意故求其長短二惱害彼故邪見之罪亦令衆生墮三惡道若生人中得二種果報一者生邪見家二者其心諂曲十邪見還生邪見之家心見不正故多諂曲佛子十不善業道能生此等無量無邊衆大苦聚三結成苦因無邊苦聚由此生故是故菩薩作如是念我當遠離十不善道以十善道為法園苑愛樂安住第二是菩薩下明願依智起願願為衆生自修善故但離惡因惡果自亡願修善因善果自至自住其中亦勸他人令住其中第三自住下明行依願起行如誓修故於中初依前願以起自行後亦勸下依於自行正攝衆生佛子此菩薩摩訶薩復於一切衆生生利益心安樂心慈心悲心憐愍心攝受心守護心自己心師心大師心第四佛子下明集者依增上悲念衆生故生十種心謂依前攝善起悲攝生名戒增上今依上悲欲拔衆生悲心能起利衆生事故名為集集者益物之心就中別相為八種衆生一於惡行衆生令住善行故名利益二為苦衆生令得安樂三於冤憎衆生慈不加報四於貧苦者悲欲拔之五於樂衆生愍其放逸六於外道攝令正信七於同行者護令不退八於攝一切菩提願衆生取於自己九觀彼衆生乘大乘道進趣之者敬之如師十觀集具足功德者敬如大師後二通攝為一菩提故唯有八第五作是念下集果依前悲心起勝上欲欲拔濟故約前濟通有四種衆生一化顛倒衆生二化欲求衆生三化有求衆生四化梵行求衆生文中為十類初有一類二有五類三有二類四有二類皆言又作是念文各有二先觀所化次我當下興拔濟心前即所治後即能治今十類生一一生所容有如前十心拔濟十中初一解邪餘九行邪且初作是念言衆生可愍墮於邪見惡慧惡欲惡道稠林第一化顛倒衆生先所化中邪見為總謂四顛倒理外推求故名邪見常樂二倒名為惡慧我淨二倒名為惡欲惡道稠林者結其邪見為諸過因上為所治我因令彼住於正見行真實道後能治住於正見翻上邪見真實道翻上惡道稠林又作是念一切衆生分別彼我互相破壞鬪諍瞋恨熾然不息我當令彼住於無上大慈之中第二化欲求衆生中有五類分二初三化現得五欲受用生過後二化未得五欲追求時過前中即分三段一受用不共財二受無厭足財三受貯積財今初已得之物不與他共於費用時生瞋過也先明所治互相破壞有二一鬪諍於言中二分別彼我乃對冤於心中瞋恨已下結其增長由瞋恨故思念作報身心惡行熾然不息能治中以慈治瞋如來之慈乃名無上又作是念一切衆生貪取無厭唯求財利邪命自活我當令彼住於清淨身語意業正命法中二化無厭財衆生求時無厭以生貪過初所治中有二一貪取無厭明內心難滿二唯求財利者形於身口邪命自活結上三業次三業正命以為能治又作是念一切衆生常隨三毒種種煩惱因之熾然不解志求出要方便我當令彼除滅一切煩惱大火安置清涼涅槃之處三化受貯積財衆生積而不散順生三毒增煩惱過初治中染著生貪散用生嗔癡迷上二言種種煩惱因之熾然者謂寶玩受用數為煩惱之所燒故癡迷於此無求出意故云不知出要能治中涅槃清涼煩惱火滅故又作是念一切衆生為愚癡重暗妄見厚膜之所覆故入陰翳稠林失智慧光明行曠野險道起諸惡見我當令彼得無障礙清淨智眼知一切法如實相不隨他教次二有二願化未得五欲進求時過即造業衆生分二初一明追求現報造諸惡行後一明追求後報造有漏善因今初先所治中有四種過一愚癡覆心過二入陰翳下增惡遠善過三行曠野陰道明受苦報過四起惡見者即無正對治過後能治中先得淨慧眼以所見如實故不隨他教又作是念一切衆生在於生死險道之中將墮地獄畜生餓鬼入惡見網中為愚癡稠林所迷隨逐邪道行顛倒行譬如盲人無有導師非出要道謂為出要入魔境界惡賊所攝隨順魔心遠離佛意我當拔出如是險難令住無畏一切智城二化追求後報習有漏善隨順險道過謂以迷出世勝義愚造福不動業求未來報則常在險道前所治中文有十句分三初生死即自體人天報危故名險道二將墬下險道中事文有八句迷於苦集滅道如次各二初將墜明有苦二入惡見網正明迷苦三為愚下迷於集因隨逐下明其造集如盲下顯無道體無有導師明闕道緣正明迷道非出要道下正迷於滅入魔一句顯有滅障謂入六塵如惡賊劫隨順下二句明失次能治中拔出險道總離前惡住無畏城是離之處上化欲求衆生竟又作是念一切衆生為大瀑水波浪所沒入欲流有流無明流見流生死洄澓愛河漂轉湍馳奔激不暇觀察為欲覺恚覺害覺隨逐不捨第三化有求衆生有二段初一道差別五趣流轉後一界差別三界繫閉今初先過後治過中初句為總入欲下別總即沒在大河過謂六道漂溺如彼大河求其沒中所以是過次入欲流下別顯大瀑水波浪有三種相一自體漂流即五趣因果二身見下為因起難謂處之多害三安六處下便成大失失出離道今初自體有五種相一深二流三名四漂五廣一深者具足四流無量水故為煩惱河二生死洄澓者流也上總四流煩惱因深故此苦果常流不竭三愛河漂轉者名也前明四流雖無惑不攝愛潤生死此由漂溺者偏受河名四湍馳等者漂也此有二義一顯河急故云湍馳奔激謂雖寶愛身欲令長久而念念不住是漂溺時二由急故不能如實知亦復不見涅槃彼岸故云不暇觀察五為欲覺等隨逐者廣也謂隨欲五塵故名為廣依此漂溺身見羅剎於中執取將其永入愛欲稠林於所貪愛深生染著住我慢原阜第二起難有四一者執執著我我所窟宅不能動發故云身見羅剎於中執取二將其下轉還詣先捨欲已將生上界由身見執還生下界欲念之中三於所貪下中著謂於受用時求欲等樂著故四住我慢原阜者增慢謂於受用事時中我慢大慢憍慢自高輕彼故慢令心高故喻原阜安六處聚落無善救者無能度者三明大失有三一善道無出意失此無善因安六處聚落故二惡道無救失此無救緣三無能度者異處去失謂離善行生諸難處不值佛故此雙闕因緣我當於彼起大悲心以諸善根而為救濟令無災患離染寂靜住於一切智慧寶洲後能治中初起化心次以諸下成化行化行有六一與善因謂六度萬行以為船筏二作救緣三令無苦患四令離集染五證涅槃寂靜六令得菩提大智皆翻上思之又作是念一切衆生處世牢獄多諸苦惱常懷愛憎自生憂怖貪欲重械之所繫縛無明稠林以為覆障於三界內莫能自出我當令彼永離三有住無障礙大涅槃中第二明界差別先過後治過中初句為總三界繫縛猶如牢獄求有處之所以為過次多諸下別明世獄有五過隨逐一苦事即種種諸苦二財盡謂愛資生求之不得憎貧窮遠之不能三愛離謂親愛別離常生憂怖四有縛謂雖生上界還為貪械所縛五障礙謂雖得四禪八定亦為無明所覆與正見相違次能治中若如實了知三界之相虗妄則自無障礙果證涅槃又作是念一切衆生執著於我於諸蘊窟宅不求出離依六處空聚起四顛倒行為四大毒蛇之所侵惱五蘊怨賊之所殺害受無量苦我當令彼住於最勝無所著處所謂滅一切障礙無上涅槃第四化梵行求衆生有二初化邪梵行求令捨邪歸正次段化同法小乘令捨權歸實今初先明過中初句為總謂執著於我過然外道執著雖多以我為本斷常等見皆因此生次於諸蘊下別明有六句前三句失道故遠第一義樂後三句失滅故具足諸苦初中外道計我故云諸蘊不求出離遍計六根起四顛倒故云顛倒行後三中一四大乖違苦謂生老病死苦二五陰隨逐苦三怨賊六受無量謂苦外道著我故不能得出後治中上由計我故處處生著唯大涅槃是無著處菩薩教之觀過知其實性人法皆空故云最勝無著處無上涅槃又作是念一切衆生其心狹劣不行最上一切智道雖欲出離但樂聲聞辟支佛乘我當令住廣大佛法廣大智慧二化同法小乘初起過中有三初不求大因過利生懈怠為狹佛法無邊退沒不證為劣二不行下不願大果過三雖欲下明修行過不定聚衆生實有大乘出離之法而修小乘後治中廣大佛法即諸度萬行登地已上名為廣大皆佛因法智慧通因果翻前狹劣總名廣大佛子菩薩如是護持於戒善能增長慈悲之心第二結成攝生之戒護持於戒即前律儀及攝善法故能增長慈悲之心即益生戒上相地竟下地果佛子菩薩住此離垢地以願力故得見多佛所謂見多百佛多千佛多百千佛多億佛多百億佛多千億佛多百千億佛如是乃至見多百千億那由他佛第二位果唯無發趣三果同前皆勝初地初調柔果有三謂法喻合法中有三初見佛為鍊行緣於諸佛所以廣大心深心恭敬尊重承事供養衣服飲食臥具醫藥一切資生悉以奉施亦以供養一切衆僧以此善根回向阿耨多羅三藐三菩提後於諸佛下明能鍊行於中先供佛於諸佛所以尊重心復更受行十善道法隨其所受乃至菩提終不忘失後於諸佛下受法更受十善即學佛十善也是戒地故是菩薩於無量百千億那由他劫遠離慳嫉破戒垢故布施持戒清淨滿足三是菩薩下所鍊淨中對前勝中以離慳嫉破戒二種垢故譬如真金置礬石中如法鍊已離一切垢轉復明淨菩薩住此離垢地亦復如是於無量百千億那由他劫遠離慳嫉破戒垢故布施持戒清淨滿足二喻中前初地菩薩戒未淨故施亦未淨今離二垢説名離故初地金但火鍊以除外垢今此置礬石中兼內淨體明云一切淨法合可知佛子此菩薩四攝法中愛語偏多十波羅蜜中持戒偏多餘非不行但隨力隨分二別地行中以離語四過故愛語偏多佛子是名略説菩薩摩訶薩第二離垢地三總結地菩薩住此地多作轉輪聖王為大法主具足七寶有自在力二菩薩住此下攝報果先明在家後若欲下出家在家中二先上勝身即金輪王能除一切衆生慳貪破戒垢以善方便令其安住十善道中為大施主周給無盡布施愛語利益同事如是一切諸所作業皆不離念佛不離念法不離念僧乃至不離念具足一切種一切智智又作是念我當於一切衆生中為首為勝為殊勝為妙為微妙為上為無上乃至為一切智智依止者後能除下明上勝果是菩薩若欲捨家於佛法中勤行精進便能捨家妻子五欲既出家已勤行精進於一念頃得千三昧得見千佛知千佛神力能動千世界乃至能示現千身於一一身能示現千菩薩以為眷屬二出家攝報果若以菩薩殊勝願力自在示現過於是數百劫千劫乃至百千億那由他劫不能數知三若以菩薩下願智果並如初地爾時金剛藏菩薩欲重宣其義而説頌曰質直柔軟及堪能調伏寂靜與純善速出生死廣大意以此十心入二地第三重頌中有十五偈分三初十頌行位於中有四初一頌頌十種心住此成就戒功德遠離殺生不惱害亦離偷盜及邪淫妄惡乖離無義語不貪財物常慈愍正道直心無諂偽離險捨慢極調柔依教而行不放逸二有二偈頌攝律儀戒地獄畜生受衆苦餓鬼燒然出猛𦦨一切皆由罪所致我當離彼住實法人中隨意得受生乃至頂天禪定樂獨覺聲聞佛乘道皆因十善而成就如是思惟不放逸自持淨戒教他護二有二偈半頌攝善法戒復見羣生受衆苦轉更增益大悲心凡愚邪智不正解常懈忿恨多諍訟貪求境界無足期我應令彼除三毒愚癡大暗所纏覆入大險道邪見網生死籠檻怨所拘我應令彼摧魔賊四流漂蕩心沒溺三界焚如苦無量計蘊為宅我在中為欲度彼勤行道設求出離心下劣捨於最上佛智慧我欲令彼住大乘發勤精進無厭足四有四偈半頌攝衆生戒菩薩住此集功德見無量佛咸供養億劫修治善更明如以好藥鍊真金佛子住此作輪王普化衆生行十善所有善法皆修習為成十力救於世欲捨王位及財寶即棄居家依佛教勇猛精進一念中獲千三昧見千佛所有種種神通力此地菩薩皆能現願力所作復過此無量自在度羣生二有四偈頌位果一切世間利益者所修菩薩最勝行如是第二地功德為諸佛子已開演三有一偈結歎所説上第二離垢地竟第三發光地所以來者前戒此定義次第故又前三地寄同世間施戒修法前二地施戒竟今此顯修故深密云前位能持微細戒品未得圓滿世間等持等至及圓滿聞法總持為令得此因説此地令勸修學言發光者智論名為光地本論名明地光之與明眼自殊稱皆略無發字仁王名明慧地慧亦是明義旨皆同今統收下經及諸經論總有三義立發光名一以初住地十種信心為能發勝定聞持為所發光以安住地竟方始聞法修得定故瑜伽云由聞行正法光明等持光明之所顯示故名發光地二以聞持為能發勝定為所發三以勝定總持並為能發彼四地證光明相為所發唯識云成就勝定大法總持能發無邊妙慧光故故十淨心唯是能發證光明相唯是所發言所離障者唯識名暗鈍障謂所知障中俱生一分令聞思修法忘失彼障三地勝定總持入三地時便能永斷由斯三地説斷二愚及彼粗重一欲貪愚此障勝地及彼修慧二圓滿陀羅尼愚此障聞思慧及障彼陀羅尼故若約所證唯就總持名證勝流真如唯識云謂此真如所流教法於餘教法極為勝故其所成行亦唯禪及求法其所得果亦法及禪下四無量五神通等皆定所攝上釋名竟佛子得聞此地行菩薩境界難思議靡不恭敬心歡喜散華空中為供養次正釋文總分三分初讚請分二正説分三重頌分今初六偈分二前三慶前後三請後前中初偈集經者敘讚言善哉大山王慈心愍念諸衆生善説智者律儀法第二地中之行相是諸菩薩微妙行真實無異無差別為欲利益諸羣生如是演説最清淨後二偈讚説前偈有慈後偈有悲故云利益又前偈教相故云律儀後偈證相故云微妙真實者契理故無異者千聖同轍故無差別者理貫事故一切人天供養者願為演説第三地與法相應諸智業如其境界希具闡大仙所有施戒法忍辱精進禪智慧及以方便慈悲道佛清淨行願皆説後三偈請中初二偈大衆請前偈總請三地之法謂如彼教法相應三智之業後偈別請十度行法以地地通有故慈悲是願道謂道力佛清淨行即無漏智時解脫月復請言無畏大士金剛藏願説趣入第三地柔和心者諸功德爾時金剛藏菩薩告解脫月菩薩言佛子菩薩摩訶薩已淨第二地欲入第三地當起十種深心第二正説分中先明地行後明地果前中四分一起厭行分二厭行分三厭分四厭果分此地修禪厭伏煩惱亦厭於禪故名厭地正住地心住於八禪故但名厭初入地心觀修彼行名厭行分趣地方便起彼厭行地滿心中得無量等是厭之果今初分中有三初結前生後次何等下徵列十心三菩薩以是下結行入位初中標起云十種深心論經云深念心則異二地單云深心謂更以十心念前十深心故何等為十所謂清淨心安住心厭捨心離貪心不退心堅固心明盛心勇猛心廣心大心二徵列十心義分四對初二句一對謂根本建立次三句一對謂方便發修次三句一對謂修已成就後二句一對謂德用自在此四對中皆前離過後明成善初言淨心者離過也謂依二地淨心趣此地淨心故二安住心依不捨自乘及前十故此二依前故云根本建立次第二對方便修者於中前二句離過一懸離當欲二離於現貪後一造行進善第三對中初一句離過謂自地煩惱不能壞故名堅固心後二句成善明盛謂八禪出入自在勇猛謂不退失第四對中謂不樂狹小故云廣依他自在不捨衆生故云大菩薩以此十心得入第三地三結行入地謂於前十心作意思惟便入增上心住佛子菩薩摩訶薩住第三地已觀一切有為法如實相所謂無常苦不淨不安隱敗壞不久住剎那生滅非從前際生非向後際去非於現在住第二厭行分中有三一修行護煩惱行以觀有為可厭患故二見如是下修行護小乘行求一切智深念衆生捨狹劣心故三菩薩如是厭離下修行方便攝行欲攝衆生不離無障礙智究竟方便等故又此三段攝前三位初及第二一半攝修行住次護小乘狹劣心下攝無恚恨行以慈悲故後段攝等一切佛回向思惟佛智度衆生故今初文有二十句分二初十句觀無常即知有為體性後十句觀無救者即就人彰過今初分三初顯觀無常時謂住地已次觀一切下總辨所觀謂有為法後所謂下別示其相文有十句初總餘別總云無常論云是中命行不住故命行是所無常法不住是無常義別中九句通顯此無常義謂無我我所故又觀此法無救無依與憂與悲苦惱同住愛憎所繫愁戚轉多無有停積貪恚癡火熾然不息衆患所纏日夜增長如幻不實第二又觀下十句明其無救初句總顯言此法者即前無常今又觀之不出生老病死如四方山來無逃避處無能救者別有九句約生老病死初四約死以顯無救此相顯故所以先明一無依者於無常未至中無所依告救令不至二與憂者無常既至無能救者意者懼死所以懷憂三與悲者生陰轉壞死相現前於此中間彌增涕泗四苦惱同住者正捨壽時四大分散則憂苦轉增心生熱惱次二約資生事不知是苦妄生樂想謂五追求資生境有違順故愛憎所繫六於受用時苦多樂少云愁戚轉多謂受而不散衆禍皆集用而毀損如損身命故曰苦多此二含生一種七於身老時盛年壯色不可救令停集後二約病初一病因謂八於少壯時具樂等三受故貪等常燒不容法水熾然難救九於年衰時衆患所纏如樹將朽日夜增長無能令免老即病緣如幻不實總結前九上護煩惱行見如是已於一切有為倍增厭離趨佛智慧見佛智慧不可思議無等無量難得無雜無惱無憂至無畏城不復退還能救無量苦難衆生第二護小乘行文有三十句初十句護小心後二十句護狹心今初句總先結前謂先觀無常已厭有為次觀無救故倍增厭趨佛智慧明其生後正護小心求佛大智故次見佛下別有十句分二前五攝功德大即求佛菩提後五清淨大即求涅槃果菩提修成名攝涅槃本有離障稱淨今初攝功德大一智用不測故不可思議二妙用無比故無等三純以利他故無故四無譏嫌故難得五不同外道故無雜總攝五種功德大後五清淨大義攝有三一無惱即離惑習無明不雜故二無憂者離苦苦依根本亡故三得涅槃有二義一得體謂至無畏城二得用謂能建大事不住生死故云不復退還不住涅槃故能救無量苦難衆生菩薩如是見如來智慧無量利益見一切有為無量過患則於一切衆生生十種哀愍心第二護狹心文有二十句前十悲其淪溺後十決志救濟前中先牒謂見佛智勝利傷物不得有為過患愍物處之此是牒前則起悲心是為生後何等為十所謂見諸衆生孤獨無依生哀愍心見諸衆生貧窮困乏生哀愍心見諸衆生三毒火然生哀愍心見諸衆生諸有牢獄之所禁閉生哀愍心見諸衆生煩惱稠林恆所覆障生哀愍心見諸衆生不善觀察生哀愍心見諸衆生無善法欲生哀愍心見諸衆生失諸佛法生哀愍心見諸衆生隨生死流生哀愍心見諸衆生失解脫方便生哀愍心是為十二何等下正顯悲行文有十句初總餘別總由孤獨無依故生哀愍今衆生上遠慈尊下不利物故云孤獨別有九種孤獨無依初二依欲求衆生一已得心無厭足故貧窮無依二未得求無休息故三毒火然言多欲多求次三依有求衆生一閉苦果獄二集因覆障故云煩惱稠林三無觀察道由生八難不聞法故安能證滅後四依梵行求衆生前三小乘一行小因不求大因勝善之法二保小果不求菩提為失佛法三不得大涅槃長隨變易生死後一外道雖求解脫以邪行故失於方便菩薩如是見衆生界無量苦惱發大精進作是念言此等衆生我應救我應脫我應淨我應度應著善處應令安住應令歡喜應令知見應令調伏應令涅槃第二菩薩如是下決志救度中初結前生後作是念下正顯救心文有十句對前十類生此十心一救孤獨故二脫貧窮故三淨三毒故四度有獄故五著無障處露地坐故六住善觀察故七得善法欲生歡喜故八知見性相同佛法故九調伏諸根不隨流故十應令涅槃得解脫方便故科第二厭行分中有三前護煩惱行護小乘行已竟下第三修方便攝行菩薩如是厭離一切有為如是愍念一切衆生知一切智智有勝利益第三修行方便攝行謂修攝生方便之行故下經云以何方便而能拔濟即知不離佛智等即是攝生之方便也文有四段初發起攝行之因二作是思惟下思求方便攝行三便作是念下思得攝生方便四菩薩如是下依思修行今初分二先牒前二行以為三因後欲依下依前三因以明發起今初一如是厭離一切有為是牒護煩惱行為離妄想因次如是愍念一切衆生是牒護狹心為不捨一切世間因三知一切智智有勝利益是牒護小心為發精進因謂既知佛智勝益明修行彼道以趣入故三因之中初後是智中一是悲悲智為因能救方便欲依如來智慧救度衆生後發起者既思三因欲將有益之智救可愍衆生作是思惟此諸衆生墮在煩惱大苦之中以何方便而能拔濟令住究竟涅槃之樂第二思求方便攝行者亦只思前衆生墮有為惑業苦中欲令永滅得大涅槃未知方便故思求之便作是念欲度衆生令住涅槃不離無障礙解脫智無障礙解脫智不離一切法如實覺一切法如實覺不離無行無生行慧光無行無生行慧光不離禪善巧決定觀察智禪善巧決定觀察智不離善巧多聞第三思得攝生方便中方便有五一佛無礙智二八地如實覺三四地如行慧四三地禪定五亦三地多聞然此五中從微至著則後後起於前前今觀求逆尋其本展轉相因並云不離此五之中多聞為能起佛智唯所起中間三種通能所起菩薩如是觀察了知已倍於正法勤求修習第四依思修行上既逆推本由多聞今則順行先求聞慧而起聞行文中先結前生後下正起求行日夜唯願聞法喜法樂法依法隨法解法順法到法住法行法後日夜下正起求行於中二先明求法行後菩薩如是下明求行因今初文有十句即是三慧而有四節初三唯聞第四五六通聞思慧第七唯思後三唯修於中初日夜常聞以顯勤行喜法等九顯正修行上求法行下求因行菩薩如是勤求佛法所有珍財皆無吝惜不見有物難得可重但於能説佛法之人生難遭想二求行因中有二初常勤求因後菩薩如是下正修行因今初彼常勤求以何為因示現恭敬重法畢竟盡故於中分六一總明輕財重法是故菩薩於內外財為求佛法悉能捨施二雙捨內外無有恭敬而不能行無有憍慢而不能捨無有承事而不能作無有勤苦而不能受三內財敬事謂心則恭敬捨慢身則承事忘苦若聞一句未曾聞法生大歡喜勝得三千大千世界滿中珍寶四況捨外財若聞一偈未聞正法生大歡喜勝得轉輪聖王位若得一偈未曾聞法能淨菩薩行勝得帝釋梵王位住無量百千劫五輕位重法人天王位終是無常句偈教義法王為果若有人言我有一句佛所説法能淨菩薩行汝今若能入大火坑受極大苦當以相與菩薩爾時作如是念我以一句佛所説法淨菩薩行故假使三千大千世界大火滿中尚欲從於梵天之上投身而下親自受取況小火坑而不能入然我今者為求佛法應受一切地獄衆苦何況人中諸小苦惱六甘苦重法以一句之法能盡苦源地獄多劫誠可甘也菩薩如是發勤精進求於佛法如其所聞觀察修行後正修行因中初結前如其下正顯因相謂靜處思惟正觀為修行之因也若順經文此是後文標舉耳此菩薩得聞法已攝心安住於空間處作是思惟如説修行乃得佛法非但口言而可清淨大文第三厭分束為七修相者前明聞思今顯修慧即五種方便中第四禪善巧決定觀察智也論云云何厭分是菩薩聞諸法已知如説行乃得佛法入禪無色無量神通彼非樂處於中不染必定應作故謂不樂不染即是厭義其無量神通是厭之果經文修有七相一依何修二云何修三何處修四何故修五何時修六何所修七何為修束此七相大為三段初四修行次二正入後一入意今初此菩薩得聞法已即依何修以依正法故次攝心安住即云何修攝散住法是修相故次於空間處即何處修次作是思惟下即何故修要得修行方證得故此於七相中已具四相然非但口言通於説聽謂非但聽聞文字音聲而得清淨也然皆即妄即真圓融自在任運而發不同欣厭佛子是菩薩住此發光地時第二證入中初結前即何時修證謂在三昧時是修行時正修行竟是證入時後文即離欲惡下即何所修修何所證謂證八定八定之義廣有多釋今疏略以四門分別一入意二釋名三體性四釋文今初入意者下經云但隨順法故行而無所染著論云以何意故入禪無色無量神通為五種衆生故一為禪樂憍慢衆生故入諸禪謂得世禪恃以生慢二為無色解脫憍慢衆生故入無色定謂外道證此以為涅槃恃以生慢菩薩示入八禪一一過彼故攝伏之三為苦惱衆生入慈悲無量令安善處永與樂故入慈無量應解彼苦令不受故入悲無量四為得解脫衆生故入喜捨無量謂喜其所得自離動亂故五為邪歸依衆生故入勝神通力令正信故又示入禪定令物倣故善自調鍊寄位次第法應爾故尚不同二乘自為豈與凡外同年次釋名者禪那西音此云靜慮靜謂寂靜慮謂審慮是以靜能斷結慮能正觀諸無色定有靜無慮雖能斷結不能正觀欲界等持有慮無靜雖能正觀不能斷結故唯色界獨受斯稱次無色定者此四地中超過一切有色法故違害一切有色法故色法於彼無容生故俱舍云無色謂無色皆無色故受無色名次別名者初四禪者一初禪有尋有伺靜慮具五支謂尋伺喜樂定亦名定生喜樂地謂離欲界生得喜樂故二禪無尋無伺靜慮具四支謂內淨喜樂定故三禪離喜靜慮具五支謂捨念慧樂定亦名離喜妙樂地謂離下界喜樂得妙樂故四禪離樂靜慮具四支謂捨念中受定亦名捨念清淨地無色別名至下當辨三釋體性者婆沙云靜慮有二種一修得是善性攝心一境性以善等持為自性故二生得隨地所繫五蘊為性無色體性但除於色餘義同前大乘宗中亦無異轍若會相歸性則八定支林一切皆空若事盡理現皆如來藏泯絶無寄則定亂兩亡若事理圓融一即一切四釋文初明四禪後説四空四禪之中並勒為四一離障二對治三利益四彼二依止三昧即離欲惡不善法有覺有觀離生喜樂住初禪今釋初禪一即離欲惡不善法者此明離障以一即離貫於下三離五欲故名為離欲斷十惡故名為離惡除五蓋故名離不善法言離惡不善者煩惱欲因所生種種惡不善法即身口惡行總辨欲界諸不善法已明離障二有覺有觀此有二支是修行對治新譯名尋伺皆初粗後細尋謂尋求伺謂伺察心之粗性名之為尋心之細性名之為伺三離生喜樂者是修行利益慶離欲惡等是故生喜身心猗息及得解脫之樂故名為樂由此名利益支四住初禪者是彼二依止三昧謂於所緣審正觀察心一境性為彼對治及利益支之所依止依止定力尋等轉故其所離障以無行體非是支故不為彼依而言初者欲界上進此最初故而言住者即安住義滅覺觀內淨一心無覺無觀定生喜樂住第二禪第二禪中一滅覺觀是所離障覺觀初動發生三識亂於二禪如淨水波動則無所見故初禪能治此為所治則病盡藥亡二內淨一心無覺無觀者是修行對治言內淨者謂信平等令內心淨言一心者釋於內義唯緣法塵不同初禪有三識故故阿毗曇云欲界地中心行六處初禪地中心行四處謂無鼻舌二禪已上心行一處唯意識身緣法塵故無覺無觀釋於淨義不同初禪有覺觀故前滅覺觀顯於所治此覆言無顯能治無故非重也三言定生喜樂者此二支是修行利益初禪慶背欲惡故名離生今慶覺觀心息故名定生如淨鑑止水故身心適悅四住第二禪即彼二依止三昧離喜住捨有念正知身受樂諸聖所説能捨有念受樂住第三禪第三禪中一離喜者是所離障謂二禪利益支喜心分別想生亂動三禪轉寂故須除遣二住捨有念正知三支者是修行對治一住捨者即是捨數揀非捨受論名行捨行心調停捨彼喜過故顯揚云住捨者已生喜不忍可故平等正直無動安住二有念者於喜不行中不忘明記故三正知者或時失念喜行於此分別正念而住謂住於捨上三即前內淨漸修轉勝至此別開深細寂靜故能治下地喜踊浮動三身受樂下是利益支初身受樂正顯支體謂離二禪浮動喜心最極寂靜得大輕安身心俱樂以身在樂中是故心樂亦名身受次諸聖所説捨有念受樂者釋成勝義謂諸下地無如是樂及無間捨上有捨而復無樂故諸佛及佛弟子説第三禪具有能捨及正念知而復受樂故諸樂中三禪樂勝四住第三禪即彼二依止三昧斷樂先除苦喜憂滅不苦不樂捨念清淨住第四禪第四禪斷樂先除苦喜憂滅者即是離障三禪勝樂於此為害如重病人觀妙音樂為障四禪故須除遣故云斷樂得此定者所有苦樂皆得超越故總集説先除苦等先之一字總貫下三謂二禪先除苦受三禪先滅喜受初禪先滅憂受并今斷樂已滅四受二不苦不樂者是利益支餘禪皆先明治今此先明益者乘前總無四受便舉不苦不樂明五受內唯有一捨是不動故三捨念清淨此二是對治支亦即名地三禪捨念與樂愛俱此斷樂愛故云清淨喜心浮動常須正知樂受深細但須捨念若遠顯清淨者瑜伽云一切下地災患已斷以離八災患謂尋伺苦樂憂喜出息入息是故此中捨念清淨由是此禪心住無動四住第四禪即彼二依止然入上色定其身相狀如處室中入下四空如處空中上四禪竟下四空先敘意第二四空定空處等名同心一境性有何差別俱舍定品顯此差別由離下地染故立四名謂離第四禪立空無邊處離空無邊處立識無邊處差別既爾從何得名復次頌云空無邊等三名從加行立非想非非想昧劣故立名謂修定前起加行位厭壞色故作勝解想思無邊空加行成時名空無邊處厭空想識無所有準此可知其第四空由想昧劣謂無下地明慧勝想得非想名有昧劣想名非非想故故云前三無色加行受名第四無色當體受稱然此四空亦各有四謂離障等而經文但有三句義含有四謂初離障具對治義若依瓔珞本業四無色定各有五支謂想護止觀一心如初空定厭色相起於空想即今對治護彼色相令不現前若超色想即名為止是今離障空無邊行照了分明即是觀義是初利益一心即是彼二所依超一切色想滅有對想不念種種想入無邊虗空住虗空無邊處今初空處謂觀虗空作無邊行相能滅色想心安空定名空無邊處四空名處者謂有情生長處故文中三句即為三別初明離障二辨利益三明依止今初以經三想句連為義句故曲有三言離障者謂離三有對曲色一有見有對色謂色界此一有見謂為眼根所觀照故名為有見五根五境此之十界有色有對以此體是色故極微所成更相障礙故名有對二不可見有對色者謂眼等五根對聲香味觸也三無見無對色者謂無表法處色也今言超一切色想者過眼識相此明超可見有對二滅有對想者耳鼻舌身識和合想滅故此滅不可見有對三不念種種者不念意識和合想故意識分別一切法故説名種種此滅不可見無對意識雖緣非色之境今但取緣色自有種種皆云想者小乘以在色欲修此定未捨形色故不言滅色但言滅想想取色相故偏滅之大乘之中決唯滅想若超色想説無色者後滅空識應無識空若於色界頓修空定則六識行境並皆得滅已明離障云何對治前三句中不念之言含於對治謂不分別色等境故何以不念見無我故約菩薩實治故云無我若依有漏但厭粗以為加行二入無邊虗空者是修行利益謂三色想絶則入空理廓爾無邊故三住虗空無邊處者是彼二依止三昧後之三定一同於此超一切虗空無邊處入無邊識住識無邊處二識無邊處心緣內識作無邊行相故以為名初超虗空無邊處是明離障彼何所障外念為粗故云何對治見彼外念粗分別過患故二入無邊識是修行利益前明捨外今辨緣內正理云謂於純淨六識身能了知中善取相已安住勝解由假想力思惟觀察無邊識相由此加行為先得入根本後依止可知超一切識無邊處入無少所有住無所有處第三無所有處者即內外皆無也初超無邊識是明離障何過須超事念粗故云何對治見粗念事分別過患次入無少所有者修行利益前以捨外緣內故為粗念既無所取能取亦無故內外俱無斯為利益瑜伽云從識處上進時離其識外更求餘境都無所得此意明識既為粗識外復無故無所有住無所有處是二依止超一切無所有處住非有想非無想處四非想中無下七地明了之想有昧劣想故以為名超一切無所有處是所離障云何對治無彼無所有以見分別粗念過患故為能治既寂無所有云何名粗猶有無所有想故經闕一句論經則具彼云知非有想非無想安隱則修行利益即入非有想非無想是二依止瑜伽云先入無所有想定超過一切有所有想今復超過無所有想故言非想又言非無想者非如無想及滅盡定一切諸想皆悉滅盡唯有微細想緣無想境轉故即於此處超勝解則超近分而入根本此中所以不出三界者由緣無想境即是細想外道不了謂為涅槃未能無緣豈離心境況計此為我故法華喻頭上火然若知此患更求上進求上所緣竟無所得無所得故滅而不轉則得滅受想定也若未得此定厭相為先後想不行即入無想定今更約第一義修略示四空謂觀色即空心安於空是空處定次知空色不出於心是識處定次心境兩忘為無所有次亦亡無所有想緣無想處名非想非非想若不緣此無想則諸漏永寂但隨順法故行而無所樂著第三入意但順化衆生法不同凡小有愛味等三厭分竟佛子此菩薩心隨於慈廣大無量不二無量無對無障無惱遍至一切處盡法界虗空界遍一切世間大文第四明其厭果即前八定之所等引故名為果文分為三初四無量即行方便果次五神通即行用果三此菩薩於諸禪下總結自在今初所以先明者凡夫味定三界輪回二乘上升多皆趣寂菩薩因定發生慈悲準瑜伽四種無量為四有情緣求樂衆生興慈有苦興悲有善隨喜有惑不染此四皆緣無量境故名無量若總相説皆以定慧為體若別明之慈即與樂無嗔為體悲則拔苦不害為體喜則慶他不嫉為體自他捨惑即是喜捨文中分二初別顯慈行後住悲下類顯餘三初中有十二句心隨於慈此句為總隨有二義一心不趣寂動皆含慈二以慈心隨逐於物如犢隨母慈之種類總有其三謂一衆生緣慈二法緣慈三無緣慈緣謂緣念初緣假者欲與其樂此通凡夫次緣人空但有蘊等善惡行法以用教化此通小乘三緣衆生體空欲令悟入此通大乘今初又此七句含有八義曲攝為四初四句言與樂正顯行相廣者與欲界樂欲境廣多故大者與同喜樂謂初二禪喜受俱故高出名大無量者三禪已上離苦離喜故深故名無量不二者三樂平等與故次二治障不愛之冤亦與其樂故無冤障是愛之親亦與其樂非是偏情故無對礙中心無愛不愛故非障也次一清淨謂無身心不調五蓋等障是行清淨慈後無惱一句攝果慈定起於色界正果慈之餘勢起欲界習果皆無苦惱之事故修慈經説修慈有十五利謂臥安覺安天護人護眠無惡夢寤常歡喜水不能漂火不能燒刀不能傷毒不能害常生善處鎮受快樂正報梵世殘報人王遠果作佛然此中有多種果初現報果常生下後報果正報梵世望上生報望下正報殘報人王即是習果又初士用果水不能漂等是增上果常生下異熟果殘報等流果作佛是離繫果修一慈心三報不斷五果俱圓無費一毫而功報無極幸諸後學思而修之上釋衆生緣慈次遍至一切處即法緣慈橫遍十方竪通三界彼中所有一切諸法皆能緣念法者謂聖凡五蘊之法及衆生所有分別作業之法名為法緣後二句無緣者無緣有二一自體無緣竪窮法空故云盡法界二遍至無緣顯空無分齊橫盡虗空末句云遍一切世間者總結上慈成無量義也住悲喜捨亦復如是結類三可知上明四無量果佛子此菩薩得無量神通力能動大地以一身為多身多身為一身或隱或顯石壁山障所往無礙猶如虗空於虗空中加趺而去同於飛鳥入地如水履水如地身出煙𦦨如大火聚復雨於水猶如大雲日月在空有大威力而能以手捫摸摩觸其身自在乃至梵世第二佛子下得五神通明行功用果前內懷慈濟之心此外現救生之用妙用難測曰神自在無壅曰通文中有五一神境二天耳三他心四宿住五天眼寄同世間故但得五外色內身皆神之境轉變多種受神之名亦名神足依欲勤心觀之所成故亦名如意隨意成故餘名易了今約利生三業初一約身到機所次二口業天耳聞佛説法聞衆方言以他心智通隨種種言音皆盡知已將前所聞之法隨其所聞之意復宜用何言之異而授與之後二意業宿住知其過去是何界種天眼見其未來遠近成益隨應化之今初身通初總明後能動下別顯總中云得者總修總得然通依四禪多依第四別中得三種自在一世間自在動大地故二以一身下身自在三石壁下作業自在此菩薩天耳清淨過於人耳悉聞人天若近若遠所有音聲乃至蚊蚋虻蠅等聲亦悉能聞第二天耳通初總標其體謂天耳清淨清淨有二義一離欲界法得靜慮引生清淨大種所造二離於障礙審諦聞故由此過於人耳悉聞下顯用釋過人義遠細皆知故此菩薩以他心智如實而知他衆生心所謂有貪心如實知有貪心離貪心如實知離貪心有瞋心離瞋心有癡心離癡心有煩惱心無煩惱心小心廣心大心無量心略心非略心散心非散心定心非定心解脫心非解脫心有上心無上心雜染心非雜染心廣心非廣心皆如實知菩薩如是以他心智知衆生心第三他心通中三初總知他心者通於王所次所謂下別後菩薩如是下結別中二十六心行相各異然除小等四心餘皆障治間明善惡對顯總攝為九一以初六心明隨煩惱謂隨緣現起煩惱相應故名為隨非約小惑名隨也言有貪等即三不善根及三善根以為能治二有煩惱等二心明使即是隨眠三小等四心名生約無記報心人心小欲天廣色天大無色二解脫無量以作空識無邊行相故上二不爾四有四心學三昧行略者謂由止行於內所緣繫其心故非略者太沉昧故或不一所緣故散者太舉於五妙欲境隨順流散故非散者於妙所緣明了顯現故前二約定後二約慧五有二心明得三昧定者正入根本定故不定者未入及起時故六有二心明得解脫有縛無縛故七有餘凡夫增上慢即前類之餘以得四禪謂為四果即粗習行名上無此即細習行名無上八有二心妄行正行論經名求不求希求名聞即是雜染反此非染九有二心大乘得失悲智兼濟為廣隨闕非廣上之九類不出三種初二煩惱次一是苦餘皆是業業有善惡耳皆如實知者審於事實見理實故亦非心外見法亦非無境可知若自他相絶則與衆生心同一體故無心外也不壞能所故能知也又他心是總餘皆是別六相圓融一乘之實知也此菩薩念知無量宿命差別所謂念知一生念知二生三生四生乃至十生二十三十乃至百生無量百生無量千生無量百千生成劫壞劫成壞劫無量成壞劫我曾在某處如是名如是姓如是種族如是飲食如是壽命如是久住如是苦樂我於彼死生於某處從某處死生於此處如是形狀如是相貌如是言音如是過去無量差別皆能憶念第四宿住智通初總標誰能念即宿住之智次所謂下別顯後如是過去下總結別中初念何事謂一生乃至多劫中事此顯念時次我曾下云何念即念相差別也念彼因中名字不同姓謂父母家姓如迦葉等種族即剎利貴賤等餘可知此菩薩天眼清淨過於人眼見諸衆生生時死時好色惡色善趣惡趣隨業而去若彼衆生成就身惡行成就語惡行成就意惡行誹謗賢聖具足邪見及邪見業因緣身壞命終必墮惡趣生地獄中若彼衆生成就身善行成就語善行成就意善行不謗賢聖具足正見正見業因緣身壞命終必生善趣諸天之中菩薩天眼皆如實知第五天眼通論明生死智通約根約境異故初總顯能見誰能見天眼故清淨者審見故過人者遠見故次見諸下別顯所見初見生死本有之果隨業之因若彼衆生下云何見別見因果不同如二地善攝戒中辨菩薩下結此菩薩於諸禪三昧三摩鉢底能入能出然不隨其力受生但隨能滿菩提分處以意願力而生其中第三總結自在近結厭果遠結前厭於何自在即前禪等禪謂四禪三昧者四無量慈等三昧故三摩鉢底此云等至此應譯者之誤合云三摩呬多以此云等引五通即所引故云何自在謂智能出入則散動不能縛即心生時隨心用現在前故大悲方便不隨受生則定不能縛若不隨禪生當何所生不揀淨穢但能滿菩提分處即生其中謂諸佛菩薩共生一處是能滿處以願力者非業繫生故上地行竟下地果佛子是菩薩住此發光地以願力故得見多佛所謂見多百佛見多千佛見多百千佛乃至見多百千億那由他佛第二位果三界即為三別初調柔果中有法喻合今初鍊行緣次悉以下明能鍊行後見縛下明所鍊淨悉以廣大心深心恭敬尊重承事供養衣服飲食臥具湯藥一切資生悉以奉施亦以供養一切衆僧以此善根回向阿耨多羅三藐三菩提於其佛所恭敬聽法聞已受持隨力修行此菩薩觀一切法不生不滅因緣而有次明鍊行中先福行次回向行後修智行言觀一切法不生不滅者即法性觀於清淨法中不見增故不生煩惱妄想中不見減故不滅因緣而有者謂淨法從緣生故無可增妄法從緣滅故無可減又此三地世間滿故於禪定為此實觀起後地無生行慧亦即善巧決定觀察智也見縛先滅一切欲縛色縛有縛無明縛皆轉微薄於無量百千億那由他劫不積集故邪貪邪嗔及以邪癡悉得除斷所有善根轉更明淨二所鍊淨中先明斷惑後鍊細異粗前中五縛即五住煩惱若合色有即是四縛亦名四流見縛先滅者初地見道已斷分別惑故一切欲等者論云一切修道中三縛及彼因同無明習氣皆悉微薄謂煩惱障三縛現行及種故云彼因與當地所知障種同滅故云無明習氣習氣即種義次於無量下揀細異粗謂是斷細以多劫不積三不善根故細種漸斷善根轉淨言多劫者仁王經説初地經四阿僧祇劫後地培增以細障難斷經劫轉多多劫不積故邪貪等斷然但細習以初地見道二地修道已斷粗故善根轉淨則前信等佛子譬如真金善巧鍊治稱兩不減轉更明淨喻言稱兩不減者厭離世間勝於前地信等入於厭火故自在不失減也菩薩亦復如是住此發光地不積集故邪貪邪瞋及以邪癡皆得除斷所有善根轉更明淨此菩薩忍辱心柔和心諧順心悅美心不瞋心不動心不濁心無高下心不望報心報恩心不諂心不誑心無險詖心皆轉清淨三合中二先正合前行淨後此菩薩下別顯忍淨此地忍增故偏明之有十三心初二句為總一他加惡辱能忍受故二善護他心謂他凌我以剛強我則騁之以柔和故下諸句別釋此二別中初有二心分別善護他心一諧順心以他於菩薩作惡疑菩薩嗔恨菩薩現同伴侶與之諧和二悅美心者愛語誨誘次以三心分別加惡忍受謂身加惡而不瞋口毀辱而不動心嫉害而憂惱不能濁次有三心出上二因無高下者過去久離憍慢故不自高舉輕下於彼由此能忍柔和護他後二即加惡不改之因一不望報恩故益他被辱而忍受二受恩常念小恩大報故衆生於我有恩法爾應忍後三心顯上二心離障雖柔順護他而非諂實為利益故不誑心無隱覆諂故險詖者諂也此菩薩於四攝中利行偏多十波羅蜜中忍波羅蜜偏多餘非不修但隨力隨分此菩薩下第二別地行相佛子是名菩薩第三發光地第三結説地相菩薩住此地多作三十三天王二攝報果此下諸地攝報文皆分二初上勝身能以方便令諸衆生捨離貪欲布施愛語利行同事如是一切諸所作業皆不離念佛不離念法不離念僧乃至不離念一切種一切智智次上勝果中先自分行復作是念我當於一切衆生中為首為勝為殊勝為妙為微妙為上為無上乃至為一切智智依止者若勤行精進於一念頃得百千三昧得見百千佛知百千佛神力能動百千佛世界乃至示現百千身一一身百千菩薩以為眷屬次勝進行若以菩薩殊勝願力自在示現過於此數百劫千劫乃至百千億那由他劫不能數知三願智果爾時金剛藏菩薩欲重宣其義而説頌言清淨安住明盛心厭離無貪無害心堅固勇猛廣大心智者以此入三地第三重頌十八偈分五初一頌起厭行分菩薩住此發光地觀諸行法苦無常不淨敗壞速歸滅無堅無住無來往觀諸有為如重病憂悲苦惱惑所纏三毒猛火恆熾然無始時來不休息二有十二偈頌厭行分於中初二護煩惱行厭離三有不貪著專求佛智無異念難測難思無等倫無量無邊無逼惱見佛智已愍衆生孤獨無依無救護三毒熾然常困乏住諸有獄恆受苦煩惱纏覆盲無目志樂下劣喪法寶隨順生死怖涅槃我應救彼勤精進次三偈頌護小乘行將求智慧益衆生思何方便令解脫不離如來無礙智彼復無生慧所起心念此慧從聞得如是思惟自勤勵日夜聽習無間然唯以正法為尊重國城財貝諸珍寶妻子眷屬及王位菩薩為法起敬心如是一切皆能捨頭目耳鼻舌牙齒手足骨髓心血肉此等皆捨未為難但以聞法為最難設有人來語菩薩孰能投身大火聚我當與汝佛法寶聞已投之無怯懼假使火滿三千界身從梵世而投入為求法故不為難況復人間諸小苦從初發意至得佛其間所有阿鼻苦為聞法故皆能受何況人中諸苦事後七偈頌方便攝行聞已如理正思惟獲得四禪無色定四等五通次第起不隨其力而受生三一偈頌厭分及果菩薩住此見多佛供養聽聞心決定斷諸邪惑轉清淨如鍊真金體無減住此多作忉利王化導無量諸天衆令捨貪心住善道一向專求佛功德佛子住此勤精進百千三昧皆具足見百千佛相嚴身若以願力復過是四三偈頌位果一切衆生普利益彼諸菩薩最上行如是所有第三地我依其義已解釋五一偈頌結説第三發光地竟
