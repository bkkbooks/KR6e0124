body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈如來現相品第二此品以下正宗分以舉果勸樂生信分有六品經初教起因緣一品已竟次説法儀式有二品茲一品來也是當分方便先現相為遠方便後三昧品為近方便今初一品有六段一衆海同請二光召有緣三所召雲奔四現瑞表説五稱揚佛德六結通無盡言品名現相者所現之相有五一現面門光相召十方衆二現眉間光相示説法主三震動剎網以警羣機四佛前現華表説依果五白毫出衆表教從佛流有此五相故以為名爾時諸菩薩及一切世間主作是思惟此下海衆已集皆希佛境故同念請其請有二初長行海衆念請次偈頌供聲偈請通請有四十句問云何是諸佛地云何是諸佛境界云何是諸佛加持云何是諸佛所行云何是諸佛力云何是諸佛無所畏云何是諸佛三昧云何是諸佛神通云何是諸佛自在云何是諸佛無能攝取此十句問佛德用圓備云何是諸佛眼云何是諸佛耳云何是諸佛鼻云何是諸佛舌云何是諸佛身云何是諸佛意云何是諸佛身光云何是諸佛光明云何是諸佛聲云何是諸佛智唯願世尊哀愍我等開示演説此十句問佛體相顯著上二十句問果又十方世界海一切諸佛皆為諸菩薩説世界海衆生海法界安立海佛海佛波羅蜜海佛解脫海佛變化海佛演説海佛名號海佛壽量海此例舉十方佛為菩薩説十海乃顯化用普周及一切菩薩誓願海一切菩薩發趣海一切菩薩助道海一切菩薩乘海一切菩薩行海一切菩薩出離海一切菩薩神通海一切菩薩波羅蜜海一切菩薩地海一切菩薩智海願佛世尊亦為我等如是而説此下十句問因德深廣即此十海已從十信至等覺位以問深故此四十問但以果中十海為總九會同答十海一世界成就品答世界安立海二華藏品答世界海三名號品答如來名號海四四聖諦品答演説海五光明覺品至十忍品別答十句因問通答衆生海修因之人即所化生故六阿僧祇品答變化海長行舉數偈中廣明變化重重微細難説七壽量住處皆答壽量海八不思議等五品別答二十句果問總明佛海就德深廣以顯佛故九第八會答波羅蜜海總攝諸位皆成行故十第九會答解脫海證入法界起大用故上約通説若約局説則當會答盡此有二義一現相答具在下文二者言説答此有二義一經來未盡以遮那品後無結束意在未來之經中答之二者答二兼餘謂正答世界安立及世界則兼答餘三十八問故補義曰前二十句問果乃舉毗盧所證之果後十句問因正問取果之因中間十句引例問果中十海通是菩薩所求故約諸位通修從十信至等覺位位普攝故為普行後三遍研窮皆此行也故疏云九會同答爾時諸菩薩威神力故於一切供養具雲中自然出音而説頌言無量劫中修行滿菩提樹下成正覺為度衆生普現身如雲充遍盡未來衆生有疑皆使斷廣大信解悉令發無邊際苦普使除諸佛安樂咸令證菩薩無數等剎塵俱來此會同瞻仰願隨其意所應受演説妙法除疑惑云何了知諸佛地云何觀察如來境佛所加持無有邊願示此法令清淨云何是佛所行處而以智慧能明入佛力清淨廣無邊為諸菩薩應開示云何廣大諸三昧云何淨治無畏法神通力用不可量願隨衆生心樂説諸佛法王如世主所行自在無能制及餘一切廣大法為利益故當開演佛眼云何無有量耳鼻舌身亦復然意無有量復云何願示能知此方便如諸剎海衆生海法界所有安立海及諸佛海亦無邊願為佛子咸開暢永出思議衆度海普入解脫方便海所有一切法門海此道場中願宣説此下供聲偈請前在念請今彰言請使衆同曉供具出音者前既為法興供今乃以供宣心不因撫擊故曰自然以彰供具即法界體故其偈中所請者即述前念請四十問意爾時世尊知諸菩薩心之所念即於面門衆齒之間放佛剎微塵數光明所謂衆寶華遍照光明出種種音莊嚴法界光明垂布微妙雲光明十方佛坐道場現神變光明一切寶𦦨雲蓋光明充滿法界無礙光明遍莊嚴一切佛剎光明逈建立清淨金剛寶幢光明普莊嚴菩薩衆會道場光明妙音稱揚一切佛名號光明如是等佛剎微塵數一一復有佛剎微塵數光明以為眷屬其光悉具衆妙寶色普照十方各一億佛剎微塵數世界海彼世界海諸菩薩衆於光明中各得見此華藏莊嚴世界海以佛神力其光於彼一切菩薩衆會之前而説頌言無量劫中修行海供養十方諸佛海化度一切衆生海令成妙覺遍照尊毛孔之中出化雲光明普照於十方應受化者咸開覺令趣菩提淨無礙佛昔往來諸趣中教化成熟諸羣生神通自在無邊量一念皆令得解脫摩尼妙寶菩提樹種種莊嚴悉殊特佛於其下成正覺放大光明普威耀大音震吼遍十方普為弘宣寂滅法隨諸衆生心所樂種種方便令開曉往修諸度皆圓滿等於千剎微塵數一切諸力悉已成汝等庶往同瞻禮十方佛子等剎塵悉共歡喜而來集已雨諸雲為供養今在佛前專覲仰如來一音無有量能演契經深大海普雨妙法應羣心彼兩足尊宜往見三世諸佛所有願菩提樹下皆宣説一剎那中悉現前汝可速詣如來所毗盧遮那大智海面門舒光無不見今待衆集將演音汝可往觀聞所説此下光召有緣以前念請之菩薩皆是法界緣起故屬有緣將答所問以所問者乃法界海則不止現前故以光照法界海以召集諸有緣海會衆也齒門放光以齒具四十以表答四十問即以此光為教體故次以佛神力而説頌言即以光中之偈説佛十號具足正覺始成故召十方齊往同觀聽法故結云汝可往觀聞所説爾時十方世界海一切衆會蒙佛光明所開覺已各共來詣毗盧遮那如來所親近供養所謂此華藏莊嚴世界海東次有世