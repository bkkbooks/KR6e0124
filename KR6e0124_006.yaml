提之妙道劫海修行無厭倦令苦衆生得解脫心無下劣及勞疲佛子善入斯方便盡諸劫海修方便無量無邊無有餘一切法門無不入而恆説彼性寂滅三世諸佛所有願一切修治悉令盡即以利益諸衆生而為自行清淨業一切諸佛衆會中普遍十方無不往皆以甚深智慧海入彼如來寂滅法一一光明無有邊悉入難思諸國土清淨智眼普能見是諸菩薩所行境菩薩能住一毛端遍動十方諸國土不令衆生有怖想是其清淨方便地一一塵中無量身復現種種莊嚴剎一念歿生普令見獲無礙慧莊嚴者三世所有一切劫一剎那中悉能現知身如幻無體相證明法性無礙者普賢勝行皆能入一切衆生悉樂見佛子能住此法門諸光明中大音吼此下光聲自述前既光聲召命今亦光聲自述以菩薩位極用窮深廣若非自述時衆難知文有十頌至諸光明中大音吼止爾時世尊欲令一切菩薩大衆得於如來無邊境界神通力故放眉間光此光名一切菩薩智光明普照耀十方藏其狀猶如寶色燈雲遍照十方一切佛剎其中國土及以衆生悉令顯現又普震動諸世界網一一塵中現無數佛隨諸衆生性欲不同普雨三世一切諸佛妙法輪雲顯示如來波羅蜜海又雨無量諸出離雲令諸衆生永度生死復雨諸佛大願之雲顯示十方諸世界中普賢菩薩道場衆會作是事已右繞於佛從足下入爾時佛前有大蓮華忽然出現其華具有十種莊嚴一切蓮華所不能及所謂衆寶間錯以為其莖摩尼寶王以為其藏法界衆寶普作其葉諸香摩尼以為其鬚閻浮檀金莊嚴其臺妙網覆上光色清淨於一念中示現無邊諸佛神變普能發起一切音聲摩尼寶王影現佛身於音聲中普能演説一切菩薩所修行願此華生已一念之間於如來白毫相中有菩薩摩訶薩名一切法勝音與世界海微塵數諸菩薩衆俱時而出右繞如來經無量匝禮佛足已時勝音菩薩坐蓮華臺諸菩薩衆坐蓮華鬚各於其上次第而坐其一切法勝音菩薩了深法界生大歡喜入佛所行智無疑滯入不可測佛法身海往一切剎諸如來所身諸毛孔悉現神通念念普觀一切法界十方諸佛共與其力令普安住一切三昧盡未來劫常見諸佛無邊法界功德海身乃至一切三昧解脫神通變化即於衆中承佛威神觀察十方而説頌曰佛身充滿於法界普現一切衆生前隨緣赴感靡不周而恆處此菩提座如來一一毛孔中一切剎塵諸佛坐菩薩衆會共圍繞演説普賢之勝行如來安處菩提座一毛示現多剎海一一毛現悉亦然如是普周於法界一一剎中悉安坐一切剎土皆周遍十方菩薩如雲集莫不咸來詣道場一切剎土微塵數功德光明菩薩海普在如來衆會中乃至法界咸充遍法界微塵諸剎土一切衆中皆出現如是分身智境界普賢行中能建立一切諸佛衆會中勝智菩薩僉然坐各各聽法生歡喜處處修行無量劫已入普賢廣大願各各出生衆佛法毗盧遮那法海中修行克證如來地普賢菩薩所開覺一切如來同讚喜已獲諸佛大神通法界周流無不遍一切剎土微塵數常現身雲悉充滿普為衆生放大光各雨法雨稱其心爾時衆中復有菩薩摩訶薩名觀察一切勝法蓮華光慧王承佛威神觀察十方而説頌曰如來甚深智普入於法界能隨三世轉與世為明導諸佛同法身無依無差別隨諸衆生意令見佛色形具足一切智遍知一切法一切國土中一切無不現佛身及光明色相不思議衆生信樂者隨應悉令見於一佛身上化為無量佛雷音遍衆剎演法深如海一一毛孔中光網遍十方演佛妙音聲調彼難調者如來光明中常出深妙音讚佛功德海及菩薩所行佛轉正法輪無量無有邊所説法無等淺智不能測一切世界中現身成正覺各各起神變法界悉充滿如來一一身現佛等衆生一切微塵剎普現神通力爾時衆中復有菩薩摩訶薩名法喜慧光明承佛威神觀察十方而説頌言佛身常顯現法界悉充滿恆演廣大音普震十方國如來普現身遍入於世間隨衆生樂欲顯示神通力佛隨衆生心普現於其前衆生所見者皆是佛神力光明無有邊説法亦無量佛子隨其智能入能觀察佛身無有生而能示出生法性如虗空諸佛於中住無住亦無去處處皆見佛光明靡不周名稱悉遠聞無體無住處亦無生可得無相亦無形所現皆如影佛隨衆生心為興大法雲種種方便門示悟而調伏一切世界中見佛坐道場大衆所圍繞照耀十方國一切諸佛身皆有無盡相示現雖無量色相終不盡爾時衆中復有菩薩摩訶薩名香𦦨光普明慧承佛威神觀察十方而説頌曰此會諸菩薩入佛難思地一一皆能見一切佛神力智身能遍入一切剎微塵見身在彼中普見於諸佛如影現衆剎一切如來所於彼一切中悉現神通事普賢諸行願修治已明潔能於一切剎普見佛神變身住一切處一切皆平等智能如是行入佛之境界已證如來智等照於法界普入佛毛孔一切諸剎海一切佛國土皆現神通力示現種種身及種種名號能於一念頃普現諸神變道場成正覺及轉妙法輪一切廣大剎億劫不思議菩薩三昧中一念皆能現一切諸佛土一一諸菩薩普入於佛身無邊亦無盡爾時衆中復有菩薩摩訶薩名師子奮迅慧光明承佛威神遍觀十方而説頌曰毗盧遮那佛能轉正法輪法界諸國土如雲悉周遍十方中所有諸大世界海佛神通願力處處轉法輪一切諸剎土廣大衆會中名號各不同隨應演妙法如來大威力普賢願所成一切國土中妙音無不至佛身等剎塵普雨於法雨無生無差別現一切世間無數諸億劫一切塵剎中往昔所行事妙音咸具演十方塵國土光網悉周遍光中悉有佛普化諸羣生佛身無差別充滿於法界能令見色身隨機善調伏三世一切剎所有衆導師種種名號殊為説皆令見過未及現在一切諸如來所轉妙法輪此會皆得聞爾時衆中復有菩薩摩訶薩名法海慧功德藏承佛威神觀察十方而説頌曰此會諸佛子善修衆智慧斯人已能入如是方便門一一國土中普演廣大音説佛所行處周聞十方剎一一心念中普觀一切法安住真如地了達諸法海一一佛身中億劫不思議修習波羅蜜及嚴淨國土一一微塵中能證一切法如是無所礙周行十方國一一佛剎中往詣悉無餘見佛神通力入佛所行處諸佛廣大音法界靡不聞菩薩能了知善入音聲海劫海演妙音其音等無別智周三世者入彼音聲地衆生所有音及佛自在聲獲得音聲智一切皆能了從地而得地住於力地中億劫勤修行所獲法如是爾時衆中復有菩薩摩訶薩名慧燈普明承佛威神觀察十方而説頌曰一切諸如來遠離於衆相若能知是法乃見世導師菩薩三昧中慧光普明了能知一切佛自在之體性見佛真實體則悟甚深法普觀於法界隨願而受身從於福海生安住於智地觀察一切法修行最勝道一切佛剎中一切如來所如是遍法界悉見真實體十方廣大剎億劫勤修行能遊正遍知一切諸法海唯一堅密身一切塵中見無生亦無相普現於諸國隨諸衆生心普現於其前種種示調伏速令向佛道以佛威神故出現諸菩薩佛力所加持普見諸如來一切衆導師無量威神力開悟諸菩薩法界悉周遍爾時衆中復有菩薩摩訶薩名華𦦨髻普明智承佛威神觀察十方而説頌曰一切國土中普演微妙音稱揚佛功德法界悉充滿佛以法為身清淨如虗空所現衆色形令入此法中若有深信喜及為佛攝受當知如是人能生了佛智諸有少智者不能知此法慧眼清淨人於此乃能見以佛威神力觀察一切法入住及出時所見皆明了一切諸法中法門無有邊成就一切智入於深法海安住佛國土出興一切智無去亦無來諸佛法如是一切衆生海佛身如影現隨其解差別如是見導師一切毛孔中各各現神通修行普賢願清淨者能見佛以一一身處處轉法輪法界悉周遍思議莫能及爾時衆中復有菩薩摩訶薩名威德慧無盡光承佛威神觀察十方而説頌曰一一佛剎中處處坐道場衆會共圍繞魔軍悉摧伏佛身放光明遍滿於十方隨應而示現色相非一種一一微塵內光明悉充滿普見十方土種種各差別十方諸剎海種種無量剎悉平坦清淨帝青寶所成或覆或傍住或似蓮華合或圓或四方種種衆形相法界諸剎土周行無所礙一切衆會中常轉妙法輪佛身不思議國土悉在中於其一切處導世演真法所轉妙法輪法性無差別依於一實理演説諸法相佛以圓滿音闡明真實理隨其解差別現無盡法門一切剎土中見佛坐道場佛身如影現生滅不可得爾時衆中復有菩薩摩訶薩名法界普明慧承佛威神觀察十方而説頌曰如來微妙身色相不思議見者生歡喜恭敬信樂法佛身一切相悉現無量佛普入十方界一一微塵中十方國土海無量無邊佛咸於念念中各各現神通大智諸菩薩深入於法海佛力所加持能知此方便若有已安住普賢諸行願見彼衆國土一切佛神力若人有信解及以諸大願具足深智慧通達一切法能於諸佛身一一而觀察色聲無所礙了達於諸境能於諸佛身安住智所行速入如來地普攝於法界佛剎微塵數如是諸國土能令一念中一一塵中現一切諸國土及以神通事悉現一剎中菩薩力如是爾時衆中復有菩薩摩訶薩名精進力無礙慧承佛威神觀察十方而説頌曰佛演一妙音周聞十方剎衆音悉具足法雨皆充遍一切言詞海一切隨類音一切佛剎中轉於淨法輪一切諸國土悉見佛神變聽佛説法音聞已趣菩提法界諸國土一一微塵中如來解脫力於彼普現身法身同虗空無礙無差別色形如影像種種衆相現影像無方所如空無體性智慧廣大人了達其平等佛身不可取無生無起作應物普現前平等如虗空十方所有佛盡入一毛孔各各現神通智眼能觀見毗盧遮那佛願力周法界一切國土中恆轉無上輪一毛現神變一切佛同説經於無量劫不得其邊際如此四天下道場中以佛神力十方各有一億世界海微塵數諸菩薩衆而來集會應知一切世界海一一四天下諸道場中悉亦如是此下大文第四現瑞表法上所現相但召有緣今衆既集將陳法海故重現斯瑞瑞文有三初光示法主欲令大衆得如來神通力故次現華表義通表所詮佛華嚴故三現衆表教法藉人弘故光照十方從足下入者足表佛所履意顯從中道果智為法界體是菩薩所履以證入故有大蓮華忽然出現然蓮華亦別表華藏為佛所淨忽然現者依理起事難測量故蓮華莊嚴具表嚴成果體故下其華生已於白毫中有菩薩出者意表果智為因心故名勝音者所詮教法圓滿故曰勝音與眷屬俱者表此圓教攝羣經為眷屬故次下勝音説偈讚佛為稱揚佛德既至任力稱揚自申罔極之情顯佛無涯之德故觀察十方而説頌言頌中總相讚佛亦含諸問疏各有所屬初眉中所出菩薩讚其十方菩薩一一各説偈讚即為十段各讚不同總是讚佛功德結云一切世界海一一四天下諸道場中悉亦如是以彰法界同體也此上結云十方各有一億世界海微塵數諸菩薩衆而來雲集乃通結前光召十方各一億世界海微塵數之衆意謂此一四天下有此道場然彼一一世界海中世界皆有四天下一一如此之集會正顯主伴重重極十方而齊唱也但深觀結文自見無盡之意遠方便竟如來現相品竟
