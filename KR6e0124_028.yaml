body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈十回向品第二十五之六佛子菩薩摩訶薩若見如來出興於世開演正法以大音聲普告一切如來出世如來出世令諸衆生得聞佛名捨離一切我慢戲論復更勸導令速見佛令憶念佛令歸向佛令攀緣佛令觀察佛令讚歎佛復為廣說佛難值遇千萬億劫時乃一出衆生由此得見於佛生清淨信踊躍歡喜尊重供養復於佛所聞諸佛名轉更值遇無數諸佛植諸善本修習增長爾時無數百千萬億那由他衆生因見佛故皆得清淨究竟調伏彼諸衆生於菩薩所皆生最上善知識想因菩薩故成就佛法以無數劫所種善根普於世間施作佛事佛子菩薩摩訶薩開示衆生令見佛時以諸善根如是回向所謂願一切衆生不待勸誘自往見佛承事供養皆令歡喜願一切衆生常樂見佛心無廢捨願一切衆生常勤修習廣大智慧受持一切諸佛法藏願一切衆生隨所聞聲皆悟佛法於無量劫修菩薩行願一切衆生安住正念恆以智眼見佛出興願一切衆生不念異業常憶見佛勤修十力願一切衆生於一切處常見諸佛了達如來遍空法界願一切衆生皆得具足佛自在身普於十方成道說法願一切衆生遇善知識常聞佛法於諸如來得不壞信願一切衆生悉能稱歎諸佛出興令其見者普得清淨是為菩薩摩訶薩歎佛出世善根回向為令衆生見一切佛供養承事於無上法究竟清淨故第四十六歎佛出興如上大威光童子偈聲普告等初施行者即法施行於中法施獲益初聞名離惑益二見身起行益三讚歎增敬益四展轉增長益佛子菩薩摩訶薩捨於大地或施諸佛造立精舍或施菩薩及善知識隨意所用或施衆僧以為住處或施父母或施別人聲聞獨覺種種福田乃至一切貧窮孤露及餘四衆隨意悉與令無所乏或施造立如來塔廟於如是等諸處之中悉為辦具資生什物令隨意用無所恐懼菩薩摩訶薩隨何方所布施地時以諸善根如是回向所謂願一切衆生具足清淨一切智地悉到普賢衆行彼岸願一切衆生得總持地正念受持一切佛法願一切衆生得住持力常能守護一切佛教願一切衆生得如地心於諸衆生意常清淨無有惡念願一切衆生持諸佛種成就菩薩諸地次第無有斷絶願一切衆生普為一切作安隱處悉令調伏住清淨道願一切衆生同諸如來利益世間普使勤修安住佛力願一切衆生普為世間之所愛樂悉令安住無上佛樂願一切衆生獲善方便住佛諸力無畏法中願一切衆生得如地智自在修行一切佛法是為菩薩摩訶薩施大地時善根回向為令衆生皆得究竟一切如來清淨地故第四十七施大地言大地但通相言耳略列諸田中實通一切言別人者謂有資財人非敬非悲故言善知識要在益我然所施之田有敬悲恩德四種之不同疏有多釋今此中菩薩施心悲智齊於虗空事物窮乎法界施田凡聖盡於十方故三事性空深無底三事殊特勝無比三事廣大遍無涯三事相融俱無礙回向行中十願初一果地餘九因地佛子菩薩摩訶薩布施僮僕供養一切諸佛菩薩真善知識或施僧寶或奉父母尊勝福田或復給侍病苦衆生令無闕乏以存其命或復施與貧窮孤露及餘一切無瞻侍者或為守護如來塔廟或為書持諸佛正法以百千億那由他僕使隨時給施其諸僕使皆聰慧善巧性自調順常勤精進無有懈惰具質直心安樂心利益心仁慈心恭恪心無怨恨心無讎敵心能隨受者方俗所宜於彼彼中作諸利益又皆從菩薩淨業所感才能技藝工巧算數靡不通達善能供侍悅可其心菩薩爾時以諸善根如是回向所謂願一切衆生得調順心一切佛所修習善根願一切衆生隨順供養一切諸佛於佛所說悉能聽受願一切衆生得佛攝受常觀如來更無餘念願一切衆生不壞佛種勤修一切順佛善根願一切衆生常勤供養一切諸佛無空過時願一切衆生攝持一切諸佛妙義言詞清淨遊行無畏願一切衆生常樂見佛心無厭足於諸佛所不惜身命願一切衆生得見諸佛心無染著離世所依願一切衆生但歸於佛永離一切邪歸依處願一切衆生隨順佛道心常樂觀無上佛法是為菩薩摩訶薩施僕使時善根回向為令衆生遠離塵垢淨治佛地能現如來自在身故第四十八施僮僕少美曰僮以擬瞻侍執守曰僕以備勞役然不放從良而施與人還令成僕者以菩薩行海無善不修若放從良有三義闕一行海不具二彼僕本願不滿三佛果闕此應機之德佛子菩薩摩訶薩以身布施諸來乞者布施之時生謙下心生如地心生忍受衆苦無變動心生給侍衆生不疲厭心生於諸衆生猶如慈母所有衆善悉回與心生於諸愚險極惡衆生種種侵陵皆寬宥心安住善根精勤給事菩薩爾時悉以善根如是回向所謂願一切衆生隨其所須常無闕乏修菩薩行恆不間斷不捨一切菩薩義利善住菩薩所行之道了達菩薩平等法性得在如來種族之數住真實語持菩薩行令諸世間得淨佛法深心信解證法究竟令諸衆生出生清淨增上善根住大功德具一切智又以此善根令一切衆生常得供養一切諸佛解一切法受持讀誦不忘不失不壞不散心善調伏不調令調以寂靜法而調習之令彼衆生於諸佛所住如是事又以此善根令一切衆生作第一塔應受世間種種供養令一切衆生成最上福田得佛智慧開悟一切令一切衆生作最上受者普能饒益一切衆生令一切衆生成最上福利能使具足一切善根令一切衆生成第一好施處能使獲得無量福報令一切衆生於三界中皆得出離令一切衆生作第一導師能為世間示如實道令一切衆生得妙總持具持一切諸佛正法令一切衆生證得無量第一法界具足虗空無礙正道是為菩薩摩訶薩施自己身善根回向為令衆生皆得應供無量智身故第四十九捨自身為僕回向行中有二十願前十進善後十住持佛子菩薩摩訶薩聞法喜悅生淨信心能以其身供養諸佛欣樂信解無上法寶於諸佛所生父母想讀誦受持無礙道法普入無數那由他法大智慧寶諸善根門心常憶念無量諸佛入佛境界深遠義理能以如來微密梵音興佛法雲雨佛法雨勇猛自在能分別說一切智人第一之地具足成就薩婆若乘以無量百千億那由他大法成滿諸根佛子菩薩摩訶薩於諸佛所聞如是法歡喜無量安住正法自斷疑惑亦令他斷心恆怡暢功德成滿善根具足意恆相續利益衆生心常不匱獲最勝智成金剛藏親近諸佛淨諸佛剎常勤供養一切如來菩薩爾時以諸善根如是回向所謂願一切衆生皆得圓滿最勝之身一切諸佛之所攝受願一切衆生常近諸佛依諸佛住恆得覲仰未曾遠離願一切衆生皆得清淨不壞之身具足一切功德智慧願一切衆生常勤供養一切諸佛行無所得究竟梵行願一切衆生得無我身離我我所願一切衆生悉能分身遍十方剎猶如影現而無來往願一切衆生得自在身普往十方無我無受願一切衆生從佛身生處在如來無上身家願一切衆生得法力身忍辱大力無能壞者願一切衆生得無比身成就如來清淨法身願一切衆生成就出世功德之身生無所得清淨法界是為菩薩摩訶薩以身供佛善根回向為令衆生永住三世諸佛家故第五十聞法喜悅捨身供佛施行者即財法二供初行體欣樂下自利行能以下利他行佛子菩薩摩訶薩以身布施一切衆生為欲普令成就善根憶念善根菩薩摩訶薩自願其身為大明燈普能照耀一切衆生為衆樂具普能攝受一切衆生為妙法藏普能任持一切衆生為淨光明普能開曉一切衆生為世光影普令衆生常得覩見為善根因緣普令衆生常得值遇為真善知識令一切衆生悉蒙教誘為平坦道令一切衆生皆得履踐為無有上具足安樂令一切衆生離苦清淨為明淨日普作世間平等利益菩薩爾時以諸善根如是回向所謂願一切衆生常親近佛入佛智地願一切衆生得隨順智住無上覺願一切衆生常處佛會意善調伏願一切衆生所行有則具佛威儀願一切衆生悉得涅槃深解法義願一切衆生具知足行生如來家願一切衆生捨無明欲住佛志樂願一切衆生生勝善根坐菩提樹願一切衆生殺煩惱賊離怨害心願一切衆生具足護持一切佛法是為菩薩摩訶薩以身布施一切衆生善根回向為欲利益一切衆生令得無上安隱處故第五十一以身布施一切衆生行中亦事法二行後菩薩下別顯中若約事則身為日月光明河池泉井以施於物以三種世間身得自在故若約法則法燈照耀法日利益等回向行中然施行以身就生故願翻衆生以身近佛佛子菩薩摩訶薩自以其身給侍諸佛於諸佛所念報重恩如父母想於諸如來起深信樂以清淨心護佛菩提住諸佛法離世間想生如來家隨順諸佛離魔境界了達一切諸佛所行成就一切諸佛法器菩薩爾時以此善根如是回向所謂願一切衆生得清淨心一切智寶而自莊嚴願一切衆生住善調伏遠離一切諸不善業願一切衆生得不可壞堅固眷屬普能攝受諸佛正法願一切衆生為佛弟子到於菩薩灌頂之地願一切衆生常為諸佛之所攝受永離一切不善之法願一切衆生隨順諸佛修行菩薩最勝之法願一切衆生入佛境界悉皆得授一切智記願一切衆生與諸如來皆悉平等一切佛法無不自在願一切衆生悉為諸佛之所攝受常能修習無取著業願一切衆生常為諸佛第一侍者一切佛所修智慧行是為菩薩摩訶薩給侍諸佛善根回向為欲證得諸佛菩提為欲救護一切衆生為欲出離一切三界為欲成就無損惱心為得無量廣大菩提為欲成就照佛法智為欲常蒙諸佛攝受為得諸佛之所護持為欲信解一切佛法為欲成就與三世佛平等善根為欲圓滿無悔恨心證得一切諸佛法故第五十二施身給侍諸佛行中亦有心持身持佛子菩薩摩訶薩布施國土一切諸物乃至王位悉亦能捨於諸世事心得自在無繫無縛無所戀著遠離惡業饒益衆生不著業果不樂世法不復貪染諸有生處雖住世間非此處生心不執著蘊界處法於內外法心無依住常不忘失諸菩薩行未曾遠離諸善知識持諸菩薩廣大行願常樂承事一切善友菩薩爾時以此善根如是回向所謂願一切衆生為大法王於法自在到於彼岸願一切衆生成佛法王摧滅一切煩惱怨賊願一切衆生住佛王位得如來智開演佛法願一切衆生住佛境界能轉無上自在法輪願一切衆生生如來家於佛自在護持佛種永使不絶願一切衆生開示無量法王正法成就無邊諸大菩薩願一切衆生住淨法界為大法王現佛出興相繼不斷願一切衆生於諸世界作智慧王化導羣生無時暫捨願一切衆生普為法界虗空界等諸世界中一切衆生作法施主使其咸得住於大乘願一切衆生得成具足衆善之王與三世佛善根齊等是為菩薩摩訶薩布施王位善根回向為欲令彼一切衆生究竟住於安隱處故第五十三施國所有乃至王位行中初明事行後於諸下明其心捨棄萬乘如脫履何繫縛哉佛子菩薩摩訶薩見有人來乞王京都嚴麗大城及以關防所有輸稅盡皆施與心無吝惜專向菩提發大誓願住於大慈行於大悲志意歡悅利益衆生以廣大智解了深法安住諸法平等法性發心為求一切智故於自在法起深樂故於自在智求證得故淨修一切諸功德故住於堅固廣大智故廣集一切諸善根故修行一切佛法願故自然覺悟大智法故安住菩提心無退故修習一切菩薩行願一切種智盡究竟故而行布施以此善根如是回向所謂願一切衆生悉能嚴淨無量剎土奉施諸佛以為住處願一切衆生常樂居止阿蘭若處寂靜不動願一切衆生永不依止王都聚落心樂寂靜永得究竟願一切衆生永不樂著一切世間於世語言常樂遠離願一切衆生得離貪心施諸所有心無中悔願一切衆生得出離心捨諸家業願一切衆生得無吝心常行惠施願一切衆生得不著心離居家法願一切衆生得離衆苦除滅一切災橫怖畏願一切衆生嚴淨十方一切世界奉施諸佛是為菩薩摩訶薩布施王都善根回向為令衆生悉能嚴淨諸佛剎故第五十四施王都城佛子菩薩摩訶薩所有一切內宮眷屬妓侍衆女皆顏貌端正才能具足談笑歌舞悉皆巧妙種種衣服種種華香而以嚴身見者歡喜情無厭足如是寶女百千萬億那由他數皆由菩薩善業所生隨意自在敬順無失盡以布施諸來乞者而於其中無愛樂心無顧戀心無耽著心無繫縛心無執取心無貪染心無分別心無隨逐心無取相心無樂欲心菩薩爾時觀諸善根為欲令一切衆生咸得出離故回向得佛法喜故回向於不堅固中而得堅固故回向得金剛智不可壞心故回向入佛道場故回向到於彼岸故回向得無上菩提心故回向能以智慧了達諸法故回向出生一切善根故回向入三世諸佛家故回向佛子菩薩摩訶薩住如是法生如來家增長諸佛清淨勝因出生最勝一切智道深入菩薩廣大智業滅除一切世間垢惱常能供施功德福田為諸衆生宣說妙法善巧安立令其修習諸清淨行常勤攝取一切善根菩薩爾時以諸善根如是回向所謂願一切衆生常得無量三昧眷屬菩薩勝定相續不斷願一切衆生常樂見佛悉入諸佛莊嚴三昧願一切衆生成就菩薩不思議定自在遊戲無量神通願一切衆生入如實定得不壞心願一切衆生盡獲菩薩甚深三昧於諸禪定而得自在願一切衆生得解脫心成就一切三昧眷屬願一切衆生種種三昧皆得善巧悉能攝取諸三昧相願一切衆生得勝智三昧普能學習諸三昧門願一切衆生得無礙三昧入深禪定終不退失願一切衆生得無著三昧心恆正受不取二法是為菩薩摩訶薩布施一切內宮眷屬時善根回向為欲令一切衆生皆得不壞清淨眷屬故為欲令一切衆生皆得菩薩眷屬故為欲令一切衆生悉得滿足佛法故為欲令一切衆生滿足一切智力故為欲令一切衆生證於無上智慧故為欲令一切衆生得於隨順眷屬故為欲令一切衆生得同志行人共居故為欲令一切衆生具足一切福智故為欲令一切衆生成就清淨善根故為欲令一切衆生得善和眷屬故為欲令一切衆生成就如來清淨法身故為欲令一切衆生成就次第如理辨才善說諸佛無盡法藏故為欲令一切衆生永捨一切世俗善根同修出世清淨善根故為欲令一切衆生淨業圓滿成就一切清淨法故為欲令一切衆生一切佛法皆悉現前以法光明普嚴故第五十五施內宮眷屬一女麗具德二而於下施心清淨回向行中有二初回向意二正顯回向今初以歷事將終文勢稍展此一段文貫於前後晉經回向二字皆在句初則是回向菩提意也今經在句末則是回向之意初中文有十句後佛子下重牒前意生如來家下從後例牒亦有十句西域文勢多如此反騰前辭正明回向中又有十願隨一一願具前十意皆云三昧者禪定輕安身心柔軟猶彼女故故善財云定女常供侍佛子菩薩摩訶薩能以所愛妻子布施猶如往昔須達拏太子現莊嚴王菩薩及餘無量諸菩薩等菩薩爾時乘薩婆若心行一切施淨修菩薩布施之道其心清淨無有中悔罄捨所珍求一切智令諸衆生淨深志樂成菩提行觀菩薩道念佛菩提住佛種性菩薩摩訶薩成辦如是布施心已決定志求如來之身自觀己身繫屬一切不得自在又以其身普攝衆生猶如寶洲給施一切未滿足者令其滿足菩薩如是護念衆生欲令自身作第一塔普使一切皆生歡喜欲於世間生平等心欲為衆生作清涼池欲與衆生一切安樂欲為衆生作大施主智慧自在了知菩薩所行之行而能如是大誓莊嚴趣一切智願成無上智慧福田普念衆生常隨守護而能成辦自身利益智慧光明普照於世常勤憶念菩薩施心恆樂觀察如來境界佛子菩薩摩訶薩以無縛無著解脫心布施妻子所集善根如是回向所謂願一切衆生住佛菩提起變化身周遍法界轉不退輪願一切衆生得無著身願力周行一切佛剎願一切衆生捨愛憎心斷貪恚結願一切衆生為諸佛子隨佛所行願一切衆生於諸佛所生自己心不可沮壞願一切衆生常為佛子從法化生願一切衆生得究竟處成就如來自在智慧願一切衆生證佛菩提永離煩惱願一切衆生能具演說佛菩提道常樂修行無上法施願一切衆生得正定心不為一切諸緣所壞願一切衆生坐菩提樹成最正覺開示無量從法化生諸善男女是為菩薩摩訶薩布施妻子善根回向為令衆生皆悉證得無礙解脫無著智故第五十六施妻子二事合願標章引例須達拏者此云善愛或云好愛彼有經說其事甚廣次菩薩爾時下明能施心初自分次成辦下勝進所為自觀己身下觀身不堅況於妻子次又以下修堅固二利之行次佛子下回向行中有十一願初一依於施心欲令普遍故次二依妻立願次三及後一依子立願生自己心者如己骨肉等故佛子菩薩摩訶薩莊嚴舍宅及諸資具隨有乞求一切施與行布施法於家無著遠離一切居家覺觀厭惡家業資生之具不貪不味心無繫著知家易壞心恆厭捨都於其中無所愛樂但欲出家修菩薩行以諸佛法而自莊嚴一切悉捨心無中悔常為諸佛之所讚歎舍宅財物隨處所有悉以惠施心無戀著見有乞求心生喜慶菩薩爾時以此善根如是回向所謂願一切衆生捨離妻子成就出家第一之樂願一切衆生解脫家縛入於非家諸佛法中修行梵行願一切衆生捨離堅垢樂一切施心無退轉願一切衆生永離家法少欲知足無所藏積願一切衆生出世俗家住如來家願一切衆生得無礙法滅除一切障礙之道願一切衆生離家屬愛雖現居家心無所著願一切衆生善能化誘不離家法說佛智慧願一切衆生身現在家心常隨順佛智而住願一切衆生在居家地住於佛地普令無量無邊衆生發歡喜心是為菩薩摩訶薩布施舍宅時善根回向為令衆生成就菩薩種種行願神通智故第五十七施舍宅佛子菩薩摩訶薩布施種種園林臺榭遊戲快樂莊嚴之處作是念言我當為一切衆生作好園林我當為一切衆生示現法樂我當施一切衆生歡喜之意我當示一切衆生無邊喜樂我當為一切衆生開淨法門我當令一切衆生發歡喜心我當令一切衆生得佛菩提我當令一切衆生成滿大願我當於一切衆生猶如慈父我當令一切衆生智慧觀察我當施一切衆生資生之具我當於一切衆生猶如慈母生長一切善根大願佛子菩薩摩訶薩如是修行諸善根時於惡衆生不生疲厭亦不誤起棄捨之心設滿世間一切衆生悉不知恩菩薩於彼初無嫌恨不生一念求反報心但欲滅其無量苦惱於諸世間心如虗空無所染著普觀諸法真實之相發大誓願滅衆生苦永不厭捨大乘志願滅一切見修諸菩薩平等行願佛子菩薩摩訶薩如是觀察已攝諸善根悉以回向所謂願一切衆生念念滋生無量善法成就無上園林之心願一切衆生得不動法見一切佛皆令歡喜願一切衆生樂法園苑得諸佛剎園苑妙樂願一切衆生得淨妙心常見如來神足園林願一切衆生得佛戲樂常善遊戲智慧境界願一切衆生得遊戲樂普詣佛剎道場衆會願一切衆生成就菩薩解脫遊戲盡未來劫行菩薩行心無疲倦願一切衆生見一切佛充滿法界發廣大心住佛園林願一切衆生悉能遍往一切佛剎一一剎中供養諸佛願一切衆生得善欲心清淨莊嚴一切佛剎是為菩薩摩訶薩布施一切園林臺榭善根回向為令衆生見一切佛遊戲一切佛園林故第五十八施園林等先標起念次佛子下離過成德佛子菩薩摩訶薩作百千億那由他無量無數廣大施會一切清淨諸佛印可終不損惱於一衆生普令衆生遠離衆惡淨三業道成就智慧開置無量百千億那由他阿僧劫清淨境界積集無量百千億那由他阿僧祇資生妙物發甚難得菩提之心行無限施令諸衆生住清淨道初中後善生淨信解隨百千億無量衆生心之所樂悉令歡喜以大慈悲救護一切承事供養三世諸佛為欲成就一切佛種修行布施心無中悔增長信根成滿勝行念念增進檀波羅蜜菩薩爾時以諸善根如是回向所謂願一切衆生發大乘心悉得成就摩訶衍施願一切衆生皆悉能行大會施盡施善施最勝施無上施最無上施無等等施超諸世間施一切諸佛所稱歎施願一切衆生作第一施主於諸惡趣勉濟衆生皆令得入無礙智道修平等願如實善根得無差別證自境智願一切衆生安住寂靜諸禪定智入不死道究竟一切神通智慧勇猛精進具足諸地莊嚴佛法到於彼岸永不退轉願一切衆生設大施會終不疲厭給濟衆生無有休息究竟無上一切種智願一切衆生恆勤種植一切善根到於無量功德彼岸願一切衆生常蒙諸佛之所稱歎普為世間作大施主功德具足充滿法界遍照十方施無上樂願一切衆生設大施會廣集善根等攝衆生到於彼岸願一切衆生成最勝施普令衆生住第一乘願一切衆生為應時施永離非時大施究竟願一切衆生成就善施到佛丈夫大施彼岸願一切衆生究竟常行大莊嚴施盡以一切諸佛為師悉皆親近興大供養願一切衆生住清淨施集等法界無量福德到於彼岸願一切衆生於諸世間為大施主誓度羣品住如來地是為菩薩摩訶薩設大施會善根回向為令衆生行無上施究竟佛施成就善施不可壞施供諸佛施無恚恨施救衆生施成一切智施常見諸佛施善精進施成就一切菩薩功德諸佛智慧廣大施故第五十九設大施會次一切下離過成德擇薪而爨濾水而用不強乞求名不惱衆生今多反此豈成大益開置下略示儀式發甚難得下顯施所依心成波羅蜜回向行中有十五願佛子菩薩摩訶薩布施一切資生之物心無貪惜不求果報於世富樂無所希望離妄想心善思惟法為欲利益一切衆生審觀一切諸法實性隨諸衆生種種不同所用所求各各差別成辦無量資生之具所有嚴飾悉皆妙好行無邊施行一切施盡內外施行此施時增志樂力獲大功德成就心寶常能守護一切衆生皆令發生殊勝志願初未曾有求反報心所有善根等三世佛悉以圓滿一切種智佛子菩薩摩訶薩以此布施所有善根回向衆生願一切衆生清淨調伏願一切衆生滅除煩惱嚴淨一切諸佛剎土願一切衆生以清淨心於一念中周遍法界願一切衆生智慧充滿虗空法界願一切衆生得一切智普入三世調伏衆生於一切時常轉清淨不退法輪願一切衆生具一切智善能示現神通方便饒益衆生願一切衆生悉能悟入諸佛菩提盡未來劫於十方世界常說正法曾無休息令諸衆生普能聞知願一切衆生於無量劫修菩薩行悉得圓滿願一切衆生於一切世界若染若淨若小若大若粗若細若覆若仰或一莊嚴或種種莊嚴所可演說在世界數諸世界中修菩薩行靡不周遍願一切衆生於念念中常作三世一切佛事教化衆生向一切智第六十施資具以別說諸門不可盡故末後總說一切資具文但有二一施行二回向行以鄰後都結故闕後二今初有四初施時離過以離妄想心等故二善思惟下辨施所依三隨諸衆生下正明施行四行此下顯所成德後回向行中有十願以資生多種願亦類別一施洗滌資具願二施掃拭資具願又資具總明故願亦總發未必別配佛子菩薩摩訶薩隨諸衆生一切所須以如是等阿僧祇物而為給施為令佛法相續不斷大悲普救一切衆生安住大慈修菩薩行於佛教誨終無違犯以巧方便修行衆善不斷一切諸佛種性隨求悉與而無患厭一切悉捨未曾中悔常勤回向一切智道時十方國土種種形類種種趣生種種福田皆來集會至菩薩所種種求索菩薩見已普見攝受心生歡喜如見善友大悲哀愍思滿其願捨心增長無有休息亦不疲厭隨其所求悉令滿足離貧窮苦時諸乞者心大欣慶轉更稱傳讚揚其德美聲遐布悉來歸往菩薩見已歡喜無量假使百千億那由他劫受帝釋樂無數劫受夜摩天樂無量劫受兜率陀天樂無邊劫受善變化天樂無等劫受他化自在天樂不可數劫受梵王樂不可稱劫受轉輪王王三千樂不可思劫受遍淨天樂不可說劫受淨居天樂悉不能及菩薩摩訶薩見乞者來歡喜愛樂欣慶踊躍信心增長志樂清淨諸根調順信解成滿乃至增進諸佛菩提佛子菩薩摩訶薩以此善根為欲利益一切衆生故回向為欲安樂一切衆生故回向為令一切衆生得大義利故回向為令一切衆生悉得清淨故回向為令一切衆生悉求菩提故回向為令一切衆生悉得平等故回向為令一切衆生悉得賢善心故回向為令一切衆生悉入摩訶衍故回向為令一切衆生悉得賢善智慧故回向為令一切衆生悉具普賢菩薩行願滿十力乘現成正覺故回向第三隨諸衆生下總結多門善根回向別不可盡故此總明文中二先結善根即前施行後佛子下結回向今初有二節一結所施物謂菩薩所施不止六十故等以僧祇次為令佛法下結施所為以初貫後即是所為若依大悲等即是所依然所為即通自他所依則自心所住三時十方下結能施心於中有四初對多田生喜離過二時諸乞者下明其田彌多其喜彌廣三假使下校量顯廣略舉十王所受之樂不及菩薩喜樂之心四菩薩見乞者下結喜廣深何等菩薩見乞生喜謂施行熟故施障盡故二佛子菩薩摩訶薩以此善根下結前回向今但結其回向所為則顯前來別別回向不出於此上來通顯隨相行竟下離相佛子菩薩摩訶薩以諸善根如是回向時身口意業皆悉解脫無著無繫無衆生想無命者想無補伽羅想無人想無童子想無生者想無作者想無受者想無有想無無想無今世後世想無死此生彼想無常想無無常想無三有想無無三有想非想非非想如是非縛回向非縛解回向非業回向非業報回向非分別回向非無分別回向非思回向非思已回向非心回向非無心回向佛子菩薩摩訶薩如是回向時不著內不著外不著能緣不著所緣不著因不著果不著法不著非法不著思不著非思不著色不著色生不著色滅不著受想行識不著受想行識生不著受想行識滅佛子菩薩摩訶薩若能於此諸法不著則不縛色不縛色生不縛色滅不縛受想行識不縛受想行識生不縛受想行識滅若能於此諸法不縛則亦於諸法不解何以故無有少法若現生若已生若當生無法可取無法可著一切諸法自相如是無有自性自性相離非一非二非多非無量非小非大非狹非廣非深非淺非寂靜非戲論非處非非處非法非非法非體非非體非有非非有菩薩如是觀察諸法則為非法於言語中隨世建立非法為法不斷諸業道不捨菩薩行求一切智終無退轉了知一切業緣如夢音聲如響衆生如影諸法如幻而亦不壞因緣業力了知諸業其用廣大解一切法皆無所作行無作道未嘗暫廢大文第二佛子菩薩摩訶薩以諸善根如是回向時下離相回向即向實際行稱涅槃此彰行深前障行廣深廣同時言不並耳先正明離相後如是觀察下不礙隨相初總標解脫是總不著於解不繫於縛是真解脫次別顯中二初內絶相念故無縛解後佛子下觸境離染故無縛解初中無衆生想等先絶我想次無有想下絶其法想次如是非縛下顯行成次菩薩摩訶薩如是回向時下第二觸境無染故無縛解於中云不著內外等初明無著即明界處空次云不著色等顯不著五蘊次佛子若能如此下明不縛蘊如是則已遣三科矣次若能於此下明其不解若本無縛其誰求解離縛取解未免於縛故復遣之遣至無遣儻然無寄理自玄會矣次何以故下徵釋離相之所以先徵意云設我假立法體不無今無念著其故何耶下釋意云法性爾故謂諸法性本自無生自相如是故自性相離次云非一非二下別彰所離謂上但云離為離何相謂一二等文有十對次菩薩如是觀察下明不礙隨相者以凡情封執觸言生滯聞於離相則謂乖前隨相之言失於業果菩提之行故此略而會之佛子此菩薩摩訶薩住一切智若處非處普皆回向一切智性於一切處皆悉回向無有退轉以何義故說名回向永度世間至於彼岸故名回向永出諸蘊至於彼岸故名回向度言語道至於彼岸故名回向離種種想至於彼岸故名回向永斷身見至於彼岸故名回向永離依處至於彼岸故名回向永絶所作至於彼岸故名回向永出諸有至於彼岸故名回向永捨諸取至於彼岸故名回向永出世法至於彼岸故名回向佛子菩薩摩訶薩如是回向時則為隨順佛住隨順法住隨順智住隨順菩提住隨順義住隨順回向住隨順境界住隨順行住隨順真實住隨順清淨住佛子菩薩摩訶薩如是回向則為了達一切諸法則為承事一切諸佛無有一佛而不承事無有一法而不供養無有一法而可滅壞無有一法而可乖違無有一物而可貪著無有一法而可厭離不見內外一切諸法有少滅壞違因緣道法力具足無有休息佛子是為菩薩摩訶薩第六隨順堅固一切善根回向大文第三此菩薩下釋回向名初總釋初住一切智是自善根由此能成下諸義故若處已下釋平等隨順義次別釋中以何義故說名回向下假以徵起釋回向義次佛子菩薩如是回向時下釋隨順義意謂但能如是離相回向自然隨順佛法智等以佛法等實為體故三佛子如是回向下釋堅固一切善根義亦合徵云實際非相何名堅固實際無差何名一切此釋意云如是離相回向方名堅固以凡是有相皆可破壞故但能離相自成諸善諸善皆以實際而為體故下佛子是為菩薩摩訶薩第六隨順堅固一切善根回向依釋結名上位行竟下位果菩薩摩訶薩住此回向時常為諸佛之所護念堅固不退入深法性修一切智隨順法義隨順法性隨順一切堅固善根隨順一切圓滿大願具足隨順堅固之法一切金剛所不能壞於諸法中而得自在第二大文住此回向時明位果隨離無二招斯十果爾時金剛幢菩薩觀察十方觀察衆會觀察法界已入於字句甚深之義修習無量廣大之心以大悲心普覆世間長去來今佛種性心入於一切諸佛功德成就諸佛自在力身觀諸衆生心之所樂隨其善根所可成熟依法性身為現色身承佛神力而說頌言菩薩現身作國王於世位中最無等福德威光勝一切普為羣萌興利益其心清淨無染著於世自在咸遵敬弘宣正法以訓人普使衆生獲安隱現生貴族升王位常依正教轉法輪稟性仁慈無毒虐十方敬仰皆從化智慧分別常明了色相才能皆具足臨馭率土靡不從摧伏魔軍悉令盡堅持淨戒無違犯決志堪忍不動搖永願蠲除忿恚心常樂修行諸佛法飲食香鬘及衣服車騎牀褥座與燈菩薩悉以給濟人并及所餘無量種為利益故而行施令其開發廣大心於尊勝處及所餘意皆清淨生歡喜菩薩一切皆周給內外所有悉能捨必使其心永清淨不令暫爾生狹劣或施於頭或施眼或施於手或施足皮肉骨髓及餘物一切皆捨心無吝菩薩身居大王位種族豪貴人中尊開口出舌施羣生其心歡喜無憂戀以彼施舌諸功德回向一切諸衆生普願藉此勝因緣悉得如來廣長舌或施妻子及王位或施其身作僮僕其心清淨常歡喜如是一切無憂悔隨所樂求咸施與應時給濟無疲厭一切所有皆能散諸來求者皆滿足為聞法故施其身修諸苦行求菩提復為衆生捨一切求無上智不退轉以於佛所聞正法自捨其身充給侍為欲普救於羣生發生無量歡喜心彼見世尊大導師能以慈心廣饒益是時踊躍生歡喜聽受如來深法味菩薩所有諸善根悉以回向諸衆生普皆救護無有餘永使解脫常安樂菩薩所有諸眷屬色相端嚴能辨慧華鬘衣服及塗香種種莊嚴皆具足此諸眷屬甚希有菩薩一切皆能施專求正覺度羣生如是之心無暫捨菩薩如是諦思惟備行種種廣大業悉以回向諸含識而不生於取著心菩薩捨彼大王位及以國土諸城邑宮殿樓閣與園林僮僕侍衛皆無吝彼於無量百千劫處處周行而施與因以教導諸羣生悉以超升無上岸無量品類各差別十方世界來萃止菩薩見已心欣慶隨其所乏令滿足如三世佛所回向菩薩亦修如是業調御人尊之所行悉皆隨學到彼岸菩薩觀察一切法誰為能入此法者云何為入何所入如是布施心無住菩薩回向善巧智菩薩回向方便法菩薩回向真實義於其法中無所著心不分別一切業亦不染著於業果知菩提性從緣起入深法界無違逆不於身中而有業亦不依止於心住智慧了知無業性以因緣故業不失心不妄取過去法亦不貪著未來事不於現在有所住了達三世悉空寂菩薩已到色彼岸受想行識亦如是超出世間生死流其心謙下常清淨諦觀五蘊十八界十二種處及己身於此一一求菩提體性畢竟不可得不取諸法常住相於斷滅相亦不著法性非有亦非無業理次第終無盡不於諸法有所住不於衆生及菩提十方國土三世中畢竟求之無可得若能如是觀諸法則如諸佛之所解雖求其性不可得菩薩所行亦不虗菩薩了法從緣有不違一切所行道開示解說諸業跡欲使衆生悉清淨是為智者所行道一切如來之所說隨順思惟入正義自然覺悟成菩提諸法無生亦無滅亦復無來無有去不於此死而生彼是人悟解諸佛法了達諸法真實性而於法性無分別知法無性無分別此人善入諸佛智法性遍在一切處一切衆生及國土三世悉在無有餘亦無形相而可得一切諸佛所覺了悉皆攝取無有餘雖說三世一切法如是等法悉非有如諸法相遍一切菩薩回向亦復然如是回向諸衆生常於世間無退轉第二應頌先說因緣後正說偈頌有四十一偈初五偈頌所依身次飲食下三十偈半頌依身起行後隨順下有五偈半頌釋名中隨順等義兼頌位果
