body:
  text: 于闐國三藏沙門實叉難陀譯經清涼山大華嚴寺沙門澄觀疏義明匡山法雲寺憨山沙門德清提挈第四會夜摩天宮功德林菩薩為會主説十行等法門已解者令行自十九卷起至二十一卷止共四品經升夜摩天宮品夜摩天宮偈讚品十行品十無盡藏品升夜摩天宮品第十九初來意者酬前十行問故匪知之艱行之惟艱前解此行若膏明相類目足更資故次來也次品來者此會四品分三初二品當會由致次一品當會正宗後一品勝進趣後於由致中此品先明感應道交後品明讚德顯體前會已終將陳後説故次來也二釋名者會名有三一約處名夜摩天宮會夜摩此云時分即空居之首表十行涉有化物宜適其時時而後言聞者悅服時而後動見者敬從涉有依空即事入玄託此而説約人名功德林約法名十行會三皆依主次品名者大同於會謂不離前三而升此故爾時如來威神力故十方一切世界一一四天下南閻浮提及須彌頂上皆見如來處於衆會彼諸菩薩悉以佛神力故而演説法莫不自謂恆對於佛爾時世尊不離一切菩提樹下及須彌山頂而向於彼夜摩天宮寶莊嚴殿時夜摩天王遙見佛來即以神力於其殿內化作寶蓮華藏師子之座百萬層級以為莊嚴百萬金網以為交絡百萬華帳百萬鬘帳百萬香帳百萬寶帳彌覆其上華蓋鬘蓋香蓋寶蓋各亦百萬周回布列百萬光明而為照耀百萬夜摩天王恭敬頂禮百萬梵王踊躍歡喜百萬菩薩稱揚讚歎百萬天樂各奏百萬種法音相續不斷百萬種華雲百萬種鬘雲百萬種莊嚴具雲百萬種衣雲周匝彌覆百萬種摩尼雲光明照耀從百萬種善根所生百萬諸佛之所護持百萬種福德之所增長百萬種深心百萬種誓願之所嚴淨百萬種行之所生起百萬種法之所建立百萬種神通之所變現恆出百萬種言音顯示諸法時彼天王敷置座已向佛世尊曲躬合掌恭敬尊重而白佛言善來世尊善來善逝善來如來應正等覺唯願哀愍處此宮殿時佛受請即升寶殿一切十方悉亦如是爾時天王即自憶念過去佛所所種善根承佛威力而説頌言名稱如來聞十方諸吉祥中最無上彼曾入此摩尼殿是故此處最吉祥寶王如來世間燈諸吉祥中最無上彼曾入此清淨殿是故此處最吉祥喜目如來見無礙諸吉祥中最無上彼曾入此莊嚴殿是故此處最吉祥然燈如來照世間諸吉祥中最無上彼曾入此殊勝殿是故此處最吉祥饒益如來利世間諸吉祥中最無上彼曾入此無垢殿是故此處最吉祥善覺如來無有師諸吉祥中最無上彼曾入此寶香殿是故此處最吉祥勝天如來世中燈諸吉祥中最無上彼曾入此妙香殿是故此處最吉祥無去如來論中雄諸吉祥中最無上彼曾入此普眼殿是故此處最吉祥無勝如來具衆德諸吉祥中最無上彼曾入此善嚴殿是故此處最吉祥苦行如來利世間諸吉祥中最無上彼曾入此普嚴殿是故此處最吉祥如此世界中夜摩天王承佛神力憶念往昔諸佛功德稱揚讚歎十方世界夜摩天王悉亦如是歎佛功德爾時世尊入摩尼莊嚴殿於寶蓮華藏師子座上結加趺坐此殿忽然廣博寬容如其天衆諸所住處十方世界悉亦如是第四釋文者一品長分為十第一本會圓遍謂前會不散而説後會故二爾時世尊下不離而升三時天王下天王見佛四即以神力下各嚴殿座百萬下十行餘經別顯嚴相五時彼天王下請佛居殿六時佛受請下如來受請七爾時天王下各念昔因八名稱如來下偈讚十佛此佛是前會十佛之前如次十佛九爾時世尊下佛同升殿十此殿忽然下處忽廣容夜摩宮中偈讚品第二十此來意者助化讚揚故説行體性故行所依故三天偈讚來意宗趣大旨是同但解行願以為異耳爾時佛神力故十方各有一大菩薩一一各與佛剎微塵數菩薩俱從十萬佛剎微塵數國土外諸世界中而來集會其名曰功德林菩薩慧林菩薩勝林菩薩無畏林菩薩慚愧林菩薩精進林菩薩力林菩薩行林菩薩覺林菩薩智林菩薩此諸菩薩所從來國所謂親慧世界幢慧世界寶慧世界勝慧世界燈慧世界金剛慧世界安樂慧世界日慧世界淨慧世界梵慧世界此諸菩薩各於佛所淨修梵行所謂常住眼佛無勝眼佛無住眼佛不動眼佛天眼佛解脫眼佛審諦眼佛明相眼佛最上眼佛紺青眼佛是諸菩薩至佛所已頂禮佛足隨所來方各化作摩尼藏師子之座於其座上結加趺坐如此世界中夜摩天上菩薩來集一切世界悉亦如是其諸菩薩世界如來所有名號悉等無別此下長文有三段初集衆二放光三偈讚今初集衆文有十節此初集因次十方下辨主三一一下明眷屬四從十萬下來屬五其名曰下列名六此諸菩薩下來處七各於佛所下本所事佛八是諸菩薩下設教九隨所來方下參而不雜十如此世界中下結通無盡爾時世尊從兩足上放百千億妙色光明普照十方一切世界夜摩宮中佛及大衆靡不皆現第二爾時下放光足上謂趺背行必動故背依輪指得有用故表行依信解而成用故爾時功德林菩薩承佛威力普觀十方而説頌言佛放大光明普照於十方悉見天人尊通達無障礙佛坐夜摩宮普遍十方界此事甚奇特世間所希有須夜摩天王偈讚十如來於此會所見一切處咸爾彼諸菩薩衆皆同我等名十方一切處演説無上法所從諸世界名號亦無別各於其佛所淨修於梵行彼諸如來等名號悉亦同國土皆豐樂神力悉自在十方一切處皆謂佛在此或見在人間或見住天宮如來普安住一切諸國土我等今見佛處此天宮殿昔發菩提願普及十方界是故佛威力充遍難思議遠離世所貪具足無邊德故獲神通力衆生靡不見遊行十方界如空無所礙一身無量身其相不可得佛功德無邊云何可測知無住亦無去普入於法界第三明説偈儀十菩薩説即為十段今初菩薩名功德林者謂積行在躬功德圓滿故名功德若就所歎歎佛勝德故名德林有十二頌以是會主總敘此會普遍之事爾時慧林菩薩承佛威力普觀十方而説頌言世間大導師離垢無上尊不可思議劫難可得值遇佛放大光明世間靡不見為衆廣開演饒益諸羣生如來出世間為世除癡冥如是世間燈希有難可見已修施戒忍精進及禪定般若波羅蜜以此照世間如來無與等求比不可得不了法真實無有能得見佛身及神通自在難思議無去亦無來説法度衆生若有得見聞清淨天人師永出諸惡趣捨離一切苦無量無數劫修習菩提行不能知此義不可得成佛不可思議劫供養無量佛若能知此義功德超於彼無量剎珍寶滿中施於佛不能知此義終不成菩提第二上明功德此辨智慧悟此除冥難遇之慧故名慧林爾時勝林菩薩承佛威力普觀十方而説頌言譬如孟夏月空淨無雲曀赫日揚光暉十方靡不充其光無限量無有能測知有目斯尚然何況盲冥者諸佛亦如是功德無邊際不可思議劫莫能分別知諸法無來處亦無能作者無有所從生不可得分別一切法無來是故無有生以生無有故滅亦不可得一切法無生亦復無有滅若能如是解斯人見如來諸法無生故自性無所有如是分別知此人達深義以法無性故無有能了知如是解於法究竟無所解所説有生者以現諸國土能知國土性其心不迷惑世間國土性觀察悉如實若能於此知善説一切義第三勝林悟勝義甚深之法故歎佛深廣無涯之德爾時無畏林菩薩承佛威力普觀十方而説頌言如來廣大身究竟於法界不離於此座而遍一切處若聞如是法恭敬信樂者永離三惡道一切諸苦難設往諸世界無量不可數專心欲聽聞如來自在力如是諸佛法是無上菩提假使欲暫聞無有能得者若有於過去信如是佛法已成兩足尊而作世間燈若有當得聞如來自在力聞已能生信彼亦當成佛若有於現在能信此佛法亦當成正覺説法無所畏無量無數劫此法甚難值若有得聞者當知本願力若有能受持如是諸佛法持已廣宣説此人當成佛況復勤精進堅固心不捨當知如是人決定成菩提第四以信樂力聞深不畏名無畏林歎信向益深德故爾時慚愧林菩薩承佛威力普觀十方而説頌言若人得聞是希有自在法能生歡喜心疾除疑惑網一切知見人自説如是言如來無不知是故難思議無有從無智而生於智慧世間常暗冥是故無能生如色及非色此二不為一智無智亦然其體各殊異如相與無相生死及涅槃分別各不同智無智如是世界始成立無有敗壞相智無智亦然二相非一時如菩薩初心不與後心俱智無智亦然二心不同時譬如諸識身各各無和合智無智如是究竟無和合如阿伽陀藥能滅一切毒有智亦如是能滅於無智如來無有上亦無與等者一切無能比是故難值遇第五拒妄崇真拒迷崇智名為慚愧讚如來大智勝益爾時精進林菩薩承佛威力普觀十方而説頌言諸法無差別無有能知者唯佛與佛知智慧究竟故如金與金色其性無差別法非法亦然體性無有異衆生非衆生二俱無真實如是諸法性實義俱非有譬如未來世無有過去相諸法亦如是無有一切相譬如生滅相種種皆非實諸法亦復然自性無所有涅槃不可取説時有二種諸法亦復然分別有殊異如依所數物而有於能數彼性無所有如是了知法譬如算數法增一至無量數法無體性智慧故差別譬如諸世間劫燒有終盡虗空無損敗佛智亦如是如十方衆生各取虗空相諸佛亦如是世間妄分別第六勤觀理事同無差別離身心相故名精進十頌總歎佛此德前即無差之差此乃差之無差二章相接顯非即離亦互相成爾時力林菩薩承佛威力普觀十方而説頌言一切衆生界皆在三世中三世諸衆生悉住五蘊中諸蘊業為本諸業心為本心法猶如幻世間亦如是世間非自作亦復非他作而其得有成亦復得有壞世間雖有成世間雖有壞了達世間者此二不應説云何為世間云何非世間世間非世間但是名差別三世五蘊法説名為世間彼滅非世間如是但假名云何説諸蘊諸蘊有何性蘊性不可滅是故説無生分別此諸蘊其性本空寂空故不可滅此是無生義衆生既如是諸佛亦復然佛及諸佛法自性無所有能知此諸法如實不顛倒一切知見人常現在其前第七智了三種世間性相諸邊不動故名力林爾時行林菩薩承佛威力普觀十方而説頌言譬如十方界一切諸地種自性無所有無處不周遍佛身亦如是普遍諸世界種種諸色相無主無來處但以諸業故説名為衆生亦不離衆生而有業可得業性本空寂衆生所依止普作衆色相亦復無來處如是諸色相業力難思議了達其根本於中無所見佛身亦如是不可得思議種種諸色相普現十方剎身亦非是佛佛亦非是身但以法為身通達一切法若能見佛身清淨如法性此人於佛法一切無疑惑若見一切法本性如涅槃是則見如來究竟無所住若修習正念明了見正覺無相無分別是名法王子第八照理觀佛而起正修故名行林歎佛體相普同德爾時覺林菩薩承佛威力普觀十方而説頌言譬如工畫師分布諸彩色虗妄取異相大種無差別大種中無色色中無大種亦不離大種而有色可得心中無彩畫彩畫中無心終不離於心有彩畫可得彼心恆不住無量難思議示現一切色各各不相知譬如工畫師不能知自心而由心故畫諸法性如是心如工畫師能畫諸世間五蘊悉從生無法而不造如心佛亦爾如佛衆生然應知佛與心體性皆無盡若人知心行普造諸世間是人則見佛了佛真實性心不住於身身亦不住心而能作佛事自在未曾有若人欲了知三世一切佛應觀法界性一切唯心造第九照心本末名為覺林十頌顯於具分唯識爾時智林菩薩承佛威力普觀十方而説頌言所取不可取所見不可見所聞不可聞一心不思議有量及無量二俱不可取若有人欲取畢竟無所得不應説而説是為自欺誑己事不成就不令衆歡喜有欲讚如來無邊妙色身盡於無數劫無能盡稱述譬如隨意珠能現一切色無色而現色諸佛亦如是又如淨虗空非色不可見雖現一切色無能見空者諸佛亦如是普現無量色非心所行處一切莫能覩雖聞如來聲音聲非如來亦不離於聲能知正等覺菩提無來去離一切分別云何於是中自言能得見諸佛無有法佛於何有説但隨其自心謂説如是法第十鑒達諸佛逈超色聲心言路絶故云智林頌顯此德十行品第二十一之上初來意有二一前序此正故二前辨所依佛智此辨能依之行故次來也二釋名者隨緣順理造修名行數越塵沙寄圓辨十仁王名為十止就三學中定心增故梵網名為長養長道五根故爾時功德林菩薩承佛神力入菩薩善思惟三昧此品長文有七分一三昧分二加分三起分四本分五説分六現證分七重頌分今初入三昧分言善思惟者謂巧順事理揀擇無礙無心成事名善思惟入是三昧已十方各過萬佛剎微塵數世界外有萬佛剎微塵數諸佛皆號功德林而現其前告功德林菩薩言善哉佛子乃能入此善思惟三昧善男子此是十方各萬佛剎微塵數同名諸佛共加於汝亦是毗盧遮那如來往昔願力威神之力及諸菩薩衆善根力令汝入是三昧而演説法此加分也文中有三一加因緣二加所為三加相今初句標加因次十方下加緣告功德林下讚有加因善男子下雙顯加定因緣為增長佛智故深入法界故了知衆生界故所入無礙故所行無障故得無量方便故攝取一切智性故覺悟一切諸法故知一切諸根故能持説一切法故所謂發起諸菩薩十種行二為增長下辨加所為文有十一句前十別明後一總結善男子汝當承佛威神之力而演此法是時諸佛即與功德林菩薩無礙智無著智無斷智無師智無癡智無異智無失智無量智無勝智無懈智無奪智何以故此三昧力法如是故爾時諸佛各申右手摩功德林菩薩頂三正辨加相謂加三業命説口業與智意業摩頂身業功德林菩薩即從定起四起分告諸菩薩言佛子菩薩行不可思議與法界虗空界等何以故菩薩摩訶薩學三世諸佛而修行故第四本分有二初明行體次明行相此初體也若約所依即前善思惟三昧為體若約所觀即二諦雙融若約能觀即悲智無礙行即深心所修行海也佛子何等是菩薩摩訶薩行佛子菩薩摩訶薩有十種行三世諸佛之所宣説何等為十一者歡喜行二者饒益行三者無違逆行四者無屈撓行五者無癡亂行六者善現行七者無著行八者難得行九者善法行十者真實行是為十第二明行相徵數列名也此十行相大約依波羅蜜以立名也一施悅自他故名歡喜二三聚淨戒亦益自他故名饒益三忍順物理名無違逆四勤無怠退名無屈撓五以慧資定離沉掉故名無癡亂六慧能顯發三諦之理般若現前故名善現七以方便智不滯事理故名無著八成大行願乃能得故故名難得九善巧説法名善法行十言行不虗名真實行又稱二諦故故名真實下説十行即分十段初歡喜行佛子何等為菩薩摩訶薩歡喜行佛子此菩薩為大施主凡所有物悉能惠施其心平等無有悔吝不望果報不求名稱不貪利養但為救護一切衆生攝受一切衆生饒益一切衆生為學習諸佛本所修行憶念諸佛本所修行愛樂諸佛本所修行清淨諸佛本所修行增長諸佛本所修行住持諸佛本所修行顯現諸佛本所修行演説諸佛本所修行令諸衆生離苦得樂佛子菩薩摩訶薩修此行時令一切衆生歡喜愛樂隨諸方土有貧乏處以願力故往生於彼豪貴大富財寶無盡假使於念念中有無量無數衆生詣菩薩所白言仁者我等貧乏靡所資贍飢羸困苦命將不全惟願慈哀施我身肉令我得食以活其命爾時菩薩即便施之令其歡喜心得滿足如是無量百千衆生而來乞求菩薩於彼曾無退怯但更增長慈悲之心以是衆生咸來乞求菩薩見之倍復歡喜作如是念我得善利此等衆生是我福田是我善友不求不請而來教我入佛法中我今應當如是修學不違一切衆生之心又作是念願我已作現作當作所有善根令我未來於一切世界一切衆生中受廣大身以是身肉充足一切飢苦衆生乃至若有一小衆生未得飽足願不捨命所割身肉亦無有盡以此善根願得阿耨多羅三藐三菩提證大涅槃願諸衆生食我肉者亦得阿耨多羅三藐三菩提獲平等智具諸佛法廣作佛事乃至入於無餘涅槃若一衆生心不滿足我終不證阿耨多羅三藐三菩提菩薩如是利益衆生而無我想衆生想有想命想種種想補伽羅想人想摩納婆想作者想受者想但觀法界衆生界無邊際法空法無所有法無相法無體法無處法無依法無作法作是觀時不見自身不見施物不見受者不見福田不見業不見報不見果不見大果不見小果爾時菩薩觀去來今一切衆生所受之身尋即壞滅便作是念奇哉衆生愚癡無智於生死內受無數身危脆不停速歸壞滅若已壞滅若今壞滅若當壞滅而不能以不堅固身求堅固身我當盡學諸佛所學證一切智知一切法為諸衆生説三世平等隨順寂靜不壞法性令其永得安隱快樂佛子是名菩薩摩訶薩第一歡喜行此下正釋歡喜行體即是檀度有隨相離相二行先釋隨相行從此至後三菩提有二十四行餘經皆明隨相行於中此菩薩為大施主下至離苦得樂六行半經略辨體相次修此行時至三菩提有十七行經廣顯名相現行財施於中先明施行後以此善根下回向行後如是利益下至安隱快樂有十一行半經明離相行於中初無我想等明人空觀次但觀法界下法空觀三作是觀時下二觀之益次觀去來今下願行法施後是名下結名於中梵云摩納婆此云儒童即少年有學者也佛子何等為菩薩摩訶薩饒益行此菩薩護持淨戒於色聲香味觸心無所著亦為衆生如是宣説不求威勢不求種族不求富饒不求色相不求王位如是一切皆無所著但堅持淨戒作如是念我持淨戒必當捨離一切纏縛貪求熱惱諸難逼迫毀謗亂濁得佛所讚平等正法佛子菩薩如是持淨戒時於一日中假使無數百千億那由他諸大惡魔諸菩薩所一一各將無量無數百千億那由他天女皆於五欲善行方便端正姝麗傾惑人心執持種種珍玩之具欲來惑亂菩薩道意爾時菩薩作如是念此五欲者是障道法乃至障礙無上菩提是故不生一念欲想心淨如佛唯除方便教化衆生而不捨於一切智心佛子菩薩不以欲因緣故惱一衆生寧捨身命而終不作惱衆生事菩薩自得見佛已來未曾心生一念欲想何況從事若或從事無有是處爾時菩薩但作是念一切衆生於長夜中想念五欲趣向五欲貪著五欲其心決定耽染沉溺隨其流轉不得自在我今應當令此諸魔及諸天女一切衆生住無上戒住淨戒已於一切智心無退轉得阿耨多羅三藐三菩提乃至入於無餘涅槃何以故此是我等所應作業應隨諸佛如是修學作是學已離諸惡行計我無知以智入於一切佛法為衆生説令除顛倒然知不離衆生有顛倒不離顛倒有衆生不於顛倒內有衆生不於衆生內有顛倒亦非顛倒是衆生亦非衆生是顛倒顛倒非內法顛倒非外法衆生非內法衆生非外法一切諸法虗妄不實速起速滅無有堅固如夢如影如幻如化誑惑愚夫如是解者即能覺了一切諸行通達生死及與涅槃證佛菩提自得度令他得度自解脫令他解脫自調伏令他調伏自寂靜令他寂靜自安隱令他安隱自離垢令他離垢自清淨令他清淨自涅槃令他涅槃自快樂令他快樂佛子此菩薩復作是念我當隨順一切如來離一切世間行具一切諸佛法住無上平等處等觀衆生明達境界離諸過失斷諸分別捨諸執著善巧出離心恆安住無上無説無依無動無量無邊無盡無色甚深智慧佛子是名菩薩摩訶薩第二饒益行此第二饒益行體依戒度有三聚淨戒謂攝律儀戒攝衆生戒攝善法戒釋相有二初略釋其相初此菩薩護持淨戒一行半經總標舉三聚淨戒略明持相次不求威勢下一行半經彰其離過次但堅持淨戒下兩行經顯其持意次如是持淨戒時下廣釋其相次下至心淨如佛有六行經明攝律儀戒初正顯難持境次作如是念下起觀對治次唯除方便下至如是修學有九行經明攝衆生戒三作是學已下有十三行經明攝善法戒於中明自分現攝以悲智相導不即不離不在以成正行次如是解者下雙明二果次復作是念我當下明勝進當攝次是名下結名佛子何等為菩薩摩訶薩無違逆行此菩薩常修忍法謙下恭敬不自害不他害不兩害不自取不他取不兩取不自著不他著不兩著亦不貪求名聞利養但作是念我當常為衆生説法令離一切惡斷貪瞋癡憍慢覆藏慳嫉諂誑令恆安住忍辱柔和佛子菩薩成就如是忍法假使有百千億那由他阿僧祇衆生來至其所一一衆生化作百千億那由他阿僧祇口一一口出百千億那由他阿僧祇語所謂不可喜語非善法語不悅意語不可愛語非仁賢語非聖智語非聖相應語非聖親近語深可厭惡語不堪聽聞語以是言詞毀辱菩薩又此衆生一一各有百千億那由他阿僧祇手一一手各執百千億那由他阿僧祇器仗逼害菩薩如是經於阿僧祇劫曾無休息菩薩遭此極大楚毒身毛皆竪命將欲斷作是念言我因是苦心若動亂則自不調伏自不守護自不明了自不修習自不正定自不寂靜自不愛惜自生執著何能令他心得清淨菩薩爾時復作是念我從無始劫住於生死受諸苦惱如是思惟重自勸勵令心清淨而得歡喜善自調攝自能安住於佛法中亦令衆生同得此法復更思惟此身空寂無我我所無有真實性空無二若苦若樂皆無所有諸法空故我當解了廣為人説令除衆生滅除此見是故我今雖遭苦毒應當忍受為慈念衆生故饒益衆生故安樂衆生故憐愍衆生故攝受衆生故不捨衆生故自得覺悟故令他覺悟故心不退轉故趣向佛道故是名菩薩摩訶薩第三無違逆行第三無違逆行體依忍度忍有三忍謂生忍無生忍寂滅忍以忍順物理名無違逆得實法忍無我我所名無嗔恨以順物順法皆名為忍順物則無違於事順理則無違於法事理無違無生寂滅之義也文中初辨忍相常修忍法下兩行經明忍行次不求名利二句顯離過次但作是念下兩行經明忍意下正修忍行初明耐怨害忍對難忍之境初成就如是忍法下五行半經明口加毀辱次又此衆生下兩行經明身加害次如是經於阿僧祇劫曾無休息明長時忍次遭此極大楚毒下三行半經明能忍之行次爾時復作是念下三行經明安受苦忍次復更思惟下三行經諦察法忍後為慈念衆生故下二行半經明修忍意是名下結名佛子何等為菩薩摩訶薩無屈撓行此菩薩修諸精進所謂第一精進大精進勝精進殊勝精進最勝精進最妙精進上精進無上精進無等精進普遍精進性無三毒性無憍慢性不覆藏性不慳嫉性無諂誑性自慚愧終不為惱一衆生故而行精進但為斷一切煩惱故而行精進但為拔一切惑本故而行精進但為除一切習氣故而行精進但為知一切衆生界故而行精進但為知一切衆生死此生彼故而行精進但為知一切衆生煩惱故而行精進但為知一切衆生心樂故而行精進但為知一切衆生境界故而行精進但為知一切衆生諸根勝劣故而行精進但為知一切衆生心行故而行精進但為知一切法界故而行精進但為知一切佛法根本性故而行精進但為知一切佛法平等性故而行精進但為知三世平等性故而行精進但為得一切佛法智光明故而行精進但為證一切佛法智故而行精進但為知一切佛法一實相故而行精進但為知一切佛法無邊際故而行精進但為得一切佛法廣大決定善巧智故而行精進但為得分別演説一切佛法句義智故而行精進佛子菩薩摩訶薩成就如是精進行已設有人言汝頗能為無數世界所有衆生以一一衆生故於阿鼻地獄經無數劫備受衆苦令彼衆生一一得值無數諸佛出興於世以見佛故具受衆樂乃至入於無餘涅槃汝乃當成阿耨多羅三藐三菩提能爾不耶答言我能設復有人作如是言有無量阿僧祇大海汝當以一毛端滴之令盡有無量阿僧祇世界盡末為塵彼滴及塵一一數之悉知其數為衆生故經爾許劫於念念中受苦不斷菩薩不以聞此語故而生一念悔恨之心但更增上歡喜踊躍深自慶幸得大善利以我力故令彼衆生永脫諸苦菩薩以此所行方便於一切世界中令一切衆生乃至究竟無餘涅槃是名菩薩摩訶薩第四無屈撓行第四無屈撓行體依精進度勤無怠退名無屈撓撓曲也弱也以自牢強故無屈弱又云無盡以常住功德現化衆生故名無盡謂若怠惰斯則有盡攝論三精進中名無退無弱無喜足文中初修諸精進下兩行零經顯精進之相次性無三毒顯其離過即難行精進次但為下有十四行經明精進所為於中有四段初但為斷一切煩惱為斷惑次但為知一切衆生界為度生三但為知一切法界為知法四但為得一切佛法為求法上總顯精進之相次成就如是精進行已下隨難別釋有二初被甲精進中一代衆生受地獄苦二為度生故長劫受苦無一念悔心次以此所行方便下利樂精進後是名下結名佛子何等為菩薩摩訶薩離癡亂行此菩薩成就正念心無散亂堅固不動最上清淨廣大無量無有迷惑以是正念故善解世間一切語言能持出世諸法言説所謂能持色法非色法言説能持建立色自性言説乃至能持建立受想行識自性言説心無癡亂於世間中死此生彼心無癡亂入胎出胎心無癡亂發菩提意心無癡亂事善知識心無癡亂勤修佛法心無癡亂覺知魔事心無癡亂離諸魔業心無癡亂於不可説劫修菩薩行心無癡亂此菩薩成就如是無量正念於無量阿僧祇劫中從諸佛菩薩善知識所聽聞正法所謂甚深法廣大法莊嚴法種種莊嚴法演説種種名句文身法菩薩莊嚴法佛神力光明無上法正希望決定解清淨法不著一切世間法分別一切世間法甚廣大法離癡翳照了一切衆生法一切世間共法不共法菩薩智無上法一切智自在法菩薩聽聞如是法已經阿僧祇劫不忘不失心常憶念無有間斷何以故菩薩摩訶薩於無量劫修諸行時終不惱亂一衆生令失正念不壞正法不斷善根心常增長廣大智故復次此菩薩摩訶薩種種音聲不能惑亂所謂高大聲粗濁聲極令人恐怖聲悅意聲不悅意聲喧亂耳識聲沮壞六根聲此菩薩聞如是等無量無數好惡音聲假使充滿阿僧祇世界未曾一念心有散亂所謂正念不亂境界不亂三昧不亂入甚深法不亂行菩提行不亂發菩提心不亂憶念諸佛不亂觀真實法不亂化衆生智不亂淨衆生智不亂決了甚深義不亂不作惡業故無惡業障不起煩惱故無煩惱障不輕慢法故無有慢法障不誹謗正法故無有報障佛子如上所説如是等聲一一充滿阿僧祇世界於無量無數劫未曾斷絶悉能壞亂衆生身心一切諸根而不能壞此菩薩心菩薩入三昧中住於聖法思惟觀察一切音聲善知音聲生住滅相善知音聲生住滅性如是聞已不生於貪不起於瞋不失於念善取其相而不染著知一切聲皆無所有實不可得無有作者亦無本際與法界等無有差別菩薩如是成就寂靜身與意行至一切智永不退轉善入一切諸禪定門知諸三昧同一體性了一切法無有邊際得一切法真實智慧得離音聲甚深三昧得阿僧祇諸三昧門增長無量廣大悲心是時菩薩於一念中得無數百千三昧聞如是聲心不惑亂令其三昧漸更增廣作如是念我當令一切衆生安住無上清淨念中於一切智得不退轉究竟成就無餘涅槃是名菩薩摩訶薩第五離癡亂行第五無癡亂行依禪度以慧資定離沉掉故名無癡亂初云成就正念一就奢摩他品名為正念正念即定以彼心離妄念之亂故名正念二就毗鉢舍那亦名正念謂不偏鑒達明了於緣經云正念諸法未曾忘失三就禪那止觀雙運名為正念下經云以正念故善解世間等謂於緣明了是無癡義不異所緣是無亂義下經云禪定持心常一緣智慧了境同三昧以智照故離癡以正定故離亂言心無散亂下九句別明正念初句是無亂之總謂不隨境轉故無散亂二障不能壞名為堅固三緣不能牽故云不動四超劣顯勝故云最上五異世無染故云清淨上五釋無亂也下四義釋無癡六稱法界故云廣七趣一切智故云大八引發難量故云無量九不捨大悲名無迷惑上九句別攝為三種禪前六現法樂住禪次二引生功德禪後一饒益有情禪上總顯無癡亂次以正念故下別明無癡亂初結前生後二善解世間下顯正念之能初二句雙標次所為下雙釋初所謂能持色法下五行半經通就諸境辨無癡亂次此菩薩成就如是下別約所持明無癡亂於中初一行半經結前標後次所謂下四行半經正顯所持文有十五句次菩薩聽聞下一行零經結無癡亂次何以故下兩行餘經徵釋所以下文別明上九義攝三種禪初復次種種音聲不能惑亂下有十六行經釋前現法樂住禪從所謂高大聲下至甚深義不亂通釋上心無散亂不作惡業下釋堅固如上所説下釋不動入三昧中下釋最上如是聞已下釋清淨知一切聲下釋廣此上六段釋上現法樂住禪竟次菩薩如是成就下五行半經釋引生功德禪於中釋大無量二義次作如是念下兩行經釋饒益有情禪釋九中無迷惑謂耽著禪味不起大悲是為迷惑今悲以導禪故無迷也是名下結名佛子何等為菩薩摩訶薩善現行此菩薩身業清淨語業清淨意業清淨住無所得示無所得身語意業能知三業皆無所有無虗妄故無有繫縛凡所示現無性無依住無實心知無量心自性知一切法自性無得無相甚深難入住於正位真如法性方便出生而無業報不生不滅住涅槃界住寂靜性住於真實無性之性言語道斷超諸世間無有所依入離分別無縛著法入最勝智真實之法入非諸世間所能了知出世間法此是菩薩善巧方便示現生相佛子此菩薩作如是念一切衆生無性為性一切諸法無為為性一切國土無相為相一切三世唯是言説一切言説於諸法中無有依處一切諸法於言説中亦無依處菩薩如是解一切法皆悉甚深一切世間皆悉寂靜一切佛法無所增益佛法不異世間法世間法不異佛法佛法世間法無有雜亂亦無差別了知法界體性平等普入三世永不捨離大菩提心恆不退轉化衆生心轉更增長大慈悲心與一切衆生作所依處菩薩爾時復作是念我不成熟衆生誰當成熟我不調伏衆生誰當調伏我不教化衆生誰當教化我不覺悟衆生誰當覺悟我不清淨衆生誰當清淨此我所宜我所應作復作是念若我自解此甚深法唯我一人於阿耨多羅三藐三菩提獨得解脫而諸衆生盲冥無目入大險道為諸煩惱之所纏縛如重病人恆受苦痛處貪愛獄不能自出不離地獄餓鬼畜生閻羅王界不能滅苦不捨惡業常處癡暗不見真實輪回生死無得出離住於八難衆垢所著種種煩惱覆障其心邪見所迷不行正道菩薩如是觀諸衆生作是念言若此衆生未成熟未調伏捨而取證得阿耨多羅三藐三菩提是所不應我當先化衆生於不可説不可説劫行菩薩行未成熟者先令成熟未調伏者先令調伏是菩薩住此行時諸天魔梵沙門婆羅門一切世間乾闥婆阿修羅等若有得見暫同住止恭敬尊重承事供養及暫耳聞一經心者如是所作悉不唐捐必定當成阿耨多羅三藐三菩提是名菩薩摩訶薩第六善現行第六善現行依慧度體即般若以慧能顯發三諦之理般若現前故名善現行以即空照有而能現生故云善現釋相中初此菩薩身業清淨下兩行半經略明行相次廣明行相有三種慧初如是隨覺慧於中初住如實心下示意業次住於正位下示身業三住涅槃界下示語業後入離分別下總結二五明善巧慧有三初此菩薩作如是念下以理會事次如是解一切下事理無礙三永不捨離大菩提心順理起悲三有情義利慧有二初復作是念我不成熟衆生下建攝生志二先人後己於中四節初若我自解下假攝自度次而諸衆生下觀物輪回三菩薩如是觀下結所不應四我當先化下決志先拔後住此行時總結顯成益是名下結名
